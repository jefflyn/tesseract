    "details": "\u9762\u8bd5\u5b98\u60a8\u597d\uff0c**\u672c\u5730\u6d88\u606f\u8868**\u662f\u6211\u5728\u5206\u5e03\u5f0f\u67b6\u6784\u8bbe\u8ba1\u4e2d\uff0c\u89e3\u51b3\u8de8\u670d\u52a1\u6570\u636e\u4e00\u81f4\u6027\u95ee\u9898\u6700\u5e38\u7528\u3001\u4e5f\u662f\u6700\u7a33\u5065\u7684\u65b9\u6848\u4e4b\u4e00\u3002\u5b83\u672c\u8d28\u4e0a\u662f\u4e00\u79cd\u5229\u7528 **BASE \u7406\u8bba**\uff08\u57fa\u672c\u53ef\u7528\u3001\u8f6f\u72b6\u6001\u3001\u6700\u7ec8\u4e00\u81f4\u6027\uff09\u6765\u5b9e\u73b0\u7684\u67d4\u6027\u4e8b\u52a1\u65b9\u6848\u3002\n\n\u4e0b\u9762\u6211\u5c06\u4ece**\u6838\u5fc3\u539f\u7406\u3001\u5b9e\u73b0\u6d41\u7a0b\u3001\u4f18\u7f3a\u70b9\u5206\u6790\u4ee5\u53ca\u5b9e\u6218\u4f18\u5316**\u56db\u4e2a\u7ef4\u5ea6\u6765\u8fdb\u884c\u8be6\u7ec6\u9610\u8ff0\u3002\n\n### \u4e00\u3001 \u6838\u5fc3\u539f\u7406\n\n\u672c\u5730\u6d88\u606f\u8868\u7684\u6838\u5fc3\u601d\u60f3\u662f\u5c06**\u4e1a\u52a1\u64cd\u4f5c**\u548c**\u6d88\u606f\u8bb0\u5f55**\u653e\u5728\u540c\u4e00\u4e2a\u672c\u5730\u4e8b\u52a1\u4e2d\u63d0\u4ea4\uff0c\u5229\u7528\u672c\u5730\u6570\u636e\u5e93\u4e8b\u52a1\u7684 **ACID \u7279\u6027**\uff08\u7279\u522b\u662f\u539f\u5b50\u6027\uff09\uff0c\u4fdd\u8bc1\u4e1a\u52a1\u64cd\u4f5c\u548c\u6d88\u606f\u8bb0\u5f55\u8981\u4e48\u90fd\u6210\u529f\uff0c\u8981\u4e48\u90fd\u5931\u8d25\uff0c\u4ece\u800c\u786e\u4fdd\u6d88\u606f\u53ea\u8981\u5b58\u5728\uff0c\u4e1a\u52a1\u4e00\u5b9a\u6210\u529f\u3002\n\n\u7b80\u5355\u6765\u8bf4\uff0c\u5c31\u662f**\u201c\u4e00\u4e8b\u52a1\u4e24\u5199\u201d**\uff1a\u5199\u4e1a\u52a1\u6570\u636e + \u5199\u6d88\u606f\u8bb0\u5f55\u3002\n\n### \u4e8c\u3001 \u6807\u51c6\u5b9e\u73b0\u6d41\u7a0b\n\n\u6211\u901a\u5e38\u5c06\u5176\u5b9e\u73b0\u6d41\u7a0b\u62c6\u89e3\u4e3a\u4e09\u4e2a\u9636\u6bb5\uff1a\n\n#### 1. \u751f\u4ea7\u8005\uff08\u4e0a\u6e38\u670d\u52a1\uff09\u64cd\u4f5c\n1.  **\u5f00\u542f\u672c\u5730\u4e8b\u52a1**\u3002\n2.  **\u5199\u5165\u4e1a\u52a1\u6570\u636e**\uff08\u5982\uff1a\u63d2\u5165\u8ba2\u5355\u8bb0\u5f55\uff09\u3002\n3.  **\u5199\u5165\u6d88\u606f\u8bb0\u5f55**\u5230\u672c\u5730\u6d88\u606f\u8868\uff08\u5982\uff1a\u63d2\u5165\u4e00\u6761\u8bb0\u5f55 `msg_id=101, status=\u5f85\u53d1\u9001, content=...`\uff09\u3002\n    *   *\u5173\u952e\u70b9\uff1a\u4e1a\u52a1\u8868\u548c\u6d88\u606f\u8868\u5fc5\u987b\u5728\u540c\u4e00\u4e2a\u6570\u636e\u5e93\u5b9e\u4f8b\u4e2d\uff0c\u624d\u80fd\u88ab\u540c\u4e00\u4e2a\u4e8b\u52a1\u7ba1\u63a7\u3002*\n4.  **\u63d0\u4ea4\u672c\u5730\u4e8b\u52a1**\u3002\n    *   \u6b64\u65f6\uff0c\u6570\u636e\u5e93\u4e2d\u65e2\u6709\u4e1a\u52a1\u6570\u636e\uff0c\u4e5f\u6709\u4e00\u6761\u201c\u5f85\u53d1\u9001\u201d\u7684\u6d88\u606f\u3002\n\n#### 2. \u6d88\u606f\u6295\u9012\uff08\u5f02\u6b65\uff09\n1.  **\u5b9a\u65f6\u4efb\u52a1\u626b\u63cf**\uff1a\u540e\u53f0\u72ec\u7acb\u7ebf\u7a0b\u6216\u5206\u5e03\u5f0f\u4efb\u52a1\uff08\u5982 XXL-Job\uff09\u5b9a\u65f6\u626b\u63cf\u672c\u5730\u6d88\u606f\u8868\uff0c\u67e5\u627e\u72b6\u6001\u4e3a\u201c\u5f85\u53d1\u9001\u201d\u4e14\u672a\u8fc7\u671f\u7684\u6d88\u606f\u3002\n2.  **\u53d1\u9001\u6d88\u606f**\uff1a\u5c06\u6d88\u606f\u53d1\u9001\u5230\u6d88\u606f\u4e2d\u95f4\u4ef6\uff08\u5982 RocketMQ/Kafka\uff09\u3002\n3.  **\u66f4\u65b0\u72b6\u6001**\uff1a\n    *   \u53d1\u9001\u6210\u529f\uff1a\u66f4\u65b0\u6d88\u606f\u72b6\u6001\u4e3a\u201c\u5df2\u53d1\u9001\u201d\u6216\u76f4\u63a5\u5220\u9664\u8bb0\u5f55\u3002\n    *   \u53d1\u9001\u5931\u8d25\uff1a\u4fdd\u7559\u72b6\u6001\uff0c\u7b49\u5f85\u4e0b\u4e00\u6b21\u8f6e\u8be2\u91cd\u8bd5\u3002\n\n#### 3. \u6d88\u8d39\u8005\uff08\u4e0b\u6e38\u670d\u52a1\uff09\u5904\u7406\n1.  **\u76d1\u542c\u6d88\u606f**\uff1a\u6d88\u8d39\u8005\u76d1\u542c MQ \u4e2d\u7684\u6d88\u606f\u3002\n2.  **\u5e42\u7b49\u6d88\u8d39**\uff1a\u6d88\u8d39\u8005\u5728\u5904\u7406\u4e1a\u52a1\u524d\uff0c\u5148\u68c0\u67e5\u662f\u5426\u5df2\u5904\u7406\u8fc7\u8be5\u6d88\u606f\uff08\u901a\u8fc7\u552f\u4e00\u4e1a\u52a1 ID\uff09\u3002\n    *   \u5982\u679c\u5df2\u5904\u7406\uff0c\u76f4\u63a5\u8fd4\u56de ACK\u3002\n    *   \u5982\u679c\u672a\u5904\u7406\uff0c\u6267\u884c\u672c\u5730\u4e1a\u52a1\u903b\u8f91\u3002\n3.  **\u786e\u8ba4\u6d88\u8d39**\uff1a\u4e1a\u52a1\u6267\u884c\u6210\u529f\u540e\uff0c\u5411 MQ \u53d1\u9001 ACK \u786e\u8ba4\u3002\n\n### \u4e09\u3001 \u65b9\u6848\u4f18\u7f3a\u70b9\u5206\u6790\n\n\u5728\u9879\u76ee\u9009\u578b\u65f6\uff0c\u6211\u4f1a\u91cd\u70b9\u8003\u8651\u4ee5\u4e0b\u7ef4\u5ea6\uff1a\n\n**\u4f18\u70b9\uff1a**\n1.  **\u53ef\u9760\u6027\u6781\u9ad8**\uff1a\u5b8c\u5168\u4f9d\u8d56\u672c\u5730\u4e8b\u52a1\uff0c\u4e0d\u4f9d\u8d56\u590d\u6742\u7684\u5206\u5e03\u5f0f\u4e8b\u52a1\u6846\u67b6\uff0c\u907f\u514d\u4e86 2PC \u7684\u6027\u80fd\u95ee\u9898\u548c TCC \u7684\u5f00\u53d1\u590d\u6742\u5ea6\u3002\n2.  **\u5b9e\u73b0\u7b80\u5355**\uff1a\u903b\u8f91\u6e05\u6670\uff0c\u53ea\u9700\u8981\u4e00\u5f20\u989d\u5916\u7684\u8868\u548c\u4e00\u4e2a\u5b9a\u65f6\u4efb\u52a1\uff0c\u4efb\u4f55\u89c4\u6a21\u7684\u56e2\u961f\u90fd\u80fd\u843d\u5730\u3002\n3.  **\u4e0e\u4e1a\u52a1\u89e3\u8026**\uff1a\u5373\u4f7f MQ \u5b95\u673a\uff0c\u6d88\u606f\u4e5f\u53ea\u662f\u6682\u7559\u5728\u672c\u5730\u6570\u636e\u5e93\u4e2d\uff0c\u4e0d\u4f1a\u4e22\u5931\uff0c\u7cfb\u7edf\u6062\u590d\u540e\u53ef\u7ee7\u7eed\u6295\u9012\u3002\n\n**\u7f3a\u70b9\uff1a**\n1.  **\u989d\u5916\u7684\u5b58\u50a8\u5f00\u9500**\uff1a\u9700\u8981\u5728\u6570\u636e\u5e93\u4e2d\u7ef4\u62a4\u4e00\u5f20\u6d88\u606f\u8868\uff0c\u968f\u7740\u4e1a\u52a1\u589e\u957f\uff0c\u6570\u636e\u91cf\u53ef\u80fd\u53d8\u5927\uff08\u901a\u5e38\u914d\u5408\u5b9a\u671f\u6e05\u7406\u673a\u5236\uff09\u3002\n2.  **\u6570\u636e\u5e93\u538b\u529b**\uff1a\u5b9a\u65f6\u4efb\u52a1\u9891\u7e41\u8f6e\u8be2\u6570\u636e\u5e93\uff0c\u53ef\u80fd\u4f1a\u5bf9\u6570\u636e\u5e93\u9020\u6210\u4e00\u5b9a\u7684 IO \u538b\u529b\uff08\u53ef\u4ee5\u901a\u8fc7\u7d22\u5f15\u4f18\u5316\u6216\u72b6\u6001\u8fc7\u6ee4\u7f13\u89e3\uff09\u3002\n3.  **\u5b9e\u65f6\u6027\u7a0d\u5f31**\uff1a\u4f9d\u8d56\u5b9a\u65f6\u4efb\u52a1\u7684\u8f6e\u8be2\u9891\u7387\uff0c\u5b58\u5728\u4e00\u5b9a\u7684\u5ef6\u8fdf\uff08\u901a\u5e38\u79d2\u7ea7\u5ef6\u8fdf\u5bf9\u4e1a\u52a1\u65e0\u5f71\u54cd\uff09\u3002\n\n### \u56db\u3001 \u5b9e\u6218\u4e2d\u7684\u4f18\u5316\u4e0e\u907f\u5751\u6307\u5357\n\n\u5728\u5c0f\u7535\u79d1\u6280\u7684\u4e1a\u52a1\u843d\u5730\u4e2d\uff0c\u6211\u5bf9\u8be5\u65b9\u6848\u505a\u4e86\u4ee5\u4e0b\u51e0\u5c42\u4f18\u5316\uff1a\n\n#### 1. \u6027\u80fd\u4f18\u5316\uff1a\u5206\u5e93\u5206\u8868\u4e0e\u72b6\u6001\u7d22\u5f15\n*   **\u95ee\u9898**\uff1a\u968f\u7740\u8ba2\u5355\u91cf\u6fc0\u589e\uff0c\u672c\u5730\u6d88\u606f\u8868\u6570\u636e\u91cf\u8fc7\u5927\uff0c\u8f6e\u8be2\u67e5\u8be2\u53d8\u6162\u3002\n*   **\u4f18\u5316**\uff1a\n    *   \u5bf9\u6d88\u606f\u8868\u5efa\u7acb `(status, create_time)` \u7684\u8054\u5408\u7d22\u5f15\uff0c\u52a0\u901f\u626b\u63cf\u3002\n    *   \u5bf9\u4e8e\u5df2\u6d88\u8d39\u6210\u529f\u7684\u6d88\u606f\uff0c\u4e0d\u518d\u4fdd\u7559\uff0c\u76f4\u63a5\u7269\u7406\u5220\u9664\u6216\u8f6c\u79fb\u5230\u5f52\u6863\u5e93\uff0c\u4fdd\u6301\u4e3b\u8868\u8f7b\u91cf\u3002\n\n#### 2. \u6295\u9012\u4f18\u5316\uff1a\u53cc\u91cd\u4fdd\u969c\u673a\u5236\n*   **\u95ee\u9898**\uff1a\u5982\u679c\u751f\u4ea7\u8005\u53d1\u9001\u6d88\u606f\u6210\u529f\uff0c\u4f46\u5728\u66f4\u65b0\u672c\u5730\u6d88\u606f\u8868\u72b6\u6001\u65f6\u5b95\u673a\u4e86\uff0c\u4f1a\u5bfc\u81f4\u6d88\u606f\u91cd\u590d\u6295\u9012\u3002\n*   **\u4f18\u5316**\uff1a\n    *   **\u6d88\u8d39\u8005\u5e42\u7b49**\uff1a\u8fd9\u662f\u5fc5\u987b\u505a\u7684\uff0c\u4e0b\u6e38\u670d\u52a1\u5fc5\u987b\u80fd\u9632\u91cd\u3002\n    *   **MQ \u4e8b\u52a1\u6d88\u606f\uff08\u8fdb\u9636\u7248\uff09**\uff1a\u5982\u679c\u4e0d\u60f3\u7ef4\u62a4\u672c\u5730\u6d88\u606f\u8868\uff0c\u53ef\u4ee5\u4f7f\u7528 RocketMQ \u7684\u4e8b\u52a1\u6d88\u606f\uff0c\u5b83\u5c06\u201c\u6d88\u606f\u8bb0\u5f55\u201d\u7684\u7ba1\u7406\u6743\u4ea4\u7ed9\u4e86 MQ\uff0c\u901a\u8fc7\u201c\u534a\u6d88\u606f\u201d\u673a\u5236\u5b9e\u73b0\u540c\u6837\u7684\u6548\u679c\uff0c\u4e14\u51cf\u5c11\u4e86\u6570\u636e\u5e93\u7684\u5199\u538b\u529b\u3002\n\n#### 3. \u5931\u8d25\u5904\u7406\uff1a\u6b7b\u4fe1\u544a\u8b66\n*   **\u95ee\u9898**\uff1a\u5982\u679c\u67d0\u6761\u6d88\u606f\u91cd\u8bd5\u4e86 N \u6b21\u8fd8\u662f\u5931\u8d25\uff08\u5982\u4e0b\u6e38\u670d\u52a1\u4e00\u76f4\u62a5\u9519\uff09\u3002\n*   **\u4f18\u5316**\uff1a\n    *   \u8bbe\u7f6e\u6700\u5927\u91cd\u8bd5\u6b21\u6570\uff08\u5982 5 \u6b21\uff09\u3002\n    *   \u8d85\u8fc7\u6b21\u6570\u540e\uff0c\u5c06\u72b6\u6001\u66f4\u65b0\u4e3a\u201c\u5931\u8d25/\u6b7b\u4fe1\u201d\uff0c\u5e76\u89e6\u53d1\u544a\u8b66\uff08\u90ae\u4ef6/\u9489\u9489\uff09\uff0c\u8f6c\u5165\u4eba\u5de5\u4ecb\u5165\u5904\u7406\uff0c\u907f\u514d\u65e0\u9650\u5faa\u73af\u62d6\u57ae\u7cfb\u7edf\u3002\n\n### \u4e94\u3001 \u603b\u7ed3\n\n**\u672c\u5730\u6d88\u606f\u8868**\u662f\u67b6\u6784\u5e08\u624b\u4e2d\u7684\u4e00\u628a\u201c\u745e\u58eb\u519b\u5200\u201d\uff0c\u867d\u7136\u4e0d\u591f\u201c\u9ad8\u5927\u4e0a\u201d\uff0c\u4f46\u975e\u5e38\u5b9e\u7528\u3002\u5b83\u975e\u5e38\u9002\u5408**\u5bf9\u5b9e\u65f6\u6027\u8981\u6c42\u4e0d\u4e25\u683c\u3001\u4f46\u5bf9\u6570\u636e\u4e00\u81f4\u6027\u8981\u6c42\u6781\u9ad8\u7684\u8de8\u670d\u52a1\u8c03\u7528\u573a\u666f**\uff08\u5982\u652f\u4ed8\u6210\u529f\u540e\u53d1\u5238\u3001\u8ba2\u5355\u5b8c\u6210\u540e\u79ef\u5206\u53d1\u653e\uff09\u3002\n\n\u5728\u6211\u7684\u9879\u76ee\u4e2d\uff0c\u6211\u901a\u5e38\u9075\u5faa**\u201c\u7b80\u5355\u4f18\u5148\u201d**\u7684\u539f\u5219\uff1a\u5982\u679c\u4e1a\u52a1\u5141\u8bb8\u77ed\u5ef6\u8fdf\uff0c\u9996\u9009\u672c\u5730\u6d88\u606f\u8868\uff1b\u5982\u679c\u5bf9\u6027\u80fd\u548c\u5b9e\u65f6\u6027\u8981\u6c42\u6781\u9ad8\uff0c\u518d\u8003\u8651 RocketMQ \u4e8b\u52a1\u6d88\u606f\u3002",

    "details": "\u9762\u8bd5\u5b98\u60a8\u597d\uff0c**\u5e42\u7b49\u6027** \u662f\u5206\u5e03\u5f0f\u7cfb\u7edf\u8bbe\u8ba1\u4e2d\u7684\u57fa\u77f3\uff0c\u7279\u522b\u662f\u5728\u6211\u4eec\u5b9e\u73b0\u6700\u7ec8\u4e00\u81f4\u6027\u3001\u6d88\u606f\u6d88\u8d39\u3001\u63a5\u53e3\u91cd\u8bd5\u7b49\u573a\u666f\u65f6\uff0c\u5b83\u662f\u4fdd\u969c\u6570\u636e\u51c6\u786e\u6027\u7684\u7b2c\u4e00\u9053\u9632\u7ebf\u3002\n\n\u7b80\u5355\u6765\u8bf4\uff0c**\u5e42\u7b49\u6027\u662f\u6307\uff1a\u65e0\u8bba\u4e00\u4e2a\u64cd\u4f5c\u88ab\u6267\u884c\u4e00\u6b21\u8fd8\u662f\u591a\u6b21\uff0c\u5176\u4ea7\u751f\u7684\u526f\u4f5c\u7528\u548c\u7ed3\u679c\u90fd\u662f\u4e00\u6837\u7684\u3002** \u5728\u6211\u4eec\u7684\u7cfb\u7edf\u4e2d\uff0c\u50cf\u201c\u67e5\u8be2\u201d\u5929\u7136\u5c31\u662f\u5e42\u7b49\u7684\uff0c\u4f46\u201c\u65b0\u589e\u201d\u3001\u201c\u6263\u6b3e\u201d\u3001\u201c\u53d1\u8d27\u201d\u7b49\u5199\u64cd\u4f5c\uff0c\u5fc5\u987b\u4e13\u95e8\u8bbe\u8ba1\u3002\n\n\u5728\u6211\u7684\u67b6\u6784\u7ecf\u9a8c\u4e2d\uff0c\u6211\u901a\u5e38\u4ece **HTTP \u63a5\u53e3\u5c42** \u548c **\u6d88\u606f\u6d88\u8d39\u5c42** \u4e24\u4e2a\u7ef4\u5ea6\u6765\u8bbe\u8ba1\u5e42\u7b49\u65b9\u6848\u3002\n\n### \u4e00\u3001 HTTP \u63a5\u53e3\u5e42\u7b49\u8bbe\u8ba1\uff08\u9632\u91cd\u590d\u63d0\u4ea4\uff09\n\n\u5bf9\u4e8e\u5916\u90e8\u8c03\u7528\u7684\u63a5\u53e3\uff08\u5982\u652f\u4ed8\u56de\u8c03\u3001\u5546\u6237\u4e0b\u5355\uff09\uff0c\u9632\u6b62\u56e0\u7f51\u7edc\u6296\u52a8\u5bfc\u81f4\u7684\u91cd\u590d\u63d0\u4ea4\u662f\u6838\u5fc3\u8bc9\u6c42\u3002\n\n#### 1. \u552f\u4e00\u7d22\u5f15\uff08\u6570\u636e\u5e93\u5c42\u515c\u5e95\uff09\n\u8fd9\u662f\u6700\u7b80\u5355\u3001\u6700\u7a33\u5065\u7684\u65b9\u6848\u3002\n*   **\u539f\u7406**\uff1a\u5229\u7528\u6570\u636e\u5e93\u7684\u552f\u4e00\u7ea6\u675f\u3002\u6bd4\u5982\u8ba2\u5355\u8868\u4e2d\u7684 `order_no` \u5b57\u6bb5\u8bbe\u7f6e\u552f\u4e00\u7d22\u5f15\u3002\n*   **\u6548\u679c**\uff1a\u5982\u679c\u4e1a\u52a1\u65b9\u91cd\u590d\u63d0\u4ea4\u76f8\u540c\u8ba2\u5355\u53f7\uff0c\u6570\u636e\u5e93\u4f1a\u629b\u51fa `DuplicateKeyException`\uff0c\u6211\u4eec\u5728\u4ee3\u7801\u4e2d\u6355\u83b7\u8be5\u5f02\u5e38\u5e76\u8fd4\u56de\u201c\u8ba2\u5355\u5df2\u5b58\u5728\u201d\u5373\u53ef\u3002\n*   **\u9002\u7528\u573a\u666f**\uff1a\u63d2\u5165\u578b\u64cd\u4f5c\uff0c\u4e14\u4e1a\u52a1\u672c\u8eab\u5177\u6709\u552f\u4e00\u4e1a\u52a1\u6807\u8bc6\u3002\n\n#### 2. Token \u673a\u5236\uff08\u5e94\u7528\u5c42\u62e6\u622a\uff09\n\u9632\u6b62\u524d\u7aef\u8bef\u64cd\u4f5c\uff08\u5982\u7528\u6237\u5feb\u901f\u70b9\u51fb\u591a\u6b21\u201c\u652f\u4ed8\u201d\u6309\u94ae\uff09\u3002\n*   **\u6d41\u7a0b**\uff1a\n    1.  **\u83b7\u53d6 Token**\uff1a\u524d\u7aef\u5148\u8c03\u7528\u540e\u7aef\u63a5\u53e3\u83b7\u53d6\u4e00\u4e2a Token\uff08\u5b58\u5165 Redis\uff09\u3002\n    2.  **\u643a\u5e26 Token \u8bf7\u6c42**\uff1a\u524d\u7aef\u63d0\u4ea4\u4e1a\u52a1\u8bf7\u6c42\u65f6\u643a\u5e26\u8be5 Token\u3002\n    3.  **\u6821\u9a8c\u4e0e\u5220\u9664**\uff1a\u540e\u7aef\u6536\u5230\u8bf7\u6c42\uff0c\u53bb Redis \u4e2d\u5220\u9664\u8be5 Token\u3002\u5982\u679c\u5220\u9664\u6210\u529f\uff08Redis \u8fd4\u56de 1\uff09\uff0c\u8bf4\u660e\u662f\u9996\u6b21\u8bf7\u6c42\uff0c\u6267\u884c\u4e1a\u52a1\uff1b\u5982\u679c\u5220\u9664\u5931\u8d25\uff08Redis \u8fd4\u56de 0\uff09\uff0c\u8bf4\u660e Token \u5df2\u88ab\u4f7f\u7528\uff0c\u62d2\u7edd\u8bf7\u6c42\u3002\n*   **\u5173\u952e\u70b9**\uff1a**\u83b7\u53d6 Token \u548c\u5220\u9664 Token \u5fc5\u987b\u662f\u539f\u5b50\u64cd\u4f5c**\uff08Redis \u7684 `GETDEL` \u547d\u4ee4\u6216 Lua \u811a\u672c\uff09\u3002\n\n#### 3. \u4e50\u89c2\u9501\uff08\u66f4\u65b0\u578b\u64cd\u4f5c\uff09\n\u9002\u7528\u4e8e\u66f4\u65b0\u72b6\u6001\u7684\u573a\u666f\u3002\n*   **\u539f\u7406**\uff1a\u5e26\u7248\u672c\u53f7\u66f4\u65b0 `UPDATE table SET status=1, version=version+1 WHERE id=1 AND version=old_version`\u3002\n*   **\u6548\u679c**\uff1a\u53ea\u6709\u7248\u672c\u53f7\u5339\u914d\u65f6\u624d\u80fd\u66f4\u65b0\u6210\u529f\uff0c\u91cd\u590d\u8bf7\u6c42\u56e0\u7248\u672c\u53f7\u5df2\u53d8\u66f4\u4f1a\u66f4\u65b0\u5931\u8d25\u3002\n\n### \u4e8c\u3001 \u6d88\u606f\u6d88\u8d39\u5e42\u7b49\u8bbe\u8ba1\uff08MQ \u573a\u666f\uff09\n\n\u5728\u524d\u9762\u63d0\u5230\u7684\u201c\u672c\u5730\u6d88\u606f\u8868\u201d\u6216\u201cRocketMQ \u4e8b\u52a1\u6d88\u606f\u201d\u573a\u666f\u4e2d\uff0c\u6d88\u8d39\u8005\u53ef\u80fd\u4f1a\u6536\u5230\u91cd\u590d\u6d88\u606f\uff0c\u5fc5\u987b\u505a\u5e42\u7b49\u5904\u7406\u3002\n\n#### \u6838\u5fc3\u7b56\u7565\uff1a\u524d\u7f6e\u53bb\u91cd\u8868\n\n\u8fd9\u662f\u6211\u76ee\u524d\u6700\u5e38\u7528\u7684\u6807\u51c6\u65b9\u6848\u3002\n\n*   **\u539f\u7406**\uff1a\u5728\u6267\u884c\u4e1a\u52a1\u903b\u8f91\u4e4b\u524d\uff0c\u5148\u5224\u65ad\u8be5\u6d88\u606f\u662f\u5426\u5df2\u88ab\u5904\u7406\u3002\n*   **\u5b9e\u73b0\u6d41\u7a0b**\uff1a\n    1.  \u6d88\u606f\u6d88\u8d39\u7aef\u6536\u5230\u6d88\u606f\uff0c\u89e3\u6790\u51fa\u552f\u4e00\u4e1a\u52a1 ID\uff08\u5982 `order_no`\uff09\u3002\n    2.  **\u5224\u65ad\u662f\u5426\u5df2\u5904\u7406**\uff1a\n        *   **\u65b9\u6848 A\uff08Redis\uff09**\uff1a\u4f7f\u7528 `SETNX key value` \u6216 `SET key value NX`\u3002\u5982\u679c\u8bbe\u7f6e\u6210\u529f\uff0c\u8bf4\u660e\u662f\u9996\u6b21\u5904\u7406\uff1b\u5982\u679c\u5df2\u5b58\u5728\uff0c\u8bf4\u660e\u5df2\u5904\u7406\u8fc7\uff0c\u76f4\u63a5 Ack\u3002\n        *   **\u65b9\u6848 B\uff08\u6570\u636e\u5e93\uff09**\uff1a\u7ef4\u62a4\u4e00\u5f20\u201c\u53bb\u91cd\u8868\u201d\uff0c\u53ea\u6709\u552f\u4e00\u7d22\u5f15\u5b57\u6bb5\u3002\u6d88\u8d39\u524d\u5148\u5c1d\u8bd5\u63d2\u5165\u8be5\u8868\uff0c\u63d2\u5165\u6210\u529f\u5219\u7ee7\u7eed\uff0c\u4e3b\u952e\u51b2\u7a81\u5219\u76f4\u63a5 Ack\u3002\n    3.  \u6267\u884c\u4e1a\u52a1\u903b\u8f91\u3002\n    4.  \u63d0\u4ea4\u4e8b\u52a1\uff0cAck \u6d88\u606f\u3002\n\n### \u4e09\u3001 \u5b9e\u6218\u4e2d\u7684\u96be\u70b9\u4e0e\u907f\u5751\n\n\u5728\u5b9e\u9645\u843d\u5730\u5e42\u7b49\u65b9\u6848\u65f6\uff0c\u6211\u9047\u5230\u8fc7\u4e24\u4e2a\u4e3b\u8981\u5751\uff0c\u5e76\u603b\u7ed3\u4e86\u89e3\u51b3\u529e\u6cd5\uff1a\n\n#### \u5751 1\uff1aRedis \u9501\u8fc7\u671f\uff0c\u4e1a\u52a1\u672a\u7ed3\u675f\n**\u573a\u666f**\uff1a\u4f7f\u7528 Redis \u505a\u5e42\u7b49\u6821\u9a8c\uff0c\u8bbe\u7f6e\u4e86 10 \u79d2\u8fc7\u671f\u3002\u4f46\u4e1a\u52a1\u903b\u8f91\u6267\u884c\u4e86 15 \u79d2\u3002\n**\u540e\u679c**\uff1a\u7b2c 12 \u79d2\u65f6\uff0cRedis Key \u8fc7\u671f\u88ab\u5220\u9664\u3002\u6b64\u65f6\u5982\u679c\u91cd\u8bd5\u8bf7\u6c42\u8fdb\u6765\uff0c\u4f1a\u518d\u6b21\u83b7\u53d6\u9501\u6210\u529f\uff0c\u5bfc\u81f4\u91cd\u590d\u6267\u884c\u3002\n\n**\u89e3\u51b3\u65b9\u6848**\uff1a\n1.  **Redisson \u770b\u95e8\u72d7**\uff1a\u4f7f\u7528 Redisson \u6846\u67b6\uff0c\u5b83\u4f1a\u81ea\u52a8\u5f00\u542f\u540e\u53f0\u7ebf\u7a0b\u4e3a\u9501\u201c\u7eed\u547d\u201d\uff0c\u53ea\u8981\u4e1a\u52a1\u6ca1\u6267\u884c\u5b8c\uff0c\u9501\u5c31\u4e0d\u4f1a\u8fc7\u671f\u3002\n2.  **\u4e1a\u52a1\u72b6\u6001\u673a\u515c\u5e95**\uff1a\u4e0d\u8981\u4ec5\u4f9d\u8d56 Redis \u7684 TTL\u3002\u5728\u4e1a\u52a1\u903b\u8f91\u6267\u884c\u524d\uff0c\u5148\u67e5\u6570\u636e\u5e93\u72b6\u6001\u3002\u4f8b\u5982\uff1a`UPDATE order SET status='PAID' WHERE id=xxx AND status='UNPAID'`\u3002\u5229\u7528\u6570\u636e\u5e93\u7684 ACID \u7279\u6027\u505a\u6700\u7ec8\u515c\u5e95\u3002\n\n#### \u5751 2\uff1a\u5e76\u53d1\u6781\u9ad8\u65f6\u7684\u7ade\u6001\u6761\u4ef6\n**\u573a\u666f**\uff1a\u4e24\u6761\u76f8\u540c\u6d88\u606f\u5728\u6beb\u79d2\u7ea7\u5185\u540c\u65f6\u5230\u8fbe\u6d88\u8d39\u8005\u3002\n**\u540e\u679c**\uff1a\u4e24\u4e2a\u7ebf\u7a0b\u540c\u65f6\u67e5\u8be2 Redis/DB\uff0c\u53d1\u73b0\u90fd\u4e0d\u5b58\u5728\uff0c\u4e8e\u662f\u540c\u65f6\u901a\u8fc7\u4e86\u5e42\u7b49\u68c0\u67e5\u3002\n\n**\u89e3\u51b3\u65b9\u6848**\uff1a\n*   **\u5fc5\u987b\u4f7f\u7528\u539f\u5b50\u6027\u64cd\u4f5c**\uff1a\n    *   **Redis**\uff1a\u5fc5\u987b\u4f7f\u7528 `SETNX`\uff0c\u800c\u4e0d\u662f\u5148 `GET` \u518d `SET`\u3002\n    *   **\u6570\u636e\u5e93**\uff1a\u4f9d\u8d56\u552f\u4e00\u7d22\u5f15\u62a5\u9519\uff0c\u6216\u8005\u5728\u53bb\u91cd\u8868\u4e2d\u5148\u63d2\u5165\uff08\u5229\u7528\u6570\u636e\u5e93\u884c\u9501\uff09\uff0c\u518d\u6267\u884c\u4e1a\u52a1\u3002\n\n### \u56db\u3001 \u603b\u7ed3\n\n\u5728\u6211\u7684\u67b6\u6784\u5b9e\u8df5\u4e2d\uff0c\u5e42\u7b49\u6027\u8bbe\u8ba1\u901a\u5e38\u9075\u5faa **\u201c\u5148\u9632\u91cd\uff0c\u540e\u4e1a\u52a1\u201d** \u7684\u539f\u5219\u3002\n\n**\u6211\u7684\u6807\u51c6\u7ec4\u5408\u62f3\u662f\uff1a**\n1.  **\u6570\u636e\u5e93\u552f\u4e00\u7d22\u5f15**\u4f5c\u4e3a\u6700\u540e\u4e00\u9053\u9632\u7ebf\uff08\u515c\u5e95\uff09\u3002\n2.  **Redis SETNX** \u4f5c\u4e3a\u9ad8\u6027\u80fd\u7684\u7b2c\u4e00\u9053\u9632\u7ebf\uff08\u62e6\u622a\u5927\u90e8\u5206\u91cd\u590d\uff09\u3002\n3.  **\u4e1a\u52a1\u72b6\u6001\u673a**\uff08\u4e50\u89c2\u9501\uff09\u786e\u4fdd\u6838\u5fc3\u72b6\u6001\u6d41\u8f6c\u7684\u6b63\u786e\u6027\u3002\n\n\u901a\u8fc7\u8fd9\u4e09\u5c42\u4fdd\u969c\uff0c\u5373\u4f7f\u5728\u9ad8\u5e76\u53d1\u3001\u7f51\u7edc\u6296\u52a8\u3001\u6d88\u606f\u91cd\u590d\u6295\u9012\u7684\u6781\u7aef\u60c5\u51b5\u4e0b\uff0c\u4e5f\u80fd\u786e\u4fdd\u4e1a\u52a1\u6570\u636e\u7684\u51c6\u786e\u6027\u3002",
    "subItems": []

    "title": "* \u8865\u507f",
    "style": "",
    "details": "\u9762\u8bd5\u5b98\u60a8\u597d\uff0c\u5728\u5206\u5e03\u5f0f\u7cfb\u7edf\u4e2d\uff0c\u7531\u4e8e\u7f51\u7edc\u6296\u52a8\u3001\u670d\u52a1\u5b95\u673a\u6216\u8d85\u65f6\u7b49\u539f\u56e0\uff0c\u5f88\u96be\u4fdd\u8bc1\u6bcf\u4e00\u6b21\u8c03\u7528\u90fd\u6210\u529f\u3002\u5f53\u6211\u4eec\u7684\u4e1a\u52a1\u6d41\u7a0b\u6267\u884c\u5230\u4e00\u534a\u5931\u8d25\u4e86\uff0c\u4e3a\u4e86\u4fdd\u969c\u6570\u636e\u7684\u4e00\u81f4\u6027\uff0c\u6211\u4eec\u5c31\u9700\u8981\u901a\u8fc7**\u201c\u8865\u507f\u673a\u5236\u201d**\u5c06\u7cfb\u7edf\u9762\u8bd5\u5b98\u60a8\u597d\uff0c\u5728\u5206\u5e03\u5f0f\u7cfb\u7edf\u4e2d\uff0c\u7531\u4e8e\u7f51\u7edc\u6296\u52a8\u3001\u670d\u52a1\u5b95\u673a\u6216\u8d85\u65f6\u7b49\u539f\u56e0\uff0c\u5f88\u96be\u4fdd\u8bc1\u6bcf\u4e00\u6b21\u8c03\u7528\u90fd\u5b8c\u7f8e\u6210\u529f\u3002\u5f53\u4e3b\u94fe\u8def\u5931\u8d25\u65f6\uff0c\u4e3a\u4e86\u8ba9\u7cfb\u7edf\u6062\u590d\u5230\u4e00\u81f4\u72b6\u6001\uff0c\u6211\u4eec\u9700\u8981\u5f15\u5165**\u8865\u507f\u673a\u5236**\u3002\n\n\u5728\u6211\u7684\u67b6\u6784\u7ecf\u9a8c\u4e2d\uff0c\u8865\u507f\u673a\u5236\u4e3b\u8981\u5206\u4e3a**\u4e8b\u52a1\u8865\u507f\uff08\u56de\u6eda\uff09**\u548c**\u4e1a\u52a1\u8865\u507f\uff08\u515c\u5e95\uff09**\u4e24\u5927\u7c7b\u3002\u6211\u4f1a\u6839\u636e\u4e1a\u52a1\u7684\u654f\u611f\u5ea6\u548c\u9636\u6bb5\u4e0d\u540c\uff0c\u9009\u62e9\u4e0d\u540c\u7684\u7b56\u7565\u3002\n\n### \u4e00\u3001 \u4e8b\u52a1\u8865\u507f\uff1a\u9006\u5411\u56de\u6eda\n\n\u8fd9\u79cd\u8865\u507f\u901a\u5e38\u7528\u4e8e\u5206\u5e03\u5f0f\u4e8b\u52a1\u4e2d\uff0c\u76ee\u7684\u662f\u64a4\u9500\u5df2\u7ecf\u6267\u884c\u7684\u64cd\u4f5c\uff0c\u8ba9\u7cfb\u7edf\u56de\u5230\u4e8b\u52a1\u5f00\u59cb\u524d\u7684\u72b6\u6001\u3002\n\n#### 1. TCC \u4e2d\u7684 Cancel \u9636\u6bb5\n\u8fd9\u662f\u6700\u5178\u578b\u7684\u8865\u507f\u573a\u666f\u3002\n*   **\u573a\u666f**\uff1a\u8ba2\u5355\u670d\u52a1\u8c03\u7528\u5e93\u5b58\u670d\u52a1\u51bb\u7ed3\u5e93\u5b58\u6210\u529f\u540e\uff0c\u8ba2\u5355\u521b\u5efa\u5931\u8d25\u3002\n*   **\u8865\u507f\u903b\u8f91**\uff1a\u7cfb\u7edf\u81ea\u52a8\u89e6\u53d1 Cancel \u63a5\u53e3\uff0c\u91ca\u653e\u4e4b\u524d\u51bb\u7ed3\u7684\u5e93\u5b58\u3002\n*   **\u96be\u70b9**\uff1a\u9700\u8981\u5904\u7406\u201c\u7a7a\u56de\u6eda\u201d\u548c\u201c\u60ac\u6302\u201d\u95ee\u9898\u3002\n    *   **\u7a7a\u56de\u6eda**\uff1aTry \u9636\u6bb5\u56e0\u7f51\u7edc\u963b\u585e\u672a\u5230\u8fbe\uff0c\u76f4\u63a5\u89e6\u53d1\u4e86 Cancel\u3002\u89e3\u51b3\u65b9\u6848\uff1aCancel \u63a5\u53e3\u9700\u5224\u65ad\u662f\u5426\u6709 Try \u8bb0\u5f55\uff0c\u65e0\u8bb0\u5f55\u5219\u76f4\u63a5\u8fd4\u56de\u6210\u529f\u3002\n    *   **\u60ac\u6302**\uff1aCancel \u6bd4 Try \u5148\u6267\u884c\u3002\u89e3\u51b3\u65b9\u6848\uff1a\u7ef4\u62a4\u4e00\u5f20\u4e8b\u52a1\u65e5\u5fd7\u8868\uff0c\u72b6\u6001\u6d41\u8f6c\u4e25\u683c\u6309 Try -> Cancel \u987a\u5e8f\uff0c\u62d2\u7edd\u5f02\u5e38\u72b6\u6001\u53d8\u66f4\u3002\n\n#### 2. Saga \u6a21\u5f0f\u7684\u8865\u507f\u4e8b\u4ef6\n\u5728\u957f\u94fe\u8def\u4e8b\u52a1\uff08\u5982\u9884\u8ba2\u673a\u7968+\u9152\u5e97+\u79df\u8f66\uff09\u4e2d\uff0c\u5982\u679c\u67d0\u4e00\u6b65\u9aa4\u5931\u8d25\uff0c\u9700\u8981\u9006\u5411\u4f9d\u6b21\u8c03\u7528\u524d\u9762\u6b65\u9aa4\u7684\u8865\u507f\u63a5\u53e3\u3002\n*   **\u5b9e\u73b0**\uff1a\u6211\u4f1a\u4f7f\u7528\u72b6\u6001\u673a\u6216 Seata Saga \u6a21\u5f0f\u7f16\u6392\u6d41\u7a0b\u3002\u5982\u679c\u7b2c 3 \u6b65\u5931\u8d25\uff0c\u7cfb\u7edf\u81ea\u52a8\u89e6\u53d1\u7b2c 2 \u6b65\u7684\u201c\u53d6\u6d88\u9884\u8ba2\u201d\u548c\u7b2c 1 \u6b65\u7684\u201c\u9000\u7968\u201d\u64cd\u4f5c\u3002\n\n### \u4e8c\u3001 \u4e1a\u52a1\u8865\u507f\uff1a\u91cd\u8bd5\u4e0e\u515c\u5e95\n\n\u6709\u4e9b\u573a\u666f\u4e0b\uff0c\u6211\u4eec\u65e0\u6cd5\u56de\u6eda\uff08\u5982\u77ed\u4fe1\u5df2\u53d1\u9001\u3001\u4f18\u60e0\u5238\u5df2\u4f7f\u7528\uff09\uff0c\u6216\u8005\u6211\u4eec\u5e0c\u671b\u5c3d\u53ef\u80fd\u8ba9\u6d41\u7a0b\u8d70\u901a\uff0c\u800c\u4e0d\u662f\u76f4\u63a5\u56de\u6eda\u3002\u8fd9\u65f6\u9700\u8981\u7684\u662f\u201c\u6b63\u5411\u201d\u8865\u507f\u3002\n\n#### 1. \u81ea\u52a8\u91cd\u8bd5\n*   **\u573a\u666f**\uff1a\u8c03\u7528\u7b2c\u4e09\u65b9\u652f\u4ed8\u63a5\u53e3\u8d85\u65f6\uff0c\u6216\u6570\u636e\u5e93\u6b7b\u9501\u3002\n*   **\u7b56\u7565**\uff1a\n    *   **\u540c\u6b65\u91cd\u8bd5**\uff1a\u7acb\u5373\u91cd\u8bd5 1-2 \u6b21\uff08\u9002\u7528\u4e8e\u6570\u636e\u5e93\u6b7b\u9501\uff09\u3002\n    *   **\u5f02\u6b65\u91cd\u8bd5**\uff1a\u901a\u8fc7 MQ \u7684\u91cd\u8bd5\u673a\u5236\uff0c\u95f4\u9694\u4e00\u5b9a\u65f6\u95f4\u91cd\u8bd5\u3002\n*   **\u6ce8\u610f**\uff1a\u5fc5\u987b\u914d\u5408**\u5e42\u7b49\u6027**\u8bbe\u8ba1\uff0c\u5426\u5219\u91cd\u8bd5\u4f1a\u5bfc\u81f4\u6570\u636e\u9519\u8bef\u3002\n\n#### 2. \u8865\u507f\u8868 + \u5b9a\u65f6\u4efb\u52a1\uff08\u6700\u7ec8\u4e00\u81f4\u6027\u515c\u5e95\uff09\n\u8fd9\u662f\u6211\u7528\u5f97\u6700\u591a\u7684\u201c\u6838\u6b66\u5668\u201d\uff0c\u4e3b\u8981\u7528\u4e8e\u89e3\u51b3\u201c\u672a\u77e5\u72b6\u6001\u201d\uff08\u5982\u7f51\u7edc\u8d85\u65f6\u5bfc\u81f4\u4e0d\u77e5\u9053\u5bf9\u65b9\u662f\u5426\u6210\u529f\uff09\u3002\n*   **\u5b9e\u73b0\u65b9\u6848**\uff1a\n    1.  \u5728\u4e1a\u52a1\u6267\u884c\u524d\uff0c\u5148\u5728\u6570\u636e\u5e93\u63d2\u5165\u4e00\u6761\u201c\u5f85\u5904\u7406\u201d\u7684\u8865\u507f\u8bb0\u5f55\u3002\n    2.  \u6267\u884c\u4e1a\u52a1\u903b\u8f91\u3002\n    3.  \u5982\u679c\u6210\u529f\uff0c\u66f4\u65b0\u8865\u507f\u8bb0\u5f55\u4e3a\u201c\u6210\u529f\u201d\uff1b\u5982\u679c\u5931\u8d25/\u8d85\u65f6\uff0c\u66f4\u65b0\u4e3a\u201c\u5f85\u91cd\u8bd5\u201d\u3002\n    4.  **\u5b9a\u65f6\u4efb\u52a1\u8f6e\u8be2**\uff1a\u626b\u63cf\u201c\u5f85\u91cd\u8bd5\u201d\u7684\u8bb0\u5f55\uff0c\u91cd\u65b0\u8c03\u7528\u4e0b\u6e38\u63a5\u53e3\u3002\n    5.  \u5982\u679c\u91cd\u8bd5 N \u6b21\u4ecd\u5931\u8d25\uff0c\u6807\u8bb0\u4e3a\u201c\u5f02\u5e38\u201d\uff0c\u89e6\u53d1\u4eba\u5de5\u4ecb\u5165\u544a\u8b66\u3002\n\n#### 3. \u4eba\u5de5\u8865\u507f\uff08\u8fd0\u8425\u540e\u53f0\uff09\n\u5f53\u81ea\u52a8\u5316\u624b\u6bb5\u90fd\u5931\u6548\u65f6\uff0c\u5fc5\u987b\u63d0\u4f9b\u4eba\u5de5\u5e72\u9884\u7684\u5165\u53e3\u3002\n*   **\u573a\u666f**\uff1a\u94f6\u884c\u6389\u5355\u3001\u5e93\u5b58\u6570\u636e\u56e0 Bug \u51fa\u73b0\u8d1f\u6570\u3002\n*   **\u5b9e\u8df5**\uff1a\u6211\u4f1a\u8bbe\u8ba1\u4e13\u95e8\u7684\u201c\u8fd0\u8425\u540e\u53f0\u201d\uff0c\u652f\u6301\u624b\u52a8\u89e6\u53d1\u201c\u8865\u5355\u201d\u3001\u201c\u56de\u6eda\u5e93\u5b58\u201d\u3001\u201c\u624b\u52a8\u9000\u6b3e\u201d\u7b49\u64cd\u4f5c\uff0c\u5e76\u8bb0\u5f55\u8be6\u7ec6\u7684\u64cd\u4f5c\u65e5\u5fd7\u3002\n\n### \u4e09\u3001 \u5b9e\u6218\u6848\u4f8b\uff1a\u5c0f\u7535\u79d1\u6280\u79df\u8d41\u6d41\u7a0b\n\n\u5728\u5171\u4eab\u5145\u7535\u5b9d\u79df\u501f\u6d41\u7a0b\u4e2d\uff0c\u7528\u6237\u626b\u7801\u540e\u6d89\u53ca\u201c\u4e0b\u5355 -> \u9501\u673a -> \u6263\u8d39 -> \u8fd8\u673a\u201d\u591a\u4e2a\u73af\u8282\u3002\n\n**\u9047\u5230\u7684\u95ee\u9898**\uff1a\n\u7528\u6237\u6263\u8d39\u6210\u529f\uff08\u5fae\u4fe1/\u652f\u4ed8\u5b9d\u5df2\u6263\u6b3e\uff09\uff0c\u4f46\u7cfb\u7edf\u66f4\u65b0\u8ba2\u5355\u72b6\u6001\u4e3a\u201c\u5df2\u5b8c\u6210\u201d\u65f6\u6570\u636e\u5e93\u5b95\u673a\uff0c\u5bfc\u81f4\u7528\u6237\u94b1\u6263\u4e86\uff0c\u8ba2\u5355\u8fd8\u662f\u201c\u8fdb\u884c\u4e2d\u201d\uff0c\u65e0\u6cd5\u5f52\u8fd8\u3002\n\n**\u6211\u7684\u8865\u507f\u65b9\u6848**\uff1a\n\n1.  **\u7b2c\u4e00\u9636\u6bb5\uff1a\u5b9e\u65f6\u8865\u507f\uff08\u91cd\u8bd5\uff09**\n    *   \u652f\u4ed8\u56de\u8c03\u63a5\u53e3\u6355\u83b7\u66f4\u65b0\u8ba2\u5355\u5f02\u5e38\uff0c\u5c06\u6d88\u606f\u5199\u5165\u672c\u5730\u6d88\u606f\u8868\uff0c\u7531\u540e\u53f0\u7ebf\u7a0b\u5f02\u6b65\u91cd\u8bd5\u66f4\u65b0\u8ba2\u5355\u72b6\u6001\u3002\n\n2.  **\u7b2c\u4e8c\u9636\u6bb5\uff1a\u5b9a\u671f\u5bf9\u8d26\uff08\u81ea\u52a8\u8865\u507f\uff09**\n    *   \u6bcf\u65e5\u51cc\u6668\u8dd1\u6279\u4efb\u52a1\uff0c\u5bf9\u6bd4\u201c\u652f\u4ed8\u6d41\u6c34\u8868\u201d\u548c\u201c\u8ba2\u5355\u72b6\u6001\u8868\u201d\u3002\n    *   \u53d1\u73b0\u201c\u652f\u4ed8\u6210\u529f\u201d\u4f46\u201c\u8ba2\u5355\u672a\u5b8c\u6210\u201d\u7684\u6570\u636e\uff0c\u81ea\u52a8\u89e6\u53d1**\u8865\u5355 Job**\uff0c\u5f3a\u5236\u66f4\u65b0\u8ba2\u5355\u72b6\u6001\u5e76\u63a8\u9001\u5f52\u8fd8\u901a\u77e5\u7ed9\u7528\u6237\u3002\n\n3.  **\u7b2c\u4e09\u9636\u6bb5\uff1a\u4eba\u5de5\u515c\u5e95**\n    *   \u5982\u679c\u81ea\u52a8\u8865\u507f\u5931\u8d25\uff08\u5982\u91d1\u989d\u4e0d\u5339\u914d\uff09\uff0c\u8f6c\u5165\u5de5\u5355\u7cfb\u7edf\uff0c\u5ba2\u670d\u4eba\u5de5\u6838\u5b9e\u540e\u901a\u8fc7\u540e\u53f0\u201c\u4e00\u952e\u4fee\u590d\u201d\u6309\u94ae\u5b8c\u6210\u8865\u507f\u3002\n\n### \u56db\u3001 \u603b\u7ed3\n\n\u5728\u8bbe\u8ba1\u8865\u507f\u673a\u5236\u65f6\uff0c\u6211\u9075\u5faa **\u201c\u5148\u81ea\u52a8\u5316\uff0c\u540e\u4eba\u5de5\u201d** \u7684\u539f\u5219\uff1a\n1.  **\u8bbe\u8ba1\u5c42\u9762**\uff1a\u4f18\u5148\u8003\u8651 TCC \u6216 Saga \u7684\u81ea\u52a8\u56de\u6eda\u80fd\u529b\u3002\n2.  **\u6267\u884c\u5c42\u9762**\uff1a\u5229\u7528 MQ \u91cd\u8bd5\u548c\u5b9a\u65f6\u4efb\u52a1\u5b9e\u73b0\u6700\u7ec8\u4e00\u81f4\u6027\u3002\n3.  **\u515c\u5e95\u5c42\u9762**\uff1a\u5efa\u8bbe\u5b8c\u5584\u7684\u5bf9\u8d26\u7cfb\u7edf\u548c\u8fd0\u8425\u540e\u53f0\uff0c\u786e\u4fdd\u5728\u4efb\u4f55\u6781\u7aef\u60c5\u51b5\u4e0b\u90fd\u6709\u624b\u6bb5\u6062\u590d\u6570\u636e\u3002",

    "title": "\u5982\u4f55\u8bbe\u8ba1\u9ad8\u53ef\u7528\uff1f",
    "style": "background-color: yellow;",
    "details": "\u9762\u8bd5\u5b98\u60a8\u597d\uff0c\u8fd9\u662f\u4e00\u4e2a\u975e\u5e38\u5b8f\u5927\u7684\u67b6\u6784\u547d\u9898\u3002\u9ad8\u53ef\u7528\u662f\u4e92\u8054\u7f51\u7cfb\u7edf\u7684\u751f\u547d\u7ebf\uff0c\u5728\u6211\u8d1f\u8d23\u7684\u5c0f\u7535\u79d1\u6280\u8bbe\u5907\u63a5\u5165\u7f51\u5173\u548c\u4ea4\u6613\u7cfb\u7edf\u4e2d\uff0c\u6211\u4eec\u8bbe\u5b9a\u7684\u76ee\u6807\u662f\u6838\u5fc3\u94fe\u8def\u53ef\u7528\u6027\u8fbe\u5230 99.99%\uff084 \u4e2a 9\uff09\u3002\n\n\u8981\u8bbe\u8ba1\u4e00\u4e2a\u9ad8\u53ef\u7528\u7cfb\u7edf\uff0c\u6211\u8ba4\u4e3a\u4e0d\u80fd\u53ea\u9760\u5355\u4e00\u6280\u672f\uff0c\u800c\u5fc5\u987b\u6784\u5efa\u4e00\u4e2a**\u5168\u65b9\u4f4d\u7684\u7acb\u4f53\u9632\u5fa1\u4f53\u7cfb**\u3002\u6211\u7684\u8bbe\u8ba1\u601d\u8def\u9075\u5faa\u4e00\u4e2a\u6838\u5fc3\u516c\u5f0f\uff1a\n\n**\u9ad8\u53ef\u7528 = \u5197\u4f59\uff08\u65e0\u5355\u70b9\uff09 + \u6545\u969c\u81ea\u52a8\u8f6c\u79fb + \u964d\u7ea7\u7194\u65ad + \u5f02\u5730\u591a\u6d3b**\n\n\u5177\u4f53\u6765\u8bf4\uff0c\u6211\u4f1a\u4ece\u4ee5\u4e0b\u56db\u4e2a\u5c42\u9762\u8fdb\u884c\u67b6\u6784\u8bbe\u8ba1\uff1a\n\n### \u4e00\u3001 \u67b6\u6784\u5c42\u9762\uff1a\u5197\u4f59\u4e0e\u81ea\u52a8\u6545\u969c\u8f6c\u79fb\uff08\u89e3\u51b3\u201c\u5355\u70b9\u6545\u969c\u201d\uff09\n\n\u8fd9\u662f\u9ad8\u53ef\u7528\u7684\u57fa\u77f3\u3002\u4efb\u4f55\u4e00\u53f0\u670d\u52a1\u5668\u3001\u4e00\u4e2a\u6570\u636e\u5e93\u5b9e\u4f8b\u90fd\u53ef\u80fd\u6302\u6389\uff0c\u552f\u4e00\u7684\u529e\u6cd5\u5c31\u662f**\u5197\u4f59**\u3002\n\n**1. \u5e94\u7528\u5c42\uff1a\u96c6\u7fa4\u90e8\u7f72 + \u8d1f\u8f7d\u5747\u8861**\n*   **\u8bbe\u8ba1**\uff1a\u6240\u6709\u7684\u5e94\u7528\u670d\u52a1\u7aef\u5fc5\u987b\u662f\u65e0\u72b6\u6001\u7684\u3002\u901a\u8fc7 Nginx \u6216 Spring Cloud Gateway \u8fdb\u884c\u8d1f\u8f7d\u5747\u8861\uff0c\u5c06\u8bf7\u6c42\u5206\u53d1\u5230\u540e\u7aef\u96c6\u7fa4\u3002\n*   **\u5065\u5eb7\u68c0\u67e5**\uff1a\u8d1f\u8f7d\u5747\u8861\u5668\u5fc5\u987b\u914d\u7f6e\u5065\u5eb7\u68c0\u67e5\u673a\u5236\u3002\u4e00\u65e6\u67d0\u53f0\u670d\u52a1\u8282\u70b9\u5b95\u673a\uff0cLB \u4f1a\u81ea\u52a8\u5c06\u5176\u5254\u9664\uff0c\u6d41\u91cf\u65e0\u7f1d\u5207\u6362\u5230\u5176\u4ed6\u5065\u5eb7\u8282\u70b9\u3002\n\n**2. \u6570\u636e\u5c42\uff1a\u4e3b\u4ece\u590d\u5236 + \u8bfb\u5199\u5206\u79bb**\n*   **\u6570\u636e\u5e93**\uff1aMySQL \u91c7\u7528\u4e3b\u4ece\u67b6\u6784\u3002Master \u6545\u969c\u65f6\uff0c\u901a\u8fc7 **MHA (Master High Availability)** \u6216 **MGR (MySQL Group Replication)** \u81ea\u52a8\u63d0\u5347 Slave \u4e3a Master\u3002\n*   **\u7f13\u5b58**\uff1aRedis \u91c7\u7528 **Redis Cluster** \u6216 **Redis Sentinel (\u54e8\u5175)** \u6a21\u5f0f\u3002\u54e8\u5175\u673a\u5236\u53ef\u4ee5\u76d1\u63a7 Master \u72b6\u6001\uff0c\u4e00\u65e6\u4e0b\u7ebf\u81ea\u52a8\u5b8c\u6210\u4e3b\u4ece\u5207\u6362\uff0c\u5ba2\u6237\u7aef\u901a\u8fc7\u54e8\u5175\u83b7\u53d6\u65b0\u7684 Master \u5730\u5740\u3002\n\n**3. \u6d88\u606f\u961f\u5217\uff1a\u96c6\u7fa4\u4e0e\u955c\u50cf**\n*   \u5982\u679c\u4f7f\u7528 RabbitMQ\uff0c\u91c7\u7528\u955c\u50cf\u961f\u5217\u6a21\u5f0f\u4fdd\u8bc1\u8282\u70b9\u95f4\u6570\u636e\u540c\u6b65\uff1b\u5982\u679c\u4f7f\u7528 RocketMQ \u6216 Kafka\uff0c\u5b83\u4eec\u5929\u751f\u652f\u6301\u5206\u5e03\u5f0f\u96c6\u7fa4\uff0c\u67d0\u4e2a Broker \u6302\u6389\u4e0d\u5f71\u54cd\u6574\u4f53\u670d\u52a1\u3002\n\n---\n\n### \u4e8c\u3001 \u4ee3\u7801\u5c42\u9762\uff1a\u670d\u52a1\u6cbb\u7406\u4e0e\u5bb9\u9519\uff08\u89e3\u51b3\u201c\u96ea\u5d29\u6548\u5e94\u201d\uff09\n\n\u5728\u5fae\u670d\u52a1\u67b6\u6784\u4e2d\uff0c\u67d0\u4e2a\u4e0b\u6e38\u670d\u52a1\u6302\u4e86\uff0c\u5982\u679c\u4e0d\u52a0\u63a7\u5236\uff0c\u4f1a\u5bfc\u81f4\u7ebf\u7a0b\u6c60\u8017\u5c3d\uff0c\u62d6\u57ae\u4e0a\u6e38\u670d\u52a1\uff0c\u5f15\u53d1\u5168\u5c40\u96ea\u5d29\u3002\n\n**1. \u7194\u65ad\u4e0e\u964d\u7ea7**\n*   **\u673a\u5236**\uff1a\u7c7b\u4f3c\u7535\u8def\u4fdd\u9669\u4e1d\u3002\u5f53\u4e0b\u6e38\u670d\u52a1\u9519\u8bef\u7387\u6216\u54cd\u5e94\u65f6\u95f4\u8d85\u8fc7\u9608\u503c\uff0c\u76f4\u63a5\u201c\u7194\u65ad\u201d\uff0c\u540e\u7eed\u8bf7\u6c42\u76f4\u63a5\u5feb\u901f\u8fd4\u56de\uff0c\u4e0d\u518d\u8c03\u7528\u4e0b\u6e38\u3002\n*   **\u5b9e\u6218**\uff1a\u5728\u79d2\u6740\u6216\u5927\u4fc3\u573a\u666f\u4e0b\uff0c\u5982\u679c\u63a8\u8350\u670d\u52a1\u6302\u4e86\uff0c\u6211\u4eec\u4f1a\u964d\u7ea7\u8fd4\u56de\u9ed8\u8ba4\u63a8\u8350\u5217\u8868\uff0c\u800c\u4e0d\u662f\u8ba9\u7528\u6237\u4e00\u76f4\u7b49\u5f85\u6216\u62a5\u9519\u3002\u6211\u4eec\u901a\u5e38\u4f7f\u7528 **Sentinel** \u6216 **Resilience4j** \u6765\u5b9e\u73b0\u3002\n\n**2. \u8d85\u65f6\u4e0e\u91cd\u8bd5**\n*   **\u8d85\u65f6**\uff1a\u5fc5\u987b\u8bbe\u7f6e\u5408\u7406\u7684\u8d85\u65f6\u65f6\u95f4\uff08\u5982 RPC \u8c03\u7528 500ms \u8d85\u65f6\uff09\u3002\u5982\u679c\u4e0d\u8bbe\u8d85\u65f6\uff0c\u963b\u585e\u7684\u7ebf\u7a0b\u4f1a\u62d6\u57ae\u6574\u4e2a\u670d\u52a1\u3002\n*   **\u91cd\u8bd5**\uff1a\u5bf9\u4e8e\u7f51\u7edc\u6296\u52a8\u7b49\u4e34\u65f6\u6027\u6545\u969c\uff0c\u53ef\u4ee5\u8bbe\u7f6e\u91cd\u8bd5\u3002\u4f46\u8981\u6ce8\u610f**\u5e42\u7b49\u6027**\uff0c\u4e14\u91cd\u8bd5\u6b21\u6570\u4e0d\u80fd\u8fc7\u591a\uff0c\u5426\u5219\u4f1a\u52a0\u5267\u4e0b\u6e38\u538b\u529b\uff08\u901a\u5e38\u914d\u5408\u6307\u6570\u9000\u907f\u7b97\u6cd5\uff09\u3002\n\n**3. \u9650\u6d41**\n*   **\u76ee\u7684**\uff1a\u9632\u6b62\u6076\u610f\u6d41\u91cf\u6216\u7a81\u53d1\u6d41\u91cf\u6253\u57ae\u7cfb\u7edf\u3002\n*   **\u65b9\u6848**\uff1a\n    *   **Nginx \u5c42**\uff1a\u9650\u5236\u5355\u4e2a IP \u7684\u8fde\u63a5\u6570\u3002\n    *   **\u5e94\u7528\u5c42**\uff1a\u4f7f\u7528\u4ee4\u724c\u6876\u6216\u6f0f\u6876\u7b97\u6cd5\u3002\u6bd4\u5982\u6211\u4eec\u5728\u8bbe\u5907\u5fc3\u8df3\u4e0a\u62a5\u63a5\u53e3\uff0c\u9650\u5236\u4e86\u6bcf\u79d2\u6700\u5927 QPS\uff0c\u8d85\u51fa\u90e8\u5206\u76f4\u63a5\u4e22\u5f03\uff0c\u4fdd\u62a4\u6838\u5fc3\u4e1a\u52a1\u7ebf\u7a0b\u3002\n\n**4. \u5f02\u6b65\u89e3\u8026**\n*   **\u6838\u5fc3\u601d\u60f3**\uff1a\u4e0d\u8981\u8ba9\u7528\u6237\u7b49\u5f85\u975e\u6838\u5fc3\u6d41\u7a0b\u3002\n*   **\u6848\u4f8b**\uff1a\u7528\u6237\u79df\u501f\u5145\u7535\u5b9d\u6210\u529f\u540e\uff0c\u9700\u8981\u53d1\u77ed\u4fe1\u3001\u52a0\u79ef\u5206\u3002\u8fd9\u4e9b\u64cd\u4f5c\u901a\u8fc7 MQ \u5f02\u6b65\u5904\u7406\u3002\u5373\u4f7f\u79ef\u5206\u670d\u52a1\u6302\u4e86\uff0c\u4e5f\u4e0d\u5f71\u54cd\u7528\u6237\u79df\u501f\u5145\u7535\u5b9d\u7684\u6838\u5fc3\u4f53\u9a8c\u3002\n\n---\n\n### \u4e09\u3001 \u90e8\u7f72\u5c42\u9762\uff1a\u5f02\u5730\u591a\u6d3b\uff08\u89e3\u51b3\u201c\u673a\u623f\u7ea7\u707e\u96be\u201d\uff09\n\n\u5982\u679c\u6574\u4e2a\u673a\u623f\u65ad\u7535\u6216\u5149\u7ea4\u88ab\u6316\u65ad\uff0c\u5355\u673a\u623f\u7684\u5197\u4f59\u5c31\u5931\u6548\u4e86\u3002\n\n*   **\u540c\u57ce\u53cc\u6d3b**\uff1a\u5728\u540c\u4e00\u4e2a\u57ce\u5e02\u7684\u4e24\u4e2a\u673a\u623f\u90e8\u7f72\u670d\u52a1\uff0c\u901a\u8fc7\u4e13\u7ebf\u540c\u6b65\u6570\u636e\u3002\u5e73\u65f6\u4e24\u4e2a\u673a\u623f\u540c\u65f6\u5bf9\u5916\u63d0\u4f9b\u670d\u52a1\u3002\n*   **\u5f02\u5730\u591a\u6d3b**\uff1a\u5728\u5f02\u5730\u5efa\u7acb\u707e\u5907\u4e2d\u5fc3\u3002\u5bf9\u4e8e\u91d1\u878d\u7ea7\u6216\u6838\u5fc3\u4e1a\u52a1\uff0c\u6211\u4eec\u4f1a\u505a\u201c\u5f02\u5730\u591a\u6d3b\u201d\u67b6\u6784\u3002\u4f8b\u5982\uff0c\u7528\u6237\u6570\u636e\u901a\u8fc7 ID \u8def\u7531\uff0c\u5357\u65b9\u7528\u6237\u6570\u636e\u5b58\u653e\u5728\u6df1\u5733\u673a\u623f\uff0c\u5317\u65b9\u7528\u6237\u6570\u636e\u5b58\u653e\u5728\u5317\u4eac\u673a\u623f\uff0c\u4e92\u4e3a\u5907\u4efd\u3002\n\n---\n\n### \u56db\u3001 \u8fd0\u7ef4\u5c42\u9762\uff1a\u76d1\u63a7\u4e0e\u9884\u6848\uff08\u89e3\u51b3\u201c\u53d1\u73b0\u6162\u3001\u6062\u590d\u6162\u201d\uff09\n\n\u9ad8\u53ef\u7528\u4e0d\u4ec5\u662f\u67b6\u6784\u95ee\u9898\uff0c\u66f4\u662f\u8fd0\u7ef4\u95ee\u9898\u3002\n\n**1. \u5168\u94fe\u8def\u76d1\u63a7**\n*   \u6211\u4eec\u5fc5\u987b\u80fd**\u6bd4\u7528\u6237\u5148\u53d1\u73b0\u6545\u969c**\u3002\n*   \u6211\u5728\u5c0f\u7535\u79d1\u6280\u642d\u5efa\u4e86\u57fa\u4e8e **SkyWalking** \u7684\u94fe\u8def\u8ffd\u8e2a\u7cfb\u7edf\uff0c\u914d\u5408 **Prometheus + Grafana** \u505a\u6307\u6807\u76d1\u63a7\uff0c**ELK** \u505a\u65e5\u5fd7\u5206\u6790\u3002\n*   \u4e00\u65e6\u51fa\u73b0\u5f02\u5e38\uff08\u5982\u63a5\u53e3 RT \u98d9\u5347\u3001\u9519\u8bef\u7387\u589e\u52a0\uff09\uff0c\u7cfb\u7edf\u4f1a\u5728 1 \u5206\u949f\u5185\u901a\u8fc7\u9489\u9489/\u77ed\u4fe1\u62a5\u8b66\u3002\n\n**2. \u5e94\u6025\u9884\u6848\u4e0e\u6f14\u7ec3**\n*   **\u9884\u6848**\uff1a\u9488\u5bf9\u6bcf\u4e2a\u6838\u5fc3\u7ec4\u4ef6\uff0c\u90fd\u6709\u8be6\u7ec6\u7684\u5e94\u6025\u9884\u6848\u3002\u6bd4\u5982\uff1aRedis \u6302\u4e86\u600e\u4e48\u529e\uff1fDB \u4e3b\u4ece\u5ef6\u8fdf\u600e\u4e48\u529e\uff1fMQ \u79ef\u538b\u4e86\u600e\u4e48\u529e\uff1f\n*   **\u6f14\u7ec3**\uff1a\u6211\u4eec\u4f1a\u5b9a\u671f\u8fdb\u884c\u201c\u6545\u969c\u6f14\u7ec3\u201d\uff08Chaos Engineering\uff0c\u6df7\u6c8c\u5de5\u7a0b\uff09\u3002\u6bd4\u5982\u5728\u51cc\u6668\u4eba\u4e3a\u5173\u95ed\u67d0\u4e2a\u670d\u52a1\u8282\u70b9\uff0c\u9a8c\u8bc1\u76d1\u63a7\u662f\u5426\u62a5\u8b66\u3001\u7194\u65ad\u662f\u5426\u751f\u6548\u3001\u7cfb\u7edf\u662f\u5426\u80fd\u81ea\u52a8\u6062\u590d\u3002\n\n**3. \u7070\u5ea6\u53d1\u5e03**\n*   \u4e0a\u7ebf\u662f\u7cfb\u7edf\u6700\u8106\u5f31\u7684\u65f6\u5019\u3002\n*   \u901a\u8fc7\u7070\u5ea6\u53d1\u5e03\uff0c\u5148\u8ba9 5% \u7684\u6d41\u91cf\u8fdb\u5165\u65b0\u7248\u672c\uff0c\u89c2\u5bdf\u65e0\u8bef\u540e\u518d\u9010\u6b65\u6269\u5927\u3002\u4e00\u65e6\u53d1\u73b0\u95ee\u9898\uff0c\u7acb\u5373\u56de\u6eda\uff0c\u5c06\u5f71\u54cd\u9762\u63a7\u5236\u5728\u6700\u5c0f\u3002\n\n### \u603b\u7ed3\n\n\u5982\u4f55\u8bbe\u8ba1\u9ad8\u53ef\u7528\uff1f\u6211\u7684\u6838\u5fc3\u7406\u5ff5\u662f\uff1a**\u5047\u8bbe\u4e00\u5207\u90fd\u4f1a\u5931\u8d25**\u3002\n\n1.  **\u67b6\u6784\u4e0a**\uff1a\u901a\u8fc7\u96c6\u7fa4\u548c\u4e3b\u4ece\u6d88\u9664\u5355\u70b9\u3002\n2.  **\u4ee3\u7801\u4e0a**\uff1a\u901a\u8fc7\u7194\u65ad\u3001\u9650\u6d41\u3001\u964d\u7ea7\u9632\u6b62\u96ea\u5d29\u3002\n3.  **\u90e8\u7f72\u4e0a**\uff1a\u901a\u8fc7\u8de8\u673a\u623f\u5bb9\u707e\u5e94\u5bf9\u6781\u7aef\u707e\u96be\u3002\n4.  **\u8fd0\u7ef4\u4e0a**\uff1a\u901a\u8fc7\u76d1\u63a7\u548c\u6f14\u7ec3\u5b9e\u73b0\u5feb\u901f\u53d1\u73b0\u3001\u5feb\u901f\u6062\u590d\u3002\n\n\u8fd9\u5c31\u662f\u6211\u5728\u5b9e\u6218\u4e2d\u6784\u5efa\u9ad8\u53ef\u7528\u7cfb\u7edf\u7684\u5b8c\u6574\u65b9\u6cd5\u8bba\u3002",
    "subItems": []
  },

    "title": "* \u9ad8\u53ef\u7528\u9650\u6d41",
    "style": "",
    "details": "\u9762\u8bd5\u5b98\u60a8\u597d\uff0c**\u9650\u6d41** \u662f\u9ad8\u53ef\u7528\u67b6\u6784\u4e2d\u4fdd\u62a4\u7cfb\u7edf\u4e0d\u88ab\u7a81\u53d1\u6d41\u91cf\u51b2\u57ae\u7684\u201c\u7194\u65ad\u5668\u201d\u3002\u5728\u6211\u7684\u67b6\u6784\u8bbe\u8ba1\u7406\u5ff5\u4e2d\uff0c\u9650\u6d41\u7684\u6838\u5fc3\u76ee\u7684\u662f**\u727a\u7272\u4e00\u90e8\u5206\u7528\u6237\u4f53\u9a8c\uff08\u62d2\u7edd\u90e8\u5206\u8bf7\u6c42\uff09\uff0c\u6362\u53d6\u6574\u4e2a\u7cfb\u7edf\u7684\u7a33\u5b9a\u6027**\u3002\n\n\u5728\u591a\u5e74\u7684\u9ad8\u5e76\u53d1\u5b9e\u6218\u4e2d\uff0c\u6211\u901a\u5e38\u4f1a\u4ece**\u9650\u6d41\u7b97\u6cd5\u3001\u9650\u6d41\u7ef4\u5ea6\u3001\u9650\u6d41\u67b6\u6784\u5c42\u7ea7**\u4e09\u4e2a\u5c42\u9762\u6765\u6784\u5efa\u9632\u5fa1\u4f53\u7cfb\u3002\n\n### \u4e00\u3001 \u6838\u5fc3\u9650\u6d41\u7b97\u6cd5\n\n\u8fd9\u662f\u9762\u8bd5\u4e2d\u6700\u5e38\u95ee\u7684\u57fa\u7840\uff0c\u6211\u5728\u751f\u4ea7\u73af\u5883\u4e2d\u4e3b\u8981\u4f7f\u7528\u4ee5\u4e0b\u4e09\u79cd\uff1a\n\n#### 1. \u6ed1\u52a8\u7a97\u53e3\u7b97\u6cd5\n*   **\u539f\u7406**\uff1a\u5c06\u65f6\u95f4\u7a97\u53e3\u5212\u5206\u4e3a\u591a\u4e2a\u5c0f\u683c\uff0c\u968f\u7740\u65f6\u95f4\u63a8\u79fb\u7a97\u53e3\u5411\u524d\u6ed1\u52a8\u3002\u89e3\u51b3\u4e86\u56fa\u5b9a\u7a97\u53e3\u7b97\u6cd5\u5728\u7a97\u53e3\u8fb9\u754c\u53ef\u80fd\u51fa\u73b0\u7684\u201c\u53cc\u500d\u6d41\u91cf\u201d\u95ee\u9898\uff08\u5982 1 \u79d2\u9650 100\uff0c\u5728 0.9 \u79d2\u6765\u4e86 100 \u4e2a\uff0c1.1 \u79d2\u53c8\u6765\u4e86 100 \u4e2a\uff0c\u77ac\u95f4\u627f\u53d7\u4e86 200 \u4e2a\uff09\u3002\n*   **\u5e94\u7528**\uff1aSentinel \u5c31\u91c7\u7528\u4e86\u6ed1\u52a8\u7a97\u53e3\u6765\u7edf\u8ba1\u5b9e\u65f6 QPS\u3002\n*   **\u4f18\u7f3a\u70b9**\uff1a\u7cbe\u5ea6\u9ad8\uff0c\u4f46\u9700\u8981\u5b58\u50a8\u7a97\u53e3\u5185\u7684\u8bf7\u6c42\u660e\u7ec6\uff0c\u5185\u5b58\u5f00\u9500\u7565\u5927\u3002\n\n#### 2. \u6f0f\u6876\u7b97\u6cd5\n*   **\u539f\u7406**\uff1a\u8bf7\u6c42\u50cf\u6c34\u4e00\u6837\u6ce8\u5165\u6876\u4e2d\uff0c\u6876\u5e95\u4ee5**\u6052\u5b9a\u901f\u7387**\u6f0f\u6c34\u3002\u5982\u679c\u6ce8\u5165\u592a\u5feb\uff08\u7a81\u53d1\u6d41\u91cf\uff09\uff0c\u6876\u6ee1\u4e86\u5c31\u4f1a\u6ea2\u51fa\uff08\u62d2\u7edd\u8bf7\u6c42\uff09\u3002\n*   **\u6838\u5fc3\u4ef7\u503c**\uff1a**\u5f3a\u5236\u5e73\u6ed1\u6d41\u91cf**\u3002\u65e0\u8bba\u6d41\u91cf\u591a\u5927\uff0c\u6d41\u51fa\u7684\u901f\u5ea6\u662f\u56fa\u5b9a\u7684\u3002\n*   **\u9002\u7528\u573a\u666f**\uff1a\u4fdd\u62a4\u6570\u636e\u5e93\u7b49\u8106\u5f31\u4e0b\u6e38\uff0c\u9632\u6b62\u7a81\u53d1\u6d41\u91cf\u6253\u57ae DB\u3002Nginx \u7684 `limit_req` \u6a21\u5757\u5c31\u662f\u57fa\u4e8e\u6b64\u5b9e\u73b0\u3002\n\n#### 3. \u4ee4\u724c\u6876\u7b97\u6cd5\u2014\u2014 **\u6700\u5e38\u7528**\n*   **\u539f\u7406**\uff1a\u7cfb\u7edf\u4ee5\u4e00\u5b9a\u901f\u7387\u5411\u6876\u4e2d\u653e\u4ee4\u724c\uff0c\u8bf7\u6c42\u5230\u8fbe\u65f6\u4ece\u6876\u4e2d\u53d6\u4ee4\u724c\u3002\u6709\u4ee4\u724c\u5219\u901a\u8fc7\uff0c\u65e0\u4ee4\u724c\u5219\u62d2\u7edd\u3002\n*   **\u6838\u5fc3\u4ef7\u503c**\uff1a**\u5141\u8bb8\u7a81\u53d1\u6d41\u91cf**\u3002\u5982\u679c\u6876\u91cc\u6709 100 \u4e2a\u4ee4\u724c\u79ef\u6512\uff0c\u77ac\u95f4\u6765\u4e86 100 \u4e2a\u8bf7\u6c42\u662f\u53ef\u4ee5\u4e00\u6b21\u6027\u901a\u8fc7\u7684\u3002\n*   **\u9002\u7528\u573a\u666f**\uff1a\u5927\u90e8\u5206\u4e1a\u52a1\u63a5\u53e3\u9650\u6d41\u3002Google Guava \u7684 `RateLimiter` \u5c31\u662f\u57fa\u4e8e\u6b64\u5b9e\u73b0\u3002\n*   **\u5bf9\u6bd4**\uff1a\u6f0f\u6876\u9002\u5408\u524a\u5cf0\u586b\u8c37\uff0c\u4ee4\u724c\u6876\u9002\u5408\u9650\u5236\u5e73\u5747\u901f\u7387\u4f46\u5141\u8bb8\u4e00\u5b9a\u7a0b\u5ea6\u7684\u7a81\u53d1\u3002\n\n### \u4e8c\u3001 \u591a\u7ef4\u5ea6\u9650\u6d41\u7b56\u7565\n\n\u5728\u5b9e\u9645\u4e1a\u52a1\u4e2d\uff0c\u5355\u7eaf\u9650\u5236 QPS \u662f\u4e0d\u591f\u7684\uff0c\u6211\u901a\u5e38\u4f1a\u8bbe\u8ba1\u591a\u5c42\u6b21\u7684\u9650\u6d41\u7b56\u7565\uff1a\n\n#### 1. \u57fa\u4e8e\u67b6\u6784\u5c42\u7ea7\u7684\u9650\u6d41\n*   **\u7f51\u5173\u5c42\u9650\u6d41\uff08\u7b2c\u4e00\u9053\u9632\u7ebf\uff09**\uff1a\n    *   \u4f7f\u7528 Nginx \u6216 Spring Cloud Gateway\u3002\n    *   **\u7b56\u7565**\uff1a\u9488\u5bf9\u603b\u6d41\u91cf\u3001IP \u7ef4\u5ea6\u8fdb\u884c\u7c97\u7c92\u5ea6\u9650\u6d41\uff0c\u9632\u6b62\u6076\u610f\u653b\u51fb\uff08\u5982 DDoS\uff09\u548c\u7f8a\u7fa4\u6548\u5e94\u3002\n    *   **\u4f18\u52bf**\uff1a\u5c06\u6d41\u91cf\u6321\u5728\u4e1a\u52a1\u7cfb\u7edf\u4e4b\u5916\uff0c\u4fdd\u62a4\u540e\u7aef\u6240\u6709\u670d\u52a1\u3002\n*   **\u5e94\u7528\u5c42\u9650\u6d41\uff08\u7b2c\u4e8c\u9053\u9632\u7ebf\uff09**\uff1a\n    *   \u4f7f\u7528 Sentinel \u6216 Resilience4j\u3002\n    *   **\u7b56\u7565**\uff1a\u7ec6\u7c92\u5ea6\u63a7\u5236\uff0c\u9488\u5bf9\u5177\u4f53\u7684 API \u63a5\u53e3\u3001\u670d\u52a1\u8c03\u7528\u94fe\u8def\u8fdb\u884c\u9650\u6d41\u3002\n\n#### 2. \u57fa\u4e8e\u4e1a\u52a1\u7ef4\u5ea6\u7684\u9650\u6d41\n*   **\u7528\u6237 ID \u9650\u6d41**\uff1a\u9632\u5237\u3002\u4f8b\u5982\uff1a\u9650\u5236\u67d0\u7528\u6237 1 \u5206\u949f\u5185\u53ea\u80fd\u8bc4\u8bba 5 \u6b21\u3002\n*   **\u8bbe\u5907 ID \u9650\u6d41**\uff1a\u9632\u6b62\u673a\u5668\u811a\u672c\u6076\u610f\u62a2\u5238\u3002\n*   **\u70ed\u70b9\u53c2\u6570\u9650\u6d41**\uff1a\u6bd4\u5982\u79d2\u6740\u573a\u666f\uff0c\u5546\u54c1 ID \u4e3a 123 \u7684\u6d41\u91cf\u5de8\u5927\uff0c\u6211\u53ef\u4ee5\u5355\u72ec\u9488\u5bf9\u8be5\u53c2\u6570\u503c\u8fdb\u884c\u9650\u6d41\uff0c\u800c\u4e0d\u5f71\u54cd\u5176\u4ed6\u5546\u54c1\u7684\u8d2d\u4e70\u3002\n\n### \u4e09\u3001 \u5206\u5e03\u5f0f\u9650\u6d41\u5b9e\u6218\n\n\u5728\u5fae\u670d\u52a1\u67b6\u6784\u4e0b\uff0c\u5355\u673a\u9650\u6d41\u53ea\u80fd\u4fdd\u62a4\u5f53\u524d\u8282\u70b9\uff0c\u65e0\u6cd5\u63a7\u5236\u96c6\u7fa4\u603b\u6d41\u91cf\u3002\u5982\u679c\u96c6\u7fa4\u6709 10 \u53f0\u673a\u5668\uff0c\u9650\u6d41 100 QPS\uff0c\u603b\u6d41\u91cf\u53ef\u80fd\u662f 1000 QPS\uff0c\u4f46\u8fd9 1000 \u53ef\u80fd\u5168\u6253\u5728\u67d0\u4e00\u53f0\u4e0a\u3002\n\n#### \u89e3\u51b3\u65b9\u6848\uff1aRedis + Lua \u811a\u672c\n\u8fd9\u662f\u5b9e\u73b0**\u96c6\u7fa4\u7ea7\u5168\u5c40\u9650\u6d41**\u7684\u6807\u51c6\u65b9\u6848\u3002\n\n*   **\u539f\u7406**\uff1a\n    1.  \u6240\u6709\u670d\u52a1\u8282\u70b9\u5171\u4eab\u4e00\u4e2a Redis \u8ba1\u6570\u5668\u3002\n    2.  \u4f7f\u7528 Lua \u811a\u672c\u4fdd\u8bc1\u201c\u8bfb\u53d6-\u5224\u65ad-\u6263\u51cf\u201d\u64cd\u4f5c\u7684\u539f\u5b50\u6027\u3002\n*   **\u6211\u7684\u4f18\u5316\u5b9e\u8df5**\uff1a\n    *   **\u95ee\u9898**\uff1a\u6bcf\u6b21\u8bf7\u6c42\u90fd\u8bbf\u95ee Redis\uff0c\u7f51\u7edc IO \u6210\u4e3a\u74f6\u9888\uff0c\u5ef6\u8fdf\u589e\u52a0\u3002\n    *   **\u4f18\u5316\uff1a\u6279\u91cf\u9884\u53d6**\u3002\n        *   \u5e94\u7528\u542f\u52a8\u65f6\uff0c\u6bcf\u4e2a\u5b9e\u4f8b\u5411 Redis \u7533\u8bf7\u4e00\u6279\u4ee4\u724c\uff08\u5982 50 \u4e2a\uff09\u653e\u5728\u672c\u5730\u5185\u5b58\u3002\n        *   \u672c\u5730\u8bf7\u6c42\u5148\u6d88\u8017\u672c\u5730\u4ee4\u724c\uff0c\u6d88\u8017\u5b8c\u4e86\u518d\u53bb Redis \u7533\u8bf7\u4e0b\u4e00\u6279\u3002\n        *   \u8fd9\u6837\u51cf\u5c11\u4e86 98% \u7684 Redis \u7f51\u7edc\u4ea4\u4e92\uff0c\u6781\u5927\u63d0\u5347\u4e86\u6027\u80fd\u3002\n        *   **\u4ee3\u4ef7**\uff1a\u7cbe\u5ea6\u7a0d\u6709\u635f\u5931\uff08\u53ef\u80fd\u7565\u8d85\u9650\uff09\uff0c\u4f46\u5728\u4e1a\u52a1\u53ef\u63a5\u53d7\u8303\u56f4\u5185\u3002\n\n### \u56db\u3001 \u9650\u6d41\u540e\u7684\u5904\u7406\u7b56\u7565\n\n\u9650\u6d41\u53ea\u662f\u624b\u6bb5\uff0c\u88ab\u9650\u6d41\u540e\u7684\u5904\u7406\u624d\u662f\u4f53\u73b0\u67b6\u6784\u5e08\u80fd\u529b\u7684\u5730\u65b9\u3002\u6211\u901a\u5e38\u6709\u4ee5\u4e0b\u4e09\u79cd\u7b56\u7565\uff1a\n\n1.  **\u76f4\u63a5\u62d2\u7edd\uff08Fail Fast\uff09**\uff1a\n    *   \u8fd4\u56de HTTP 429 \u72b6\u6001\u7801\u6216\u81ea\u5b9a\u4e49\u9519\u8bef\u9875\u201c\u7cfb\u7edf\u7e41\u5fd9\uff0c\u8bf7\u7a0d\u540e\u518d\u8bd5\u201d\u3002\n    *   \u9002\u7528\u4e8e\u975e\u6838\u5fc3\u94fe\u8def\uff0c\u5982\u8bc4\u8bba\u3001\u70b9\u8d5e\u3002\n\n2.  **\u670d\u52a1\u964d\u7ea7**\uff1a\n    *   \u8fd4\u56de\u9ed8\u8ba4\u503c\u6216\u515c\u5e95\u6570\u636e\u3002\n    *   **\u6848\u4f8b**\uff1a\u5728\u63a8\u8350\u670d\u52a1\u88ab\u9650\u6d41\u65f6\uff0c\u8fd4\u56de\u70ed\u95e8\u699c\u5355\u6570\u636e\uff1b\u5728\u5e93\u5b58\u67e5\u8be2\u88ab\u9650\u6d41\u65f6\uff0c\u663e\u793a\u201c\u6709\u8d27\u201d\u5e76\u5f15\u5bfc\u7528\u6237\u4e0b\u5355\uff08\u5728\u6263\u51cf\u5e93\u5b58\u65f6\u518d\u6821\u9a8c\uff09\u3002\n\n3.  **\u6392\u961f\u7b49\u5f85**\uff1a\n    *   \u8bf7\u6c42\u4e0d\u7acb\u5373\u62d2\u7edd\uff0c\u800c\u662f\u8fdb\u5165\u961f\u5217\u7b49\u5f85\uff08\u5982 Semaphore \u6216 MQ\uff09\u3002\n    *   \u9002\u7528\u4e8e\u79d2\u6740\u573a\u666f\uff0c\u6d41\u91cf\u524a\u5cf0\uff0c\u914d\u5408\u524d\u7aef\u201c\u6392\u961f\u4e2d...\u201d\u7684\u4ea4\u4e92\u4f53\u9a8c\u3002\n\n### \u4e94\u3001 \u603b\u7ed3\n\n\u5728\u6211\u7684\u67b6\u6784\u751f\u6daf\u4e2d\uff0c\u9650\u6d41\u4e0d\u4ec5\u4ec5\u662f\u6280\u672f\u5b9e\u73b0\uff0c\u66f4\u662f\u4e00\u79cd**\u5bb9\u91cf\u89c4\u5212**\u7684\u4f53\u73b0\u3002\n\n\u6211\u4f1a\u9075\u5faa**\u201c\u7f51\u5173\u9632\u653b\u51fb\uff0c\u5e94\u7528\u9632\u8fc7\u8f7d\uff0c\u4e0b\u6e38\u9632\u51fb\u7a7f\u201d**\u7684\u539f\u5219\uff1a\n1.  **\u7f51\u5173\u5c42**\uff1a\u7528\u6f0f\u6876\u7b97\u6cd5\uff0c\u9650\u5236\u603b\u8fde\u63a5\u6570\u3002\n2.  **\u5e94\u7528\u5c42**\uff1a\u7528 Sentinel + \u4ee4\u724c\u6876\uff0c\u4fdd\u62a4\u6838\u5fc3\u63a5\u53e3\u3002\n3.  **\u6570\u636e\u5c42**\uff1a\u57fa\u4e8e\u6570\u636e\u5e93\u8fde\u63a5\u6c60\u6216 MQ \u6f0f\u6876\uff0c\u4fdd\u62a4 DB \u4e0d\u88ab\u538b\u57ae\u3002\n\n\u901a\u8fc7\u8fd9\u5957\u7ec4\u5408\u62f3\uff0c\u6211\u4eec\u5728\u5c0f\u7535\u79d1\u6280\u7684\u5927\u4fc3\u671f\u95f4\uff0c\u6210\u529f\u5728 QPS \u7ffb\u500d\u7684\u60c5\u51b5\u4e0b\u4fdd\u969c\u4e86\u6838\u5fc3\u94fe\u8def\uff08\u79df\u501f\u3001\u5f52\u8fd8\u3001\u652f\u4ed8\uff09\u7684 100% \u53ef\u7528\u3002",
    "subItems": []

    "details": "\u9762\u8bd5\u5b98\u60a8\u597d\uff0c**\u7194\u65ad** \u662f\u5fae\u670d\u52a1\u67b6\u6784\u4e2d\u9632\u6b62\u201c\u96ea\u5d29\u6548\u5e94\u201d\u7684\u6700\u540e\u4e00\u9053\u9632\u7ebf\u3002\n\n\u5982\u679c\u8bf4\u9650\u6d41\u662f\u201c\u9632\u5916\u654c\u5165\u4fb5\u201d\uff0c\u90a3\u4e48\u7194\u65ad\u5c31\u662f\u201c\u65ad\u81c2\u6c42\u751f\u201d\u3002\u5b83\u7684\u6838\u5fc3\u903b\u8f91\u662f\uff1a**\u5f53\u4e0b\u6e38\u670d\u52a1\u56e0\u6545\u969c\u5bfc\u81f4\u54cd\u5e94\u8fc7\u6162\u6216\u5931\u8d25\u7387\u98d9\u5347\u65f6\uff0c\u4e0a\u6e38\u670d\u52a1\u4e3b\u52a8\u5207\u65ad\u5bf9\u5b83\u7684\u8c03\u7528\uff0c\u76f4\u63a5\u8fd4\u56de\u964d\u7ea7\u6570\u636e\uff0c\u907f\u514d\u6545\u969c\u8513\u5ef6\u3002**\n\n\u5728\u6211\u7684\u67b6\u6784\u5b9e\u6218\u4e2d\uff0c\u7194\u65ad\u901a\u5e38\u5305\u542b\u4e09\u4e2a\u6838\u5fc3\u72b6\u6001\u548c\u4e00\u5957\u5b8c\u6574\u7684\u843d\u5730\u7b56\u7565\u3002\n\n### \u4e00\u3001 \u7194\u65ad\u7684\u72b6\u6001\u673a\u5236\uff08Circuit Breaker Pattern\uff09\n\n\u7194\u65ad\u5668\u7684\u8bbe\u8ba1\u501f\u9274\u4e86\u7535\u8def\u4e2d\u7684\u4fdd\u9669\u4e1d\uff0c\u901a\u5e38\u91c7\u7528**\u4e09\u6001\u6a21\u578b**\uff1a\n\n1.  **\u5173\u95ed\u72b6\u6001**\uff1a\n    *   \u6b63\u5e38\u72b6\u6001\uff0c\u6240\u6709\u8bf7\u6c42\u6b63\u5e38\u901a\u8fc7\u3002\n    *   \u7cfb\u7edf\u4f1a\u6301\u7eed\u76d1\u63a7\u6210\u529f\u7387\u548c\u54cd\u5e94\u65f6\u95f4\u3002\u4e00\u65e6\u8fbe\u5230\u9608\u503c\uff08\u5982 10 \u79d2\u5185 50% \u5931\u8d25\uff09\uff0c\u5219\u5207\u6362\u5230\u201c\u5f00\u542f\u201d\u72b6\u6001\u3002\n\n2.  **\u5f00\u542f\u72b6\u6001**\uff1a\n    *   **\u7194\u65ad\u89e6\u53d1**\uff1a\u6b64\u65f6\u4fdd\u9669\u4e1d\u5df2\u65ad\uff0c\u6240\u6709\u65b0\u7684\u8bf7\u6c42\u76f4\u63a5\u88ab\u62e6\u622a\uff0c\u4e0d\u518d\u53d1\u8d77\u5b9e\u9645\u8c03\u7528\uff0c\u76f4\u63a5\u6267\u884c\u964d\u7ea7\u903b\u8f91\u3002\n    *   **\u4f5c\u7528**\uff1a\u7ed9\u4e0b\u6e38\u670d\u52a1\u5598\u606f\u6062\u590d\u7684\u65f6\u95f4\uff0c\u540c\u65f6\u4e5f\u4fdd\u62a4\u4e86\u81ea\u8eab\u7ebf\u7a0b\u4e0d\u88ab\u957f\u65f6\u95f4\u5360\u7528\u3002\n\n3.  **\u534a\u5f00\u72b6\u6001**\uff1a\n    *   **\u63a2\u6d4b\u6062\u590d**\uff1a\u7194\u65ad\u4e00\u6bb5\u65f6\u95f4\uff08\u5982 30 \u79d2\uff09\u540e\uff0c\u7194\u65ad\u5668\u8fdb\u5165\u534a\u5f00\u72b6\u6001\u3002\n    *   **\u903b\u8f91**\uff1a\u653e\u884c**\u4e00\u4e2a**\u8bf7\u6c42\u53bb\u63a2\u6d4b\u4e0b\u6e38\u3002\u5982\u679c\u6210\u529f\uff0c\u8bf4\u660e\u4e0b\u6e38\u6062\u590d\u4e86\uff0c\u7194\u65ad\u5668\u5173\u95ed\uff1b\u5982\u679c\u5931\u8d25\uff0c\u8bf4\u660e\u4e0b\u6e38\u8fd8\u6ca1\u597d\uff0c\u7194\u65ad\u5668\u91cd\u65b0\u56de\u5230\u5f00\u542f\u72b6\u6001\u3002\n\n### \u4e8c\u3001 \u7194\u65ad\u89e6\u53d1\u7684\u6307\u6807\u7ef4\u5ea6\n\n\u5728\u751f\u4ea7\u73af\u5883\u4e2d\uff0c\u6211\u4e0d\u4f1a\u76f2\u76ee\u8bbe\u7f6e\u7194\u65ad\u89c4\u5219\uff0c\u901a\u5e38\u57fa\u4e8e\u4ee5\u4e0b\u4e24\u4e2a\u6838\u5fc3\u6307\u6807\uff1a\n\n#### 1. \u5f02\u5e38\u6bd4\u4f8b\n*   **\u573a\u666f**\uff1a\u4e0b\u6e38\u670d\u52a1\u76f4\u63a5\u62a5\u9519\uff08\u5982 500 \u9519\u8bef\u3001\u8d85\u65f6\u5f02\u5e38\uff09\u3002\n*   **\u7b56\u7565**\uff1a\u4f8b\u5982\uff0c\u6700\u8fd1 100 \u4e2a\u8bf7\u6c42\u4e2d\uff0c\u5982\u679c\u5f02\u5e38\u6bd4\u4f8b\u8d85\u8fc7 50%\uff0c\u5219\u89e6\u53d1\u7194\u65ad\u3002\n*   **\u6ce8\u610f**\uff1a\u5fc5\u987b\u6392\u9664\u4e1a\u52a1\u5f02\u5e38\uff08\u5982\u201c\u4f59\u989d\u4e0d\u8db3\u201d\uff09\uff0c\u53ea\u7edf\u8ba1\u7cfb\u7edf\u7ea7\u5f02\u5e38\uff08\u5982 Timeout\u3001SocketException\uff09\u3002\n\n#### 2. \u6162\u8c03\u7528\u6bd4\u4f8b\n*   **\u573a\u666f**\uff1a\u4e0b\u6e38\u670d\u52a1\u6ca1\u6302\uff0c\u4f46\u6570\u636e\u5e93\u6162\u67e5\u8be2\u5bfc\u81f4\u54cd\u5e94\u6781\u6162\uff08\u5982 5 \u79d2\uff09\u3002\n*   **\u7b56\u7565**\uff1a\u8fd9\u662f\u5f88\u591a\u56e2\u961f\u5bb9\u6613\u5ffd\u7565\u7684\u3002\u5982\u679c 50% \u7684\u8bf7\u6c42\u54cd\u5e94\u65f6\u95f4 > 500ms\uff0c\u89e6\u53d1\u7194\u65ad\u3002\n*   **\u539f\u56e0**\uff1a\u5728\u9ad8\u5e76\u53d1\u4e0b\uff0c\u201c\u6162\u201d\u6bd4\u201c\u6302\u201d\u66f4\u53ef\u6015\u3002\u6162\u8bf7\u6c42\u4f1a\u8fc5\u901f\u8017\u5c3d\u7ebf\u7a0b\u6c60\u8d44\u6e90\uff0c\u5bfc\u81f4\u6574\u4e2a\u670d\u52a1\u4e0d\u53ef\u7528\u3002\n\n### \u4e09\u3001 \u4e3b\u6d41\u5b9e\u73b0\u65b9\u6848\u5bf9\u6bd4\n\n\u5728\u6280\u672f\u9009\u578b\u4e0a\uff0c\u6211\u4e3b\u8981\u4f7f\u7528\u8fc7 Hystrix \u548c Sentinel\uff0c\u76ee\u524d\u66f4\u503e\u5411\u4e8e **Sentinel**\u3002\n\n| \u7279\u6027 | Hystrix | Sentinel |\n| :--- | :--- | :--- |\n| **\u7b56\u7565** | \u57fa\u4e8e ThreadPool \u9694\u79bb | \u57fa\u4e8e\u4fe1\u53f7\u91cf/\u5e76\u53d1\u7ebf\u7a0b\u6570\u9694\u79bb |\n| **\u8d44\u6e90\u6d88\u8017** | \u8f83\u9ad8\uff08\u6bcf\u4e2a\u547d\u4ee4\u9700\u7ebf\u7a0b\u6c60\uff09 | \u4f4e\uff08\u57fa\u4e8e\u8ba1\u6570\u5668\uff09 |\n| **\u914d\u7f6e\u65b9\u5f0f** | \u4ee3\u7801/\u914d\u7f6e\u6587\u4ef6 | **\u63a7\u5236\u53f0\u52a8\u6001\u914d\u7f6e\uff08\u53ef\u89c6\u5316\uff09** |\n| **\u5b9e\u65f6\u76d1\u63a7** | \u9700\u81ea\u884c\u642d\u5efa Dashboard | \u81ea\u5e26\u5f3a\u5927\u7684\u63a7\u5236\u53f0 |\n| **\u9002\u7528\u6027** | \u65e9\u671f\u5fae\u670d\u52a1 | Spring Cloud Alibaba \u751f\u6001\u9996\u9009 |\n\n**\u6211\u7684\u5b9e\u6218\u7ecf\u9a8c**\uff1a\n\u5728\u201c\u5c0f\u7535\u201d\u7684\u67b6\u6784\u6f14\u8fdb\u4e2d\uff0c\u6211\u4eec\u4ece Hystrix \u8fc1\u79fb\u5230\u4e86 Sentinel\u3002\u6700\u5927\u7684\u6536\u76ca\u662f Sentinel \u7684**\u52a8\u6001\u89c4\u5219\u914d\u7f6e**\u3002\u8fd0\u8425\u5927\u4fc3\u671f\u95f4\uff0c\u6211\u53ef\u4ee5\u5728\u63a7\u5236\u53f0\u5b9e\u65f6\u8c03\u6574\u7194\u65ad\u9608\u503c\uff0c\u65e0\u9700\u91cd\u542f\u670d\u52a1\u3002\n\n### \u56db\u3001 \u5b9e\u6218\u6848\u4f8b\uff1a\u652f\u4ed8\u670d\u52a1\u7684\u7194\u65ad\u964d\u7ea7\n\n**\u80cc\u666f**\uff1a\n\u6211\u4eec\u7684\u652f\u4ed8\u670d\u52a1\u4f9d\u8d56\u7b2c\u4e09\u65b9\u7684\u5fae\u4fe1\u652f\u4ed8\u63a5\u53e3\u3002\u67d0\u6b21\u5fae\u4fe1\u652f\u4ed8\u4fa7\u53d1\u751f\u7f51\u7edc\u6296\u52a8\uff0c\u5927\u91cf\u8bf7\u6c42\u8d85\u65f6\u3002\n\n**\u95ee\u9898**\uff1a\n\u5982\u679c\u6ca1\u6709\u7194\u65ad\uff0c\u6211\u4eec\u7684\u652f\u4ed8\u7ebf\u7a0b\u6c60\u4f1a\u88ab\u6302\u8d77\u7684\u8bf7\u6c42\u5360\u6ee1\uff0c\u5bfc\u81f4\u8fde\u652f\u4ed8\u5b9d\u901a\u9053\u4e5f\u65e0\u6cd5\u8c03\u7528\uff0c\u6574\u4e2a\u652f\u4ed8\u670d\u52a1\u762b\u75ea\u3002\n\n**\u6211\u7684\u89e3\u51b3\u65b9\u6848**\uff1a\n\n1.  **\u914d\u7f6e\u7194\u65ad\u89c4\u5219**\uff1a\n    *   \u5728 Sentinel \u4e2d\u914d\u7f6e\uff1a\u5982\u679c\u5fae\u4fe1\u652f\u4ed8\u63a5\u53e3\u7684\u6162\u8c03\u7528\u6bd4\u4f8b\uff08RT > 1s\uff09\u8d85\u8fc7 30%\uff0c\u6216\u8005\u5f02\u5e38\u6bd4\u4f8b\u8d85\u8fc7 20%\uff0c\u89e6\u53d1\u7194\u65ad\u3002\n\n2.  **\u8bbe\u8ba1\u964d\u7ea7\u903b\u8f91**\uff1a\n    *   \u7194\u65ad\u89e6\u53d1\u540e\uff0c\u652f\u4ed8\u63a5\u53e3\u4e0d\u518d\u8c03\u7528\u5fae\u4fe1\u901a\u9053\uff0c\u800c\u662f\u76f4\u63a5\u8fd4\u56de\u4e00\u4e2a**\u964d\u7ea7\u5bf9\u8c61**\u3002\n    *   **\u964d\u7ea7\u7b56\u7565**\uff1a\u8fd4\u56de\u201c\u5f53\u524d\u901a\u9053\u7e41\u5fd9\uff0c\u8bf7\u5c1d\u8bd5\u652f\u4ed8\u5b9d\u652f\u4ed8\u201d\u7684\u63d0\u793a\uff0c\u6216\u8005\u5f15\u5bfc\u7528\u6237\u8fdb\u5165\u201c\u6392\u961f\u652f\u4ed8\u201d\u9875\u9762\u3002\n\n3.  **\u7ed3\u679c**\uff1a\n    *   \u5fae\u4fe1\u652f\u4ed8\u6545\u969c\u671f\u95f4\uff0c\u6211\u4eec\u7684\u670d\u52a1\u4ec5\u635f\u5931\u4e86\u5fae\u4fe1\u901a\u9053\u7684\u6d41\u91cf\uff0c\u4f46\u652f\u4ed8\u5b9d\u901a\u9053\u548c\u6838\u5fc3\u4e1a\u52a1\u903b\u8f91\u4f9d\u7136\u6b63\u5e38\u8fd0\u884c\uff0c\u7cfb\u7edf\u6574\u4f53\u53ef\u7528\u6027\u4fdd\u6301\u5728 99% \u4ee5\u4e0a\u3002\n\n### \u4e94\u3001 \u7194\u65ad\u4e0e\u964d\u7ea7\u7684\u5173\u7cfb\n\n\u5f88\u591a\u4eba\u5bb9\u6613\u6df7\u6dc6\u8fd9\u4e24\u4e2a\u6982\u5ff5\uff0c\u6211\u7684\u7406\u89e3\u662f\uff1a\n\n*   **\u7194\u65ad\u662f\u56e0\uff0c\u964d\u7ea7\u662f\u679c**\u3002\n*   **\u7194\u65ad**\u662f\u4e00\u79cd\u52a8\u4f5c\u673a\u5236\uff08\u7531\u7cfb\u7edf\u81ea\u52a8\u89e6\u53d1\uff09\uff0c\u76ee\u7684\u662f\u5207\u65ad\u6545\u969c\u94fe\u8def\u3002\n*   **\u964d\u7ea7**\u662f\u4e00\u79cd\u670d\u52a1\u7b56\u7565\uff08\u53ef\u4ee5\u662f\u81ea\u52a8\u6216\u4eba\u5de5\uff09\uff0c\u76ee\u7684\u662f\u5728\u8d44\u6e90\u53d7\u9650\u6216\u6545\u969c\u65f6\uff0c\u63d0\u4f9b\u6709\u635f\u4f46\u53ef\u7528\u7684\u670d\u52a1\u3002\n\n### \u516d\u3001 \u603b\u7ed3\n\n\u5728\u8bbe\u8ba1\u9ad8\u53ef\u7528\u7cfb\u7edf\u65f6\uff0c\u5173\u4e8e\u7194\u65ad\u6211\u9075\u5faa **\u201c\u5feb\u901f\u5931\u8d25\uff0c\u4f18\u96c5\u964d\u7ea7\u201d** \u7684\u539f\u5219\uff1a\n\n1.  **\u8bbe\u7f6e\u5408\u7406\u7684\u9608\u503c**\uff1a\u57fa\u4e8e\u5386\u53f2\u76d1\u63a7\u6570\u636e\u8bbe\u5b9a RT \u548c \u5f02\u5e38\u6bd4\u4f8b\uff0c\u907f\u514d\u8fc7\u4e8e\u654f\u611f\uff08\u6b63\u5e38\u6296\u52a8\u5c31\u7194\u65ad\uff09\u6216\u8fc7\u4e8e\u8fdf\u949d\uff08\u7194\u65ad\u65f6\u7cfb\u7edf\u5df2\u762b\u75ea\uff09\u3002\n2.  **\u533a\u5206\u6838\u5fc3\u4e0e\u975e\u6838\u5fc3**\uff1a\u6838\u5fc3\u4e1a\u52a1\uff08\u5982\u652f\u4ed8\uff09\u7194\u65ad\u540e\u8981\u6709\u515c\u5e95\u65b9\u6848\uff08\u5982\u5207\u6362\u901a\u9053\uff09\uff0c\u975e\u6838\u5fc3\u4e1a\u52a1\uff08\u5982\u63a8\u8350\uff09\u7194\u65ad\u540e\u53ef\u4ee5\u76f4\u63a5\u8fd4\u56de\u7a7a\u3002\n3.  **\u76d1\u63a7\u4e0e\u544a\u8b66**\uff1a\u7194\u65ad\u89e6\u53d1\u5fc5\u987b\u4f34\u968f\u544a\u8b66\uff0c\u8ba9\u8fd0\u7ef4\u4eba\u5458\u7b2c\u4e00\u65f6\u95f4\u4ecb\u5165\uff0c\u56e0\u4e3a\u7194\u65ad\u53ea\u662f\u6743\u5b9c\u4e4b\u8ba1\uff0c\u6839\u672c\u95ee\u9898\u8fd8\u9700\u4eba\u5de5\u89e3\u51b3\u3002",

    "title": "Kafka\u6d88\u606f\u79ef\u538b\u600e\u4e48\u529e\uff1f",

    "details": "\u9762\u8bd5\u5b98\u60a8\u597d\uff0cKafka \u6d88\u606f\u79ef\u538b\u662f\u751f\u4ea7\u73af\u5883\u4e2d\u975e\u5e38\u5e38\u89c1\u4e14\u68d8\u624b\u7684\u95ee\u9898\u3002\u5728\u6211\u7684\u67b6\u6784\u5b9e\u8df5\u4e2d\uff0c\u5904\u7406\u8fd9\u7c7b\u95ee\u9898\u9075\u5faa\u4e00\u4e2a\u6838\u5fc3\u601d\u8def\uff1a**\u5148\u6b62\u635f\uff08\u4e34\u65f6\u65b9\u6848\uff09\uff0c\u518d\u6839\u6cbb\uff08\u957f\u671f\u65b9\u6848\uff09\uff0c\u6700\u540e\u590d\u76d8\uff08\u9884\u9632\u673a\u5236\uff09\u3002**\n\n\u9488\u5bf9\u4e0d\u540c\u7a0b\u5ea6\u7684\u79ef\u538b\uff0c\u6211\u901a\u5e38\u4f1a\u91c7\u53d6\u4ee5\u4e0b\u201c\u56db\u6b65\u8d70\u201d\u7684\u5e94\u6025\u5904\u7406\u7b56\u7565\uff1a\n\n### \u7b2c\u4e00\u6b65\uff1a\u6392\u67e5\u539f\u56e0\uff08\u5b9a\u4f4d\u74f6\u9888\uff09\n\n\u9996\u5148\u901a\u8fc7\u76d1\u63a7\u5de5\u5177\uff08\u5982 Kafka Manager\u3001Prometheus\uff09\u89c2\u5bdf Consumer Group \u7684 Lag\uff08\u6ede\u540e\u91cf\uff09\u548c\u6d88\u8d39\u901f\u7387\u3002\n\n\u5e38\u89c1\u7684\u79ef\u538b\u539f\u56e0\u4e3b\u8981\u6709\u4e09\u7c7b\uff1a\n1.  **\u6d88\u8d39\u8005\u6027\u80fd\u74f6\u9888**\uff1a\u4e0b\u6e38\u4e1a\u52a1\u903b\u8f91\u5904\u7406\u592a\u6162\uff08\u6bd4\u5982\u590d\u6742\u7684 DB \u64cd\u4f5c\u3001\u5916\u90e8 API \u8c03\u7528\u8d85\u65f6\uff09\u3002\n2.  **\u6d88\u8d39\u8005\u5b95\u673a**\uff1a\u6d88\u8d39\u670d\u52a1\u6302\u4e86\uff0c\u6216\u8005\u56e0\u4e3a\u9891\u7e41 Full GC \u5bfc\u81f4 STW\uff08Stop The World\uff09\u3002\n3.  **\u751f\u4ea7\u8005\u6d41\u91cf\u6fc0\u589e**\uff1a\u7a81\u53d1\u6d41\u91cf\uff08\u5982\u5927\u4fc3\u3001\u722c\u866b\uff09\u8d85\u8fc7\u4e86\u7cfb\u7edf\u8bbe\u8ba1\u5bb9\u91cf\u3002\n\n---\n\n### \u7b2c\u4e8c\u6b65\uff1a\u4e34\u65f6\u6269\u5bb9\uff08\u6700\u5feb\u6b62\u635f\u65b9\u6848\uff09\u2b50\ufe0f\n\n\u8fd9\u662f\u89e3\u51b3\u79ef\u538b\u6700\u76f4\u63a5\u6709\u6548\u7684\u624b\u6bb5\uff0c\u4f46\u6709\u4e00\u4e2a\u524d\u63d0\uff1a**\u6d88\u8d39\u8005\u5fc5\u987b\u652f\u6301\u5e76\u884c\u6d88\u8d39**\u3002\n\n\u5982\u679c Topic \u7684 Partition \u6570\u91cf\u8db3\u591f\uff08\u6bd4\u5982 Partition=10\uff0c\u5f53\u524d Consumer=3\uff09\uff1a\n*   **\u64cd\u4f5c**\uff1a\u76f4\u63a5\u901a\u8fc7\u8fd0\u7ef4\u5e73\u53f0\u6c34\u5e73\u6269\u5c55 Consumer \u5b9e\u4f8b\u6570\u91cf\uff08\u6bd4\u5982\u6269\u5bb9\u5230 10 \u4e2a\uff09\u3002\n*   **\u6548\u679c**\uff1a\u6d88\u8d39\u80fd\u529b\u77ac\u95f4\u63d0\u5347\uff0c\u79ef\u538b\u5feb\u901f\u6d88\u5316\u3002\n\n**\u5982\u679c Partition \u6570\u91cf\u4e0d\u8db3\uff08\u6bd4\u5982 Partition=3\uff0cConsumer \u5df2\u7ecf\u6709 3 \u4e2a\u4e86\uff09\u600e\u4e48\u529e\uff1f**\n*   **\u8bef\u533a**\uff1a\u6b64\u65f6\u7ee7\u7eed\u589e\u52a0 Consumer \u662f\u6ca1\u7528\u7684\uff0c\u56e0\u4e3a Kafka \u4e00\u4e2a Partition \u53ea\u80fd\u88ab\u540c\u7ec4\u7684\u4e00\u4e2a Consumer \u6d88\u8d39\uff0c\u591a\u4f59\u7684 Consumer \u4f1a\u7a7a\u95f2\u3002\n*   **\u89e3\u51b3\u65b9\u6848\uff08\u4e34\u65f6\u8f66\u9053\u65b9\u6848\uff09**\uff1a\n    1.  **\u6269\u5bb9 Partition**\uff1a\u5c06 Topic \u7684 Partition \u6570\u91cf\u4ece 3 \u6269\u5bb9\u5230 10\uff08Kafka \u652f\u6301\u52a8\u6001\u6269\u5bb9\uff0c\u4e0d\u652f\u6301\u7f29\u5bb9\uff09\u3002\n    2.  **\u4fee\u6539 Consumer \u914d\u7f6e**\uff1a\u7531\u4e8e Kafka \u7684 Rebalance \u673a\u5236\uff0c\u6269\u5bb9 Partition \u540e\uff0c\u73b0\u6709\u7684 Consumer \u9700\u8981\u91cd\u542f\u6216\u7b49\u5f85 Rebalance \u624d\u80fd\u611f\u77e5\u5230\u65b0\u7684 Partition\u3002\n    3.  **\u7ed3\u679c**\uff1a\u6b64\u65f6\u518d\u589e\u52a0 Consumer \u5b9e\u4f8b\u5230 10 \u4e2a\uff0c\u5373\u53ef\u5e76\u884c\u5904\u7406\u3002\n\n---\n\n### \u7b2c\u4e09\u6b65\uff1a\u964d\u7ea7\u4e0e\u5f02\u6b65\u8f6c\u53d1\uff08\u6839\u6cbb\u6027\u80fd\u74f6\u9888\uff09\n\n\u5982\u679c\u4e0b\u6e38\u6d88\u8d39\u80fd\u529b\u786e\u5b9e\u6709\u9650\uff08\u6bd4\u5982\u6570\u636e\u5e93\u5199\u5165\u74f6\u9888\u3001\u7b2c\u4e09\u65b9\u63a5\u53e3\u9650\u6d41\uff09\uff0c\u5355\u7eaf\u52a0\u673a\u5668\u4e5f\u6ca1\u7528\u3002\u8fd9\u65f6\u9700\u8981**\u5c06\u201c\u6d88\u8d39\u201d\u548c\u201c\u5904\u7406\u201d\u89e3\u8026**\u3002\n\n**\u5b9e\u6218\u65b9\u6848\uff1aConsumer \u53ea\u505a\u8f6c\u53d1**\n1.  **\u6539\u9020 Consumer**\uff1a\u6d88\u8d39\u8005\u4e0d\u518d\u6267\u884c\u7e41\u91cd\u7684\u4e1a\u52a1\u903b\u8f91\uff0c\u800c\u662f\u5c06\u6d88\u606f\u5feb\u901f\u201c\u642c\u8fd0\u201d\u5230\u4e00\u4e2a**\u65b0\u7684\u4e34\u65f6 Topic**\uff08\u6216\u8005\u5199\u5165 Redis/Memory Queue\uff09\u3002\n2.  **\u8f6c\u53d1\u901f\u5ea6**\uff1aConsumer \u7684\u903b\u8f91\u53d8\u5f97\u6781\u7b80\uff08\u53ea\u662f\u53d1\u6d88\u606f\uff09\uff0c\u901f\u5ea6\u4f1a\u975e\u5e38\u5feb\uff0c\u80fd\u8fc5\u901f\u6e05\u7a7a Kafka \u7684\u79ef\u538b\u3002\n3.  **\u5f02\u6b65\u5904\u7406**\uff1a\u90e8\u7f72\u4e13\u95e8\u7684 Worker \u670d\u52a1\u53bb\u6d88\u8d39\u8fd9\u4e2a\u65b0\u7684 Topic \u6216\u5904\u7406 Redis \u91cc\u7684\u6570\u636e\u3002\u9488\u5bf9\u65b0\u7684 Topic\uff0c\u6211\u4eec\u53ef\u4ee5\u7075\u6d3b\u63a7\u5236\u6d88\u8d39\u901f\u5ea6\uff0c\u751a\u81f3\u53ef\u4ee5\u4e34\u65f6\u90e8\u7f72\u5927\u91cf Worker \u8fdb\u884c\u6279\u5904\u7406\u3001\u5e76\u53d1\u5904\u7406\uff0c\u4fdd\u62a4\u4e0b\u6e38\u6570\u636e\u5e93\u4e0d\u88ab\u6253\u6302\u3002\n\n**\u6848\u4f8b**\uff1a\u6211\u5728\u5c0f\u7535\u79d1\u6280\u5904\u7406\u8bbe\u5907\u5fc3\u8df3\u79ef\u538b\u65f6\uff0c\u53d1\u73b0\u843d\u5e93\u662f\u74f6\u9888\u3002\u6211\u4eec\u91c7\u53d6\u4e86\u201cConsumer \u5feb\u901f\u8f6c\u5b58 Redis + \u6279\u91cf\u5f02\u6b65\u843d\u5e93\u201d\u7684\u7b56\u7565\uff0c\u79ef\u538b\u95ee\u9898\u5728 10 \u5206\u949f\u5185\u89e3\u51b3\u3002\n\n---\n\n### \u7b2c\u56db\u6b65\uff1a\u957f\u671f\u9884\u9632\uff08\u76d1\u63a7\u4e0e\u6cbb\u7406\uff09\n\n\u89e3\u51b3\u5b8c\u672c\u6b21\u4e8b\u6545\u540e\uff0c\u5fc5\u987b\u5efa\u7acb\u957f\u6548\u673a\u5236\uff0c\u9632\u6b62\u590d\u53d1\u3002\n\n1.  **\u76d1\u63a7\u544a\u8b66**\uff1a\n    *   \u8bbe\u7f6e\u5408\u7406\u7684 Lag \u9608\u503c\u544a\u8b66\uff08\u4f8b\u5982\uff1a\u79ef\u538b\u8d85\u8fc7 1 \u4e07\u6761\u6216\u6d88\u8d39\u5ef6\u8fdf\u8d85\u8fc7 5 \u5206\u949f\uff09\uff0c**\u5728\u79ef\u538b\u53d1\u751f\u521d\u671f\u4ecb\u5165**\uff0c\u800c\u4e0d\u662f\u7b49\u5230\u7528\u6237\u6295\u8bc9\u3002\n\n2.  **\u6d88\u8d39\u8005\u6027\u80fd\u4f18\u5316**\uff1a\n    *   **\u6279\u91cf\u6d88\u8d39**\uff1aKafka \u652f\u6301\u6279\u91cf\u62c9\u53d6\u6d88\u606f\u3002\u5bf9\u4e8e\u9ad8\u541e\u5410\u573a\u666f\uff0c\u8bbe\u7f6e `max.poll.records` \u53c2\u6570\uff0c\u4e00\u6b21\u62c9\u53d6 500 \u6216 1000 \u6761\uff0c\u51cf\u5c11\u7f51\u7edc\u5f00\u9500\u548c RPC \u6b21\u6570\u3002\n    *   **\u591a\u7ebf\u7a0b\u6d88\u8d39**\uff1a\u5728 Consumer \u5185\u90e8\u4f7f\u7528\u7ebf\u7a0b\u6c60\u5e76\u53d1\u5904\u7406\u6d88\u606f\uff08\u9700\u6ce8\u610f\u63d0\u4ea4 Offset \u7684\u987a\u5e8f\u6027\u548c\u5e42\u7b49\u6027\uff09\u3002\n\n3.  **\u6b7b\u4fe1\u961f\u5217\uff08DLQ\uff09**\uff1a\n    *   \u5982\u679c\u67d0\u6761\u6d88\u606f\u56e0\u4e3a\u6570\u636e\u683c\u5f0f\u9519\u8bef\u5bfc\u81f4\u4e00\u76f4\u6d88\u8d39\u5931\u8d25\u3001\u53cd\u590d\u91cd\u8bd5\uff0c\u4f1a\u963b\u585e\u540e\u7eed\u6d88\u606f\u3002\u6b64\u65f6\u5e94\u914d\u7f6e\u6b7b\u4fe1\u961f\u5217\uff0c\u5c06\u5904\u7406\u5931\u8d25\u7684\u6d88\u606f\u79fb\u5165 DLQ\uff0c\u4fdd\u8bc1\u4e3b\u6d41\u7a0b\u7545\u901a\uff0c\u540e\u7eed\u4eba\u5de5\u4ecb\u5165\u5904\u7406\u3002\n\n### \u603b\u7ed3\n\nKafka \u6d88\u606f\u79ef\u538b\u7684\u5904\u7406\u6838\u5fc3\u5728\u4e8e**\u201c\u5feb\u201d**\u548c**\u201c\u89e3\u8026\u201d**\uff1a\n1.  **\u5feb\u901f\u6269\u5bb9** Consumer \u5b9e\u4f8b\uff08\u914d\u5408 Partition \u6269\u5bb9\uff09\u662f\u7b2c\u4e00\u9009\u62e9\u3002\n2.  \u4e0b\u6e38\u5904\u7406\u6162\u65f6\uff0c\u91c7\u7528**\u201c\u8f6c\u53d1+\u5f02\u6b65\u201d**\u6a21\u5f0f\uff0c\u5148\u6e05\u7a7a\u79ef\u538b\uff0c\u518d\u6162\u6162\u6d88\u5316\u3002\n3.  \u6700\u540e\uff0c\u5b8c\u5584\u7684**\u76d1\u63a7\u544a\u8b66**\u662f\u9ad8\u53ef\u7528\u7cfb\u7edf\u7684\u6807\u914d\u3002",

    "title": "\u8bbe\u5907\u6bcf\u79d2\u4e0a\u62a5\u5927\u91cf\u6d88\u606f\u3002\u4f60\u600e\u4e48\u9632\u6b62\uff1f",
    "style": "background-color: yellow;",
    "details": "\u9762\u8bd5\u5b98\u60a8\u597d\uff0c\u8fd9\u662f\u4e00\u4e2a\u975e\u5e38\u5178\u578b\u7684**\u9ad8\u5e76\u53d1\u6d77\u91cf\u6570\u636e\u4e0a\u62a5\u573a\u666f**\u3002\u5728\u5c0f\u7535\u79d1\u6280\u7684\u9879\u76ee\u4e2d\uff0c\u6211\u4eec\u9762\u4e34\u7740\u5168\u56fd\u5343\u4e07\u7ea7\u8bbe\u5907\u7684\u5fc3\u8df3\u4e0a\u62a5\u3001\u72b6\u6001\u540c\u6b65\u548c\u65e5\u5fd7\u4e0a\u62a5\uff0c\u5cf0\u503c QPS \u8fbe\u5230\u4e86\u6570\u5341\u4e07\u7ea7\u522b\u3002\n\n\u5982\u679c\u4e0d\u52a0\u9632\u8303\uff0c\u8fd9\u80a1\u6d2a\u5cf0\u6d41\u91cf\u4f1a\u77ac\u95f4\u6253\u57ae\u540e\u7aef\u670d\u52a1\u6216\u6570\u636e\u5e93\u3002\u9488\u5bf9\u8fd9\u4e2a\u95ee\u9898\uff0c\u6211\u8bbe\u8ba1\u4e86\u4e00\u5957**\u201c\u524d\u7aef\u524a\u5cf0 -> \u4e2d\u7aef\u7f13\u51b2 -> \u540e\u7aef\u964d\u7ea7\u201d**\u7684\u4e09\u7ea7\u9632\u5fa1\u4f53\u7cfb\u3002\n\n\u4ee5\u4e0b\u662f\u6211\u7684\u5177\u4f53\u5b9e\u65bd\u65b9\u6848\uff1a\n\n### \u4e00\u3001 \u63a5\u5165\u5c42\uff1a\u9650\u6d41\u4e0e\u524a\u5cf0\uff08\u7b2c\u4e00\u9053\u9632\u7ebf\uff09\n\n\u8fd9\u662f\u6d41\u91cf\u8fdb\u5165\u7cfb\u7edf\u7684\u5165\u53e3\uff0c\u5fc5\u987b\u5728\u8fd9\u91cc\u62e6\u622a\u6389\u65e0\u6548\u548c\u8fc7\u91cf\u7684\u6d41\u91cf\u3002\n\n**1. \u7f51\u5173\u9650\u6d41**\n*   **\u7b56\u7565**\uff1a\u5728 Nginx \u6216 API Gateway \u5c42\u914d\u7f6e\u9650\u6d41\u7b56\u7565\u3002\n*   **\u5b9e\u65bd**\uff1a\n    *   **\u5168\u5c40\u9650\u6d41**\uff1a\u9650\u5236\u6574\u4e2a\u63a5\u5165\u96c6\u7fa4\u7684\u603b\u8fde\u63a5\u6570\u548c QPS\uff0c\u4fdd\u62a4\u540e\u7aef\u5bb9\u5668\u4e0d\u88ab\u538b\u57ae\u3002\n    *   **\u5355\u673a\u9650\u6d41**\uff1a\u9488\u5bf9\u5355\u4e2a\u8bbe\u5907 ID \u6216 IP \u8fdb\u884c\u9650\u6d41\u3002\u4f8b\u5982\uff0c\u9650\u5236\u5355\u4e2a\u8bbe\u5907\u6bcf\u79d2\u53ea\u80fd\u4e0a\u62a5 1 \u6b21\u5fc3\u8df3\uff0c\u8d85\u8fc7\u7684\u8bf7\u6c42\u76f4\u63a5\u8fd4\u56de HTTP 429 (Too Many Requests)\u3002\u8fd9\u80fd\u6709\u6548\u9632\u6b62\u8bbe\u5907\u56fa\u4ef6 Bug \u5bfc\u81f4\u7684\u98ce\u66b4\u3002\n\n**2. UDP \u534f\u8bae\u4f18\u5316**\n*   \u5bf9\u4e8e\u90e8\u5206\u5bf9\u53ef\u9760\u6027\u8981\u6c42\u4e0d\u9ad8\u3001\u4f46\u65f6\u6548\u6027\u6781\u5f3a\u7684\u6570\u636e\uff08\u5982\u8bbe\u5907\u5b9e\u65f6\u72b6\u6001\u63a2\u9488\uff09\uff0c\u6211\u4eec\u53ef\u4ee5\u8003\u8651\u4f7f\u7528 **UDP \u534f\u8bae**\u4ee3\u66ff TCP\u3002\n*   **\u4f18\u52bf**\uff1aUDP \u6ca1\u6709\u590d\u6742\u7684\u63e1\u624b\u548c\u91cd\u4f20\u673a\u5236\uff0c\u80fd\u6781\u5927\u964d\u4f4e\u670d\u52a1\u5668\u8fde\u63a5\u6570\u538b\u529b\u548c CPU \u5f00\u9500\u3002\u6211\u4eec\u5728\u5e94\u7528\u5c42\u5b9e\u73b0\u7b80\u5355\u7684 ACK \u6216\u7ea0\u9519\u673a\u5236\u5373\u53ef\u3002\n\n---\n\n### \u4e8c\u3001 \u670d\u52a1\u5c42\uff1a\u5f02\u6b65\u89e3\u8026\u4e0e\u7f13\u51b2\uff08\u6838\u5fc3\u7f13\u51b2\u533a\uff09\n\n\u8fd9\u662f\u5904\u7406\u9ad8\u5e76\u53d1\u7684\u5173\u952e\u3002**\u7edd\u5bf9\u4e0d\u80fd\u8ba9\u6d77\u91cf\u8bf7\u6c42\u76f4\u63a5\u7a7f\u900f\u5230\u6570\u636e\u5e93\u3002**\n\n**1. MQ \u524a\u5cf0\u586b\u8c37\uff08\u6838\u5fc3\u65b9\u6848\uff09**\n*   **\u67b6\u6784**\uff1a\u63a5\u5165\u5c42\u6536\u5230\u6d88\u606f\u540e\uff0c**\u4e0d\u8fdb\u884c\u4e1a\u52a1\u5904\u7406**\uff0c\u800c\u662f\u76f4\u63a5\u5c06\u6d88\u606f\u6295\u9012\u5230 Kafka \u6216 RocketMQ\u3002\n*   **\u4f18\u52bf**\uff1a\n    *   **\u5f02\u6b65\u89e3\u8026**\uff1a\u63a5\u5165\u5c42\u53ea\u8d1f\u8d23\u201c\u6536\u201d\uff0c\u5904\u7406\u5c42\u8d1f\u8d23\u201c\u6d88\u8d39\u201d\uff0c\u4e24\u8005\u901f\u5ea6\u89e3\u8026\u3002\u5373\u4f7f\u540e\u7aef\u5904\u7406\u6162\uff0cMQ \u4e5f\u80fd\u6682\u5b58\u6d77\u91cf\u6d88\u606f\uff0c\u4fdd\u8bc1\u63a5\u5165\u5c42\u4e0d\u963b\u585e\u3002\n    *   **\u524a\u5cf0**\uff1a\u9ad8\u5cf0\u671f\u7684\u6d88\u606f\u5806\u79ef\u5728 MQ \u4e2d\uff0c\u7531\u540e\u7aef\u6d88\u8d39\u8005\u6309\u7167\u81ea\u5df1\u7684\u5904\u7406\u80fd\u529b\u5300\u901f\u6d88\u8d39\uff0c\u5c06\u201c\u6d2a\u5cf0\u201d\u62c9\u5e73\u4e3a\u201c\u7ec6\u6c34\u957f\u6d41\u201d\u3002\n\n**2. \u591a\u7ea7\u7f13\u5b58\u67b6\u6784**\n*   **\u573a\u666f**\uff1a\u8bbe\u5907\u72b6\u6001\u66f4\u65b0\u3002\n*   **\u7b56\u7565**\uff1a\u4e0a\u62a5\u7684\u6d88\u606f\u5148\u66f4\u65b0 **Redis**\uff0c\u800c\u4e0d\u662f\u76f4\u63a5\u66f4\u65b0 MySQL\u3002\n*   **\u5b9e\u65bd**\uff1a\n    *   \u8bbe\u5907\u72b6\u6001\u6781\u5176\u9891\u7e41\uff08\u5982\u6bcf\u79d2 10 \u6b21\uff09\uff0c\u4f46\u5728\u4e1a\u52a1\u4e0a\uff0c\u7528\u6237\u53ef\u80fd\u51e0\u79d2\u770b\u4e00\u6b21\u3002\u6211\u4eec\u5229\u7528 Redis \u8bb0\u5f55\u6700\u65b0\u72b6\u6001\uff0c\u901a\u8fc7\u5b9a\u65f6\u4efb\u52a1\u6216\u5f02\u6b65\u961f\u5217\u5c06\u6570\u636e**\u6279\u91cf\u5237\u5165**\u6570\u636e\u5e93\u3002\n    *   \u8fd9\u6837\u53ef\u4ee5\u5c06\u6570\u636e\u5e93\u7684\u5199\u538b\u529b\u964d\u4f4e 90% \u4ee5\u4e0a\u3002\n\n---\n\n### \u4e09\u3001 \u6570\u636e\u5c42\uff1a\u5408\u5e76\u4e0e\u964d\u7ea7\uff08\u4fdd\u62a4\u5b58\u50a8\uff09\n\n\u5f53\u6d41\u91cf\u5373\u4fbf\u7ecf\u8fc7\u7f13\u51b2\u4f9d\u7136\u5de8\u5927\u65f6\uff0c\u5fc5\u987b\u4f18\u5316\u5b58\u50a8\u7b56\u7565\u3002\n\n**1. \u6d88\u606f\u5408\u5e76**\n*   **\u75db\u70b9**\uff1a\u5982\u679c\u8bbe\u5907\u6bcf\u79d2\u4e0a\u62a5 100 \u6761\u65e5\u5fd7\uff0c\u76f4\u63a5 insert 100 \u6b21\u6570\u636e\u5e93\u662f\u4e0d\u73b0\u5b9e\u7684\u3002\n*   **\u65b9\u6848**\uff1a\n    *   **\u5e94\u7528\u5c42\u5408\u5e76**\uff1a\u6d88\u8d39\u8005\u5728\u5185\u5b58\u4e2d\u805a\u5408\u6d88\u606f\uff0c\u6bd4\u5982\u6bcf 100 \u6761\u6253\u5305\u4e00\u6b21\uff0c\u6216\u8005\u6bcf\u9694 500ms \u6279\u91cf\u5199\u5165\u3002\n    *   **\u6570\u636e\u5e93\u5408\u5e76**\uff1a\u5229\u7528\u6570\u636e\u5e93\u7684 `INSERT ON DUPLICATE KEY UPDATE` \u8bed\u6cd5\uff0c\u5b9e\u73b0 Upsert\uff08\u66f4\u65b0\u6216\u63d2\u5165\uff09\u3002\n\n**2. \u964d\u7ea7\u7b56\u7565**\n*   \u5f53\u7cfb\u7edf\u8d1f\u8f7d\u8fc7\u9ad8\uff08\u5982 CPU > 80% \u6216 MQ \u79ef\u538b\u4e25\u91cd\uff09\u65f6\uff0c\u89e6\u53d1\u81ea\u52a8\u964d\u7ea7\uff1a\n    *   **\u4e22\u5f03\u975e\u6838\u5fc3\u6570\u636e**\uff1a\u6bd4\u5982\u8bbe\u5907\u8c03\u8bd5\u65e5\u5fd7\u3001\u975e\u5173\u952e\u6307\u6807\uff0c\u53ef\u4ee5\u76f4\u63a5\u4e22\u5f03\uff0c\u53ea\u4fdd\u7559\u6838\u5fc3\u7684\u5fc3\u8df3\u548c\u4ea4\u6613\u72b6\u6001\u3002\n    *   **\u91c7\u6837\u4e0a\u62a5**\uff1a\u670d\u52a1\u7aef\u53ea\u63a5\u6536 10% \u7684\u72b6\u6001\u4e0a\u62a5\uff0c\u5176\u4f59\u4e22\u5f03\u3002\u8fd9\u5bf9\u4e8e\u5927\u6570\u636e\u5206\u6790\u573a\u666f\uff08\u5982\u70ed\u5ea6\u56fe\uff09\u901a\u5e38\u662f\u53ef\u4ee5\u63a5\u53d7\u7684\u3002\n\n---\n\n### \u56db\u3001 \u6781\u7aef\u573a\u666f\u5e94\u5bf9\uff1a\u7a81\u53d1\u6d41\u91cf\u98ce\u66b4\n\n\u5982\u679c\u9047\u5230\u7a81\u53d1\u6027\u7684\u5168\u7f51\u8bbe\u5907\u540c\u65f6\u4e0a\u62a5\uff08\u5982\u56fa\u4ef6\u5347\u7ea7\u540e\u7684\u91cd\u542f\u98ce\u66b4\uff09\uff0c\u4e0a\u8ff0\u63aa\u65bd\u53ef\u80fd\u8fd8\u4e0d\u591f\uff0c\u6211\u4f1a\u91c7\u7528\u4ee5\u4e0b\u65b9\u6848\uff1a\n\n**1. \u5ba2\u6237\u7aef\u9519\u5cf0**\n*   \u5728\u8bbe\u5907\u7aef\u690d\u5165\u968f\u673a\u5ef6\u8fdf\u7b97\u6cd5\u3002\u4f8b\u5982\uff0c\u8bbe\u5907\u542f\u52a8\u540e\uff0c\u968f\u673a\u7761\u7720 0-60 \u79d2\u518d\u53d1\u8d77\u8fde\u63a5\u6216\u4e0a\u62a5\u6570\u636e\u3002\u8fd9\u6837\u80fd\u5c06\u77ac\u95f4\u7206\u53d1\u6d41\u91cf\u5206\u6563\u5230\u4e00\u5206\u949f\u5185\uff0c\u6781\u5927\u5e73\u6ed1\u66f2\u7ebf\u3002\n\n**2. \u52a8\u6001\u6269\u5bb9**\n*   \u914d\u5408 K8s \u548c\u76d1\u63a7\u7ec4\u4ef6\uff0c\u5f53\u76d1\u6d4b\u5230\u6d88\u606f\u79ef\u538b\u6216 CPU \u98d9\u5347\u65f6\uff0c\u81ea\u52a8\u89e6\u53d1 Consumer \u670d\u52a1\u7684 Pod \u6c34\u5e73\u6269\u5bb9\uff08HPA\uff09\uff0c\u5feb\u901f\u63d0\u5347\u6d88\u8d39\u80fd\u529b\u3002\n\n### \u603b\u7ed3\n\n\u9762\u5bf9\u8bbe\u5907\u6d77\u91cf\u6d88\u606f\u4e0a\u62a5\uff0c\u6211\u7684\u6838\u5fc3\u601d\u8def\u662f**\u201c\u5feb\u8fdb\u6162\u51fa\uff0c\u4ee5\u7a7a\u95f4\u6362\u65f6\u95f4\u201d**\uff1a\n\n1.  **\u63a5\u5165\u5c42**\uff1a\u901a\u8fc7\u9650\u6d41\u548c\u534f\u8bae\u4f18\u5316\uff0c\u62e6\u622a\u65e0\u6548\u6d41\u91cf\u3002\n2.  **\u670d\u52a1\u5c42**\uff1a\u5229\u7528 **MQ \u7f13\u51b2**\u548c**Redis \u7f13\u5b58**\uff0c\u627f\u63a5\u5cf0\u503c\u538b\u529b\uff0c\u4fdd\u62a4\u6570\u636e\u5e93\u3002\n3.  **\u6570\u636e\u5c42**\uff1a\u901a\u8fc7**\u6279\u91cf\u5408\u5e76**\u5199\u5165\uff0c\u6700\u5927\u5316 IO \u6548\u7387\u3002\n4.  **\u515c\u5e95**\uff1a\u901a\u8fc7\u5ba2\u6237\u7aef\u9519\u5cf0\u548c\u670d\u52a1\u964d\u7ea7\uff0c\u5e94\u5bf9\u6781\u7aef\u707e\u96be\u3002\n\n\u8fd9\u5957\u65b9\u6848\u5728\u6211\u8fc7\u5f80\u7684\u9879\u76ee\u4e2d\uff0c\u6210\u529f\u652f\u6491\u4e86\u5343\u4e07\u7ea7\u8bbe\u5907\u7684\u7a33\u5b9a\u63a5\u5165\u3002",
