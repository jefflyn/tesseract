  "273": {
    "title": "\u5fae\u670d\u52a1\u62c6\u5206\u539f\u5219\uff1f\u662f\u5426\u8d8a\u7ec6\u8d8a\u597d\uff1f",
    "style": "background-color: yellow;",
    "details": "\u9762\u8bd5\u5b98\u60a8\u597d\uff0c\u8fd9\u662f\u4e00\u4e2a\u975e\u5e38\u8003\u9a8c\u67b6\u6784\u5e08\u6838\u5fc3\u5224\u65ad\u529b\u7684\u95ee\u9898\u3002\u6211\u5728\u7f51\u6613\u8003\u62c9\u548c\u5c0f\u7535\u79d1\u6280\u90fd\u4e3b\u5bfc\u8fc7\u5927\u89c4\u6a21\u7684\u5fae\u670d\u52a1\u91cd\u6784\uff0c\u5bf9\u6b64\u6709\u6df1\u523b\u7684\u5b9e\u6218\u4f53\u4f1a\u3002\n\n\u76f4\u63a5\u56de\u7b54\u60a8\u7684\u7b2c\u4e8c\u4e2a\u95ee\u9898\uff1a**\u5fae\u670d\u52a1\u7edd\u5bf9\u4e0d\u662f\u8d8a\u7ec6\u8d8a\u597d\u3002** \u8fc7\u5ea6\u7684\u5fae\u670d\u52a1\u5316\u4e0d\u4ec5\u4e0d\u4f1a\u5e26\u6765\u6536\u76ca\uff0c\u53cd\u800c\u4f1a\u5f15\u53d1\u201c\u67b6\u6784\u707e\u96be\u201d\u3002\n\n\u6211\u4eec\u53ef\u4ee5\u4ece\u62c6\u5206\u539f\u5219\u548c\u62c6\u5206\u7c92\u5ea6\u4e24\u4e2a\u65b9\u9762\u6765\u6df1\u5ea6\u5256\u6790\uff1a\n\n### \u4e00\u3001 \u5fae\u670d\u52a1\u62c6\u5206\u7684\u6838\u5fc3\u539f\u5219\n\n\u6211\u5728\u8fdb\u884c\u67b6\u6784\u8bbe\u8ba1\u65f6\uff0c\u4e3b\u8981\u9075\u5faa\u4ee5\u4e0b\u4e09\u5927\u539f\u5219\uff1a\n\n#### 1. \u9ad8\u5185\u805a\u3001\u4f4e\u8026\u5408\uff08\u9ec4\u91d1\u6cd5\u5219\uff09\n\u8fd9\u662f\u6700\u6839\u672c\u7684\u539f\u5219\u3002\n*   **\u9ad8\u5185\u805a**\uff1a\u51e1\u662f\u4e1a\u52a1\u903b\u8f91\u5173\u8054\u7d27\u5bc6\u3001\u9700\u8981\u4e00\u8d77\u53d8\u66f4\u7684\u529f\u80fd\uff0c\u5e94\u8be5\u653e\u5728\u4e00\u8d77\u3002\u6bd4\u5982\u201c\u8ba2\u5355\u521b\u5efa\u201d\u548c\u201c\u8ba2\u5355\u72b6\u6001\u6d41\u8f6c\u201d\uff0c\u5982\u679c\u62c6\u6210\u4e24\u4e2a\u670d\u52a1\uff0c\u5206\u5e03\u5f0f\u4e8b\u52a1\u7684\u538b\u529b\u4f1a\u975e\u5e38\u5927\u3002\n*   **\u4f4e\u8026\u5408**\uff1a\u670d\u52a1\u4e4b\u95f4\u4f9d\u8d56\u5173\u7cfb\u8981\u5c11\u3002\u5982\u679c\u4e00\u4e2a\u670d\u52a1\u6539\u4e86\u63a5\u53e3\uff0c\u5bfc\u81f4\u5341\u4e2a\u670d\u52a1\u8ddf\u7740\u6539\uff0c\u90a3\u5c31\u662f\u8026\u5408\u592a\u91cd\u3002\n\n#### 2. \u57fa\u4e8e\u4e1a\u52a1\u9886\u57df\u62c6\u5206\uff08DDD \u9886\u57df\u9a71\u52a8\u8bbe\u8ba1\uff09\n\u8fd9\u662f\u76ee\u524d\u6700\u4e3b\u6d41\u7684\u65b9\u6cd5\u8bba\u3002\n*   \u6211\u4eec\u4e0d\u5e94\u6309\u201c\u6280\u672f\u5c42\u7ea7\u201d\u62c6\u5206\uff08\u6bd4\u5982\u628a\u6240\u6709 Service \u62bd\u6210\u4e00\u4e2a\u670d\u52a1\uff0c\u6240\u6709 DAO \u62bd\u6210\u4e00\u4e2a\u670d\u52a1\uff0c\u8fd9\u662f\u9519\u8bef\u7684\uff09\uff0c\u800c\u5e94\u6309**\u4e1a\u52a1\u8fb9\u754c**\u62c6\u5206\u3002\n*   **\u5b9e\u6218\u6848\u4f8b**\uff1a\u5728\u5c0f\u7535\u79d1\u6280\uff0c\u6211\u4eec\u5c06\u7cfb\u7edf\u6309\u4e1a\u52a1\u57df\u62c6\u5206\u4e3a**\u8bbe\u5907\u57df**\uff08\u8d1f\u8d23\u8bbe\u5907\u72b6\u6001\u3001\u751f\u547d\u5468\u671f\uff09\u3001**\u4ea4\u6613\u57df**\uff08\u8d1f\u8d23\u8ba2\u5355\u3001\u652f\u4ed8\uff09\u3001**\u7ed3\u7b97\u57df**\uff08\u8d1f\u8d23\u5546\u6237\u5206\u8d26\uff09\u3002\u6bcf\u4e2a\u57df\u6709\u72ec\u7acb\u7684\u56e2\u961f\u7ef4\u62a4\uff0c\u754c\u9650\u6e05\u6670\u3002\n\n#### 3. \u7a33\u5b9a\u6027\u539f\u5219\n*   \u5c06\u201c\u53d8\u52a8\u9891\u7e41\u201d\u7684\u4e1a\u52a1\u548c\u201c\u6838\u5fc3\u7a33\u5b9a\u201d\u7684\u4e1a\u52a1\u5206\u79bb\u3002\n*   \u4f8b\u5982\uff0c\u8425\u9500\u6d3b\u52a8\u89c4\u5219\u7ecf\u5e38\u53d8\uff0c\u4f46\u8ba2\u5355\u6838\u5fc3\u6d41\u7a0b\u5f88\u5c11\u53d8\u3002\u5982\u679c\u628a\u5b83\u4eec\u653e\u5728\u4e00\u8d77\uff0c\u8425\u9500\u6d3b\u52a8\u7684\u9891\u7e41\u4e0a\u7ebf\u53ef\u80fd\u4f1a\u641e\u6302\u6838\u5fc3\u4ea4\u6613\u94fe\u8def\u3002\u62c6\u5206\u540e\uff0c\u8425\u9500\u670d\u52a1\u6302\u4e86\uff0c\u4e0d\u5f71\u54cd\u7528\u6237\u79df\u501f\u5145\u7535\u5b9d\u3002\n\n---\n\n### \u4e8c\u3001 \u4e3a\u4ec0\u4e48\u4e0d\u662f\u201c\u8d8a\u7ec6\u8d8a\u597d\u201d\uff1f\n\n\u5f88\u591a\u56e2\u961f\u521a\u5f00\u59cb\u505a\u5fae\u670d\u52a1\u65f6\uff0c\u5bb9\u6613\u9677\u5165\u201c\u4e3a\u4e86\u5fae\u800c\u5fae\u201d\u7684\u8bef\u533a\uff0c\u628a\u670d\u52a1\u62c6\u5f97\u975e\u5e38\u7ec6\uff0c\u7ed3\u679c\u5e26\u6765\u4e86\u4e25\u91cd\u7684**\u201c\u5206\u5e03\u5f0f\u5355\u4f53\u201d**\u95ee\u9898\u3002\n\n**\u8fc7\u7ec6\u62c6\u5206\u7684\u56db\u5927\u5371\u5bb3\uff1a**\n\n#### 1. \u8fd0\u7ef4\u6210\u672c\u6307\u6570\u7ea7\u4e0a\u5347\n*   \u5982\u679c\u672c\u6765 10 \u4e2a\u670d\u52a1\u80fd\u641e\u5b9a\uff0c\u4f60\u62c6\u6210\u4e86 100 \u4e2a\u3002\u8fd9\u610f\u5473\u7740\u4f60\u9700\u8981\u7ef4\u62a4 100 \u4e2a Git \u4ed3\u5e93\u3001100 \u5957 CI/CD \u6d41\u6c34\u7ebf\u3001100 \u5957\u76d1\u63a7\u544a\u8b66\u914d\u7f6e\u3002\n*   \u5982\u679c\u6ca1\u6709\u6210\u719f\u7684 DevOps \u5e73\u53f0\uff08\u5982 K8s + DevOps \u5e73\u53f0\uff09\uff0c\u8fd0\u7ef4\u56e2\u961f\u4f1a\u76f4\u63a5\u5d29\u6e83\u3002\n\n#### 2. \u8c03\u7528\u94fe\u8def\u8fc7\u957f\uff0c\u6027\u80fd\u4e0e\u7a33\u5b9a\u6027\u53cc\u964d\n*   \u4e00\u4e2a\u539f\u672c\u5728\u5185\u5b58\u4e2d\u76f4\u63a5\u8c03\u7528\u7684\u65b9\u6cd5\uff0c\u53d8\u6210\u4e86\u8de8\u7f51\u7edc\u7684 RPC \u8c03\u7528\u3002\n*   \u5982\u679c\u4e00\u4e2a\u8bf7\u6c42\u9700\u8981\u7ecf\u8fc7 20 \u4e2a\u5fae\u670d\u52a1\uff0c\u7f51\u7edc\u5ef6\u8fdf\u4f1a\u7d2f\u52a0\uff0c\u5bfc\u81f4\u63a5\u53e3\u54cd\u5e94\u6162\uff08RT \u589e\u52a0\uff09\u3002\n*   \u66f4\u53ef\u6015\u7684\u662f**\u7a33\u5b9a\u6027\u96ea\u5d29**\uff1a\u53ea\u8981\u94fe\u8def\u4e2d\u4efb\u4f55\u4e00\u4e2a\u5fae\u670d\u52a1\u51fa\u73b0\u8d85\u65f6\u6216\u5f02\u5e38\uff0c\u6574\u4e2a\u8bf7\u6c42\u5c31\u4f1a\u5931\u8d25\u3002\u670d\u52a1\u8d8a\u591a\uff0c\u7cfb\u7edf\u6574\u4f53\u7684\u53ef\u7528\u6027\u6982\u7387\u8d8a\u4f4e\u3002\n\n#### 3. \u5206\u5e03\u5f0f\u4e8b\u52a1\u96be\u9898\n*   \u670d\u52a1\u7c92\u5ea6\u592a\u7ec6\uff0c\u539f\u672c\u7b80\u5355\u7684\u6570\u636e\u5e93\u4e8b\u52a1\u53d8\u6210\u4e86\u590d\u6742\u7684\u5206\u5e03\u5f0f\u4e8b\u52a1\uff08\u5982 Seata\u3001TCC\u3001\u6700\u7ec8\u4e00\u81f4\u6027\uff09\u3002\n*   \u8fd9\u4e0d\u4ec5\u6781\u5927\u5730\u589e\u52a0\u4e86\u5f00\u53d1\u96be\u5ea6\uff0c\u8fd8\u4e25\u91cd\u5f71\u54cd\u4e86\u6570\u636e\u7684\u4e00\u81f4\u6027\u548c\u7cfb\u7edf\u7684\u541e\u5410\u91cf\u3002\n\n#### 4. \u56e2\u961f\u6c9f\u901a\u6210\u672c\u589e\u52a0\n*   \u5eb7\u5a01\u5b9a\u5f8b\u6307\u51fa\uff1a\u8f6f\u4ef6\u67b6\u6784\u53d7\u5236\u4e8e\u7ec4\u7ec7\u67b6\u6784\u3002\n*   \u5982\u679c\u4e00\u4e2a 5 \u4eba\u7684\u5f00\u53d1\u56e2\u961f\uff0c\u7ef4\u62a4\u4e86 30 \u4e2a\u5fae\u670d\u52a1\u3002\u6bcf\u4e2a\u4eba\u90fd\u8981\u8de8\u670d\u52a1\u6c9f\u901a\uff0c\u63a5\u53e3\u5b9a\u4e49\u7a0d\u5fae\u6539\u52a8\u5c31\u8981\u534f\u8c03\u591a\u65b9\uff0c\u5f00\u53d1\u6548\u7387\u4e0d\u5347\u53cd\u964d\u3002\n\n---\n\n### \u4e09\u3001 \u5b9e\u6218\u4e2d\u7684\u62c6\u5206\u7c92\u5ea6\u5224\u65ad\u6807\u51c6\n\n\u6211\u5728\u505a\u67b6\u6784\u51b3\u7b56\u65f6\uff0c\u901a\u5e38\u4f7f\u7528\u4ee5\u4e0b\u6807\u51c6\u6765\u5224\u65ad\u62c6\u5206\u662f\u5426\u5408\u7406\uff1a\n\n1.  **\u56e2\u961f\u89c4\u6a21\u5339\u914d**\uff1a\n    *   **\u4e24\u4e2a\u62ab\u8428\u539f\u5219**\uff1a\u4e00\u4e2a\u5fae\u670d\u52a1\u6700\u597d\u80fd\u7531\u4e00\u4e2a\u201c\u4e24\u4e2a\u62ab\u8428\u80fd\u5582\u9971\u201d\u7684\u5c0f\u56e2\u961f\uff086-10\u4eba\uff09\u72ec\u7acb\u7ef4\u62a4\u3002\u5982\u679c\u4e00\u4e2a\u670d\u52a1\u9700\u8981 20 \u4e2a\u4eba\u7ef4\u62a4\uff0c\u8bf4\u660e\u592a\u5927\u4e86\uff1b\u5982\u679c 3 \u4e2a\u4eba\u7ef4\u62a4 10 \u4e2a\u670d\u52a1\uff0c\u8bf4\u660e\u592a\u7ec6\u4e86\u3002\n\n2.  **\u53d1\u5e03\u9891\u7387\u4e0e\u5f71\u54cd\u9762**\uff1a\n    *   \u5982\u679c\u4e24\u4e2a\u6a21\u5757\u603b\u662f\u9700\u8981\u4e00\u8d77\u53d1\u5e03\u3001\u4e00\u8d77\u91cd\u542f\uff0c\u90a3\u5b83\u4eec\u5927\u6982\u7387\u4e0d\u5e94\u8be5\u62c6\u5206\u3002\n\n3.  **\u6570\u636e\u8fb9\u754c\u6e05\u6670**\uff1a\n    *   \u5982\u679c\u4e24\u4e2a\u6a21\u5757\u9700\u8981\u9891\u7e41 Join \u67e5\u8be2\u5bf9\u65b9\u7684\u6570\u636e\u5e93\u8868\uff0c\u90a3\u8bf4\u660e\u5b83\u4eec\u8fd8\u6ca1\u6709\u62c6\u5206\u7684\u6761\u4ef6\u3002\u5fae\u670d\u52a1\u62c6\u5206\u7684\u524d\u63d0\u662f**\u6570\u636e\u89e3\u8026**\u3002\n\n4.  **\u6f14\u8fdb\u5f0f\u62c6\u5206**\uff1a\n    *   **\u4e0d\u8981\u4e00\u5f00\u59cb\u5c31\u62c6\u5f97\u5f88\u7ec6\uff01**\n    *   \u6211\u5728\u5c0f\u7535\u79d1\u6280\u7684\u505a\u6cd5\u662f\uff1a**\u5148\u505a\u5355\u4f53\uff0c\u518d\u6309\u9700\u62c6\u5206**\u3002\u9879\u76ee\u521d\u671f\uff0c\u4e1a\u52a1\u4e0d\u7a33\u5b9a\uff0c\u5355\u4f53\u67b6\u6784\u5f00\u53d1\u6548\u7387\u6700\u9ad8\u3002\u968f\u7740\u4e1a\u52a1\u590d\u6742\u5ea6\u589e\u52a0\uff0c\u5f53\u67d0\u4e2a\u6a21\u5757\u53d8\u5f97\u5e9e\u5927\u4e14\u72ec\u7acb\u65f6\uff0c\u518d\u5c06\u5176\u5265\u79bb\u6210\u5fae\u670d\u52a1\u3002\n\n### \u603b\u7ed3\n\n\u5fae\u670d\u52a1\u62c6\u5206\u662f\u4e00\u95e8**\u6743\u8861\u7684\u827a\u672f**\u3002\n\n**\u201c\u597d\u201d\u7684\u5fae\u670d\u52a1\u67b6\u6784**\uff0c\u662f\u5728**\u5f00\u53d1\u6548\u7387**\u3001**\u7cfb\u7edf\u590d\u6742\u6027**\u3001**\u8fd0\u7ef4\u6210\u672c**\u4e4b\u95f4\u627e\u5230\u6700\u4f73\u5e73\u8861\u70b9\u3002\u5bf9\u4e8e\u5927\u591a\u6570\u4e2d\u5c0f\u578b\u9879\u76ee\uff0c**\u201c\u9002\u5ea6\u7c97\u7c92\u5ea6\u201d**\u7684\u62c6\u5206\u5f80\u5f80\u6bd4\u201c\u7ec6\u7c92\u5ea6\u201d\u62c6\u5206\u66f4\u6210\u529f\u3002\u6211\u4eec\u8981\u6839\u636e\u4e1a\u52a1\u9636\u6bb5\u548c\u56e2\u961f\u5b9e\u529b\uff0c\u52a8\u6001\u8c03\u6574\u67b6\u6784\uff0c\u5207\u5fcc\u8fc7\u5ea6\u8bbe\u8ba1\u3002",

    "title": "* \u9886\u57df\u9a71\u52a8",
    "style": "",
    "details": "\u9762\u8bd5\u5b98\u60a8\u597d\uff0c\u9886\u57df\u9a71\u52a8\u8bbe\u8ba1\uff08DDD\uff09\u662f\u6211\u4ece\u9ad8\u7ea7\u5f00\u53d1\u8fc8\u5411\u67b6\u6784\u5e08\u8fc7\u7a0b\u4e2d\uff0c\u6df1\u5165\u5b9e\u8df5\u5e76\u975e\u5e38\u63a8\u5d07\u7684\u4e00\u79cd\u8bbe\u8ba1\u65b9\u6cd5\u8bba\u3002\n\n\u5728\u5c0f\u7535\u79d1\u6280\u8d1f\u8d23\u5168\u94fe\u8def\u4e1a\u52a1\u7cfb\u7edf\u91cd\u6784\uff0c\u4ee5\u53ca\u5728\u7f51\u6613\u8003\u62c9\u8fdb\u884c\u670d\u52a1\u5316\u62c6\u5206\u65f6\uff0cDDD\u7684\u6838\u5fc3\u601d\u60f3\u8d2f\u7a7f\u59cb\u7ec8\u3002\u6211\u8ba4\u4e3aDDD\u4e0d\u4ec5\u4ec5\u662f\u4e00\u79cd\u6280\u672f\u67b6\u6784\u6a21\u5f0f\uff0c\u66f4\u662f\u4e00\u79cd**\u5e2e\u52a9\u6211\u4eec\u4ece\u590d\u6742\u4e1a\u52a1\u4e2d\u62bd\u8c61\u51fa\u6e05\u6670\u6a21\u578b\uff0c\u89e3\u51b3\u201c\u8f6f\u4ef6\u590d\u6742\u6027\u201d\u7684\u6838\u5fc3\u65b9\u6cd5\u8bba**\u3002\n\n\u4ee5\u4e0b\u662f\u6211\u5bf9DDD\u7684\u7406\u89e3\u4e0e\u5b9e\u8df5\u7ecf\u9a8c\uff1a\n\n### \u4e00\u3001 \u4e3a\u4ec0\u4e48\u8981\u7528DDD\uff1f\uff08\u89e3\u51b3\u4ec0\u4e48\u95ee\u9898\uff09\n\n\u5728\u4f20\u7edf\u7684MVC\u6216\u4e09\u5c42\u67b6\u6784\u4e2d\uff0c\u6211\u4eec\u5e38\u9047\u5230\u201c\u8d2b\u8840\u6a21\u578b\u201d\u548c\u201c\u5927\u6ce5\u7403\u201d\u95ee\u9898\uff1a\n*   **\u4e1a\u52a1\u903b\u8f91\u6cc4\u9732**\uff1a\u4e1a\u52a1\u903b\u8f91\u6563\u843d\u5728Service\u5c42\u3001Controller\u751a\u81f3SQL\u4e2d\uff0c\u968f\u7740\u4e1a\u52a1\u8fed\u4ee3\uff0c\u4ee3\u7801\u53d8\u5f97\u96be\u4ee5\u7ef4\u62a4\u3002\n*   **\u6570\u636e\u5e93\u9a71\u52a8\u8bbe\u8ba1**\uff1a\u5f00\u53d1\u4eba\u5458\u5f80\u5f80\u5148\u8bbe\u8ba1\u8868\u7ed3\u6784\uff0c\u518d\u5199\u4ee3\u7801\uff0c\u5bfc\u81f4\u4e1a\u52a1\u6a21\u578b\u88ab\u6570\u636e\u5e93\u6a21\u578b\u7ed1\u67b6\uff0c\u96be\u4ee5\u5e94\u5bf9\u4e1a\u52a1\u53d8\u5316\u3002\n\n**DDD\u7684\u6838\u5fc3\u4ef7\u503c**\u5728\u4e8e\uff1a**\u901a\u8fc7\u6784\u5efa\u5bcc\u542b\u4e1a\u52a1\u903b\u8f91\u7684\u201c\u5145\u8840\u6a21\u578b\u201d\uff0c\u8ba9\u4ee3\u7801\u76f4\u63a5\u53cd\u6620\u4e1a\u52a1\u89c4\u5219\uff0c\u5c06\u4e1a\u52a1\u590d\u6742\u5ea6\u63a7\u5236\u5728\u9886\u57df\u5c42\u5185\u90e8\uff0c\u4fdd\u62a4\u4e1a\u52a1\u903b\u8f91\u7684\u7eaf\u7cb9\u6027\u3002**\n\n### \u4e8c\u3001 DDD\u7684\u6838\u5fc3\u6982\u5ff5\u7406\u89e3\n\n\u6211\u901a\u5e38\u5c06DDD\u7684\u67b6\u6784\u5206\u4e3a\u56db\u5c42\uff0c\u91cd\u70b9\u5728\u4e8e\u9886\u57df\u5c42\u7684\u8bbe\u8ba1\uff1a\n\n1.  **\u7528\u6237\u754c\u9762\u5c42**\uff1a\u5904\u7406\u8bf7\u6c42\u54cd\u5e94\uff0c\u4e0d\u5305\u542b\u4e1a\u52a1\u903b\u8f91\u3002\n2.  **\u5e94\u7528\u5c42**\uff1a\u8d1f\u8d23\u6d41\u7a0b\u7f16\u6392\uff0c\u4e0d\u5305\u542b\u4e1a\u52a1\u89c4\u5219\u3002\u5b83\u50cf\u662f\u4e00\u4e2a\u6307\u6325\u5b98\uff0c\u8c03\u7528\u9886\u57df\u5bf9\u8c61\u5b8c\u6210\u4efb\u52a1\u3002\n3.  **\u9886\u57df\u5c42**\uff1a**\u6838\u5fc3\u6240\u5728**\u3002\u5305\u542b\u5b9e\u4f53\u3001\u503c\u5bf9\u8c61\u3001\u9886\u57df\u670d\u52a1\u3001\u805a\u5408\u6839\u3002\u8fd9\u91cc\u662f\u4e1a\u52a1\u89c4\u5219\u7684\u201c\u5927\u672c\u8425\u201d\u3002\n4.  **\u57fa\u7840\u8bbe\u65bd\u5c42**\uff1a\u63d0\u4f9b\u6280\u672f\u652f\u6301\uff0c\u5982\u6570\u636e\u5e93\u64cd\u4f5c\u3001\u6d88\u606f\u53d1\u9001\u7b49\u3002\n\n**\u5173\u952e\u6982\u5ff5\u5b9e\u6218\u89e3\u6790\uff1a**\n\n*   **\u5b9e\u4f53\u4e0e\u503c\u5bf9\u8c61**\uff1a\n    *   **\u5b9e\u4f53**\uff1a\u6709\u552f\u4e00\u6807\u8bc6\uff0c\u72b6\u6001\u53ef\u53d8\u3002\u4f8b\u5982\u201c\u8ba2\u5355\u201d\uff0c\u65e0\u8bba\u5730\u5740\u600e\u4e48\u6539\uff0c\u8ba2\u5355ID\u4e0d\u53d8\uff0c\u5b83\u5c31\u662f\u540c\u4e00\u4e2a\u8ba2\u5355\u3002\n    *   **\u503c\u5bf9\u8c61**\uff1a\u65e0\u552f\u4e00\u6807\u8bc6\uff0c\u4e0d\u53ef\u53d8\uff0c\u901a\u8fc7\u5c5e\u6027\u503c\u5224\u65ad\u76f8\u7b49\u3002\u4f8b\u5982\u201c\u6536\u8d27\u5730\u5740\u201d\uff08\u7701\u5e02\u533a\u8857\u9053\uff09\uff0c\u5b83\u53ea\u662f\u63cf\u8ff0\u4fe1\u606f\uff0c\u4fee\u6539\u5730\u5740\u662f\u66ff\u6362\u6574\u4e2a\u5bf9\u8c61\uff0c\u800c\u975e\u4fee\u6539\u5c5e\u6027\u3002\u6211\u5728\u9879\u76ee\u4e2d\u5927\u91cf\u4f7f\u7528\u503c\u5bf9\u8c61\u6765\u5c01\u88c5\u6821\u9a8c\u903b\u8f91\uff08\u5982\u624b\u673a\u53f7\u683c\u5f0f\u6821\u9a8c\uff09\uff0c\u63d0\u5347\u4ee3\u7801\u5065\u58ee\u6027\u3002\n*   **\u805a\u5408\u4e0e\u805a\u5408\u6839**\uff1a\n    *   \u8fd9\u662f\u4fdd\u8bc1\u6570\u636e\u4e00\u81f4\u6027\u7684\u8fb9\u754c\u3002\u4f8b\u5982\u201c\u8ba2\u5355\u201d\u662f\u805a\u5408\u6839\uff0c\u201c\u8ba2\u5355\u9879\u201d\u662f\u5185\u90e8\u5b9e\u4f53\u3002\u5916\u90e8\u53ea\u80fd\u901a\u8fc7\u201c\u8ba2\u5355\u201d\u8bbf\u95ee\u201c\u8ba2\u5355\u9879\u201d\uff0c\u4e0d\u80fd\u76f4\u63a5\u64cd\u4f5c\u8ba2\u5355\u9879\u3002\u8fd9\u89e3\u51b3\u4e86\u5bf9\u8c61\u56fe\u592a\u6df1\u5bfc\u81f4\u7684\u5173\u8054\u67e5\u8be2\u590d\u6742\u548c\u6570\u636e\u4e0d\u4e00\u81f4\u95ee\u9898\u3002\n*   **\u9886\u57df\u670d\u52a1**\uff1a\n    *   \u5f53\u4e00\u4e2a\u4e1a\u52a1\u903b\u8f91\u4e0d\u5c5e\u4e8e\u5355\u4e2a\u5b9e\u4f53\u65f6\uff08\u4f8b\u5982\u201c\u7528\u6237\u8f6c\u8d26\u201d\uff0c\u6d89\u53ca\u4e24\u4e2a\u8d26\u6237\uff09\uff0c\u6211\u4f1a\u5c06\u5176\u653e\u5728\u9886\u57df\u670d\u52a1\u4e2d\u3002\n\n### \u4e09\u3001 \u5b9e\u6218\u6848\u4f8b\uff1a\u5c0f\u7535\u79d1\u6280\u8ba2\u5355\u57df\u7684\u91cd\u6784\n\n**\u80cc\u666f**\uff1a\n\u65e9\u671f\u7684\u8ba2\u5355\u7cfb\u7edf\u662f\u5178\u578b\u7684\u201c\u8d2b\u8840\u6a21\u578b\u201d\uff0cService\u5c42\u5145\u65a5\u7740\u51e0\u5343\u884c\u7684\u201c\u4e0a\u5e1d\u7c7b\u201d\uff0c\u5404\u79cd\u72b6\u6001\u5224\u65ad\u3001\u91d1\u989d\u8ba1\u7b97\u6df7\u6742\uff0c\u7275\u4e00\u53d1\u800c\u52a8\u5168\u8eab\u3002\n\n**\u91cd\u6784\u8fc7\u7a0b\uff08DDD\u843d\u5730\uff09**\uff1a\n\n1.  **\u6218\u7565\u8bbe\u8ba1\uff08\u5212\u5206\u9650\u754c\u4e0a\u4e0b\u6587\uff09**\uff1a\n    *   \u6211\u9996\u5148\u68b3\u7406\u4e1a\u52a1\u6d41\u7a0b\uff0c\u8bc6\u522b\u51fa\u201c\u8bbe\u5907\u57df\u201d\u3001\u201c\u8ba2\u5355\u57df\u201d\u3001\u201c\u652f\u4ed8\u57df\u201d\u3001\u201c\u5e93\u5b58\u57df\u201d\u3002\n    *   \u660e\u786e\u4e0a\u4e0b\u6587\u6620\u5c04\uff1a\u8ba2\u5355\u57df\u4f9d\u8d56\u5e93\u5b58\u57df\u7684\u201c\u6263\u51cf\u63a5\u53e3\u201d\uff0c\u4f9d\u8d56\u652f\u4ed8\u57df\u7684\u201c\u652f\u4ed8\u72b6\u6001\u53d8\u66f4\u4e8b\u4ef6\u201d\u3002\n\n2.  **\u6218\u672f\u8bbe\u8ba1\uff08\u6784\u5efa\u5145\u8840\u6a21\u578b\uff09**\uff1a\n    *   **\u805a\u5408\u6839\u8bbe\u8ba1**\uff1a\u5c06 `Order` \u8bbe\u8ba1\u4e3a\u805a\u5408\u6839\uff0c\u5185\u90e8\u6301\u6709 `OrderItem` \u5217\u8868\u3002\n    *   **\u884c\u4e3a\u5c01\u88c5**\uff1a\u4ee5\u524d\u4fee\u6539\u8ba2\u5355\u72b6\u6001\u662f\u5728Service\u4e2d `order.setStatus(...)`\uff0c\u73b0\u5728\u6539\u4e3a\u5728 `Order` \u5b9e\u4f53\u5185\u90e8\u5c01\u88c5\u65b9\u6cd5 `order.paySuccess()`\u3001`order.cancel()`\u3002\n    *   **\u4e1a\u52a1\u89c4\u5219\u5185\u7f6e**\uff1a\u4f8b\u5982\u201c\u53d6\u6d88\u8ba2\u5355\u201d\u903b\u8f91\uff0c\u5b9e\u4f53\u5185\u90e8\u5c01\u88c5\u6821\u9a8c\u89c4\u5219\uff1a\n        ```java\n        public void cancel() {\n            if (this.status != Status.CREATED) {\n                throw new BusinessException(\"\u5f53\u524d\u72b6\u6001\u4e0d\u53ef\u53d6\u6d88\");\n            }\n            this.status = Status.CANCELLED;\n            // \u89e6\u53d1\u9886\u57df\u4e8b\u4ef6\uff0c\u901a\u77e5\u5e93\u5b58\u805a\u5408\u91ca\u653e\u8d44\u6e90\n            this.domainEvents.add(new OrderCancelledEvent(this.id));\n        }\n        ```\n    *   **\u9886\u57df\u4e8b\u4ef6**\uff1a\u5f15\u5165\u4e8b\u4ef6\u9a71\u52a8\u673a\u5236\u3002\u8ba2\u5355\u521b\u5efa\u6210\u529f\u540e\uff0c\u53d1\u5e03 `OrderCreatedEvent`\uff0c\u79ef\u5206\u6a21\u5757\u3001\u901a\u77e5\u6a21\u5757\u8ba2\u9605\u8be5\u4e8b\u4ef6\uff0c\u5b9e\u73b0\u6a21\u5757\u95f4\u7684\u89e3\u8026\u3002\n\n**\u6210\u679c**\uff1a\n*   **\u4ee3\u7801\u53ef\u8bfb\u6027\u63d0\u5347**\uff1aService\u5c42\u53d8\u5f97\u975e\u5e38\u8584\uff0c\u53ea\u505a\u7f16\u6392\uff0c\u770b\u4ee3\u7801\u5c31\u50cf\u770b\u4e1a\u52a1\u6d41\u7a0b\u56fe\u3002\n*   **\u6269\u5c55\u6027\u589e\u5f3a**\uff1a\u5f53\u4e1a\u52a1\u65b0\u589e\u201c\u9000\u6b3e\u201d\u573a\u666f\u65f6\uff0c\u53ea\u9700\u5728 `Order` \u805a\u5408\u4e2d\u589e\u52a0 `refund()` \u65b9\u6cd5\uff0c\u4e0d\u5f71\u54cd\u5176\u4ed6\u6a21\u5757\u3002\n*   **\u6027\u80fd\u4f18\u5316**\uff1a\u901a\u8fc7\u63a7\u5236\u805a\u5408\u7684\u5927\u5c0f\u8fb9\u754c\uff0c\u907f\u514d\u4e86\u4e0d\u5fc5\u8981\u7684\u7ea7\u8054\u67e5\u8be2\u548c\u66f4\u65b0\u3002\n\n### \u56db\u3001 \u603b\u7ed3\n\n\u5bf9\u6211\u800c\u8a00\uff0cDDD\u4e0d\u4ec5\u662f\u4e00\u79cd\u4ee3\u7801\u7ec4\u7ec7\u5f62\u5f0f\uff0c\u66f4\u662f\u4e00\u79cd**\u6c9f\u901a\u8bed\u8a00**\u3002\u5b83\u8ba9\u5f00\u53d1\u4eba\u5458\u80fd\u591f\u7528\u4ee3\u7801\u76f4\u63a5\u6620\u5c04\u4e1a\u52a1\u6982\u5ff5\uff0c\u7f29\u5c0f\u4e86\u201c\u4e1a\u52a1\u9700\u6c42\u201d\u4e0e\u201c\u4ee3\u7801\u5b9e\u73b0\u201d\u4e4b\u95f4\u7684\u9e3f\u6c9f\u3002\n\n\u5728\u5fae\u670d\u52a1\u67b6\u6784\u76db\u884c\u7684\u4eca\u5929\uff0cDDD\u7684**\u9650\u754c\u4e0a\u4e0b\u6587**\u5929\u7136\u5951\u5408\u5fae\u670d\u52a1\u7684\u62c6\u5206\u8fb9\u754c\uff0c\u5e2e\u52a9\u6211\u4eec\u6784\u5efa\u51fa\u9ad8\u5185\u805a\u3001\u4f4e\u8026\u5408\u7684\u7cfb\u7edf\u3002\u8fd9\u4e5f\u662f\u6211\u4f5c\u4e3a\u6280\u672f\u4e13\u5bb6\uff0c\u5728\u67b6\u6784\u8bbe\u8ba1\u548c\u56e2\u961f\u6280\u672f\u6307\u5bfc\u4e2d\u59cb\u7ec8\u575a\u6301\u63a8\u5e7f\u7684\u7406\u5ff5\u3002",
    "subItems": []

    "title": "* \u9ad8\u5185\u805a\u4f4e\u8026\u5408",
    "style": "",
    "details": "\u9762\u8bd5\u5b98\u60a8\u597d\uff0c\u201c\u9ad8\u5185\u805a\u3001\u4f4e\u8026\u5408\u201d\u662f\u8f6f\u4ef6\u67b6\u6784\u8bbe\u8ba1\u4e2d\u6700\u6838\u5fc3\u7684\u539f\u5219\uff0c\u4e5f\u662f\u6211\u5728\u505a\u6280\u672f\u51b3\u7b56\u548c\u4ee3\u7801\u91cd\u6784\u65f6\u59cb\u7ec8\u575a\u6301\u7684\u201c\u5317\u6781\u661f\u6307\u6807\u201d\u3002\n\n\u7ed3\u5408\u6211\u5728\u5c0f\u7535\u79d1\u6280\u3001\u7f51\u6613\u8003\u62c9\u7b49\u9879\u76ee\u7684\u67b6\u6784\u6f14\u8fdb\u7ecf\u9a8c\uff0c\u6211\u4e0d\u4ec5\u5c06\u5176\u89c6\u4e3a\u4e00\u79cd\u4ee3\u7801\u89c4\u8303\uff0c\u66f4\u5c06\u5176\u89c6\u4e3a**\u63a7\u5236\u7cfb\u7edf\u590d\u6742\u5ea6\u3001\u63d0\u5347\u7cfb\u7edf\u53ef\u7ef4\u62a4\u6027**\u7684\u5173\u952e\u624b\u6bb5\u3002\n\n\u4ee5\u4e0b\u662f\u6211\u5bf9\u8fd9\u4e24\u4e2a\u6982\u5ff5\u7684\u6df1\u5165\u7406\u89e3\u53ca\u5b9e\u6218\u5e94\u7528\uff1a\n\n### \u4e00\u3001 \u6838\u5fc3\u6982\u5ff5\u89e3\u8bfb\n\n**1. \u9ad8\u5185\u805a\uff1a\u5173\u7cfb\u7d27\u5bc6\u7684\u903b\u8f91\u8981\u201c\u805a\u201d\u5728\u4e00\u8d77**\n*   **\u5b9a\u4e49**\uff1a\u4e00\u4e2a\u6a21\u5757\u6216\u7c7b\u5185\u90e8\u7684\u5143\u7d20\u5e94\u5f53\u7d27\u5bc6\u76f8\u5173\uff0c\u5171\u540c\u5b8c\u6210\u4e00\u4e2a\u5355\u4e00\u7684\u529f\u80fd\u3002\n*   **\u6211\u7684\u7406\u89e3**\uff1a\u8fd9\u5c31\u597d\u6bd4\u4e00\u4e2a\u201c\u5de5\u5177\u7bb1\u201d\uff0c\u5982\u679c\u662f\u201c\u4fee\u8f66\u5de5\u5177\u7bb1\u201d\uff0c\u91cc\u9762\u5e94\u8be5\u53ea\u653e\u6273\u624b\u3001\u87ba\u4e1d\u5200\uff0c\u800c\u4e0d\u5e94\u8be5\u653e\u53a8\u5177\u3002\n*   **\u53cd\u4f8b**\uff1a\u6211\u5728\u63a5\u624b\u9057\u7559\u7cfb\u7edf\u65f6\uff0c\u5e38\u770b\u5230\u4e00\u4e9b `Util` \u7c7b\u6216 `Service` \u7c7b\uff0c\u65e2\u5904\u7406\u7528\u6237\u767b\u5f55\uff0c\u53c8\u5904\u7406\u8ba2\u5355\u67e5\u8be2\uff0c\u8fd8\u53d1\u9001\u90ae\u4ef6\u3002\u8fd9\u79cd\u201c\u5927\u6742\u70e9\u201d\u5c31\u662f\u5178\u578b\u7684\u201c\u4f4e\u5185\u805a\u201d\uff0c\u4fee\u6539\u4e00\u4e2a\u529f\u80fd\u53ef\u80fd\u7834\u574f\u53e6\u4e00\u4e2a\u529f\u80fd\u3002\n\n**2. \u4f4e\u8026\u5408\uff1a\u6a21\u5757\u4e4b\u95f4\u8981\u201c\u758f\u201d\u79bb\u5f00\u6765**\n*   **\u5b9a\u4e49**\uff1a\u6a21\u5757\u4e4b\u95f4\u7684\u4f9d\u8d56\u5173\u7cfb\u5e94\u5f53\u5c3d\u53ef\u80fd\u5f31\u3002\u4e00\u4e2a\u6a21\u5757\u7684\u4fee\u6539\uff0c\u4e0d\u5e94\u5f15\u53d1\u5176\u4ed6\u6a21\u5757\u7684\u201c\u96ea\u5d29\u6548\u5e94\u201d\u3002\n*   **\u6211\u7684\u7406\u89e3**\uff1a\u8fd9\u5c31\u597d\u6bd4\u7535\u8111\u7684USB\u63a5\u53e3\u3002\u9f20\u6807\u574f\u4e86\uff0c\u6211\u53ea\u9700\u8981\u6362\u4e2a\u9f20\u6807\uff0c\u800c\u4e0d\u9700\u8981\u628a\u4e3b\u673a\u4e5f\u6362\u4e86\u3002USB\u63a5\u53e3\u5b9a\u4e49\u4e86\u6807\u51c6\u89c4\u8303\uff0c\u9f20\u6807\u5382\u5546\u548c\u4e3b\u673a\u5382\u5546\u53ef\u4ee5\u72ec\u7acb\u5de5\u4f5c\u3002\n*   **\u53cd\u4f8b**\uff1a\u5728\u65e9\u671f\u7684\u5355\u4f53\u67b6\u6784\u4e2d\uff0c\u8ba2\u5355\u6a21\u5757\u76f4\u63a5\u8c03\u7528\u5e93\u5b58\u6a21\u5757\u7684\u5185\u90e8\u5b9e\u73b0\u7c7b\uff0c\u751a\u81f3\u76f4\u63a5\u64cd\u4f5c\u5e93\u5b58\u6570\u636e\u5e93\u8868\u3002\u4e00\u65e6\u5e93\u5b58\u8868\u7ed3\u6784\u53d8\u66f4\uff0c\u8ba2\u5355\u4ee3\u7801\u5fc5\u987b\u4fee\u6539\uff0c\u8fd9\u5c31\u662f\u201c\u9ad8\u8026\u5408\u201d\u3002\n\n### \u4e8c\u3001 \u5b9e\u6218\u4e2d\u7684\u843d\u5730\u7b56\u7565\n\n\u5728\u5c0f\u7535\u79d1\u6280\u8d1f\u8d23\u5168\u94fe\u8def\u7cfb\u7edf\u91cd\u6784\u65f6\uff0c\u6211\u4e3b\u8981\u901a\u8fc7\u4ee5\u4e0b\u624b\u6bb5\u6765\u5b9e\u73b0\u201c\u9ad8\u5185\u805a\u3001\u4f4e\u8026\u5408\u201d\uff1a\n\n#### 1. \u67b6\u6784\u5c42\u9762\uff1a\u5fae\u670d\u52a1\u4e0e\u9886\u57df\u9a71\u52a8\u8bbe\u8ba1\uff08DDD\uff09\n\n\u8fd9\u662f\u5b9e\u73b0\u4f4e\u8026\u5408\u6700\u6709\u6548\u7684\u624b\u6bb5\u3002\n\n*   **\u754c\u9650\u5212\u5206\uff08\u4f4e\u8026\u5408\uff09**\uff1a\u6211\u4f9d\u636e\u4e1a\u52a1\u8fb9\u754c\u5c06\u7cfb\u7edf\u62c6\u5206\u4e3a\u201c\u8bbe\u5907\u57df\u201d\u3001\u201c\u8ba2\u5355\u57df\u201d\u3001\u201c\u652f\u4ed8\u57df\u201d\u7b49\u5fae\u670d\u52a1\u3002\n    *   **\u539f\u5219**\uff1a\u8ba2\u5355\u670d\u52a1\u4e0d\u9700\u8981\u77e5\u9053\u5e93\u5b58\u670d\u52a1\u5185\u90e8\u662f\u5982\u4f55\u6263\u51cf\u5e93\u5b58\u7684\uff0c\u53ea\u9700\u8c03\u7528\u63a5\u53e3\u6216\u76d1\u542c\u4e8b\u4ef6\u3002\n    *   **\u4ef7\u503c**\uff1a\u652f\u4ed8\u670d\u52a1\u4ece Java \u8fc1\u79fb\u5230 Go \u8bed\u8a00\u91cd\u6784\uff0c\u6216\u8005\u6570\u636e\u5e93\u4ece MySQL \u8fc1\u79fb\u5230 TiDB\uff0c\u5bf9\u8ba2\u5355\u670d\u52a1\u5b8c\u5168\u900f\u660e\uff0c\u5b9e\u73b0\u4e86\u6280\u672f\u5b9e\u73b0\u7684\u89e3\u8026\u3002\n*   **\u805a\u5408\u8bbe\u8ba1\uff08\u9ad8\u5185\u805a\uff09**\uff1a\u5728\u201c\u8ba2\u5355\u57df\u201d\u5185\u90e8\uff0c\u6211\u5c06\u8ba2\u5355\u5b9e\u4f53\u3001\u8ba2\u5355\u9879\u5b9e\u4f53\u3001\u503c\u5bf9\u8c61\uff08\u5730\u5740\uff09\u5c01\u88c5\u5728\u4e00\u4e2a\u805a\u5408\u5185\u3002\n    *   **\u539f\u5219**\uff1a\u5916\u90e8\u53ea\u80fd\u64cd\u4f5c\u201c\u8ba2\u5355\u201d\u8fd9\u4e2a\u805a\u5408\u6839\uff0c\u4e0d\u80fd\u76f4\u63a5\u4fee\u6539\u201c\u8ba2\u5355\u9879\u201d\u3002\u8fd9\u5c31\u4fdd\u8bc1\u4e86\u8ba2\u5355\u76f8\u5173\u7684\u4e1a\u52a1\u89c4\u5219\uff08\u5982\u603b\u4ef7\u6821\u9a8c\uff09\u90fd\u96c6\u4e2d\u5728\u8ba2\u5355\u805a\u5408\u5185\u90e8\uff0c\u5b9e\u73b0\u4e86\u4e1a\u52a1\u903b\u8f91\u7684\u9ad8\u5185\u805a\u3002\n\n#### 2. \u4ee3\u7801\u5c42\u9762\uff1a\u8bbe\u8ba1\u6a21\u5f0f\u4e0e\u63a5\u53e3\u62bd\u8c61\n\n*   **\u7b56\u7565\u6a21\u5f0f\uff08\u9ad8\u5185\u805a\uff09**\uff1a\n    *   **\u573a\u666f**\uff1a\u5c0f\u7535\u7684\u8ba1\u8d39\u89c4\u5219\u975e\u5e38\u590d\u6742\uff0c\u4e0d\u540c\u57ce\u5e02\u3001\u4e0d\u540c\u65f6\u6bb5\u3001\u4e0d\u540c\u4f1a\u5458\u7b49\u7ea7\u6709\u4e0d\u540c\u7684\u5b9a\u4ef7\u7b56\u7565\u3002\n    *   **\u5b9e\u8df5**\uff1a\u6211\u5b9a\u4e49\u4e86 `BillingStrategy` \u63a5\u53e3\uff0c\u7136\u540e\u5b9e\u73b0\u4e86 `NormalBilling`\u3001`MemberBilling`\u3001`NightBilling` \u7b49\u5177\u4f53\u7c7b\u3002\u6bcf\u4e2a\u7c7b\u53ea\u5173\u6ce8\u4e00\u79cd\u8ba1\u8d39\u903b\u8f91\uff0c\u5185\u805a\u6027\u6781\u9ad8\u3002\u65b0\u589e\u4e00\u79cd\u8ba1\u8d39\u7b56\u7565\uff0c\u53ea\u9700\u65b0\u589e\u4e00\u4e2a\u7c7b\uff0c\u65e0\u9700\u4fee\u6539\u539f\u6709\u4ee3\u7801\u3002\n*   **\u4f9d\u8d56\u5012\u7f6e\uff08\u4f4e\u8026\u5408\uff09**\uff1a\n    *   **\u573a\u666f**\uff1a\u4e1a\u52a1\u5c42\u8c03\u7528\u6570\u636e\u5c42\u3002\n    *   **\u5b9e\u8df5**\uff1a\u4e1a\u52a1\u5c42\u5b9a\u4e49\u63a5\u53e3\uff0c\u7531\u57fa\u7840\u8bbe\u65bd\u5c42\u5b9e\u73b0\u3002\u4e1a\u52a1\u5c42\u4e0d\u4f9d\u8d56\u5177\u4f53\u7684\u6570\u636e\u5e93\u5b9e\u73b0\uff08\u5982 MyBatis Mapper\uff09\uff0c\u800c\u662f\u4f9d\u8d56 Repository \u63a5\u53e3\u3002\u8fd9\u4f7f\u5f97\u6211\u4eec\u53ef\u4ee5\u8f7b\u677e\u5c06\u5b58\u50a8\u4ece Redis \u5207\u6362\u5230 MySQL\uff0c\u800c\u4e0d\u5f71\u54cd\u4e1a\u52a1\u4ee3\u7801\u3002\n\n#### 3. \u4ea4\u4e92\u5c42\u9762\uff1a\u6d88\u606f\u9a71\u52a8\u4e0e\u4e8b\u4ef6\u673a\u5236\n\n*   **\u6d88\u606f\u961f\u5217\uff08\u89e3\u8026\u5229\u5668\uff09**\uff1a\n    *   **\u573a\u666f**\uff1a\u7528\u6237\u79df\u501f\u5145\u7535\u5b9d\u6210\u529f\u540e\uff0c\u9700\u8981\u53d1\u77ed\u4fe1\u3001\u9001\u79ef\u5206\u3001\u66f4\u65b0\u7edf\u8ba1\u6570\u636e\u3002\n    *   **\u5b9e\u8df5**\uff1a\u5229\u7528 RocketMQ\uff0c\u8ba2\u5355\u670d\u52a1\u53d1\u5e03 `OrderCreatedEvent` \u6d88\u606f\u3002\u77ed\u4fe1\u670d\u52a1\u3001\u79ef\u5206\u670d\u52a1\u3001\u7edf\u8ba1\u670d\u52a1\u8ba2\u9605\u8be5\u6d88\u606f\u3002\n    *   **\u4ef7\u503c**\uff1a\u8ba2\u5355\u670d\u52a1\u4e0d\u9700\u8981\u5173\u5fc3\u8c01\u5728\u6d88\u8d39\u6d88\u606f\uff0c\u751a\u81f3\u8fd9\u4e9b\u670d\u52a1\u5b95\u673a\u4e86\uff0c\u4e5f\u4e0d\u5f71\u54cd\u7528\u6237\u4e0b\u5355\u3002\u7cfb\u7edf\u5404\u73af\u8282\u5b9e\u73b0\u4e86\u5f7b\u5e95\u7684\u89e3\u8026\u3002\n\n### \u4e09\u3001 \u603b\u7ed3\u4e0e\u6743\u8861\n\n**\u201c\u9ad8\u5185\u805a\u3001\u4f4e\u8026\u5408\u201d\u4e0d\u662f\u7edd\u5bf9\u7684\uff0c\u9700\u8981\u6839\u636e\u4e1a\u52a1\u573a\u666f\u8fdb\u884c\u6743\u8861\u3002**\n\n*   **\u8fc7\u5ea6\u89e3\u8026\u7684\u98ce\u9669**\uff1a\u5982\u679c\u7b80\u5355\u7684 CRUD \u7cfb\u7edf\u4e5f\u5f3a\u884c\u62c6\u5206\u5fae\u670d\u52a1\u3001\u5f15\u5165\u5927\u91cf\u4e2d\u95f4\u4ef6\uff0c\u4f1a\u5bfc\u81f4\u7cfb\u7edf\u590d\u6742\u5ea6\u98d9\u5347\uff0c\u6027\u80fd\u4e0b\u964d\uff08\u7f51\u7edc\u8c03\u7528\u589e\u52a0\uff09\u3002\n*   **\u6211\u7684\u51b3\u7b56\u539f\u5219**\uff1a\n    *   \u5728**\u6838\u5fc3\u4e1a\u52a1\u57df**\uff08\u5982\u4ea4\u6613\u3001\u652f\u4ed8\uff09\uff0c\u575a\u51b3\u8ffd\u6c42\u9ad8\u5185\u805a\u4f4e\u8026\u5408\uff0c\u56e0\u4e3a\u4e1a\u52a1\u89c4\u5219\u590d\u6742\u4e14\u53d8\u5316\u5feb\uff0c\u9700\u8981\u67b6\u6784\u7684\u7075\u6d3b\u6027\u6765\u652f\u6491\u5feb\u901f\u8fed\u4ee3\u3002\n    *   \u5728**\u8fb9\u7f18\u8f85\u52a9\u4e1a\u52a1**\uff08\u5982\u7b80\u5355\u7684\u540e\u53f0\u62a5\u8868\uff09\uff0c\u6211\u4f1a\u9002\u5ea6\u5bb9\u5fcd\u4e00\u5b9a\u7684\u8026\u5408\uff0c\u4f18\u5148\u4fdd\u8bc1\u5f00\u53d1\u6548\u7387\u548c\u7cfb\u7edf\u7b80\u5355\u6027\u3002\n\n\u603b\u7684\u6765\u8bf4\uff0c\u4f5c\u4e3a\u4e00\u540d\u6280\u672f\u4e13\u5bb6\uff0c\u6211\u7684\u76ee\u6807\u5c31\u662f\u901a\u8fc7\u5408\u7406\u7684\u67b6\u6784\u8bbe\u8ba1\uff0c\u5728\u4fdd\u8bc1\u7cfb\u7edf\u7a33\u5b9a\u6027\u7684\u524d\u63d0\u4e0b\uff0c\u901a\u8fc7\u201c\u9ad8\u5185\u805a\u201d\u964d\u4f4e\u6a21\u5757\u5185\u90e8\u7684\u590d\u6742\u5ea6\uff0c\u901a\u8fc7\u201c\u4f4e\u8026\u5408\u201d\u964d\u4f4e\u6a21\u5757\u95f4\u7684\u4f9d\u8d56\u6210\u672c\uff0c\u4ece\u800c\u8ba9\u7cfb\u7edf\u80fd\u591f\u4ece\u5bb9\u5e94\u5bf9\u4e1a\u52a1\u7684\u5feb\u901f\u53d8\u5316\u3002",

    "title": "* \u6309\u4e1a\u52a1\u57df\u62c6",
    "style": "",
    "details": "\u9762\u8bd5\u5b98\u60a8\u597d\uff0c\u6309\u4e1a\u52a1\u57df\u62c6\u5206\u662f\u5fae\u670d\u52a1\u67b6\u6784\u843d\u5730\u4e2d\u6700\u5173\u952e\uff0c\u4e5f\u662f\u6700\u5177\u6311\u6218\u6027\u7684\u4e00\u6b65\u3002\u5982\u679c\u62c6\u5206\u4e0d\u5f53\uff0c\u6781\u6613\u5bfc\u81f4\u670d\u52a1\u62c6\u5206\u8fc7\u7ec6\u53d8\u6210\u201c\u5206\u5e03\u5f0f\u5355\u4f53\u201d\uff0c\u6216\u8005\u62c6\u5206\u8fc7\u5927\u5bfc\u81f4\u201c\u7275\u4e00\u53d1\u800c\u52a8\u5168\u8eab\u201d\u3002\n\n\u7ed3\u5408\u6211\u5728\u5c0f\u7535\u79d1\u6280\u4e3b\u5bfc\u5343\u4e07\u7ea7\u8bbe\u5907\u5168\u94fe\u8def\u7cfb\u7edf\u62c6\u5206\uff0c\u4ee5\u53ca\u5728\u7f51\u6613\u8003\u62c9\u53c2\u4e0e\u5355\u4f53\u670d\u52a1\u91cd\u6784\u7684\u7ecf\u9a8c\uff0c\u6211\u603b\u7ed3\u4e86\u4e00\u5957**\u201c\u6218\u7565\u8bbe\u8ba1\u5148\u884c\uff0c\u6218\u672f\u843d\u5730\u8ddf\u8fdb\u201d**\u7684\u62c6\u5206\u65b9\u6cd5\u8bba\u3002\n\n\u4ee5\u4e0b\u662f\u6211\u7684\u5177\u4f53\u5b9e\u8df5\uff1a\n\n### \u4e00\u3001 \u6838\u5fc3\u65b9\u6cd5\u8bba\uff1aDDD\u6218\u7565\u8bbe\u8ba1\n\n\u6211\u4eec\u62c6\u5206\u7684\u4f9d\u636e\u4e0d\u662f\u6280\u672f\u5c42\u9762\uff08\u5982\u201c\u7528\u6237\u8868\u201d\u3001\u201c\u8ba2\u5355\u8868\u201d\uff09\uff0c\u800c\u662f**\u4e1a\u52a1\u9886\u57df**\u3002\u6211\u901a\u5e38\u9075\u5faa DDD\uff08\u9886\u57df\u9a71\u52a8\u8bbe\u8ba1\uff09\u7684\u65b9\u6cd5\u6765\u754c\u5b9a\u8fb9\u754c\uff1a\n\n1.  **\u8bc6\u522b\u6838\u5fc3\u57df\u3001\u652f\u6491\u57df\u4e0e\u901a\u7528\u57df**\uff1a\n    *   **\u6838\u5fc3\u57df**\uff1a\u516c\u53f8\u7684\u6838\u5fc3\u7ade\u4e89\u529b\u4e1a\u52a1\u3002\u4f8b\u5982\u5728\u5c0f\u7535\uff0c**\u201c\u79df\u501f\u4e1a\u52a1\u57df\u201d**\uff08\u5305\u542b\u8ba1\u8d39\u3001\u8ba2\u5355\u6d41\u8f6c\uff09\u662f\u6838\u5fc3\u57df\uff0c\u6295\u5165\u8d44\u6e90\u6700\u591a\uff0c\u67b6\u6784\u8981\u6c42\u6700\u9ad8\u3002\n    *   **\u652f\u6491\u57df**\uff1a\u4e3a\u6838\u5fc3\u57df\u63d0\u4f9b\u652f\u6301\u3002\u4f8b\u5982**\u201c\u8bbe\u5907\u7ba1\u7406\u57df\u201d**\uff08\u5e93\u5b58\u3001\u7ef4\u4fee\u3001\u8c03\u62e8\uff09\uff0c\u867d\u7136\u4e0d\u662f\u76f4\u63a5\u4ea7\u751f\u6536\u5165\u7684\u4e1a\u52a1\uff0c\u4f46\u6ca1\u6709\u8bbe\u5907\u5c31\u6ca1\u6709\u79df\u501f\u3002\n    *   **\u901a\u7528\u57df**\uff1a\u5404\u884c\u4e1a\u901a\u7528\u7684\u529f\u80fd\u3002\u4f8b\u5982**\u201c\u7528\u6237\u57df\u201d**\u3001**\u201c\u652f\u4ed8\u57df\u201d**\u3001**\u201c\u6d88\u606f\u901a\u77e5\u57df\u201d**\u3002\u8fd9\u4e9b\u53ef\u4ee5\u5feb\u901f\u590d\u7528\u6216\u8d2d\u4e70\u73b0\u6210\u65b9\u6848\u3002\n\n2.  **\u5212\u5206\u9650\u754c\u4e0a\u4e0b\u6587**\uff1a\n    *   \u8fd9\u662f\u62c6\u5206\u7684\u5b9e\u9645\u8fb9\u754c\u3002\u540c\u4e00\u4e2a\u6982\u5ff5\u5728\u4e0d\u540c\u4e0a\u4e0b\u6587\u4e2d\u6709\u4e0d\u540c\u542b\u4e49\u3002\n    *   **\u6848\u4f8b**\uff1a\u201c\u7528\u6237\u201d\u8fd9\u4e2a\u6982\u5ff5\u3002\n        *   \u5728**\u7528\u6237\u57df**\uff0c\u5b83\u662f\u201c\u8d26\u6237\u4fe1\u606f\u201d\uff08ID\u3001\u5bc6\u7801\u3001\u5934\u50cf\uff09\u3002\n        *   \u5728**\u8bbe\u5907\u57df**\uff0c\u5b83\u662f\u201c\u64cd\u4f5c\u5458\u201d\uff08\u6743\u9650\u3001\u8d1f\u8d23\u533a\u57df\uff09\u3002\n        *   \u5728**\u8425\u9500\u57df**\uff0c\u5b83\u662f\u201c\u6d41\u91cf\u201d\uff08\u6807\u7b7e\u3001\u6d3b\u8dc3\u5ea6\uff09\u3002\n    *   **\u62c6\u5206\u51b3\u7b56**\uff1a\u6211\u4eec\u4e0d\u5e94\u5efa\u7acb\u4e00\u4e2a\u5de8\u5927\u7684\u201c\u7528\u6237\u4e2d\u5fc3\u201d\u6765\u627f\u8f7d\u6240\u6709\u903b\u8f91\uff0c\u800c\u5e94\u5728\u5404\u81ea\u57df\u5185\u4fdd\u7559\u8be5\u57df\u7279\u6709\u7684\u7528\u6237\u89c6\u56fe\uff0c\u901a\u8fc7ID\u5173\u8054\u3002\n\n### \u4e8c\u3001 \u5b9e\u6218\u6848\u4f8b\uff1a\u5c0f\u7535\u79d1\u6280\u5168\u94fe\u8def\u4e1a\u52a1\u62c6\u5206\n\n\u5728\u4e3b\u5bfc\u5c0f\u7535\u7684\u67b6\u6784\u6f14\u8fdb\u65f6\uff0c\u6211\u5c06\u539f\u672c\u8026\u5408\u4e25\u91cd\u7684\u5355\u4f53\u7cfb\u7edf\uff0c\u6309\u4e1a\u52a1\u57df\u62c6\u5206\u4e3a\u4ee5\u4e0b\u6838\u5fc3\u670d\u52a1\u96c6\u7fa4\uff1a\n\n#### 1. \u8bbe\u5907\u57df\n*   **\u4e1a\u52a1\u903b\u8f91**\uff1a\u8d1f\u8d23\u8bbe\u5907\u7684\u5168\u751f\u547d\u5468\u671f\u7ba1\u7406\uff0c\u5305\u62ec\u751f\u4ea7\u5f55\u5165\u3001\u5165\u5e93\u3001\u51fa\u5e93\u3001\u5b89\u88c5\u3001\u7ef4\u4fee\u3001\u62a5\u5e9f\u3002\n*   **\u62c6\u5206\u7406\u7531**\uff1a\u8bbe\u5907\u662f\u5171\u4eab\u5145\u7535\u5b9d\u7684\u201c\u8d44\u4ea7\u6838\u5fc3\u201d\uff0c\u5176\u6570\u636e\u6a21\u578b\uff08\u8bbe\u5907ID\u3001\u673a\u67dc\u53f7\u3001\u69fd\u4f4d\u53f7\uff09\u4e0e\u7528\u6237\u4ea4\u6613\u5b8c\u5168\u4e0d\u540c\u3002\u8bbe\u5907\u72b6\u6001\u53d8\u66f4\u9891\u7387\u4f4e\uff0c\u4f46\u6570\u636e\u91cf\u5927\uff08\u5343\u4e07\u7ea7\uff09\uff0c\u9700\u8981\u72ec\u7acb\u7684\u5206\u5e93\u5206\u8868\u7b56\u7565\u3002\n*   **\u6838\u5fc3\u80fd\u529b**\uff1a\u63d0\u4f9b\u8bbe\u5907\u8be6\u60c5\u67e5\u8be2\u3001\u69fd\u4f4d\u72b6\u6001\u53d8\u66f4\u63a5\u53e3\u3002\n\n#### 2. \u4ea4\u6613/\u8ba2\u5355\u57df\n*   **\u4e1a\u52a1\u903b\u8f91**\uff1a\u5904\u7406\u79df\u501f\u3001\u5f52\u8fd8\u3001\u8ba1\u8d39\u3001\u8ba2\u5355\u751f\u6210\u3001\u9000\u6b3e\u3002\n*   **\u62c6\u5206\u7406\u7531**\uff1a\u8fd9\u662f**\u9ad8\u5e76\u53d1\u6838\u5fc3\u57df**\u3002\u79df\u501f\u548c\u5f52\u8fd8\u662f\u5178\u578b\u7684\u201c\u5199\u591a\u8bfb\u591a\u201d\u573a\u666f\uff0c\u4e14\u5bf9\u4e8b\u52a1\u4e00\u81f4\u6027\u8981\u6c42\u6781\u9ad8\uff08\u4e0d\u80fd\u591a\u6263\u94b1\uff0c\u4e5f\u4e0d\u80fd\u5c11\u6263\u94b1\uff09\u3002\u5c06\u5176\u72ec\u7acb\u51fa\u6765\uff0c\u53ef\u4ee5\u9488\u5bf9\u6027\u5730\u505a\u6027\u80fd\u4f18\u5316\uff08\u5982\u5185\u5b58\u8ba1\u7b97\u3001\u5f02\u6b65\u843d\u76d8\uff09\uff0c\u800c\u4e0d\u53d7\u8bbe\u5907\u5e93\u5b58\u7b49\u5176\u4ed6\u903b\u8f91\u7684\u5e72\u6270\u3002\n\n#### 3. \u5e93\u5b58/\u8c03\u5ea6\u57df\n*   **\u4e1a\u52a1\u903b\u8f91**\uff1a\u7ba1\u7406\u8bbe\u5907\u7684\u5e93\u5b58\u6d41\u8f6c\uff0c\u5982\u4ece\u603b\u4ed3\u5230\u5206\u4ed3\uff0c\u4ece\u5206\u4ed3\u5230\u95e8\u5e97\u3002\n*   **\u62c6\u5206\u7406\u7531**\uff1a\u8fd9\u662f\u4e00\u4e2a\u5178\u578b\u7684\u201c\u4f9b\u5e94\u94fe\u903b\u8f91\u201d\uff0c\u4e0e\u7ebf\u4e0a\u7684\u201c\u79df\u501f\u903b\u8f91\u201d\u89e3\u8026\u3002\u8fd0\u8425\u4eba\u5458\u8c03\u6574\u5e93\u5b58\uff0c\u4e0d\u5e94\u5f71\u54cd\u7528\u6237\u4e0b\u5355\u3002\u6211\u4eec\u5c06\u5e93\u5b58\u64cd\u4f5c\u5c01\u88c5\u5728\u9886\u57df\u670d\u52a1\u5185\u90e8\uff0c\u901a\u8fc7\u9886\u57df\u4e8b\u4ef6\uff08\u5982`OrderCreatedEvent`\uff09\u89e6\u53d1\u5e93\u5b58\u9884\u5360\u6216\u91ca\u653e\u3002\n\n#### 4. \u8425\u9500/\u4f1a\u5458\u57df\n*   **\u4e1a\u52a1\u903b\u8f91**\uff1a\u4f18\u60e0\u5238\u3001\u79ef\u5206\u3001\u4f1a\u5458\u6743\u76ca\u3002\n*   **\u62c6\u5206\u7406\u7531**\uff1a\u5c5e\u4e8e**\u901a\u7528\u57df**\uff0c\u53d8\u5316\u6781\u5176\u9891\u7e41\uff08\u5404\u79cd\u5927\u4fc3\u6d3b\u52a8\uff09\u3002\u72ec\u7acb\u62c6\u5206\u540e\uff0c\u8fd0\u8425\u56e2\u961f\u53ef\u4ee5\u9891\u7e41\u4e0a\u7ebf\u65b0\u6d3b\u52a8\uff0c\u5373\u4f7f\u8425\u9500\u670d\u52a1\u6302\u4e86\uff0c\u4e5f\u4e0d\u4f1a\u5f71\u54cd\u7528\u6237\u7684\u6838\u5fc3\u79df\u501f\u6d41\u7a0b\uff08\u53ea\u662f\u4e0d\u80fd\u4f18\u60e0\u800c\u5df2\uff09\uff0c\u4fdd\u8bc1\u4e86\u6838\u5fc3\u4e1a\u52a1\u7684\u7a33\u5b9a\u6027\u3002\n\n### \u4e09\u3001 \u62c6\u5206\u540e\u7684\u534f\u4f5c\u673a\u5236\uff08\u89e3\u8026\u5173\u952e\uff09\n\n\u62c6\u5206\u53ea\u662f\u7b2c\u4e00\u6b65\uff0c\u5982\u4f55\u8ba9\u62c6\u5206\u540e\u7684\u670d\u52a1\u534f\u4f5c\u624d\u662f\u96be\u70b9\u3002\u6211\u4e3b\u8981\u91c7\u53d6\u4e86\u4ee5\u4e0b\u63aa\u65bd\uff1a\n\n1.  **\u670d\u52a1\u7f51\u5173**\uff1a\n    *   \u4f5c\u4e3a\u7edf\u4e00\u5165\u53e3\uff0c\u8d1f\u8d23\u8def\u7531\u3001\u9274\u6743\u3001\u9650\u6d41\u3002\u524d\u7aef\u65e0\u9700\u77e5\u9053\u540e\u7aef\u6709\u591a\u5c11\u4e2a\u670d\u52a1\uff0c\u53ea\u9700\u8c03\u7528\u7f51\u5173API\u3002\n\n2.  **\u9886\u57df\u4e8b\u4ef6\u9a71\u52a8**\uff1a\n    *   **\u5f3a\u89e3\u8026\u5229\u5668**\u3002\u4f8b\u5982\uff0c\u7528\u6237\u5f52\u8fd8\u5145\u7535\u5b9d\u540e\uff0c\u4ea4\u6613\u57df\u53d1\u5e03 `OrderFinishedEvent`\u3002\n    *   **\u6d88\u8d39\u65b9**\uff1a\n        *   **\u8bbe\u5907\u57df**\u8ba2\u9605\u8be5\u4e8b\u4ef6 -> \u4fee\u6539\u69fd\u4f4d\u72b6\u6001\u4e3a\u201c\u7a7a\u95f2\u201d\u3002\n        *   **\u8425\u9500\u57df**\u8ba2\u9605\u8be5\u4e8b\u4ef6 -> \u53d1\u653e\u79ef\u5206/\u4f18\u60e0\u5238\u3002\n        *   **\u6570\u636e\u57df**\u8ba2\u9605\u8be5\u4e8b\u4ef6 -> \u5b9e\u65f6\u7edf\u8ba1\u8425\u6536\u3002\n    *   **\u4ef7\u503c**\uff1a\u4ea4\u6613\u57df\u4e0d\u9700\u8981\u5173\u5fc3\u8c01\u5728\u6d88\u8d39\uff0c\u65b0\u589e\u4e1a\u52a1\u903b\u8f91\u53ea\u9700\u589e\u52a0\u6d88\u8d39\u8005\uff0c\u5b8c\u5168\u7b26\u5408\u5f00\u95ed\u539f\u5219\u3002\n\n3.  **\u9632\u8150\u5c42**\uff1a\n    *   \u5728\u5bf9\u63a5\u7b2c\u4e09\u65b9\u7cfb\u7edf\uff08\u5982\u5fae\u4fe1\u652f\u4ed8\u3001\u9ad8\u5fb7\u5730\u56fe\uff09\u65f6\uff0c\u6211\u4f1a\u5728\u4e1a\u52a1\u57df\u5185\u90e8\u5efa\u7acb\u9632\u8150\u5c42\u3002\n    *   \u5c06\u7b2c\u4e09\u65b9\u7684\u6570\u636e\u6a21\u578b\u8f6c\u5316\u4e3a\u6211\u65b9\u7684\u9886\u57df\u6a21\u578b\u3002\u8fd9\u6837\u5f53\u7b2c\u4e09\u65b9\u63a5\u53e3\u53d8\u66f4\u65f6\uff0c\u53ea\u9700\u4fee\u6539\u9632\u8150\u5c42\u4ee3\u7801\uff0c\u6838\u5fc3\u4e1a\u52a1\u903b\u8f91\u4e0d\u53d7\u5f71\u54cd\u3002\n\n### \u56db\u3001 \u62c6\u5206\u7684\u6536\u76ca\u4e0e\u6311\u6218\n\n**\u6536\u76ca**\uff1a\n*   **\u5f00\u53d1\u6548\u7387\u63d0\u5347**\uff1a\u4e0d\u540c\u56e2\u961f\uff08\u8bbe\u5907\u7ec4\u3001\u4ea4\u6613\u7ec4\uff09\u5e76\u884c\u5f00\u53d1\uff0c\u4e92\u4e0d\u5e72\u6270\u3002\n*   **\u6280\u672f\u6808\u81ea\u7531**\uff1a\u8bbe\u5907\u57df\u56e0\u4e3a\u4e3b\u8981\u662fCRUD\u548c\u72b6\u6001\u7ba1\u7406\uff0c\u6211\u4eec\u5c1d\u8bd5\u4e86Go\u8bed\u8a00\u91cd\u6784\u4ee5\u63d0\u5347\u6027\u80fd\uff1b\u800c\u4ea4\u6613\u57df\u4fdd\u6301Java\u6808\u4ee5\u5229\u7528\u5176\u5f3a\u5927\u7684\u751f\u6001\u3002\u53ea\u8981\u63a5\u53e3\u534f\u8bae\u4e00\u81f4\uff0c\u6280\u672f\u6808\u53ef\u4ee5\u5f02\u6784\u3002\n*   **\u6545\u969c\u9694\u79bb**\uff1a\u8425\u9500\u670d\u52a1\u56e0\u4e3a\u6d3b\u52a8\u706b\u7206\u5b95\u673a\uff0c\u4e0d\u4f1a\u5bfc\u81f4\u7528\u6237\u65e0\u6cd5\u5f52\u8fd8\u5145\u7535\u5b9d\u3002\n\n**\u6311\u6218\u4e0e\u5e94\u5bf9**\uff1a\n*   **\u5206\u5e03\u5f0f\u4e8b\u52a1**\uff1a\u62c6\u5206\u540e\uff0c\u8de8\u57df\u4e8b\u52a1\u662f\u6700\u5927\u96be\u9898\u3002\u6211\u91c7\u7528\u4e86**TCC**\uff08Try-Confirm-Cancel\uff09\u6a21\u5f0f\u5904\u7406\u6838\u5fc3\u4ea4\u6613\u94fe\u8def\uff0c\u5229\u7528**\u672c\u5730\u6d88\u606f\u8868**+**\u5b9a\u65f6\u4efb\u52a1**\u4fdd\u8bc1\u6700\u7ec8\u4e00\u81f4\u6027\u3002\n*   **\u6570\u636e\u5173\u8054\u67e5\u8be2**\uff1a\u62c6\u5206\u540e\u65e0\u6cd5\u8de8\u5e93Join\u3002\u6211\u7684\u65b9\u6848\u662f\u5728**\u5e94\u7528\u5c42\u7ec4\u88c5**\uff08\u7b80\u5355\u573a\u666f\uff09\u6216\u6784\u5efa**ElasticSearch\u5bbd\u8868**\uff08\u590d\u6742\u67e5\u8be2\u573a\u666f\uff09\uff0c\u901a\u8fc7\u6570\u636e\u540c\u6b65\u673a\u5236\u5c06\u5404\u57df\u6570\u636e\u6c47\u805a\u5230ES\u4e2d\u4f9b\u67e5\u8be2\u3002\n\n### \u603b\u7ed3\n\n\u6309\u4e1a\u52a1\u57df\u62c6\u5206\uff0c\u672c\u8d28\u4e0a\u662f**\u5c06\u4e1a\u52a1\u590d\u6742\u5ea6\u901a\u8fc7\u67b6\u6784\u624b\u6bb5\u8fdb\u884c\u5206\u6cbb**\u3002\u8fd9\u4e0d\u4ec5\u9700\u8981\u6df1\u539a\u7684\u6280\u672f\u529f\u5e95\u6765\u5904\u7406\u5206\u5e03\u5f0f\u5e26\u6765\u7684\u6280\u672f\u6311\u6218\uff0c\u66f4\u9700\u8981\u5bf9\u4e1a\u52a1\u6709\u6df1\u523b\u7684\u7406\u89e3\uff0c\u624d\u80fd\u5212\u6e05\u90a3\u6761\u201c\u9ad8\u5185\u805a\u3001\u4f4e\u8026\u5408\u201d\u7684\u8fb9\u754c\u7ebf\u3002\u8fd9\u4e5f\u662f\u6211\u4f5c\u4e3a\u6280\u672f\u4e13\u5bb6\uff0c\u5728\u67b6\u6784\u8bbe\u8ba1\u4e2d\u6838\u5fc3\u4ef7\u503c\u7684\u4f53\u73b0\u3002",

  "277": {
    "title": "\u5982\u4f55\u4fdd\u8bc1\u5206\u5e03\u5f0f\u4e00\u81f4\u6027\uff1f",
    "style": "background-color: yellow;",
    "details": "\u9762\u8bd5\u5b98\u60a8\u597d\uff0c\u8fd9\u662f\u4e00\u4e2a\u975e\u5e38\u7ecf\u5178\u4e14\u6781\u5177\u6311\u6218\u6027\u7684\u67b6\u6784\u95ee\u9898\u3002\u5728\u5206\u5e03\u5f0f\u7cfb\u7edf\u4e2d\uff0c\u7531\u4e8e\u7f51\u7edc\u7684\u4e0d\u786e\u5b9a\u6027\uff08\u7f51\u7edc\u5206\u533a\uff09\u548c\u8282\u70b9\u6545\u969c\u7684\u5fc5\u7136\u6027\uff0c\u60f3\u8981\u4e25\u683c\u4fdd\u8bc1 ACID \u7279\u6027\uff08\u5f3a\u4e00\u81f4\u6027\uff09\u5f80\u5f80\u9700\u8981\u727a\u7272\u5de8\u5927\u7684\u6027\u80fd\u4ee3\u4ef7\u3002\n\n\u5728\u5b9e\u9645\u7684\u67b6\u6784\u8bbe\u8ba1\u4e2d\uff0c\u6211\u901a\u5e38\u9075\u5faa**\u201c\u6839\u636e\u4e1a\u52a1\u573a\u666f\u9009\u62e9\u4e00\u81f4\u6027\u6a21\u578b\u201d**\u7684\u539f\u5219\uff0c\u4e3b\u8981\u4ece**\u5f3a\u4e00\u81f4\u6027**\u548c**\u6700\u7ec8\u4e00\u81f4\u6027**\u4e24\u4e2a\u7ef4\u5ea6\u6765\u89e3\u51b3\u3002\u4ee5\u4e0b\u662f\u6211\u5728\u5c0f\u7535\u79d1\u6280\u548c\u7f51\u6613\u8003\u62c9\u9879\u76ee\u4e2d\u79ef\u7d2f\u7684\u5b9e\u6218\u65b9\u6848\uff1a\n\n### \u4e00\u3001 \u6838\u5fc3\u7406\u8bba\uff1aCAP \u4e0e BASE\n\n\u9996\u5148\u660e\u786e\u7406\u8bba\u4f9d\u636e\uff1a\n*   **CAP \u5b9a\u7406**\uff1a\u4e00\u81f4\u6027\uff08C\uff09\u3001\u53ef\u7528\u6027\uff08A\uff09\u3001\u5206\u533a\u5bb9\u9519\u6027\uff08P\uff09\u4e09\u8005\u4e0d\u53ef\u517c\u5f97\u3002\u5728\u5206\u5e03\u5f0f\u67b6\u6784\u4e2d\uff0cP \u662f\u5ba2\u89c2\u5b58\u5728\u4e14\u5fc5\u987b\u9762\u5bf9\u7684\uff0c\u56e0\u6b64\u6211\u4eec\u901a\u5e38\u8981\u5728 C \u548c A \u4e4b\u95f4\u505a\u6743\u8861\u3002\n*   **BASE \u7406\u8bba**\uff1a\u5b83\u662f CAP \u4e2d AP \u65b9\u6848\u7684\u5ef6\u4f38\u3002\u6838\u5fc3\u601d\u60f3\u662f\uff1a\u57fa\u672c\u53ef\u7528\u3001\u8f6f\u72b6\u6001\u3001\u6700\u7ec8\u4e00\u81f4\u6027\u3002\u8fd9\u662f\u4e92\u8054\u7f51\u9ad8\u5e76\u53d1\u573a\u666f\u4e0b\u7684\u4e3b\u6d41\u9009\u62e9\u3002\n\n---\n\n### \u4e8c\u3001 \u65b9\u6848\u4e00\uff1a\u5f3a\u4e00\u81f4\u6027\n\n\u9002\u7528\u4e8e\u5bf9\u6570\u636e\u51c6\u786e\u6027\u8981\u6c42\u6781\u9ad8\u3001\u751a\u81f3\u6d89\u53ca\u8d44\u91d1\u5b89\u5168\u7684\u573a\u666f\uff08\u5982\u652f\u4ed8\u6838\u5fc3\u3001\u8d26\u6237\u6263\u6b3e\uff09\u3002\n\n#### 1. \u5206\u5e03\u5f0f\u9501+ \u6570\u636e\u5e93\u4e8b\u52a1\n*   **\u573a\u666f**\uff1a\u5728\u5171\u4eab\u5145\u7535\u5b9d\u79df\u8d41\u573a\u666f\u4e2d\uff0c\u9632\u6b62\u540c\u4e00\u53f0\u8bbe\u5907\u88ab\u4e24\u4e2a\u7528\u6237\u540c\u65f6\u79df\u501f\u3002\n*   **\u65b9\u6848**\uff1a\n    *   \u4f7f\u7528 **Redis (Redisson)** \u6216 **Zookeeper** \u5b9e\u73b0\u5206\u5e03\u5f0f\u9501\u3002\n    *   \u6d41\u7a0b\uff1a\u83b7\u53d6\u9501 -> \u67e5\u8be2\u8bbe\u5907\u72b6\u6001 -> \u521b\u5efa\u8ba2\u5355 -> \u66f4\u65b0\u8bbe\u5907\u72b6\u6001 -> \u91ca\u653e\u9501\u3002\n    *   **\u6ce8\u610f\u70b9**\uff1a\u5fc5\u987b\u8bbe\u7f6e\u9501\u8d85\u65f6\u65f6\u95f4\uff0c\u9632\u6b62\u6b7b\u9501\uff1b\u8981\u8003\u8651\u9501\u7684\u8bef\u5220\u9664\u95ee\u9898\uff08\u901a\u8fc7 Lua \u811a\u672c\u4fdd\u8bc1\u539f\u5b50\u6027\uff09\u3002\n\n#### 2. \u5206\u5e03\u5f0f\u4e8b\u52a1\uff082PC / 3PC / Seata AT \u6a21\u5f0f\uff09\n*   **\u573a\u666f**\uff1a\u8de8\u670d\u52a1\u7684\u6570\u636e\u5e93\u64cd\u4f5c\uff0c\u8981\u6c42\u5b9e\u65f6\u4e00\u81f4\u3002\n*   **\u65b9\u6848**\uff1a\n    *   \u65e9\u671f\u6211\u4eec\u4f7f\u7528 **Seata (AT \u6a21\u5f0f)**\u3002\u5b83\u901a\u8fc7\u81ea\u52a8\u89e3\u6790 SQL \u751f\u6210\u524d\u540e\u955c\u50cf\uff0c\u5b9e\u73b0\u65e0\u4fb5\u5165\u7684\u5206\u5e03\u5f0f\u4e8b\u52a1\u3002\n    *   **\u7f3a\u70b9**\uff1a\u867d\u7136 AT \u6a21\u5f0f\u7b80\u5355\uff0c\u4f46\u5728\u9ad8\u5e76\u53d1\u4e0b\u5b58\u5728\u5168\u5c40\u9501\u7ade\u4e89\uff0c\u6027\u80fd\u635f\u8017\u8f83\u5927\uff0c\u4e14\u4e25\u91cd\u4f9d\u8d56\u6570\u636e\u5e93\u3002\u56e0\u6b64\uff0c\u5728\u6838\u5fc3\u4ea4\u6613\u94fe\u8def\uff0c\u6211\u4eec\u8f83\u5c11\u4f7f\u7528\u5f3a\u4e00\u81f4\u7684 2PC\uff0c\u66f4\u591a\u8f6c\u5411 TCC\u3002\n\n#### 3. TCC (Try-Confirm-Cancel)\n*   **\u573a\u666f**\uff1a\u9ad8\u5e76\u53d1\u4e0b\u7684\u8d44\u91d1\u6d41\u8f6c\u3001\u8d44\u6e90\u9884\u7559\u3002\u4f8b\u5982\uff1a\u7528\u6237\u79df\u501f\u5145\u7535\u5b9d\uff0c\u5148\u51bb\u7ed3\u62bc\u91d1\uff08Try\uff09\uff0c\u79df\u501f\u6210\u529f\u540e\u6263\u6b3e\uff0c\u5931\u8d25\u5219\u89e3\u51bb\u3002\n*   **\u65b9\u6848**\uff1a\n    *   **Try**\uff1a\u68c0\u67e5\u8d44\u6e90\uff0c\u9884\u7559\u8d44\u6e90\uff08\u5982\uff1a\u8d26\u6237\u4f59\u989d\u51bb\u7ed3 10 \u5143\uff09\u3002\n    *   **Confirm**\uff1a\u786e\u8ba4\u6267\u884c\uff08\u5982\uff1a\u6263\u9664\u51bb\u7ed3\u7684 10 \u5143\uff09\u3002\n    *   **Cancel**\uff1a\u53d6\u6d88\u6267\u884c\uff08\u5982\uff1a\u89e3\u51bb 10 \u5143\uff09\u3002\n    *   **\u4f18\u52bf**\uff1a\u76f8\u6bd4 2PC\uff0c\u9501\u7684\u7c92\u5ea6\u66f4\u5c0f\uff0c\u6027\u80fd\u66f4\u9ad8\u3002\n    *   **\u96be\u70b9**\uff1a\u4ee3\u7801\u4fb5\u5165\u6027\u5f3a\uff0c\u9700\u8981\u5904\u7406\u7a7a\u56de\u6eda\u3001\u60ac\u6302\u7b49\u5f02\u5e38\u8fb9\u754c\u60c5\u51b5\u3002\u6211\u5728\u5c0f\u7535\u79d1\u6280\u7684\u7ed3\u7b97\u7cfb\u7edf\u4e2d\uff0c\u901a\u8fc7\u81ea\u7814\u7684 TCC \u6846\u67b6\u89e3\u51b3\u4e86\u5546\u6237\u5206\u8d26\u7684\u4e00\u81f4\u6027\u95ee\u9898\u3002\n\n---\n\n### \u4e09\u3001 \u65b9\u6848\u4e8c\uff1a\u6700\u7ec8\u4e00\u81f4\u6027\n\n\u9002\u7528\u4e8e\u4e92\u8054\u7f51\u9ad8\u5e76\u53d1\u4e1a\u52a1\uff0c\u5141\u8bb8\u6570\u636e\u6709\u77ed\u6682\u5ef6\u8fdf\uff0c\u4f46\u6700\u7ec8\u5fc5\u987b\u4e00\u81f4\u3002\u8fd9\u662f\u6211\u5728\u7535\u5546\u548c\u5171\u4eab\u7ecf\u6d4e\u9879\u76ee\u4e2d**\u6700\u5e38\u7528**\u7684\u65b9\u6848\u3002\n\n#### 1. \u672c\u5730\u6d88\u606f\u8868+ MQ\uff08\u53ef\u9760\u6d88\u606f\u6700\u7ec8\u4e00\u81f4\u6027\uff09\n\u8fd9\u662f\u6211\u6700\u63a8\u5d07\u7684\u65b9\u6848\u4e4b\u4e00\uff0c\u89e3\u51b3\u4e86\u201c\u4e1a\u52a1\u64cd\u4f5c\u201d\u4e0e\u201c\u6d88\u606f\u53d1\u9001\u201d\u7684\u4e00\u81f4\u6027\u95ee\u9898\u3002\n*   **\u573a\u666f**\uff1a\u8ba2\u5355\u521b\u5efa\u6210\u529f\u540e\uff0c\u53d1\u9001\u6d88\u606f\u7ed9\u79ef\u5206\u670d\u52a1\u589e\u52a0\u79ef\u5206\u3002\n*   **\u65b9\u6848**\uff1a\n    1.  **\u4e0a\u6e38\u670d\u52a1**\uff1a\u5728\u540c\u4e00\u4e2a\u672c\u5730\u6570\u636e\u5e93\u4e8b\u52a1\u4e2d\uff0c\u5199\u5165\u4e1a\u52a1\u6570\u636e + \u5199\u5165\u4e00\u6761\u201c\u5f85\u53d1\u9001\u201d\u72b6\u6001\u7684\u6d88\u606f\u8bb0\u5f55\u3002\n    2.  **\u6d88\u606f\u6295\u9012**\uff1a\u901a\u8fc7\u5b9a\u65f6\u4efb\u52a1\u626b\u63cf\u8be5\u8868\uff0c\u5c06\u72b6\u6001\u4e3a\u201c\u5f85\u53d1\u9001\u201d\u7684\u6d88\u606f\u6295\u9012\u5230 MQ\uff0c\u5e76\u66f4\u65b0\u72b6\u6001\u4e3a\u201c\u5df2\u53d1\u9001\u201d\u3002\n    3.  **\u4e0b\u6e38\u670d\u52a1**\uff1a\u76d1\u542c MQ \u6d88\u8d39\u6d88\u606f\u3002\u6d88\u8d39\u6210\u529f\u540e\uff0c\u53d1\u9001 ACK \u7ed9 MQ\u3002\n    4.  **\u515c\u5e95**\uff1a\u5982\u679c\u4e0b\u6e38\u6d88\u8d39\u5931\u8d25\uff0c\u5229\u7528 MQ \u7684\u91cd\u8bd5\u673a\u5236\uff1b\u5982\u679c\u591a\u6b21\u91cd\u8bd5\u5931\u8d25\uff0c\u8f6c\u5165\u4eba\u5de5\u5904\u7406\u6216\u6b7b\u4fe1\u961f\u5217\u3002\n*   **\u4f18\u52bf**\uff1a\u5b8c\u5168\u89e3\u8026\uff0c\u4e14\u4fdd\u8bc1\u4e86\u6d88\u606f\u4e0d\u4e22\u5931\uff0c\u5b9e\u73b0\u4e86 100% \u7684\u6700\u7ec8\u4e00\u81f4\u6027\u3002\n\n#### 2. \u4e8b\u52a1\u6d88\u606f\uff08RocketMQ\uff09\n\u8fd9\u662f\u963f\u91cc\u8d21\u732e\u7684\u89e3\u51b3\u65b9\u6848\uff0c\u539f\u7406\u7c7b\u4f3c\u201c\u672c\u5730\u6d88\u606f\u8868\u201d\uff0c\u4f46\u628a\u626b\u63cf\u548c\u6295\u9012\u7684\u5de5\u4f5c\u4ea4\u7ed9\u4e86 MQ \u5185\u6838\u3002\n*   **\u65b9\u6848**\uff1a\n    1.  \u53d1\u9001\u534a\u6d88\u606f\uff1aMQ \u6536\u5230\u6d88\u606f\u4f46\u4e0d\u5bf9\u4e0b\u6e38\u53ef\u89c1\u3002\n    2.  \u6267\u884c\u672c\u5730\u4e8b\u52a1\uff1a\u6267\u884c\u6570\u636e\u5e93\u64cd\u4f5c\u3002\n    3.  \u63d0\u4ea4/\u56de\u6eda\u6d88\u606f\uff1a\u6839\u636e\u672c\u5730\u4e8b\u52a1\u7ed3\u679c\uff0c\u901a\u77e5 MQ \u63d0\u4ea4\uff08\u6d88\u606f\u53ef\u89c1\uff09\u6216\u56de\u6eda\uff08\u6d88\u606f\u4e22\u5f03\uff09\u3002\n    4.  **\u56de\u67e5\u673a\u5236**\uff1a\u5982\u679c MQ \u6536\u4e0d\u5230 Commit/Rollback \u6307\u4ee4\uff08\u6bd4\u5982\u7f51\u7edc\u65ad\u4e86\uff09\uff0c\u4f1a\u4e3b\u52a8\u56de\u67e5\u672c\u5730\u4e8b\u52a1\u72b6\u6001\u3002\n*   **\u4f18\u52bf**\uff1a\u76f8\u6bd4\u672c\u5730\u6d88\u606f\u8868\uff0c\u51cf\u5c11\u4e86 DB \u626b\u63cf\u538b\u529b\uff0c\u5b9e\u73b0\u66f4\u8f7b\u91cf\u3002\n\n#### 3. \u6700\u5927\u52aa\u529b\u901a\u77e5\n*   **\u573a\u666f**\uff1a\u5bf9\u63a5\u7b2c\u4e09\u65b9\u652f\u4ed8\uff08\u5fae\u4fe1/\u652f\u4ed8\u5b9d\uff09\u56de\u8c03\u3002\n*   **\u65b9\u6848**\uff1a\n    *   \u652f\u4ed8\u6210\u529f\u540e\uff0c\u652f\u4ed8\u5b9d\u56de\u8c03\u6211\u4eec\u7684\u63a5\u53e3\u3002\u5982\u679c\u6211\u4eec\u7684\u7cfb\u7edf\u6302\u4e86\uff0c\u652f\u4ed8\u5b9d\u4f1a\u901a\u8fc7\u9012\u589e\u7684\u65f6\u95f4\u95f4\u9694\uff08\u5982 1m, 5m, 10m...\uff09\u91cd\u8bd5\u591a\u6b21\u3002\n    *   \u6211\u4eec\u8fd9\u8fb9\u4e5f\u8981\u6709\u4e00\u4e2a\u5b9a\u65f6\u4efb\u52a1\uff0c\u4e3b\u52a8\u67e5\u8be2\u652f\u4ed8\u72b6\u6001\uff0c\u4f5c\u4e3a\u515c\u5e95\u3002\n*   **\u7279\u70b9**\uff1a\u4e0d\u4fdd\u8bc1 100% \u6210\u529f\uff0c\u4f46\u201c\u6700\u5927\u52aa\u529b\u201d\u53bb\u901a\u77e5\uff0c\u901a\u5e38\u914d\u5408\u4eba\u5de5\u8865\u507f\u6d41\u7a0b\u3002\n\n---\n\n### \u56db\u3001 \u65b9\u6848\u4e09\uff1a\u8865\u507f\u673a\u5236\uff08SAGA \u6a21\u5f0f\uff09\n\n\u5f53\u4e1a\u52a1\u94fe\u8def\u975e\u5e38\u957f\u65f6\uff08\u5982\uff1a\u4e0b\u5355 -> \u6263\u5e93\u5b58 -> \u6263\u79ef\u5206 -> \u53d1\u4f18\u60e0\u5238\u9762\u8bd5\u5b98\u60a8\u597d\uff0c\u5206\u5e03\u5f0f\u4e00\u81f4\u6027\u662f\u5206\u5e03\u5f0f\u7cfb\u7edf\u67b6\u6784\u4e2d\u6700\u6838\u5fc3\u3001\u4e5f\u662f\u6700\u96be\u7684\u6311\u6218\u4e4b\u4e00\u3002\u5728\u6211\u7684\u67b6\u6784\u5b9e\u8df5\u4e2d\uff0c\u5904\u7406\u8fc7\u5927\u91cf\u6d89\u53ca\u8d44\u91d1\u6d41\u8f6c\uff08\u652f\u4ed8\u5206\u8d26\uff09\u548c\u8bbe\u5907\u72b6\u6001\u540c\u6b65\u7684\u573a\u666f\uff0c\u6211\u5bf9\u8fd9\u4e00\u95ee\u9898\u6709\u6df1\u5165\u7684\u5b9e\u6218\u603b\u7ed3\u3002\n\n\u9996\u5148\u9700\u8981\u660e\u786e\u4e00\u70b9\uff1a\u5728\u5206\u5e03\u5f0f\u67b6\u6784\u4e0b\uff0c\u6211\u4eec\u901a\u5e38**\u65e0\u6cd5\u4fdd\u8bc1\u5f3a\u4e00\u81f4\u6027\uff08CP\uff09**\uff0c\u56e0\u4e3a\u8fd9\u4f1a\u4e25\u91cd\u727a\u7272\u53ef\u7528\u6027\uff08AP\uff09\u3002\u5728\u5b9e\u9645\u751f\u4ea7\u4e2d\uff0c\u6211\u4eec\u8ffd\u6c42\u7684\u662f**\u6700\u7ec8\u4e00\u81f4\u6027**\u3002\n\n\u9488\u5bf9\u4e0d\u540c\u7684\u4e1a\u52a1\u573a\u666f\uff0c\u6211\u901a\u5e38\u4f1a\u91c7\u7528\u4ee5\u4e0b\u56db\u79cd\u4e3b\u6d41\u65b9\u6848\uff1a\n\n### \u4e00\u3001 \u5206\u5e03\u5f0f\u9501\u2014\u2014 \u9002\u7528\u4e8e\u201c\u5e76\u53d1\u63a7\u5236\u201d\u573a\u666f\n\n\u8fd9\u89e3\u51b3\u7684\u662f\u201c\u591a\u673a\u5e76\u53d1\u8bbf\u95ee\u5171\u4eab\u8d44\u6e90\u201d\u5bfc\u81f4\u7684\u6570\u636e\u4e0d\u4e00\u81f4\u95ee\u9898\uff0c\u800c\u4e0d\u662f\u4e8b\u52a1\u95ee\u9898\u3002\n\n*   **\u573a\u666f**\uff1a\u6bd4\u5982\u8bbe\u5907\u501f\u8fd8\u65f6\u7684\u5e93\u5b58\u6263\u51cf\u3001\u79d2\u6740\u6d3b\u52a8\u3002\n*   **\u65b9\u6848**\uff1a\u4f7f\u7528 Redis \u7684 `SETNX` \u6216 Redisson \u6846\u67b6\u5b9e\u73b0\u5206\u5e03\u5f0f\u9501\u3002\n*   **\u6838\u5fc3\u8981\u70b9**\uff1a\n    1.  **\u52a0\u9501**\uff1a\u5fc5\u987b\u8bbe\u7f6e\u8fc7\u671f\u65f6\u95f4\uff08\u9632\u6b62\u6b7b\u9501\uff09\uff0c\u4e14\u503c\u5fc5\u987b\u662f\u552f\u4e00\u6807\u8bc6\uff08UUID\uff0c\u9632\u6b62\u8bef\u5220\u522b\u4eba\u7684\u9501\uff09\u3002\n    2.  **\u89e3\u9501**\uff1a\u5fc5\u987b\u4f7f\u7528 Lua \u811a\u672c\u4fdd\u8bc1\u201c\u5224\u65ad\u9501\u5f52\u5c5e\u201d\u548c\u201c\u5220\u9664\u9501\u201d\u7684\u539f\u5b50\u6027\u3002\n*   **\u5c40\u9650**\uff1a\u5b83\u53ea\u80fd\u4fdd\u8bc1\u4e34\u754c\u533a\u4e32\u884c\u6267\u884c\uff0c\u4e0d\u6d89\u53ca\u591a\u4e2a\u6570\u636e\u5e93\u64cd\u4f5c\u7684\u4e8b\u52a1\u56de\u6eda\u3002\n\n### \u4e8c\u3001 \u5206\u5e03\u5f0f\u4e8b\u52a1\u2014\u2014 \u9002\u7528\u4e8e\u201c\u5f3a\u4e00\u81f4/\u9ad8\u53ef\u9760\u201d\u573a\u666f\n\n\u5f53\u4e1a\u52a1\u6d89\u53ca\u591a\u4e2a\u6570\u636e\u5e93\u64cd\u4f5c\uff0c\u4e14\u5fc5\u987b\u4fdd\u8bc1\u8981\u4e48\u5168\u6210\u529f\u3001\u8981\u4e48\u5168\u5931\u8d25\u65f6\uff0c\u6211\u4e3b\u8981\u4f7f\u7528 **Seata** \u6846\u67b6\uff0c\u6839\u636e\u573a\u666f\u9009\u62e9\u4e24\u79cd\u6a21\u5f0f\uff1a\n\n#### 1. AT \u6a21\u5f0f\uff08\u63a8\u8350\u7528\u4e8e\u5927\u591a\u6570\u4e1a\u52a1\uff09\n*   **\u539f\u7406**\uff1a\u57fa\u4e8e**\u652f\u6301\u672c\u5730 ACID \u4e8b\u52a1\u7684\u5173\u7cfb\u578b\u6570\u636e\u5e93**\u3002Seata \u4f1a\u5728\u672c\u5730\u4e8b\u52a1\u63d0\u4ea4\u524d\uff0c\u81ea\u52a8\u8bb0\u5f55\u201c\u524d\u955c\u50cf\u201d\u548c\u201c\u540e\u955c\u50cf\u201d\u751f\u6210\u884c\u9501\uff0c\u5e76\u8bb0\u5f55 undo_log\u3002\n*   **\u4e00\u9636\u6bb5**\uff1a\u5404\u5206\u652f\u672c\u5730\u63d0\u4ea4\u4e8b\u52a1\uff0c\u91ca\u653e\u672c\u5730\u9501\u3002\n*   **\u4e8c\u9636\u6bb5**\uff1a\u5168\u5c40\u63d0\u4ea4\u5f02\u6b65\u5316\uff1b\u5168\u5c40\u56de\u6eda\u5219\u6839\u636e undo_log \u53cd\u5411\u751f\u6210 SQL \u8fd8\u539f\u6570\u636e\u3002\n*   **\u4f18\u70b9**\uff1a**\u96f6\u4fb5\u5165**\uff0c\u5f00\u53d1\u6210\u672c\u4f4e\uff0c\u6027\u80fd\u8f83\u9ad8\u3002\n*   **\u7f3a\u70b9**\uff1a\u5b58\u5728\u201c\u810f\u5199\u201d\u98ce\u9669\uff08\u9700\u52a0\u5168\u5c40\u9501\uff09\uff0c\u4e14\u6027\u80fd\u4e0d\u5982 TCC\u3002\n*   **\u5b9e\u6218**\uff1a\u6211\u5728\u5c0f\u7535\u79d1\u6280\u7684\u201c\u5546\u6237\u7ed3\u7b97\u7cfb\u7edf\u201d\u4e2d\u4f7f\u7528\u4e86 AT \u6a21\u5f0f\uff0c\u4fdd\u8bc1\u8d44\u91d1\u6d41\u6c34\u548c\u8d26\u6237\u4f59\u989d\u7684\u4e00\u81f4\u6027\u3002\n\n#### 2. TCC \u6a21\u5f0f\uff08\u9002\u7528\u4e8e\u5bf9\u6027\u80fd\u8981\u6c42\u6781\u9ad8\u3001\u975e\u5173\u7cfb\u578b\u6570\u636e\u5e93\u573a\u666f\uff09\n*   **\u539f\u7406**\uff1a\u5c06\u4e1a\u52a1\u903b\u8f91\u62c6\u5206\u4e3a\u4e09\u4e2a\u63a5\u53e3\uff1a**Try**\uff08\u8d44\u6e90\u9884\u7559\uff09\u3001**Confirm**\uff08\u786e\u8ba4\u63d0\u4ea4\uff09\u3001**Cancel**\uff08\u53d6\u6d88\u91ca\u653e\uff09\u3002\n*   **\u4f18\u70b9**\uff1a\u6027\u80fd\u6781\u9ad8\uff0c\u8d44\u6e90\u9501\u5b9a\u7c92\u5ea6\u5c0f\uff0c\u4e0d\u4f9d\u8d56\u6570\u636e\u5e93\u672c\u5730\u4e8b\u52a1\u3002\n*   **\u7f3a\u70b9**\uff1a**\u4ee3\u7801\u4fb5\u5165\u6027\u6781\u5f3a**\uff0c\u5f00\u53d1\u6210\u672c\u9ad8\u3002\u9700\u8981\u5904\u7406`\u7a7a\u56de\u6eda`\uff08Try \u672a\u6267\u884c\uff0cCancel \u5374\u8c03\u7528\u4e86\uff09\u3001`\u60ac\u6302`\uff08Cancel \u5148\u4e8e Try \u6267\u884c\uff09\u7b49\u8fb9\u7f18\u5f02\u5e38\u3002\n*   **\u5b9e\u6218**\uff1a\u5728\u201c\u8bbe\u5907\u501f\u8fd8\u201d\u8fd9\u79cd\u9ad8\u5e76\u53d1\u6838\u5fc3\u94fe\u8def\uff0c\u4e3a\u4e86\u4fdd\u8bc1\u6027\u80fd\uff0c\u6211\u66fe\u91c7\u7528 TCC \u6a21\u5f0f\uff0cTry \u9636\u6bb5\u51bb\u7ed3\u7528\u6237\u4f59\u989d\uff0cConfirm \u9636\u6bb5\u624d\u771f\u6b63\u6263\u6b3e\u3002\n\n### \u4e09\u3001 \u53ef\u9760\u6d88\u606f\u6700\u7ec8\u4e00\u81f4\u6027\u2014\u2014 \u9002\u7528\u4e8e\u201c\u5f02\u6b65\u89e3\u8026\u201d\u573a\u666f\n\n\u8fd9\u662f\u4e92\u8054\u7f51\u516c\u53f8\u6700\u5e38\u7528\u7684\u65b9\u6848\uff0c\u9002\u7528\u4e8e\u8de8\u7cfb\u7edf\u8c03\u7528\u3001\u9ad8\u5e76\u53d1\u3001\u4e14\u5141\u8bb8\u4e00\u5b9a\u5ef6\u65f6\u7684\u573a\u666f\u3002\n\n*   **\u573a\u666f**\uff1a\u8ba2\u5355\u652f\u4ed8\u6210\u529f\u540e\uff0c\u901a\u77e5\u79ef\u5206\u670d\u52a1\u589e\u52a0\u79ef\u5206\u3001\u901a\u77e5\u901a\u77e5\u670d\u52a1\u53d1\u77ed\u4fe1\u3002\n*   **\u65b9\u6848**\uff1a\u57fa\u4e8e RocketMQ \u7684\u4e8b\u52a1\u6d88\u606f\u3002\n*   **\u6838\u5fc3\u6d41\u7a0b**\uff1a\n    1.  **\u53d1\u9001\u534a\u6d88\u606f**\uff1a\u751f\u4ea7\u8005\u53d1\u4e00\u6761\u6682\u4e0d\u53ef\u6d88\u8d39\u7684\u6d88\u606f\u7ed9 MQ\u3002\n    2.  **\u6267\u884c\u672c\u5730\u4e8b\u52a1**\uff1a\u751f\u4ea7\u8005\u6267\u884c\u672c\u5730\u6570\u636e\u5e93\u64cd\u4f5c\uff08\u5982\u66f4\u65b0\u8ba2\u5355\u72b6\u6001\uff09\u3002\n    3.  **\u63d0\u4ea4/\u56de\u6eda**\uff1a\u672c\u5730\u4e8b\u52a1\u6210\u529f\uff0c\u5411 MQ \u53d1\u9001 Commit\uff08\u6d88\u606f\u5bf9\u6d88\u8d39\u8005\u53ef\u89c1\uff09\uff1b\u5931\u8d25\u5219\u53d1\u9001 Rollback\u3002\n    4.  **\u56de\u67e5\u673a\u5236**\uff1a\u5982\u679c MQ \u6536\u4e0d\u5230 Commit/Rollback\uff08\u6bd4\u5982\u751f\u4ea7\u8005\u6302\u4e86\uff09\uff0c\u4f1a\u4e3b\u52a8\u56de\u67e5\u751f\u4ea7\u8005\u7684\u672c\u5730\u4e8b\u52a1\u72b6\u6001\uff0c\u4fdd\u8bc1\u4e00\u81f4\u6027\u3002\n*   **\u4f18\u70b9**\uff1a\u5b9e\u73b0\u4e86\u4e1a\u52a1\u89e3\u8026\uff0c\u524a\u5cf0\u586b\u8c37\uff0c\u541e\u5410\u91cf\u9ad8\u3002\n\n### \u56db\u3001 \u6700\u5927\u52aa\u529b\u901a\u77e5\u2014\u2014 \u9002\u7528\u4e8e\u201c\u8de8\u5e73\u53f0/\u5bf9\u7aef\u4e0d\u53ef\u63a7\u201d\u573a\u666f\n\n\u9002\u7528\u4e8e\u5bf9\u63a5\u7b2c\u4e09\u65b9\u7cfb\u7edf\uff0c\u4e14\u5bf9\u65b9\u7cfb\u7edf\u53ef\u80fd\u4e0d\u7a33\u5b9a\u7684\u60c5\u51b5\u3002\n\n*   **\u573a\u666f**\uff1a\u652f\u4ed8\u6210\u529f\u540e\u901a\u77e5\u5546\u6237\u7cfb\u7edf\u3001\u5fae\u4fe1\u652f\u4ed8\u56de\u8c03\u901a\u77e5\u3002\n*   **\u65b9\u6848**\uff1a\n    1.  \u6d88\u606f\u63a5\u6536\u65b9\uff08\u5982\u5fae\u4fe1\uff09\u5728\u6295\u9012\u6d88\u606f\u5931\u8d25\u540e\uff0c\u4f1a\u8fdb\u884c**\u9012\u589e\u95f4\u9694\u7684\u91cd\u8bd5**\uff081min, 5min, 10min...\uff09\u3002\n    2.  \u5982\u679c\u91cd\u8bd5 N \u6b21\u540e\u4ecd\u5931\u8d25\uff0c\u5219\u62a5\u8b66\u4eba\u5de5\u4ecb\u5165\u6216\u8bb0\u5f55\u65e5\u5fd7\u7b49\u5f85\u540e\u7eed\u5904\u7406\u3002\n    3.  \u6d88\u606f\u63a5\u6536\u65b9\u9700\u8981\u63d0\u4f9b**\u5e42\u7b49\u6027**\u63a5\u53e3\uff0c\u9632\u6b62\u91cd\u590d\u5904\u7406\u3002\n*   **\u7279\u70b9**\uff1a\u5c3d\u529b\u800c\u4e3a\uff0c\u4e0d\u4fdd\u8bc1 100% \u6210\u529f\uff0c\u901a\u5e38\u6709\u5bf9\u8d26\u8865\u507f\u673a\u5236\u515c\u5e95\u3002\n\n### \u603b\u7ed3\u4e0e\u9009\u578b\u5efa\u8bae\n\n\u5728\u6211\u7684\u67b6\u6784\u8bbe\u8ba1\u4e2d\uff0c\u9009\u62e9\u5206\u5e03\u5f0f\u4e00\u81f4\u6027\u65b9\u6848\u9075\u5faa\u4ee5\u4e0b\u539f\u5219\uff1a\n\n1.  **\u80fd\u7528\u672c\u5730\u4e8b\u52a1\u89e3\u51b3\u7684\uff0c\u7edd\u4e0d\u5f15\u5165\u5206\u5e03\u5f0f\u4e8b\u52a1**\uff08\u6bd4\u5982\u5c06\u76f8\u5173\u6027\u6781\u5f3a\u7684\u8868\u653e\u5728\u540c\u4e00\u4e2a\u5e93\uff09\u3002\n2.  **\u9ad8\u5e76\u53d1\u6838\u5fc3\u94fe\u8def**\uff08\u5982\u4ea4\u6613\uff09\uff1a\u4f18\u5148\u8003\u8651 **TCC** \u6216 **\u53ef\u9760\u6d88\u606f**\uff0c\u4fdd\u8bc1\u6027\u80fd\u3002\n3.  **\u5e38\u89c4\u4e1a\u52a1\u7ba1\u7406\u540e\u53f0**\uff08\u5982 ERP\u3001\u7ed3\u7b97\uff09\uff1a\u4f18\u5148\u8003\u8651 **\u9762\u8bd5\u5b98\u60a8\u597d\uff0c\u8fd9\u662f\u4e00\u4e2a\u975e\u5e38\u7ecf\u5178\u4e14\u6781\u5177\u6311\u6218\u6027\u7684\u67b6\u6784\u95ee\u9898\u3002\u5728\u5206\u5e03\u5f0f\u7cfb\u7edf\u4e2d\uff0c\u7531\u4e8e\u7f51\u7edc\u7684\u4e0d\u786e\u5b9a\u6027\uff08\u7f51\u7edc\u5206\u533a\uff09\u548c\u8282\u70b9\u6545\u969c\u7684\u53ef\u80fd\u6027\uff0c\u60f3\u8981\u4e25\u683c\u4fdd\u8bc1\u201c\u5f3a\u4e00\u81f4\u6027\u201d\u5f80\u5f80\u610f\u5473\u7740\u8981\u727a\u7272\u53ef\u7528\u6027\u3002\n\n\u5728\u6211\u7684\u67b6\u6784\u5b9e\u8df5\u4e2d\uff0c\u4fdd\u8bc1\u5206\u5e03\u5f0f\u4e00\u81f4\u6027\u901a\u5e38\u9075\u5faa\u4e00\u4e2a\u6838\u5fc3\u601d\u8def\uff1a**\u6839\u636e\u4e1a\u52a1\u573a\u666f\u5bf9\u4e00\u81f4\u6027\u7684\u8981\u6c42\uff0c\u9009\u62e9\u5408\u9002\u7684\u65b9\u6848\uff0c\u5728\u4e00\u81f4\u6027\u3001\u53ef\u7528\u6027\u3001\u6027\u80fd\u4e4b\u95f4\u505a\u6743\u8861\u3002**\n\n\u6211\u5c06\u4ece**\u5f3a\u4e00\u81f4\u6027**\u3001**\u6700\u7ec8\u4e00\u81f4\u6027**\u4e24\u4e2a\u7ef4\u5ea6\uff0c\u7ed3\u5408\u6211\u7684\u5b9e\u6218\u7ecf\u9a8c\u6765\u56de\u7b54\uff1a\n\n---\n\n### \u4e00\u3001 \u5f3a\u4e00\u81f4\u6027\u65b9\u6848\n\n\u5982\u679c\u662f\u91d1\u878d\u6838\u5fc3\u8d26\u6237\uff08\u5982\u652f\u4ed8\u3001\u6263\u6b3e\uff09\u573a\u666f\uff0c\u6570\u636e\u7edd\u5bf9\u4e0d\u80fd\u9519\uff0c\u5fc5\u987b\u4f18\u5148\u4fdd\u8bc1\u5f3a\u4e00\u81f4\u6027\u3002\n\n#### 1. \u5206\u5e03\u5f0f\u9501\n*   **\u573a\u666f**\uff1a\u5e76\u53d1\u63a7\u5236\uff0c\u9632\u6b62\u8d85\u5356\u3001\u91cd\u590d\u6263\u6b3e\u3002\n*   **\u65b9\u6848**\uff1a\u4f7f\u7528 **Redis (Redisson)** \u6216 **Zookeeper**\u3002\n*   **\u5b9e\u6218\u7ecf\u9a8c**\uff1a\u5728\u5c0f\u7535\u79d1\u6280\u7684\u79df\u8d41\u8ba2\u5355\u521b\u5efa\u573a\u666f\uff0c\u6211\u4eec\u4f7f\u7528 Redis \u7684 `setnx` \u914d\u5408 Lua \u811a\u672c\u5b9e\u73b0\u53ef\u91cd\u5165\u9501\uff0c\u914d\u5408\u770b\u95e8\u72d7\u673a\u5236\u9632\u6b62\u6b7b\u9501\u3002\n    *   *\u6ce8\u610f*\uff1aRedis \u9501\u5728\u4e3b\u4ece\u5207\u6362\u65f6\u53ef\u80fd\u4e22\u5931\uff0c\u6781\u7aef\u60c5\u51b5\u9700\u8003\u8651 **Redlock** \u7b97\u6cd5\u6216 Zookeeper\uff08CP \u6a21\u578b\uff09\u3002\n\n#### 2. \u5206\u5e03\u5f0f\u4e8b\u52a1 - 2PC / XA\n*   **\u573a\u666f**\uff1a\u4f20\u7edf\u5355\u4f53\u5e94\u7528\u8de8\u5e93\u4e8b\u52a1\uff0c\u6216\u5bf9\u4e00\u81f4\u6027\u8981\u6c42\u6781\u9ad8\u4e14\u5e76\u53d1\u4e0d\u9ad8\u7684\u7cfb\u7edf\u3002\n*   **\u65b9\u6848**\uff1a\u6570\u636e\u5e93\u5c42\u9762\u7684 XA \u534f\u8bae\uff08\u4e24\u9636\u6bb5\u63d0\u4ea4\uff09\u3002\n*   **\u7f3a\u70b9**\uff1a\u6027\u80fd\u592a\u5dee\uff0c\u9501\u8d44\u6e90\u65f6\u95f4\u957f\uff0c\u4e0d\u9002\u5408\u9ad8\u5e76\u53d1\u4e92\u8054\u7f51\u67b6\u6784\u3002\u6211\u5728\u5b9e\u9645\u9ad8\u5e76\u53d1\u9879\u76ee\u4e2d\u57fa\u672c\u4e0d\u4f7f\u7528\u539f\u751f XA\u3002\n\n#### 3. Seata AT \u6a21\u5f0f\uff08\u76ee\u524d\u8f83\u4e3b\u6d41\uff09\n*   **\u573a\u666f**\uff1a\u4e1a\u52a1\u5e0c\u671b\u50cf\u5199\u672c\u5730\u4e8b\u52a1\u4e00\u6837\u5199\u5206\u5e03\u5f0f\u4e8b\u52a1\uff0c\u4e14\u5e76\u53d1\u8981\u6c42\u4e2d\u7b49\u3002\n*   **\u539f\u7406**\uff1a\u901a\u8fc7\u89e3\u6790 SQL \u751f\u6210\u524d\u540e\u955c\u50cf\uff0c\u81ea\u52a8\u8bb0\u5f55\u56de\u6eda\u65e5\u5fd7\uff0c\u4e8c\u9636\u6bb5\u5f02\u6b65\u63d0\u4ea4\u6216\u56de\u6eda\u3002\n*   **\u4f18\u70b9**\uff1a\u5bf9\u4e1a\u52a1\u4ee3\u7801\u96f6\u4fb5\u5165\u3002\n*   **\u7f3a\u70b9**\uff1a\u5b58\u5728\u5168\u5c40\u9501\uff0c\u6027\u80fd\u76f8\u6bd4 TCC \u6709\u635f\u8017\u3002\n\n---\n\n### \u4e8c\u3001 \u6700\u7ec8\u4e00\u81f4\u6027\u65b9\u6848\uff08\u4e92\u8054\u7f51\u4e3b\u6d41\uff0c\u9ad8\u5e76\u53d1\u63a8\u8350\uff09\n\n\u5bf9\u4e8e\u5927\u591a\u6570\u4e92\u8054\u7f51\u4e1a\u52a1\uff08\u5982\u4e0b\u5355\u540e\u53d1\u79ef\u5206\u3001\u53d1\u4f18\u60e0\u5238\u3001\u901a\u77e5\u7269\u6d41\uff09\uff0c\u5141\u8bb8\u77ed\u6682\u7684\u6570\u636e\u4e0d\u4e00\u81f4\uff0c\u53ea\u8981\u6700\u7ec8\u4e00\u81f4\u5373\u53ef\u3002\u8fd9\u662f\u6027\u4ef7\u6bd4\u6700\u9ad8\u7684\u65b9\u6848\u3002\n\n#### 1. \u672c\u5730\u6d88\u606f\u8868 + MQ\uff08\u53ef\u9760\u6d88\u606f\u6700\u7ec8\u4e00\u81f4\u6027\uff09\u2b50\ufe0f\n\u8fd9\u662f\u6211\u6700\u5e38\u7528\u3001\u6700\u7a33\u5065\u7684\u65b9\u6848\u3002\n\n*   **\u6838\u5fc3\u903b\u8f91**\uff1a\n    1.  \u5728\u540c\u4e00\u4e2a\u672c\u5730\u4e8b\u52a1\u4e2d\uff0c\u5199\u5165\u4e1a\u52a1\u6570\u636e\u548c\u6d88\u606f\u8bb0\u5f55\uff08\u72b6\u6001\u4e3a\u201c\u5f85\u53d1\u9001\u201d\uff09\u3002\n    2.  \u5b9a\u65f6\u4efb\u52a1\u8f6e\u8be2\u6d88\u606f\u8868\uff0c\u5c06\u6d88\u606f\u53d1\u9001\u5230 MQ\uff0c\u5e76\u66f4\u65b0\u72b6\u6001\u4e3a\u201c\u5df2\u53d1\u9001\u201d\u3002\n    3.  \u6d88\u8d39\u8005\u6d88\u8d39 MQ \u6d88\u606f\uff0c\u6267\u884c\u4e0b\u6e38\u903b\u8f91\u3002\n*   **\u5b9e\u6218\u6848\u4f8b**\uff1a\u5728\u7f51\u6613\u8003\u62c9\u7684\u5c0f\u5e97\u4f9b\u5e94\u94fe\u7cfb\u7edf\u4e2d\uff0c\u91c7\u8d2d\u5355\u521b\u5efa\u6210\u529f\u540e\uff0c\u9700\u8981\u901a\u77e5\u8d22\u52a1\u7cfb\u7edf\u751f\u6210\u5e94\u4ed8\u8d26\u6b3e\u3002\u6211\u4eec\u901a\u8fc7\u672c\u5730\u6d88\u606f\u8868\u786e\u4fdd\u4e86\u201c\u91c7\u8d2d\u5355\u521b\u5efa\u201d\u548c\u201c\u8d22\u52a1\u6d88\u606f\u53d1\u51fa\u201d\u8fd9\u4e24\u4ef6\u4e8b\u539f\u5b50\u6027\u7ed1\u5b9a\uff0c\u5373\u4f7f MQ \u6302\u4e86\uff0c\u672c\u5730\u4e8b\u52a1\u4f9d\u7136\u5b8c\u6574\uff0c\u540e\u7eed\u91cd\u53d1\u5373\u53ef\u3002\n\n#### 2. \u4e8b\u52a1\u6d88\u606f\u2b50\ufe0f\n\u8fd9\u662f\u963f\u91cc RocketMQ \u7279\u6709\u7684\u529f\u80fd\uff0c\u672c\u8d28\u4e0a\u662f\u5c06\u201c\u672c\u5730\u6d88\u606f\u8868\u201d\u7684\u903b\u8f91\u79fb\u5230\u4e86 MQ \u5185\u90e8\u3002\n\n*   **\u6838\u5fc3\u903b\u8f91**\uff1a\n    1.  \u53d1\u9001\u534a\u6d88\u606f\u5230 MQ\uff0cMQ \u6536\u5230\u4f46\u4e0d\u53ef\u6d88\u8d39\u3002\n    2.  \u6267\u884c\u672c\u5730\u6570\u636e\u5e93\u4e8b\u52a1\u3002\n    3.  \u6839\u636e\u672c\u5730\u4e8b\u52a1\u7ed3\u679c\uff0c\u5411 MQ \u53d1\u9001 Commit \u6216 Rollback\u3002\n    4.  \u5982\u679c MQ \u957f\u65f6\u95f4\u6ca1\u6536\u5230\u786e\u8ba4\uff0c\u4f1a\u53cd\u67e5\u672c\u5730\u4e8b\u52a1\u72b6\u6001\u3002\n*   **\u4f18\u52bf**\uff1a\u7701\u53bb\u4e86\u7ef4\u62a4\u672c\u5730\u6d88\u606f\u8868\u7684\u7e41\u7410\uff0c\u4ee3\u7801\u66f4\u7b80\u6d01\u3002\n\n#### 3. TCC (Try-Confirm-Cancel)\n*   **\u573a\u666f**\uff1a\u5bf9\u6027\u80fd\u8981\u6c42\u9ad8\uff0c\u4e14\u4e1a\u52a1\u903b\u8f91\u5141\u8bb8\u9884\u7559\u8d44\u6e90\u7684\u573a\u666f\u3002\n*   **\u539f\u7406**\uff1a\n    *   **Try**\uff1a\u68c0\u67e5\u8d44\u6e90\uff0c\u51bb\u7ed3\u8d44\u6e90\uff08\u5982\uff1a\u9884\u6263\u5e93\u5b58\uff09\u3002\n    *   **Confirm**\uff1a\u786e\u8ba4\u6267\u884c\uff0c\u771f\u6b63\u6263\u51cf\u8d44\u6e90\u3002\n    *   **Cancel**\uff1a\u53d6\u6d88\u6267\u884c\uff0c\u91ca\u653e\u51bb\u7ed3\u8d44\u6e90\u3002\n*   **\u4f18\u7f3a\u70b9**\uff1a\u6027\u80fd\u5f88\u9ad8\uff0c\u65e0\u957f\u9501\uff1b\u4f46**\u4ee3\u7801\u4fb5\u5165\u6027\u6781\u5f3a**\uff0c\u9700\u8981\u5199\u4e09\u4e2a\u63a5\u53e3\uff0c\u8fd8\u8981\u5904\u7406\u7a7a\u56de\u6eda\u3001\u60ac\u6302\u7b49\u590d\u6742\u8fb9\u7f18\u60c5\u51b5\u3002\n*   **\u5b9e\u6218**\uff1a\u5728\u62a2\u8d2d\u3001\u79d2\u6740\u573a\u666f\uff0c\u4e3a\u4e86\u6781\u81f4\u6027\u80fd\uff0c\u6211\u4f1a\u91c7\u7528 TCC\u3002\n\n#### 4. \u6700\u5927\u52aa\u529b\u901a\u77e5\n*   **\u573a\u666f**\uff1a\u8de8\u5e73\u53f0\u5bf9\u63a5\uff0c\u5982\u652f\u4ed8\u6210\u529f\u540e\u901a\u77e5\u5546\u6237\u7cfb\u7edf\u3002\n*   **\u65b9\u6848**\uff1a\u901a\u8fc7\u5b9a\u65f6\u4efb\u52a1\u9012\u589e\u95f4\u9694\u91cd\u8bd5\uff081min, 5min, 10min...\uff09\uff0c\u8fbe\u5230\u6700\u5927\u6b21\u6570\u62a5\u8b66\u4eba\u5de5\u4ecb\u5165\u3002\u901a\u5e38\u914d\u5408\u5bf9\u8d26\u5e73\u53f0\u515c\u5e95\u3002\n\n---\n\n### \u4e09\u3001 \u515c\u5e95\u65b9\u6848\uff1a\u5bf9\u8d26\u7cfb\u7edf\n\n\u65e0\u8bba\u4e0a\u8ff0\u65b9\u6848\u591a\u4e48\u5b8c\u7f8e\uff0c\u5206\u5e03\u5f0f\u7cfb\u7edf\u603b\u6709\u6781\u7aef\u5f02\u5e38\uff08\u5982\u4ee3\u7801 Bug\u3001\u673a\u623f\u65ad\u7535\uff09\u3002**\u6700\u540e\u7684\u4e00\u9053\u9632\u7ebf\u662f\u201c\u5bf9\u8d26\u201d\u3002**\n\n*   **\u5b9e\u6218\u505a\u6cd5**\uff1a\u5728\u5c0f\u7535\u79d1\u6280\uff0c\u6211\u4eec\u642d\u5efa\u4e86\u57fa\u4e8e Flink \u7684\u5b9e\u65f6\u5bf9\u8d26\u4e2d\u5fc3\u3002\u6bcf\u9694 5 \u5206\u949f\u6bd4\u5bf9\u8ba2\u5355\u6d41\u6c34\u4e0e\u652f\u4ed8\u6d41\u6c34\u7684\u5dee\u5f02\uff0c\u53d1\u73b0\u4e0d\u4e00\u81f4\u81ea\u52a8\u89e6\u53d1\u8865\u507f\u811a\u672c\u8fdb\u884c\u4fee\u590d\uff0c\u5e76\u62a5\u8b66\u901a\u77e5\u5f00\u53d1\u4eba\u5458\u3002\n\n### \u603b\u7ed3\n\n\u5982\u4f55\u4fdd\u8bc1\u5206\u5e03\u5f0f\u4e00\u81f4\u6027\uff1f\u6211\u7684\u51b3\u7b56\u8def\u5f84\u5982\u4e0b\uff1a\n\n1.  **\u80fd\u7528\u672c\u5730\u4e8b\u52a1\u89e3\u51b3\u7684\uff0c\u7edd\u4e0d\u5f15\u5165\u5206\u5e03\u5f0f\u4e8b\u52a1\u3002**\uff08\u6bd4\u5982\u5c06\u5f3a\u5173\u8054\u7684\u6838\u5fc3\u8868\u653e\u5728\u540c\u4e00\u4e2a\u5e93\uff09\u3002\n2.  **\u5fc5\u987b\u8de8\u670d\u52a1\u65f6\uff0c\u9996\u9009\u201c\u6700\u7ec8\u4e00\u81f4\u6027\u201d**\uff08\u672c\u5730\u6d88\u606f\u8868\u6216\u4e8b\u52a1\u6d88\u606f\uff09\uff0c\u56e0\u4e3a\u5b83\u6027\u80fd\u6700\u597d\uff0c\u5b9e\u73b0\u6210\u672c\u53ef\u63a7\u3002\n3.  **\u6d89\u53ca\u6838\u5fc3\u8d44\u91d1\u6d41\uff0c\u8981\u6c42\u5f3a\u4e00\u81f4\u6027\u65f6**\uff0c\u8003\u8651 Seata AT \u6a21\u5f0f\u6216 TCC\u3002\n4.  **\u6700\u540e\uff0c\u4e00\u5b9a\u8981\u6709\u5bf9\u8d26\u673a\u5236\u515c\u5e95**\uff0c\u786e\u4fdd\u6570\u636e\u6700\u7ec8\u53ef\u8ffd\u6eaf\u3001\u53ef\u4fee\u590d\u3002",
    "subItems": []

    "title": "* \u6700\u7ec8\u4e00\u81f4\u6027",
    "style": "",
    "details": "\u9762\u8bd5\u5b98\u60a8\u597d\uff0c\u5728\u5206\u5e03\u5f0f\u7cfb\u7edf\u67b6\u6784\u8bbe\u8ba1\u4e2d\uff0cCAP \u7406\u8bba\u544a\u8bc9\u6211\u4eec\uff0c\u5728\u5206\u533a\u5bb9\u9519\u6027\uff08P\uff09\u4e0d\u53ef\u907f\u514d\u7684\u60c5\u51b5\u4e0b\uff0c\u6211\u4eec\u5f80\u5f80\u9700\u8981\u5728\u4e00\u81f4\u6027\uff08C\uff09\u548c\u53ef\u7528\u6027\uff08A\uff09\u4e4b\u95f4\u505a\u6743\u8861\u3002\u5bf9\u4e8e\u5927\u591a\u6570\u4e92\u8054\u7f51\u4e1a\u52a1\uff08\u5982\u7535\u5546\u8ba2\u5355\u3001\u5e93\u5b58\u3001\u652f\u4ed8\uff09\uff0c\u6211\u4eec\u901a\u5e38\u9009\u62e9 **AP \u67b6\u6784\uff0c\u4fdd\u8bc1\u9ad8\u53ef\u7528\uff0c\u800c\u727a\u7272\u5f3a\u4e00\u81f4\u6027\uff0c\u91c7\u7528\u201c\u6700\u7ec8\u4e00\u81f4\u6027\u201d**\u3002\n\n\u5728\u6211\u7684\u67b6\u6784\u7ecf\u9a8c\u4e2d\uff0c\u5b9e\u73b0\u6700\u7ec8\u4e00\u81f4\u6027\u4e3b\u8981\u6709\u4ee5\u4e0b **\u4e94\u79cd\u6838\u5fc3\u7b56\u7565**\uff0c\u6211\u4f1a\u6839\u636e\u4e1a\u52a1\u573a\u666f\u7684\u654f\u611f\u7a0b\u5ea6\u9009\u62e9\u6700\u5408\u9002\u7684\u65b9\u6848\uff1a\n\n### \u4e00\u3001 \u4e94\u79cd\u6838\u5fc3\u5b9e\u73b0\u7b56\u7565\n\n#### 1. \u5b9a\u65f6\u4efb\u52a1\u8f6e\u8be2\uff08\u5bf9\u8d26\u673a\u5236\uff09\u2014\u2014 \u515c\u5e95\u65b9\u6848\n*   **\u9002\u7528\u573a\u666f**\uff1a\u5bf9\u5b9e\u65f6\u6027\u8981\u6c42\u4e0d\u9ad8\uff0c\u4e14\u9700\u8981\u7edd\u5bf9\u51c6\u786e\u6027\u7684\u573a\u666f\uff0c\u5982\u8d22\u52a1\u5bf9\u8d26\u3001\u5e93\u5b58\u6700\u7ec8\u6821\u6b63\u3002\n*   **\u5b9e\u73b0\u65b9\u6848**\uff1a\n    *   \u901a\u8fc7\u5206\u5e03\u5f0f\u4efb\u52a1\u8c03\u5ea6\u5e73\u53f0\uff08\u5982 XXL-Job\uff09\u5b9a\u65f6\u8dd1\u6279\u3002\n    *   \u6bd4\u8f83\u4e1a\u52a1\u8868\u4e0e\u6d41\u6c34\u8868\uff0c\u6216\u8005\u6bd4\u8f83\u672c\u5730\u4e8b\u52a1\u8868\u4e0e\u6d88\u606f\u961f\u5217\u7684\u72b6\u6001\u3002\n    *   \u53d1\u73b0\u4e0d\u4e00\u81f4\u65f6\uff0c\u89e6\u53d1\u8865\u507f\u903b\u8f91\uff08\u8865\u5355\u3001\u9000\u6b3e\u3001\u5e93\u5b58\u56de\u6eda\uff09\u3002\n*   **\u6211\u7684\u5b9e\u8df5**\uff1a\u5728\u5c0f\u7535\u79d1\u6280\u7684\u8d22\u52a1\u5bf9\u8d26\u7cfb\u7edf\u4e2d\uff0c\u6211\u8bbe\u8ba1\u4e86 T+1 \u7684\u65e5\u7ec8\u5bf9\u8d26\u4efb\u52a1\uff0c\u786e\u4fdd\u7b2c\u4e09\u65b9\u652f\u4ed8\u6d41\u6c34\u4e0e\u5185\u90e8\u8ba2\u5355\u7cfb\u7edf\u7684\u4e00\u81f4\u6027\uff0c\u4fdd\u8bc1\u8d44\u91d1\u5b89\u5168\u3002\n\n#### 2. \u672c\u5730\u6d88\u606f\u8868\uff08\u53ef\u9760\u6d88\u606f\u6700\u7ec8\u4e00\u81f4\u6027\uff09\u2014\u2014 \u6700\u5e38\u7528\u65b9\u6848\n*   **\u9002\u7528\u573a\u666f**\uff1a\u6838\u5fc3\u4e1a\u52a1\u94fe\u8def\uff0c\u8981\u6c42\u6d88\u606f 100% \u4e0d\u4e22\uff0c\u5982\u8ba2\u5355\u521b\u5efa\u540e\u53d1\u4f18\u60e0\u5238\u3001\u79ef\u5206\u3002\n*   **\u5b9e\u73b0\u65b9\u6848**\uff1a\n    *   \u5728\u540c\u4e00\u4e2a\u672c\u5730\u4e8b\u52a1\u4e2d\uff0c\u5199\u5165\u4e1a\u52a1\u6570\u636e\u548c\u6d88\u606f\u8bb0\u5f55\uff08\u72b6\u6001\u4e3a\u201c\u5f85\u53d1\u9001\u201d\uff09\u3002\n    *   \u901a\u8fc7\u5b9a\u65f6\u4efb\u52a1\u626b\u63cf\u6d88\u606f\u8868\uff0c\u5c06\u72b6\u6001\u4e3a\u201c\u5f85\u53d1\u9001\u201d\u7684\u6d88\u606f\u53d1\u9001\u5230 MQ\uff0c\u6210\u529f\u540e\u66f4\u65b0\u4e3a\u201c\u5df2\u53d1\u9001\u201d\u3002\n    *   \u6d88\u8d39\u8005\u6d88\u8d39 MQ \u6d88\u606f\uff0c\u5904\u7406\u6210\u529f\u540e\u901a\u77e5\u63d0\u4f9b\u65b9\u5220\u9664\u6216\u6807\u8bb0\u6d88\u606f\u3002\n*   **\u4f18\u52bf**\uff1a\u907f\u514d\u4e86\u5206\u5e03\u5f0f\u4e8b\u52a1\u7684\u590d\u6742\u6027\uff0c\u5229\u7528\u672c\u5730\u4e8b\u52a1\u7684 ACID \u7279\u6027\u4fdd\u8bc1\u4e86\u4e1a\u52a1\u64cd\u4f5c\u548c\u6d88\u606f\u53d1\u9001\u7684\u539f\u5b50\u6027\u3002\n\n#### 3. \u4e8b\u52a1\u6d88\u606f\uff08RocketMQ\uff09\u2014\u2014 \u9ad8\u7ea7\u65b9\u6848\n*   **\u9002\u7528\u573a\u666f**\uff1a\u9700\u8981\u9ad8\u6027\u80fd\u4e14\u652f\u6301\u56de\u67e5\u673a\u5236\u7684\u573a\u666f\uff0c\u5982\u652f\u4ed8\u6210\u529f\u540e\u66f4\u65b0\u8ba2\u5355\u72b6\u6001\u3002\n*   **\u5b9e\u73b0\u65b9\u6848**\uff1a\n    *   \u5229\u7528 RocketMQ \u7684\u4e8b\u52a1\u6d88\u606f\u673a\u5236\u3002\n    *   **\u53d1\u9001\u534a\u6d88\u606f**\uff1a\u6d88\u606f\u53d1\u9001\u5230 MQ \u4f46\u4e0d\u53ef\u6d88\u8d39\u3002\n    *   **\u6267\u884c\u672c\u5730\u4e8b\u52a1**\uff1a\u6267\u884c\u6570\u636e\u5e93\u64cd\u4f5c\u3002\n    *   **\u63d0\u4ea4/\u56de\u6eda\u6d88\u606f**\uff1a\u672c\u5730\u4e8b\u52a1\u6210\u529f\u5219\u63d0\u4ea4\u6d88\u606f\uff08\u53ef\u89c1\uff09\uff0c\u5931\u8d25\u5219\u56de\u6eda\u3002\n    *   **\u56de\u67e5\u673a\u5236**\uff1a\u5982\u679c MQ \u6536\u4e0d\u5230\u63d0\u4ea4/\u56de\u6eda\u786e\u8ba4\uff0c\u4f1a\u53cd\u67e5\u672c\u5730\u4e8b\u52a1\u72b6\u6001\uff0c\u786e\u4fdd\u4e00\u81f4\u6027\u3002\n*   **\u4f18\u52bf**\uff1a\u65e0\u9700\u7ef4\u62a4\u672c\u5730\u6d88\u606f\u8868\uff0c\u7531 MQ \u63d0\u4f9b\u4e86\u5b8c\u5584\u7684\u4e8b\u52a1\u56de\u67e5\u673a\u5236\uff0c\u4ee3\u7801\u4fb5\u5165\u6027\u4f4e\u3002\n\n#### 4. TCC\uff08Try-Confirm-Cancel\uff09\u2014\u2014 \u5f3a\u4e00\u81f4\u6027\u7684\u67d4\u6027\u4e8b\u52a1\n*   **\u9002\u7528\u573a\u666f**\uff1a\u5bf9\u4e00\u81f4\u6027\u8981\u6c42\u8f83\u9ad8\uff0c\u4e14\u4e1a\u52a1\u903b\u8f91\u5141\u8bb8\u62c6\u5206\u4e3a\u201c\u9884\u7559-\u786e\u8ba4-\u53d6\u6d88\u201d\u4e09\u4e2a\u9636\u6bb5\uff0c\u5982\u5e93\u5b58\u6263\u51cf\u3001\u8d26\u6237\u4f59\u989d\u8f6c\u8d26\u3002\n*   **\u5b9e\u73b0\u65b9\u6848**\uff1a\n    *   **Try**\uff1a\u51bb\u7ed3\u8d44\u6e90\uff08\u5982\u51bb\u7ed3\u5e93\u5b58 10 \u4ef6\uff0c\u53ef\u7528\u5e93\u5b58\u4e0d\u53d8\uff09\u3002\n    *   **Confirm**\uff1a\u771f\u6b63\u6263\u51cf\u8d44\u6e90\uff08\u51cf\u5c11\u53ef\u7528\u5e93\u5b58\uff0c\u5220\u9664\u51bb\u7ed3\u8bb0\u5f55\uff09\u3002\n    *   **Cancel**\uff1a\u91ca\u653e\u8d44\u6e90\uff08\u5220\u9664\u51bb\u7ed3\u8bb0\u5f55\uff0c\u6062\u590d\u5e93\u5b58\uff09\u3002\n*   **\u6311\u6218\u4e0e\u89e3\u51b3**\uff1a\u9700\u8981\u5904\u7406\u7a7a\u56de\u6eda\u3001\u60ac\u6302\u7b49\u5f02\u5e38\u60c5\u51b5\uff0c\u4ee3\u7801\u5f00\u53d1\u6210\u672c\u8f83\u9ad8\u3002\u901a\u5e38\u4f1a\u5f15\u5165 TCC \u6846\u67b6\uff08\u5982 Seata\uff09\u6765\u7b80\u5316\u5f00\u53d1\u3002\n\n#### 5. \u6700\u5927\u52aa\u529b\u901a\u77e5 \u2014\u2014 \u8de8\u5e73\u53f0\u65b9\u6848\n*   **\u9002\u7528\u573a\u666f**\uff1a\u4e0e\u7b2c\u4e09\u65b9\u7cfb\u7edf\u4ea4\u4e92\uff0c\u65e0\u6cd5\u4fdd\u8bc1\u5f3a\u4e00\u81f4\uff0c\u53ea\u80fd\u5c3d\u529b\u901a\u77e5\uff0c\u5982\u652f\u4ed8\u7ed3\u679c\u901a\u77e5\u5546\u6237\u3002\n*   **\u5b9e\u73b0\u65b9\u6848**\uff1a\n    *   \u6d88\u606f\u9012\u589e\u91cd\u8bd5\u673a\u5236\uff1a\u5931\u8d25\u540e\u95f4\u9694 1m, 5m, 10m, 30m... \u76f4\u5230\u8fbe\u5230\u6700\u5927\u6b21\u6570\u3002\n    *   \u5982\u679c\u6700\u7ec8\u5931\u8d25\uff0c\u8bb0\u5f55\u65e5\u5fd7\u6216\u544a\u8b66\uff0c\u8f6c\u5165\u4eba\u5de5\u5904\u7406\u3002\n    *   \u901a\u5e38\u8fd8\u9700\u8981\u63d0\u4f9b\u4e3b\u52a8\u67e5\u8be2\u63a5\u53e3\uff0c\u4f9b\u7b2c\u4e09\u65b9\u8fdb\u884c\u4e3b\u52a8\u6838\u5bf9\u3002\n\n### \u4e8c\u3001 \u5e42\u7b49\u6027\u8bbe\u8ba1\uff1a\u6700\u7ec8\u4e00\u81f4\u6027\u7684\u57fa\u77f3\n\n\u65e0\u8bba\u91c7\u7528\u54ea\u79cd\u65b9\u6848\uff0c**\u5e42\u7b49\u6027**\u90fd\u662f\u5fc5\u987b\u8003\u8651\u7684\u5173\u952e\u70b9\u3002\u5728\u5206\u5e03\u5f0f\u73af\u5883\u4e2d\uff0c\u7f51\u7edc\u6296\u52a8\u53ef\u80fd\u5bfc\u81f4\u6d88\u606f\u91cd\u590d\u6295\u9012\u6216\u91cd\u8bd5\u3002\n\n*   **\u5b9e\u73b0\u624b\u6bb5**\uff1a\u5229\u7528\u6570\u636e\u5e93\u7684\u552f\u4e00\u7d22\u5f15\uff08\u5982\u8ba2\u5355\u53f7 + \u64cd\u4f5c\u7c7b\u578b\uff09\u6216 Redis \u7684 `SETNX`\u3002\n*   **\u6211\u7684\u5b9e\u8df5**\uff1a\u5728\u6240\u6709\u7684\u6d88\u606f\u6d88\u8d39\u903b\u8f91\u4e2d\uff0c\u6211\u90fd\u4f1a\u5148\u67e5\u8be2\u8be5\u4e1a\u52a1 ID \u662f\u5426\u5df2\u5904\u7406\u8fc7\uff0c\u5982\u679c\u5df2\u5904\u7406\u5219\u76f4\u63a5\u8fd4\u56de\u6210\u529f\uff08Ack\uff09\uff0c\u907f\u514d\u91cd\u590d\u6263\u5e93\u5b58\u6216\u91cd\u590d\u53d1\u5238\u3002\n\n### \u4e09\u3001 \u5b9e\u6218\u603b\u7ed3\n\n\u5728\u5c0f\u7535\u79d1\u6280\u7684\u8bbe\u5907\u79df\u501f\u7cfb\u7edf\u4e2d\uff0c\u6d89\u53ca\u201c\u4e0b\u5355 -> \u51bb\u7ed3\u62bc\u91d1 -> \u79df\u501f -> \u6263\u8d39 -> \u9000\u62bc\u91d1\u201d\u7684\u957f\u94fe\u8def\u6d41\u7a0b\u3002\n\n\u6211\u7684\u67b6\u6784\u9009\u62e9\u662f\uff1a\n1.  **\u79df\u501f\u9636\u6bb5**\uff1a\u91c7\u7528 **TCC** \u6a21\u5f0f\u5904\u7406\u62bc\u91d1\u51bb\u7ed3\uff0c\u4fdd\u8bc1\u8d44\u91d1\u5b89\u5168\u548c\u4e00\u81f4\u6027\u3002\n2.  **\u5f02\u6b65\u901a\u77e5\u9636\u6bb5**\uff1a\u91c7\u7528 **RocketMQ \u4e8b\u52a1\u6d88\u606f**\uff0c\u4fdd\u8bc1\u8ba2\u5355\u72b6\u6001\u6d41\u8f6c\u4e0e\u79ef\u5206\u53d1\u653e\u3001\u6d88\u606f\u901a\u77e5\u7684\u6700\u7ec8\u4e00\u81f4\u6027\u3002\n3.  **\u5bf9\u8d26\u515c\u5e95**\uff1a\u6bcf\u65e5\u5b9a\u65f6\u4efb\u52a1\u8fdb\u884c\u5168\u91cf\u5bf9\u8d26\uff0c\u53d1\u73b0\u5f02\u5e38\u6570\u636e\u81ea\u52a8\u89e6\u53d1\u8865\u507f\u811a\u672c\u3002\n\n\u901a\u8fc7\u8fd9\u79cd\u201c**TCC \u5904\u7406\u6838\u5fc3\u8d44\u91d1 + MQ \u5904\u7406\u5f02\u6b65\u89e3\u8026 + \u5b9a\u65f6\u5bf9\u8d26\u515c\u5e95**\u201d\u7684\u7ec4\u5408\u62f3\uff0c\u6211\u4eec\u5728\u4fdd\u969c\u9ad8\u5e76\u53d1\u6027\u80fd\u7684\u540c\u65f6\uff0c\u5b8c\u7f8e\u5b9e\u73b0\u4e86\u4e1a\u52a1\u7684\u6700\u7ec8\u4e00\u81f4\u6027\u3002",
