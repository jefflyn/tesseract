    "title": "IO/NIO/AI\u6a21\u578b",
    "style": "",
    "details": "\u9762\u8bd5\u5b98\u60a8\u597d\uff0c\u8fd9\u662f\u4e00\u4e2a\u975e\u5e38\u7ecf\u5178\u7684\u8ba1\u7b97\u673a\u7f51\u7edc\u57fa\u7840\u95ee\u9898\uff0c\u4e5f\u662f\u6211\u5728\u8fdb\u884c\u6280\u672f\u9009\u578b\uff08\u6bd4\u5982\u9009\u62e9 Netty \u4f5c\u4e3a\u901a\u4fe1\u6846\u67b6\uff09\u65f6\u91cd\u70b9\u8003\u5bdf\u7684\u5e95\u5c42\u539f\u7406\u3002\n\n\u8fd9\u4e09\u79cd\u6a21\u578b\u4ee3\u8868\u4e86\u64cd\u4f5c\u7cfb\u7edf\u5904\u7406\u6570\u636e I/O \u7684\u4e09\u79cd\u4e0d\u540c\u6f14\u8fdb\u65b9\u5f0f\uff0c\u6838\u5fc3\u533a\u522b\u5728\u4e8e**\u201c\u7ebf\u7a0b\u963b\u585e\u7684\u65b9\u5f0f\u201d**\u548c**\u201c\u64cd\u4f5c\u7cfb\u7edf\u5185\u6838\u4e0e\u7528\u6237\u8fdb\u7a0b\u7684\u4ea4\u4e92\u6a21\u5f0f\u201d**\u3002\n\n\u4e3a\u4e86\u65b9\u4fbf\u7406\u89e3\uff0c\u6211\u5c06\u4ee5\u201c\u53bb\u996d\u5e97\u70b9\u83dc\u5403\u996d\u201d\u4e3a\u7c7b\u6bd4\u8fdb\u884c\u9610\u8ff0\uff1a\n\n---\n\n### 1. BIO (Blocking I/O) - \u540c\u6b65\u963b\u585e I/O\n\n\u8fd9\u662f\u6700\u4f20\u7edf\u7684 I/O \u6a21\u578b\uff0c\u4e5f\u662f JDK 1.4 \u4e4b\u524d\u7684\u552f\u4e00\u9009\u62e9\u3002\n\n*   **\u539f\u7406**\uff1a\n    *   \u670d\u52a1\u7aef\u5b9e\u73b0\u6a21\u5f0f\u4e3a\u4e00\u4e2a\u8fde\u63a5\u5bf9\u5e94\u4e00\u4e2a\u7ebf\u7a0b\uff08`One Connection = One Thread`\uff09\u3002\n    *   \u5f53\u5ba2\u6237\u7aef\u53d1\u8d77\u8fde\u63a5\u8bf7\u6c42\uff0c\u670d\u52a1\u7aef\u5fc5\u987b\u521b\u5efa\u4e00\u4e2a\u7ebf\u7a0b\u53bb\u5904\u7406\u8be5\u8fde\u63a5\u3002\n    *   \u5982\u679c\u8be5\u8fde\u63a5\u6ca1\u6709\u6570\u636e\u53ef\u8bfb/\u53ef\u5199\uff0c\u7ebf\u7a0b\u5c31\u4f1a\u4e00\u76f4**\u963b\u585e**\u5728\u90a3\u91cc\uff0c\u76f4\u5230\u6570\u636e\u51c6\u5907\u597d\u3002\n*   **\u7c7b\u6bd4**\uff1a\n    *   \u5c31\u50cf\u5728\u4f20\u7edf\u996d\u5e97\u5403\u996d\u3002\u4f60\uff08\u7ebf\u7a0b\uff09\u70b9\u5b8c\u83dc\u540e\uff0c\u5fc5\u987b\u5750\u5728\u684c\u5b50\u65c1\u4e00\u76f4\u7b49\uff08**\u963b\u585e**\uff09\uff0c\u76f4\u5230\u53a8\u5e08\uff08\u5185\u6838\uff09\u628a\u83dc\u505a\u597d\u7aef\u4e0a\u6765\u3002\u8fd9\u671f\u95f4\u4f60\u4e0d\u80fd\u505a\u4efb\u4f55\u5176\u4ed6\u4e8b\u3002\n*   **\u75db\u70b9**\uff1a\n    *   **\u5e76\u53d1\u5ea6\u53d7\u9650**\uff1a\u5982\u679c\u540c\u65f6\u6765 1 \u4e07\u4e2a\u8fde\u63a5\uff0c\u5c31\u8981\u5f00 1 \u4e07\u4e2a\u7ebf\u7a0b\u3002\u7ebf\u7a0b\u662f\u6602\u8d35\u7684\u7cfb\u7edf\u8d44\u6e90\uff0c\u4f1a\u5bfc\u81f4\u7cfb\u7edf\u5185\u5b58\u8017\u5c3d\u6216 CPU \u5728\u7ebf\u7a0b\u4e0a\u4e0b\u6587\u5207\u6362\u4e0a\u8017\u5c3d\u8d44\u6e90\u3002\n    *   **\u8d44\u6e90\u6d6a\u8d39**\uff1a\u5927\u90e8\u5206\u65f6\u95f4\u7ebf\u7a0b\u90fd\u5728\u7a7a\u7b49\uff08\u963b\u585e\uff09\uff0c\u5229\u7528\u7387\u6781\u4f4e\u3002\n*   **\u9002\u7528\u573a\u666f**\uff1a\n    *   \u8fde\u63a5\u6570\u8f83\u5c11\u4e14\u56fa\u5b9a\u7684\u67b6\u6784\uff08\u5982\u4f20\u7edf\u4f01\u4e1a\u7ea7\u5e94\u7528\uff09\u3002\n\n### 2. NIO (Non-blocking I/O) - \u540c\u6b65\u975e\u963b\u585e I/O\n\nJDK 1.4 \u5f15\u5165\uff0c\u662f\u76ee\u524d\u9ad8\u5e76\u53d1\u7f51\u7edc\u7f16\u7a0b\u7684\u4e3b\u6d41\uff08\u5982 Netty\u3001Tomcat NIO \u7684\u6838\u5fc3\uff09\u3002\n\n*   **\u539f\u7406**\uff1a\n    *   \u5f15\u5165\u4e86 **Selector\uff08\u591a\u8def\u590d\u7528\u5668\uff09** \u548c **Channel** \u7684\u6982\u5ff5\u3002\n    *   \u4e00\u4e2a\u7ebf\u7a0b\u53ef\u4ee5\u7ba1\u7406\u6210\u5343\u4e0a\u4e07\u4e2a\u8fde\u63a5\u3002\u7ebf\u7a0b\u4e0d\u518d\u6b7b\u7b49\u67d0\u4e2a\u8fde\u63a5\uff0c\u800c\u662f\u8f6e\u8be2\u68c0\u67e5\u54ea\u4e9b\u8fde\u63a5\u6709\u6570\u636e\u51c6\u5907\u597d\u4e86\u3002\n    *   **\u975e\u963b\u585e**\uff1a\u7ebf\u7a0b\u8be2\u95ee\u5185\u6838\u201c\u6570\u636e\u597d\u4e86\u5417\uff1f\u201d\uff0c\u5982\u679c\u6ca1\u597d\uff0c\u5185\u6838\u7acb\u5373\u8fd4\u56de\u201c\u6ca1\u597d\u201d\uff0c\u7ebf\u7a0b\u53ef\u4ee5\u53bb\u5904\u7406\u522b\u7684\u8fde\u63a5\u3002\n*   **\u7c7b\u6bd4**\uff1a\n    *   \u5c31\u50cf\u5728\u80af\u5fb7\u57fa\u70b9\u9910\u3002\u4f60\u70b9\u5b8c\u83dc\u62ff\u5230\u5c0f\u7968\uff0c\u4e0d\u9700\u8981\u50bb\u7b49\u3002\u4f60\u53ef\u4ee5\u53bb\u65c1\u8fb9\u73a9\u624b\u673a\uff08**\u975e\u963b\u585e**\uff09\uff0c\u65f6\u4e0d\u65f6\u62ac\u5934\u770b\u4e00\u773c\u5c4f\u5e55\uff08**\u8f6e\u8be2/Selector**\uff09\uff0c\u770b\u5230\u53eb\u53f7\u4e86\u518d\u53bb\u53d6\u9910\u3002\n*   **\u6838\u5fc3\u673a\u5236\uff1aIO \u591a\u8def\u590d\u7528**\uff1a\n    *   \u8fd9\u662f NIO \u9ad8\u6027\u80fd\u7684\u5173\u952e\u3002\u64cd\u4f5c\u7cfb\u7edf\u63d0\u4f9b\u4e86 `select`\u3001`poll`\u3001`epoll`\uff08Linux \u4e0b\u6700\u5f3a\uff09\u7b49\u7cfb\u7edf\u8c03\u7528\u3002Selector \u53ef\u4ee5\u540c\u65f6\u76d1\u542c\u591a\u4e2a Channel\uff0c\u53ea\u6709\u5f53 Channel \u6709\u8bfb\u5199\u4e8b\u4ef6\u53d1\u751f\u65f6\uff0c\u624d\u901a\u77e5\u7ebf\u7a0b\u53bb\u5904\u7406\u3002\u8fd9\u5b9e\u73b0\u4e86**\u4e00\u4e2a\u7ebf\u7a0b\u5904\u7406\u591a\u4e2a\u8fde\u63a5**\u3002\n*   **\u75db\u70b9**\uff1a\n    *   \u7f16\u7a0b\u96be\u5ea6\u5927\uff0c\u9700\u8981\u5904\u7406\u534a\u5305\u3001\u7c98\u5305\u3001\u7f51\u7edc\u6296\u52a8\u7b49\u590d\u6742\u95ee\u9898\u3002\n*   **\u9002\u7528\u573a\u666f**\uff1a\n    *   \u9ad8\u5e76\u53d1\u3001\u8fde\u63a5\u6570\u591a\u3001\u8fde\u63a5\u65f6\u95f4\u77ed\u7684\u573a\u666f\uff08\u5982\u5373\u65f6\u901a\u8baf\u3001\u7f51\u5173\u3001\u5171\u4eab\u5145\u7535\u5b9d\u8bbe\u5907\u63a5\u5165\uff09\u3002\n\n### 3. AIO (Asynchronous I/O) - \u5f02\u6b65\u975e\u963b\u585e I/O\n\nJDK 1.7 \u5f15\u5165\uff0c\u4e5f\u5c31\u662f NIO.2\u3002\n\n*   **\u539f\u7406**\uff1a\n    *   \u771f\u6b63\u7684\u5f02\u6b65 I/O\u3002\u5e94\u7528\u7ebf\u7a0b\u53d1\u8d77\u8bfb\u5199\u8bf7\u6c42\u540e\uff0c\u7acb\u5373\u8fd4\u56de\uff0c\u7ee7\u7eed\u505a\u5176\u4ed6\u4e8b\u3002\n    *   \u64cd\u4f5c\u7cfb\u7edf\u5185\u6838\u8d1f\u8d23\u5c06\u6570\u636e\u4ece\u5185\u6838\u7a7a\u95f4\u62f7\u8d1d\u5230\u7528\u6237\u7a7a\u95f4\uff08\u8fd9\u662f NIO \u6ca1\u505a\u5230\u7684\uff0cNIO \u8fd8\u9700\u8981\u7ebf\u7a0b\u81ea\u5df1\u53bb\u8bfb\uff09\u3002\n    *   \u62f7\u8d1d\u5b8c\u6210\u540e\uff0c\u64cd\u4f5c\u7cfb\u7edf\u4f1a\u901a\u77e5\u5e94\u7528\u7ebf\u7a0b\uff08\u901a\u8fc7\u56de\u8c03\u51fd\u6570\uff09\uff1a\u201c\u6570\u636e\u5df2\u7ecf\u51c6\u5907\u597d\u4e86\uff0c\u76f4\u63a5\u7528\u5427\u201d\u3002\n*   **\u7c7b\u6bd4**\uff1a\n    *   \u5c31\u50cf\u5916\u5356\u914d\u9001\u3002\u4f60\u70b9\u5b8c\u83dc\uff0c\u7ee7\u7eed\u5de5\u4f5c\uff08**\u5f02\u6b65**\uff09\u3002\u9a91\u624b\uff08\u5185\u6838\uff09\u628a\u83dc\u9001\u5230\u697c\u4e0b\u5e76\u6253\u7535\u8bdd\u901a\u77e5\u4f60\uff08**\u56de\u8c03**\uff09\uff0c\u4f60\u76f4\u63a5\u4e0b\u697c\u62ff\u5c31\u884c\uff0c\u5168\u7a0b\u65e0\u9700\u4f60\u53c2\u4e0e\u7b49\u5f85\u3002\n*   **\u73b0\u72b6**\uff1a\n    *   \u867d\u7136 AIO \u7406\u8bba\u4e0a\u6700\u5148\u8fdb\uff0c\u4f46\u5728 Linux \u7cfb\u7edf\u4e0a\uff0cAIO \u7684\u5e95\u5c42\u5b9e\u73b0\u6548\u7387\u5e76\u6ca1\u6709\u6bd4 NIO\uff08epoll\uff09\u9ad8\u591a\u5c11\uff0c\u4e14\u7f16\u7a0b\u6a21\u578b\u590d\u6742\u3002\n    *   \u76ee\u524d\u4e3b\u6d41\u7684\u9ad8\u6027\u80fd\u6846\u67b6\uff08\u5982 **Netty**\uff09\u4f9d\u7136\u9996\u9009 NIO \u6a21\u578b\uff0c\u56e0\u4e3a\u5176\u5728 Linux \u670d\u52a1\u5668\u4e0a\u8868\u73b0\u6700\u7a33\u5b9a\u3001\u6700\u9ad8\u6548\u3002\n\n---\n\n### \u603b\u7ed3\u4e0e\u5bf9\u6bd4\n\n| \u7279\u6027 | BIO | NIO | AIO |\n| :--- | :--- | :--- | :--- |\n| **\u963b\u585e\u65b9\u5f0f** | \u540c\u6b65\u963b\u585e | \u540c\u6b65\u975e\u963b\u585e | \u5f02\u6b65\u975e\u963b\u585e |\n| **\u7ebf\u7a0b\u6a21\u578b** | \u4e00\u8fde\u63a5\u4e00\u7ebf\u7a0b | \u4e00\u7ebf\u7a0b\u5904\u7406\u591a\u8fde\u63a5 | \u6709\u6548\u8bf7\u6c42\u624d\u542f\u52a8\u7ebf\u7a0b |\n| **\u6838\u5fc3\u7ec4\u4ef6** | ServerSocket | Selector, Channel, Buffer | AsynchronousChannel |\n| **\u5e76\u53d1\u80fd\u529b** | \u4f4e\uff08\u53d7\u9650\u4e8e\u7ebf\u7a0b\u6570\uff09 | \u9ad8\uff08\u57fa\u4e8e Reactor \u6a21\u5f0f\uff09 | \u7406\u8bba\u6700\u9ad8\uff08\u57fa\u4e8e Proactor \u6a21\u5f0f\uff09 |\n| **\u9002\u7528\u573a\u666f** | \u8fde\u63a5\u5c11\u3001\u903b\u8f91\u7b80\u5355 | \u8fde\u63a5\u591a\u3001\u8bfb\u5199\u9891\u7e41\u3001\u77ed\u8fde\u63a5 | \u8fde\u63a5\u591a\u3001\u8bfb\u5199\u9891\u7e41\uff08Windows \u8868\u73b0\u66f4\u597d\uff09 |\n\n### \u6211\u7684\u5b9e\u6218\u7ecf\u9a8c\n\n\u5728\u5c0f\u7535\u79d1\u6280\u7684\u9879\u76ee\u4e2d\uff0c\u6211\u4eec\u5904\u7406\u5343\u4e07\u7ea7\u8bbe\u5907\u63a5\u5165\u65f6\uff0c\u5e95\u5c42\u901a\u4fe1\u6846\u67b6\u9009\u62e9\u7684\u5c31\u662f\u57fa\u4e8e **NIO** \u7684 **Netty**\u3002\n\n**\u4e3a\u4ec0\u4e48\u4e0d\u9009 BIO\uff1f**\n\u56e0\u4e3a BIO \u65e0\u6cd5\u652f\u6491\u6d77\u91cf\u957f\u8fde\u63a5\uff0c\u6570\u4e07\u53f0\u5145\u7535\u5b9d\u8bbe\u5907\u540c\u65f6\u5728\u7ebf\u4f1a\u8ba9\u670d\u52a1\u7aef\u7ebf\u7a0b\u8d44\u6e90\u77ac\u95f4\u7206\u70b8\u3002\n\n**\u4e3a\u4ec0\u4e48\u4e0d\u9009 AIO\uff1f**\n\u56e0\u4e3a\u6211\u4eec\u7684\u751f\u4ea7\u73af\u5883\u670d\u52a1\u5668\u4e3b\u8981\u662f Linux\u3002\u5728 Linux \u4e0b\uff0cAIO \u7684\u5e95\u5c42\u652f\u6301\u4e0d\u5982 NIO\uff08epoll\uff09\u6210\u719f\u3002Netty \u6846\u67b6\u5bf9 NIO \u8fdb\u884c\u4e86\u6781\u81f4\u7684\u4f18\u5316\uff08\u5982\u89e3\u51b3\u4e86 Epoll \u7a7a\u8f6e\u8be2 Bug\uff09\uff0c\u6027\u80fd\u5df2\u7ecf\u975e\u5e38\u5f3a\u608d\uff0c\u8db3\u4ee5\u6ee1\u8db3\u6211\u4eec\u7684\u9ad8\u5e76\u53d1\u9700\u6c42\u3002\n\n**\u4e00\u53e5\u8bdd\u603b\u7ed3**\uff1a**BIO \u662f\u4f20\u7edf\u624b\u5de5\u4f5c\u574a\uff0cNIO \u662f\u73b0\u4ee3\u5316\u6d41\u6c34\u7ebf\u5de5\u5382\uff0cAIO \u662f\u5168\u81ea\u52a8\u667a\u80fd\u5de5\u5382\u3002\u4f46\u5728\u5f53\u524d Linux \u670d\u52a1\u5668\u73af\u5883\u4e0b\uff0cNIO \u4f9d\u7136\u662f\u6027\u4ef7\u6bd4\u6700\u9ad8\u7684\u9009\u62e9\u3002**",

    "title": "Netty \u4e3a\u4ec0\u4e48\u6027\u80fd\u9ad8\uff1f",
    "style": "",
    "details": "\u9762\u8bd5\u5b98\u60a8\u597d\uff0cNetty \u4e4b\u6240\u4ee5\u80fd\u6210\u4e3a Java \u7f51\u7edc\u7f16\u7a0b\u7684\u4e8b\u5b9e\u6807\u51c6\uff0c\u6838\u5fc3\u5728\u4e8e\u5b83\u4e0d\u4ec5\u5c01\u88c5\u4e86 Java \u539f\u751f NIO \u7684\u590d\u6742\u6027\uff0c\u66f4\u5728\u67b6\u6784\u8bbe\u8ba1\u548c\u5e95\u5c42\u4f18\u5316\u4e0a\u505a\u4e86\u5927\u91cf\u201c\u6781\u81f4\u201d\u7684\u5de5\u4f5c\u3002\n\n\u7ed3\u5408\u6211\u9605\u8bfb\u6e90\u7801\u548c\u5b9e\u6218\u7684\u7ecf\u9a8c\uff0c\u6211\u8ba4\u4e3a Netty \u9ad8\u6027\u80fd\u7684\u79d8\u8bc0\u4e3b\u8981\u4f53\u73b0\u5728\u4ee5\u4e0b **5 \u4e2a\u6838\u5fc3\u7ef4\u5ea6**\uff1a\n\n---\n\n### 1. IO \u7ebf\u7a0b\u6a21\u578b\uff1aReactor \u6a21\u5f0f\u7684\u9ad8\u6548\u5e76\u53d1\n\nNetty \u91c7\u7528\u4e86\u7ecf\u5178\u7684 **\u4e3b\u4ece Reactor \u591a\u7ebf\u7a0b\u6a21\u578b**\uff0c\u5b8c\u7f8e\u89e3\u51b3\u4e86\u539f\u751f NIO \u7f16\u7801\u590d\u6742\u4e14\u5bb9\u6613\u6b7b\u9501\u7684\u95ee\u9898\u3002\n\n*   **\u804c\u8d23\u5206\u79bb**\uff1a\n    *   **Boss Group**\uff08\u4e3b Reactor\uff09\uff1a\u53ea\u8d1f\u8d23\u5efa\u7acb\u8fde\u63a5\uff08Accept\uff09\uff0c\u5c31\u50cf\u996d\u5e97\u7684\u201c\u8fce\u5bbe\u5458\u201d\uff0c\u628a\u5ba2\u4eba\u8fce\u8fdb\u6765\u5c31\u4ea4\u7ed9\u670d\u52a1\u5458\uff0c\u81ea\u5df1\u4e0d\u7aef\u83dc\u3002\n    *   **Worker Group**\uff08\u4ece Reactor\uff09\uff1a\u8d1f\u8d23\u5177\u4f53\u7684 IO \u8bfb\u5199\u64cd\u4f5c\uff0c\u5c31\u50cf\u201c\u670d\u52a1\u5458\u201d\uff0c\u4e13\u95e8\u670d\u52a1\u5206\u914d\u7ed9\u4ed6\u7684\u51e0\u5f20\u684c\u5b50\uff08Socket\uff09\u3002\n*   **\u4f18\u52bf**\uff1a\u4e00\u4e2a Worker \u7ebf\u7a0b\u53ef\u4ee5\u5904\u7406\u6210\u5343\u4e0a\u4e07\u4e2a\u8fde\u63a5\uff0c\u907f\u514d\u4e86\u4f20\u7edf BIO \u201c\u4e00\u8fde\u63a5\u4e00\u7ebf\u7a0b\u201d \u7684\u8d44\u6e90\u6d6a\u8d39\u3002\u540c\u65f6\uff0c\u7ebf\u7a0b\u6570\u901a\u5e38\u4e0e CPU \u6838\u5fc3\u6570\u6302\u94a9\uff0c\u51cf\u5c11\u4e86\u4e0a\u4e0b\u6587\u5207\u6362\u7684\u5f00\u9500\u3002\n\n### 2. \u5185\u5b58\u7ba1\u7406\uff1a\u96f6\u62f7\u8d1d\u4e0e\u5185\u5b58\u6c60\n\n\u8fd9\u662f Netty \u6027\u80fd\u4f18\u5316\u7684\u201c\u6740\u624b\u950f\u201d\uff0c\u6781\u5927\u964d\u4f4e\u4e86 GC\uff08\u5783\u573e\u56de\u6536\uff09\u538b\u529b\u3002\n\n*   **\u96f6\u62f7\u8d1d**\uff1a\n    *   **CompositeByteBuf\uff08\u903b\u8f91\u7ec4\u5408\uff09**\uff1aNetty \u53ef\u4ee5\u5c06\u591a\u4e2a Buffer \u903b\u8f91\u4e0a\u5408\u5e76\u6210\u4e00\u4e2a\uff0c\u800c\u4e0d\u9700\u8981\u5c06\u6570\u636e\u7269\u7406\u62f7\u8d1d\u5230\u65b0\u7684\u5927 Buffer \u4e2d\u3002\u6bd4\u5982\u5728\u5904\u7406 TCP \u7c98\u5305\u62c6\u5305\u65f6\uff0c\u7ec4\u5408 Header \u548c Body \u975e\u5e38\u9ad8\u6548\u3002\n    *   **\u5806\u5916\u5185\u5b58**\uff1aNetty \u9ed8\u8ba4\u4f7f\u7528 Direct Buffer\uff08\u5806\u5916\u5185\u5b58\uff09\u3002\u6570\u636e\u4ece\u7f51\u5361\u8bfb\u53d6\u540e\uff0c\u76f4\u63a5\u5b58\u50a8\u5728\u5806\u5916\u5185\u5b58\uff0c\u907f\u514d\u4e86\u4ece\u64cd\u4f5c\u7cfb\u7edf\u5185\u6838\u5185\u5b58\u62f7\u8d1d\u5230 Java \u5806\u5185\u5b58\u7684\u4e00\u6b21\u6602\u8d35\u62f7\u8d1d\u3002\u8fd9\u4e5f\u662f\u4e3a\u4ec0\u4e48 Netty \u5728\u5904\u7406\u5927\u6587\u4ef6\u4f20\u8f93\u65f6\u6027\u80fd\u6781\u9ad8\u7684\u539f\u56e0\u3002\n*   **\u5185\u5b58\u6c60**\uff1a\n    *   Java \u539f\u751f NIO \u7684 ByteBuffer \u521b\u5efa\u548c\u9500\u6bc1\u5f00\u9500\u5f88\u5927\uff0c\u9ad8\u5e76\u53d1\u4e0b\u4f1a\u5bfc\u81f4\u4e25\u91cd\u7684\u5185\u5b58\u788e\u7247\u548c GC\u3002\n    *   Netty \u5b9e\u73b0\u4e86\u7c7b\u4f3c **Jemalloc** \u7684\u5185\u5b58\u6c60\u7ba1\u7406\u673a\u5236\u3002\u7533\u8bf7 ByteBuf \u65f6\uff0c\u4ece\u6c60\u4e2d\u590d\u7528\u5bf9\u8c61\uff1b\u7528\u5b8c\u540e\u5f52\u8fd8\u6c60\u4e2d\u3002\u8fd9\u663e\u8457\u51cf\u5c11\u4e86\u5185\u5b58\u5206\u914d\u6b21\u6570\u548c GC \u505c\u987f\u65f6\u95f4\uff08STW\uff09\u3002\n\n### 3. \u4e32\u884c\u5316\u5904\u7406\uff1a\u65e0\u9501\u5316\u8bbe\u8ba1\n\nNetty \u5728\u5904\u7406 IO \u4e8b\u4ef6\u65f6\uff0c\u91c7\u7528\u4e86 **\u201c\u65e0\u9501\u5316\u201d** \u7684\u4e32\u884c\u8bbe\u8ba1\u7406\u5ff5\u3002\n\n*   **ChannelPipeline**\uff1a\u6bcf\u4e2a Channel \u7ed1\u5b9a\u4e00\u4e2a\u56fa\u5b9a\u7684 EventLoop\uff08IO \u7ebf\u7a0b\uff09\u3002\u8be5 Channel \u4e0a\u7684\u6240\u6709 IO \u64cd\u4f5c\uff08\u8bfb\u3001\u5199\u3001\u7f16\u89e3\u7801\uff09\u90fd\u5728\u540c\u4e00\u4e2a\u7ebf\u7a0b\u5185\u4e32\u884c\u6267\u884c\u3002\n*   **\u4f18\u52bf**\uff1a\u4e0d\u9700\u8981\u52a0\u9501\u6765\u4fdd\u8bc1\u7ebf\u7a0b\u5b89\u5168\u3002\u8fd9\u4e0d\u4ec5\u907f\u514d\u4e86\u9501\u7ade\u4e89\u5e26\u6765\u7684\u6027\u80fd\u635f\u8017\uff0c\u8fd8\u7701\u53bb\u4e86\u7ebf\u7a0b\u4e0a\u4e0b\u6587\u5207\u6362\u7684\u5f00\u9500\u3002\n*   **\u5b9e\u8df5**\uff1a\u6211\u5728\u5c0f\u7535\u7684\u9879\u76ee\u4e2d\uff0c\u7f16\u5199 Netty Handler \u65f6\u4f1a\u7279\u522b\u6ce8\u610f\uff0c\u7edd\u4e0d\u5728 Handler \u4e2d\u6267\u884c\u8017\u65f6\u4efb\u52a1\uff08\u5982 DB \u64cd\u4f5c\uff09\uff0c\u800c\u662f\u6254\u5230\u4e1a\u52a1\u7ebf\u7a0b\u6c60\uff0c\u786e\u4fdd IO \u7ebf\u7a0b\u4e00\u76f4\u5904\u4e8e\u201c\u6781\u901f\u54cd\u5e94\u201d\u72b6\u6001\u3002\n\n### 4. \u9ad8\u6027\u80fd\u7ec4\u4ef6\uff1a\u65f6\u95f4\u8f6e\u4e0e\u5bf9\u8c61\u6c60\n\n*   **HashedTimeWheel\uff08\u65f6\u95f4\u8f6e\u7b97\u6cd5\uff09**\uff1a\n    *   Netty \u4f7f\u7528\u65f6\u95f4\u8f6e\u7b97\u6cd5\u6765\u7ba1\u7406\u5927\u91cf\u7684\u5b9a\u65f6\u4efb\u52a1\uff08\u5982\u5fc3\u8df3\u68c0\u6d4b\u3001\u8fde\u63a5\u8d85\u65f6\uff09\u3002\u76f8\u6bd4\u4f20\u7edf\u7684 DelayQueue \u6216 Timer\uff0c\u65f6\u95f4\u8f6e\u7684\u63d2\u5165\u548c\u5220\u9664\u65f6\u95f4\u590d\u6742\u5ea6\u63a5\u8fd1 O(1)\uff0c\u975e\u5e38\u9002\u5408\u7ba1\u7406\u6d77\u91cf\u5b9a\u65f6\u4efb\u52a1\u3002\n*   **Recycler\uff08\u8f7b\u91cf\u7ea7\u5bf9\u8c61\u6c60\uff09**\uff1a\n    *   \u9664\u4e86\u5185\u5b58\u6c60\uff0cNetty \u8fd8\u5b9e\u73b0\u4e86\u8f7b\u91cf\u7ea7\u7684\u5bf9\u8c61\u56de\u6536\u7ad9\uff0c\u7528\u4e8e\u590d\u7528\u90a3\u4e9b\u9891\u7e41\u521b\u5efa\u7684\u5bf9\u8c61\uff08\u4f8b\u5982 Channel \u5199\u5165\u65f6\u7684 Entry \u5bf9\u8c61\uff09\uff0c\u51cf\u5c11 GC \u538b\u529b\u3002\n\n### 5. \u5bf9 NIO \u7684 Bug \u4fee\u590d\u4e0e\u5e95\u5c42\u8c03\u4f18\n\nNetty \u5bf9\u5e95\u5c42\u7ec6\u8282\u7684\u5904\u7406\u975e\u5e38\u6df1\u5165\uff0c\u89e3\u51b3\u4e86\u539f\u751f JDK NIO \u7684\u8bf8\u591a\u75db\u70b9\uff1a\n\n*   **\u4fee\u590d Epoll \u7a7a\u8f6e\u8be2 Bug**\uff1a\n    *   JDK \u7684 NIO \u5728 Linux \u4e0b\u6709\u4e00\u4e2a\u8457\u540d\u7684 Bug\uff1aSelector \u5373\u4f7f\u6ca1\u6709\u4e8b\u4ef6\u53d1\u751f\u4e5f\u4f1a\u7a7a\u8f6e\u8be2\uff0c\u5bfc\u81f4 CPU \u98d9\u5347\u5230 100%\u3002\n    *   Netty \u901a\u8fc7\u68c0\u6d4b\u7a7a\u8f6e\u8be2\u6b21\u6570\uff0c\u4e00\u65e6\u8d85\u8fc7\u9608\u503c\uff0c\u5c31\u91cd\u5efa Selector\uff0c\u5b8c\u7f8e\u89c4\u907f\u4e86\u8fd9\u4e2a\u95ee\u9898\u3002\n*   **TCP \u53c2\u6570\u8c03\u4f18**\uff1a\n    *   Netty \u9ed8\u8ba4\u5f00\u542f\u4e86 **SO_REUSEADDR**\uff08\u7aef\u53e3\u590d\u7528\uff09\u3001**TCP_NODELAY**\uff08\u7981\u7528 Nagle \u7b97\u6cd5\uff0c\u51cf\u5c11\u5c0f\u6570\u636e\u5305\u5ef6\u8fdf\uff09\uff0c\u8fd9\u4e9b\u914d\u7f6e\u5bf9\u5b9e\u65f6\u6027\u8981\u6c42\u9ad8\u7684\u7cfb\u7edf\uff08\u5982\u8bbe\u5907\u5fc3\u8df3\u3001\u5373\u65f6\u901a\u8baf\uff09\u81f3\u5173\u91cd\u8981\u3002\n*   **WriteBufferWaterMark\uff08\u5199\u6c34\u4f4d\u63a7\u5236\uff09**\uff1a\n    *   \u5f53\u53d1\u9001\u961f\u5217\u5806\u79ef\u8fc7\u591a\u6570\u636e\u65f6\uff0cNetty \u4f1a\u89e6\u53d1\u201c\u5199\u7f13\u51b2\u533a\u6ee1\u201d\u4e8b\u4ef6\uff0c\u9632\u6b62\u5185\u5b58\u6ea2\u51fa\uff08OOM\uff09\uff0c\u8fd9\u4e5f\u662f\u4e00\u79cd\u81ea\u6211\u4fdd\u62a4\u673a\u5236\u3002\n\n---\n\n### \u603b\u7ed3\n\n\u5982\u679c\u7528\u4e00\u53e5\u8bdd\u6982\u62ec\uff0c**Netty \u7684\u9ad8\u6027\u80fd\u6e90\u4e8e\u201c\u67b6\u6784\u8bbe\u8ba1\u7684\u6781\u81f4\u89e3\u8026\u201d\u4e0e\u201c\u5e95\u5c42\u8d44\u6e90\u7684\u6781\u81f4\u590d\u7528\u201d\u3002**\n\n*   **\u67b6\u6784\u4e0a**\uff1aReactor \u6a21\u578b\u5b9e\u73b0\u4e86\u9ad8\u5e76\u53d1\u5904\u7406\u80fd\u529b\u3002\n*   **\u8d44\u6e90\u4e0a**\uff1a\u5185\u5b58\u6c60\u3001\u96f6\u62f7\u8d1d\u3001\u5bf9\u8c61\u6c60\u51cf\u5c11\u4e86\u7cfb\u7edf\u5f00\u9500\u3002\n*   **\u7ec6\u8282\u4e0a**\uff1a\u89e3\u51b3\u4e86 JDK Bug\uff0c\u5e76\u8fdb\u884c\u4e86 TCP \u534f\u8bae\u6808\u5c42\u9762\u7684\u6df1\u5ea6\u4f18\u5316\u3002\n\n\u8fd9\u4e5f\u662f\u4e3a\u4ec0\u4e48\u5728\u6211\u8d1f\u8d23\u7684\u5c0f\u7535\u8bbe\u5907\u63a5\u5165\u5e73\u53f0\u4e2d\uff0c\u9009\u62e9 Netty \u4f5c\u4e3a\u5e95\u5c42\u901a\u4fe1\u6846\u67b6\uff0c\u5b83\u8ba9\u6211\u4eec\u80fd\u591f\u4ee5\u8f83\u5c11\u7684\u670d\u52a1\u5668\u8d44\u6e90\uff0c\u7a33\u5b9a\u652f\u6491\u4e86\u5343\u4e07\u7ea7\u8bbe\u5907\u7684\u9ad8\u5e76\u53d1\u5fc3\u8df3\u4e0e\u6570\u636e\u4e0a\u62a5\u3002",

  "258": {
    "title": "Netty \u7684\u7ebf\u7a0b\u6a21\u578b\u5728\u4f60\u4eec\u9879\u76ee\u91cc\u662f\u600e\u4e48\u4f53\u73b0\u7684\uff1f\n\u4e3a\u4ec0\u4e48\u4e0d\u7528\u4f20\u7edf BIO\uff1f",
    "style": "background-color: yellow;",
    "details": "\u9762\u8bd5\u5b98\u60a8\u597d\uff0c\u8fd9\u662f\u4e00\u4e2a\u975e\u5e38\u597d\u7684\u5b9e\u6218\u95ee\u9898\u3002\u7ed3\u5408\u6211\u5728\u5c0f\u7535\u79d1\u6280\u8d1f\u8d23\u8bbe\u5907\u63a5\u5165\u5e73\u53f0\u7684\u7ecf\u9a8c\uff0c\u6211\u5c06\u4ece**\u201c\u67b6\u6784\u843d\u5730\u201d**\u548c**\u201c\u6280\u672f\u9009\u578b\u5bf9\u6bd4\u201d**\u4e24\u4e2a\u7ef4\u5ea6\u6765\u56de\u7b54\u3002\n\n### \u4e00\u3001 Netty \u7ebf\u7a0b\u6a21\u578b\u5728\u6211\u4eec\u9879\u76ee\u4e2d\u7684\u843d\u5730\u4f53\u73b0\n\n\u5728\u6211\u4eec\u7684\u5171\u4eab\u5145\u7535\u5b9d\u7269\u8054\u7f51\u5e73\u53f0\u4e2d\uff0c\u6838\u5fc3\u4e1a\u52a1\u662f\u652f\u6491\u5343\u4e07\u7ea7\u8bbe\u5907\u7684\u5b9e\u65f6\u5fc3\u8df3\u4e0a\u62a5\u3001\u72b6\u6001\u540c\u6b65\u4ee5\u53ca\u79df\u501f\u4ea4\u6613\u6307\u4ee4\u4e0b\u53d1\u3002\u6211\u4eec\u57fa\u4e8e Netty \u7684 **\u4e3b\u4ece Reactor \u591a\u7ebf\u7a0b\u6a21\u578b** \u8fdb\u884c\u4e86\u5b9a\u5236\u5316\u843d\u5730\uff0c\u5177\u4f53\u4f53\u73b0\u5982\u4e0b\uff1a\n\n#### 1. \u804c\u8d23\u5206\u79bb\u7684\u7ebf\u7a0b\u7ec4\u914d\u7f6e\n\u6211\u4eec\u5728\u4ee3\u7801\u5c42\u9762\u914d\u7f6e\u4e86\u4e24\u4e2a `EventLoopGroup`\uff0c\u8fd9\u6b63\u662f Reactor \u6a21\u578b\u7684\u6838\u5fc3\u4f53\u73b0\uff1a\n\n*   **Boss Group\uff08\u8fde\u63a5\u63a5\u5f85\u5458\uff09**\uff1a\n    *   \u6211\u4eec\u901a\u5e38\u914d\u7f6e\u7ebf\u7a0b\u6570\u4e3a 1\u3002\u5b83\u7684\u804c\u8d23\u975e\u5e38\u5355\u4e00\uff0c\u53ea\u8d1f\u8d23\u76d1\u542c\u670d\u52a1\u7aef\u7684 ServerSocketChannel \u7684 `OP_ACCEPT` \u4e8b\u4ef6\u3002\n    *   \u4e00\u65e6\u6709\u65b0\u7684\u5145\u7535\u5b9d\u673a\u67dc\uff08\u8bbe\u5907\u7f51\u5173\uff09\u53d1\u8d77\u8fde\u63a5\uff0cBoss Group \u8d1f\u8d23\u5b8c\u6210 TCP \u4e09\u6b21\u63e1\u624b\uff0c\u5efa\u7acb\u8fde\u63a5\uff0c\u7136\u540e\u5c06\u8fd9\u4e2a\u8fde\u63a5\u6ce8\u518c\u5230 Worker Group \u7684\u67d0\u4e2a SubReactor \u7ebf\u7a0b\u4e0a\u3002\n    *   **\u4ef7\u503c**\uff1a\u8fd9\u5c31\u50cf\u996d\u5e97\u7684\u524d\u53f0\uff0c\u53ea\u8d1f\u8d23\u8fce\u5bbe\uff0c\u4e0d\u5904\u7406\u5177\u4f53\u70b9\u83dc\u4e1a\u52a1\uff0c\u4fdd\u8bc1\u4e86\u65b0\u8fde\u63a5\u63a5\u5165\u4e0d\u88ab\u963b\u585e\u3002\n\n*   **Worker Group\uff08\u4e1a\u52a1\u670d\u52a1\u5458\uff09**\uff1a\n    *   \u6211\u4eec\u6839\u636e\u670d\u52a1\u5668 CPU \u6838\u5fc3\u6570\u914d\u7f6e\u4e86 N \u4e2a\u7ebf\u7a0b\uff08\u901a\u5e38\u662f `2 * CPU\u6838\u5fc3\u6570`\uff09\u3002\n    *   \u5b83\u4eec\u8d1f\u8d23\u5904\u7406\u8fde\u63a5\u4e0a\u7684\u6240\u6709 I/O \u64cd\u4f5c\uff1a\u8bfb\u53d6\u8bbe\u5907\u4e0a\u62a5\u7684\u6570\u636e\u5305\uff08`OP_READ`\uff09\u3001\u89e3\u7801\u3001\u5fc3\u8df3\u68c0\u6d4b\u3001\u4ee5\u53ca\u4e0b\u53d1\u6307\u4ee4\uff08`OP_WRITE`\uff09\u3002\n    *   **\u4ef7\u503c**\uff1a\u4e00\u4e2a Worker \u7ebf\u7a0b\u53ef\u4ee5\u540c\u65f6\u5904\u7406\u6210\u767e\u4e0a\u5343\u4e2a\u8bbe\u5907\u8fde\u63a5\uff08\u591a\u8def\u590d\u7528\uff09\uff0c\u907f\u514d\u4e86\u4e3a\u6bcf\u4e2a\u8bbe\u5907\u5355\u72ec\u5f00\u7ebf\u7a0b\u7684\u8d44\u6e90\u6d6a\u8d39\u3002\n\n#### 2. \u65e0\u9501\u5316\u7684\u4e32\u884c\u5904\u7406\u673a\u5236\n\u8fd9\u662f\u6211\u4eec\u9879\u76ee\u4e2d\u4fdd\u8bc1\u9ad8\u6027\u80fd\u7684\u5173\u952e\u8bbe\u8ba1\u3002\n\n*   Netty \u4fdd\u8bc1\u4e86\u4e00\u4e2a\u8bbe\u5907\u8fde\u63a5\u5728\u6574\u4e2a\u751f\u547d\u5468\u671f\u5185\uff0c\u53ea\u88ab Worker Group \u4e2d\u7684**\u67d0\u4e00\u4e2a\u56fa\u5b9a\u7ebf\u7a0b**\u5904\u7406\u3002\n*   **\u843d\u5730\u7ec6\u8282**\uff1a\u6211\u4eec\u5728 ChannelPipeline \u4e2d\u6dfb\u52a0\u4e86\u7f16\u89e3\u7801\u5668\u548c\u4e1a\u52a1 Handler\u3002\u5f53\u8bbe\u5907\u4e0a\u62a5\u201c\u5f52\u8fd8\u5145\u7535\u5b9d\u201d\u4e8b\u4ef6\u65f6\uff0c\u4ece\u8bfb\u53d6\u5b57\u8282\u6d41 -> \u89e3\u6790\u534f\u8bae -> \u66f4\u65b0 Redis \u72b6\u6001\uff0c\u5168\u90e8\u5728\u540c\u4e00\u4e2a IO \u7ebf\u7a0b\u5185\u5b8c\u6210\u3002\n*   **\u4f18\u52bf**\uff1a\u56e0\u4e3a\u5168\u7a0b\u5728\u540c\u4e00\u4e2a\u7ebf\u7a0b\u5185\uff0c\u4e0d\u9700\u8981\u52a0\u9501\u6765\u4fdd\u8bc1\u7ebf\u7a0b\u5b89\u5168\u3002\u8fd9\u6781\u5927\u5730\u964d\u4f4e\u4e86\u5e76\u53d1\u7ade\u4e89\u5e26\u6765\u7684\u6027\u80fd\u635f\u8017\uff0c\u540c\u65f6\u4e5f\u907f\u514d\u4e86\u591a\u7ebf\u7a0b\u4e0a\u4e0b\u6587\u5207\u6362\u7684\u5f00\u9500\u3002\n\n#### 3. \u8017\u65f6\u4e1a\u52a1\u7684\u201c\u5265\u79bb\u201d\u7b56\u7565\n\u867d\u7136 Netty \u63d0\u5021\u4e32\u884c\u5904\u7406\uff0c\u4f46\u5728\u6211\u4eec\u7684\u573a\u666f\u4e2d\uff0c\u79df\u501f\u8ba2\u5355\u6d89\u53ca\u6570\u636e\u5e93\u4e8b\u52a1\u548c\u590d\u6742\u7684\u8ba1\u8d39\u903b\u8f91\uff0c\u8017\u65f6\u8f83\u957f\u3002\u5982\u679c\u76f4\u63a5\u5728 I/O \u7ebf\u7a0b\u91cc\u8dd1\uff0c\u4f1a\u963b\u585e\u5176\u4ed6\u8bbe\u5907\u7684\u5fc3\u8df3\u4e0a\u62a5\u3002\n\n*   **\u6211\u4eec\u7684\u505a\u6cd5**\uff1a\u5728 ChannelPipeline \u4e2d\uff0c\u6211\u4eec\u901a\u8fc7\u89e3\u7801\u5668\u89e3\u6790\u51fa\u4e1a\u52a1\u5bf9\u8c61\u540e\uff0c\u5e76\u4e0d\u5728 I/O \u7ebf\u7a0b\u76f4\u63a5\u5904\u7406\uff0c\u800c\u662f\u63d0\u4ea4\u5230\u4e00\u4e2a\u72ec\u7acb\u7684**\u4e1a\u52a1\u7ebf\u7a0b\u6c60** \u4e2d\u6267\u884c\u3002\n*   **\u4ef7\u503c**\uff1aI/O \u7ebf\u7a0b\u53ea\u8d1f\u8d23\u201c\u642c\u8fd0\u6570\u636e\u201d\u548c\u201c\u534f\u8bae\u89e3\u6790\u201d\uff0c\u771f\u6b63\u8017\u65f6\u7684\u4e1a\u52a1\u903b\u8f91\uff08\u5982\u8c03\u7528\u8ba1\u8d39\u670d\u52a1\u3001\u5199\u6570\u636e\u5e93\uff09\u88ab\u9694\u79bb\u51fa\u53bb\u3002\u8fd9\u6837\u4fdd\u8bc1\u4e86 I/O \u7ebf\u7a0b\u59cb\u7ec8\u5904\u4e8e\u201c\u6781\u901f\u54cd\u5e94\u201d\u72b6\u6001\uff0c\u4e0d\u4f1a\u56e0\u4e3a\u4e00\u4e2a\u6162\u67e5\u8be2\u5bfc\u81f4\u6574\u4e2a\u673a\u67dc\u6389\u7ebf\u3002\n\n---\n\n### \u4e8c\u3001 \u4e3a\u4ec0\u4e48\u4e0d\u7528\u4f20\u7edf BIO\uff1f\n\n\u5982\u679c\u5728\u6211\u4eec\u7684\u5343\u4e07\u7ea7\u8bbe\u5907\u573a\u666f\u4e0b\u4f7f\u7528\u4f20\u7edf BIO\uff08Blocking IO\uff09\uff0c\u5c06\u4f1a\u9762\u4e34\u707e\u96be\u6027\u7684\u540e\u679c\u3002\u4e3b\u8981\u539f\u56e0\u6709\u4e09\u70b9\uff1a\n\n#### 1. \u7ebf\u7a0b\u8d44\u6e90\u8017\u5c3d\uff08C10K \u95ee\u9898\uff09\n*   **BIO \u6a21\u578b**\uff1a\u4f20\u7edf BIO \u662f\u201c\u4e00\u8fde\u63a5\u4e00\u7ebf\u7a0b\u201d\u3002\u5982\u679c\u6211\u4eec\u8981\u652f\u6491 10,000 \u53f0\u8bbe\u5907\u540c\u65f6\u5728\u7ebf\uff0c\u670d\u52a1\u7aef\u5c31\u9700\u8981\u521b\u5efa 10,000 \u4e2a\u7ebf\u7a0b\u3002\n*   **\u6211\u4eec\u7684\u573a\u666f**\uff1a\u5c0f\u7535\u6709\u5343\u4e07\u7ea7\u8bbe\u5907\uff0c\u5373\u4fbf\u53ea\u6709 10% \u5728\u7ebf\uff0c\u4e5f\u9700\u8981\u767e\u4e07\u7ea7\u7ebf\u7a0b\u3002Linux \u64cd\u4f5c\u7cfb\u7edf\u7684\u7ebf\u7a0b\u4e0a\u4e0b\u6587\u5207\u6362\u6210\u672c\u6781\u9ad8\uff0c\u4e14\u7ebf\u7a0b\u662f\u6602\u8d35\u8d44\u6e90\uff0c\u8fd9\u4f1a\u5bfc\u81f4\u670d\u52a1\u5668\u5185\u5b58\u77ac\u95f4\u6ea2\u51fa\uff08OOM\uff09\u6216 CPU \u6ee1\u8f7d\u6b7b\u673a\u3002\n*   **Netty (NIO)**\uff1a\u53ea\u9700\u8981\u51e0\u5341\u4e2a Worker \u7ebf\u7a0b\u5c31\u80fd\u8f7b\u677e\u652f\u6491\u767e\u4e07\u7ea7\u8fde\u63a5\uff0c\u8d44\u6e90\u6d88\u8017\u6781\u4f4e\u3002\n\n#### 2. \u963b\u585e\u5bfc\u81f4\u7684\u541e\u5410\u91cf\u4f4e\u4e0b\n*   **BIO \u6a21\u578b**\uff1a\u7ebf\u7a0b\u5728\u8c03\u7528 `read()` \u65f6\u5fc5\u987b\u963b\u585e\uff0c\u76f4\u5230\u6570\u636e\u5230\u8fbe\u3002\u5bf9\u4e8e\u7269\u8054\u7f51\u8bbe\u5907\uff0c\u5927\u90e8\u5206\u65f6\u95f4\u662f\u6ca1\u6709\u6570\u636e\u4f20\u8f93\u7684\uff08\u7a7a\u95f2\u72b6\u6001\uff09\uff0c\u7ebf\u7a0b\u5927\u90e8\u5206\u65f6\u95f4\u90fd\u5728\u201c\u50bb\u7b49\u201d\u3002\n*   **\u6211\u4eec\u7684\u573a\u666f**\uff1a\u5145\u7535\u5b9d\u673a\u67dc\u53ef\u80fd 1 \u5c0f\u65f6\u624d\u4e0a\u62a5\u4e00\u6b21\u72b6\u6001\uff0c\u5982\u679c\u7528 BIO\uff0c\u6210\u5343\u4e0a\u4e07\u4e2a\u7ebf\u7a0b\u90fd\u5728\u7a7a\u8f6c\u7b49\u5f85\uff0c\u7cfb\u7edf\u541e\u5410\u91cf\u6781\u4f4e\uff0c\u6839\u672c\u65e0\u6cd5\u5904\u7406\u7a81\u53d1\u7684\u9ad8\u9891\u79df\u501f\u8bf7\u6c42\u3002\n*   **Netty (NIO)**\uff1a\u57fa\u4e8e IO \u591a\u8def\u590d\u7528\uff0c\u7ebf\u7a0b\u53ea\u5728\u6709\u6570\u636e\u53ef\u8bfb\u65f6\u624d\u5de5\u4f5c\u3002\u6ca1\u6709\u4e8b\u4ef6\u65f6\uff0c\u7ebf\u7a0b\u53ef\u4ee5\u53bb\u670d\u52a1\u5176\u4ed6\u8fde\u63a5\uff0c\u5229\u7528\u7387\u6781\u9ad8\u3002\n\n#### 3. \u7cfb\u7edf\u7a33\u5b9a\u6027\u4e0e\u6269\u5c55\u6027\n*   **BIO \u6a21\u578b**\uff1a\u5f53\u5e76\u53d1\u7a81\u589e\uff08\u5982\u65e9\u665a\u9ad8\u5cf0\uff09\uff0c\u7ebf\u7a0b\u6570\u66b4\u589e\uff0c\u4f1a\u5bfc\u81f4\u7cfb\u7edf\u8d1f\u8f7d\u98d9\u5347\uff0c\u751a\u81f3\u5f15\u53d1\u201c\u60ca\u7fa4\u6548\u5e94\u201d\u6216\u7ebf\u7a0b\u6c60\u8017\u5c3d\uff0c\u5bfc\u81f4\u670d\u52a1\u4e0d\u53ef\u7528\u3002\n*   **Netty (NIO)**\uff1a\u7531\u4e8e\u7ebf\u7a0b\u6570\u56fa\u5b9a\uff08\u4e14\u5c11\uff09\uff0c\u65e0\u8bba\u8fde\u63a5\u6570\u5982\u4f55\u589e\u52a0\uff0c\u7cfb\u7edf\u7684 CPU \u548c\u5185\u5b58\u6d88\u8017\u90fd\u4fdd\u6301\u5e73\u7a33\u3002\u8fd9\u79cd**\u201c\u6709\u754c\u201d**\u7684\u8d44\u6e90\u6a21\u578b\uff0c\u662f\u9ad8\u5e76\u53d1\u7cfb\u7edf\u7a33\u5b9a\u6027\u7684\u57fa\u77f3\u3002\n\n### \u603b\u7ed3\n\n\u7b80\u5355\u6765\u8bf4\uff0c\u4f20\u7edf BIO \u5c31\u50cf**\u201c\u51fa\u79df\u8f66\u201d**\uff0c\u4e00\u4e2a\u53f8\u673a\u53ea\u80fd\u62c9\u4e00\u4e2a\u5ba2\u4eba\uff0c\u5ba2\u4eba\u4e0b\u8f66\u524d\u53f8\u673a\u53ea\u80fd\u7b49\u7740\uff0c\u6548\u7387\u6781\u4f4e\uff1b\u800c Netty \u7684\u7ebf\u7a0b\u6a21\u578b\u5c31\u50cf**\u201c\u516c\u4ea4\u8f66\u201d**\uff0c\u4e00\u4e2a\u53f8\u673a\uff08\u7ebf\u7a0b\uff09\u53ef\u4ee5\u670d\u52a1\u4e00\u8f66\u4eba\uff08\u591a\u4e2a\u8fde\u63a5\uff09\uff0c\u8c01\u6709\u9700\u6c42\uff08IO \u4e8b\u4ef6\uff09\u5c31\u5904\u7406\u8c01\uff0c\u6548\u7387\u6781\u9ad8\u3002\n\n\u8fd9\u4e5f\u662f\u4e3a\u4ec0\u4e48\u6211\u4eec\u5728\u67b6\u6784\u8bbe\u8ba1\u65f6\uff0c\u6beb\u4e0d\u72b9\u8c6b\u5730\u9009\u62e9\u4e86 Netty \u4f5c\u4e3a\u5e95\u5c42\u901a\u4fe1\u6846\u67b6\uff0c\u5b83\u8ba9\u6211\u4eec\u7528\u6700\u5c11\u7684\u670d\u52a1\u5668\u8d44\u6e90\uff0c\u7a33\u5b9a\u652f\u6491\u4e86\u5168\u94fe\u8def\u7684\u4e1a\u52a1\u6311\u6218\u3002",

    "title": "Reactor\u6a21\u578b\u662f\u4ec0\u4e48\uff1f",
    "style": "",
    "details": "\u9762\u8bd5\u5b98\u60a8\u597d\uff0cReactor \u6a21\u578b\u662f\u9ad8\u6027\u80fd\u7f51\u7edc\u7f16\u7a0b\u4e2d\u975e\u5e38\u6838\u5fc3\u7684\u8bbe\u8ba1\u6a21\u5f0f\uff0c\u4e5f\u662f\u6211\u5728\u7814\u7a76 Netty\u3001Redis \u7b49\u4e2d\u95f4\u4ef6\u6e90\u7801\u65f6\u91cd\u70b9\u5173\u6ce8\u7684\u5e95\u5c42\u673a\u5236\u3002\n\n\u7b80\u5355\u6765\u8bf4\uff0cReactor \u6a21\u5f0f\u662f\u57fa\u4e8e**\u4e8b\u4ef6\u9a71\u52a8**\u7684\uff0c\u5b83\u901a\u8fc7**\u4e00\u4e2a\u6216\u591a\u4e2a\u5faa\u73af**\u6765\u76d1\u542c\u548c\u5206\u53d1\u4e8b\u4ef6\uff0c\u5c06\u4e8b\u4ef6\u7684**\u76d1\u542c**\u4e0e**\u5904\u7406**\u5206\u79bb\u5f00\u6765\uff0c\u4ece\u800c\u5b9e\u73b0\u9ad8\u5e76\u53d1\u5904\u7406\u3002\n\n\u4e3a\u4e86\u66f4\u6e05\u6670\u5730\u89e3\u91ca\uff0c\u6211\u901a\u5e38\u5c06\u5176\u5206\u4e3a\u4e09\u4e2a\u6838\u5fc3\u89d2\u8272\u548c\u4e09\u79cd\u7ecf\u5178\u5b9e\u73b0\uff1a\n\n### \u4e00\u3001 Reactor \u6a21\u578b\u7684\u4e09\u4e2a\u6838\u5fc3\u89d2\u8272\n\n1.  **Reactor\uff08\u53cd\u5e94\u5668/\u5206\u53d1\u5668\uff09**\uff1a\n    *   \u8d1f\u8d23\u76d1\u542c\u4e8b\u4ef6\uff08\u5982\u8fde\u63a5\u5efa\u7acb\u3001\u8bfb\u5c31\u7eea\u3001\u5199\u5c31\u7eea\uff09\u3002\n    *   \u5f53\u4e8b\u4ef6\u53d1\u751f\u65f6\uff0c\u5c06\u5176\u5206\u53d1\u7ed9\u5bf9\u5e94\u7684 Handler \u5904\u7406\u3002\n    *   \u5728 Java \u4e2d\u901a\u5e38\u5bf9\u5e94 `Selector`\uff08\u9009\u62e9\u5668\uff09\u3002\n\n2.  **Handler\uff08\u5904\u7406\u5668\uff09**\uff1a\n    *   \u8d1f\u8d23\u5904\u7406\u5177\u4f53\u7684\u4e1a\u52a1\u903b\u8f91\u3002\n    *   \u5b83\u4e0e\u4e8b\u4ef6\u7ed1\u5b9a\uff0c\u6bd4\u5982\u201c\u8bfb\u4e8b\u4ef6\u201d\u7ed1\u5b9a\u201c\u8bfb\u53d6\u6570\u636e\u5e76\u5904\u7406\u201d\u7684\u903b\u8f91\u3002\n\n3.  **Acceptor\uff08\u63a5\u6536\u5668\uff09**\uff1a\n    *   \u4e13\u95e8\u5904\u7406 `OP_ACCEPT`\uff08\u8fde\u63a5\u5efa\u7acb\uff09\u4e8b\u4ef6\uff0c\u8d1f\u8d23\u5c06\u65b0\u8fde\u63a5\u7ed1\u5b9a\u5230 IO \u591a\u8def\u590d\u7528\u5668\u4e0a\u3002\n\n---\n\n### \u4e8c\u3001 \u4e09\u79cd\u7ecf\u5178\u7684 Reactor \u6a21\u578b\u6f14\u8fdb\n\n\u5728\u5b9e\u9645\u67b6\u6784\u8bbe\u8ba1\u4e2d\uff0c\u6211\u4eec\u901a\u5e38\u6839\u636e\u4e1a\u52a1\u573a\u666f\u7684\u5e76\u53d1\u91cf\u9009\u62e9\u4e0d\u540c\u7684\u6a21\u578b\uff1a\n\n#### 1. \u5355 Reactor \u5355\u7ebf\u7a0b\u6a21\u578b\n*   **\u539f\u7406**\uff1a\u4e00\u4e2a\u7ebf\u7a0b\u5145\u5f53 Reactor\uff0c\u8d1f\u8d23\u76d1\u542c\u3001\u5206\u53d1\u548c\u5904\u7406\u6240\u6709\u8bf7\u6c42\u3002\n*   **\u4ee3\u8868\u5e94\u7528**\uff1a**Redis**\u3002\n*   **\u4f18\u70b9**\uff1a\u6a21\u578b\u7b80\u5355\uff0c\u6ca1\u6709\u7ebf\u7a0b\u5207\u6362\u5f00\u9500\uff0c\u5b9e\u73b0\u5bb9\u6613\u3002\n*   **\u7f3a\u70b9**\uff1a\u65e0\u6cd5\u5229\u7528\u591a\u6838 CPU\u3002\u5982\u679c\u5904\u7406\u4e1a\u52a1\u7684 Handler \u8017\u65f6\u8f83\u957f\uff0c\u4f1a\u5bfc\u81f4\u540e\u7eed\u8bf7\u6c42\u6392\u961f\uff0c\u9020\u6210\u7cfb\u7edf\u963b\u585e\u3002\n*   **\u9002\u7528\u573a\u666f**\uff1a\u8ba1\u7b97\u5bc6\u96c6\u578b\u6216\u5feb\u901f\u5904\u7406\u7684\u4e1a\u52a1\uff08\u5982 Redis \u7684\u7eaf\u5185\u5b58\u64cd\u4f5c\uff09\u3002\n\n#### 2. \u5355 Reactor \u591a\u7ebf\u7a0b\u6a21\u578b\n*   **\u539f\u7406**\uff1aReactor \u4ecd\u7136\u662f\u4e00\u4e2a\u7ebf\u7a0b\uff0c\u53ea\u8d1f\u8d23\u76d1\u542c\u548c\u5206\u53d1\u3002\u4f46\u5c06\u8017\u65f6\u7684\u4e1a\u52a1\u5904\u7406\u903b\u8f91\u653e\u5165\u4e00\u4e2a**\u7ebf\u7a0b\u6c60**\u4e2d\u5f02\u6b65\u6267\u884c\u3002\n*   **\u4f18\u70b9**\uff1a\u5145\u5206\u5229\u7528\u591a\u6838 CPU\uff0cReactor \u7ebf\u7a0b\u53ea\u8d1f\u8d23 IO\uff0c\u54cd\u5e94\u901f\u5ea6\u5feb\u3002\n*   **\u7f3a\u70b9**\uff1aReactor \u53ea\u6709\u4e00\u4e2a\uff0c\u9ad8\u5e76\u53d1\u8fde\u63a5\u5efa\u7acb\u65f6\u53ef\u80fd\u6210\u4e3a\u6027\u80fd\u74f6\u9888\uff1b\u540c\u65f6\u627f\u62c5\u6240\u6709 IO \u64cd\u4f5c\uff0c\u538b\u529b\u8f83\u5927\u3002\n\n#### 3. \u4e3b\u4ece Reactor \u591a\u7ebf\u7a0b\u6a21\u578b\u2014\u2014 **\u6700\u4e3b\u6d41\u3001\u9ad8\u6027\u80fd**\n*   **\u539f\u7406**\uff1a\n    *   **MainReactor\uff08\u4e3b Reactor\uff09**\uff1a\u53ea\u8d1f\u8d23\u76d1\u542c `OP_ACCEPT`\uff08\u8fde\u63a5\u5efa\u7acb\uff09\uff0c\u5efa\u7acb\u8fde\u63a5\u540e\u5c06 SocketChannel \u6ce8\u518c\u7ed9 SubReactor\u3002\n    *   **SubReactor\uff08\u4ece Reactor\uff09**\uff1a\u8d1f\u8d23\u76d1\u542c `OP_READ`\u3001`OP_WRITE` \u7b49 IO \u4e8b\u4ef6\uff0c\u5e76\u5206\u53d1\u7ed9 Worker \u7ebf\u7a0b\u6c60\u5904\u7406\u4e1a\u52a1\u3002\n    *   \u901a\u5e38\u4f1a\u6709\u591a\u4e2a SubReactor \u7ebf\u7a0b\uff0c\u6bcf\u4e2a\u7ebf\u7a0b\u7ed1\u5b9a\u81ea\u5df1\u7684 Selector\u3002\n*   **\u4ee3\u8868\u5e94\u7528**\uff1a**Netty**\u3001**Nginx**\u3001**Memcached**\u3002\n*   **\u4f18\u70b9**\uff1a\n    *   **\u804c\u8d23\u5206\u79bb**\uff1a\u8fde\u63a5\u5efa\u7acb\u4e0e IO \u8bfb\u5199\u5206\u79bb\u3002\n    *   **\u6c34\u5e73\u6269\u5c55**\uff1a\u53ef\u4ee5\u6839\u636e\u673a\u5668\u6838\u6570\u542f\u52a8\u591a\u4e2a SubReactor\uff0c\u5145\u5206\u5229\u7528\u786c\u4ef6\u8d44\u6e90\u3002\n    *   **\u9ad8\u53ef\u7528**\uff1a\u5373\u4f7f\u67d0\u4e2a SubReactor \u6545\u969c\uff0c\u4e5f\u53ea\u5f71\u54cd\u90e8\u5206\u8fde\u63a5\uff0c\u4e0d\u4f1a\u5bfc\u81f4\u5168\u7ad9\u762b\u75ea\u3002\n\n---\n\n### \u4e09\u3001 \u5b9e\u6218\u5173\u8054\uff1aNetty \u662f\u5982\u4f55\u843d\u5730\u7684\uff1f\n\n\u5728\u6211\u4e3b\u5bfc\u7684\u5fae\u670d\u52a1\u67b6\u6784\u6216\u4e2d\u95f4\u4ef6\u7814\u53d1\u4e2d\uff0cNetty \u662f\u6700\u5e38\u7528\u7684\u7f51\u7edc\u6846\u67b6\uff0c\u5b83\u5c31\u662f\u5bf9 Reactor \u6a21\u578b\u7684\u5b8c\u7f8e\u843d\u5730\uff1a\n\n1.  **Boss Group**\uff1a\u5bf9\u5e94 MainReactor\uff0c\u8d1f\u8d23\u5904\u7406\u8fde\u63a5\u3002\n2.  **Worker Group**\uff1a\u5bf9\u5e94 SubReactor\uff0c\u8d1f\u8d23\u5904\u7406 IO \u8bfb\u5199\u3002\n3.  **NioEventLoop**\uff1aNetty \u4e2d\u7684 Reactor \u7ebf\u7a0b\uff0c\u5185\u90e8\u5305\u542b\u4e00\u4e2a\u6b7b\u5faa\u73af\u4e0d\u65ad\u68c0\u6d4b Selector \u4e0a\u7684\u4e8b\u4ef6\u3002\n\n### \u603b\u7ed3\n\nReactor \u6a21\u578b\u7684\u6838\u5fc3\u4ef7\u503c\u5728\u4e8e**\u201c\u975e\u963b\u585e IO + IO \u591a\u8def\u590d\u7528\u201d**\u3002\n\n\u5728\u6211\u7684\u67b6\u6784\u8bbe\u8ba1\u4e2d\uff0c\u5982\u679c\u662f\u81ea\u7814\u7f51\u5173\u6216\u901a\u4fe1\u7ec4\u4ef6\uff0c\u6211\u4f1a\u9996\u9009**\u4e3b\u4ece Reactor \u591a\u7ebf\u7a0b\u6a21\u578b**\uff0c\u56e0\u4e3a\u5b83\u89e3\u51b3\u4e86 C10K\uff08\u4e07\u7ea7\u5e76\u53d1\uff09\u751a\u81f3 C100K \u95ee\u9898\uff0c\u80fd\u591f\u4fdd\u8bc1\u7cfb\u7edf\u5728\u6d77\u91cf\u8fde\u63a5\u4e0b\u4f9d\u7136\u4fdd\u6301\u9ad8\u541e\u5410\u548c\u4f4e\u5ef6\u8fdf\u3002",
    "subItems": []

  "260": {
    "title": "\u4f60\u9879\u76ee\u91cc\u600e\u4e48\u4f53\u73b0 Reactor\uff1f",
    "style": "background-color: yellow;",
    "details": "\u9762\u8bd5\u5b98\u60a8\u597d\uff0c\u8fd9\u662f\u4e00\u4e2a\u89e6\u53ca Netty \u6838\u5fc3\u8bbe\u8ba1\u7406\u5ff5\u7684\u95ee\u9898\u3002\u7ed3\u5408\u6211\u5728\u5c0f\u7535\u79d1\u6280\u8d1f\u8d23\u7684\u8bbe\u5907\u63a5\u5165\u5e73\u53f0\uff0cReactor \u6a21\u5f0f\u4e3b\u8981\u4f53\u73b0\u5728**\u201c\u4e09\u4e2a\u6838\u5fc3\u89d2\u8272\u7684\u534f\u4f5c\u201d**\u548c**\u201c\u4e24\u4e2a\u9636\u6bb5\u7684\u804c\u8d23\u5206\u79bb\u201d**\u4e0a\u3002\n\n\u5728\u6211\u4eec\u7684\u5171\u4eab\u5145\u7535\u5b9d\u7269\u8054\u7f51\u5e73\u53f0\u4e2d\uff0c\u6211\u662f\u8fd9\u6837\u843d\u5730 Reactor \u6a21\u5f0f\u7684\uff1a\n\n### \u4e00\u3001 \u4e09\u4e2a\u6838\u5fc3\u89d2\u8272\u7684\u843d\u5730\u4f53\u73b0\n\nReactor \u6a21\u5f0f\u7684\u672c\u8d28\u662f**\u201c\u57fa\u4e8e\u4e8b\u4ef6\u9a71\u52a8\u7684\u591a\u8def\u590d\u7528\u201d**\uff0c\u6211\u4eec\u5728\u4ee3\u7801\u5c42\u9762\u901a\u8fc7 Netty \u7684 `EventLoopGroup` \u5b8c\u7f8e\u5bf9\u5e94\u4e86\u8fd9\u4e09\u4e2a\u89d2\u8272\uff1a\n\n#### 1. Reactor\uff08\u53cd\u5e94\u5668/\u591a\u8def\u590d\u7528\u5668\uff09\n*   **\u843d\u5730\u4f53\u73b0**\uff1a\u5bf9\u5e94 Netty \u4e2d\u7684 `EventLoop`\uff08\u672c\u8d28\u662f Selector\uff09\u3002\n*   **\u804c\u8d23**\uff1a\u5b83\u5c31\u50cf\u4e00\u4e2a**\u201c\u603b\u76d1\u63a7\u53f0\u201d**\u3002\u5728\u6211\u4eec\u7684\u670d\u52a1\u5668\u4e0a\uff0c\u5b83\u8d1f\u8d23\u4e0d\u65ad\u5730\u8f6e\u8be2\u68c0\u67e5\u5343\u4e07\u7ea7\u8bbe\u5907\u8fde\u63a5\u4e2d\uff0c\u54ea\u4e9b\u53d1\u751f\u4e86\u611f\u5174\u8da3\u7684\u4e8b\u4ef6\uff08\u6bd4\u5982\uff1a\u6709\u65b0\u673a\u67dc\u8fde\u4e0a\u4e86\u3001\u6709\u673a\u67dc\u4e0a\u62a5\u5fc3\u8df3\u4e86\u3001\u6709\u79df\u501f\u6307\u4ee4\u9700\u8981\u4e0b\u53d1\u4e86\uff09\u3002\n*   **\u4ef7\u503c**\uff1a\u5b83\u4e0d\u518d\u50cf\u4f20\u7edf BIO \u90a3\u6837\u50bb\u50bb\u5730\u7b49\u5f85\uff0c\u800c\u662f\u9ad8\u6548\u5730\u201c\u53cd\u5e94\u201d\u5df2\u7ecf\u5c31\u7eea\u7684 IO \u4e8b\u4ef6\u3002\n\n#### 2. Acceptor\uff08\u63a5\u6536\u5668\uff09\n*   **\u843d\u5730\u4f53\u73b0**\uff1a\u5bf9\u5e94 `Boss Group` \u4e2d\u7684\u7ebf\u7a0b\u3002\n*   **\u804c\u8d23**\uff1a\u5f53 Reactor \u76d1\u542c\u5230 `OP_ACCEPT`\uff08\u65b0\u8fde\u63a5\uff09\u4e8b\u4ef6\u65f6\uff0c\u4f1a\u56de\u8c03 Acceptor\u3002\n    *   \u5728\u6211\u4eec\u9879\u76ee\u4e2d\uff0cBoss \u7ebf\u7a0b\u53ea\u505a\u4e00\u4ef6\u4e8b\uff1a\u5b8c\u6210 TCP \u4e09\u6b21\u63e1\u624b\uff0c\u5efa\u7acb\u8fde\u63a5\uff0c\u751f\u6210\u5bf9\u5e94\u7684 `NioSocketChannel`\uff0c\u7136\u540e\u5c06\u8fd9\u4e2a\u8fde\u63a5**\u6ce8\u518c**\u5230 `Worker Group` \u7684\u67d0\u4e2a SubReactor \u4e0a\u3002\n*   **\u4ef7\u503c**\uff1a\u5b9e\u73b0\u4e86**\u8fde\u63a5\u5efa\u7acb**\u4e0e**\u4e1a\u52a1\u5904\u7406**\u7684\u89e3\u8026\uff0c\u4fdd\u8bc1\u8fde\u63a5\u63a5\u5165\u4e0d\u4f1a\u88ab\u4e1a\u52a1\u903b\u8f91\u963b\u585e\u3002\n\n#### 3. Handler\uff08\u5904\u7406\u5668\uff09\n*   **\u843d\u5730\u4f53\u73b0**\uff1a\u5bf9\u5e94\u6211\u4eec\u5728 `ChannelPipeline` \u4e2d\u5b9a\u4e49\u7684\u4e00\u7cfb\u5217\u4e1a\u52a1 Handler\uff08\u5982 `AuthHandler`\u3001`HeartBeatHandler`\u3001`CommandHandler`\uff09\u3002\n*   **\u804c\u8d23**\uff1a\u5f53 Reactor \u76d1\u542c\u5230 `OP_READ`\uff08\u8bfb\u5c31\u7eea\uff09\u4e8b\u4ef6\u65f6\uff0c\u4f1a\u56de\u8c03 Handler\u3002\n    *   \u4f8b\u5982\uff0c\u673a\u67dc\u4e0a\u62a5\u4e86\u201c\u5f52\u8fd8\u5145\u7535\u5b9d\u201d\u7684\u6570\u636e\u5305\uff0cReactor \u4f1a\u89e6\u53d1 `ChannelRead` \u4e8b\u4ef6\uff0c\u6570\u636e\u6d41\u7ecf Pipeline\uff0c\u7531\u6211\u4eec\u81ea\u5b9a\u4e49\u7684 Handler \u5b8c\u6210\u89e3\u7801\u3001\u9a8c\u7b7e\u3001\u66f4\u65b0 Redis \u72b6\u6001\u3001\u56de\u590d ACK \u786e\u8ba4\u3002\n*   **\u4ef7\u503c**\uff1a\u5c06\u4e1a\u52a1\u903b\u8f91\u5c01\u88c5\u6210\u72ec\u7acb\u7684\u5904\u7406\u5668\uff0c\u4ee3\u7801\u7ed3\u6784\u6e05\u6670\uff0c\u6613\u4e8e\u7ef4\u62a4\u3002\n\n---\n\n### \u4e8c\u3001 \u4e24\u4e2a\u9636\u6bb5\u7684\u804c\u8d23\u5206\u79bb\uff08\u4e3b\u4ece Reactor \u67b6\u6784\uff09\n\n\u6211\u4eec\u5728\u67b6\u6784\u8bbe\u8ba1\u65f6\uff0c\u91c7\u7528\u7684\u662f**\u4e3b\u4ece Reactor \u591a\u7ebf\u7a0b\u6a21\u578b**\uff0c\u8fd9\u4e3b\u8981\u4e3a\u4e86\u89e3\u51b3\u5355 Reactor \u5728\u9ad8\u5e76\u53d1\u4e0b\u7684\u6027\u80fd\u74f6\u9888\uff1a\n\n#### 1. MainReactor\uff08\u4e3b Reactor\uff09\u9636\u6bb5\n*   **\u5bf9\u5e94\u7ec4\u4ef6**\uff1a`Boss Group`\u3002\n*   **\u573a\u666f**\uff1a\u5e94\u5bf9\u5168\u56fd\u8303\u56f4\u5185\u6d77\u91cf\u8bbe\u5907\u9891\u7e41\u7684\u65ad\u7ebf\u91cd\u8fde\u3002\n*   **\u4f53\u73b0**\uff1aBoss Group \u4e13\u95e8\u8d1f\u8d23\u201c\u8fce\u5bbe\u201d\uff0c\u53ea\u5904\u7406\u8fde\u63a5\u5efa\u7acb\u3002\u56e0\u4e3a\u8fde\u63a5\u5efa\u7acb\u672c\u8eab\u662f\u4e00\u4e2a\u76f8\u5bf9\u8f7b\u91cf\u4e14\u5feb\u901f\u7684\u64cd\u4f5c\uff0c\u7531 1 \u4e2a\u6216\u6781\u5c11\u6570\u7ebf\u7a0b\u5c31\u80fd\u5904\u7406\u6210\u5343\u4e0a\u4e07\u7684\u65b0\u8fde\u63a5\u8bf7\u6c42\uff0c\u907f\u514d\u4e86\u8fde\u63a5\u98ce\u66b4\u62d6\u6162\u7cfb\u7edf\u3002\n\n#### 2. SubReactor\uff08\u4ece Reactor\uff09\u9636\u6bb5\n*   **\u5bf9\u5e94\u7ec4\u4ef6**\uff1a`Worker Group`\u3002\n*   **\u573a\u666f**\uff1a\u5904\u7406\u8bbe\u5907\u5fc3\u8df3\u3001\u72b6\u6001\u540c\u6b65\u3001\u4ea4\u6613\u6307\u4ee4\u7b49\u9ad8\u9891 I/O \u64cd\u4f5c\u3002\n*   **\u4f53\u73b0**\uff1aWorker Group \u8d1f\u8d23\u5df2\u5efa\u7acb\u8fde\u63a5\u7684\u8bfb\u5199\u64cd\u4f5c\u3002\n    *   **\u8d1f\u8f7d\u5747\u8861**\uff1aNetty \u4f1a\u81ea\u52a8\u5c06\u65b0\u8fde\u63a5\u8f6e\u8be2\u5206\u914d\u7ed9\u4e0d\u540c\u7684 Worker \u7ebf\u7a0b\uff0c\u786e\u4fdd\u6bcf\u4e2a\u7ebf\u7a0b\u7ba1\u7406\u7684\u8fde\u63a5\u6570\u5747\u8861\u3002\n    *   **\u7ebf\u7a0b\u7ed1\u5b9a**\uff1a\u4e00\u65e6\u8fde\u63a5\u5206\u914d\u7ed9\u67d0\u4e2a Worker \u7ebf\u7a0b\uff0c\u5b83\u7684\u6574\u4e2a\u751f\u547d\u5468\u671f\uff08\u8bfb\u3001\u5199\u3001\u65ad\u5f00\uff09\u90fd\u5728\u8fd9\u4e2a\u7ebf\u7a0b\u5185\u5b8c\u6210\u3002\u8fd9\u610f\u5473\u7740**\u4e0d\u9700\u8981\u7ebf\u7a0b\u5207\u6362**\uff0c\u4e5f\u4e0d\u9700\u8981\u52a0\u9501\uff0c\u6781\u81f4\u5730\u5229\u7528\u4e86 CPU \u7f13\u5b58\uff0c\u6027\u80fd\u6781\u9ad8\u3002\n\n---\n\n### \u4e09\u3001 \u5b9e\u6218\u4e2d\u7684\u201c\u9677\u9631\u201d\u4e0e\u4f18\u5316\n\n\u867d\u7136 Reactor \u6a21\u578b\u5f88\u5b8c\u7f8e\uff0c\u4f46\u5728\u6211\u4eec\u5b9e\u9645\u843d\u5730\u65f6\uff0c\u8e29\u8fc7\u4e00\u4e2a\u5751\uff1a**\u4e1a\u52a1\u963b\u585e\u95ee\u9898**\u3002\n\n*   **\u95ee\u9898**\uff1a\u6700\u521d\u6211\u4eec\u5c06\u201c\u8ba1\u8d39\u903b\u8f91\u201d\u76f4\u63a5\u5199\u5728\u4e86 Handler \u91cc\uff08\u5373\u5728 I/O \u7ebf\u7a0b\u91cc\u6267\u884c\uff09\u3002\u7ed3\u679c\u5728\u665a\u9ad8\u5cf0\uff0c\u5927\u91cf\u8bbe\u5907\u540c\u65f6\u5f52\u8fd8\uff0c\u8ba1\u8d39\u670d\u52a1\u56e0\u4e3a\u6570\u636e\u5e93\u6162\u67e5\u8be2\u5361\u4f4f\u4e86\u3002\u7531\u4e8e Reactor \u7684 Handler \u662f\u5728 Worker \u7ebf\u7a0b\u6267\u884c\u7684\uff0c\u5bfc\u81f4 Worker \u7ebf\u7a0b\u88ab\u963b\u585e\uff0c\u8fde\u5e26\u7740\u8be5\u7ebf\u7a0b\u7ba1\u7406\u7684\u5176\u4ed6\u51e0\u767e\u53f0\u8bbe\u5907\u7684\u5fc3\u8df3\u4e5f\u53d1\u4e0d\u51fa\u53bb\uff0c\u89e6\u53d1\u62a5\u8b66\u3002\n*   **\u4f18\u5316\u65b9\u6848**\uff1a\u6211\u4eec\u5f15\u5165\u4e86**\u4e1a\u52a1\u7ebf\u7a0b\u6c60**\u3002Reactor \u7684 Handler \u53ea\u8d1f\u8d23\u89e3\u6790\u6570\u636e\u5305\uff0c\u7136\u540e\u7acb\u5373\u5c06\u4efb\u52a1\u63d0\u4ea4\u7ed9\u4e1a\u52a1\u7ebf\u7a0b\u6c60\u5904\u7406\u3002\n    *   **\u7ed3\u679c**\uff1aReactor \u7ebf\u7a0b\u77ac\u95f4\u91ca\u653e\uff0c\u7ee7\u7eed\u5904\u7406\u5176\u4ed6 I/O \u4e8b\u4ef6\u3002\u6162\u4e1a\u52a1\u88ab\u9694\u79bb\u5728\u72ec\u7acb\u7ebf\u7a0b\u6c60\u4e2d\uff0c\u4e92\u4e0d\u5e72\u6270\u3002\n\n### \u603b\u7ed3\n\n\u5728\u6211\u4eec\u9879\u76ee\u4e2d\uff0cReactor \u6a21\u5f0f\u901a\u8fc7 Netty \u7684 `Boss` \u548c `Worker` \u7ebf\u7a0b\u7ec4\u843d\u5730\uff0c\u5b9e\u73b0\u4e86**\u8fde\u63a5\u4e0e I/O \u5206\u79bb**\u3001**IO \u4e0e\u4e1a\u52a1\u89e3\u8026**\u3002\n\n\u8fd9\u5c31\u597d\u6bd4\u6211\u4eec\u5c06\u4e00\u4e2a\u4f20\u7edf\u7684\u201c\u5168\u80fd\u670d\u52a1\u5458\u201d\u6a21\u5f0f\uff08BIO\uff09\uff0c\u5347\u7ea7\u4e3a\u4e86\u73b0\u4ee3\u5316\u7684\u201c\u9910\u5385\u8fd0\u8425\u201d\u6a21\u5f0f\uff1a\n*   **Boss Group** \u662f**\u524d\u53f0**\uff0c\u4e13\u95e8\u63a5\u5f85\u5ba2\u4eba\uff08\u5efa\u7acb\u8fde\u63a5\uff09\uff1b\n*   **Worker Group** \u662f**\u670d\u52a1\u5458**\uff0c\u4e13\u95e8\u8d1f\u8d23\u70b9\u83dc\u4e0a\u83dc\uff08I/O \u8bfb\u5199\uff09\uff1b\n*   **\u4e1a\u52a1\u7ebf\u7a0b\u6c60** \u662f**\u540e\u53a8**\uff0c\u4e13\u95e8\u8d1f\u8d23\u505a\u83dc\uff08\u8017\u65f6\u4e1a\u52a1\u903b\u8f91\uff09\u3002\n\n\u8fd9\u79cd\u5404\u53f8\u5176\u804c\u7684\u8bbe\u8ba1\uff0c\u8ba9\u6211\u4eec\u80fd\u591f\u7528\u6709\u9650\u7684\u7ebf\u7a0b\u8d44\u6e90\uff0c\u7a33\u5b9a\u652f\u6491\u5343\u4e07\u7ea7\u8bbe\u5907\u7684\u9ad8\u5e76\u53d1\u8bbf\u95ee\u3002",
    "subItems": []

  "261": {
    "title": "Netty \u7684 boss \u548c worker \u6709\u4ec0\u4e48\u533a\u522b\uff1f",
    "style": "",
    "details": "\u9762\u8bd5\u5b98\u60a8\u597d\uff0c\u8fd9\u662f\u4e00\u4e2a\u975e\u5e38\u7ecf\u5178\u4e14\u6838\u5fc3\u7684\u95ee\u9898\u3002\u5728 Netty \u7684\u67b6\u6784\u8bbe\u8ba1\u4e2d\uff0cBoss \u7ebf\u7a0b\u7ec4\u548c Worker \u7ebf\u7a0b\u7ec4\u7684\u533a\u522b\u4e3b\u8981\u4f53\u73b0\u5728**\u201c\u804c\u8d23\u5206\u5de5\u201d**\u3001**\u201c\u5904\u7406\u5bf9\u8c61\u201d**\u4ee5\u53ca**\u201c\u7ebf\u7a0b\u6570\u91cf\u914d\u7f6e\u201d**\u8fd9\u4e09\u4e2a\u7ef4\u5ea6\u3002\n\n\u7ed3\u5408\u6211\u5728\u5c0f\u7535\u79d1\u6280\u9879\u76ee\u4e2d\u7684\u5b9e\u6218\u7ecf\u9a8c\uff0c\u5b83\u4eec\u7684\u533a\u522b\u5982\u4e0b\uff1a\n\n### 1. \u804c\u8d23\u5206\u5de5\u4e0d\u540c\uff08\u6700\u6838\u5fc3\u7684\u533a\u522b\uff09\n\n\u8fd9\u662f\u4e24\u8005\u6700\u672c\u8d28\u7684\u533a\u522b\uff0c\u4f53\u73b0\u4e86 Reactor \u6a21\u5f0f\u4e2d\u201c\u4e3b\u4ece\u5206\u79bb\u201d\u7684\u8bbe\u8ba1\u601d\u60f3\u3002\n\n*   **Boss Group\uff08\u8001\u677f\u7ec4 - \u8d1f\u8d23\u2018\u62db\u63fd\u2019\uff09**\uff1a\n    *   **\u6838\u5fc3\u804c\u8d23**\uff1a\u53ea\u8d1f\u8d23\u5904\u7406**\u8fde\u63a5\u5efa\u7acb**\u4e8b\u4ef6\uff08`OP_ACCEPT`\uff09\u3002\n    *   **\u5de5\u4f5c\u6d41\u7a0b**\uff1a\u5b83\u8d1f\u8d23\u76d1\u542c\u670d\u52a1\u7aef\u7684\u7aef\u53e3\u3002\u5f53\u6709\u65b0\u7684\u5ba2\u6237\u7aef\uff08\u6bd4\u5982\u5145\u7535\u5b9d\u673a\u67dc\uff09\u53d1\u8d77\u8fde\u63a5\u8bf7\u6c42\u65f6\uff0cBoss \u7ebf\u7a0b\u4f1a\u5b8c\u6210 TCP \u4e09\u6b21\u63e1\u624b\uff0c\u5efa\u7acb\u8fde\u63a5\uff0c\u751f\u6210\u5bf9\u5e94\u7684 `SocketChannel`\uff0c\u7136\u540e\u5c06\u8fd9\u4e2a\u8fde\u63a5**\u6ce8\u518c**\u7ed9 Worker Group\u3002\n    *   **\u5f62\u8c61\u6bd4\u55bb**\uff1a\u5c31\u50cf\u9910\u5385\u7684**\u8fce\u5bbe\u5458**\uff0c\u7ad9\u5728\u95e8\u53e3\u53ea\u8d1f\u8d23\u628a\u5ba2\u4eba\u8fce\u8fdb\u6765\uff0c\u5b89\u6392\u5ea7\u4f4d\uff0c\u4e0d\u8d1f\u8d23\u70b9\u83dc\u3002\n\n*   **Worker Group\uff08\u5de5\u4f5c\u7ec4 - \u8d1f\u8d23\u2018\u670d\u52a1\u2019\uff09**\uff1a\n    *   **\u6838\u5fc3\u804c\u8d23**\uff1a\u8d1f\u8d23\u5904\u7406\u8fde\u63a5\u5efa\u7acb\u540e\u7684\u6240\u6709 **I/O \u8bfb\u5199\u4e8b\u4ef6**\uff08`OP_READ`\u3001`OP_WRITE`\uff09\u3002\n    *   **\u5de5\u4f5c\u6d41\u7a0b**\uff1a\u5b83\u8d1f\u8d23\u5904\u7406\u6570\u636e\u7684\u8bfb\u53d6\u3001\u89e3\u7801\u3001\u4e1a\u52a1\u903b\u8f91\u5904\u7406\uff08\u5982\u679c\u4e0d\u5f02\u6b65\uff09\u3001\u4ee5\u53ca\u6570\u636e\u56de\u5199\u3002\n    *   **\u5f62\u8c61\u6bd4\u55bb**\uff1a\u5c31\u50cf\u9910\u5385\u7684**\u670d\u52a1\u5458**\uff0c\u8d1f\u8d23\u7ed9\u5ba2\u4eba\u70b9\u83dc\u3001\u4e0a\u83dc\u3001\u7ed3\u8d26\uff0c\u5904\u7406\u5ba2\u4eba\u5728\u5e97\u5185\u7684\u6240\u6709\u4ea4\u4e92\u3002\n\n### 2. \u5904\u7406\u7684\u5bf9\u8c61\u4e0d\u540c\n\n*   **Boss Group**\uff1a\n    *   \u5904\u7406\u7684\u662f **`ServerSocketChannel`**\u3002\n    *   \u5b83\u5173\u6ce8\u7684\u662f\u670d\u52a1\u7aef\u76d1\u542c\u7684\u5957\u63a5\u5b57\uff0c\u4e5f\u5c31\u662f\u201c\u5927\u95e8\u201d\u3002\n\n*   **Worker Group**\uff1a\n    *   \u5904\u7406\u7684\u662f **`SocketChannel`**\u3002\n    *   \u5b83\u5173\u6ce8\u7684\u662f\u6bcf\u4e00\u4e2a\u5177\u4f53\u7684\u5ba2\u6237\u7aef\u8fde\u63a5\uff0c\u4e5f\u5c31\u662f\u201c\u5177\u4f53\u7684\u5ba2\u4eba\u201d\u3002\n\n### 3. \u7ebf\u7a0b\u6570\u91cf\u7684\u914d\u7f6e\u7b56\u7565\u4e0d\u540c\n\n\u5728\u6211\u4eec\u7684\u9879\u76ee\u843d\u5730\u4e2d\uff0c\u8fd9\u4e24\u4e2a\u7ec4\u7684\u7ebf\u7a0b\u6570\u914d\u7f6e\u7b56\u7565\u662f\u5b8c\u5168\u4e0d\u540c\u7684\uff1a\n\n*   **Boss Group \u7ebf\u7a0b\u6570**\uff1a\n    *   \u901a\u5e38\u914d\u7f6e\u4e3a **1** \u4e2a\u5373\u53ef\u3002\n    *   **\u539f\u56e0**\uff1a\u670d\u52a1\u7aef\u901a\u5e38\u53ea\u76d1\u542c\u4e00\u4e2a\u7aef\u53e3\u3002Boss \u7ebf\u7a0b\u53ea\u9700\u8981\u5904\u7406\u8fd9\u4e2a\u7aef\u53e3\u7684\u8fde\u63a5\u8bf7\u6c42\u3002\u5373\u4f7f\u662f\u5343\u4e07\u7ea7\u5e76\u53d1\uff0c\u5efa\u7acb\u8fde\u63a5\u7684\u64cd\u4f5c\u975e\u5e38\u5feb\uff08\u5185\u6838\u7ea7\u522b\uff09\uff0c\u4e00\u4e2a\u7ebf\u7a0b\u8db3\u4ee5\u5904\u7406\u6bcf\u79d2\u4e0a\u4e07\u7684\u65b0\u8fde\u63a5\u3002\u591a\u5f00\u7ebf\u7a0b\u53cd\u800c\u4f1a\u9020\u6210\u8d44\u6e90\u6d6a\u8d39\u548c\u7ebf\u7a0b\u7ade\u4e89\u3002\n\n*   **Worker Group \u7ebf\u7a0b\u6570**\uff1a\n    *   \u901a\u5e38\u914d\u7f6e\u4e3a **CPU \u6838\u5fc3\u6570 * 2**\u3002\n    *   **\u539f\u56e0**\uff1aWorker \u7ebf\u7a0b\u8d1f\u8d23\u9ad8\u9891\u7684 I/O \u8bfb\u5199\u548c\u4efb\u52a1\u5904\u7406\u3002\u6211\u4eec\u9700\u8981\u5145\u5206\u5229\u7528\u591a\u6838 CPU \u7684\u5e76\u884c\u5904\u7406\u80fd\u529b\u3002\u5728\u6211\u4eec\u7684\u8bbe\u5907\u63a5\u5165\u5e73\u53f0\u4e2d\uff0c\u56e0\u4e3a\u6d89\u53ca\u5927\u91cf\u7684\u5fc3\u8df3\u5305\u89e3\u6790\u548c\u6307\u4ee4\u4e0b\u53d1\uff0c\u6211\u4eec\u4f1a\u6839\u636e\u538b\u6d4b\u7ed3\u679c\u8c03\u6574\u8fd9\u4e2a\u53c2\u6570\uff0c\u786e\u4fdd CPU \u5229\u7528\u7387\u6700\u4f18\u3002\n\n### 4. \u5728\u9879\u76ee\u4e2d\u7684\u5b9e\u6218\u4f53\u73b0\n\n\u5728\u6211\u4eec\u7684\u5171\u4eab\u5145\u7535\u5b9d\u7269\u8054\u7f51\u5e73\u53f0\u4e2d\uff0c\u8fd9\u79cd\u5206\u5de5\u5e26\u6765\u4e86\u5de8\u5927\u7684\u7a33\u5b9a\u6027\u4f18\u52bf\uff1a\n\n*   **\u6545\u969c\u9694\u79bb**\uff1a\u5047\u8bbe Worker \u7ebf\u7a0b\u56e0\u4e3a\u89e3\u6790\u5230\u4e00\u4e2a\u5f02\u5e38\u6570\u636e\u5305\u5bfc\u81f4\u6b7b\u5faa\u73af\u6216\u963b\u585e\uff0c\u8fd9\u53ea\u4f1a\u5f71\u54cd\u8be5\u7ebf\u7a0b\u8d1f\u8d23\u7684\u90a3\u90e8\u5206\u8bbe\u5907\u8fde\u63a5\uff0c\u4e0d\u4f1a\u5f71\u54cd Boss \u7ebf\u7a0b\u63a5\u6536\u65b0\u8fde\u63a5\u3002\u5176\u4ed6 Worker \u7ebf\u7a0b\u4e0a\u7684\u8bbe\u5907\u4f9d\u7136\u80fd\u6b63\u5e38\u901a\u4fe1\u3002\n*   **\u8d44\u6e90\u53ef\u63a7**\uff1aBoss \u7ebf\u7a0b\u6570\u56fa\u5b9a\u4e3a 1\uff0c\u8d44\u6e90\u6d88\u8017\u6781\u5c0f\u4e14\u6052\u5b9a\uff1bWorker \u7ebf\u7a0b\u6570\u867d\u7136\u6709\u591a\u4e2a\uff0c\u4f46\u4e5f\u662f\u56fa\u5b9a\u7684\u3002\u8fd9\u79cd\u6a21\u578b\u4fdd\u8bc1\u4e86\u65e0\u8bba\u5916\u90e8\u6709\u591a\u5c11\u8bbe\u5907\u8fde\u63a5\uff0c\u670d\u52a1\u7aef\u7684\u7ebf\u7a0b\u8d44\u6e90\u90fd\u662f**\u6709\u754c**\u7684\uff0c\u6c38\u8fdc\u4e0d\u4f1a\u56e0\u4e3a\u8fde\u63a5\u6570\u66b4\u589e\u800c\u5bfc\u81f4 OOM\uff08\u5185\u5b58\u6ea2\u51fa\uff09\uff0c\u8fd9\u4e5f\u662f\u6211\u4eec\u6562\u4e8e\u652f\u6491\u5343\u4e07\u7ea7\u8bbe\u5907\u63a5\u5165\u7684\u5e95\u6c14\u6240\u5728\u3002\n\n### \u603b\u7ed3\n\n\u7b80\u5355\u6765\u8bf4\uff0c**Boss \u8d1f\u8d23\u201c\u5efa\u8def\u201d\uff0cWorker \u8d1f\u8d23\u201c\u8dd1\u8f66\u201d**\u3002Boss \u7ebf\u7a0b\u5efa\u7acb\u597d\u8fde\u63a5\u901a\u9053\u540e\uff0c\u5c31\u4ea4\u7ed9 Worker \u7ebf\u7a0b\u53bb\u5904\u7406\u540e\u7eed\u7684\u6570\u636e\u4f20\u8f93\uff0c\u4e24\u8005\u5404\u53f8\u5176\u804c\uff0c\u5171\u540c\u652f\u6491\u4e86 Netty \u7684\u9ad8\u5e76\u53d1\u5904\u7406\u80fd\u529b\u3002",

  "262": {
    "title": "\u4e3a\u4ec0\u4e48\u4e0d\u80fd\u5728 EventLoop \u505a\u8017\u65f6\u4e1a\u52a1\uff1f",
    "style": "background-color: yellow;",
    "details": "\u9762\u8bd5\u5b98\u60a8\u597d\uff0c\u8fd9\u662f\u4e00\u4e2a\u975e\u5e38\u5173\u952e\u7684\u95ee\u9898\uff0c\u76f4\u63a5\u5173\u7cfb\u5230 Netty \u670d\u52a1\u7684\u7a33\u5b9a\u6027\u3002\u7b80\u5355\u6765\u8bf4\uff0c**EventLoop\uff08I/O \u7ebf\u7a0b\uff09\u662f Netty \u7684\u201c\u751f\u547d\u7ebf\u201d\uff0c\u5b83\u7684\u804c\u8d23\u662f\u5feb\u901f\u54cd\u5e94 I/O \u4e8b\u4ef6\uff0c\u7edd\u4e0d\u80fd\u88ab\u8017\u65f6\u4e1a\u52a1\u5361\u4f4f\u3002**\n\n\u7ed3\u5408\u6211\u5728\u5c0f\u7535\u79d1\u6280\u8bbe\u5907\u63a5\u5165\u5e73\u53f0\u7684\u5b9e\u6218\u7ecf\u9a8c\uff0c\u5982\u679c\u6211\u4eec\u5728 EventLoop \u4e2d\u6267\u884c\u8017\u65f6\u4e1a\u52a1\uff08\u6bd4\u5982\u590d\u6742\u7684\u8ba1\u8d39\u903b\u8f91\u3001\u6570\u636e\u5e93\u67e5\u8be2\u3001\u7b2c\u4e09\u65b9\u63a5\u53e3\u8c03\u7528\uff09\uff0c\u4f1a\u5e26\u6765**\u4e09\u5927\u4e25\u91cd\u540e\u679c**\uff1a\n\n### 1. \u201c\u4e00\u4eba\u5835\u585e\uff0c\u5168\u8f66\u505c\u8fd0\u201d\uff08\u6700\u4e25\u91cd\u7684\u540e\u679c\uff09\n\nNetty \u7684\u8bbe\u8ba1\u673a\u5236\u662f\uff1a**\u4e00\u4e2a EventLoop \u7ebf\u7a0b\u8d1f\u8d23\u5904\u7406\u591a\u4e2a\u8fde\u63a5\uff08Channel\uff09\u4e0a\u7684\u6240\u6709 I/O \u4e8b\u4ef6\u3002**\n\n*   **\u573a\u666f\u590d\u73b0**\uff1a\n    \u5047\u8bbe\u4e00\u4e2a EventLoop \u7ebf\u7a0b\u8d1f\u8d23\u5904\u7406 1000 \u53f0\u5145\u7535\u5b9d\u673a\u67dc\u7684\u8fde\u63a5\u3002\n*   **\u6545\u969c\u73b0\u8c61**\uff1a\n    \u5982\u679c\u5176\u4e2d**\u4e00\u53f0\u8bbe\u5907**\u4e0a\u62a5\u6570\u636e\u65f6\uff0c\u89e6\u53d1\u4e86\u4e00\u4e2a\u8017\u65f6 2 \u79d2\u7684\u6570\u636e\u5e93\u67e5\u8be2\u6216\u590d\u6742\u7684\u8ba1\u8d39\u903b\u8f91\uff0c\u5e76\u4e14\u8fd9\u4e2a\u903b\u8f91\u76f4\u63a5\u5728 EventLoop \u7ebf\u7a0b\u4e2d\u6267\u884c\u3002\n    \u90a3\u4e48\uff0c\u5728\u8fd9 2 \u79d2\u5185\uff0c\u8fd9\u4e2a EventLoop \u7ebf\u7a0b\u88ab\u5b8c\u5168\u5360\u7528\uff0c\u5b83\u65e0\u6cd5\u5904\u7406\u5176\u4ed6\u4efb\u4f55\u4e8b\u60c5\u3002\n*   **\u8fde\u9501\u53cd\u5e94**\uff1a\n    **\u5269\u4e0b\u7684 999 \u53f0\u8bbe\u5907**\u7684\u5fc3\u8df3\u5305\u6ca1\u4eba\u63a5\u6536\u3001\u6307\u4ee4\u4e0b\u53d1\u6ca1\u4eba\u5904\u7406\u3002\u8fd9 999 \u53f0\u8bbe\u5907\u4f1a\u56e0\u4e3a\u6536\u4e0d\u5230\u670d\u52a1\u7aef\u7684 ACK \u54cd\u5e94\u800c\u89e6\u53d1\u8d85\u65f6\u91cd\u4f20\uff0c\u751a\u81f3\u5224\u5b9a\u4e3a\u6389\u7ebf\u3002\n*   **\u7ed3\u8bba**\uff1a\u4e00\u4e2a\u8fde\u63a5\u7684\u6162\u4e1a\u52a1\uff0c\u4f1a\u62d6\u6b7b\u540c\u4e00\u4e2a Reactor \u7ebf\u7a0b\u4e0a\u7684\u6240\u6709\u5176\u4ed6\u8fde\u63a5\u3002\u8fd9\u5c31\u662f\u5178\u578b\u7684\u201c**\u4f2a\u6b7b\u9501**\u201d\u73b0\u8c61\u3002\n\n### 2. \u5fc3\u8df3\u8d85\u65f6\u5bfc\u81f4\u5927\u89c4\u6a21\u6389\u7ebf\n\n\u5728\u7269\u8054\u7f51\u573a\u666f\u4e2d\uff0c\u5fc3\u8df3\u673a\u5236\u662f\u4fdd\u6d3b\u7684\u5173\u952e\u3002\n\n*   **\u6b63\u5e38\u60c5\u51b5**\uff1a\u8bbe\u5907\u6bcf 30 \u79d2\u53d1\u4e00\u6b21\u5fc3\u8df3\uff0c\u670d\u52a1\u7aef\u5fc5\u987b\u5728\u51e0\u6beb\u79d2\u5185\u54cd\u5e94\u3002\n*   **\u5f02\u5e38\u60c5\u51b5**\uff1a\u5982\u679c EventLoop \u88ab\u8017\u65f6\u4e1a\u52a1\u963b\u585e\uff0c\u65e0\u6cd5\u53ca\u65f6\u5904\u7406 `OP_READ` \u4e8b\u4ef6\u8bfb\u53d6\u5fc3\u8df3\u5305\uff0c\u6216\u8005\u65e0\u6cd5\u53ca\u65f6\u5904\u7406 `OP_WRITE` \u4e8b\u4ef6\u56de\u5199\u54cd\u5e94\u3002\n*   **\u540e\u679c**\uff1a\u670d\u52a1\u7aef\u54cd\u5e94\u8d85\u65f6\uff0c\u8bbe\u5907\u7aef\u5224\u5b9a\u7f51\u7edc\u65ad\u5f00\uff0c\u89e6\u53d1\u5927\u89c4\u6a21\u7684\u91cd\u8fde\u98ce\u66b4\u3002\u8fd9\u4f1a\u8fdb\u4e00\u6b65\u52a0\u5267\u670d\u52a1\u7aef\u7684\u538b\u529b\uff0c\u751a\u81f3\u5bfc\u81f4\u6574\u4e2a\u96c6\u7fa4\u96ea\u5d29\u3002\n\n### 3. \u541e\u5410\u91cf\u65ad\u5d16\u5f0f\u4e0b\u8dcc\n\n*   Netty \u7684\u9ad8\u6027\u80fd\u4f9d\u8d56\u4e8e **\u201c\u65e0\u9501\u4e32\u884c\u5316\u201d** \u8bbe\u8ba1\uff0cEventLoop \u50cf\u4e00\u4e2a\u9ad8\u901f\u4f20\u9001\u5e26\uff0c\u5feb\u901f\u5904\u7406\u4e00\u4e2a\u63a5\u4e00\u4e2a\u7684 I/O \u4e8b\u4ef6\u3002\n*   \u5982\u679c\u5728\u4f20\u9001\u5e26\u4e0a\u653e\u4e86\u4e00\u4e2a\u201c\u5de8\u77f3\u201d\uff08\u8017\u65f6\u4efb\u52a1\uff09\uff0c\u4f20\u9001\u5e26\u7684\u901f\u5ea6\u77ac\u95f4\u964d\u4e3a\u96f6\u3002\u7cfb\u7edf\u7684\u5e76\u53d1\u5904\u7406\u80fd\u529b\uff08TPS\uff09\u4f1a\u4ece\u6bcf\u79d2\u51e0\u4e07\u77ac\u95f4\u8dcc\u5230\u4e2a\u4f4d\u6570\u3002\n\n---\n\n### \u5b9e\u6218\u4e2d\u7684\u89e3\u51b3\u65b9\u6848\uff1a\u5f02\u6b65\u5206\u53d1\n\n\u6211\u4eec\u5728\u67b6\u6784\u8bbe\u8ba1\u65f6\uff0c\u6709\u4e25\u683c\u7684**\u201c\u9632\u963b\u585e\u673a\u5236\u201d**\uff1a\n\n#### 1. \u7eaf I/O \u64cd\u4f5c\u7559\u5728 EventLoop\n\u53ea\u6709\u7f16\u89e3\u7801\u3001\u7b80\u5355\u7684\u6821\u9a8c\u3001\u72b6\u6001\u66f4\u65b0\uff08\u5982 Redis \u539f\u5b50\u64cd\u4f5c\uff09\u7b49\u5fae\u79d2\u7ea7\u7684\u64cd\u4f5c\uff0c\u624d\u5141\u8bb8\u5728 EventLoop \u4e2d\u6267\u884c\u3002\n\n#### 2. \u8017\u65f6\u4e1a\u52a1\u4e22\u7ed9\u4e1a\u52a1\u7ebf\u7a0b\u6c60\n\u5bf9\u4e8e\u4efb\u4f55\u53ef\u80fd\u8d85\u8fc7 1ms \u7684\u64cd\u4f5c\uff08\u5982\u6570\u636e\u5e93\u5199\u64cd\u4f5c\u3001RPC \u8c03\u7528\u3001\u590d\u6742\u8ba1\u7b97\uff09\uff0c\u6211\u4eec\u90fd\u4f1a\u5c06\u5176**\u5f02\u6b65\u5316**\u3002\n\n**\u4ee3\u7801\u5c42\u9762\u7684\u505a\u6cd5**\uff1a\n\u5728 ChannelHandler \u4e2d\uff0c\u6211\u4eec\u4e0d\u4f1a\u76f4\u63a5\u5199\u4e1a\u52a1\u4ee3\u7801\uff0c\u800c\u662f\u5c06\u4efb\u52a1\u63d0\u4ea4\u5230\u4e00\u4e2a\u72ec\u7acb\u7684\u4e1a\u52a1\u7ebf\u7a0b\u6c60\u4e2d\u3002\n\n```java\n// \u4f2a\u4ee3\u7801\u793a\u4f8b\n@Override\npublic void channelRead0(ChannelHandlerContext ctx, DeviceMsg msg) {\n    // 1. EventLoop \u5feb\u901f\u89e3\u6790\u6570\u636e\u5305\uff08\u8017\u65f6\u6781\u77ed\uff09\n    DeviceData data = parse(msg);\n    \n    // 2. \u63d0\u4ea4\u8017\u65f6\u4e1a\u52a1\u5230\u72ec\u7acb\u7ebf\u7a0b\u6c60\uff0c\u7acb\u5373\u91ca\u653e EventLoop\n    businessExecutorService.submit(() -> {\n        // \u8fd9\u91cc\u662f\u5b89\u5168\u533a\u57df\uff1a\u6267\u884c\u6570\u636e\u5e93\u64cd\u4f5c\u3001\u8ba1\u8d39\u903b\u8f91\n        billingService.charge(data);\n        \n        // 3. \u5982\u679c\u9700\u8981\u56de\u5199\u7ed3\u679c\uff0c\u518d\u5207\u56de EventLoop\n        ctx.writeAndFlush(response);\n    });\n}\n```\n\n### \u603b\u7ed3\n\n**EventLoop \u5c31\u50cf\u533b\u9662\u7684\u201c\u6025\u8bca\u5206\u8bca\u53f0\u62a4\u58eb\u201d\uff0c\u4ed6\u7684\u4efb\u52a1\u662f\u5feb\u901f\u5224\u65ad\u75c5\u60c5\uff08\u89e3\u6790\u6570\u636e\uff09\u5e76\u5206\u8bca\uff08\u5206\u53d1\u4efb\u52a1\uff09\uff0c\u800c\u4e0d\u662f\u5750\u5728\u90a3\u91cc\u7ed9\u75c5\u4eba\u505a\u957f\u8fbe\u51e0\u5c0f\u65f6\u7684\u624b\u672f\uff08\u8017\u65f6\u4e1a\u52a1\uff09\u3002**\n\n\u5982\u679c\u5728\u5206\u8bca\u53f0\u505a\u624b\u672f\uff0c\u540e\u9762\u6392\u961f\u7684\u75c5\u4eba\uff08\u5176\u4ed6\u8fde\u63a5\uff09\u5c31\u4f1a\u5168\u90e8\u5835\u6b7b\u3002\u8fd9\u5c31\u662f\u4e3a\u4ec0\u4e48\u6211\u4eec\u5fc5\u987b\u5c06\u8017\u65f6\u4e1a\u52a1\u4ece EventLoop \u4e2d\u5265\u79bb\u51fa\u6765\u7684\u6839\u672c\u539f\u56e0\u3002",
    "subItems": []
  },
  "263": {
    "title": "TCP \u534a\u8fde\u63a5\u662f\u4ec0\u4e48\uff1f",
    "style": "",
    "details": "\u9762\u8bd5\u5b98\u60a8\u597d\uff0c\u8fd9\u662f\u4e00\u4e2a\u6d89\u53ca TCP \u534f\u8bae\u5e95\u5c42\u539f\u7406\u7684\u91cd\u8981\u6982\u5ff5\u3002\u6240\u8c13\u7684\u201c\u534a\u8fde\u63a5\u201d\uff0c\u4e3b\u8981\u53d1\u751f\u5728 TCP \u5efa\u7acb\u8fde\u63a5\u7684**\u4e09\u6b21\u63e1\u624b**\u8fc7\u7a0b\u4e2d\u3002\n\n\u7b80\u5355\u6765\u8bf4\uff0c**TCP \u534a\u8fde\u63a5\u662f\u6307\uff1a\u670d\u52a1\u5668\u6536\u5230\u4e86\u5ba2\u6237\u7aef\u7684 SYN \u8bf7\u6c42\uff0c\u5e76\u53d1\u9001\u4e86 SYN+ACK \u786e\u8ba4\uff0c\u4f46\u8fd8\u6ca1\u6709\u6536\u5230\u5ba2\u6237\u7aef\u6700\u7ec8\u7684 ACK \u786e\u8ba4\u3002\u6b64\u65f6\u8fde\u63a5\u5904\u4e8e\u201c\u534a\u6253\u5f00\u201d\u72b6\u6001\u3002**\n\n\u7ed3\u5408\u6211\u5728\u5c0f\u7535\u79d1\u6280\u8d1f\u8d23\u7684\u9ad8\u5e76\u53d1\u7269\u8054\u7f51\u9879\u76ee\u7ecf\u9a8c\uff0c\u6211\u5c06\u4ece\u539f\u7406\u3001\u98ce\u9669\u4ee5\u53ca\u89e3\u51b3\u65b9\u6848\u4e09\u4e2a\u5c42\u9762\u4e3a\u60a8\u8be6\u7ec6\u62c6\u89e3\uff1a\n\n### \u4e00\u3001 \u539f\u7406\u5c42\u9762\uff1a\u4e09\u6b21\u63e1\u624b\u4e2d\u7684\u201c\u4e2d\u95f4\u72b6\u6001\u201d\n\n\u6211\u4eec\u56de\u987e\u4e00\u4e0b TCP \u7684\u4e09\u6b21\u63e1\u624b\u6d41\u7a0b\uff0c\u5c31\u80fd\u6e05\u695a\u5730\u5b9a\u4f4d\u201c\u534a\u8fde\u63a5\u201d\u7684\u4f4d\u7f6e\uff1a\n\n1.  **\u7b2c\u4e00\u6b21\u63e1\u624b**\uff1a\u5ba2\u6237\u7aef\u53d1\u9001 `SYN` \u5305\uff0c\u8bf7\u6c42\u5efa\u7acb\u8fde\u63a5\u3002\u6b64\u65f6\u5ba2\u6237\u7aef\u72b6\u6001\u53d8\u4e3a `SYN_SENT`\u3002\n2.  **\u7b2c\u4e8c\u6b21\u63e1\u624b**\uff1a\u670d\u52a1\u7aef\u6536\u5230 `SYN`\uff0c\u56de\u590d `SYN+ACK` \u5305\u3002**\u6b64\u65f6\uff0c\u670d\u52a1\u7aef\u72b6\u6001\u53d8\u4e3a `SYN_RCVD`\uff08\u534a\u8fde\u63a5\u72b6\u6001\uff09\u3002**\n3.  **\u7b2c\u4e09\u6b21\u63e1\u624b**\uff1a\u5ba2\u6237\u7aef\u6536\u5230 `SYN+ACK`\uff0c\u56de\u590d `ACK`\u3002\u670d\u52a1\u7aef\u6536\u5230\u540e\uff0c\u72b6\u6001\u53d8\u4e3a `ESTABLISHED`\uff08\u5168\u8fde\u63a5\uff09\u3002\n\n**\u6838\u5fc3\u5b9a\u4e49**\uff1a\n\u5f53\u8fde\u63a5\u5904\u4e8e `SYN_RCVD` \u72b6\u6001\u65f6\uff0c\u5b83\u5c31\u662f\u4e00\u4e2a\u201c\u534a\u8fde\u63a5\u201d\u3002\u5b83\u8fd8\u6ca1\u6709\u5b8c\u5168\u5efa\u7acb\uff0c\u4e0d\u80fd\u8fdb\u884c\u6570\u636e\u4f20\u8f93\uff0c\u4f46\u5728\u670d\u52a1\u7aef\u7684\u5185\u6838\u4e2d\u5df2\u7ecf\u5360\u7528\u4e86\u8d44\u6e90\u3002\n\n### \u4e8c\u3001 \u5b58\u50a8\u5c42\u9762\uff1a\u534a\u8fde\u63a5\u961f\u5217\n\n\u4e3a\u4e86\u7ba1\u7406\u8fd9\u4e9b\u6b63\u5728\u5efa\u7acb\u4e2d\u7684\u8fde\u63a5\uff0cLinux \u5185\u6838\u7ef4\u62a4\u4e86\u4e24\u4e2a\u5173\u952e\u7684\u961f\u5217\uff1a\n\n1.  **\u534a\u8fde\u63a5\u961f\u5217**\uff1a\n    *   \u5b58\u50a8\u5904\u4e8e `SYN_RCVD` \u72b6\u6001\u7684\u8fde\u63a5\u3002\n    *   \u5f53\u670d\u52a1\u5668\u6536\u5230 SYN \u5305\uff0c\u5c31\u4f1a\u5728\u8fd9\u4e2a\u961f\u5217\u4e2d\u521b\u5efa\u4e00\u4e2a\u6761\u76ee\u3002\n2.  **\u5168\u8fde\u63a5\u961f\u5217**\uff1a\n    *   \u5b58\u50a8\u5df2\u7ecf\u5b8c\u6210\u4e09\u6b21\u63e1\u624b\uff0c\u5904\u4e8e `ESTABLISHED` \u72b6\u6001\uff0c\u7b49\u5f85\u5e94\u7528\u5c42 `accept()` \u53d6\u8d70\u7684\u8fde\u63a5\u3002\n\n**\u9690\u60a3**\uff1a\u534a\u8fde\u63a5\u961f\u5217\u7684\u5927\u5c0f\u662f\u6709\u9650\u7684\uff08\u7531\u5185\u6838\u53c2\u6570 `tcp_max_syn_backlog` \u63a7\u5236\uff09\u3002\u5982\u679c\u961f\u5217\u6ee1\u4e86\uff0c\u65b0\u7684\u8fde\u63a5\u8bf7\u6c42\u5c31\u4f1a\u88ab\u4e22\u5f03\u3002\n\n### \u4e09\u3001 \u98ce\u9669\u5c42\u9762\uff1aSYN Flood \u653b\u51fb\n\n\u7406\u89e3\u201c\u534a\u8fde\u63a5\u201d\u6700\u5173\u952e\u7684\u5b9e\u6218\u610f\u4e49\u5728\u4e8e\u9632\u8303 **SYN Flood \u653b\u51fb**\u3002\u8fd9\u662f\u6211\u5728\u8bbe\u8ba1\u9ad8\u5e76\u53d1\u7cfb\u7edf\u65f6\u5fc5\u987b\u8003\u8651\u9762\u8bd5\u7684\u5b89\u5168\u5b98\u60a8\u597d\uff0c\u8fd9\u662f\u4e00\u4e2a\u5173\u4e8e TCP\u9632\u62a4 \u534f\u8bae\u5e95\u5c42\u673a\u5236\u7684\u91cd\u8981\u95ee\u9898\u3002\u8981\u7406\u89e3\u201c\u534a\u8fde\u63a5\u201d\uff0c\u6211\u4eec\u9700\u8981\u56de\u5230 TCP \u5efa\u7acb\u8fde\u63a5\u7684**\u70b9\u3002\n\n*   **\u653b\u51fb\u539f\u7406**\u63e1\u624b**    \u6076\u610f\u8fc7\u7a0b\u3002\n\n**\u201c\u534a\u8fde\u63a5\u653b\u51fb\u201d\u6307\u7684\u662f\uff1aTCP\u8005\u4f2a\u9020\u5927\u91cf\u7684 \u4e09\u6b21\u63e1\u624b\u8fc7\u7a0b\u4e2d\uff0c\u670d\u52a1\u5668\u865a\u5047\u6536\u5230\u4e86\u5ba2\u6237\u7aef\u7684 SYN IP \u5730\u5740 \u5305\uff0c\u5e76\u53d1\u9001\u4e86 SYN+ACK\uff0c\u5411\u670d\u52a1\u5668\u53d1\u9001\u6d77 \u786e\u8ba4\u5305\uff0c\u91cf\u7684 SYN \u5305\u3002\n\u4f46\u8fd8\u6ca1\u6709\u6536\u5230\u5ba2\u6237\u7aef\u6700\u7ec8\u7684 ACK \u786e\u8ba4\u5305\u3002\u6b64\u65f6\uff0c\u8fde\u63a5\u5904\u4e8e\u201c\u534a\u6253\u5f00\u201d\u72b6\u6001\u3002**\n\n\u7ed3\u5408\u6211\u5728\u5c0f\u7535\u79d1\u6280\u8d1f\u8d23\u7684\u9ad8\u5e76\u53d1\u7269\u8054\u7f51\u7f51\u5173    \u670d\u52a1\u5668\u6536\u5230\u540e\uff0c\u4ee5\u4e3a\u662f\u6b63\u5e38\u8bf7\u6c42\uff0c\u6211\u6765\u8be6\u7ec6\u62c6\u89e3\u4e00\u4e0b\u8fd9\u4e2a\u8fc7\u7a0b\u53ca\u5176\u6f5c\u5728\u98ce\u9669\uff1a\n\n\u4e8e\u662f\u5206\u914d### \u4e00\u3001 \u4e09\u6b21\u8d44\u6e90\u3001\u63e1\u624b\u4e2d\u7684\u201c\u534a\u8fde\u63a5\u201d\u56de\u590d `SYN+ACK\u72b6\u6001\n\n\u6211\u4eec\u53ef\u4ee5\u628a\u4e09\u6b21\u63e1\u624b`\u6bd4\u4f5c\u4e00\u4e2a\u7535\u8bdd\u901a\u8bdd\u8fc7\u7a0b\uff0c\u5e76\u5c06\u8fde\u63a5\u653e\u5165\u534a\u8fde\u63a5\u961f\u5217\u3002\n\uff1a\n\n1.  **\u7b2c\u4e00\u6b21\u63e1\u624b\uff08SYN_SENT\uff09    \u7531\u4e8e**\uff1a\n    *   \u6e90\u5ba2\u6237\u7aef\u53d1\u9001 `SY IP \u662f\u4f2a\u9020N\u7684\uff0c\u653b\u51fb` \u5305\u8bf7\u6c42\u5efa\u7acb\u8fde\u63a5\u8005\u6c38\u8fdc\u4e0d\u4f1a\u3002\n    *   \u6b64\u65f6\u56de\u590d\u7b2c\u4e09\u6b21\u63e1\u5ba2\u6237\u7aef\u72b6\u6001\uff1a`SYN_SENT\u624b\u7684 ``\u3002\n\n2.  **\u7b2c\u4e8c\u6b21\u63e1\u624b\uff08SYNACK`\u3002\n    \n*_RCVD\uff09 \u2014\u2014 \u534a\u8fde\u63a5   **\u540e\u679c**\uff1a\n   \u72b6\u6001**\uff1a\n \u670d\u52a1\u5668\u7684    *  \u534a\u8fde\u63a5\u961f\u5217\u8fc5\u901f\u88ab\u586b \u670d\u52a1\u7aef\u6536\u5230 `SYN`\uff0c\u56de\u590d `SY\u6ee1\u3002\u6b63\u5e38\u7684\u7528\u6237\u8bf7\u6c42\uff08\u6bd4\u5982\u6211\u4eec\u7684\u5145\u7535\u5b9d\u8bbe\u5907\u5c1d\u8bd5\u8fde\u63a5\uff09\u53d1\u8fc7\u6765\u65f6\uff0c\u56e0\u4e3a\u961f\u5217\u5df2\u6ee1N+ACK` \u7ed9\u5ba2\u6237\u7aef\u3002\n    *   \u6b64\u65f6\u670d\u52a1\u7aef\u72b6\u6001\uff1a`SYN\uff0c\u76f4\u63a5\u88ab\u4e22\u5f03\u3002\n    \u8fd9_RCVD`\u3002\n    *   **\u5173\u952e\u70b9**\uff1a\u8fd9\u5c31\u662f**\u534a\u8fde\u63a5\u72b6\u6001**\u3002\u670d\u52a1\u7aef\u5df2\u7ecf\u5206\u914d\u5c31\u4e86\u8d44\u6e90\uff08\u5bfc\u81f4\u670d\u52a1\u5668\u65e0\u6cd5\u5904\u7406\u4efb\u4f55\u5982 TCB\u6b63\u5e38\u4e1a\u52a1\uff0c\u9020\u6210 \u7ed3\u6784\u4f53**\uff09\u6765\u7b49\u5f85\u62d2\u7edd\u670d\u52a1**\u3002\n\n###\u8fde\u63a5\u5b8c\u6210 \u56db\u3001 \u89e3\u51b3\uff0c\u4f46\u8fde\u63a5\u65b9\u6848\uff1a\u5b9e\u6218\u4e2d\u7684\u9632\u5fa1\u673a\u5236\u8fd8\u6ca1\u771f\u6b63\u5efa\u7acb\u3002\n\n3.  **\u7b2c\u4e09\u6b21\u63e1\u624b\uff08ESTABLISHED\uff09\n\n\u5728 Linux**\uff1a\n    \u5185\u6838\u5c42\u9762\uff0c\u6709 *   \u5ba2\u6237\u7aef\u51e0\u79cd\u6536\u5230\u4e3b\u8981\u7684 `SY\u673a\u5236\u6765\u5e94\u5bf9\u534aN+ACK`\uff0c\u56de\u590d\u8fde\u63a5\u961f\u5217 `ACK`\u3002\n\u6ea2\u51fa    *   \u670d\u52a1\u7aef\u6536\u5230 `ACK`\uff0c\u72b6\u6001\u548c SYN \u653b\u51fb\uff1a\n\n#### 1. SYN Cookies\uff08\u6700\u53d8\u4e3a `ESTABLISHED`\uff0c\u8fde\u63a5\u6b63\u5f0f\u5efa\u7acb\u3002\n\n### \u4e8c\u3001 \u534a\u8fde\u63a5\u961f\u5217\uff08\u7ecf\u5178\u7684SYN Queue\uff09\n\n\u5728\u9632\u5fa1\u624b\u6bb5\u670d\u52a1\uff09\n*   **\u539f\u7406\u7aef\u5185\u6838\u4e2d**\uff1a\u5f53\u534a\uff0c\u4e3a\u4e86\u8fde\u63a5\u961f\u5217\u6ee1\u65f6\uff0c\u670d\u52a1\u5668\u7ba1\u7406\u4e0d\u518d\u76f4\u63a5\u8fd9\u4e9b\u5904\u4e8e `\u5206\u914dSYN_RCVD` \u8d44\u6e90 4\u591a\u7684\u5e76\u53d1\u8fde\u63a5\u8fde\u63a5\u653e\u5165\u534a\u3002\n*   `tcp_syn\u8fde\u63a5\u961f\u5217\u3002\nack_retries`    \u7531\u4e8e\uff1a\u51cf\u5c11\u670d\u52a1\u5668\u6e90 IP \u662f\u4f2a\u9020\u7684\uff0c\u91cd\u8bd5\u670d\u52a1\u7aef\u6c38\u8fdc\u53d1\u9001\u6536\u4e0d\u5230\u7b2c\u4e09\u6b21 `SYN+ACK`\u63e1 \u7684\u6b21\u6570\uff0c\u8ba9\u624b\u7684 ACK\u3002\u8fd9\u4e9b\u65e0\u6548\u201c\u7684\u534a\u8fde\u63a5\u66f4\u5feb\u534a\u8fde\u63a5\u201d\u5c31\u4f1a\u4e00\u76f4\u5360\u7528\u8d85\u961f\u5217\u65f6\u91ca\u653e\u4f4d\u7f6e\u3002\n*   `tcp_syn\u548c\u5185\u6838cookies`\uff1a\u5f00\u542f\u8d44\u6e90\u3002\n\n* SYN Cookies \u529f\u80fd   **\u540e\u679c**\uff1a\n   \uff08 \u534a\u8fde\u63a5\u961f\u5217\u88ab\u901a\u5e38\u9ed8\u8ba4\u5f00\u542f\u586b\u6ee1\u540e\uff09\u3002\n\n###\uff0c\u6b63\u5e38\u7684\u5ba2\u6237\u7aef\u53d1\u9001 \u603b\u7ed3\n\n** SYN \u5305\u4f1a\u88abTCP \u534a\u8fde\u63a5\u662f\u670d\u52a1\u7aef\u4e22\u5f03\u4e09\u6b21\u63e1\u624b\u5c1a\u672a\uff0c\u5b8c\u6210\u7684\u5bfc\u81f4\u6b63\u5e38\u4e2d\u95f4\u72b6\u6001\uff08\u7528\u6237\u65e0\u6cd5\u8fde\u63a5`SYN_RCVD`\uff09\u3002\u5b83\u672c\u8eab\u670d\u52a1\u762b\u75ea\u662f\u3002\u534f\u8bae\u8fd9\u5c31\u662f\u7ecf\u5178\u7684 **\u6b63\u5e38\u6d41\u7a0b\u7684\u4e00\u90e8\u5206SYN Flood \u62d2\u7edd\u670d\u52a1\u653b\u51fb**\u3002\n\n### \u56db\uff0c\u4f46\u5728\u9ad8\u5e76\u53d1\u573a\u666f\u4e0b\uff0c\u5982\u679c\u906d\u9047\u6076\u610f \u5b9e\u6218\u4e2d\u7684\u9632\u5fa1\u6216\u7b56\u7565\u6d41\u91cf\u7a81\u589e\uff0c\u534a\u8fde\u63a5\u961f\u5217\u6ea2\u51fa\u4f1a\u5bfc\u81f4\u670d\u52a1\u4e0d\u53ef\u7528\u3002\u56e0\u6b64\n\n\u5728\u652f\u6491\u5343\u4e07\u7ea7\u8bbe\u5907\u63a5\u5165\u7684\u67b6\u6784\u8bbe\u8ba1\u4e2d\uff0c\u6211\u4eec\u901a\u8fc7\u64cd\u4f5c\u7cfb\u7edf\uff0c\u5728\u5185\u6838\u67b6\u6784\u8bbe\u8ba1\u65f6\uff0c\u6211\u4eec\u9700\u8981\u53c2\u6570\u8c03\u4f18\u6765\u901a\u8fc7\u5f00\u542f SYN\u9632\u5fa1\u8fd9\u79cd Cookies\u98ce\u9669\uff1a\n\n1.  **\u5f00\u542f SYN Cookies**\uff08\u3001\u4f18\u5316\u5185\u6838\u53c2\u6570\u7b49`net.ipv4.tcp_syn\u624b\u6bb5cookies`\uff09\uff1a\n    *   \u8fd9\uff0c\u4fdd\u969c\u662f\u6700\u7cfb\u7edf\u7684\u6838\u5fc3\u7684\u9632\u5fa1\u624b\u6bb5\u3002\u5f53\u53ef\u7528\u534a\u8fde\u63a5\u961f\u5217\u6ee1\u65f6\u6027\u3002\uff0c\u670d\u52a1\u7aef\u4e0d\u518d\u76f4\u63a5\u5206\u914d\u8d44\u6e90\u5b58\u50a8\u534a\u8fde\u63a5\uff0c\u800c\u662f\u901a\u8fc7\u52a0\u5bc6\u7b97\u6cd5\u751f\u6210\u4e00\u4e2a Cookie \u503c\uff0c\u968f SYN+ACK \u53d1\u56de\u7ed9\u5ba2\u6237\u7aef\u3002\n    *   \u5982\u679c\u5ba2\u6237\u7aef\u662f\u6b63\u5e38\u7684\uff0c\u5b83\u4f1a\u56de\u590d\u5305\u542b\u8fd9\u4e2a Cookie \u7684 ACK\uff0c\u670d\u52a1\u7aef\u9a8c\u8bc1 Cookie \u5408\u6cd5\u540e\uff0c\u76f4\u63a5\u5efa\u7acb\u8fde\u63a5\u3002\n    *   \u8fd9\u6837\uff0c\u670d\u52a1\u7aef\u5728\u534a\u8fde\u63a5\u9636\u6bb5\u5c31\u4e0d\u9700\u8981\u7ef4\u62a4\u4efb\u4f55\u72b6\u6001\uff0c\u4ece\u800c\u907f\u514d\u4e86\u8d44\u6e90\u8017\u5c3d\u3002\n\n2.  **\u8c03\u6574\u961f\u5217\u5927\u5c0f**\uff08`net.ipv4.tcp_max_syn_backlog`\uff09\uff1a\n    *   \u9002\u5f53\u589e\u5927\u534a\u8fde\u63a5\u961f\u5217\u7684\u957f\u5ea6\uff0c\u4ee5\u5e94\u5bf9\u7a81\u53d1\u7684\u9ad8\u5e76\u53d1\u8fde\u63a5\u8bf7\u6c42\u3002\n\n3.  **\u51cf\u5c11\u91cd\u8bd5\u6b21\u6570**\uff08`net.ipv4.tcp_synack_retries`\uff09\uff1a\n    *   \u51cf\u5c11\u670d\u52a1\u7aef\u53d1\u9001 SYN+ACK \u540e\u7b49\u5f85 ACK \u7684\u91cd\u8bd5\u6b21\u6570\uff0c\u8ba9\u65e0\u6548\u7684\u534a\u8fde\u63a5\u66f4\u5feb\u8d85\u65f6\u91ca\u653e\u3002\n\n### \u603b\u7ed3\n\n**\u534a\u8fde\u63a5\u662f TCP \u63e1\u624b\u8fc7\u7a0b\u4e2d\u7684\u4e2d\u95f4\u72b6\u6001\uff0c\u65e2\u662f\u8fde\u63a5\u5efa\u7acb\u7684\u5fc5\u7ecf\u4e4b\u8def\uff0c\u4e5f\u662f\u7cfb\u7edf\u88ab\u653b\u51fb\u7684\u6f5c\u5728\u5f31\u70b9\u3002**\n\n\u7406\u89e3\u5b83\u5bf9\u4e8e\u4fdd\u969c\u540e\u7aef\u670d\u52a1\u7684\u7a33\u5b9a\u6027\u81f3\u5173\u91cd\u8981\uff0c\u7279
