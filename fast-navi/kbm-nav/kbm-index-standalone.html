    "title": "TCP \u7c98\u5305\u62c6\u5305\u4f60\u4eec\u600e\u4e48\u5904\u7406\uff1f\n\u4e3a\u4ec0\u4e48 TCP \u4f1a\u6709\u8fd9\u4e2a\u95ee\u9898\uff1f",
    "style": "background-color: yellow;",
    "details": "\u9762\u8bd5\u5b98\u60a8\u597d\uff0c\u8fd9\u662f\u4e00\u4e2a\u5728\u5206\u5e03\u5f0f\u7cfb\u7edf\u548c\u7269\u8054\u7f51\u573a\u666f\u4e2d\u975e\u5e38\u7ecf\u5178\u4e14\u5fc5\u987b\u89e3\u51b3\u7684\u95ee\u9898\u3002\u6211\u5728\u5c0f\u7535\u79d1\u6280\u8d1f\u8d23\u8bbe\u5907\u63a5\u5165\u7f51\u5173\u65f6\uff0c\u5904\u7406\u8fc7\u5927\u91cf\u8bbe\u5907\u7684\u957f\u8fde\u63a5\u901a\u4fe1\uff0c\u8fd9\u4e2a\u95ee\u9898\u662f\u6211\u4eec\u8bbe\u8ba1\u901a\u4fe1\u534f\u8bae\u65f6\u7684\u201c\u5fc5\u4fee\u8bfe\u201d\u3002\n\n### \u4e00\u3001 \u4e3a\u4ec0\u4e48 TCP \u4f1a\u6709\u7c98\u5305/\u62c6\u5305\u95ee\u9898\uff1f\n\n\u8fd9\u4e2a\u95ee\u9898\u7684\u6839\u6e90\u5728\u4e8e **TCP \u662f\u9762\u5411\u5b57\u8282\u6d41\u7684\u534f\u8bae**\uff0c\u800c **UDP \u662f\u9762\u5411\u6d88\u606f\u7684\u534f\u8bae**\u3002\n\n\u8fd9\u5c31\u597d\u6bd4\u6211\u8981\u7ed9\u60a8\u5bc4\u4e00\u5c01\u4fe1\uff1a\n*   **UDP \u50cf\u5bc4\u660e\u4fe1\u7247**\uff1a\u6211\u5199\u4e86 10 \u5f20\u660e\u4fe1\u7247\uff0c\u60a8\u5c31\u4f1a\u6536\u5230 10 \u5f20\uff0c\u8fb9\u754c\u975e\u5e38\u6e05\u6670\uff0c\u4e0d\u4f1a\u5408\u5e76\u4e5f\u4e0d\u4f1a\u62c6\u5206\u3002\n*   **TCP \u50cf\u5bc4\u4e00\u5377\u536b\u751f\u7eb8**\uff1a\u6211\u53ea\u7ba1\u628a\u7eb8\uff08\u6570\u636e\u5b57\u8282\u6d41\uff09\u6e90\u6e90\u4e0d\u65ad\u5730\u585e\u8fdb\u7ba1\u9053\u91cc\u53d1\u9001\u3002\u63a5\u6536\u7aef\u5c31\u50cf\u62c6\u5feb\u9012\uff0c\u53ef\u80fd\u6211\u53d1\u4e86 10 \u6b21\u5c0f\u5305\uff0c\u4f46\u63a5\u6536\u7aef\u4e00\u6b21\u62c6\u5f00\u53d1\u73b0\u662f\u4e00\u5927\u5377\uff1b\u6216\u8005\u6211\u53d1\u4e86\u4e00\u4e2a\u5927\u5305\uff0c\u63a5\u6536\u7aef\u62c6\u5f00\u53d1\u73b0\u53ea\u6709\u534a\u5377\uff0c\u5269\u4e0b\u7684\u4e00\u534a\u8fd8\u5728\u8def\u4e0a\u3002\n\n\u5177\u4f53\u6765\u8bf4\uff0c\u4ea7\u751f\u7c98\u5305\u548c\u62c6\u5305\u7684\u539f\u56e0\u4e3b\u8981\u6709\u4e09\u70b9\uff1a\n\n1.  **\u53d1\u9001\u65b9\u7684\u4f18\u5316\uff08Nagle \u7b97\u6cd5\uff09**\uff1a\n    *   \u4e3a\u4e86\u63d0\u9ad8\u4f20\u8f93\u6548\u7387\uff0c\u53d1\u9001\u65b9\u53ef\u80fd\u4f1a\u628a\u591a\u4e2a\u5c0f\u6570\u636e\u5305\u5408\u5e76\u6210\u4e00\u4e2a\u5927\u5305\u53d1\u9001\uff08\u8fd9\u5c31\u5bfc\u81f4\u4e86**\u7c98\u5305**\uff09\u3002\n    *   *\u573a\u666f*\uff1a\u5145\u7535\u5b9d\u5fc3\u8df3\u5305\u5f88\u5c0f\uff0c\u7cfb\u7edf\u53ef\u80fd\u6512\u591f\u4e86\u4e00\u5b9a\u5927\u5c0f\u624d\u53d1\u4e00\u6b21\u3002\n\n2.  **\u63a5\u6536\u65b9\u7684\u7f13\u51b2\uff08\u63a5\u6536\u7f13\u51b2\u533a\uff09**\uff1a\n    *   \u63a5\u6536\u65b9\u7684\u7f51\u5361\u628a\u6570\u636e\u6536\u5230\u7f13\u51b2\u533a\u91cc\uff0c\u5e94\u7528\u5c42\u53bb\u8bfb\u53d6\u7684\u901f\u5ea6\u53ef\u80fd\u6bd4\u7f51\u7edc\u4f20\u8f93\u901f\u5ea6\u5feb\uff0c\u4e5f\u53ef\u80fd\u6162\u3002\n    *   \u8bfb\u5feb\u4e86\uff1a\u7f13\u51b2\u533a\u91cc\u6512\u4e86\u4e24\u4e2a\u5305\uff0c\u5e94\u7528\u5c42\u4e00\u6b21\u8bfb\u51fa\u6765\uff0c\u8fd9\u5c31\u662f**\u7c98\u5305**\u3002\n    *   \u8bfb\u6162\u4e86\uff1a\u7f13\u51b2\u533a\u91cc\u53ea\u6709\u534a\u4e2a\u5305\uff0c\u5e94\u7528\u5c42\u8bfb\u51fa\u6765\u4e0d\u5b8c\u6574\uff0c\u8fd9\u5c31\u662f**\u62c6\u5305**\uff08\u6216\u8005\u53eb\u534a\u5305\uff09\u3002\n\n3.  **MSS \u548c MTU \u9650\u5236**\uff1a\n    *   \u7f51\u7edc\u5c42\u7684\u6700\u5927\u4f20\u8f93\u5355\u5143\uff08MTU\uff09\u662f\u6709\u9650\u7684\uff08\u901a\u5e38 1500 \u5b57\u8282\uff09\u3002\u5982\u679c\u5e94\u7528\u5c42\u53d1\u7684\u6570\u636e\u5305\u592a\u5927\uff0cTCP \u5728\u4f20\u8f93\u5c42\u4f1a\u5207\u7247\uff0c\u8fd9\u5c31\u5bfc\u81f4\u4e86**\u62c6\u5305**\u3002\n\n---\n\n### \u4e8c\u3001 \u6211\u4eec\u662f\u600e\u4e48\u5904\u7406\u7684\uff1f\n\n\u5728 Netty \u4e2d\uff0c\u89e3\u51b3\u7c98\u62c6\u5305\u7684\u6838\u5fc3\u601d\u8def\u662f\uff1a**\u5728\u5e94\u7528\u5c42\u5b9a\u4e49\u6e05\u6670\u7684\u201c\u6d88\u606f\u8fb9\u754c\u201d**\u3002\u6211\u4eec\u9700\u8981\u544a\u8bc9\u63a5\u6536\u65b9\uff0c\u4ece\u54ea\u4e2a\u5b57\u8282\u5f00\u59cb\uff0c\u5230\u54ea\u4e2a\u5b57\u8282\u7ed3\u675f\uff0c\u662f\u4e00\u4e2a\u5b8c\u6574\u7684\u6d88\u606f\u3002\n\n\u5728\u6211\u7684\u5b9e\u6218\u7ecf\u9a8c\u4e2d\uff0c\u4e3b\u8981\u6709\u4ee5\u4e0b\u4e09\u79cd\u4e3b\u6d41\u65b9\u6848\uff1a\n\n#### \u65b9\u6848 1\uff1a\u56fa\u5b9a\u957f\u5ea6\uff08Fixed Length\uff09\u2014\u2014 \u6700\u7b80\u5355\u4f46\u4e0d\u7075\u6d3b\n\u89c4\u5b9a\u6bcf\u4e2a\u6d88\u606f\u7684\u957f\u5ea6\u662f\u56fa\u5b9a\u7684\uff0c\u6bd4\u5982 100 \u5b57\u8282\u3002\n*   **\u505a\u6cd5**\uff1a\u5982\u679c\u4e0d\u591f 100 \u5b57\u8282\uff0c\u7528\u7a7a\u5b57\u7b26\u8865\u9f50\uff1b\u5982\u679c\u8d85\u8fc7\uff0c\u5219\u622a\u65ad\u3002\n*   **Netty \u5b9e\u73b0**\uff1a`FixedLengthFrameDecoder`\u3002\n*   **\u7f3a\u70b9**\uff1a\u6d6a\u8d39\u5e26\u5bbd\uff0c\u6570\u636e\u5982\u679c\u957f\u77ed\u4e0d\u4e00\u4f1a\u9020\u6210\u7a7a\u95f4\u6d6a\u8d39\uff0c\u6211\u4eec\u5728\u5b9e\u9645\u4e1a\u52a1\u4e2d\u5f88\u5c11\u4f7f\u7528\u3002\n\n#### \u65b9\u6848 2\uff1a\u7279\u6b8a\u5206\u9694\u7b26\uff08Delimiter\uff09\u2014\u2014 \u9002\u5408\u6587\u672c\u534f\u8bae\n\u5728\u6bcf\u4e2a\u6d88\u606f\u7684\u672b\u5c3e\u52a0\u4e0a\u4e00\u4e2a\u7279\u6b8a\u7684\u5206\u9694\u7b26\uff0c\u6bd4\u5982\u6362\u884c\u7b26 `\\n`\u3002\n*   **\u505a\u6cd5**\uff1a\u63a5\u6536\u65b9\u8bfb\u5230 `\\n` \u5c31\u8ba4\u4e3a\u4e00\u4e2a\u6d88\u606f\u7ed3\u675f\u4e86\u3002\n*   **Netty \u5b9e\u73b0**\uff1a`DelimiterBasedFrameDecoder`\u3002\n*   **\u573a\u666f**\uff1a\u6211\u4eec\u5728\u4e00\u4e9b\u7b80\u5355\u7684\u8c03\u8bd5\u6307\u4ee4\u6216\u8005\u6587\u672c\u534f\u8bae\uff08\u5982 FTP\u3001SMTP\uff09\u4e2d\u7528\u8fc7\u3002\n*   **\u7f3a\u70b9**\uff1a\u5982\u679c\u6d88\u606f\u5185\u5bb9\u672c\u8eab\u5c31\u5305\u542b\u4e86\u5206\u9694\u7b26\uff0c\u9700\u8981\u505a\u8f6c\u4e49\u5904\u7406\uff0c\u6bd4\u8f83\u9ebb\u70e6\uff1b\u4e14\u4e8c\u8fdb\u5236\u6570\u636e\u6d41\u4e2d\u5f88\u96be\u627e\u5230\u5408\u9002\u7684\u5206\u9694\u7b26\u3002\n\n#### \u65b9\u6848 3\uff1a\u957f\u5ea6\u5b57\u6bb5\uff08Length Field\uff09\u2014\u2014 **\u5de5\u4e1a\u754c\u6700\u63a8\u8350\uff0c\u6211\u4eec\u4e3b\u8981\u91c7\u7528\u6b64\u65b9\u6848**\n\u8fd9\u662f\u6211\u4eec\u5728\u7269\u8054\u7f51\u8bbe\u5907\u901a\u4fe1\u548c RPC \u6846\u67b6\u4e2d\u6700\u5e38\u7528\u7684\u65b9\u6848\u3002\n*   **\u534f\u8bae\u8bbe\u8ba1**\uff1a\n    \u6211\u4eec\u81ea\u5b9a\u4e49\u4e86\u4e00\u4e2a\u6d88\u606f\u5934\uff0c\u901a\u5e38\u5305\u542b\uff1a\n    `| \u9b54\u6570(4B) | \u7248\u672c\u53f7(1B) | \u6d88\u606f\u7c7b\u578b(1B) | \u6570\u636e\u957f\u5ea6(4B) | \u6570\u636e\u5185\u5bb9(N B) |`\n    *   **\u5173\u952e\u70b9**\uff1a\u6211\u4eec\u5728\u6d88\u606f\u5934\u4e2d\u660e\u786e\u4e86\u4e00\u4e2a\u5b57\u6bb5\uff08\u6bd4\u5982 `\u6570\u636e\u957f\u5ea6`\uff09\uff0c\u8bb0\u5f55\u4e86\u540e\u9762\u6d88\u606f\u4f53\u7684\u5177\u4f53\u957f\u5ea6\u3002\n\n*   **\u5904\u7406\u903b\u8f91**\uff1a\n    1.  \u63a5\u6536\u65b9\u5148\u8bfb\u53d6\u6d88\u606f\u5934\u3002\n    2.  \u89e3\u6790\u51fa `\u6570\u636e\u957f\u5ea6` \u5b57\u6bb5\uff0c\u5047\u8bbe\u503c\u4e3a 100\u3002\n    3.  \u7136\u540e\u5224\u65ad\u7f13\u51b2\u533a\u91cc\u7684\u5b57\u8282\u6570\u591f\u4e0d\u591f 100\u3002\n    4.  \u5982\u679c\u4e0d\u591f\uff0c\u5c31\u662f\u534a\u5305\uff08\u62c6\u5305\uff09\uff0c\u7b49\u5f85\u540e\u7eed\u6570\u636e\u5230\u8fbe\u3002\n    5.  \u5982\u679c\u591f\uff0c\u5c31\u8bfb\u53d6 100 \u5b57\u8282\uff0c\u5269\u4e0b\u7684\u5b57\u8282\u7559\u7ed9\u4e0b\u4e00\u4e2a\u6d88\u606f\u5904\u7406\uff0c\u8fd9\u5c31\u89e3\u51b3\u4e86\u7c98\u5305\u3002\n\n*   **Netty \u5b9e\u73b0**\uff1a`LengthFieldBasedFrameDecoder`\u3002\n    \u8fd9\u662f Netty \u63d0\u4f9b\u7684\u6700\u5f3a\u5927\u7684\u89e3\u7801\u5668\uff0c\u6211\u4eec\u53ea\u9700\u8981\u914d\u7f6e\u51e0\u4e2a\u53c2\u6570\uff08\u957f\u5ea6\u5b57\u6bb5\u7684\u504f\u79fb\u91cf\u3001\u957f\u5ea6\u5b57\u6bb5\u7684\u5b57\u8282\u6570\u7b49\uff09\u5373\u53ef\u3002\n\n**\u4ee3\u7801\u793a\u4f8b\uff08\u4f2a\u4ee3\u7801\uff09\uff1a**\n```java\n// \u5728 Netty \u7684 ChannelPipeline \u4e2d\u914d\u7f6e\u89e3\u7801\u5668\n// maxFrameLength: \u6700\u5927\u5305\u957f\u5ea6\uff0c\u9632\u6b62\u5185\u5b58\u6ea2\u51fa\n// lengthFieldOffset: \u957f\u5ea6\u5b57\u6bb5\u5728\u6d88\u606f\u5934\u4e2d\u7684\u504f\u79fb\u91cf\n// lengthFieldLength: \u957f\u5ea6\u5b57\u6bb5\u5360\u7528\u7684\u5b57\u8282\u6570\uff08\u5982 int \u7c7b\u578b\u662f 4\uff09\nch.pipeline().addLast(new LengthFieldBasedFrameDecoder(1024 * 1024, 6, 4));\nch.pipeline().addLast(new MyBusinessDecoder()); // \u81ea\u5b9a\u4e49\u4e1a\u52a1\u89e3\u7801\u5668\n```\n\n### \u4e09\u3001 \u603b\u7ed3\u4e0e\u5b9e\u6218\u5efa\u8bae\n\n\u5728\u5c0f\u7535\u79d1\u6280\u7684\u8bbe\u5907\u7f51\u5173\u67b6\u6784\u4e2d\uff0c\u6211\u4eec**\u7edf\u4e00\u91c7\u7528\u4e86\u201c\u957f\u5ea6\u5b57\u6bb5\u201d\u65b9\u6848**\u3002\n\n1.  **\u9ad8\u6548**\uff1a\u4e0d\u9700\u8981\u626b\u63cf\u7279\u6b8a\u5b57\u7b26\uff0c\u76f4\u63a5\u6839\u636e\u957f\u5ea6\u622a\u53d6\uff0c\u6027\u80fd\u6781\u9ad8\u3002\n2.  **\u7cbe\u51c6**\uff1a\u5b8c\u7f8e\u89e3\u51b3\u4e86\u534a\u5305\uff08\u8bfb\u4e0d\u591f\u957f\u5ea6\u4e0d\u5904\u7406\uff09\u548c\u7c98\u5305\uff08\u8bfb\u591f\u957f\u5ea6\u540e\u622a\u65ad\uff0c\u5269\u4e0b\u7684\u7559\u7ed9\u4e0b\u4e2a\u5305\uff09\u7684\u95ee\u9898\u3002\n3.  **\u5b89\u5168**\uff1a\u6211\u4eec\u5728\u89e3\u7801\u5668\u4e2d\u8bbe\u7f6e\u4e86 `maxFrameLength`\uff0c\u5982\u679c\u6076\u610f\u5ba2\u6237\u7aef\u53d1\u4e86\u4e00\u4e2a\u8d85\u5927\u7684\u957f\u5ea6\u5b57\u6bb5\uff0c\u6211\u4eec\u4f1a\u76f4\u63a5\u65ad\u5f00\u8fde\u63a5\uff0c\u9632\u6b62\u5185\u5b58\u6ea2\u51fa\uff08OOM\uff09\u653b\u51fb\u3002\n\n\u6240\u4ee5\uff0c**\u660e\u786e\u6d88\u606f\u8fb9\u754c**\u662f\u89e3\u51b3 TCP \u7c98\u62c6\u5305\u95ee\u9898\u7684\u91d1\u79d1\u7389\u5f8b\u3002",
    "subItems": []
  },

    "title": "MQTT/OCPP\u534f\u8bae\n\u4e3a\u4ec0\u4e48 IoT \u573a\u666f\u9002\u5408 MQTT\uff1f",
    "style": "",
    "details": "\u9762\u8bd5\u5b98\u60a8\u597d\uff0c\u8fd9\u662f\u4e00\u4e2a\u975e\u5e38\u5951\u5408\u6211\u8fc7\u5f80\u7ecf\u9a8c\u7684\u95ee\u9898\u3002\u6211\u5728\u5c0f\u7535\u79d1\u6280\u8d1f\u8d23\u8bbe\u5907\u63a5\u5165\u7f51\u5173\u67b6\u6784\u65f6\uff0cMQTT \u662f\u6211\u4eec\u652f\u6491\u5343\u4e07\u7ea7\u8bbe\u5907\u63a5\u5165\u7684\u6838\u5fc3\u534f\u8bae\u4e4b\u4e00\u3002\n\n**\u4e3a\u4ec0\u4e48 IoT \u573a\u666f\uff0c\u7279\u522b\u662f\u50cf\u5171\u4eab\u5145\u7535\u5b9d\u8fd9\u79cd\u5927\u89c4\u6a21\u8bbe\u5907\u63a5\u5165\u573a\u666f\uff0c\u9996\u9009 MQTT \u800c\u4e0d\u662f HTTP\uff1f**\n\n\u6211\u8ba4\u4e3a\u6838\u5fc3\u539f\u56e0\u53ef\u4ee5\u603b\u7ed3\u4e3a\u4e94\u4e2a\u5b57\uff1a**\u8f7b\u3001\u7701\u3001\u7a33\u3001\u6d3b\u3001\u5b89**\u3002\n\n### \u4e00\u3001 \u8f7b\uff1a\u534f\u8bae\u6781\u8f7b\uff0c\u5f00\u9500\u6781\u5c0f\n\n\u8fd9\u662f MQTT \u76f8\u6bd4 HTTP \u6700\u5927\u7684\u4f18\u52bf\uff0c\u7279\u522b\u9002\u5408\u5e26\u5bbd\u6709\u9650\u6216\u6d41\u91cf\u6602\u8d35\u7684 IoT \u573a\u666f\u3002\n\n*   **\u62a5\u6587\u5bf9\u6bd4**\uff1a\n    *   **HTTP**\uff1a\u8bf7\u6c42\u5934\u975e\u5e38\u81c3\u80bf\uff0c\u52a8\u8f84\u51e0\u767e\u5b57\u8282\u751a\u81f3\u4e0a\u5343\u5b57\u8282\uff08Cookie\u3001User-Agent \u7b49\uff09\u3002\u5bf9\u4e8e\u53ea\u9700\u4e0a\u62a5\u201c\u7535\u91cf 80%\u201d\u8fd9\u79cd\u51e0\u4e2a\u5b57\u8282\u7684\u6570\u636e\u6765\u8bf4\uff0c\u6709\u6548\u8f7d\u8377\u6bd4\u6781\u4f4e\uff0c\u6d6a\u8d39\u5e26\u5bbd\u3002\n    *   **MQTT**\uff1a\u534f\u8bae\u5934\u90e8\u6700\u5c0f\u4ec5\u4e3a **2 \u5b57\u8282**\u3002\u5b83\u53bb\u6389\u4e86\u7e41\u7410\u7684\u5934\u90e8\u4fe1\u606f\uff0c\u53ea\u4fdd\u7559\u6700\u6838\u5fc3\u7684\u63a7\u5236\u4fe1\u606f\u3002\n*   **\u5b9e\u6218\u4ef7\u503c**\uff1a\u5728\u6211\u4eec\u7684\u5145\u7535\u5b9d\u9879\u76ee\u4e2d\uff0c\u8bbe\u5907\u901a\u8fc7 2G/4G \u7f51\u7edc\u901a\u4fe1\uff0c\u6d41\u91cf\u6210\u672c\u548c\u4fe1\u53f7\u7a33\u5b9a\u6027\u662f\u5173\u952e\u3002MQTT \u7684\u8f7b\u91cf\u5316\u4e0d\u4ec5\u5e2e\u6211\u4eec\u8282\u7701\u4e86\u5de8\u989d\u7684\u6d41\u91cf\u8d39\u7528\uff0c\u66f4\u4fdd\u8bc1\u4e86\u5728\u5f31\u7f51\u73af\u5883\u4e0b\u6570\u636e\u5305\u66f4\u5bb9\u6613\u5b8c\u6574\u4f20\u8f93\u6210\u529f\u3002\n\n### \u4e8c\u3001 \u7701\uff1a\u4f4e\u529f\u8017\uff0c\u957f\u7eed\u822a\n\n\u5f88\u591a IoT \u8bbe\u5907\u662f\u7535\u6c60\u4f9b\u7535\uff0c\u6216\u8005\u5904\u4e8e\u4f11\u7720\u5524\u9192\u72b6\u6001\u3002\n\n*   **HTTP**\uff1a\u6bcf\u6b21\u901a\u4fe1\u90fd\u9700\u8981\u5efa\u7acb\u8fde\u63a5\uff08\u6216\u8005\u7ef4\u62a4 Keep-Alive\uff09\uff0c\u4f20\u8f93\u5927\u91cf\u6570\u636e\uff0c\u8017\u7535\u91cf\u9ad8\u3002\n*   **MQTT**\uff1a\u62a5\u6587\u5c0f\uff0c\u4f20\u8f93\u5feb\uff0c\u5904\u7406\u5feb\u3002\u8bbe\u5907\u53ef\u4ee5\u5feb\u901f\u53d1\u9001\u5b8c\u6570\u636e\u8fdb\u5165\u4f11\u7720\u6a21\u5f0f\u3002\u8fd9\u5bf9\u4e8e\u6211\u4eec\u7684\u4e00\u4e9b\u4f4e\u529f\u8017\u4f20\u611f\u5668\u7c7b\u8bbe\u5907\u81f3\u5173\u91cd\u8981\u3002\n\n### \u4e09\u3001 \u7a33\uff1a\u5f31\u7f51\u5bb9\u5fcd\u5ea6\u9ad8\n\nIoT \u8bbe\u5907\u7ecf\u5e38\u5904\u4e8e\u7535\u68af\u95f4\u3001\u5730\u4e0b\u5ba4\u7b49\u4fe1\u53f7\u4e0d\u7a33\u5b9a\u7684\u73af\u5883\uff0c\u7f51\u7edc\u6ce2\u52a8\u662f\u5e38\u6001\u3002\n\n*   **TCP \u539f\u751f\u4fdd\u6d3b**\uff1aMQTT \u57fa\u4e8e TCP\uff0c\u4e14\u534f\u8bae\u5c42\u9762\u8bbe\u8ba1\u4e86 `Keep Alive` \u5fc3\u8df3\u673a\u5236\u3002\u5b83\u80fd\u5feb\u901f\u611f\u77e5\u8fde\u63a5\u662f\u5426\u65ad\u5f00\u3002\n*   **QoS \u670d\u52a1\u8d28\u91cf\u7b49\u7ea7**\uff1a\u8fd9\u662f MQTT \u7684\u6740\u624b\u950f\u3002\u5b83\u63d0\u4f9b\u4e86\u4e09\u4e2a\u7b49\u7ea7\u7684\u670d\u52a1\u8d28\u91cf\uff0c\u89e3\u51b3\u4e86\u7f51\u7edc\u4e0d\u7a33\u5b9a\u5bfc\u81f4\u7684\u6570\u636e\u4e22\u5931\u95ee\u9898\uff1a\n    *   **QoS 0**\uff1a\u6700\u591a\u4e00\u6b21\uff08\u53d1\u540e\u5373\u5fd8\uff0c\u9002\u5408\u9ad8\u9891\u5fc3\u8df3\uff09\u3002\n    *   **QoS 1**\uff1a\u81f3\u5c11\u4e00\u6b21\uff08\u786e\u4fdd\u5230\u8fbe\uff0c\u53ef\u80fd\u6709\u91cd\u590d\uff0c\u9002\u5408\u4e1a\u52a1\u4e0a\u62a5\uff09\u3002\n    *   **QoS 2**\uff1a\u6070\u597d\u4e00\u6b21\uff08\u901a\u8fc7\u56db\u6b21\u63e1\u624b\u4fdd\u8bc1\u4e0d\u4e22\u4e0d\u91cd\uff0c\u9002\u5408\u5173\u952e\u6307\u4ee4\uff0c\u5982\u8fdc\u7a0b\u56fa\u4ef6\u5347\u7ea7\uff09\u3002\n*   **\u5b9e\u6218\u7ecf\u9a8c**\uff1a\u6211\u4eec\u5728\u8bbe\u5907\u79df\u501f\u3001\u5f52\u8fd8\u7684\u5173\u952e\u8282\u70b9\uff0c\u5f3a\u5236\u4f7f\u7528 QoS 1 \u6216 QoS 2\uff0c\u786e\u4fdd\u8ba2\u5355\u6570\u636e\u7edd\u4e0d\u4e22\u5931\uff0c\u54ea\u6015\u7f51\u7edc\u5728\u4f20\u8f93\u8fc7\u7a0b\u4e2d\u65ad\u5f00\uff0c\u534f\u8bae\u673a\u5236\u4e5f\u80fd\u4fdd\u8bc1\u91cd\u4f20\u3002\n\n### \u56db\u3001 \u6d3b\uff1a\u53d1\u5e03/\u8ba2\u9605\u6a21\u5f0f\uff0c\u89e3\u8026\u4e0e\u5b9e\u65f6\n\n\u8fd9\u662f\u67b6\u6784\u5c42\u9762\u7684\u5de8\u5927\u4f18\u52bf\u3002HTTP \u662f\u8bf7\u6c42/\u54cd\u5e94\u6a21\u5f0f\uff0c\u8bbe\u5907\u662f\u88ab\u52a8\u7684\uff1b\u800c MQTT \u662f\u53d1\u5e03/\u8ba2\u9605\u6a21\u5f0f\uff0c\u8bbe\u5907\u662f\u4e3b\u52a8\u7684\u3002\n\n*   **\u53cc\u5411\u5b9e\u65f6\u901a\u4fe1**\uff1a\n    *   \u5982\u679c\u7528 HTTP\uff0c\u670d\u52a1\u5668\u60f3\u7ed9\u8bbe\u5907\u53d1\u6307\u4ee4\uff08\u6bd4\u5982\u8fdc\u7a0b\u91cd\u542f\u3001\u5f00\u7bb1\uff09\uff0c\u5fc5\u987b\u7b49\u8bbe\u5907\u6765\u8f6e\u8be2\uff0c\u5b9e\u65f6\u6027\u5dee\u4e14\u6d6a\u8d39\u8d44\u6e90\u3002\n    *   \u7528 MQTT\uff0c\u8bbe\u5907\u8ba2\u9605\u4e00\u4e2a Topic\uff08\u5982 `cmd/device/{id}`\uff09\uff0c\u670d\u52a1\u5668\u968f\u65f6\u53ef\u4ee5\u53d1\u5e03\u6307\u4ee4\uff0c\u8bbe\u5907\u5b9e\u65f6\u6536\u5230\u3002\n*   **\u89e3\u8026**\uff1a\u8bbe\u5907\u53ea\u7ba1\u53d1\u6d88\u606f\uff0c\u4e1a\u52a1\u7cfb\u7edf\u53ea\u7ba1\u8ba2\u9605\u6d88\u606f\u3002\u4e2d\u95f4\u901a\u8fc7 Broker\uff08\u5982 EMQX\uff09\u89e3\u8026\u3002\u6211\u4eec\u5728\u540e\u7aef\u91cd\u6784\u65f6\uff0c\u65b0\u589e\u4e86\u4e00\u4e2a\u6570\u636e\u5206\u6790\u670d\u52a1\uff0c\u53ea\u9700\u8ba9\u5b83\u8ba2\u9605\u8bbe\u5907\u6570\u636e Topic \u5373\u53ef\uff0c\u5b8c\u5168\u4e0d\u9700\u8981\u6539\u52a8\u8bbe\u5907\u7aef\u4ee3\u7801\u3002\n\n### \u4e94\u3001 \u5b89\uff1a\u65ad\u7ebf\u91cd\u8fde\u4e0e\u9057\u5631\u6d88\u606f\n\n\u8fd9\u662f\u4fdd\u969c\u4e1a\u52a1\u8fde\u7eed\u6027\u7684\u5173\u952e\u8bbe\u8ba1\u3002\n\n*   **\u81ea\u52a8\u91cd\u8fde**\uff1aMQTT \u5ba2\u6237\u7aef\u5e93\u901a\u5e38\u5185\u7f6e\u4e86\u65ad\u7ebf\u91cd\u8fde\u903b\u8f91\uff0c\u7f51\u7edc\u6062\u590d\u540e\u80fd\u81ea\u52a8\u8fde\u63a5\uff0c\u4e0d\u9700\u8981\u5e94\u7528\u5c42\u5199\u590d\u6742\u7684\u91cd\u8bd5\u4ee3\u7801\u3002\n*   **\u9057\u5631\u6d88\u606f**\uff1a\n    *   \u8fd9\u662f MQTT \u7684\u4e00\u4e2a\u7279\u8272\u529f\u80fd\u3002\u8bbe\u5907\u5728\u8fde\u63a5\u65f6\u53ef\u4ee5\u8bbe\u7f6e\u4e00\u4e2a\u201c\u9057\u5631\u201d\u3002\n    *   **\u573a\u666f**\uff1a\u5982\u679c\u8bbe\u5907\u610f\u5916\u65ad\u7535\u6216\u7f51\u7edc\u7a81\u7136\u65ad\u5f00\uff0cBroker \u4f1a\u81ea\u52a8\u5411\u8ba2\u9605\u8005\u53d1\u9001\u8fd9\u4e2a\u9057\u5631\u6d88\u606f\u3002\n    *   **\u5b9e\u6218\u5e94\u7528**\uff1a\u6211\u4eec\u5229\u7528\u8fd9\u4e2a\u673a\u5236\u5b9e\u73b0\u4e86\u201c\u8bbe\u5907\u79bb\u7ebf\u544a\u8b66\u201d\u3002\u4e00\u65e6\u67d0\u53f0\u8bbe\u5907\u6389\u7ebf\uff0c\u8fd0\u7ef4\u7cfb\u7edf\u7acb\u523b\u6536\u5230\u544a\u8b66\uff0c\u65e0\u9700\u518d\u4f9d\u8d56\u4e0a\u5c42\u5e94\u7528\u7684\u5fc3\u8df3\u8d85\u65f6\u68c0\u6d4b\uff0c\u5927\u5927\u964d\u4f4e\u4e86\u76d1\u63a7\u5ef6\u8fdf\u3002\n\n### \u603b\u7ed3\n\n**MQTT \u5c31\u662f\u4e3a IoT \u800c\u751f\u7684\u3002** \u5b83\u89e3\u51b3\u4e86 HTTP \u5728\u7269\u8054\u7f51\u573a\u666f\u4e0b\u7684\u75db\u70b9\uff1a**\u5e26\u5bbd\u6d6a\u8d39\u3001\u9ad8\u5ef6\u8fdf\u3001\u65e0\u6cd5\u4e3b\u52a8\u63a8\u9001\u3001\u5f31\u7f51\u9002\u5e94\u6027\u5dee**\u3002\n\n\u5728\u6211\u7684\u67b6\u6784\u5b9e\u8df5\u4e2d\uff0cMQTT \u8d1f\u8d23\u8bbe\u5907\u7684\u5b9e\u65f6\u63a5\u5165\u548c\u6307\u4ee4\u4e0b\u53d1\uff0c\u800c HTTP \u4ec5\u7528\u4e8e\u8bbe\u5907\u521d\u6b21\u6fc0\u6d3b\u6216\u5927\u6587\u4ef6\u7684\u4e0b\u8f7d\uff08\u5982\u56fa\u4ef6\u5305\u4e0b\u8f7d\uff09\uff0c\u4e24\u8005\u7ed3\u5408\uff0c\u6784\u5efa\u4e86\u9ad8\u53ef\u7528\u3001\u4f4e\u6210\u672c\u7684\u7269\u8054\u7f51\u901a\u4fe1\u5e95\u5ea7\u3002",

  "266": {
    "title": "MQTT QoS \u673a\u5236\uff1f",
    "style": "",
    "details": "\u9762\u8bd5\u5b98\u60a8\u597d\uff0c\u7d27\u63a5\u7740\u521a\u624d\u7684\u8bdd\u9898\uff0cMQTT \u7684 QoS\uff08Quality of Service\uff0c\u670d\u52a1\u8d28\u91cf\uff09\u673a\u5236\u662f\u5176\u80fd\u591f\u9002\u5e94\u590d\u6742\u7269\u8054\u7f51\u573a\u666f\u7684\u6838\u5fc3\u4fdd\u969c\u3002\n\n\u7b80\u5355\u6765\u8bf4\uff0cQoS \u5b9a\u4e49\u4e86\u6d88\u606f\u4f20\u9012\u7684**\u53ef\u9760\u6027\u7b49\u7ea7**\u3002\u5728\u7f51\u7edc\u73af\u5883\u4e0d\u7a33\u5b9a\u7684\u7269\u8054\u7f51\u573a\u666f\u4e0b\uff08\u6bd4\u5982\u5145\u7535\u5b9d\u8bbe\u5907\u5728\u5730\u4e0b\u5ba4\u4fe1\u53f7\u5dee\uff09\uff0c\u5b83\u89e3\u51b3\u4e86\u201c\u6d88\u606f\u662f\u5426\u4e00\u5b9a\u80fd\u9001\u5230\u201d\u4ee5\u53ca\u201c\u662f\u5426\u4f1a\u91cd\u590d\u201d\u7684\u95ee\u9898\u3002\n\nMQTT \u5b9a\u4e49\u4e86\u4e09\u4e2a QoS \u7b49\u7ea7\uff0c\u6211\u4eec\u53ef\u4ee5\u7528\u201c\u5bc4\u5feb\u9012\u201d\u7684\u4f8b\u5b50\u6765\u901a\u4fd7\u7406\u89e3\uff0c\u5e76\u7ed3\u5408\u6211\u5728\u5c0f\u7535\u79d1\u6280\u7684\u9879\u76ee\u7ecf\u9a8c\u4e3a\u60a8\u8be6\u7ec6\u62c6\u89e3\uff1a\n\n### \u4e00\u3001 QoS \u7684\u4e09\u4e2a\u7b49\u7ea7\n\n#### 1. QoS 0\uff1aAt Most Once\uff08\u81f3\u591a\u4e00\u6b21\uff09\u2014\u2014\u201c\u53d1\u5b8c\u5373\u5fd8\u201d\n\n*   **\u6d41\u7a0b**\uff1a\u53d1\u9001\u8005\u53d1\u9001\u6d88\u606f\u540e\uff0c\u4e0d\u7b49\u5f85\u786e\u8ba4\uff0c\u76f4\u63a5\u8ba4\u4e3a\u53d1\u9001\u6210\u529f\u3002\n*   **\u6bd4\u55bb**\uff1a\u5c31\u50cf\u6211\u628a\u4fe1\u4e22\u8fdb\u90ae\u7b52\uff0c\u81f3\u4e8e\u90ae\u9012\u5458\u6709\u6ca1\u6709\u628a\u4fe1\u9001\u8d70\u3001\u8def\u4e0a\u6709\u6ca1\u6709\u4e22\uff0c\u6211\u5b8c\u5168\u4e0d\u7ba1\u3002\n*   **\u7279\u70b9**\uff1a\u901f\u5ea6\u6700\u5feb\uff0c\u4f46\u53ef\u9760\u6027\u6700\u4f4e\u3002\u53ef\u80fd\u4f1a\u4e22\u6d88\u606f\uff0c\u4f46\u7edd\u4e0d\u4f1a\u91cd\u590d\u3002\n*   **\u5b9e\u6218\u5e94\u7528**\uff1a\n    *   \u5728\u6211\u4eec\u7684\u7cfb\u7edf\u4e2d\uff0c**\u8bbe\u5907\u7684\u5fc3\u8df3\u5305**\u901a\u5e38\u4f7f\u7528 QoS 0\u3002\n    *   **\u539f\u56e0**\uff1a\u5fc3\u8df3\u5305\u9891\u7387\u9ad8\uff08\u6bd4\u5982\u6bcf 30 \u79d2\u4e00\u6b21\uff09\uff0c\u4e22\u4e00\u4e24\u4e2a\u5305\u5b8c\u5168\u4e0d\u5f71\u54cd\u4e1a\u52a1\u5224\u65ad\uff0c\u4e0b\u4e00\u5206\u949f\u8fd8\u4f1a\u518d\u53d1\uff0c\u6ca1\u5fc5\u8981\u4e3a\u4e86\u786e\u8ba4\u5305\u589e\u52a0\u7f51\u7edc\u5f00\u9500\u3002\n\n#### 2. QoS 1\uff1aAt Least Once\uff08\u81f3\u5c11\u4e00\u6b21\uff09\u2014\u2014\u201c\u9700\u8981\u786e\u8ba4\u201d\n\n*   **\u6d41\u7a0b**\uff1a\n    1.  \u53d1\u9001\u8005\u53d1\u9001\u6d88\u606f\u3002\n    2.  \u63a5\u6536\u8005\u6536\u5230\u540e\uff0c\u56de\u590d\u4e00\u4e2a `PUBACK` \u786e\u8ba4\u5305\u3002\n    3.  \u53d1\u9001\u8005\u6536\u5230 `PUBACK` \u540e\uff0c\u8ba4\u4e3a\u53d1\u9001\u6210\u529f\u3002\n*   **\u98ce\u9669**\uff1a\u5982\u679c\u53d1\u9001\u8005\u53d1\u4e86\u6d88\u606f\uff0c\u4f46\u6ca1\u6536\u5230 `PUBACK`\uff08\u53ef\u80fd\u662f\u7f51\u7edc\u6296\u52a8\uff0c\u6216\u8005 `PUBACK` \u4e22\u4e86\uff09\uff0c\u53d1\u9001\u8005\u4f1a**\u91cd\u53d1**\u6d88\u606f\u3002\u8fd9\u5c31\u5bfc\u81f4\u63a5\u6536\u8005\u53ef\u80fd\u6536\u5230**\u4e24\u4efd\u76f8\u540c\u7684\u6d88\u606f**\u3002\n*   **\u6bd4\u55bb**\uff1a\u6211\u5bc4\u5feb\u9012\uff0c\u5fc5\u987b\u770b\u5230\u7b7e\u6536\u5355\u624d\u653e\u5fc3\u3002\u5982\u679c\u7b7e\u6536\u5355\u6ca1\u5bc4\u56de\u6765\uff0c\u6211\u5c31\u518d\u5bc4\u4e00\u4efd\u3002\n*   **\u5b9e\u6218\u5e94\u7528**\uff1a\n    *   **\u8bbe\u5907\u4e1a\u52a1\u6570\u636e\u4e0a\u62a5**\uff08\u5982\u7535\u91cf\u53d8\u5316\u3001\u5145\u7535\u72b6\u6001\uff09\u901a\u5e38\u4f7f\u7528 QoS 1\u3002\n    *   **\u5904\u7406\u91cd\u590d**\uff1a\u6211\u4eec\u5728\u4e1a\u52a1\u5c42\u505a\u4e86**\u5e42\u7b49\u6027\u5904\u7406**\u3002\u6bd4\u5982\u6d88\u606f\u4f53\u91cc\u5e26\u4e00\u4e2a\u552f\u4e00\u7684 `MessageID` \u6216\u4e1a\u52a1\u6d41\u6c34\u53f7\uff0c\u6d88\u8d39\u7aef\u6839\u636e\u8fd9\u4e2a ID \u53bb\u91cd\uff0c\u786e\u4fdd\u6570\u636e\u4e0d\u4e71\u3002\n\n#### 3. QoS 2\uff1aExactly Once\uff08\u6070\u597d\u4e00\u6b21\uff09\u2014\u2014\u201c\u6700\u53ef\u9760\u201d\n\n*   **\u6d41\u7a0b**\uff1a\u8fd9\u662f\u4e00\u4e2a\u56db\u6b65\u63e1\u624b\u8fc7\u7a0b\uff08\u6700\u7e41\u7410\u4f46\u6700\u4e25\u8c28\uff09\uff1a\n    1.  \u53d1\u9001\u8005\u53d1\u9001\u6d88\u606f\u3002\n    2.  \u63a5\u6536\u8005\u6536\u5230\u540e\uff0c\u56de\u590d `PUBREC`\uff08\u8868\u793a\u6536\u5230\u4e86\uff09\uff0c\u5e76\u5c06\u6d88\u606f\u6682\u5b58\uff0c\u6b64\u65f6\u4e0d\u6295\u9012\u7ed9\u5e94\u7528\u5c42\u3002\n    3.  \u53d1\u9001\u8005\u6536\u5230 `PUBREC`\uff0c\u56de\u590d `PUBREL`\uff08\u8868\u793a\u53ef\u4ee5\u91ca\u653e\u4e86\uff09\u3002\n    4.  \u63a5\u6536\u8005\u6536\u5230 `PUBREL`\uff0c\u5c06\u6d88\u606f\u6295\u9012\u7ed9\u5e94\u7528\u5c42\uff0c\u5e76\u56de\u590d `PUBCOMP`\u3002\n*   **\u7279\u70b9**\uff1a\u4fdd\u8bc1\u6d88\u606f**\u4e0d\u4e22\u5931\u3001\u4e0d\u91cd\u590d**\u3002\u4f46\u63e1\u624b\u8fc7\u7a0b\u590d\u6742\uff0c\u5f00\u9500\u5927\uff0c\u5ef6\u8fdf\u9ad8\u3002\n*   **\u5b9e\u6218\u5e94\u7528**\uff1a\n    *   **\u5173\u952e\u6307\u4ee4\u4e0b\u53d1**\uff08\u5982\u8fdc\u7a0b\u5f00\u7bb1\u6307\u4ee4\u3001\u56fa\u4ef6\u5347\u7ea7\u901a\u77e5\uff09\u3002\n    *   **\u573a\u666f**\uff1a\u5982\u679c\u56e0\u4e3a\u7f51\u7edc\u6ce2\u52a8\u5bfc\u81f4\u7528\u6237\u6263\u4e86\u8d39\u4f46\u67dc\u5b50\u6ca1\u5f00\uff0c\u9762\u8bd5\u5b98\u60a8\u597d\uff0cMQTT \u7684 QoS\uff08Quality of Service\uff0c\u670d\u52a1\u8d28\u91cf\uff09\u673a\u5236\u662f\u5176\u6838\u5fc3\u7279\u6027\uff0c\u4e5f\u662f\u6211\u4eec\u5728\u7269\u8054\u7f51\u67b6\u6784\u8bbe\u8ba1\u4e2d\u4fdd\u969c\u6570\u636e\u53ef\u9760\u6027\u7684\u5173\u952e\u3002\n\n\u6211\u5728\u5c0f\u7535\u79d1\u6280\u8bbe\u8ba1\u8bbe\u5907\u901a\u4fe1\u534f\u8bae\u65f6\uff0cQoS \u7b49\u7ea7\u7684\u9009\u62e9\u76f4\u63a5\u5f71\u54cd\u4e86\u4e1a\u52a1\u7684\u51c6\u786e\u6027\u548c\u7cfb\u7edf\u7684\u541e\u5410\u91cf\u3002MQTT \u5b9a\u4e49\u4e86\u4e09\u4e2a\u7b49\u7ea7\uff0c\u6211\u4eec\u53ef\u4ee5\u901a\u8fc7\u201c**\u5feb\u9012\u5305\u88f9**\u201d\u7684\u4f8b\u5b50\u6765\u901a\u4fd7\u7406\u89e3\uff1a\n\n### \u4e00\u3001 QoS 0\uff1aAt Most Once \u2014\u2014 \u6700\u591a\u4e00\u6b21\uff08\u53d1\u540e\u5373\u5fd8\uff09\n\n*   **\u5f62\u8c61\u6bd4\u55bb**\uff1a\u5c31\u50cf\u5bc4\u4e00\u5f20**\u660e\u4fe1\u7247**\u3002\u6211\u628a\u5b83\u6254\u8fdb\u90ae\u7b52\uff0c\u5c31\u4e0d\u7ba1\u4e86\u3002\u81f3\u4e8e\u5b83\u80fd\u4e0d\u80fd\u9001\u5230\u60a8\u624b\u91cc\uff0c\u4e22\u4e86\u6ca1\u6709\uff0c\u6211\u5b8c\u5168\u4e0d\u77e5\u9053\u3002\n*   **\u6d41\u7a0b**\uff1a\n    1.  \u53d1\u9001\u8005\u53d1\u9001\u6d88\u606f\u3002\n    2.  \u63a5\u6536\u8005\u6536\u5230\u6d88\u606f\uff08\u6216\u8005\u6ca1\u6536\u5230\uff09\u3002\n    3.  \u7ed3\u675f\uff0c\u6ca1\u6709\u4efb\u4f55\u53cd\u9988\u786e\u8ba4\u3002\n*   **\u7279\u70b9**\uff1a\u901f\u5ea6\u6700\u5feb\uff0c\u5f00\u9500\u6700\u5c0f\uff0c\u4f46\u53ef\u9760\u6027\u6700\u4f4e\uff0c\u53ef\u80fd\u4e22\u5305\u3002\n*   **\u5b9e\u6218\u573a\u666f**\uff1a\n    *   \u6211\u4eec\u7528\u4e8e**\u9ad8\u9891\u5fc3\u8df3\u5305**\u6216**\u975e\u5173\u952e\u7684\u73af\u5883\u6570\u636e\u4e0a\u62a5**\uff08\u5982\u6bcf 5 \u79d2\u4e0a\u62a5\u4e00\u6b21\u6e29\u6e7f\u5ea6\uff09\u3002\n    *   \u5373\u4f7f\u4e22\u4e00\u4e24\u4e2a\u5305\uff0c\u4e0b\u4e00\u79d2\u6570\u636e\u53c8\u6765\u4e86\uff0c\u5bf9\u4e1a\u52a1\u5f71\u54cd\u5fae\u4e4e\u5176\u5fae\uff0c\u6ca1\u5fc5\u8981\u4e3a\u4e86\u786e\u8ba4\u673a\u5236\u6d6a\u8d39\u5e26\u5bbd\u548c\u7b97\u529b\u3002\n\n### \u4e8c\u3001 QoS 1\uff1aAt Least Once \u2014\u2014 \u81f3\u5c11\u4e00\u6b21\uff08\u9700\u786e\u8ba4\uff09\n\n*   **\u5f62\u8c61\u6bd4\u55bb**\uff1a\u5c31\u50cf\u53d1**\u6302\u53f7\u4fe1**\u3002\u6211\u5bc4\u51fa\u5305\u88f9\uff0c\u60a8\u7b7e\u6536\u540e\uff0c\u90ae\u5c40\u4f1a\u7ed9\u6211\u56de\u6267\u3002\u5982\u679c\u6211\u6ca1\u6536\u5230\u56de\u6267\uff0c\u6211\u4f1a\u518d\u5bc4\u4e00\u6b21\u3002\n*   **\u6d41\u7a0b**\uff1a\n    1.  \u53d1\u9001\u8005\u53d1\u9001\u6d88\u606f\uff08\u6d88\u606f\u5e26\u6709 Message ID\uff09\u3002\n    2.  \u63a5\u6536\u8005\u6536\u5230\u6d88\u606f\uff0c\u56de\u590d `PUBACK` \u786e\u8ba4\u5305\u3002\n    3.  \u53d1\u9001\u8005\u6536\u5230 `PUBACK`\uff0c\u8ba4\u4e3a\u53d1\u9001\u6210\u529f\u3002\n*   **\u6f5c\u5728\u95ee\u9898**\uff1a**\u6d88\u606f\u91cd\u590d**\u3002\n    *   \u5982\u679c\u7f51\u7edc\u6296\u52a8\uff0c\u53d1\u9001\u8005\u53d1\u4e86\u6d88\u606f\uff0c\u63a5\u6536\u8005\u6536\u5230\u4e86\uff0c\u4f46\u63a5\u6536\u8005\u53d1\u56de\u7684 `PUBACK` \u5728\u8def\u4e0a\u4e22\u4e86\u3002\u53d1\u9001\u8005\u6ca1\u6536\u5230\u786e\u8ba4\uff0c\u4f1a\u89e6\u53d1\u91cd\u53d1\u3002\u7ed3\u679c\u63a5\u6536\u8005\u5c31\u6536\u5230\u4e86\u4e24\u6761\u4e00\u6837\u7684\u6d88\u606f\u3002\n*   **\u7279\u70b9**\uff1a\u4fdd\u8bc1\u6d88\u606f\u4e00\u5b9a\u5230\u8fbe\uff0c\u4f46\u53ef\u80fd\u91cd\u590d\u3002\n*   **\u5b9e\u6218\u573a\u666f**\uff1a\n    *   \u8fd9\u662f\u6211\u4eec\u5728\u4e1a\u52a1\u4e2d**\u6700\u5e38\u7528\u7684\u7b49\u7ea7**\u3002\n    *   \u6bd4\u5982**\u8bbe\u5907\u8ba2\u5355\u4e0a\u62a5**\u3001**\u5145\u7535\u72b6\u6001\u53d8\u66f4**\u3002\n    *   **\u5982\u4f55\u5904\u7406\u91cd\u590d\uff1f** \u6211\u4eec\u5728\u540e\u7aef\u4e1a\u52a1\u903b\u8f91\u4e2d\u5fc5\u987b\u505a**\u5e42\u7b49\u6027\u8bbe\u8ba1**\u3002\u6bd4\u5982\u6839\u636e\u6d88\u606f ID \u6216\u8ba2\u5355\u53f7\u53bb\u91cd\uff0c\u786e\u4fdd\u540c\u4e00\u4e2a\u8ba2\u5355\u72b6\u6001\u5373\u4f7f\u4e0a\u62a5 10 \u6b21\uff0c\u6570\u636e\u5e93\u91cc\u7684\u7ed3\u679c\u4e5f\u662f\u6b63\u786e\u7684\u3002\n\n### \u4e09\u3001 QoS 2\uff1aExactly Once \u2014\u2014 \u6070\u597d\u4e00\u6b21\uff08\u6700\u4e25\u683c\uff09\n\n*   **\u5f62\u8c61\u6bd4\u55bb**\uff1a\u5c31\u50cf**\u7279\u5feb\u4e13\u9012\u4e14\u5fc5\u987b\u672c\u4eba\u7b7e\u6536**\u3002\u6211\u5bc4\u51fa\u5305\u88f9\uff0c\u60a8\u7b7e\u6536\u540e\u544a\u8bc9\u6211\u201c\u6536\u5230\u4e86\u201d\u3002\u4e3a\u4e86\u4fdd\u9669\uff0c\u6211\u8fd8\u8981\u518d\u95ee\u60a8\u4e00\u53e5\u201c\u786e\u8ba4\u6536\u5230\u4e86\u5417\uff1f\u201d\uff0c\u60a8\u56de\u201c\u786e\u8ba4\u4e86\u201d\uff0c\u6211\u624d\u9500\u6bc1\u5e95\u5355\u3002\n*   **\u6d41\u7a0b**\uff1a\u8fd9\u662f\u4e00\u4e2a\u56db\u6b65\u63e1\u624b\u8fc7\u7a0b\uff08\u7565\u663e\u7e41\u7410\uff09\uff1a\n    1.  \u53d1\u9001\u8005\u53d1\u9001\u6d88\u606f\u3002\n    2.  \u63a5\u6536\u8005\u6536\u5230\uff0c\u56de\u590d `PUBREC`\uff08\u8868\u793a\u5df2\u6536\u5230\uff0c\u6b63\u5728\u5904\u7406\uff09\u3002\n    3.  \u53d1\u9001\u8005\u6536\u5230 `PUBREC`\uff0c\u56de\u590d `PUBREL`\uff08\u8868\u793a\u53ef\u4ee5\u91ca\u653e\u6d88\u606f\u4e86\uff09\u3002\n    4.  \u63a5\u6536\u8005\u6536\u5230 `PUBREL`\uff0c\u5904\u7406\u5b8c\u6bd5\uff0c\u56de\u590d `PUBCOMP`\uff08\u8868\u793a\u5b8c\u6210\uff09\u3002\n*   **\u7279\u70b9**\uff1a\u53ef\u9760\u6027\u6700\u9ad8\uff0c\u4fdd\u8bc1\u6d88\u606f\u4e0d\u4e22\u4e0d\u91cd\uff0c\u4f46\u5f00\u9500\u6700\u5927\uff0c\u5ef6\u8fdf\u6700\u9ad8\uff08\u56e0\u4e3a\u591a\u4e86\u4e24\u6b21\u63e1\u624b\uff09\u3002\n*   **\u5b9e\u6218\u573a\u666f**\uff1a\n    *   \u4ec5\u7528\u4e8e**\u6781\u5ea6\u5173\u952e\u3001\u65e0\u6cd5\u5bb9\u5fcd\u91cd\u590d**\u7684\u4e1a\u52a1\u3002\n    *   \u6bd4\u5982**\u8ba1\u8d39\u6263\u6b3e\u6307\u4ee4**\u3001**\u56fa\u4ef6\u5347\u7ea7\u89e6\u53d1**\u3002\u5982\u679c\u91cd\u590d\u6263\u6b3e\u6216\u91cd\u590d\u4e0b\u53d1\u5347\u7ea7\u5305\uff0c\u540e\u679c\u5f88\u4e25\u91cd\u3002\n    *   \u4f46\u5728\u5b9e\u9645\u9ad8\u5e76\u53d1\u573a\u666f\u4e0b\uff0c\u56e0\u4e3a\u5176\u6027\u80fd\u5f00\u9500\u5927\uff0c\u6211\u4eec\u901a\u5e38\u503e\u5411\u4e8e\u4f7f\u7528 QoS 1 \u914d\u5408\u4e1a\u52a1\u5c42\u7684\u5e42\u7b49\u6027\u6821\u9a8c\u6765\u66ff\u4ee3 QoS 2\u3002\n\n### \u56db\u3001 \u67b6\u6784\u5e08\u89c6\u89d2\uff1a\u5982\u4f55\u9009\u62e9\uff1f\n\n\u5728\u5c0f\u7535\u79d1\u6280\u7684\u9879\u76ee\u4e2d\uff0c\u6211\u7684\u9009\u578b\u7b56\u7565\u5982\u4e0b\uff1a\n\n| \u4e1a\u52a1\u573a\u666f | \u63a8\u8350\u7b49\u7ea7 | \u7406\u7531 |\n| :--- | :--- | :--- |\n| **\u8bbe\u5907\u5fc3\u8df3\u3001\u73af\u5883\u76d1\u6d4b** | **QoS 0** | \u4e22\u4e86\u65e0\u59a8\uff0c\u4e0b\u4e00\u79d2\u8fd8\u6709\u65b0\u7684\u6570\u636e\uff0c\u8ffd\u6c42\u9ad8\u6027\u80fd\u3002 |\n| **\u8ba2\u5355\u521b\u5efa\u3001\u72b6\u6001\u6d41\u8f6c** | **QoS 1** | \u5fc5\u987b\u5230\u8fbe\uff0c\u5141\u8bb8\u91cd\u590d\uff08\u540e\u7aef\u505a\u53bb\u91cd\uff09\uff0c\u5e73\u8861\u6027\u80fd\u4e0e\u53ef\u9760\u6027\u3002 |\n| **\u8fdc\u7a0b\u5f00\u9501\u3001\u6263\u8d39\u6307\u4ee4** | **QoS 2** \u6216 **QoS 1 + \u5e42\u7b49** | \u7edd\u4e0d\u5141\u8bb8\u91cd\u590d\u6267\u884c\uff0c\u5b89\u5168\u7b2c\u4e00\u3002 |\n\n### \u4e94\u3001 \u8fdb\u9636\uff1aQoS \u7684\u964d\u7ea7\u673a\u5236\n\n\u8fd9\u662f\u4e00\u4e2a\u5bb9\u6613\u88ab\u5ffd\u89c6\u7684\u7ec6\u8282\u3002\u5728 MQTT Broker\uff08\u5982 EMQX\uff09\u4e2d\uff0cQoS \u662f**\u5c31\u4f4e\u4e0d\u5c31\u9ad8**\u7684\u3002\n\n\u5982\u679c\u53d1\u5e03\u8005\u4ee5 QoS 2 \u53d1\u9001\u6d88\u606f\uff0c\u4f46\u8ba2\u9605\u8005\u8ba2\u9605\u65f6\u6307\u5b9a\u4e86 QoS 1\uff0c\u90a3\u4e48 Broker \u5c31\u4f1a\u964d\u7ea7\u4e3a QoS 1 \u8f6c\u53d1\u7ed9\u8ba2\u9605\u8005\u3002\u8fd9\u8981\u6c42\u6211\u4eec\u5728\u8bbe\u8ba1 Topic \u6743\u9650\u548c\u5ba2\u6237\u7aef\u914d\u7f6e\u65f6\uff0c\u5fc5\u987b\u4fdd\u6301\u4e00\u81f4\u6027\u7684\u89c4\u5212\u3002\n\n**\u603b\u7ed3**\uff1aMQTT \u7684 QoS \u673a\u5236\u7ed9\u4e86\u67b6\u6784\u5e08\u5728\u201c\u6027\u80fd\u201d\u4e0e\u201c\u53ef\u9760\u6027\u201d\u4e4b\u95f4\u6743\u8861\u7684\u6760\u6746\u3002\u7406\u89e3\u5e76\u6b63\u786e\u4f7f\u7528\u5b83\u4eec\uff0c\u662f\u6784\u5efa\u7a33\u5b9a IoT \u7cfb\u7edf\u7684\u57fa\u7840\u3002",
    "subItems": []

  "267": {
    "title": "MQTT \u548c WebSocket \u6709\u4ec0\u4e48\u533a\u522b\uff1f",
    "style": "",
    "details": "\u9762\u8bd5\u5b98\u60a8\u597d\uff0c\u8fd9\u662f\u4e00\u4e2a\u5728\u5b9e\u65f6\u901a\u4fe1\u67b6\u6784\u9009\u578b\u4e2d\u7ecf\u5e38\u88ab\u95ee\u5230\u7684\u95ee\u9898\u3002\u6211\u5728\u5c0f\u7535\u79d1\u6280\u8bbe\u8ba1\u8bbe\u5907\u63a5\u5165\u7f51\u5173\u4ee5\u53ca\u540e\u7eed\u89c4\u5212\u5ba2\u670d\u7cfb\u7edf\u65f6\uff0c\u5bf9\u8fd9\u4e24\u79cd\u6280\u672f\u90fd\u6709\u6df1\u5165\u7684\u5b9e\u6218\u548c\u5bf9\u6bd4\u601d\u8003\u3002\n\n\u5b83\u4eec\u867d\u7136\u90fd\u652f\u6301\u201c\u5b9e\u65f6\u901a\u4fe1\u201d\uff0c\u4f46**\u8bbe\u8ba1\u521d\u8877\u3001\u5e94\u7528\u573a\u666f\u548c\u6280\u672f\u7279\u6027**\u6709\u672c\u8d28\u7684\u533a\u522b\u3002\u6211\u4eec\u53ef\u4ee5\u4ece\u4ee5\u4e0b\u4e94\u4e2a\u7ef4\u5ea6\u6765\u62c6\u89e3\uff1a\n\n### \u4e00\u3001 \u6838\u5fc3\u5b9a\u4f4d\u4e0d\u540c\uff08\u6700\u6839\u672c\u7684\u533a\u522b\uff09\n\n*   **MQTT\uff08Message Queuing Telemetry Transport\uff09**\uff1a\n    *   **\u5b9a\u4f4d**\uff1a**\u4e13\u4e3a\u7269\u8054\u7f51\u8bbe\u8ba1\u7684\u8f7b\u91cf\u7ea7\u6d88\u606f\u534f\u8bae**\u3002\n    *   **\u5173\u952e\u8bcd**\uff1a\u53d1\u5e03/\u8ba2\u9605\u3001\u89e3\u8026\u3001\u4f4e\u5e26\u5bbd\u3001\u9ad8\u5ef6\u8fdf\u7f51\u7edc\u3002\n    *   **\u6838\u5fc3\u4ef7\u503c**\uff1a\u5b83\u4e0d\u4ec5\u4ec5\u662f\u4e00\u4e2a\u901a\u4fe1\u7ba1\u9053\uff0c\u66f4\u662f\u4e00\u4e2a**\u6d88\u606f\u8def\u7531\u4f53\u7cfb**\u3002\u5b83\u81ea\u5e26 Topic\uff08\u4e3b\u9898\uff09\u8def\u7531\u3001QoS\uff08\u670d\u52a1\u8d28\u91cf\uff09\u3001\u9057\u5631\u6d88\u606f\u7b49\u9ad8\u7ea7\u529f\u80fd\u3002\u5b83\u8ba9\u8bbe\u5907\u4e4b\u95f4\u3001\u8bbe\u5907\u4e0e\u5e94\u7528\u4e4b\u95f4\u6781\u5176\u89e3\u8026\u3002\n\n*   **WebSocket**\uff1a\n    *   **\u5b9a\u4f4d**\uff1a**\u5728\u5355\u4e2a TCP \u8fde\u63a5\u4e0a\u8fdb\u884c\u5168\u53cc\u5de5\u901a\u4fe1\u7684\u534f\u8bae**\u3002\n    *   **\u5173\u952e\u8bcd**\uff1a\u5168\u53cc\u5de5\u3001\u6301\u4e45\u8fde\u63a5\u3001Web \u53cb\u597d\u3002\n    *   **\u6838\u5fc3\u4ef7\u503c**\uff1a\u5b83\u89e3\u51b3\u4e86 HTTP \u65e0\u6cd5\u4e3b\u52a8\u63a8\u9001\u7684\u95ee\u9898\uff0c\u76f8\u5f53\u4e8e**\u5347\u7ea7\u7248\u7684 TCP Socket**\u3002\u5b83\u662f\u4e00\u4e2a\u7eaf\u7cb9\u7684\u201c\u7ba1\u9053\u201d\uff0c\u53ea\u8d1f\u8d23\u5168\u53cc\u5de5\u4f20\u8f93\u6570\u636e\uff0c\u4e0d\u5173\u5fc3\u6570\u636e\u5185\u5bb9\uff0c\u4e5f\u6ca1\u6709\u5185\u7f6e\u7684\u6d88\u606f\u8def\u7531\u6216 QoS \u673a\u5236\u3002\n\n### \u4e8c\u3001 \u534f\u8bae\u5c42\u6b21\u4e0e\u5f00\u9500\n\n*   **MQTT**\uff1a\n    *   \u8fd0\u884c\u5728 TCP \u4e4b\u4e0a\u3002\n    *   **\u6781\u7b80\u8bbe\u8ba1**\uff1a\u56fa\u5b9a\u5934\u90e8\u6700\u5c0f\u4ec5 **2 \u5b57\u8282**\u3002\u8fd9\u4f7f\u5176\u5728\u5e26\u5bbd\u6602\u8d35\u3001\u4fe1\u53f7\u5fae\u5f31\u7684 2G/3G \u73af\u5883\u4e0b\u4f18\u52bf\u5de8\u5927\u3002\n    *   **\u6570\u636e\u683c\u5f0f**\uff1a\u4e8c\u8fdb\u5236\u534f\u8bae\uff0c\u89e3\u6790\u6548\u7387\u6781\u9ad8\uff0c\u9002\u5408\u7b97\u529b\u6709\u9650\u7684\u5d4c\u5165\u5f0f\u8bbe\u5907\u3002\n\n*   **WebSocket**\uff1a\n    *   \u8fd0\u884c\u5728 HTTP \u4e4b\u4e0a\uff08\u901a\u8fc7 HTTP \u63e1\u624b\u5347\u7ea7\uff09\u3002\n    *   **\u5f00\u9500\u7a0d\u5927**\uff1a\u867d\u7136\u6bd4 HTTP \u8f6e\u8be2\u8f7b\u91cf\u5f97\u591a\uff0c\u4f46\u5e27\u5934\u5305\u542b\u63a9\u7801\u3001\u64cd\u4f5c\u7801\u7b49\u4fe1\u606f\uff0c\u5f00\u9500\u6bd4 MQTT \u7565\u5927\u3002\n    *   **\u6570\u636e\u683c\u5f0f**\uff1a\u652f\u6301\u6587\u672c\u548c\u4e8c\u8fdb\u5236\u3002\u5728 Web \u7aef\uff0c\u901a\u5e38\u914d\u5408 JSON \u4f7f\u7528\uff0c\u5bf9\u524d\u7aef\u5f00\u53d1\u8005\u975e\u5e38\u53cb\u597d\u3002\n\n### \u4e09\u3001 \u67b6\u6784\u6a21\u5f0f\u5bf9\u6bd4\n\n*   **MQTT\uff1a\u53d1\u5e03/\u8ba2\u9605\u6a21\u5f0f**\n    *   **\u67b6\u6784**\uff1a\u8bbe\u5907\u8fde\u63a5 Broker\uff08\u5982 EMQX\uff09\uff0c\u8ba2\u9605 Topic\u3002\n    *   **\u4f18\u52bf**\uff1a**\u5929\u7136\u7684\u89e3\u8026**\u3002\u53d1\u9001\u8005\u4e0d\u9700\u8981\u77e5\u9053\u63a5\u6536\u8005\u662f\u8c01\uff0c\u53ea\u9700\u8981\u5f80 Topic \u53d1\u6d88\u606f\u5373\u53ef\u3002Broker \u8d1f\u8d23\u8def\u7531\u3002\n    *   **\u573a\u666f**\uff1a\u4e00\u5bf9\u591a\u63a8\u9001\uff08\u5982\uff1a\u540e\u53f0\u7ed9\u6240\u6709\u8bbe\u5907\u4e0b\u53d1\u5347\u7ea7\u901a\u77e5\uff09\u3001\u8bbe\u5907\u72b6\u6001\u5e7f\u64ad\u3002\n\n*   **WebSocket\uff1a\u5ba2\u6237\u7aef/\u670d\u52a1\u5668\u6a21\u5f0f**\n    *   **\u67b6\u6784**\uff1a\u5ba2\u6237\u7aef\u4e0e\u670d\u52a1\u5668\u5efa\u7acb\u957f\u8fde\u63a5\uff0c\u76f4\u63a5\u70b9\u5bf9\u70b9\u901a\u4fe1\u3002\n    *   **\u7279\u70b9**\uff1a**\u901a\u9053\u6027\u8d28**\u3002\u670d\u52a1\u5668\u60f3\u7ed9\u5ba2\u6237\u7aef\u53d1\u6d88\u606f\uff0c\u5fc5\u987b\u6301\u6709\u8fd9\u4e2a\u8fde\u63a5\u53e5\u67c4\u3002\n    *   **\u52a3\u52bf**\uff1a\u5982\u679c\u4e1a\u52a1\u590d\u6742\uff0c\u6bd4\u5982\u201c\u7528\u6237 A \u5173\u6ce8\u4e86\u7528\u6237 B\uff0cB \u53d1\u6d88\u606f\u8981\u63a8\u7ed9 A\u201d\uff0c\u5f00\u53d1\u8005\u9700\u8981\u81ea\u5df1\u5728\u670d\u52a1\u5668\u7aef\u7f16\u5199\u590d\u6742\u7684\u8def\u7531\u903b\u8f91\u548c\u7528\u6237\u5173\u7cfb\u6620\u5c04\u3002\n\n### \u56db\u3001 \u529f\u80fd\u7279\u6027\u5bf9\u6bd4\uff08MQTT \u7684\u6740\u624b\u950f\uff09\n\n\u8fd9\u662f\u6211\u5728\u7269\u8054\u7f51\u9879\u76ee\u4e2d\u9996\u9009 MQTT \u7684\u5173\u952e\u539f\u56e0\uff1a\n\n| \u7279\u6027 | MQTT | WebSocket | \u5b9e\u6218\u5f71\u54cd |\n| :--- | :--- | :--- | :--- |\n| **QoS (\u670d\u52a1\u8d28\u91cf)** | **\u539f\u751f\u652f\u6301** (0/1/2 \u4e09\u4e2a\u7b49\u7ea7) | **\u4e0d\u652f\u6301** (\u9700\u5e94\u7528\u5c42\u81ea\u5df1\u5b9e\u73b0) | MQTT \u80fd\u4fdd\u8bc1\u5f31\u7f51\u4e0b\u7684\u6d88\u606f\u53ef\u9760\u6027\uff0cWebSocket \u4e22\u4e86\u5c31\u662f\u4e22\u4e86\u3002 |\n| **\u5fc3\u8df3\u4fdd\u6d3b** | **\u539f\u751f\u5fc3\u8df3\u673a\u5236** (Keep Alive) | \u9700\u5e94\u7528\u5c42\u81ea\u5df1\u5b9e\u73b0 Ping/Pong | MQTT \u7701\u7535\u4e14\u80fd\u5feb\u901f\u68c0\u6d4b\u65ad\u7ebf\u3002 |\n| **\u9057\u5631\u6d88\u606f** | **\u652f\u6301** (\u8bbe\u5907\u5f02\u5e38\u65ad\u7ebf\u901a\u77e5) | \u4e0d\u652f\u6301 | MQTT \u80fd\u5b9e\u73b0\u201c\u8bbe\u5907\u6389\u7ebf\u544a\u8b66\u201d\uff0cWebSocket \u9700\u8981\u989d\u5916\u7684\u4f1a\u8bdd\u7ba1\u7406\u3002 |\n| **\u6d88\u606f\u63a8\u9001** | Broker \u63a8\u9001 | \u670d\u52a1\u5668\u901a\u8fc7\u8fde\u63a5\u53e5\u67c4\u63a8 | MQTT \u5929\u7136\u652f\u6301\u79bb\u7ebf\u6d88\u606f\uff08\u6301\u4e45\u5316 Session\uff09\uff0cWebSocket \u65ad\u5f00\u540e\u6d88\u606f\u5373\u4e22\u5931\u3002 |\n\n### \u4e94\u3001 \u5e94\u7528\u573a\u666f\u9009\u578b\uff08\u6211\u7684\u5b9e\u6218\u7ecf\u9a8c\uff09\n\n\u5728\u6211\u7684\u67b6\u6784\u5b9e\u8df5\u4e2d\uff0c\u6211\u7684\u9009\u578b\u6807\u51c6\u975e\u5e38\u660e\u786e\uff1a\n\n**1. \u5fc5\u9009 MQTT \u7684\u573a\u666f\uff1a\u7269\u8054\u7f51\u8bbe\u5907\u63a5\u5165**\n*   **\u5c0f\u7535\u79d1\u6280\u9879\u76ee**\uff1a\u5145\u7535\u5b9d\u8bbe\u5907\u3001\u67dc\u673a\u7ec8\u7aef\u3002\n*   **\u7406\u7531**\uff1a\n    *   \u8bbe\u5907\u6570\u91cf\u5343\u4e07\u7ea7\uff0cMQTT \u7684\u957f\u8fde\u63a5\u7ba1\u7406\u80fd\u529b\u66f4\u5f3a\u3002\n    *   \u8bbe\u5907\u7f51\u7edc\u73af\u5883\u5dee\uff08\u5730\u4e0b\u5ba4\u3001\u7535\u68af\uff09\uff0cMQTT \u7684 QoS 0/1/2 \u80fd\u4fdd\u8bc1\u5173\u952e\u6307\u4ee4\uff08\u5982\u5f00\u7bb1\uff09\u4e0d\u4e22\u5931\u3002\n    *   \u8bbe\u5907\u4f11\u7720\u5524\u9192\u9891\u7e41\uff0cMQTT \u534f\u8bae\u66f4\u7701\u7535\u3001\u7701\u6d41\u91cf\u3002\n    *   \u9700\u8981\u8bbe\u5907\u72b6\u6001\u76d1\u63a7\uff08\u4e0a\u7ebf/\u79bb\u7ebf\uff09\uff0cMQTT \u7684\u9057\u5631\u6d88\u606f\u5f00\u7bb1\u5373\u7528\u3002\n\n**2. \u5fc5\u9009 WebSocket \u7684\u573a\u666f\uff1aWeb \u7aef\u5b9e\u65f6\u4ea4\u4e92**\n*   **\u573a\u666f**\uff1a\u7f51\u9875\u7248\u5373\u65f6\u901a\u8baf\u3001\u5728\u7ebf\u534f\u540c\u6587\u6863\u3001\u5b9e\u65f6\u6570\u636e\u5927\u5c4f\u3001Web \u7aef\u5ba2\u670d\u7cfb\u7edf\u3002\n*   **\u7406\u7531**\uff1a\n    *   \u6d4f\u89c8\u5668\u539f\u751f\u652f\u6301 WebSocket\uff0c\u517c\u5bb9\u6027\u6781\u597d\u3002\n    *   MQTT \u5728\u6d4f\u89c8\u5668\u7aef\u867d\u7136\u6709 JS \u5e93\uff08\u5982 MQTT.js\uff09\uff0c\u4f46\u9700\u8981\u901a\u8fc7 WebSocket \u5c01\u88c5\u4f20\u8f93\uff0c\u4e0d\u5982\u76f4\u63a5\u7528 WebSocket \u7b80\u5355\u76f4\u63a5\u3002\n    *   Web \u7aef\u7f51\u7edc\u73af\u5883\u76f8\u5bf9\u7a33\u5b9a\uff0c\u5e26\u5bbd\u5145\u8db3\uff0c\u4e0d\u9700\u8981 MQTT \u90a3\u4e48\u6781\u81f4\u7684\u8f7b\u91cf\u5316\u3002\n\n### \u516d\u3001 \u603b\u7ed3\u4e0e\u878d\u5408\n\n**MQTT \u662f\u4e3a\u4e86\u89e3\u51b3\u201c\u8bbe\u5907\u5728\u6076\u52a3\u7f51\u7edc\u4e0b\u53ef\u9760\u901a\u4fe1\u201d\u800c\u751f\uff0cWebSocket \u662f\u4e3a\u4e86\u89e3\u51b3\u201c\u6d4f\u89c8\u5668\u4e0e\u670d\u52a1\u5668\u5168\u53cc\u5de5\u901a\u4fe1\u201d\u800c\u751f\u3002**\n\n\u6709\u8da3\u7684\u662f\uff0c\u5728\u73b0\u4ee3\u67b6\u6784\u4e2d\uff0c\u5b83\u4eec\u7ecf\u5e38**\u878d\u5408\u4f7f\u7528**\uff1a\n\u6211\u4eec\u73b0\u5728\u7684\u67b6\u6784\u4e2d\uff0c\u8bbe\u5907\u7aef\u4f7f\u7528 **MQTT over TCP** \u8fde\u63a5 EMQX Broker\uff0c\u800c Web \u7ba1\u7406\u540e\u53f0\u4e3a\u4e86\u5b9e\u65f6\u76d1\u63a7\u8bbe\u5907\u72b6\u6001\uff0c\u4f7f\u7528 **MQTT over WebSocket** \u8fde\u63a5\u540c\u4e00\u4e2a Broker\u3002\n\n\u8fd9\u6837\uff0c\u8bbe\u5907\u53d1\u6d88\u606f\u5230 Topic\uff0cWeb \u7aef\u8ba2\u9605\u540c\u4e00\u4e2a Topic\uff0c\u5b9e\u73b0\u4e86**\u5f02\u6784\u7ec8\u7aef\u7684\u4e92\u8054\u4e92\u901a**\uff0c\u8fd9\u662f\u975e\u5e38\u7ecf\u5178\u7684\u67b6\u6784\u6a21\u5f0f\u3002",

    "title": "\u4e3a\u4ec0\u4e48 IoT \u66f4\u504f MQTT\uff1f",
    "style": "background-color: yellow;",
    "details": "\u9762\u8bd5\u5b98\u60a8\u597d\uff0c\u8fd9\u662f\u4e00\u4e2a\u975e\u5e38\u6838\u5fc3\u7684\u67b6\u6784\u9009\u578b\u95ee\u9898\u3002\u867d\u7136\u521a\u624d\u6211\u4eec\u5bf9\u6bd4\u4e86 MQTT \u548c WebSocket \u7684\u533a\u522b\uff0c\u4f46\u5982\u679c\u6df1\u5165\u5230 IoT\uff08\u7269\u8054\u7f51\uff09\u7684\u5177\u4f53\u573a\u666f\uff0c\u7279\u522b\u662f\u50cf\u6211\u4e4b\u524d\u5728\u5c0f\u7535\u79d1\u6280\u8d1f\u8d23\u7684\u5343\u4e07\u7ea7\u8bbe\u5907\u63a5\u5165\u9879\u76ee\uff0cMQTT \u51e0\u4e4e\u662f**\u552f\u4e00\u7684\u9996\u9009**\u3002\n\n\u6211\u8ba4\u4e3a IoT \u504f\u5411 MQTT\uff0c\u6839\u672c\u539f\u56e0\u5728\u4e8e IoT \u8bbe\u5907\u7684\u201c**\u4e09\u4f4e\u4e00\u9ad8**\u201d\u7279\u6027\uff1a**\u4f4e\u5e26\u5bbd\u3001\u4f4e\u529f\u8017\u3001\u4f4e\u7b97\u529b**\uff0c\u4ee5\u53ca**\u9ad8\u5ef6\u8fdf/\u9ad8\u4e0d\u7a33\u5b9a\u7f51\u7edc**\u3002\n\n\u76f8\u6bd4\u4e8e HTTP \u548c WebSocket\uff0cMQTT \u5728\u8fd9\u51e0\u4e2a\u7ef4\u5ea6\u4e0a\u5177\u6709\u538b\u5012\u6027\u7684\u4f18\u52bf\uff0c\u5177\u4f53\u4f53\u73b0\u5728\u4ee5\u4e0b\u4e94\u4e2a\u65b9\u9762\uff1a\n\n### \u4e00\u3001 \u6781\u81f4\u7684\u8f7b\u91cf\u5316\uff1a\u4e3a\u201c\u53d7\u9650\u8bbe\u5907\u201d\u800c\u751f\n\nIoT \u8bbe\u5907\u901a\u5e38\u4e0d\u662f\u9ad8\u6027\u80fd\u670d\u52a1\u5668\uff0c\u800c\u662f\u5d4c\u5165\u5f0f\u5355\u7247\u673a\uff0c\u5185\u5b58\u53ef\u80fd\u53ea\u6709\u51e0 KB\uff0c\u7f51\u7edc\u53ef\u80fd\u662f 2G/3G \u751a\u81f3 NB-IoT\u3002\n\n*   **\u534f\u8bae\u5934\u5bf9\u6bd4**\uff1a\n    *   **HTTP**\uff1a\u8bf7\u6c42\u5934\u52a8\u8f84\u51e0\u767e\u5b57\u8282\uff08Cookie\u3001User-Agent \u7b49\uff09\uff0c\u5bf9\u4e8e\u53ea\u9700\u4e0a\u62a5\u201c\u6e29\u5ea6:25\u2103\u201d\u8fd9\u79cd\u51e0\u4e2a\u5b57\u8282\u6709\u6548\u6570\u636e\u7684\u573a\u666f\uff0c\u534f\u8bae\u5f00\u9500\u5360\u6bd4\u9ad8\u8fbe 90% \u4ee5\u4e0a\uff0c\u6781\u5176\u6d6a\u8d39\u3002\n    *   **WebSocket**\uff1a\u867d\u7136\u6bd4 HTTP \u8f7b\uff0c\u4f46\u5e27\u5934\u4ecd\u6709\u51e0\u5b57\u8282\u5230\u5341\u51e0\u5b57\u8282\u7684\u5f00\u9500\uff0c\u4e14\u63e1\u624b\u9636\u6bb5\u4ecd\u9700\u4f9d\u8d56 HTTP\u3002\n    *   **MQTT**\uff1a**\u6700\u5c0f\u62a5\u6587\u5934\u4ec5 2 \u5b57\u8282**\u3002\u8fd9\u610f\u5473\u7740\u6781\u4f4e\u7684\u6d41\u91cf\u6d88\u8017\u548c\u6781\u5feb\u7684\u4f20\u8f93\u901f\u5ea6\u3002\n*   **\u5b9e\u6218\u4ef7\u503c**\uff1a\u5728\u6211\u4eec\u7684\u5145\u7535\u5b9d\u9879\u76ee\u4e2d\uff0c\u8bbe\u5907\u901a\u8fc7 2G \u6a21\u5757\u901a\u4fe1\uff0c\u6d41\u91cf\u5361\u6709\u6708\u79df\u9650\u5236\u3002MQTT \u7684\u8f7b\u91cf\u5316\u76f4\u63a5\u5e2e\u6211\u4eec\u8282\u7701\u4e86\u5de8\u989d\u7684\u6d41\u91cf\u6210\u672c\uff0c\u4e14\u4fdd\u8bc1\u4e86\u6570\u636e\u5305\u5728\u5f31\u7f51\u4e0b\u80fd\u66f4\u5feb\u5730\u201c\u6324\u201d\u8fc7\u53bb\u3002\n\n### \u4e8c\u3001 \u5b8c\u5907\u7684 QoS \u673a\u5236\uff1a\u89e3\u51b3\u201c\u5f31\u7f51\u4f20\u8f93\u201d\u75db\u70b9\n\n\u8fd9\u662f IoT \u573a\u666f\u6700\u6838\u5fc3\u7684\u75db\u70b9\u3002\u8bbe\u5907\u5728\u5730\u4e0b\u5ba4\u3001\u7535\u68af\u95f4\u3001\u91ce\u5916\uff0c\u7f51\u7edc\u6ce2\u52a8\u662f\u5e38\u6001\uff0c\u4e0d\u662f\u4f8b\u5916\u3002\n\n*   **WebSocket/HTTP**\uff1a\u57fa\u4e8e TCP\uff0c\u4fdd\u8bc1\u4e86\u6570\u636e\u6709\u5e8f\u548c\u4e0d\u4e22\uff0c\u4f46\u90a3\u662f TCP \u5c42\u9762\u7684\u3002\u5982\u679c\u5e94\u7528\u5c42\u53d1\u9001\u5931\u8d25\uff0c\u5e94\u7528\u5c42\u9700\u8981\u81ea\u5df1\u7f16\u5199\u590d\u6742\u7684\u91cd\u8bd5\u3001\u53bb\u91cd\u903b\u8f91\u3002\n*   **MQTT**\uff1a**\u534f\u8bae\u539f\u751f\u5185\u7f6e QoS 0/1/2 \u4e09\u4e2a\u7b49\u7ea7**\u3002\n    *   \u5b83\u5728\u534f\u8bae\u5c42\u9762\u5e2e\u5f00\u53d1\u8005\u89e3\u51b3\u4e86\u201c\u6d88\u606f\u81f3\u5c11\u5230\u8fbe\u4e00\u6b21\u201d\u6216\u201c\u6070\u597d\u4e00\u6b21\u201d\u7684\u95ee\u9898\u3002\n    *   \u5728\u9ad8\u5e76\u53d1\u3001\u5f31\u7f51\u73af\u5883\u4e0b\uff0c\u8fd9\u79cd**\u534f\u8bae\u7ea7\u7684\u53ef\u9760\u6027\u4fdd\u969c**\u6bd4\u6211\u4eec\u5728\u5e94\u7528\u5c42\u81ea\u5df1\u5199\u91cd\u8bd5\u673a\u5236\u8981\u9ad8\u6548\u3001\u7a33\u5b9a\u5f97\u591a\u3002\n\n### \u4e09\u3001 \u53d1\u5e03/\u8ba2\u9605\u6a21\u5f0f\uff1a\u5b9e\u73b0\u201c\u6d77\u91cf\u8bbe\u5907\u201d\u89e3\u8026\n\nIoT \u5f80\u5f80\u662f\u6d77\u91cf\u8bbe\u5907\u63a5\u5165\uff0c\u8bbe\u5907\u4e0e\u4e1a\u52a1\u7cfb\u7edf\u4e4b\u95f4\u7684\u5173\u7cfb\u975e\u5e38\u590d\u6742\uff08\u4e00\u5bf9\u591a\u3001\u591a\u5bf9\u4e00\uff09\u3002\n\n*   **\u8bf7\u6c42/\u54cd\u5e94\u6a21\u5f0f**\uff1a\u70b9\u5bf9\u70b9\u76f4\u8fde\u3002\u5982\u679c\u540e\u53f0\u8981\u7ed9 100 \u4e07\u53f0\u8bbe\u5907\u53d1\u6307\u4ee4\uff0c\u9700\u8981\u7ef4\u62a4 100 \u4e07\u4e2a\u8fde\u63a5\u53e5\u67c4\uff0c\u5e76\u53d1\u63a8\u9001\u538b\u529b\u5de8\u5927\uff0c\u4e14\u8026\u5408\u5ea6\u6781\u9ad8\u3002\n*   **MQTT \u53d1\u5e03/\u8ba2\u9605\u6a21\u5f0f**\uff1a\n    *   \u5f15\u5165 **Broker\uff08\u6d88\u606f\u4ee3\u7406\uff09** \u4f5c\u4e3a\u4e2d\u67a2\u3002\n    *   \u8bbe\u5907\u53ea\u7ba1\u5f80 Topic \u53d1\u6d88\u606f\uff0c\u4e1a\u52a1\u7cfb\u7edf\u53ea\u7ba1\u8ba2\u9605 Topic\u3002\n    *   **\u524a\u5cf0\u586b\u8c37**\uff1a\u6d77\u91cf\u8bbe\u5907\u5e76\u53d1\u4e0a\u62a5\u6570\u636e\u65f6\uff0cBroker \u53ef\u4ee5\u5148\u5806\u79ef\u6d88\u606f\uff0c\u4fdd\u62a4\u540e\u7aef\u4e1a\u52a1\u7cfb\u7edf\u4e0d\u88ab\u51b2\u57ae\uff08\u6211\u4eec\u5728\u9879\u76ee\u4e2d\u7ed3\u5408 Kafka/Flink \u8fdb\u884c\u6d88\u8d39\uff09\u3002\n    *   **\u7a7a\u95f4\u89e3\u8026**\uff1a\u8bbe\u5907\u4e0a\u7ebf\u3001\u4e0b\u7ebf\u3001\u6269\u5bb9\uff0c\u540e\u7aef\u4e1a\u52a1\u7cfb\u7edf\u5b8c\u5168\u65e0\u611f\u77e5\uff0c\u4e0d\u9700\u8981\u4fee\u6539\u914d\u7f6e\u3002\n\n### \u56db\u3001 \u4fdd\u6d3b\u4e0e\u72b6\u6001\u7ba1\u7406\uff1a\u5e94\u5bf9\u201c\u9891\u7e41\u65ad\u8fde\u201d\n\nIoT \u8bbe\u5907\u7ecf\u5e38\u4f11\u7720\u3001\u5524\u9192\uff0c\u7f51\u7edc\u72b6\u6001\u53d8\u5316\u6781\u5feb\u3002\n\n*   **WebSocket**\uff1a\u9700\u8981\u5e94\u7528\u5c42\u81ea\u5df1\u5b9e\u73b0\u5fc3\u8df3\u3002\u5982\u679c\u7f51\u7edc\u65ad\u4e86\uff0c\u670d\u52a1\u5668\u5f80\u5f80\u5f88\u96be\u7b2c\u4e00\u65f6\u95f4\u611f\u77e5\uff0c\u6216\u8005\u9700\u8981\u5f88\u4e45\u624d\u80fd\u89e6\u53d1 TCP Keep-Alive \u8d85\u65f6\u3002\n*   **MQTT**\uff1a\n    *   **\u539f\u751f\u5fc3\u8df3\u673a\u5236**\uff1a\u534f\u8bae\u8bbe\u8ba1\u3002\u5ba2\u6237\u7aef\u53d1\u9001 `PINGREQ`\uff0c\u670d\u52a1\u7aef\u56de\u590d `PINGRESP`\u3002\u8fd9\u4e0d\u4ec5\u80fd\u4fdd\u6d3b\uff0c\u8fd8\u80fd\u5feb\u901f\u68c0\u6d4b\u7f51\u7edc\u662f\u5426\u901a\u7545\u3002\n    *   **\u9057\u5631\u6d88\u606f**\uff1a\u8fd9\u662f MQTT \u7684\u201c\u6740\u624b\u950f\u201d\u3002\u8bbe\u5907\u8fde\u63a5\u65f6\u8bbe\u7f6e\u9057\u5631\uff0c\u4e00\u65e6\u8bbe\u5907\u5f02\u5e38\u65ad\u7ebf\uff0cBroker \u7acb\u523b\u5411\u4e1a\u52a1\u7cfb\u7edf\u53d1\u9001\u9057\u5631\u6d88\u606f\u3002\n    *   **\u5b9e\u6218\u573a\u666f**\uff1a\u6211\u4eec\u5229\u7528\u9057\u5631\u6d88\u606f\u5b9e\u73b0\u4e86\u6beb\u79d2\u7ea7\u7684\u201c\u8bbe\u5907\u79bb\u7ebf\u544a\u8b66\u201d\uff0c\u65e0\u9700\u518d\u5199\u5b9a\u65f6\u4efb\u52a1\u53bb\u8f6e\u8be2\u8bbe\u5907\u72b6\u6001\uff0c\u6781\u5927\u964d\u4f4e\u4e86\u7cfb\u7edf\u590d\u6742\u5ea6\u3002\n\n### \u4e94\u3001 \u7701\u7535\uff1a\u5ef6\u957f\u201c\u7535\u6c60\u5bff\u547d\u201d\n\n\u5f88\u591a IoT \u8bbe\u5907\u662f\u7535\u6c60\u4f9b\u7535\uff08\u5982\u667a\u80fd\u9501\u3001\u4f20\u611f\u5668\uff09\u3002\n\n*   **MQTT**\uff1a\u62a5\u6587\u5c0f\uff0c\u4ea4\u4e92\u5c11\uff0c\u5904\u7406\u5feb\u3002\u8bbe\u5907\u53d1\u9001\u5b8c\u6570\u636e\u53ef\u4ee5\u7acb\u523b\u8fdb\u5165\u4f4e\u529f\u8017\u4f11\u7720\u6a21\u5f0f\u3002\n*   **HTTP**\uff1a\u5efa\u7acb\u8fde\u63a5\u3001\u4f20\u8f93\u81c3\u80bf\u6570\u636e\u3001\u65ad\u5f00\u8fde\u63a5\uff0c\u6574\u4e2a\u8fc7\u7a0b\u8017\u7535\u91cf\u662f MQTT \u7684\u6570\u500d\u3002\n\n### \u603b\u7ed3\n\n**\u4e3a\u4ec0\u4e48 IoT \u66f4\u504f MQTT\uff1f**\n\n\u56e0\u4e3a\u5728\u7269\u8054\u7f51\u7684\u4e16\u754c\u91cc\uff0c\u8d44\u6e90\u662f\u7a00\u7f3a\u7684\uff08\u5e26\u5bbd\u3001\u7535\u91cf\u3001\u7b97\u529b\uff09\uff0c\u73af\u5883\u662f\u6076\u52a3\u7684\uff08\u5f31\u7f51\u3001\u6296\u52a8\uff09\u3002\n\n**MQTT \u5c31\u50cf\u662f\u4e3a\u7269\u8054\u7f51\u91cf\u8eab\u5b9a\u5236\u7684\u201c\u7279\u79cd\u90e8\u961f\u88c5\u5907\u201d**\uff0c\u5b83\u629b\u5f03\u4e86 HTTP \u7684\u81c3\u80bf\uff0c\u5f25\u8865\u4e86 WebSocket \u5728\u53ef\u9760\u6027\uff08QoS\uff09\u548c\u72b6\u6001\u7ba1\u7406\u4e0a\u7684\u7f3a\u5931\u3002\n\n\u5728\u6211\u7684\u67b6\u6784\u7ecf\u9a8c\u4e2d\uff0c\u9664\u4e86 Web \u7aef\u5e94\u7528\u5fc5\u987b\u7528 WebSocket \u5916\uff0c\u53ea\u8981\u6d89\u53ca\u5230**\u8bbe\u5907\u63a5\u5165**\uff0cMQTT \u90fd\u662f\u65e0\u53ef\u4e89\u8bae\u7684\u6807\u51c6\u534f\u8bae\u3002",
    "subItems": []

  "269": {
    "title": "\u4ec0\u4e48\u662f IO \u591a\u8def\u590d\u7528\uff1f",
    "style": "",
    "details": "\u9762\u8bd5\u5b98\u60a8\u597d\uff0c\u8fd9\u662f\u4e00\u4e2a\u975e\u5e38\u7ecf\u5178\u7684\u8ba1\u7b97\u673a\u57fa\u7840\u95ee\u9898\uff0c\u4e5f\u662f\u6211\u5728\u8fdb\u884c\u540e\u7aef\u67b6\u6784\u8bbe\u8ba1\u548c\u6027\u80fd\u4f18\u5316\u65f6\u7ecf\u5e38\u9700\u8981\u8003\u91cf\u7684\u5e95\u5c42\u539f\u7406\u3002\n\n\u8981\u7406\u89e3 **IO \u591a\u8def\u590d\u7528**\uff0c\u6211\u4eec\u9996\u5148\u5f97\u660e\u767d\u5b83\u5728\u89e3\u51b3\u4ec0\u4e48\u95ee\u9898\u3002\u5728\u4f20\u7edf\u7684\u7f51\u7edc\u7f16\u7a0b\u6a21\u578b\u4e2d\uff0c\u5982\u679c\u6211\u4eec\u9700\u8981\u540c\u65f6\u5904\u7406\u591a\u4e2a\u5ba2\u6237\u7aef\u8fde\u63a5\uff0c\u6700\u76f4\u89c2\u7684\u60f3\u6cd5\u662f\u201c\u4e00\u4e2a\u7ebf\u7a0b\u5904\u7406\u4e00\u4e2a\u8fde\u63a5\u201d\u3002\u4f46\u8fd9\u79cd\u65b9\u5f0f\u5728\u9762\u5bf9\u6d77\u91cf\u8fde\u63a5\uff08\u5982\u6211\u4eec\u5c0f\u7535\u79d1\u6280\u5343\u4e07\u7ea7\u8bbe\u5907\u63a5\u5165\uff09\u65f6\uff0c\u4f1a\u5e26\u6765\u5de8\u5927\u7684\u8d44\u6e90\u6d88\u8017\u548c\u7ebf\u7a0b\u5207\u6362\u5f00\u9500\u3002\n\n**IO \u591a\u8def\u590d\u7528**\uff0c\u7b80\u5355\u6765\u8bf4\uff0c\u5c31\u662f\u4e00\u79cd**\u201c\u7528\u4e00\u4e2a\u7ebf\u7a0b\u53bb\u76d1\u63a7\u591a\u4e2a\u8fde\u63a5\uff08Socket\uff09\u201d**\u7684\u6280\u672f\u3002\n\n\u6211\u4eec\u53ef\u4ee5\u7528\u4e00\u4e2a\u751f\u52a8\u7684\u4f8b\u5b50\u6765\u89e3\u91ca\uff1a\n\n### \u4e00\u3001 \u751f\u6d3b\u5316\u6bd4\u55bb\uff1a\u6536\u53d1\u5ba4\u5927\u7237\u7684\u6545\u4e8b\n\n\u5047\u8bbe\u60a8\u662f\u670d\u52a1\u5668\uff0c\u95e8\u53e3\u6709 100 \u4e2a\u4fe1\u7bb1\uff08\u4ee3\u8868 100 \u4e2a\u7f51\u7edc\u8fde\u63a5\uff09\uff0c\u60a8\u9700\u8981\u5904\u7406\u4fe1\u4ef6\uff08IO \u4e8b\u4ef6\uff09\u3002\n\n**1. \u963b\u585e IO\uff08BIO\uff09\u6a21\u578b\uff1a**\n*   **\u505a\u6cd5**\uff1a\u60a8\u6d3e 100 \u4e2a\u7ba1\u7406\u5458\u53bb\uff0c\u6bcf\u4e2a\u4eba\u76ef\u7740\u4e00\u4e2a\u4fe1\u7bb1\u3002\u5982\u679c\u4fe1\u7bb1\u662f\u7a7a\u7684\uff0c\u7ba1\u7406\u5458\u5c31\u50bb\u50bb\u5730\u7ad9\u5728\u90a3\u91cc\u7b49\uff08\u963b\u585e\uff09\uff0c\u76f4\u5230\u6709\u4fe1\u6765\u3002\n*   **\u95ee\u9898**\uff1a\u5982\u679c\u6709\u4e00\u4e07\u4e2a\u8fde\u63a5\uff0c\u60a8\u5c31\u5f97\u6d3e\u4e00\u4e07\u4eba\u3002\u8fd9\u4f1a\u5bfc\u81f4\u7cfb\u7edf\u8d44\u6e90\u8017\u5c3d\uff08\u7ebf\u7a0b\u7206\u70b8\uff09\u3002\n\n**2. \u975e\u963b\u585e IO\uff08NIO\uff09\u8f6e\u8be2\u6a21\u578b\uff1a**\n*   **\u505a\u6cd5**\uff1a\u60a8\u53ea\u6d3e 1 \u4e2a\u7ba1\u7406\u5458\u3002\u4ed6\u6bcf\u9694 5 \u5206\u949f\u5c31\u53bb\u628a 100 \u4e2a\u4fe1\u7bb1\u770b\u4e00\u904d\uff0c\u95ee\u201c\u6709\u4fe1\u5417\uff1f\u201d\u3002\u5982\u679c\u6ca1\u6709\uff0c\u5c31\u8fc7 5 \u5206\u949f\u518d\u6765\u95ee\u3002\n*   **\u95ee\u9898**\uff1a\u867d\u7136\u7ebf\u7a0b\u5c11\u4e86\uff0c\u4f46\u5982\u679c\u5927\u90e8\u5206\u4fe1\u7bb1\u90fd\u662f\u7a7a\u7684\uff0c\u7ba1\u7406\u5458\u4e00\u76f4\u5728\u505a\u65e0\u7528\u529f\uff08CPU \u7a7a\u8f6c\uff09\uff0c\u6548\u7387\u6781\u4f4e\u3002\n\n**3. IO \u591a\u8def\u590d\u7528\uff08\u6211\u4eec\u8981\u8bb2\u7684\u4e3b\u89d2\uff09\uff1a**\n*   **\u505a\u6cd5**\uff1a\u60a8\u53ea\u6d3e 1 \u4e2a\u7ba1\u7406\u5458\u3002\u4f46\u4ed6\u4e0d\u518d\u6328\u4e2a\u53bb\u95ee\uff0c\u800c\u662f\u5750\u5728\u6536\u53d1\u5ba4\u91cc\u3002\u60a8\u544a\u8bc9\u4fe1\u7bb1\uff1a\u201c\u4e00\u65e6\u6709\u4fe1\u6765\u4e86\uff0c\u5c31\u628a\u4fe1\u7bb1\u4e0a\u7684\u7ea2\u706f\u4eae\u4e00\u4e0b\u201d\u3002\n*   **\u7ed3\u679c**\uff1a\u7ba1\u7406\u5458\u53ea\u9700\u8981\u76ef\u7740**\u4fe1\u53f7\u706f\u9762\u677f**\uff08\u8fd9\u5c31\u662f\u201c\u591a\u8def\u590d\u7528\u5668\u201d\uff09\u3002\u4e00\u65e6 3 \u53f7\u548c 5 \u53f7\u706f\u4eae\u4e86\uff0c\u4ed6\u5c31\u77e5\u9053\u8fd9\u4e24\u4e2a\u4fe1\u7bb1\u6709\u6570\u636e\u4e86\uff0c\u76f4\u63a5\u53bb\u5904\u7406\u3002\n*   **\u6838\u5fc3\u4f18\u52bf**\uff1a\u4e00\u4e2a\u7ebf\u7a0b\u5c31\u80fd\u9ad8\u6548\u5730\u7ba1\u7406\u6210\u5343\u4e0a\u4e07\u4e2a\u8fde\u63a5\uff0c\u4e14\u53ea\u5728\u6709\u6570\u636e\u771f\u6b63\u5230\u8fbe\u65f6\u624d\u53bb\u5904\u7406\uff0c\u6ca1\u6709\u65e0\u6548\u7684\u8f6e\u8be2\u3002\n\n---\n\n### \u4e8c\u3001 \u6280\u672f\u5c42\u9762\u7684\u6df1\u5ea6\u89e3\u6790\n\n\u5728 Linux \u7cfb\u7edf\u4e0b\uff0cIO \u591a\u8def\u590d\u7528\u7684\u5b9e\u73b0\u4e3b\u8981\u4f9d\u9760\u7cfb\u7edf\u8c03\u7528\uff0c\u7ecf\u5386\u4e86\u4e09\u4e2a\u9636\u6bb5\u7684\u6f14\u8fdb\uff1a\n\n#### 1. select\uff08\u65e9\u671f\u7248\u672c\uff09\n*   **\u539f\u7406**\uff1a\u628a\u6240\u6709\u8fde\u63a5\u7684\u6587\u4ef6\u63cf\u8ff0\u7b26\uff08FD\uff09\u62f7\u8d1d\u5230\u5185\u6838\uff0c\u5185\u6838\u904d\u5386\u4e00\u904d\uff0c\u544a\u8bc9\u5e94\u7528\u7a0b\u5e8f\u54ea\u4e9b FD \u6709\u4e8b\u4ef6\u3002\n*   **\u7f3a\u70b9**\uff1a\n    *   **\u6548\u7387\u4f4e**\uff1a\u6bcf\u6b21\u8c03\u7528\u90fd\u8981\u628a FD \u96c6\u5408\u4ece\u7528\u6237\u6001\u62f7\u8d1d\u5230\u5185\u6838\u6001\u3002\n    *   **\u6709\u4e0a\u9650**\uff1a\u9ed8\u8ba4\u6700\u5927\u652f\u6301 1024 \u4e2a\u8fde\u63a5\u3002\n    *   **O(N) \u590d\u6742\u5ea6**\uff1a\u5185\u6838\u904d\u5386\u6240\u6709 FD\uff0c\u8fde\u63a5\u8d8a\u591a\u8d8a\u6162\u3002\n\n#### 2. poll\uff08\u6539\u8fdb\u7248\uff09\n*   **\u539f\u7406**\uff1a\u548c select \u7c7b\u4f3c\uff0c\u4f46\u6539\u7528\u94fe\u8868\u5b58\u50a8 FD\uff0c\u7a81\u7834\u4e86 1024 \u7684\u8fde\u63a5\u6570\u9650\u5236\u3002\n*   **\u7f3a\u70b9**\uff1a\u4f9d\u7136\u6ca1\u6709\u89e3\u51b3\u201c\u5185\u6838\u9700\u8981\u904d\u5386\u6240\u6709 FD\u201d\u548c\u201c\u6570\u636e\u62f7\u8d1d\u201d\u7684\u6027\u80fd\u74f6\u9888\u3002\n\n#### 3. epoll\uff08\u7ec8\u6781\u89e3\u51b3\u65b9\u6848\uff0cJava NIO\u3001Nginx\u3001Netty \u5e95\u5c42\u6838\u5fc3\uff09\n\u8fd9\u662f\u76ee\u524d\u9ad8\u6027\u80fd\u670d\u52a1\u5668\uff08\u5982 Redis\u3001Nginx\uff09\u6807\u914d\u7684\u6280\u672f\u3002\u5b83\u5f7b\u5e95\u89e3\u51b3\u4e86 select/poll \u7684\u75db\u70b9\u3002\n\n*   **\u4e09\u5927\u6838\u5fc3\u4f18\u5316**\uff1a\n    1.  **\u4e8b\u4ef6\u9a71\u52a8\uff08\u4e2d\u65ad\u6a21\u5f0f\uff09**\uff1a\u4e0d\u518d\u7531\u5185\u6838\u904d\u5386\u6240\u6709\u8fde\u63a5\uff0c\u800c\u662f\u57fa\u4e8e**\u56de\u8c03**\u3002\u54ea\u4e2a\u8fde\u63a5\u6709\u6570\u636e\u6765\u4e86\uff0c\u786c\u4ef6\u4e2d\u65ad\u89e6\u53d1\u5185\u6838\uff0c\u5185\u6838\u76f4\u63a5\u628a\u8fd9\u4e2a\u8fde\u63a5\u52a0\u5165\u201c\u5c31\u7eea\u94fe\u8868\u201d\u3002\u6548\u7387\u4ece O(N) \u53d8\u6210\u4e86 O(1)\u3002\n    2.  **mmap \u5185\u5b58\u5171\u4eab**\uff1a\u901a\u8fc7 mmap \u8ba9\u7528\u6237\u6001\u548c\u5185\u6838\u6001\u5171\u4eab\u540c\u4e00\u5757\u5185\u5b58\uff0c\u907f\u514d\u4e86 FD \u96c6\u5408\u5728\u7528\u6237\u6001\u548c\u5185\u6838\u6001\u4e4b\u95f4\u7684\u53cd\u590d\u62f7\u8d1d\u3002\n    3.  **\u9ad8\u6548 API**\uff1a\n        *   `epoll_create`\uff1a\u521b\u5efa\u5b9e\u4f8b\u3002\n        *   `epoll_ctl`\uff1a\u6ce8\u518c\u8981\u76d1\u542c\u7684\u4e8b\u4ef6\uff08\u589e\u5220\u6539\uff09\u3002\n        *   `epoll_wait`\uff1a\u7b49\u5f85\u4e8b\u4ef6\u53d1\u751f\uff08\u53ea\u8fd4\u56de\u6709\u6570\u636e\u7684\u8fde\u63a5\uff09\u3002\n\n---\n\n### \u4e09\u3001 \u4e3a\u4ec0\u4e48\u6211\u5728\u9879\u76ee\u4e2d\u8fd9\u6837\u770b\u91cd\u5b83\uff1f\n\n\u5728\u5c0f\u7535\u79d1\u6280\u7684\u8bbe\u5907\u63a5\u5165\u67b6\u6784\u4e2d\uff0c\u6211\u4eec\u4f7f\u7528\u4e86 **Netty** \u4f5c\u4e3a\u901a\u4fe1\u6846\u67b6\uff0c\u800c Netty \u5e95\u5c42\u6b63\u662f\u57fa\u4e8e **Linux epoll** \u5b9e\u73b0\u7684 IO \u591a\u8def\u590d\u7528\u3002\n\n**\u5b9e\u6218\u4ef7\u503c\uff1a**\n\n1.  **\u652f\u6491\u6d77\u91cf\u8fde\u63a5**\uff1a\u6211\u4eec\u7684\u670d\u52a1\u5668\u53ef\u80fd\u540c\u65f6\u7ef4\u6301\u6570\u5341\u4e07\u4e2a TCP \u957f\u8fde\u63a5\uff08\u8bbe\u5907\u5fc3\u8df3\u4fdd\u6d3b\uff09\u3002\u5982\u679c\u7528\u4f20\u7edf\u7684\u201c\u4e00\u8fde\u63a5\u4e00\u7ebf\u7a0b\u201d\u6a21\u578b\uff0c\u670d\u52a1\u5668\u5185\u5b58\u65e9\u5c31\u7206\u4e86\u3002\u5229\u7528 IO \u591a\u8def\u590d\u7528\uff0c\u5c11\u91cf\u7684\u4e1a\u52a1\u7ebf\u7a0b\uff08\u6bd4\u5982 CPU \u6838\u5fc3\u6570\u7684 2 \u500d\uff09\u5c31\u80fd\u8f7b\u677e\u9a7e\u9a6d\u8fd9\u4e9b\u8fde\u63a5\u3002\n2.  **\u964d\u4f4e CPU \u6d88\u8017**\uff1a\u5728\u6ca1\u6709\u6570\u636e\u4f20\u8f93\u65f6\uff0c\u7ebf\u7a0b\u4e0d\u4f1a\u5fd9\u8f6e\u8be2\uff0cCPU \u5360\u7528\u7387\u6781\u4f4e\u3002\u4e00\u65e6\u8bbe\u5907\u4e0a\u62a5\u8ba2\u5355\u6570\u636e\uff0cepoll \u7acb\u5373\u5524\u9192\u7ebf\u7a0b\u5904\u7406\uff0c\u4fdd\u8bc1\u4e86\u7cfb\u7edf\u7684\u9ad8\u541e\u5410\u548c\u4f4e\u5ef6\u8fdf\u3002\n\n**\u603b\u7ed3**\uff1a\nIO \u591a\u8def\u590d\u7528\u662f\u4e00\u79cd**\u201c\u4ee5\u4e00\u654c\u767e\u201d**\u7684\u673a\u5236\u3002\u5b83\u901a\u8fc7\u5185\u6838\u7ea7\u522b\u7684\u76d1\u63a7\u673a\u5236\uff08\u5982 epoll\uff09\uff0c\u8ba9\u5355\u4e2a\u7ebf\u7a0b\u80fd\u591f\u9ad8\u6548\u5730\u5e76\u53d1\u5904\u7406\u6d77\u91cf\u7f51\u7edc\u8fde\u63a5\uff0c\u662f\u6784\u5efa\u73b0\u4ee3\u9ad8\u5e76\u53d1\u670d\u52a1\u5668\uff08\u5982\u7f51\u5173\u3001\u6d88\u606f\u4e2d\u95f4\u4ef6\uff09\u7684\u57fa\u77f3\u3002",

    "style": "background-color: yellow;",
    "details": "\u9762\u8bd5\u5b98\u60a8\u597d\uff0c\u8fd9\u662f\u6df1\u5165\u7406\u89e3 Linux \u7f51\u7edc IO \u6a21\u578b\u7684\u6838\u5fc3\u95ee\u9898\uff0c\u4e5f\u662f\u6211\u5728\u8fdb\u884c\u6280\u672f\u9009\u578b\uff08\u6bd4\u5982\u4e3a\u4f55\u9009\u62e9 Netty \u4f5c\u4e3a\u901a\u4fe1\u6846\u67b6\uff09\u65f6\u7684\u5e95\u5c42\u4f9d\u636e\u3002\n\n\u8fd9\u4e09\u8005\u90fd\u662f Linux \u4e0b\u5b9e\u73b0 IO \u591a\u8def\u590d\u7528\u7684\u7cfb\u7edf\u8c03\u7528\uff0c\u4f46\u5b83\u4eec\u7684\u5b9e\u73b0\u673a\u5236\u548c\u6027\u80fd\u8868\u73b0\u6709\u7740\u5929\u58e4\u4e4b\u522b\u3002\u6211\u4eec\u53ef\u4ee5\u4ece**\u8fde\u63a5\u6570\u9650\u5236\u3001\u5e95\u5c42\u673a\u5236\u3001\u6027\u80fd\u74f6\u9888**\u4e09\u4e2a\u7ef4\u5ea6\u6765\u6df1\u5ea6\u5bf9\u6bd4\uff1a\n\n### \u4e00\u3001 \u6838\u5fc3\u533a\u522b\u603b\u7ed3\u8868\n\n| \u7ef4\u5ea6 | select | poll | epoll (\u76ee\u524d\u9ad8\u6027\u80fd\u6807\u51c6) |\n| :--- | :--- | :--- | :--- |\n| **\u8fde\u63a5\u6570\u9650\u5236** | \u6709\u4e0a\u9650\uff08\u9ed8\u8ba4 1024\uff0c\u53ef\u6539\u4f46\u6709\u9650\uff09 | \u65e0\u4e0a\u9650\uff08\u57fa\u4e8e\u94fe\u8868\uff09 | \u65e0\u4e0a\u9650\uff08\u57fa\u4e8e\u7ea2\u9ed1\u6811\uff09 |\n| **\u6570\u636e\u7ed3\u6784** | \u4f4d\u56fe | \u6570\u7ec4/\u94fe\u8868 | **\u7ea2\u9ed1\u6811** + **\u5c31\u7eea\u94fe\u8868** |\n| **\u5de5\u4f5c\u6a21\u5f0f** | \u6c34\u5e73\u89e6\u53d1 | \u6c34\u5e73\u89e6\u53d1 | **\u8fb9\u7f18\u89e6\u53d1 (ET)** + \u6c34\u5e73\u89e6\u53d1 (LT) |\n| **\u5185\u6838\u62f7\u8d1d** | \u6bcf\u6b21\u8c03\u7528\u5168\u91cf\u62f7\u8d1d | \u6bcf\u6b21\u8c03\u7528\u5168\u91cf\u62f7\u8d1d | **\u5171\u4eab\u5185\u5b58**\uff0c\u53ea\u4f20\u53e5\u67c4 |\n| **\u67e5\u627e\u6548\u7387** | O(N) \u904d\u5386 | O(N) \u904d\u5386 | **O(1)** \u4e8b\u4ef6\u56de\u8c03 |\n\n---\n\n### \u4e8c\u3001 \u6df1\u5ea6\u89e3\u6790\n\n#### 1. select\uff1a\u6700\u65e9\u7684\u65b9\u6848\uff0c\u7f3a\u9677\u660e\u663e\n*   **\u539f\u7406**\uff1a\u901a\u8fc7 `fd_set`\uff08\u4f4d\u56fe\uff09\u5b58\u50a8\u6587\u4ef6\u63cf\u8ff0\u7b26\u3002\u8c03\u7528 `select` \u65f6\uff0c\u628a\u6574\u4e2a `fd_set` \u4ece\u7528\u6237\u6001\u62f7\u8d1d\u5230\u5185\u6838\u6001\uff0c\u5185\u6838\u904d\u5386\u6240\u6709 FD\uff0c\u6807\u8bb0\u54ea\u4e9b\u6709\u4e8b\u4ef6\uff0c\u7136\u540e\u518d\u62f7\u8d1d\u56de\u7528\u6237\u6001\u3002\n*   **\u4e09\u5927\u75db\u70b9**\uff1a\n    1.  **\u8fde\u63a5\u6570\u53d7\u9650**\uff1a`fd_set` \u7684\u5927\u5c0f\u7531 `FD_SETSIZE` \u5b8f\u5b9a\u4e49\uff0c\u9ed8\u8ba4 1024\u3002\u8fd9\u5bf9\u4e8e\u6211\u4eec\u8981\u652f\u6491\u5343\u4e07\u7ea7\u8bbe\u5907\u7684\u957f\u8fde\u63a5\u7f51\u5173\u6765\u8bf4\uff0c\u5b8c\u5168\u4e0d\u53ef\u63a5\u53d7\u3002\n    2.  **\u91cd\u590d\u62f7\u8d1d\u5f00\u9500**\uff1a\u6bcf\u6b21\u8c03\u7528 `select`\uff0c\u90fd\u8981\u628a\u6240\u6709\u8fde\u63a5\u7684\u4fe1\u606f\u5728\u7528\u6237\u6001\u548c\u5185\u6838\u6001\u4e4b\u95f4\u642c\u8fd0\u4e00\u904d\u3002\u5982\u679c\u6709\u4e00\u4e07\u4e2a\u8fde\u63a5\uff0c\u5373\u4f7f\u53ea\u6709\u4e00\u4e2a\u8fde\u63a5\u6709\u6570\u636e\uff0c\u4e5f\u8981\u642c\u8fd0\u4e00\u4e07\u6761\u6570\u636e\u3002\n    3.  **O(N) \u904d\u5386\u5f00\u9500**\uff1a\u5185\u6838\u548c\u7528\u6237\u7a0b\u5e8f\u90fd\u9700\u8981\u904d\u5386\u6574\u4e2a\u96c6\u5408\u624d\u80fd\u627e\u5230\u54ea\u4e2a\u8fde\u63a5\u6709\u6570\u636e\u3002\n\n#### 2. poll\uff1aselect \u7684\u7b80\u5355\u6539\u8fdb\u7248\n*   **\u6539\u8fdb\u70b9**\uff1a\u6539\u7528 `pollfd` \u94fe\u8868\u7ed3\u6784\uff0c\u89e3\u51b3\u4e86 select \u7684\u8fde\u63a5\u6570\u9650\u5236\u95ee\u9898\u3002\n*   **\u672c\u8d28\u7f3a\u9677**\uff1a\u5b83\u4f9d\u7136\u6ca1\u6709\u89e3\u51b3 select \u7684\u6838\u5fc3\u75db\u70b9\u2014\u2014**\u201c\u5168\u91cf\u904d\u5386\u201d\u548c\u201c\u5168\u91cf\u62f7\u8d1d\u201d**\u3002\u968f\u7740\u8fde\u63a5\u6570 C \u7684\u589e\u52a0\uff0c\u6027\u80fd\u7ebf\u6027\u4e0b\u964d\u3002\u5728 C10K\uff08\u4e07\u7ea7\u5e76\u53d1\uff09\u95ee\u9898\u9762\u524d\uff0cpoll \u4e5f\u65e0\u80fd\u4e3a\u529b\u3002\n\n#### 3. epoll\uff1a\u7ec8\u6781\u89e3\u51b3\u65b9\u6848\uff08Java NIO\u3001Nginx\u3001Redis \u5e95\u5c42\uff09\nepoll \u5f15\u5165\u4e86\u5168\u65b0\u7684\u8bbe\u8ba1\u7406\u5ff5\uff0c\u5f7b\u5e95\u89e3\u51b3\u4e86\u6027\u80fd\u74f6\u9888\u3002\u5b83\u4e3b\u8981\u7531\u4e09\u4e2a\u7cfb\u7edf\u8c03\u7528\u7ec4\u6210\uff1a`epoll_create`\uff08\u521b\u5efa\u5b9e\u4f8b\uff09\u3001`epoll_ctl`\uff08\u6ce8\u518c\u4e8b\u4ef6\uff09\u3001`epoll_wait`\uff08\u7b49\u5f85\u4e8b\u4ef6\uff09\u3002\n\n**epoll \u7684\u4e09\u5927\u6740\u624b\u950f\uff1a**\n\n**\uff081\uff09\u6570\u636e\u7ed3\u6784\u5347\u7ea7\uff1a\u7ea2\u9ed1\u6811**\n*   select/poll \u7528\u7ebf\u6027\u7ed3\u6784\u5b58\u50a8\u8fde\u63a5\uff0c\u67e5\u627e\u6162\u3002\n*   epoll \u5728\u5185\u6838\u7ef4\u62a4\u4e86\u4e00\u68f5**\u7ea2\u9ed1\u6811**\u6765\u5b58\u50a8\u6240\u6709\u76d1\u63a7\u7684 Socket \u8fde\u63a5\u3002\n*   **\u4f18\u52bf**\uff1a\u63d2\u5165\u3001\u5220\u9664\u3001\u67e5\u627e\u7684\u65f6\u95f4\u590d\u6742\u5ea6\u90fd\u662f O(log N)\uff0c\u6781\u5176\u9ad8\u6548\u3002\n\n**\uff082\uff09\u673a\u5236\u5347\u7ea7\uff1a\u4e8b\u4ef6\u9a71\u52a8\uff08\u56de\u8c03\uff09**\n*   \u8fd9\u662f\u6700\u5927\u7684\u533a\u522b\u3002\n*   select/poll \u662f\u201c\u4e3b\u52a8\u8f6e\u8be2\u201d\uff1a\u5185\u6838\u50bb\u50bb\u5730\u904d\u5386\u6240\u6709\u8fde\u63a5\u95ee\u201c\u4f60\u6709\u4e8b\u5417\uff1f\u201d\u3002\n*   epoll \u662f\u201c\u88ab\u52a8\u901a\u77e5\u201d\uff1a\u5f53\u67d0\u4e2a Socket \u6709\u6570\u636e\u5230\u8fbe\u65f6\uff0c\u7f51\u5361\u4e2d\u65ad\u89e6\u53d1\u5185\u6838\uff0c\u5185\u6838\u901a\u8fc7**\u56de\u8c03\u51fd\u6570**\uff0c\u76f4\u63a5\u628a\u8fd9\u4e2a Socket \u52a0\u5165\u5230**\u201c\u5c31\u7eea\u94fe\u8868\u201d**\u4e2d\u3002\n*   **\u4f18\u52bf**\uff1a\u4e0d\u7ba1\u4f60\u76d1\u63a7\u4e86\u591a\u5c11\u8fde\u63a5\uff08\u6bd4\u5982 100 \u4e07\uff09\uff0c\u53ea\u6709\u771f\u6b63\u6709\u6570\u636e\u7684\u90a3\u51e0\u4e2a\u8fde\u63a5\u624d\u4f1a\u89e6\u53d1\u56de\u8c03\u3002`epoll_wait` \u53ea\u9700\u8981\u4ece\u5c31\u7eea\u94fe\u8868\u91cc\u53d6\u6570\u636e\u5373\u53ef\uff0c\u6548\u7387\u662f **O(1)**\u3002\n\n**\uff083\uff09\u5185\u5b58\u4f18\u5316\uff1ammap \u5171\u4eab\u5185\u5b58**\n*   select/poll \u6bcf\u6b21\u90fd\u8981\u628a FD \u96c6\u5408\u4ece\u7528\u6237\u6001\u62f7\u8d1d\u5230\u5185\u6838\u6001\u3002\n*   epoll \u901a\u8fc7 `mmap` \u5728\u7528\u6237\u6001\u548c\u5185\u6838\u6001\u4e4b\u95f4\u5efa\u7acb\u4e86\u4e00\u5757\u5171\u4eab\u5185\u5b58\u533a\u57df\u3002\n*   **\u4f18\u52bf**\uff1a\u907f\u514d\u4e86\u5927\u91cf\u7684\u5185\u5b58\u62f7\u8d1d\u5f00\u9500\uff0c\u8fdb\u4e00\u6b65\u964d\u4f4e\u4e86 CPU \u6d88\u8017\u3002\n\n---\n\n### \u4e09\u3001 \u6df1\u5ea6\u8865\u5145\uff1aLT\uff08\u6c34\u5e73\u89e6\u53d1\uff09\u4e0e ET\uff08\u8fb9\u7f18\u89e6\u53d1\uff09\n\n\u8fd9\u662f epoll \u652f\u6301\u7684\u4e24\u79cd\u5de5\u4f5c\u6a21\u5f0f\uff0c\u4e5f\u662f\u9762\u8bd5\u4e2d\u7684\u52a0\u5206\u9879\uff1a\n\n*   **LT (Level Triggered\uff0c\u6c34\u5e73\u89e6\u53d1)**\uff1a\n    *   **\u903b\u8f91**\uff1a\u53ea\u8981\u7f13\u51b2\u533a\u91cc\u8fd8\u6709\u6570\u636e\uff0c`epoll_wait` \u5c31\u4f1a\u4e00\u76f4\u901a\u77e5\u4f60\u3002\n    *   **\u7279\u70b9**\uff1a\u5b89\u5168\uff0c\u4e0d\u5bb9\u6613\u4e22\u6570\u636e\uff0c\u652f\u6301\u963b\u585e IO\u3002\u8fd9\u662f epoll \u7684\u9ed8\u8ba4\u6a21\u5f0f\uff0c\u4e5f\u662f select/poll \u552f\u4e00\u7684\u6a21\u5f0f\u3002\n*   **ET (Edge Triggered\uff0c\u8fb9\u7f18\u89e6\u53d1)**\uff1a\n    *   **\u903b\u8f91**\uff1a\u53ea\u6709\u5f53\u72b6\u6001\u53d1\u751f\u53d8\u5316\uff08\u4ece\u65e0\u6570\u636e\u53d8\u6709\u6570\u636e\uff09\u7684\u90a3\u4e00\u77ac\u95f4\uff0c\u624d\u4f1a\u901a\u77e5\u4f60\u4e00\u6b21\u3002\n    *   **\u7279\u70b9**\uff1a\u6548\u7387\u6781\u9ad8\uff0c\u51cf\u5c11\u4e86\u7cfb\u7edf\u8c03\u7528\u6b21\u6570\u3002\u4f46\u8981\u6c42\u5f00\u53d1\u8005\u5fc5\u987b\u4e00\u6b21\u6027\u628a\u7f13\u51b2\u533a\u6570\u636e\u8bfb\u5b8c\uff08\u901a\u5e38\u914d\u5408\u975e\u963b\u585e IO \u4f7f\u7528\uff09\uff0c\u5426\u5219\u6570\u636e\u5c31\u4f1a\u201c\u70c2\u201d\u5728\u7f13\u51b2\u533a\u91cc\uff0c\u4e0b\u6b21\u4e0d\u4f1a\u518d\u901a\u77e5\u3002\n    *   **\u5b9e\u6218**\uff1aNginx \u548c Redis \u90fd\u91c7\u7528\u4e86 ET \u6a21\u5f0f\uff0c\u8fd9\u4e5f\u662f\u5b83\u4eec\u80fd\u652f\u6491\u6781\u9ad8\u5e76\u53d1\u7684\u79d8\u8bc0\u4e4b\u4e00\u3002\n\n### \u56db\u3001 \u5b9e\u6218\u603b\u7ed3\n\n\u5728\u6211\u7684\u67b6\u6784\u7ecf\u9a8c\u4e2d\uff1a\n\n1.  **select**\uff1a\u4ec5\u9002\u7528\u4e8e\u8fde\u63a5\u6570\u5f88\u5c11\u4e14\u56fa\u5b9a\u7684\u573a\u666f\uff08\u6bd4\u5982\u67d0\u4e9b\u7b80\u5355\u7684\u5d4c\u5165\u5f0f\u7f51\u5173\uff09\u3002\n2.  **poll**\uff1a\u57fa\u672c\u5df2\u88ab\u6dd8\u6c70\uff0c\u6ca1\u6709\u660e\u663e\u4f18\u52bf\u3002\n3.  **epoll**\uff1a\u662f\u6784\u5efa**\u9ad8\u5e76\u53d1\u670d\u52a1\u5668**\u7684\u552f\u4e00\u9009\u62e9\u3002\n\n\u5728\u5c0f\u7535\u79d1\u6280\u7684\u8bbe\u5907\u63a5\u5165\u7f51\u5173\u67b6\u6784\u4e2d\uff0c\u6211\u4eec\u4f7f\u7528 Java \u7684 **Netty** \u6846\u67b6\uff0c\u5176\u5e95\u5c42\u5728 Linux \u73af\u5883\u4e0b\u5c31\u662f\u81ea\u52a8\u4f7f\u7528 **epoll**\u3002\u8fd9\u8ba9\u6211\u4eec\u80fd\u591f\u7528\u5c11\u91cf\u7684\u7ebf\u7a0b\u8d44\u6e90\uff0c\u7a33\u5b9a\u652f\u6491\u6d77\u91cf\u8bbe\u5907\u7684\u5e76\u53d1\u5fc3\u8df3\u548c\u6570\u636e\u4e0a\u62a5\uff0c\u5f7b\u5e95\u907f\u514d\u4e86\u4f20\u7edf IO \u6a21\u578b\u5728\u8fde\u63a5\u6570\u7206\u70b8\u65f6\u7684\u6027\u80fd\u96ea\u5d29\u3002",

    "title": "ByteBuf \u4e3a\u4ec0\u4e48\u6bd4 ByteBuffer \u597d\uff1f",
    "style": "",
    "details": "\u9762\u8bd5\u5b98\u60a8\u597d\uff0c\u8fd9\u662f\u4e00\u4e2a\u975e\u5e38\u7ecf\u5178\u4e14\u5177\u6709\u5b9e\u6218\u610f\u4e49\u7684\u95ee\u9898\u3002\u6211\u5728\u5c0f\u7535\u79d1\u6280\u8d1f\u8d23 Netty \u76f8\u5173\u7684\u7f51\u5173\u5f00\u53d1\u65f6\uff0c\u5bf9\u8fd9\u4e00\u70b9\u6df1\u6709\u4f53\u4f1a\u3002\n\n\u7b80\u5355\u6765\u8bf4\uff0c**ByteBuffer \u662f JDK \u539f\u751f\u7684\u201c\u7b80\u964b\u5de5\u5177\u201d\uff0c\u800c ByteBuf \u662f Netty \u4e13\u95e8\u4e3a\u9ad8\u6027\u80fd\u7f51\u7edc\u7f16\u7a0b\u91cf\u8eab\u5b9a\u5236\u7684\u201c\u745e\u58eb\u519b\u5200\u201d\u3002**\n\nByteBuffer \u4e4b\u6240\u4ee5\u5728\u7f51\u7edc\u9ad8\u5e76\u53d1\u573a\u666f\u4e0b\u88ab\u8bdf\u75c5\uff0c\u4e3b\u8981\u6709\u56db\u5927\u75db\u70b9\uff0c\u800c ByteBuf \u9488\u5bf9\u8fd9\u4e9b\u75db\u70b9\u8fdb\u884c\u4e86\u5b8c\u7f8e\u7684\u91cd\u6784\u3002\u6211\u4eec\u53ef\u4ee5\u4ece\u4ee5\u4e0b\u56db\u4e2a\u7ef4\u5ea6\u6df1\u5ea6\u5bf9\u6bd4\uff1a\n\n### \u4e00\u3001 \u6838\u5fc3\u75db\u70b9\uff1a\u6c60\u5316\u4e0e\u96f6\u62f7\u8d1d\uff08\u6027\u80fd\u7ef4\u5ea6\uff09\n\n\u8fd9\u662f ByteBuf \u6700\u5177\u6740\u4f24\u529b\u7684\u4f18\u52bf\u3002\n\n**1. \u6c60\u5316\u6280\u672f\uff1a**\n*   **ByteBuffer**\uff1aJDK \u7684 ByteBuffer \u662f**\u975e\u6c60\u5316**\u7684\u3002\u6bcf\u6b21\u8bfb\u5199\u6570\u636e\u90fd\u9700\u8981 `new` \u4e00\u4e2a\u65b0\u5bf9\u8c61\u3002\u5728\u9ad8\u5e76\u53d1\u573a\u666f\u4e0b\uff08\u5982\u6bcf\u79d2\u5904\u7406\u4e07\u7ea7\u8bbe\u5907\u5fc3\u8df3\uff09\uff0c\u8fd9\u4f1a\u5bfc\u81f4\u9891\u7e41\u7684 GC\uff08\u5783\u573e\u56de\u6536\uff09\uff0c\u751a\u81f3\u5f15\u53d1\u5185\u5b58\u6296\u52a8\uff0c\u4e25\u91cd\u5f71\u54cd\u6027\u80fd\u3002\n*   **ByteBuf**\uff1aNetty \u63d0\u4f9b\u4e86 `PooledByteBufAllocator`\u3002\u5b83\u57fa\u4e8e**\u5185\u5b58\u6c60**\u6280\u672f\uff0c\u53ef\u4ee5\u91cd\u7528 ByteBuf \u5bf9\u8c61\u3002\n    *   **\u5b9e\u6218\u4ef7\u503c**\uff1a\u5728\u6211\u4eec\u7684\u8bbe\u5907\u63a5\u5165\u7f51\u5173\u4e2d\uff0c\u5f00\u542f\u6c60\u5316\u540e\uff0cGC \u9891\u7387\u663e\u8457\u964d\u4f4e\uff0c\u7cfb\u7edf\u541e\u5410\u91cf\u63d0\u5347\u4e86 30% \u4ee5\u4e0a\u3002\n\n**2. \u96f6\u62f7\u8d1d\uff1a**\n*   **ByteBuffer**\uff1a\u5982\u679c\u4f60\u9700\u8981\u5408\u5e76\u4e24\u4e2a ByteBuffer\uff0c\u5fc5\u987b\u521b\u5efa\u4e00\u4e2a\u65b0\u7684\u66f4\u5927\u7684 Buffer\uff0c\u7136\u540e\u628a\u4e24\u4e2a\u65e7\u7684\u6570\u636e `System.arraycopy` \u62f7\u8d1d\u8fc7\u53bb\u3002\u8fd9\u5728 CPU \u5c42\u9762\u662f\u5de8\u5927\u7684\u6d6a\u8d39\u3002\n*   **ByteBuf**\uff1a\u63d0\u4f9b\u4e86 `CompositeByteBuf`\uff08\u7ec4\u5408\u7f13\u51b2\u533a\uff09\u3002\n    *   \u5b83\u53ef\u4ee5\u5c06\u591a\u4e2a ByteBuf \u903b\u8f91\u4e0a\u5408\u5e76\u4e3a\u4e00\u4e2a\u6574\u4f53\uff0c**\u7269\u7406\u4e0a\u5374\u4e0d\u8fdb\u884c\u5185\u5b58\u62f7\u8d1d**\u3002\u5b83\u53ea\u662f\u7ef4\u62a4\u4e86\u8fd9\u4e9b Buffer \u7684\u7d22\u5f15\u5f15\u7528\u3002\n    *   \u8fd9\u5728\u5904\u7406 TCP \u7c98\u5305/\u62c6\u5305\u3001\u534f\u8bae\u5934\u62fc\u63a5\u65f6\uff0c\u6027\u80fd\u4f18\u52bf\u6781\u5176\u660e\u663e\u3002\n\n### \u4e8c\u3001 \u4f7f\u7528\u75db\u70b9\uff1a\u7d22\u5f15\u6307\u9488\u4e0e API \u6613\u7528\u6027\uff08\u5f00\u53d1\u6548\u7387\u7ef4\u5ea6\uff09\n\n\u5199\u8fc7 NIO \u7684\u4eba\u90fd\u77e5\u9053\uff0cByteBuffer \u7684\u6307\u9488\u64cd\u4f5c\u975e\u5e38\u53cd\u4eba\u7c7b\u3002\n\n**1. \u8bfb\u5199\u6307\u9488\u5206\u79bb\uff1a**\n*   **ByteBuffer**\uff1a\u5b83\u53ea\u6709\u4e00\u4e2a\u6307\u9488\uff0c\u8bfb\u5199\u6a21\u5f0f\u5207\u6362\u65f6\u5fc5\u987b\u8c03\u7528 `flip()` \u65b9\u6cd5\u3002\n    *   **\u5751\u70b9**\uff1a\u7ecf\u5e38\u5fd8\u8bb0\u8c03\u7528 `flip()`\uff0c\u6216\u8005\u8c03\u7528\u4e86 `clear()` \u5bfc\u81f4\u6570\u636e\u9519\u4e71\u3002\u8fd9\u5728\u590d\u6742\u7684\u534f\u8bae\u89e3\u6790\u903b\u8f91\u4e2d\u6781\u6613\u51fa\u9519\u3002\n*   **ByteBuf**\uff1a\u5b83\u7ef4\u62a4\u4e86\u4e24\u4e2a\u72ec\u7acb\u7684\u6307\u9488\u2014\u2014`readerIndex`\uff08\u8bfb\u6307\u9488\uff09\u548c `writerIndex`\uff08\u5199\u6307\u9488\uff09\u3002\n    *   **\u4f18\u52bf**\uff1a\u8bfb\u5199\u4e92\u4e0d\u5e72\u6270\uff0c\u65e0\u9700\u5207\u6362\u6a21\u5f0f\u3002\u5199\u5165\u6570\u636e\u81ea\u52a8\u79fb\u52a8\u5199\u6307\u9488\uff0c\u8bfb\u53d6\u81ea\u52a8\u79fb\u52a8\u8bfb\u6307\u9488\u3002\u4ee3\u7801\u53ef\u8bfb\u6027\u548c\u5b89\u5168\u6027\u5927\u5e45\u63d0\u5347\u3002\n\n**2. API \u4e30\u5bcc\u5ea6\uff1a**\n*   **ByteBuffer**\uff1a\u529f\u80fd\u975e\u5e38\u57fa\u7840\uff0c\u751a\u81f3\u6ca1\u6709\u7b80\u5355\u7684 `writeBytes` \u6216 `readBytes` \u6279\u91cf\u64cd\u4f5c\u3002\n*   **ByteBuf**\uff1a\u63d0\u4f9b\u4e86\u6781\u5176\u4e30\u5bcc\u7684 API\uff0c\u5982 `writeBytes`\u3001`readBytes`\u3001`mark`\u3001`reset`\u3001`skipBytes` \u7b49\uff0c\u751a\u81f3\u652f\u6301\u76f4\u63a5\u64cd\u4f5c `setBytes` \u548c `getBytes`\uff08\u4e0d\u79fb\u52a8\u6307\u9488\uff09\uff0c\u6781\u5927\u7b80\u5316\u4e86\u534f\u8bae\u7f16\u89e3\u7801\u7684\u5f00\u53d1\u5de5\u4f5c\u3002\n\n### \u4e09\u3001 \u6269\u5c55\u75db\u70b9\uff1a\u52a8\u6001\u6269\u5bb9\uff08\u529f\u80fd\u7ef4\u5ea6\uff09\n\n*   **ByteBuffer**\uff1a\u4e00\u65e6\u5206\u914d\uff0c\u957f\u5ea6\u5c31\u56fa\u5b9a\u4e86\u3002\u5982\u679c\u4f60\u4e0d\u786e\u5b9a\u6570\u636e\u5305\u7684\u5927\u5c0f\uff0c\u4e00\u65e6\u5199\u5165\u6570\u636e\u8d85\u8fc7\u5bb9\u91cf\uff0c\u5c31\u4f1a\u629b\u51fa `BufferOverflowException`\u3002\u5f00\u53d1\u8005\u5f80\u5f80\u9700\u8981\u81ea\u5df1\u5199\u590d\u6742\u7684\u6269\u5bb9\u903b\u8f91\u3002\n*   **ByteBuf**\uff1a\u652f\u6301**\u81ea\u52a8\u52a8\u6001\u6269\u5bb9**\u3002\n    *   \u5f53\u5199\u5165\u6570\u636e\u8d85\u8fc7\u5bb9\u91cf\u65f6\uff0c\u5b83\u4f1a\u81ea\u52a8\u6269\u5bb9\uff08\u9ed8\u8ba4\u6700\u5927\u5230 Integer.MAX_VALUE\uff09\u3002\u8fd9\u8ba9\u5f00\u53d1\u8005\u65e0\u9700\u5728\u7f16\u5199\u4ee3\u7801\u65f6\u9884\u5224\u6570\u636e\u5305\u7684\u5927\u5c0f\uff0c\u975e\u5e38\u7075\u6d3b\u3002\n\n### \u56db\u3001 \u5b89\u5168\u75db\u70b9\uff1a\u5185\u5b58\u6cc4\u9732\u68c0\u6d4b\uff08\u7a33\u5b9a\u6027\u7ef4\u5ea6\uff09\n\n\u7f51\u7edc\u7f16\u7a0b\u4e2d\u6700\u6015\u7684\u5c31\u662f\u5185\u5b58\u6cc4\u9732\u3002\n\n*   **ByteBuffer**\uff1a\u5982\u679c\u662f\u5806\u5916\u5185\u5b58\uff0c\u4e00\u65e6\u5fd8\u8bb0\u56de\u6536\uff0c\u5c31\u4f1a\u9020\u6210\u5185\u5b58\u6cc4\u9732\uff0c\u4e14 JDK \u6ca1\u6709\u5f88\u597d\u7684\u6392\u67e5\u624b\u6bb5\u3002\n*   **ByteBuf**\uff1aNetty \u901a\u8fc7\u5f15\u7528\u8ba1\u6570\u6765\u7ba1\u7406\u751f\u547d\u5468\u671f\u3002\n    *   **\u673a\u5236**\uff1a\u6bcf\u4e2a ByteBuf \u90fd\u6709\u4e00\u4e2a\u5f15\u7528\u8ba1\u6570\u5668\u3002\u5f53\u8ba1\u6570\u5f52\u96f6\u65f6\uff0c\u624d\u4f1a\u88ab\u56de\u6536\u6216\u5f52\u8fd8\u5230\u5185\u5b58\u6c60\u3002\n    *   **\u68c0\u6d4b**\uff1aNetty \u63d0\u4f9b\u4e86 `ResourceLeakDetector`\uff0c\u53ef\u4ee5\u5728\u8fd0\u884c\u65f6\u68c0\u6d4b\u662f\u5426\u6709 ByteBuf \u5fd8\u8bb0\u91ca\u653e\u3002\u5982\u679c\u53d1\u751f\u6cc4\u9732\uff0c\u65e5\u5fd7\u91cc\u4f1a\u6253\u5370\u8be6\u7ec6\u7684\u8c03\u7528\u94fe\u8def\uff0c\u5e2e\u52a9\u5feb\u901f\u5b9a\u4f4d\u95ee\u9898\u3002\n\n### \u603b\u7ed3\n\n\u4e3a\u4ec0\u4e48 ByteBuf \u6bd4 ByteBuffer \u597d\uff1f\n\n1.  **\u66f4\u9ad8\u6548**\uff1a\u5185\u5b58\u6c60\u6280\u672f\u51cf\u5c11 GC\uff0cCompositeByteBuf \u5b9e\u73b0\u96f6\u62f7\u8d1d\u964d\u4f4e CPU \u6d88\u8017\u3002\n2.  **\u66f4\u6613\u7528**\uff1a\u8bfb\u5199\u6307\u9488\u5206\u79bb\uff0c\u544a\u522b `flip()` \u5669\u68a6\uff1bAPI \u4e30\u5bcc\uff0c\u964d\u4f4e\u7f16\u7801\u590d\u6742\u5ea6\u3002\n3.  **\u66f4\u5f3a\u5927**\uff1a\u81ea\u52a8\u6269\u5bb9\uff0c\u65e0\u9700\u9884\u5224 Buffer \u5927\u5c0f\u3002\n4.  **\u66f4\u5b89\u5168**\uff1a\u5b8c\u5584\u7684\u5f15\u7528\u8ba1\u6570\u548c\u5185\u5b58\u6cc4\u9732\u68c0\u6d4b\u673a\u5236\u3002\n\n\u5728\u6211\u7684\u9879\u76ee\u7ecf\u9a8c\u4e2d\uff0c\u5bf9\u4e8e\u4efb\u4f55\u6d89\u53ca\u9ad8\u6027\u80fd\u7f51\u7edc\u901a\u4fe1\u7684\u573a\u666f\uff0c**ByteBuf \u90fd\u662f\u65e0\u53ef\u4e89\u8bae\u7684\u6807\u51c6\u9009\u62e9**\u3002",
