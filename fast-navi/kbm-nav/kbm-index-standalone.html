    "title": "\u4e3a\u4ec0\u4e48\u4f1aOOM\uff1f",
    "style": "",
    "details": "\u9762\u8bd5\u5b98\u60a8\u597d\uff0cOOM\uff08Out Of Memory\uff09\u662f Java \u5e94\u7528\u4e2d\u6700\u4e25\u91cd\u7684\u6545\u969c\u4e4b\u4e00\u3002\u6839\u636e\u6211\u7684\u7ecf\u9a8c\uff0cOOM \u901a\u5e38\u4e0d\u662f\u7531\u5355\u4e00\u539f\u56e0\u9020\u6210\u7684\uff0c\u800c\u662f\u591a\u79cd\u56e0\u7d20\u53e0\u52a0\u7684\u7ed3\u679c\u3002\n\n\u6211\u5c06 OOM \u5206\u4e3a**JVM \u5185\u5b58\u533a\u57df**\u548c**\u4ea7\u751f\u539f\u56e0**\u4e24\u4e2a\u7ef4\u5ea6\u6765\u4e3a\u60a8\u8be6\u7ec6\u89e3\u6790\uff1a\n\n### \u4e00\u3001 \u6309\u5185\u5b58\u533a\u57df\u5206\u7c7b\uff08\u5b9a\u4f4d\u95ee\u9898\u53d1\u751f\u7684\u4f4d\u7f6e\uff09\n\n\u6839\u636e JVM \u7684\u5185\u5b58\u6a21\u578b\uff0cOOM \u4e3b\u8981\u53d1\u751f\u5728\u4ee5\u4e0b\u4e09\u4e2a\u533a\u57df\uff1a\n\n**1. Java \u5806\u6ea2\u51fa\u2014\u2014 \u6700\u5e38\u89c1**\n*   **\u73b0\u8c61**\uff1a\u65e5\u5fd7\u4e2d\u51fa\u73b0 `java.lang.OutOfMemoryError: Java heap space`\u3002\n*   **\u539f\u56e0**\uff1a\n    *   **\u5185\u5b58\u6cc4\u6f0f**\uff1a\u5bf9\u8c61\u88ab\u521b\u5efa\u540e\u65e0\u6cd5\u88ab\u56de\u6536\u3002\u4f8b\u5982\uff1a\u9759\u6001\u96c6\u5408\u7c7b\u65e0\u9650\u589e\u957f\u3001\u672a\u5173\u95ed\u7684\u6570\u636e\u5e93\u8fde\u63a5\u6216 IO \u6d41\u3001ThreadLocal \u672a remove \u7b49\u3002\n    *   **\u5185\u5b58\u6ea2\u51fa**\uff1a\u7531\u4e8e\u4e1a\u52a1\u589e\u957f\uff0c\u5b58\u6d3b\u5bf9\u8c61\u786e\u5b9e\u592a\u591a\uff0c\u8d85\u8fc7\u4e86\u5806\u7684\u6700\u5927\u5bb9\u91cf\uff08`-Xmx`\uff09\u3002\n    *   **\u5927\u5bf9\u8c61**\uff1a\u4e00\u6b21\u6027\u52a0\u8f7d\u8d85\u5927\u6570\u636e\u91cf\uff0c\u5982\u672a\u5206\u9875\u67e5\u8be2\u51fa\u7684\u767e\u4e07\u7ea7\u8ba2\u5355\u5217\u8868\uff0c\u6216\u8005\u4e00\u6b21\u6027\u8bfb\u53d6\u8d85\u5927\u6587\u4ef6\u5230\u5185\u5b58\u3002\n\n**2. \u65b9\u6cd5\u533a/\u5143\u7a7a\u95f4\u6ea2\u51fa**\n*   **\u73b0\u8c61**\uff1a\u65e5\u5fd7\u4e2d\u51fa\u73b0 `java.lang.OutOfMemoryError: Metaspace`\u3002\n*   **\u539f\u56e0**\uff1a\n    *   **\u52a0\u8f7d\u7c7b\u8fc7\u591a**\uff1a\u5e94\u7528\u4f9d\u8d56\u4e86\u592a\u591a\u7684 Jar \u5305\uff0c\u6216\u8005\u4f7f\u7528\u4e86\u5927\u91cf\u7684\u52a8\u6001\u4ee3\u7406\u3001\u53cd\u5c04\u6846\u67b6\uff08\u5982 Spring\u3001Hibernate\uff09\uff0c\u5bfc\u81f4\u52a0\u8f7d\u7684\u7c7b\u6570\u91cf\u5de8\u5927\u3002\n    *   **\u52a8\u6001\u751f\u6210\u7c7b**\uff1a\u6211\u5728\u91d1\u8776\u9879\u76ee\u9047\u5230\u8fc7\u4f7f\u7528 CGLib \u52a8\u6001\u751f\u6210\u4ee3\u7406\u7c7b\u7684\u573a\u666f\uff0c\u5982\u679c\u4ee3\u7406\u7c7b\u751f\u6210\u7b56\u7565\u4e0d\u5f53\uff0c\u4f1a\u5bfc\u81f4 Metaspace \u88ab\u6491\u6ee1\u3002\n    *   **\u5185\u5b58\u6cc4\u6f0f**\uff1a\u5728\u65e7\u7248\u672c JDK\uff081.7\u53ca\u4e4b\u524d\uff09\u4e2d\uff0c\u5e38\u91cf\u6c60\u6ea2\u51fa\u4e5f\u662f\u4e00\u5927\u539f\u56e0\u3002\n\n**3. \u6808\u6ea2\u51fa\u2014\u2014 \u901a\u5e38\u5bfc\u81f4 StackOverflowError**\n*   **\u73b0\u8c61**\uff1a`java.lang.StackOverflowError`\uff08\u6781\u7aef\u60c5\u51b5\u4e0b\u4e5f\u4f1a\u629b OOM\uff09\u3002\n*   **\u539f\u56e0**\uff1a\n    *   **\u9012\u5f52\u8fc7\u6df1**\uff1a\u4ee3\u7801\u903b\u8f91\u9519\u8bef\u5bfc\u81f4\u65e0\u9650\u9012\u5f52\u3002\n    *   **\u65b9\u6cd5\u8c03\u7528\u94fe\u8fc7\u957f**\uff1a\u65b9\u6cd5\u5d4c\u5957\u5c42\u7ea7\u592a\u6df1\uff0c\u6808\u5e27\u592a\u591a\u3002\n    *   **\u7ebf\u7a0b\u8bf7\u6c42\u6808\u5bb9\u91cf\u8fc7\u5927**\uff1a\u5982\u679c\u8bbe\u7f6e\u4e86\u8fc7\u5927\u7684 `-Xss`\uff0c\u53ef\u80fd\u5bfc\u81f4\u521b\u5efa\u7ebf\u7a0b\u65f6\u5185\u5b58\u4e0d\u8db3\u3002\n\n**4. \u76f4\u63a5\u5185\u5b58\u6ea2\u51fa**\n*   **\u73b0\u8c61**\uff1a`java.lang.OutOfMemoryError: Direct buffer memory`\u3002\n*   **\u539f\u56e0**\uff1a\n    *   \u4f7f\u7528\u4e86 NIO\uff08\u5982 Netty\uff09\uff0c\u901a\u8fc7 `ByteBuffer.allocateDirect()` \u5206\u914d\u5806\u5916\u5185\u5b58\u3002\n    *   \u5982\u679c\u8fd9\u90e8\u5206\u5185\u5b58\u672a\u663e\u5f0f\u91ca\u653e\uff0c\u4e14\u8d85\u8fc7\u4e86\u9650\u5236\uff08\u9ed8\u8ba4\u7ea6 64MB \u6216\u7531 `-XX:MaxDirectMemorySize` \u6307\u5b9a\uff09\uff0c\u5c31\u4f1a OOM\u3002\n\n---\n\n### \u4e8c\u3001 \u6838\u5fc3\u539f\u56e0\u6df1\u5ea6\u89e3\u6790\uff08\u4e3a\u4ec0\u4e48\u4f1a\u53d1\u751f\uff1f\uff09\n\n\u7ed3\u5408\u6211\u4e4b\u524d\u7684\u8c03\u4f18\u7ecf\u9a8c\uff0cOOM \u7684\u6839\u672c\u539f\u56e0\u901a\u5e38\u5f52\u7ed3\u4e3a\u4ee5\u4e0b\u4e09\u7c7b\uff1a\n\n#### 1. \u8d44\u6e90\u672a\u91ca\u653e\uff08\u4ee3\u7801\u5c42\u9762\u6700\u5e38\u89c1\uff09\n\u8fd9\u662f\u5f00\u53d1\u4e2d\u6700\u5bb9\u6613\u72af\u7684\u9519\u8bef\uff0c\u5c5e\u4e8e**\u5185\u5b58\u6cc4\u6f0f**\u3002\n*   **\u9759\u6001\u96c6\u5408\u7c7b**\uff1a\u6bd4\u5982\u5b9a\u4e49\u4e86 `static final Map<String, Object> cache = new HashMap()`\u3002\u5982\u679c\u4e0d\u624b\u52a8\u5220\u9664\uff0c\u8fd9\u4e9b\u5bf9\u8c61\u4f1a\u4e00\u76f4\u5b58\u5728\u4e8e\u8001\u5e74\u4ee3\uff0c\u6c38\u8fdc\u4e0d\u4f1a\u88ab GC\u3002\n*   **\u76d1\u542c\u5668/\u56de\u8c03\u672a\u6ce8\u9500**\uff1a\u6ce8\u518c\u4e86\u76d1\u542c\u5668\uff0c\u4f46\u4e0d\u518d\u4f7f\u7528\u65f6\u6ca1\u6709\u6ce8\u9500\uff0c\u5bfc\u81f4\u76d1\u542c\u5668\u5bf9\u8c61\u53ca\u5b83\u5f15\u7528\u7684\u5bf9\u8c61\u65e0\u6cd5\u56de\u6536\u3002\n*   **\u6570\u636e\u5e93\u8fde\u63a5/IO \u6d41**\uff1a\u672a\u5728 `finally` \u5757\u4e2d\u5173\u95ed\u8fde\u63a5\uff0c\u5bfc\u81f4\u8fde\u63a5\u5bf9\u8c61\u79ef\u538b\u3002\n\n#### 2. \u5e76\u53d1\u4e0e\u538b\u529b\u95ee\u9898\uff08\u67b6\u6784\u5c42\u9762\uff09\n*   **\u9ad8\u5e76\u53d1\u8bf7\u6c42**\uff1a\u77ac\u95f4\u6d8c\u5165\u6d77\u91cf\u8bf7\u6c42\uff0c\u6bcf\u4e2a\u8bf7\u6c42\u90fd\u9700\u8981\u521b\u5efa\u5bf9\u8c61\u3002\u5982\u679c\u5bf9\u8c61\u521b\u5efa\u901f\u5ea6 > GC \u56de\u6536\u901f\u5ea6\uff0c\u5185\u5b58\u4f1a\u77ac\u95f4\u88ab\u6253\u6ee1\u3002\n*   **\u7ebf\u7a0b\u6c60\u914d\u7f6e\u4e0d\u5f53**\uff1a\u5982\u679c\u7ebf\u7a0b\u6c60\u7b56\u7565\u662f `newCachedThreadPool`\uff08\u65e0\u754c\u961f\u5217\uff09\uff0c\u5728\u9ad8\u5e76\u53d1\u4e0b\u4f1a\u521b\u5efa\u6d77\u91cf\u7ebf\u7a0b\uff0c\u6bcf\u4e2a\u7ebf\u7a0b\u90fd\u6709\u72ec\u7acb\u7684\u6808\u7a7a\u95f4\uff0c\u6700\u7ec8\u8017\u5c3d native memory\u3002\n\n#### 3. \u914d\u7f6e\u4e0e\u8bbe\u8ba1\u4e0d\u5f53\n*   **\u5806\u5927\u5c0f\u8bbe\u7f6e\u4e0d\u5408\u7406**\uff1a\u7ed9 JVM \u5206\u914d\u7684\u5185\u5b58\uff08`-Xmx`\uff09\u5c0f\u4e8e\u4e1a\u52a1\u5b9e\u9645\u9700\u8981\u7684\u6570\u636e\u91cf\u3002\n*   **\u6570\u636e\u52a0\u8f7d\u7b56\u7565**\uff1a\u6bd4\u5982\u5728\u505a\u62a5\u8868\u5bfc\u51fa\u65f6\uff0c\u4e00\u6b21\u6027\u5c06\u767e\u4e07\u6570\u636e\u52a0\u8f7d\u5230\u5185\u5b58 List \u4e2d\uff0c\u800c\u4e0d\u662f\u91c7\u7528\u6d41\u5f0f\u5904\u7406\u6216\u5206\u9875\u52a0\u8f7d\u3002\n\n### \u4e09\u3001 \u6211\u7684\u5b9e\u6218\u603b\u7ed3\n\n\u5728\u5c0f\u7535\u79d1\u6280\u7684\u9879\u76ee\u4e2d\uff0c\u6211\u4eec\u901a\u8fc7\u4ee5\u4e0b\u624b\u6bb5\u6709\u6548\u9884\u9632\u4e86 OOM\uff1a\n\n1.  **\u4ee3\u7801\u89c4\u8303**\uff1a\u5f3a\u5236\u4f7f\u7528 `try-with-resources` \u8bed\u6cd5\u5904\u7406 IO \u6d41\uff1b\u4e25\u683c\u5ba1\u67e5\u9759\u6001\u96c6\u5408\u7684\u4f7f\u7528\u3002\n2.  **\u6c60\u5316\u6280\u672f**\uff1a\u4f7f\u7528\u8fde\u63a5\u6c60\u7ba1\u7406\u6570\u636e\u5e93\u3001Redis \u8fde\u63a5\uff0c\u907f\u514d\u9891\u7e41\u521b\u5efa\u9500\u6bc1\u5bf9\u8c61\u3002\n3.  **\u6d41\u5f0f\u5904\u7406**\uff1a\u5904\u7406\u5927\u6570\u636e\u91cf\u5bfc\u51fa\u65f6\uff0c\u4f7f\u7528\u6d41\u5f0f\u67e5\u8be2\uff0c\u907f\u514d\u4e00\u6b21\u6027\u52a0\u8f7d\u5230\u5185\u5b58\u3002\n4.  **\u76d1\u63a7\u9884\u8b66**\uff1a\u901a\u8fc7 Prometheus \u76d1\u63a7 JVM \u5806\u5185\u5b58\u4f7f\u7528\u7387\uff0c\u8bbe\u7f6e\u9608\u503c\uff08\u5982\u8001\u5e74\u4ee3\u4f7f\u7528\u7387 > 80%\uff09\u63d0\u524d\u62a5\u8b66\uff0c\u5728 OOM \u53d1\u751f\u524d\u4ecb\u5165\u5904\u7406\u3002\n\n\u7efc\u4e0a\u6240\u8ff0\uff0cOOM \u7684\u672c\u8d28\u662f**\u5185\u5b58\u4f9b\u7ed9\uff08JVM \u914d\u7f6e\uff09\u4e0e\u5185\u5b58\u9700\u6c42\uff08\u4e1a\u52a1\u5bf9\u8c61\uff09\u4e4b\u95f4\u7684\u5931\u8861**\uff0c\u89e3\u51b3\u601d\u8def\u5c31\u662f\u8981\u4e48\u201c\u5f00\u6e90\u201d\uff08\u589e\u52a0\u5185\u5b58\u3001\u4f18\u5316\u914d\u7f6e\uff09\uff0c\u8981\u4e48\u201c\u8282\u6d41\u201d\uff08\u4fee\u590d\u6cc4\u6f0f\u3001\u51cf\u5c11\u5bf9\u8c61\u521b\u5efa\u3001\u4f7f\u7528\u66f4\u9ad8\u6548\u7684\u6570\u636e\u7ed3\u6784\uff09\u3002",
    "subItems": []

  "313": {
    "title": "\u7ebf\u7a0b\u6c60\u5982\u4f55\u8bbe\u8ba1\uff1f",
    "style": "",
    "details": "\u9762\u8bd5\u5b98\u60a8\u597d\uff0c\u7ebf\u7a0b\u6c60\u7684\u8bbe\u8ba1\u662f\u5e76\u53d1\u7f16\u7a0b\u4e2d\u7684\u6838\u5fc3\u8bdd\u9898\u3002\u4e00\u4e2a\u4f18\u79c0\u7684\u7ebf\u7a0b\u6c60\u8bbe\u8ba1\u9700\u8981\u5728**\u8d44\u6e90\u6d88\u8017**\u3001**\u541e\u5410\u91cf**\u548c**\u54cd\u5e94\u901f\u5ea6**\u4e4b\u95f4\u627e\u5230\u5e73\u8861\u3002\n\n\u7ed3\u5408\u6211\u5728\u5c0f\u7535\u79d1\u6280\u9ad8\u5e76\u53d1\u9879\u76ee\u4e2d\u7684\u7ecf\u9a8c\uff0c\u6211\u5c06\u4ece**\u6838\u5fc3\u53c2\u6570\u8bbe\u8ba1**\u3001**\u62d2\u7edd\u7b56\u7565\u9009\u62e9**\u4ee5\u53ca**\u76d1\u63a7\u4e0e\u8fd0\u7ef4**\u4e09\u4e2a\u7ef4\u5ea6\u6765\u9610\u8ff0\u7ebf\u7a0b\u6c60\u7684\u8bbe\u8ba1\u601d\u8def\u3002\n\n### \u4e00\u3001 \u6838\u5fc3\u53c2\u6570\u8bbe\u8ba1\u6cd5\u5219\n\n\u5728 `ThreadPoolExecutor` \u7684\u6784\u9020\u51fd\u6570\u4e2d\uff0c\u6709 7 \u4e2a\u6838\u5fc3\u53c2\u6570\u3002\u8bbe\u8ba1\u7684\u5173\u952e\u5728\u4e8e\u5982\u4f55\u6839\u636e\u4e1a\u52a1\u573a\u666f\u8bbe\u5b9a\u8fd9\u4e9b\u503c\u3002\n\n**1. \u7ebf\u7a0b\u6570\u914d\u7f6e\uff08\u6838\u5fc3\u4e0e\u6700\u5927\u7ebf\u7a0b\u6570\uff09**\n\n\u8fd9\u662f\u6700\u5173\u952e\u4e5f\u6700\u96be\u628a\u63e1\u7684\u90e8\u5206\u3002\u6211\u7684\u539f\u5219\u662f\uff1a**\u533a\u5206\u4efb\u52a1\u7c7b\u578b**\u3002\n\n*   **CPU \u5bc6\u96c6\u578b\u4efb\u52a1**\n    *   **\u7279\u70b9**\uff1a\u8ba1\u7b97\u91cf\u5927\uff0c\u4e3b\u8981\u6d88\u8017 CPU \u8d44\u6e90\uff08\u5982\u52a0\u5bc6\u3001\u89e3\u5bc6\u3001\u7b97\u6cd5\u8ba1\u7b97\uff09\u3002\n    *   **\u8bbe\u8ba1**\uff1a\u7ebf\u7a0b\u6570\u4e0d\u5b9c\u8fc7\u591a\uff0c\u8fc7\u591a\u4f1a\u5bfc\u81f4\u9891\u7e41\u4e0a\u4e0b\u6587\u5207\u6362\uff0c\u964d\u4f4e\u6027\u80fd\u3002\n    *   **\u516c\u5f0f**\uff1a`\u7ebf\u7a0b\u6570 = CPU \u6838\u5fc3\u6570 + 1`\u3002\n    *   **\u6848\u4f8b**\uff1a\u5728\u8003\u62c9\u5c0f\u5e97\u505a\u9500\u91cf\u9884\u6d4b\u7b97\u6cd5\u65f6\uff0c\u6211\u4eec\u91c7\u7528\u6b64\u914d\u7f6e\uff0c\u4fdd\u8bc1 CPU \u5229\u7528\u7387\u6700\u5927\u5316\u3002\n\n*   **IO \u5bc6\u96c6\u578b\u4efb\u52a1**\n    *   **\u7279\u70b9**\uff1a\u9891\u7e41\u8bfb\u5199\u6570\u636e\u5e93\u3001RPC \u8c03\u7528\u3001HTTP \u8bf7\u6c42\u3002CPU \u5927\u90e8\u5206\u65f6\u95f4\u5728\u7b49\u5f85 IO\uff0c\u6b64\u65f6\u7ebf\u7a0b\u5904\u4e8e\u963b\u585e\u72b6\u6001\u3002\n    *   **\u8bbe\u8ba1**\uff1a\u9700\u8981\u66f4\u591a\u7ebf\u7a0b\u6765\u586b\u8865 IO \u7b49\u5f85\u7684\u7a7a\u9699\uff0c\u63d0\u9ad8 CPU \u5229\u7528\u7387\u3002\n    *   **\u516c\u5f0f**\uff1a`\u7ebf\u7a0b\u6570 = CPU \u6838\u5fc3\u6570 * (1 + \u5e73\u5747\u7b49\u5f85\u65f6\u95f4 / \u5e73\u5747\u5de5\u4f5c\u65f6\u95f4)`\u3002\n    *   **\u7ecf\u9a8c\u503c**\uff1a\u901a\u5e38\u8bbe\u7f6e\u4e3a CPU \u6838\u5fc3\u6570\u7684 2 \u500d\u5230 10 \u500d\u3002\u5728\u5c0f\u7535\u8bbe\u5907\u5fc3\u8df3\u4e0a\u62a5\u5904\u7406\u4e2d\uff0c\u56e0\u4e3a\u6d89\u53ca\u5927\u91cf DB \u5199\u5165\uff0c\u6211\u4eec\u914d\u7f6e\u4e86 8 \u500d\u4e8e CPU \u6838\u5fc3\u6570\u7684\u7ebf\u7a0b\u3002\n\n**2. \u961f\u5217\u9009\u62e9**\n\n*   **\u6709\u754c\u961f\u5217**\uff1a\u5982 `ArrayBlockingQueue`\u3002\n    *   **\u63a8\u8350**\u3002\u5fc5\u987b\u8bbe\u7f6e\u5408\u7406\u7684\u5bb9\u91cf\u3002\u9632\u6b62\u6d41\u91cf\u6d2a\u5cf0\u65f6\uff0c\u4efb\u52a1\u65e0\u9650\u5806\u79ef\u5bfc\u81f4\u5185\u5b58\u6ea2\u51fa\uff08OOM\uff09\u3002\n    *   **\u4ee3\u4ef7**\uff1a\u5f53\u961f\u5217\u6ee1\u65f6\uff0c\u4f1a\u89e6\u53d1\u62d2\u7edd\u7b56\u7565\u3002\n*   **\u65e0\u754c\u961f\u5217**\uff1a\u5982 `LinkedBlockingQueue`\u3002\n    *   **\u98ce\u9669**\uff1a\u5982\u679c\u4e0d\u8bbe\u7f6e\u5bb9\u91cf\uff0c\u4efb\u52a1\u4f1a\u65e0\u9650\u5236\u5806\u79ef\uff0c\u6700\u7ec8\u6491\u7206\u5185\u5b58\u3002\u9664\u975e\u662f\u65e5\u5fd7\u6253\u5370\u7b49\u975e\u6838\u5fc3\u4e14\u6570\u636e\u91cf\u53ef\u63a7\u7684\u573a\u666f\uff0c\u5426\u5219**\u4e25\u7981\u4f7f\u7528**\u3002\n*   **\u540c\u6b65\u79fb\u4ea4\u961f\u5217**\uff1a\u5982 `SynchronousQueue`\u3002\n    *   **\u573a\u666f**\uff1a\u8981\u6c42\u4efb\u52a1\u5fc5\u987b\u7acb\u5373\u88ab\u5904\u7406\uff0c\u4e0d\u505a\u7f13\u51b2\u3002\u9002\u5408\u4efb\u52a1\u5904\u7406\u901f\u5ea6\u5feb\u3001\u5b9e\u65f6\u6027\u8981\u6c42\u6781\u9ad8\u7684\u573a\u666f\u3002\u6b64\u65f6\u901a\u5e38\u9700\u8981\u8bbe\u7f6e\u5f88\u5927\u7684 `maximumPoolSize`\u3002\n\n**3. \u5b58\u6d3b\u65f6\u95f4**\n\n*   \u5f53 `corePoolSize` < `currentPoolSize` < `maximumPoolSize` \u65f6\uff0c\u591a\u4f59\u7a7a\u95f2\u7ebf\u7a0b\u7684\u5b58\u6d3b\u65f6\u95f4\u3002\n*   \u5728\u7a81\u53d1\u6d41\u91cf\u573a\u666f\u4e0b\uff0c\u5efa\u8bae\u8bbe\u7f6e\u8f83\u5c0f\u7684 `keepAliveTime`\uff08\u5982 60s\uff09\uff0c\u8ba9\u591a\u4f59\u7684\u7ebf\u7a0b\u5728\u7a7a\u95f2\u540e\u5c3d\u5feb\u56de\u6536\uff0c\u91ca\u653e\u8d44\u6e90\u3002\n\n---\n\n### \u4e8c\u3001 \u62d2\u7edd\u7b56\u7565\u8bbe\u8ba1\uff1a\u4fdd\u62a4\u7cfb\u7edf\u7684\u6700\u540e\u4e00\u9053\u9632\u7ebf\n\n\u5f53\u961f\u5217\u6ee1\u4e14\u7ebf\u7a0b\u6570\u8fbe\u5230\u6700\u5927\u503c\u65f6\uff0c\u65b0\u4efb\u52a1\u5fc5\u987b\u88ab\u62d2\u7edd\u3002JDK \u63d0\u4f9b\u4e86 4 \u79cd\u9ed8\u8ba4\u7b56\u7565\uff0c\u4f46\u5728\u751f\u4ea7\u73af\u5883\u4e2d\uff0c\u6211\u4eec\u901a\u5e38\u9700\u8981**\u81ea\u5b9a\u4e49\u7b56\u7565**\u3002\n\n1.  **AbortPolicy\uff08\u9ed8\u8ba4\uff09**\uff1a\u76f4\u63a5\u629b\u51fa\u5f02\u5e38\u3002\n    *   **\u8bc4\u4ef7**\uff1a\u8fc7\u4e8e\u66b4\u529b\uff0c\u4f1a\u5bfc\u81f4\u8c03\u7528\u65b9\u62a5\u9519\uff0c\u7528\u6237\u4f53\u9a8c\u5dee\u3002\u4ec5\u7528\u4e8e\u975e\u5173\u952e\u94fe\u8def\u3002\n2.  **CallerRunsPolicy**\uff1a\u7531\u8c03\u7528\u7ebf\u7a0b\uff08\u63d0\u4ea4\u4efb\u52a1\u7684\u7ebf\u7a0b\uff09\u6765\u6267\u884c\u4efb\u52a1\u3002\n    *   **\u8bc4\u4ef7**\uff1a**\u63a8\u8350\u7528\u4e8e\u6838\u5fc3\u4e1a\u52a1**\u3002\n    *   **\u539f\u7406**\uff1a\u8fd9\u5b9e\u73b0\u4e86\u7b80\u6613\u7684\u201c\u8d1f\u53cd\u9988\u201d\u673a\u5236\u3002\u5f53\u7ebf\u7a0b\u6c60\u5fd9\u65f6\uff0c\u4e3b\u7ebf\u7a0b\uff08\u5982 Tomcat \u7ebf\u7a0b\uff09\u4e0d\u5f97\u4e0d\u81ea\u5df1\u53bb\u5904\u7406\u4efb\u52a1\uff0c\u4ece\u800c\u51cf\u6162\u4e86\u4efb\u52a1\u63d0\u4ea4\u901f\u5ea6\uff0c\u7ed9\u7ebf\u7a0b\u6c60\u5598\u606f\u7684\u673a\u4f1a\u3002\n    *   **\u6848\u4f8b**\uff1a\u5728\u8ba2\u5355\u72b6\u6001\u66f4\u65b0\u7ebf\u7a0b\u6c60\u4e2d\uff0c\u6211\u91c7\u7528\u4e86\u6b64\u7b56\u7565\uff0c\u6709\u6548\u9632\u6b62\u4e86\u6d41\u91cf\u6d2a\u5cf0\u51b2\u57ae\u7cfb\u7edf\u3002\n3.  **DiscardPolicy / DiscardOldestPolicy**\uff1a\u76f4\u63a5\u4e22\u5f03\u6216\u4e22\u5f03\u6700\u8001\u7684\u4efb\u52a1\u3002\n    *   **\u8bc4\u4ef7**\uff1a\u98ce\u9669\u6781\u5927\uff0c\u6570\u636e\u4f1a\u4e22\u5931\u3002\u4ec5\u7528\u4e8e\u65e5\u5fd7\u6536\u96c6\u3001\u7edf\u8ba1\u7b49\u5141\u8bb8\u5c11\u91cf\u4e22\u5931\u7684\u975e\u6838\u5fc3\u573a\u666f\u3002\n\n**\u6211\u7684\u5b9e\u6218\u65b9\u6848**\uff1a\n\u5bf9\u4e8e\u6838\u5fc3\u4e1a\u52a1\uff08\u5982\u652f\u4ed8\u56de\u8c03\u3001\u8ba2\u5355\u72b6\u6001\u540c\u6b65\uff09\uff0c\u6211\u4f1a**\u81ea\u5b9a\u4e49\u62d2\u7edd\u7b56\u7565**\uff1a\n*   \u5c1d\u8bd5\u5c06\u4efb\u52a1\u6301\u4e45\u5316\u5230\u6570\u636e\u5e93\u6216 Redis \u4e2d\u3002\n*   \u540e\u53f0\u542f\u52a8\u4e00\u4e2a\u5b9a\u65f6\u4efb\u52a1\uff0c\u5728\u7cfb\u7edf\u7a7a\u95f2\u65f6\u91cd\u65b0\u52a0\u8f7d\u8fd9\u4e9b\u201c\u88ab\u62d2\u7edd\u7684\u4efb\u52a1\u201d\u8fdb\u884c\u91cd\u8bd5\u3002\n*   \u8fd9\u786e\u4fdd\u4e86**\u4efb\u52a1\u4e0d\u4e22\u5931**\uff0c\u5b9e\u73b0\u4e86\u6700\u7ec8\u4e00\u81f4\u6027\u3002\n\n---\n\n### \u4e09\u3001 \u76d1\u63a7\u4e0e\u52a8\u6001\u8c03\u6574\n\n\u7ebf\u7a0b\u6c60\u53c2\u6570\u4e0d\u662f\u4e00\u6210\u4e0d\u53d8\u7684\uff0c\u9700\u8981\u6839\u636e\u4e1a\u52a1\u53d1\u5c55\u52a8\u6001\u8c03\u6574\u3002\n\n**1. \u76d1\u63a7\u6307\u6807**\n\u6211\u5728\u5c0f\u7535\u7684\u57fa\u7840\u67b6\u6784\u7ec4\u65f6\uff0c\u901a\u8fc7 Micrometer \u66b4\u9732\u4e86\u4ee5\u4e0b\u6838\u5fc3\u6307\u6807\uff1a\n*   `active_count`\uff1a\u5f53\u524d\u6d3b\u8dc3\u7ebf\u7a0b\u6570\u3002\n*   `queue_size`\uff1a\u5f53\u524d\u961f\u5217\u5806\u79ef\u6570\u91cf\uff08**\u6700\u5173\u952e**\uff0c\u5982\u679c\u6301\u7eed\u589e\u957f\u8bf4\u660e\u5904\u7406\u80fd\u529b\u4e0d\u8db3\uff09\u3002\n*   `completed_task_count`\uff1a\u5df2\u5b8c\u6210\u4efb\u52a1\u603b\u6570\u3002\n*   `reject_count`\uff1a\u88ab\u62d2\u7edd\u7684\u4efb\u52a1\u6570\u3002\n\n**2. \u52a8\u6001\u8c03\u6574**\n\u6211\u4eec\u5f00\u53d1\u4e86\u52a8\u6001\u914d\u7f6e\u4e2d\u5fc3\uff0c\u652f\u6301\u5728\u8fd0\u884c\u65f6\u4fee\u6539 `corePoolSize` \u548c `maximumPoolSize`\uff0c\u65e0\u9700\u91cd\u542f\u670d\u52a1\u3002\n*   **\u573a\u666f**\uff1a\u5927\u4fc3\u671f\u95f4\uff0c\u53d1\u73b0\u961f\u5217\u5806\u79ef\u4e25\u91cd\uff0c\u901a\u8fc7\u914d\u7f6e\u4e2d\u5fc3\u4e00\u952e\u6269\u5927\u6838\u5fc3\u7ebf\u7a0b\u6570\uff0c\u5feb\u901f\u63d0\u5347\u541e\u5410\u91cf\u3002\n\n---\n\n### \u56db\u3001 \u603b\u7ed3\n\n\u4e00\u4e2a\u597d\u7684\u7ebf\u7a0b\u6c60\u8bbe\u8ba1\uff0c\u6211\u8ba4\u4e3a\u5e94\u8be5\u9075\u5faa\u4ee5\u4e0b\u539f\u5219\uff1a\n\n1.  **\u5fc5\u987b\u8bbe\u7f6e\u6709\u754c\u961f\u5217**\uff0c\u9632\u6b62 OOM\u3002\n2.  **\u533a\u5206 CPU/IO \u5bc6\u96c6\u578b**\uff0c\u79d1\u5b66\u8bbe\u7f6e\u7ebf\u7a0b\u6570\u3002\n3.  **\u614e\u91cd\u9009\u62e9\u62d2\u7edd\u7b56\u7565**\uff0c\u6838\u5fc3\u6570\u636e\u4e0d\u80fd\u4e22\uff0c\u5efa\u8bae\u4f7f\u7528 `CallerRunsPolicy` \u6216\u81ea\u5b9a\u4e49\u6301\u4e45\u5316\u7b56\u7565\u3002\n4.  **\u53ef\u89c2\u6d4b\u3001\u53ef\u5e72\u9884**\uff0c\u5fc5\u987b\u6709\u76d1\u63a7\u62a5\u8b66\uff0c\u4e14\u652f\u6301\u52a8\u6001\u53c2\u6570\u8c03\u6574\u3002\n\n\u8fd9\u5c31\u662f\u6211\u5bf9\u7ebf\u7a0b\u6c60\u8bbe\u8ba1\u7684\u7406\u89e3\u548c\u5b9e\u8df5\u65b9\u6848\u3002",

    "title": "* JVM GC\u4f18\u5316",
    "style": "",
    "details": "\u9762\u8bd5\u5b98\u60a8\u597d\uff0cJVM GC\uff08\u5783\u573e\u56de\u6536\uff09\u4f18\u5316\u662f Java \u540e\u7aef\u7814\u53d1\u8fc8\u5411\u9ad8\u7ea7\u548c\u67b6\u6784\u5e08\u7684\u5fc5\u7ecf\u4e4b\u8def\u3002\u5728\u5c0f\u7535\u79d1\u6280\u5904\u7406\u5343\u4e07\u7ea7\u8bbe\u5907\u9ad8\u5e76\u53d1\u6570\u636e\u3001\u4ee5\u53ca\u7f51\u6613\u8003\u62c9\u5e94\u5bf9\u53cc11\u5927\u4fc3\u65f6\uff0c\u6211\u90fd\u6df1\u5ea6\u53c2\u4e0e\u8fc7 JVM \u7684\u8c03\u4f18\u5de5\u4f5c\u3002\n\n\u6211\u8ba4\u4e3a GC \u4f18\u5316\u7684\u6838\u5fc3\u76ee\u6807\u4e0d\u662f\u6d88\u9664 GC\uff0c\u800c\u662f**\u5728\u6ee1\u8db3\u4e1a\u52a1\u541e\u5410\u91cf\u548c\u4f4e\u5ef6\u8fdf\u9700\u6c42\u7684\u524d\u63d0\u4e0b\uff0c\u89e3\u51b3\u7531 GC \u5f15\u53d1\u7684\u7cfb\u7edf\u5361\u987f\uff08STW\uff09\u6216 OOM \u95ee\u9898**\u3002\n\n\u4ee5\u4e0b\u662f\u6211\u7684 GC \u8c03\u4f18\u65b9\u6cd5\u8bba\u548c\u5b9e\u6218\u7ecf\u9a8c\uff1a\n\n### \u4e00\u3001 GC \u8c03\u4f18\u7684\u6838\u5fc3\u601d\u8def\n\nGC \u8c03\u4f18\u6ca1\u6709\u94f6\u5f39\uff0c\u4e0d\u80fd\u76f2\u76ee\u4fee\u6539\u53c2\u6570\u3002\u6211\u901a\u5e38\u9075\u5faa\u4ee5\u4e0b\u56db\u6b65\u95ed\u73af\uff1a\n\n1.  **\u660e\u786e\u4f18\u5316\u76ee\u6807**\uff1a\n    *   **\u541e\u5410\u91cf\u4f18\u5148**\uff08\u5982\u540e\u53f0\u8dd1\u6279\u3001\u79bb\u7ebf\u8ba1\u7b97\uff09\uff1a\u5173\u6ce8\u51cf\u5c11 GC \u603b\u8017\u65f6\u3002\n    *   **\u5ef6\u8fdf/\u54cd\u5e94\u4f18\u5148**\uff08\u5982\u4ea4\u6613\u7cfb\u7edf\u3001\u5b9e\u65f6\u8bbe\u5907\u5fc3\u8df3\u4e0a\u62a5\uff09\uff1a\u5173\u6ce8\u964d\u4f4e\u5355\u6b21 STW\uff08Stop-The-World\uff09\u7684\u6700\u5927\u505c\u987f\u65f6\u95f4\u3002\u8fd9\u4e5f\u662f\u7edd\u5927\u591a\u6570\u4e92\u8054\u7f51\u6838\u5fc3\u7cfb\u7edf\u7684\u8bc9\u6c42\u3002\n2.  **\u5efa\u7acb\u76d1\u63a7\u57fa\u7ebf**\uff1a\u901a\u8fc7 Prometheus + Grafana \u6216 JVM \u81ea\u5e26\u7684 VisualVM\uff0c\u89c2\u5bdf GC \u9891\u7387\u3001\u5404\u4ee3\u5185\u5b58\u53d8\u5316\u3001STW \u8017\u65f6\u3002\n3.  **\u5b9a\u4f4d\u74f6\u9888\uff0c\u5206\u6790\u65e5\u5fd7**\uff1a\u5f00\u542f\u5e76\u5206\u6790 GC \u65e5\u5fd7\uff08`-Xlog:gc*`\uff09\uff0c\u627e\u51fa\u662f Minor GC \u9891\u7e41\uff0c\u8fd8\u662f Full GC \u8017\u65f6\u8fc7\u957f\u3002\n4.  **\u8c03\u6574\u9a8c\u8bc1**\uff1a\u8c03\u6574 JVM \u53c2\u6570\uff0c\u538b\u6d4b\u9a8c\u8bc1\uff0c\u4e0a\u7ebf\u89c2\u5bdf\u3002\n\n---\n\n### \u4e8c\u3001 \u6838\u5fc3\u533a\u57df\u4e0e\u5e38\u89c1\u95ee\u9898\u5206\u6790\n\n\u6839\u636e\u4e1a\u52a1\u573a\u666f\uff0c\u6211\u4f1a\u9488\u5bf9\u6027\u5730\u4f18\u5316\u4e0d\u540c\u5185\u5b58\u533a\u57df\uff1a\n\n**1. \u5e74\u8f7b\u4ee3\u4f18\u5316\uff08\u89e3\u51b3 Minor GC \u9891\u7e41\uff09**\n*   **\u73b0\u8c61**\uff1a\u7cfb\u7edf\u541e\u5410\u91cf\u4e0b\u964d\uff0cGC \u7ebf\u7a0b\u9891\u7e41\u62a2\u5360 CPU\u3002\n*   **\u539f\u56e0**\uff1a\u5e74\u8f7b\u4ee3\uff08Eden \u533a\uff09\u7a7a\u95f4\u592a\u5c0f\uff0c\u5bf9\u8c61\u592a\u5feb\u586b\u6ee1\u5e76\u89e6\u53d1 Minor GC\u3002\n*   **\u4f18\u5316\u7b56\u7565**\uff1a\u9002\u5f53\u589e\u5927\u5e74\u8f7b\u4ee3\u6bd4\u4f8b\uff08\u8c03\u6574 `-XX:NewRatio` \u6216\u76f4\u63a5\u8bbe\u7f6e `-Xmn`\uff09\u3002\u8ba9\u77ed\u751f\u547d\u5468\u671f\u5bf9\u8c61\u5c3d\u91cf\u5728\u5e74\u8f7b\u4ee3\u5c31\u88ab\u56de\u6536\uff0c\u907f\u514d\u664b\u5347\u5230\u8001\u5e74\u4ee3\u3002\n\n**2. \u8001\u5e74\u4ee3\u4f18\u5316\uff08\u89e3\u51b3 Full GC/OOM\uff09**\n\u8fd9\u662f\u7ebf\u4e0a\u6700\u81f4\u547d\u7684\u95ee\u9898\u3002\u8001\u5e74\u4ee3\u88ab\u586b\u6ee1\u901a\u5e38\u6709\u4e09\u5927\u539f\u56e0\uff1a\n*   **\u5185\u5b58\u6cc4\u6f0f**\uff1a\u5bf9\u8c61\u65e0\u6cd5\u56de\u6536\u3002\u901a\u8fc7 `jmap -histo:live <pid>` \u6216\u5bfc\u51fa Heap Dump\uff08`jmap -dump`\uff09\uff0c\u4f7f\u7528 MAT\uff08Memory Analyzer Tool\uff09\u5206\u6790\u5927\u5bf9\u8c61\u5f15\u7528\u94fe\uff0c\u627e\u51fa\u6cc4\u6f0f\u70b9\u3002\n*   **\u5927\u5bf9\u8c61\u76f4\u63a5\u8fdb\u5165\u8001\u5e74\u4ee3**\uff1a\u5927\u91cf\u8d85\u8fc7 `PretenureSizeThreshold` \u7684\u5bf9\u8c61\u6216\u8d85\u957f\u6570\u7ec4\u76f4\u63a5\u6491\u7206\u8001\u5e74\u4ee3\u3002\u9700\u4f18\u5316\u4ee3\u7801\uff0c\u91c7\u7528\u5206\u9875\u6216\u6d41\u5f0f\u5904\u7406\u3002\n*   **\u5bf9\u8c61\u8fc7\u65e9\u664b\u5347**\uff1aSurvivor \u533a\u592a\u5c0f\uff0c\u6216\u5bf9\u8c61\u71ac\u8fc7\u4e86 15 \u6b21 Minor GC\uff08`MaxTenuringThreshold`\uff09\uff0c\u5bfc\u81f4\u8001\u5e74\u4ee3\u8fc5\u901f\u88ab\u586b\u6ee1\uff0c\u9891\u7e41\u89e6\u53d1 Full GC\u3002\u6211\u4f1a\u9002\u5f53\u8c03\u5927 Survivor \u533a\u6bd4\u4f8b\uff08`-XX:SurvivorRatio`\uff09\u3002\n\n---\n\n### \u4e09\u3001 \u5783\u573e\u6536\u96c6\u5668\u7684\u9009\u62e9\u7b56\u7565\n\n\u4e0d\u540c\u7684\u6536\u96c6\u5668\u51b3\u5b9a\u4e86 GC \u7684\u8868\u73b0\u3002\u7ed3\u5408\u6211\u7684\u9879\u76ee\u7ecf\u9a8c\uff1a\n\n1.  **JDK 8 \u73af\u5883\uff08\u7edd\u5927\u591a\u6570\u751f\u4ea7\u73af\u5883\uff09**\n    *   **\u9996\u9009 CMS\uff08Concurrent Mark Sweep\uff09**\u6216 **ParNew + CMS** \u7ec4\u5408\u3002\n    *   **\u914d\u7f6e\u91cd\u70b9**\uff1aCMS \u91c7\u7528\u6807\u8bb0-\u6e05\u9664\u7b97\u6cd5\uff0c\u4f1a\u4ea7\u751f\u5185\u5b58\u788e\u7247\u3002\u5fc5\u987b\u8bbe\u7f6e `-XX:CMSFullGCsBeforeCompaction=5`\uff085\u6b21 Full GC \u540e\u6574\u7406\u788e\u7247\uff09\u548c `-XX:+UseCMSCompactAtFullCollection`\uff0c\u9632\u6b62\u8001\u5e74\u4ee3\u788e\u7247\u5316\u5bfc\u81f4\u7684 Concurrent Mode Failure\u3002\n2.  **JDK 11 \u53ca\u4ee5\u4e0a\u73af\u5883**\n    *   **\u9996\u9009 G1\uff08Garbage-First\uff09**\u3002G1 \u5c06\u5806\u5212\u5206\u4e3a\u591a\u4e2a Region\uff0c\u80fd\u66f4\u597d\u63a7\u5236\u505c\u987f\u65f6\u95f4\u3002\n    *   **\u914d\u7f6e\u91cd\u70b9**\uff1a\u8bbe\u7f6e\u671f\u671b\u7684\u505c\u987f\u65f6\u95f4\u76ee\u6807 `-XX:MaxGCPauseMillis=200`\uff08\u9ed8\u8ba4200ms\uff09\uff0cG1 \u4f1a\u6839\u636e\u8fd9\u4e2a\u65f6\u95f4\u52a8\u6001\u8c03\u6574\u56de\u6536\u7684 Region \u6570\u91cf\u3002\u907f\u514d\u8bbe\u7f6e `-Xmn`\uff08\u5e74\u8f7b\u4ee3\u5927\u5c0f\uff09\uff0c\u8ba9 G1 \u81ea\u884c\u6839\u636e\u505c\u987f\u65f6\u95f4\u52a8\u6001\u8c03\u6574\u5e74\u8f7b\u4ee3\u6bd4\u4f8b\u3002\n\n---\n\n### \u56db\u3001 \u5b9e\u6218\u6848\u4f8b\u5206\u4eab\n\n**\u6848\u4f8b\uff1a\u5c0f\u7535\u79d1\u6280\u8bbe\u5907\u8f68\u8ff9\u4e0a\u62a5\u63a5\u53e3\u5076\u53d1\u6027\u8d85\u65f6**\n\n**1. \u73b0\u8c61**\n\u9ad8\u5cf0\u671f\uff0c\u8bbe\u5907\u8f68\u8ff9\u5165\u5e93\u63a5\u53e3\u5076\u53d1\u54cd\u5e94\u8d85\u65f6\uff08RT \u98d9\u5347\u5230 1 \u79d2\u4ee5\u4e0a\uff09\uff0c\u7cfb\u7edf\u672a\u53d1\u751f OOM\u3002\n\n**2. \u6392\u67e5\u8fc7\u7a0b**\n*   \u67e5\u770b\u76d1\u63a7\u53d1\u73b0\uff0c\u8d85\u65f6\u65f6\u95f4\u70b9\u4e0e GC \u65e5\u5fd7\u4e2d\u7684 STW \u505c\u987f\u65f6\u95f4\u5b8c\u5168\u543b\u5408\u3002\n*   \u5206\u6790 GC \u65e5\u5fd7\u53d1\u73b0\uff0c\u8001\u5e74\u4ee3\u4f7f\u7528\u7387\u5728\u8fbe\u5230 80% \u65f6\u89e6\u53d1\u4e86 CMS \u7684\u5e76\u53d1\u6807\u8bb0\u548c\u6e05\u9664\u3002\u4f46\u7531\u4e8e\u4e1a\u52a1\u91cf\u592a\u5927\uff0c**\u5e76\u53d1\u6e05\u7406\u7684\u901f\u5ea6\u8ddf\u4e0d\u4e0a\u5bf9\u8c61\u5206\u914d\u7684\u901f\u5ea6**\uff0c\u6700\u7ec8\u89e6\u53d1\u4e86\u515c\u5e95\u7684 Serial Old\uff08\u5355\u7ebf\u7a0b\u6536\u96c6\u5668\uff09\u8fdb\u884c Full GC\uff0c\u5bfc\u81f4\u957f\u8fbe 1~2 \u79d2\u7684 STW \u505c\u987f\uff08Concurrent Mode Failure\uff09\u3002\n\n**3. \u4f18\u5316\u65b9\u6848**\n*   **\u6269\u5927\u5806\u5185\u5b58**\uff1a\u7269\u7406\u673a\u5185\u5b58\u5145\u8db3\uff0c\u5c06 `-Xmx` \u4ece 4G \u63d0\u5347\u5230 8G\u3002\n*   **\u8c03\u6574 CMS \u89e6\u53d1\u9608\u503c**\uff1a\u5c06 CMS \u5e76\u53d1\u6807\u8bb0\u7684\u89e6\u53d1\u9608\u503c\u63d0\u524d\uff0c\u4ece\u9ed8\u8ba4\u7684 68% (`-XX:CMSInitiatingOccupancyFraction=68`) \u4fee\u6539\u4e3a **60%**\uff0c\u8ba9 CMS \u6709\u8db3\u591f\u7684\u65f6\u95f4\u5728\u8001\u5e74\u4ee3\u586b\u6ee1\u524d\u5b8c\u6210\u5783\u573e\u56de\u6536\u3002\n*   **\u4ee3\u7801\u5c42\u9762\u8f85\u52a9**\uff1a\u53d1\u73b0\u8f68\u8ff9\u4e0a\u62a5\u63a5\u53e3\u4e00\u6b21\u6027\u6279\u91cf\u67e5\u8be2\u4e86\u8fc7\u5927\u7684 List\uff0c\u4f18\u5316\u4e3a\u5206\u6279\u5904\u7406\uff0c\u51cf\u5c11\u77ac\u65f6\u5185\u5b58\u5206\u914d\u901f\u7387\u3002\n\n**4. \u6210\u679c**\n\u4f18\u5316\u540e\uff0c\u5f7b\u5e95\u6d88\u9664\u4e86 Serial Old \u7684 Full GC \u73b0\u8c61\uff0c\u5355\u6b21 GC \u505c\u987f\u65f6\u95f4\u7a33\u5b9a\u5728 50ms \u4ee5\u5185\uff0c\u63a5\u53e3 RT \u6062\u590d\u6b63\u5e38\uff0c\u6709\u6548\u652f\u6491\u4e86\u5343\u4e07\u7ea7\u8bbe\u5907\u7684\u9ad8\u9891\u4e0a\u62a5\u3002\n\n---\n\n### \u603b\u7ed3\n\n\u7efc\u4e0a\uff0c\u5bf9\u4e8e JVM GC \u4f18\u5316\uff0c\u6211\u7684\u6838\u5fc3\u7406\u5ff5\u662f\uff1a**\u4ee3\u7801\u5c42\u9762\u7684\u4f18\u5316\uff08\u51cf\u5c11\u4e0d\u5fc5\u8981\u7684\u5bf9\u8c61\u521b\u5efa\u3001\u9632\u6b62\u5185\u5b58\u6cc4\u6f0f\uff09\u6c38\u8fdc\u5927\u4e8e JVM \u53c2\u6570\u7684\u8c03\u4f18**\u3002\u53c2\u6570\u8c03\u4f18\u662f\u9526\u4e0a\u6dfb\u82b1\uff0c\u800c\u4ee3\u7801\u5065\u58ee\u624d\u662f\u57fa\u77f3\u3002\u540c\u65f6\uff0c\u5efa\u7acb\u5b8c\u5584\u7684\u76d1\u63a7\u9884\u8b66\u673a\u5236\uff0c\u624d\u80fd\u9632\u60a3\u4e8e\u672a\u7136\u3002",

    "title": "* Redis\u70ed\u70b9\u95ee\u9898",
    "style": "",
    "details": "\u9762\u8bd5\u5b98\u60a8\u597d\uff0cRedis \u70ed\u70b9 Key \u95ee\u9898\u662f\u6307\u67d0\u4e2a\u6216\u67d0\u4e9b Key \u5728\u77ed\u65f6\u95f4\u5185\u88ab\u6781\u9ad8\u9891\u7387\u5730\u8bbf\u95ee\uff0c\u5bfc\u81f4\u8be5 Key \u6240\u5728\u7684 Redis \u5206\u7247\u8282\u70b9\u6d41\u91cf\u8d1f\u8f7d\u8fc7\u9ad8\uff0c\u751a\u81f3\u7f51\u5361\u6253\u6ee1\u3001CPU \u98d9\u5347\uff0c\u8fdb\u800c\u5f15\u53d1\u8282\u70b9\u5b95\u673a\u6216\u5f71\u54cd\u8be5\u8282\u70b9\u4e0a\u5176\u4ed6 Key \u7684\u8bbf\u95ee\u3002\n\n\u5728\u6211\u7684\u67b6\u6784\u7ecf\u9a8c\u4e2d\uff0c\u89e3\u51b3\u70ed\u70b9 Key \u95ee\u9898\u901a\u5e38\u5206\u4e3a **\u201c\u53d1\u73b0\u8bc6\u522b\u201d** \u548c **\u201c\u89e3\u51b3\u65b9\u6848\u201d** \u4e24\u4e2a\u9636\u6bb5\u3002\n\n### \u4e00\u3001 \u5982\u4f55\u53d1\u73b0\u70ed\u70b9 Key\uff1f\n\n\u5728\u89e3\u51b3\u95ee\u9898\u4e4b\u524d\uff0c\u6211\u4eec\u9996\u5148\u8981\u80fd\u8bc6\u522b\u51fa\u8c01\u662f\u70ed\u70b9 Key\u3002\u901a\u5e38\u6709\u4ee5\u4e0b\u51e0\u79cd\u624b\u6bb5\uff1a\n\n1.  **\u5ba2\u6237\u7aef\u7edf\u8ba1**\uff1a\u5728 Redis \u5ba2\u6237\u7aef\u4ee3\u7801\u4e2d\u57cb\u70b9\uff0c\u7edf\u8ba1\u6bcf\u4e2a Key \u7684\u8bbf\u95ee\u9891\u7387\uff0c\u5b9a\u671f\u4e0a\u62a5\u5230\u76d1\u63a7\u7cfb\u7edf\u3002\n2.  **Proxy \u5c42\u7edf\u8ba1**\uff1a\u5982\u679c\u67b6\u6784\u4e2d\u6709 Twemproxy \u6216 Codis \u7b49\u4ee3\u7406\u5c42\uff0c\u53ef\u4ee5\u5728\u4ee3\u7406\u5c42\u8fdb\u884c\u7edf\u8ba1\u3002\n3.  **Redis \u76d1\u63a7\u547d\u4ee4**\uff1a\u4f7f\u7528 `redis-cli --hotkeys` \u9009\u9879\uff08\u6ce8\u610f\uff1a\u8be5\u547d\u4ee4\u4f1a\u963b\u585e Redis\uff0c\u5efa\u8bae\u5728\u4ece\u8282\u70b9\u6216\u4f4e\u5cf0\u671f\u6267\u884c\uff0c\u4e14\u4ec5\u9002\u7528\u4e8e LFU \u6dd8\u6c70\u7b56\u7565\u7684\u573a\u666f\uff09\u3002\n4.  **\u6293\u5305\u5206\u6790**\uff1a\u5229\u7528 TCP \u6293\u5305\u5de5\u5177\uff08\u5982 tcpdump\uff09\u5206\u6790 Redis \u7aef\u53e3\u7684\u6d41\u91cf\uff0c\u7edf\u8ba1\u9ad8\u9891\u8bbf\u95ee\u7684 Key\u3002\n\n### \u4e8c\u3001 \u89e3\u51b3\u65b9\u6848\n\n\u9488\u5bf9\u4e0d\u540c\u7c7b\u578b\u7684\u70ed\u70b9 Key\uff08\u8bfb\u70ed\u70b9\u3001\u5199\u70ed\u70b9\uff09\uff0c\u6211\u91c7\u53d6\u4e0d\u540c\u7684\u7b56\u7565\uff1a\n\n#### 1. \u8bfb\u70ed\u70b9\u89e3\u51b3\u65b9\u6848\n\n**\u573a\u666f**\uff1a\u6bd4\u5982\u67d0\u4e2a\u7f51\u7ea2\u95e8\u5e97\u7684\u8bbe\u5907\u4fe1\u606f\u3001\u70ed\u95e8\u6d3b\u52a8\u7684\u914d\u7f6e\u4fe1\u606f\uff0cQPS \u77ac\u95f4\u8fbe\u5230 10\u4e07+\u3002\n\n**\u65b9\u6848\u4e00\uff1a\u672c\u5730\u7f13\u5b58\u2014\u2014 \u6700\u6709\u6548\u624b\u6bb5**\n*   **\u539f\u7406**\uff1a\u5728\u5e94\u7528\u670d\u52a1\u5668\u672c\u5730\u5185\u5b58\u4e2d\u7f13\u5b58\u4e00\u4efd\u70ed\u70b9 Key \u7684\u526f\u672c\u3002\n*   **\u5b9e\u73b0**\uff1a\u4f7f\u7528 Guava Cache \u6216 Caffeine \u6784\u5efa\u672c\u5730\u7f13\u5b58\u3002\n*   **\u4f18\u52bf**\uff1a\u8bf7\u6c42\u76f4\u63a5\u5728 JVM \u5185\u5b58\u4e2d\u8fd4\u56de\uff0c\u5b8c\u5168\u4e0d\u7ecf\u8fc7\u7f51\u7edc\uff0c\u80fd\u6781\u5927\u964d\u4f4e Redis \u7684\u538b\u529b\u3002\n*   **\u6311\u6218**\uff1a\u672c\u5730\u7f13\u5b58\u7684\u4e00\u81f4\u6027\u95ee\u9898\u3002\n    *   **\u5bf9\u7b56**\uff1a\u5bf9\u4e8e\u4e00\u81f4\u6027\u8981\u6c42\u4e0d\u9ad8\u7684\u6570\u636e\uff0c\u8bbe\u7f6e\u8f83\u77ed\u7684\u8d85\u65f6\u65f6\u95f4\uff08\u5982 10-30\u79d2\uff09\uff1b\u5bf9\u4e8e\u4e00\u81f4\u6027\u8981\u6c42\u9ad8\u7684\u6570\u636e\uff0c\u5229\u7528\u914d\u7f6e\u4e2d\u5fc3\uff08\u5982 Nacos\uff09\u6216 Pub/Sub \u673a\u5236\uff0c\u5f53\u6570\u636e\u53d8\u66f4\u65f6\u5e7f\u64ad\u901a\u77e5\u6240\u6709\u5e94\u7528\u8282\u70b9\u6e05\u9664\u672c\u5730\u7f13\u5b58\u3002\n\n**\u65b9\u6848\u4e8c\uff1aKey \u52a0\u524d\u7f00\u5206\u7247\u2014\u2014 \u62c6\u5206\u538b\u529b**\n*   **\u539f\u7406**\uff1a\u5c06\u4e00\u4e2a\u70ed\u70b9 Key \u201c\u62c6\u5206\u201d\u6210\u591a\u4e2a Key\uff0c\u5206\u6563\u5230\u4e0d\u540c\u7684 Redis \u5206\u7247\u8282\u70b9\u4e0a\u3002\n*   **\u5b9e\u73b0**\uff1a\n    *   \u539f\u672c Key \u4e3a `device_info_1001`\u3002\n    *   \u73b0\u5728\u6539\u4e3a `device_info_1001_0`\u3001`device_info_1001_1` ... `device_info_1001_9`\uff0c\u5171 10 \u4e2a Key\uff0c\u5b58\u50a8\u76f8\u540c\u7684\u6570\u636e\u3002\n    *   \u5728\u8bfb\u5199\u65f6\uff0c\u968f\u673a\u9009\u62e9\u4e00\u4e2a\u540e\u7f00\u8fdb\u884c\u64cd\u4f5c\u3002\n*   **\u4f18\u52bf**\uff1a\u5c06\u5355\u8282\u70b9\u7684\u538b\u529b\u5206\u6563\u5230\u591a\u4e2a\u8282\u70b9\uff0c\u6210\u500d\u63d0\u5347\u8bfb\u5199\u80fd\u529b\u3002\n*   **\u6311\u6218**\uff1a\u6570\u636e\u66f4\u65b0\u65f6\u9700\u8981\u540c\u65f6\u66f4\u65b0\u6240\u6709\u5206\u7247 Key\uff0c\u5b58\u5728\u77ed\u6682\u7684\u4e0d\u4e00\u81f4\u98ce\u9669\uff08\u901a\u5e38\u4e1a\u52a1\u53ef\u63a5\u53d7\uff09\u3002\n\n#### 2. \u5199\u70ed\u70b9\u89e3\u51b3\u65b9\u6848\n\n**\u573a\u666f**\uff1a\u6bd4\u5982\u5927\u4fc3\u671f\u95f4\u79d2\u6740\u6d3b\u52a8\uff0c\u5927\u91cf\u8bf7\u6c42\u540c\u65f6\u5199\u5165\u540c\u4e00\u4e2a Key\uff08\u5982\u5e93\u5b58\u6263\u51cf\uff09\u3002\n\n**\u65b9\u6848\u4e00\uff1a\u6d88\u606f\u961f\u5217\u524a\u5cf0\u586b\u8c37**\n*   **\u539f\u7406**\uff1a\u4e0d\u76f4\u63a5\u5199 Redis\uff0c\u800c\u662f\u5c06\u5199\u8bf7\u6c42\u5199\u5165 Kafka/RocketMQ\u3002\n*   **\u5b9e\u73b0**\uff1a\u540e\u7aef\u6d88\u8d39\u670d\u52a1\u4ee5 Redis \u80fd\u591f\u627f\u53d7\u7684\u901f\u7387\u6d88\u8d39\u6d88\u606f\uff0c\u6162\u6162\u66f4\u65b0 Redis\u3002\n*   **\u4f18\u52bf**\uff1a\u4fdd\u62a4 Redis \u4e0d\u88ab\u77ac\u95f4\u7684\u9ad8\u5e76\u53d1\u5199\u8bf7\u6c42\u6253\u6302\u3002\n\n**\u65b9\u6848\u4e8c\uff1a\u5206\u5e03\u5f0f\u9501 + \u4e32\u884c\u5316**\n*   **\u539f\u7406**\uff1a\u5bf9\u4e8e\u5fc5\u987b\u4fdd\u8bc1\u5f3a\u4e00\u81f4\u6027\u7684\u5199\u64cd\u4f5c\uff0c\u4f7f\u7528\u5206\u5e03\u5f0f\u9501\u9650\u5236\u5e76\u53d1\u3002\n*   **\u5b9e\u73b0**\uff1a\u53ea\u6709\u62ff\u5230\u9501\u7684\u7ebf\u7a0b\u624d\u80fd\u53bb\u66f4\u65b0 Redis\uff0c\u907f\u514d\u5927\u91cf\u7ebf\u7a0b\u7ade\u4e89\u540c\u4e00 Key \u5bfc\u81f4\u7684\u9501\u7ade\u4e89\u548c CPU \u6d88\u8017\u3002\n\n### \u4e09\u3001 \u5b9e\u6218\u7ecf\u9a8c\u603b\u7ed3\n\n\u5728\u5c0f\u7535\u79d1\u6280\u7684\u9879\u76ee\u4e2d\uff0c\u6211\u4eec\u66fe\u9047\u5230\u8fc7\u201c\u70ed\u95e8\u533a\u57df\u95e8\u5e97\u4fe1\u606f\u201d\u7684\u8bfb\u70ed\u70b9\u95ee\u9898\u3002\n\n**\u6211\u7684\u5904\u7406\u7b56\u7565\u662f\uff1a**\n1.  **\u4f18\u5148\u672c\u5730\u7f13\u5b58**\uff1a\u6211\u4eec\u5728\u5e94\u7528\u5c42\u5f15\u5165\u4e86 Caffeine \u672c\u5730\u7f13\u5b58\uff0c\u8bbe\u7f6e\u4e86 30 \u79d2\u7684\u8fc7\u671f\u65f6\u95f4\uff0c\u62e6\u622a\u4e86 90% \u4ee5\u4e0a\u7684\u8bf7\u6c42\u3002\n2.  **\u8f85\u52a9\u76d1\u63a7\u544a\u8b66**\uff1a\u6211\u4eec\u5728 Redis \u76d1\u63a7\u5927\u76d8\u4e2d\u914d\u7f6e\u4e86\u5355 Key QPS \u9608\u503c\u544a\u8b66\uff0c\u4e00\u65e6\u53d1\u73b0\u70ed\u70b9\u82d7\u5934\uff0c\u7cfb\u7edf\u4f1a\u81ea\u52a8\u89e6\u53d1\u9884\u6848\uff08\u5982\u81ea\u52a8\u5f00\u542f\u672c\u5730\u7f13\u5b58\u5f00\u5173\uff09\u3002\n\n\u901a\u8fc7\u8fd9\u79cd **\u201c\u672c\u5730\u7f13\u5b58\u4e3a\u4e3b\uff0c\u5206\u5e03\u5f0f\u7f13\u5b58\u4e3a\u8f85\u201d** \u7684\u591a\u7ea7\u7f13\u5b58\u67b6\u6784\uff0c\u6211\u4eec\u6210\u529f\u89e3\u51b3\u4e86\u591a\u6b21\u7a81\u53d1\u6d41\u91cf\u5e26\u6765\u7684\u70ed\u70b9 Key \u95ee\u9898\uff0c\u4fdd\u969c\u4e86\u6838\u5fc3\u4ea4\u6613\u94fe\u8def\u7684\u7a33\u5b9a\u6027\u3002",

    "title": "* \u6570\u636e\u5e93\u7d22\u5f15\u4f18\u5316",
    "style": "",
    "details": "\u9762\u8bd5\u5b98\u60a8\u597d\uff0c\u6570\u636e\u5e93\u7d22\u5f15\u4f18\u5316\u662f\u540e\u7aef\u6027\u80fd\u4f18\u5316\u7684\u57fa\u77f3\u3002\u5728\u5c0f\u7535\u79d1\u6280\u5904\u7406\u5343\u4e07\u7ea7\u8bbe\u5907\u6570\u636e\u548c\u7f51\u6613\u8003\u62c9\u5e94\u5bf9\u5927\u4fc3\u6d41\u91cf\u65f6\uff0c\u6211\u79ef\u7d2f\u4e86\u4e30\u5bcc\u7684\u7d22\u5f15\u4f18\u5316\u5b9e\u6218\u7ecf\u9a8c\u3002\n\n\u6211\u8ba4\u4e3a\u7d22\u5f15\u4f18\u5316\u662f\u4e00\u4e2a\u7cfb\u7edf\u5de5\u7a0b\uff0c\u6838\u5fc3\u5728\u4e8e**\u201c\u5efa\u7acb\u5408\u9002\u7684\u7d22\u5f15\u201d**\u548c**\u201c\u9632\u6b62\u7d22\u5f15\u5931\u6548\u201d**\u3002\u4ee5\u4e0b\u662f\u6211\u7684\u8be6\u7ec6\u601d\u8def\uff1a\n\n### \u4e00\u3001 \u7d22\u5f15\u8bbe\u8ba1\u539f\u5219\uff08\u5982\u4f55\u5efa\u7acb\u5408\u9002\u7684\u7d22\u5f15\uff09\n\n\u7d22\u5f15\u4e0d\u662f\u8d8a\u591a\u8d8a\u597d\uff0c\u8fc7\u591a\u7684\u7d22\u5f15\u4f1a\u5360\u7528\u5b58\u50a8\u7a7a\u95f4\uff0c\u4e14\u964d\u4f4e\u5199\u5165\u6027\u80fd\uff08Insert/Update/Delete \u9700\u8981\u7ef4\u62a4\u7d22\u5f15\u6811\uff09\u3002\u6211\u9075\u5faa\u4ee5\u4e0b\u539f\u5219\uff1a\n\n**1. \u6700\u5de6\u524d\u7f00\u539f\u5219\u4e0e\u8054\u5408\u7d22\u5f15**\n\u8fd9\u662f\u7d22\u5f15\u8bbe\u8ba1\u7684\u6838\u5fc3\u3002\u6211\u4f1a\u5c06\u67e5\u8be2\u9891\u7387\u9ad8\u3001\u533a\u5206\u5ea6\u9ad8\uff08Cardinality \u9ad8\uff09\u7684\u5b57\u6bb5\u653e\u5728\u8054\u5408\u7d22\u5f15\u7684\u6700\u5de6\u4fa7\u3002\n*   **\u6848\u4f8b**\uff1a\u5728\u8ba2\u5355\u67e5\u8be2\u573a\u666f\u4e2d\uff0cSQL \u7ecf\u5e38\u662f `SELECT * FROM order WHERE user_id = ? AND status = ?`\u3002\n*   **\u8bbe\u8ba1**\uff1a\u5efa\u7acb\u8054\u5408\u7d22\u5f15 `idx_user_status (user_id, status)`\u3002\n    *   \u8be5\u7d22\u5f15\u652f\u6301 `user_id` \u5355\u5b57\u6bb5\u67e5\u8be2\uff0c\u4e5f\u652f\u6301 `user_id + status` \u8054\u5408\u67e5\u8be2\u3002\n    *   \u901a\u8fc7\u201c\u8986\u76d6\u7d22\u5f15\u201d\u673a\u5236\uff0c\u67e5\u8be2\u76f4\u63a5\u4ece\u7d22\u5f15\u4e2d\u83b7\u53d6\u6570\u636e\uff0c\u65e0\u9700\u56de\u8868\uff0c\u6781\u5927\u63d0\u5347\u67e5\u8be2\u901f\u5ea6\u3002\n\n**2. \u533a\u5206\u5ea6\u9ad8\u7684\u5217\u4f18\u5148**\n\u533a\u5206\u5ea6\u4f4e\u7684\u5b57\u6bb5\uff08\u5982\u6027\u522b\u3001\u72b6\u6001\u53ea\u6709\u4e24\u4e09\u4e2a\u503c\uff09\u5355\u72ec\u5efa\u7d22\u5f15\u6548\u679c\u6781\u5dee\u3002\n*   **\u7ecf\u9a8c**\uff1a\u5728\u8bbe\u5907\u8868\u4e2d\uff0c`device_status` \u53ea\u6709 0 \u548c 1\uff0c\u533a\u5206\u5ea6\u6781\u4f4e\u3002\u5982\u679c\u5355\u72ec\u5efa\u7d22\u5f15\uff0c\u4f18\u5316\u5668\u5927\u6982\u7387\u4f1a\u8d70\u5168\u8868\u626b\u63cf\u3002\u6211\u4f1a\u5c06\u5176\u4e0e\u5176\u4ed6\u9ad8\u533a\u5206\u5ea6\u5b57\u6bb5\uff08\u5982 `device_id`\uff09\u7ec4\u5408\u6210\u8054\u5408\u7d22\u5f15\u3002\n\n**3. \u63a7\u5236\u7d22\u5f15\u6570\u91cf**\n*   \u5355\u8868\u7d22\u5f15\u6570\u91cf\u5efa\u8bae\u63a7\u5236\u5728 **5 \u4e2a\u4ee5\u5185**\u3002\n*   \u8fc7\u591a\u7684\u7d22\u5f15\u4f1a\u5bfc\u81f4\u4f18\u5316\u5668\u5728\u9009\u62e9\u6267\u884c\u8ba1\u5212\u65f6\u6210\u672c\u6838\u7b97\u504f\u5dee\uff0c\u53ef\u80fd\u51fa\u73b0\u9009\u9519\u7d22\u5f15\u7684\u60c5\u51b5\u3002\n\n**4. \u524d\u7f00\u7d22\u5f15**\n\u5bf9\u4e8e VARCHAR \u7c7b\u578b\u7684\u957f\u5b57\u7b26\u4e32\u5b57\u6bb5\uff08\u5982 URL\u3001\u90ae\u7bb1\uff09\uff0c\u6211\u4f1a\u4f7f\u7528\u524d\u7f00\u7d22\u5f15 `index(email(10))`\uff0c\u65e2\u8282\u7701\u7a7a\u95f4\uff0c\u53c8\u80fd\u8fc7\u6ee4\u5927\u90e8\u5206\u6570\u636e\u3002\u4f46\u8981\u6ce8\u610f\uff0c\u524d\u7f00\u7d22\u5f15\u65e0\u6cd5\u7528\u4e8e `ORDER BY` \u548c `GROUP BY`\u3002\n\n---\n\n### \u4e8c\u3001 \u7d22\u5f15\u5931\u6548\u573a\u666f\uff08\u5982\u4f55\u9632\u6b62\u7d22\u5f15\u5931\u6548\uff09\n\n\u5f88\u591a\u65f6\u5019\u7d22\u5f15\u5efa\u7acb\u4e86\u5374\u4e0d\u751f\u6548\uff0c\u8fd9\u662f\u5f00\u53d1\u4e2d\u6700\u5e38\u89c1\u7684\u6027\u80fd\u9677\u9631\u3002\u7ed3\u5408\u6211\u7684 Code Review \u7ecf\u9a8c\uff0c\u4ee5\u4e0b\u60c5\u51b5\u4f1a\u5bfc\u81f4\u7d22\u5f15\u5931\u6548\uff1a\n\n**1. \u5bf9\u7d22\u5f15\u5217\u8fdb\u884c\u51fd\u6570\u8fd0\u7b97\u6216\u8ba1\u7b97**\n\u8fd9\u662f\u6700\u5e38\u89c1\u7684\u9519\u8bef\u3002\n*   **\u9519\u8bef\u5199\u6cd5**\uff1a`SELECT * FROM user WHERE DATE(create_time) = '2023-10-01'`\u3002\n    *   \u6570\u636e\u5e93\u65e0\u6cd5\u76f4\u63a5\u4f7f\u7528 `create_time` \u7d22\u5f15\uff0c\u56e0\u4e3a\u6bcf\u4e00\u884c\u90fd\u9700\u8981\u8ba1\u7b97\u4e00\u6b21\u3002\n*   **\u4f18\u5316\u65b9\u6848**\uff1a\u6539\u4e3a\u8303\u56f4\u67e5\u8be2 `WHERE create_time BETWEEN '2023-10-01 00:00:00' AND '2023-10-01 23:59:59'`\u3002\n\n**2. \u9690\u5f0f\u7c7b\u578b\u8f6c\u6362**\n*   **\u573a\u666f**\uff1a\u5b57\u6bb5 `phone` \u662f VARCHAR \u7c7b\u578b\uff0cSQL \u5199\u6210 `WHERE phone = 13800000000`\uff08\u6570\u5b57\uff09\u3002\n*   **\u540e\u679c**\uff1aMySQL \u4f1a\u8fdb\u884c\u9690\u5f0f\u8f6c\u6362\uff0c\u76f8\u5f53\u4e8e\u5bf9\u6bcf\u4e00\u884c\u6267\u884c `CAST(phone AS SIGNED)`\uff0c\u5bfc\u81f4\u7d22\u5f15\u5931\u6548\u5168\u8868\u626b\u63cf\u3002\n*   **\u89c4\u8303**\uff1a\u53c2\u6570\u7c7b\u578b\u5fc5\u987b\u4e0e\u5b57\u6bb5\u7c7b\u578b\u4e25\u683c\u4e00\u81f4\u3002\n\n**3. \u8054\u5408\u7d22\u5f15\u987a\u5e8f\u9519\u8bef**\n\u5efa\u7acb\u4e86 `(a, b, c)` \u7d22\u5f15\uff0c\u4f46\u67e5\u8be2\u6761\u4ef6\u53ea\u6709 `b` \u6216 `c`\uff0c\u6216\u8005 `a` \u548c `c`\uff08\u8df3\u8fc7\u4e86 `b`\uff09\uff0c\u7d22\u5f15\u4f1a\u90e8\u5206\u5931\u6548\u6216\u5b8c\u5168\u5931\u6548\u3002\n\n**4. \u4f7f\u7528 `!=` \u6216 `<>`\u3001`NOT IN`**\n\u8fd9\u4e9b\u64cd\u4f5c\u7b26\u4f1a\u5bfc\u81f4\u4f18\u5316\u5668\u653e\u5f03\u7d22\u5f15\u8d70\u5168\u8868\u626b\u63cf\u3002\u5bf9\u4e8e\u5927\u6570\u636e\u91cf\u8868\uff0c\u6211\u4f1a\u5c06\u5176\u6539\u5199\u4e3a `IN` \u6216 `LEFT JOIN` \u7684\u5f62\u5f0f\u3002\n\n**5. `LIKE` \u67e5\u8be2\u4ee5 `%` \u5f00\u5934**\n*   `LIKE 'abc%'`\uff1a\u8d70\u7d22\u5f15\uff08\u8303\u56f4\u626b\u63cf\uff09\u3002\n*   `LIKE '%abc'`\uff1a\u7d22\u5f15\u5931\u6548\u3002\u5982\u679c\u5fc5\u987b\u6a21\u7cca\u67e5\u8be2\uff0c\u6211\u4f1a\u8003\u8651\u4f7f\u7528 Elasticsearch \u6216\u5c06\u5b57\u7b26\u4e32\u53cd\u8f6c\u5b58\u50a8\u3002\n\n---\n\n### \u4e09\u3001 \u7ebf\u4e0a\u6392\u67e5\u4e0e\u4f18\u5316\u5b9e\u6218\n\n**\u6848\u4f8b\uff1a\u5c0f\u7535\u8bbe\u5907\u8f68\u8ff9\u67e5\u8be2\u6162**\n\n**1. \u95ee\u9898\u53d1\u73b0**\n\u76d1\u63a7\u7cfb\u7edf\u62a5\u8b66\uff0c\u67d0\u8bbe\u5907\u8f68\u8ff9\u67e5\u8be2\u63a5\u53e3 TP99 \u8d85\u8fc7 2 \u79d2\u3002\n\n**2. \u6392\u67e5\u8fc7\u7a0b**\n*   \u4f7f\u7528 `EXPLAIN` \u5206\u6790 SQL\uff1a`EXPLAIN SELECT * FROM device_track WHERE device_id = 'xxx' ORDER BY create_time DESC LIMIT 10`\u3002\n*   \u53d1\u73b0 `type` \u4e3a `ALL`\uff08\u5168\u8868\u626b\u63cf\uff09\uff0c`rows` \u8fbe\u5230\u767e\u4e07\u7ea7\u3002\n*   \u867d\u7136\u8868\u91cc\u6709 `idx_device_id` \u7d22\u5f15\uff0c\u4f46 `ORDER BY` \u64cd\u4f5c\u5bfc\u81f4\u5927\u91cf\u56de\u8868\u548c\u6587\u4ef6\u6392\u5e8f\u3002\n\n**3. \u4f18\u5316\u65b9\u6848**\n*   \u5efa\u7acb\u8054\u5408\u7d22\u5f15 `idx_device_time (device_id, create_time)`\u3002\n*   \u5229\u7528\u7d22\u5f15\u7684\u6709\u5e8f\u6027\uff1aInnoDB \u4f1a\u5148\u6309 `device_id` \u8fc7\u6ee4\uff0c\u8fc7\u6ee4\u540e\u7684\u6570\u636e\u5df2\u7ecf\u662f\u6309 `create_time` \u6392\u597d\u5e8f\u7684\u3002\n*   **\u7ed3\u679c**\uff1a`Extra` \u5b57\u6bb5\u663e\u793a `Using index`\uff0c\u67e5\u8be2\u65f6\u95f4\u4ece 2 \u79d2\u964d\u4f4e\u5230 **10ms** \u4ee5\u5185\u3002\n\n---\n\n### \u56db\u3001 \u603b\u7ed3\n\n\u5bf9\u4e8e\u6570\u636e\u5e93\u7d22\u5f15\u4f18\u5316\uff0c\u6211\u7684\u603b\u7ed3\u662f\uff1a\n\n1.  **\u6162 SQL \u662f\u5929\u654c**\uff1a\u5efa\u7acb\u6162\u67e5\u8be2\u76d1\u63a7\uff0c\u5b9a\u671f\u5206\u6790\u5e76\u4f18\u5316\u3002\n2.  **EXPLAIN \u662f\u5229\u5668**\uff1a\u4f18\u5316\u524d\u5fc5\u987b\u770b\u6267\u884c\u8ba1\u5212\uff0c\u5173\u6ce8 `type`\u3001`key`\u3001`rows`\u3001`Extra`\u3002\n3.  **\u8986\u76d6\u7d22\u5f15\u662f\u795e\u5668**\uff1a\u5c3d\u91cf\u8bbe\u8ba1\u8054\u5408\u7d22\u5f15\uff0c\u5b9e\u73b0\u7d22\u5f15\u8986\u76d6\uff0c\u51cf\u5c11\u56de\u8868\u3002\n4.  **\u4ee3\u7801\u89c4\u8303\u662f\u57fa\u7840**\uff1a\u675c\u7edd\u5728\u7d22\u5f15\u5217\u4e0a\u505a\u8fd0\u7b97\uff0c\u675c\u7edd\u9690\u5f0f\u8f6c\u6362\u3002\n\n\u8fd9\u5c31\u662f\u6211\u5bf9\u6570\u636e\u5e93\u7d22\u5f15\u4f18\u5316\u7684\u6838\u5fc3\u65b9\u6cd5\u8bba\u3002",

    "details": "\u9762\u8bd5\u5b98\u60a8\u597d\uff0c\u8fd9\u662f\u4e00\u4e2a\u975e\u5e38\u5177\u6709\u524d\u77bb\u6027\u7684\u8bdd\u9898\u3002\u7ed3\u5408\u6211\u5728\u5c0f\u7535\u79d1\u6280\u8d1f\u8d23**\u5343\u4e07\u7ea7\u8bbe\u5907\u63a5\u5165**\u7684\u7269\u8054\u7f51\u67b6\u6784\u7ecf\u9a8c\uff0c\u4ee5\u53ca\u76ee\u524d\u5bf9**\u5927\u6a21\u578b\uff08LLM\uff09**\u6280\u672f\u7684\u7814\u7a76\uff0c\u6211\u8ba4\u4e3a\u672a\u6765\u7684\u8f66\u8054\u7f51\u5c06\u4e0d\u4ec5\u4ec5\u662f\u201c\u8f66\u8fde\u4e0a\u7f51\u201d\uff0c\u800c\u662f\u4f1a\u7ecf\u5386\u4ece**\u201c\u8fde\u63a5\u201d\u5230\u201c\u667a\u80fd\u201d**\uff0c\u518d\u5230**\u201c\u751f\u6001\u201d**\u7684\u6df1\u523b\u53d8\u9769\u3002\n\n\u6211\u4e3b\u8981\u4ece\u6280\u672f\u67b6\u6784\u3001\u6570\u636e\u5904\u7406\u3001\u667a\u80fd\u5316\u5e94\u7528\u4e09\u4e2a\u7ef4\u5ea6\u6765\u770b\u5f85\u672a\u6765\u7684\u8f66\u8054\u7f51\uff1a\n\n### \u4e00\u3001 \u6280\u672f\u67b6\u6784\uff1a\u4ece\u201c\u7ec8\u7aef\u8fde\u63a5\u201d\u8d70\u5411\u201c\u8fb9\u7f18\u534f\u540c\u201d\n\n\u6211\u5728\u5c0f\u7535\u8d1f\u8d23\u8bbe\u5907\u63a5\u5165\u65f6\uff0c\u9762\u4e34\u7684\u6838\u5fc3\u6311\u6218\u662f\u5343\u4e07\u7ea7\u8bbe\u5907\u7684\u5fc3\u8df3\u4fdd\u6d3b\u4e0e\u6307\u4ee4\u4e0b\u53d1\u3002\u8f66\u8054\u7f51\u7684\u89c4\u6a21\u8fdc\u8d85\u5171\u4eab\u5145\u7535\u5b9d\uff0c\u5176\u67b6\u6784\u6f14\u8fdb\u5fc5\u7136\u5448\u73b0\u4ee5\u4e0b\u8d8b\u52bf\uff1a\n\n1.  **5G + \u8fb9\u7f18\u8ba1\u7b97\uff08MEC\uff09\u662f\u6807\u914d**\uff1a\n    *   **\u4f4e\u5ef6\u8fdf\u521a\u9700**\uff1a\u81ea\u52a8\u9a7e\u9a76\u548c\u8f66\u8def\u534f\u540c\uff08V2X\uff09\u8981\u6c42\u6beb\u79d2\u7ea7\u7684\u54cd\u5e94\u901f\u5ea6\uff08\u5982\u7d27\u6025\u5236\u52a8\u6307\u4ee4\uff09\u3002\u5355\u7eaf\u4f9d\u8d56\u4e91\u7aef\u5904\u7406\uff0c\u7f51\u7edc\u5ef6\u8fdf\u662f\u4e0d\u53ef\u63a5\u53d7\u7684\u3002\n    *   **\u67b6\u6784\u4e0b\u6c89**\uff1a\u8ba1\u7b97\u80fd\u529b\u5c06\u4ece\u4e91\u7aef\u4e0b\u6c89\u5230\u8fb9\u7f18\u8282\u70b9\uff08\u8def\u4fa7\u5355\u5143 RSU \u6216\u8f66\u8f7d\u7f51\u5173\uff09\u3002\u7c7b\u4f3c\u4e8e\u6211\u4eec\u5728\u8bbe\u5907\u7aef\u505a\u7684\u9884\u5904\u7406\uff0c\u8f66\u8054\u7f51\u5c06\u5728\u8fb9\u7f18\u4fa7\u5b8c\u6210\u611f\u77e5\u6570\u636e\u7684\u5b9e\u65f6\u6e05\u6d17\u548c\u51b3\u7b56\uff0c\u4e91\u7aef\u53ea\u8d1f\u8d23\u5168\u5c40\u8c03\u5ea6\u548c\u6a21\u578b\u8bad\u7ec3\u3002\n\n2.  **\u534f\u8bae\u4e0e\u6807\u51c6\u7684\u7edf\u4e00**\uff1a\n    *   \u76ee\u524d\u8f66\u8054\u7f51\u534f\u8bae\u7e41\u6742\uff08MQTT\u3001CoAP\u3001\u79c1\u6709TCP\u7b49\uff09\u3002\u672a\u6765\uff0c\u4e3a\u4e86\u5b9e\u73b0\u8de8\u54c1\u724c\u3001\u8de8\u533a\u57df\u7684\u8f66\u8def\u534f\u540c\uff0c\u884c\u4e1a\u5fc5\u5c06\u8d70\u5411\u7edf\u4e00\u7684\u6807\u51c6\u534f\u8bae\uff08\u5982\u57fa\u4e8eIPv6\u7684V2X\u6807\u51c6\uff09\uff0c\u5b9e\u73b0\u8f66\u4e0e\u8f66\u3001\u8f66\u4e0e\u8def\u3001\u8f66\u4e0e\u4e91\u7684\u65e0\u7f1d\u901a\u4fe1\u3002\n\n### \u4e8c\u3001 \u6570\u636e\u5904\u7406\uff1a\u4ece\u201c\u72b6\u6001\u4e0a\u62a5\u201d\u8d70\u5411\u201c\u6570\u636e\u4ef7\u503c\u6316\u6398\u201d\n\n\u6211\u5728\u7f51\u6613\u8003\u62c9\u548c\u5c0f\u7535\u90fd\u505a\u8fc7\u5927\u6570\u636e\u5b9e\u65f6\u5904\u7406\u3002\u8f66\u8054\u7f51\u662f\u5178\u578b\u7684\u201c\u6570\u636e\u6d2a\u6d41\u201d\u573a\u666f\uff0c\u4e00\u8f86\u81ea\u52a8\u9a7e\u9a76\u6c7d\u8f66\u6bcf\u5929\u4ea7\u751f\u7684\u6570\u636e\u91cf\u53ef\u8fbeTB\u7ea7\u3002\n\n1.  **\u6d41\u5f0f\u8ba1\u7b97\u4e0e\u5b9e\u65f6\u6570\u4ed3**\uff1a\n    *   \u6211\u4eec\u73b0\u5728\u7528 Flink \u5904\u7406\u8bbe\u5907\u72b6\u6001\uff0c\u672a\u6765\u8f66\u8054\u7f51\u5c06\u4f9d\u6258 Flink+Kafka \u6784\u5efa\u66f4\u5e9e\u5927\u7684\u5b9e\u65f6\u6570\u636e\u7ba1\u9053\u3002\n    *   **\u6838\u5fc3\u4ef7\u503c**\uff1a\u4e0d\u4ec5\u662f\u5904\u7406\u8f66\u8f86\u72b6\u6001\uff0c\u66f4\u662f\u901a\u8fc7\u5b9e\u65f6\u5206\u6790\u9a7e\u9a76\u884c\u4e3a\u3001\u8def\u51b5\u4fe1\u606f\uff0c\u52a8\u6001\u8c03\u6574\u7ea2\u7eff\u706f\u65f6\u957f\u3001\u89c4\u5212\u6700\u4f18\u8def\u5f84\uff0c\u751a\u81f3\u4e3a\u4fdd\u9669\u516c\u53f8\u63d0\u4f9b\u7cbe\u51c6\u7684 UBI\uff08\u57fa\u4e8e\u4f7f\u7528\u91cf\u7684\u4fdd\u9669\uff09\u5b9a\u4ef7\u6a21\u578b\u3002\n\n2.  **\u6570\u636e\u95ed\u73af**\uff1a\n    *   \u8f66\u8f86\u4f5c\u4e3a\u79fb\u52a8\u4f20\u611f\u5668\uff0c\u5c06\u6d77\u91cf\u771f\u5b9e\u8def\u51b5\u6570\u636e\u56de\u4f20\u4e91\u7aef\uff0c\u7528\u4e8e\u8bad\u7ec3\u81ea\u52a8\u9a7e\u9a76\u7b97\u6cd5\uff08\u5f71\u5b50\u6a21\u5f0f\uff09\u3002\u4e91\u7aef\u8bad\u7ec3\u597d\u7684\u65b0\u7b97\u6cd5\u518d\u901a\u8fc7 OTA\uff08\u7a7a\u4e2d\u4e0b\u8f7d\u6280\u672f\uff09\u4e0b\u53d1\u5230\u8f66\u7aef\u3002\u8fd9\u79cd\u201c\u6570\u636e-\u7b97\u6cd5\u201d\u7684\u95ed\u73af\u8fed\u4ee3\u901f\u5ea6\uff0c\u5c06\u51b3\u5b9a\u8f66\u4f01\u7684\u6838\u5fc3\u7ade\u4e89\u529b\u3002\n\n### \u4e09\u3001 \u667a\u80fd\u5316\u5e94\u7528\uff1a\u5927\u6a21\u578b\u91cd\u5851\u201c\u7b2c\u4e09\u751f\u6d3b\u7a7a\u95f4\u201d\n\n\u8fd9\u662f\u6211\u76ee\u524d\u975e\u5e38\u611f\u5174\u8da3\u4e14\u6b63\u5728\u6df1\u5165\u7814\u7a76\u7684\u9886\u57df\u3002\u968f\u7740 GPT\u3001LLaMA \u7b49\u5927\u6a21\u578b\u6280\u672f\u7684\u53d1\u5c55\uff0c\u8f66\u8054\u7f51\u7684\u4ea4\u4e92\u4f53\u9a8c\u5c06\u88ab\u5f7b\u5e95\u98a0\u8986\u3002\n\n1.  **\u667a\u80fd\u5ea7\u8231\u7684\u9769\u547d**\uff1a\n    *   **\u73b0\u72b6**\uff1a\u76ee\u524d\u7684\u8bed\u97f3\u52a9\u624b\u5927\u591a\u57fa\u4e8e\u89c4\u5219\u6216\u5c0f\u6a21\u578b\uff0c\u53ea\u80fd\u6267\u884c\u201c\u6253\u5f00\u7a7a\u8c03\u201d\u8fd9\u79cd\u7b80\u5355\u6307\u4ee4\uff0c\u7406\u89e3\u80fd\u529b\u5dee\u3002\n    *   **\u672a\u6765**\uff1a\u96c6\u6210 LLM \u7684\u667a\u80fd\u5ea7\u8231\uff0c\u5c06\u5177\u5907\u591a\u8f6e\u5bf9\u8bdd\u3001\u4e0a\u4e0b\u6587\u7406\u89e3\u548c\u903b\u8f91\u63a8\u7406\u80fd\u529b\u3002\n    *   **\u573a\u666f**\uff1a\u7528\u6237\u8bf4\u201c\u6211\u6709\u70b9\u51b7\uff0c\u800c\u4e14\u5fc3\u60c5\u4e0d\u597d\u201d\uff0c\u8f66\u8f86\u4e0d\u4ec5\u80fd\u81ea\u52a8\u8c03\u9ad8\u6e29\u5ea6\uff0c\u8fd8\u80fd\u64ad\u653e\u8212\u7f13\u7684\u97f3\u4e50\uff0c\u751a\u81f3\u6839\u636e\u7528\u6237\u559c\u597d\u63a8\u8350\u9644\u8fd1\u7684\u5496\u5561\u5e97\u3002\u8fd9\u9700\u8981\u7528\u5230 RAG\uff08\u68c0\u7d22\u589e\u5f3a\u751f\u6210\uff09\u6280\u672f\u548c\u5411\u91cf\u6570\u636e\u5e93\uff0c\u5c06\u8f66\u8f86\u624b\u518c\u3001\u7528\u6237\u504f\u597d\u3001\u5730\u56fe\u4fe1\u606f\u7b49\u79c1\u6709\u6570\u636e\u4e0e\u5927\u6a21\u578b\u7ed3\u5408\u3002\n\n2.  **Agent\uff08\u667a\u80fd\u4f53\uff09\u67b6\u6784\u7684\u5e94\u7528**\uff1a\n    *   \u8f66\u8f86\u5c06\u53d8\u6210\u4e00\u4e2a\u81ea\u4e3b\u51b3\u7b56\u7684 Agent\u3002\u6bd4\u5982\uff0c\u5f53\u8f66\u8f86\u68c0\u6d4b\u5230\u7535\u91cf\u4e0d\u8db3\u65f6\uff0c\u5b83\u80fd\u81ea\u4e3b\u89c4\u5212\u8def\u7ebf\u3001\u9884\u7ea6\u5145\u7535\u6869\u3001\u751a\u81f3\u81ea\u52a8\u5b8c\u6210\u652f\u4ed8\u3002\u8fd9\u9700\u8981\u8f66\u8f86\u5177\u5907\u8c03\u7528\u5916\u90e8 API\uff08\u5145\u7535\u6869\u5e73\u53f0\u3001\u652f\u4ed8\u7f51\u5173\uff09\u7684\u80fd\u529b\uff0c\u4e5f\u5c31\u662f\u6211\u4eec\u8bf4\u7684\u201cFunction Calling\u201d\u3002\n\n### \u56db\u3001 \u6311\u6218\u4e0e\u673a\u9047\u5e76\u5b58\n\n\u5f53\u7136\uff0c\u8981\u5b9e\u73b0\u4e0a\u8ff0\u613f\u666f\uff0c\u6211\u4eec\u4e5f\u9762\u4e34\u5de8\u5927\u7684\u6280\u672f\u6311\u6218\uff0c\u8fd9\u4e5f\u662f\u6211\u4eec\u7814\u53d1\u4eba\u5458\u7684\u673a\u4f1a\uff1a\n\n1.  **\u5b89\u5168\u4e0e\u9690\u79c1**\uff1a\u8f66\u8054\u7f51\u6d89\u53ca\u4eba\u8eab\u5b89\u5168\u548c\u7528\u6237\u9690\u79c1\uff0c\u6570\u636e\u52a0\u5bc6\u3001\u9632\u7be1\u6539\u3001\u9632\u52ab\u6301\u662f\u5e95\u7ebf\u3002\u6211\u5728\u91d1\u878d\u9879\u76ee\uff08\u4e2d\u94f6\u3001\u5e73\u5b89\u94f6\u884c\uff09\u4e2d\u79ef\u7d2f\u7684\u5b89\u5168\u67b6\u6784\u7ecf\u9a8c\uff08\u5982\u53cc\u5411\u8ba4\u8bc1\u3001\u6570\u636e\u8131\u654f\uff09\u5728\u8f66\u8054\u7f51\u9886\u57df\u540c\u6837\u81f3\u5173\u91cd\u8981\u3002\n2.  **\u9ad8\u53ef\u7528\u4e0e\u7a33\u5b9a\u6027**\uff1a\u8f66\u8f86\u5728\u9ad8\u901f\u79fb\u52a8\u4e2d\uff0c\u7f51\u7edc\u73af\u5883\u6781\u5176\u590d\u6742\uff08\u96a7\u9053\u3001\u5730\u4e0b\u5ba4\u3001\u504f\u8fdc\u5730\u533a\uff09\u3002\u5982\u4f55\u4fdd\u8bc1\u5728\u7f51\u7edc\u6296\u52a8\u751a\u81f3\u65ad\u8fde\u7684\u60c5\u51b5\u4e0b\uff0c\u7cfb\u7edf\u4f9d\u7136\u7a33\u5b9a\u53ef\u7528\uff0c\u662f\u5bf9\u67b6\u6784\u8bbe\u8ba1\u7684\u6781\u81f4\u8003\u9a8c\u3002\n\n### \u603b\u7ed3\n\n\u603b\u7684\u6765\u8bf4\uff0c\u6211\u8ba4\u4e3a\u672a\u6765\u8f66\u8054\u7f51\u5c06\u662f**\u7269\u8054\u7f51\u3001\u5927\u6570\u636e\u3001\u4eba\u5de5\u667a\u80fd**\u4e09\u5927\u6280\u672f\u7684\u96c6\u5927\u6210\u8005\u3002\u5b83\u5c06\u628a\u6c7d\u8f66\u4ece\u4e00\u4e2a\u5355\u7eaf\u7684\u4ea4\u901a\u5de5\u5177\uff0c\u53d8\u6210\u4e00\u4e2a**\u667a\u80fd\u7684\u3001\u53ef\u4ea4\u4e92\u7684\u3001\u81ea\u4e3b\u51b3\u7b56\u7684\u79fb\u52a8\u7a7a\u95f4**\u3002\n\n\u4f5c\u4e3a\u4e00\u4e2a\u6709\u6df1\u539a IoT \u7814\u53d1\u80cc\u666f\u4e14\u6b63\u5728\u94bb\u7814\u5927\u6a21\u578b\u6280\u672f\u7684\u5de5\u7a0b\u5e08\uff0c\u6211\u5bf9\u8f66\u8054\u7f51\u7684\u672a\u6765\u5145\u6ee1\u671f\u5f85\uff0c\u4e5f\u76f8\u4fe1\u6211\u7684\u6280\u672f\u79ef\u7d2f\u80fd\u5728\u8fd9\u4e2a\u9886\u57df\u53d1\u6325\u91cd\u8981\u4f5c\u7528\u3002",

    "title": "AI\u4f1a\u600e\u4e48\u5f71\u54cd\u6c7d\u8f66\u884c\u4e1a\uff1f",
    "style": "",
    "details": "\u9762\u8bd5\u5b98\u60a8\u597d\uff0c\u8fd9\u662f\u4e00\u4e2a\u975e\u5e38\u5b8f\u5927\u4e14\u4ee4\u4eba\u5174\u594b\u7684\u8bdd\u9898\u3002\u7ed3\u5408\u6211\u5728\u5c0f\u7535\u79d1\u6280\u8d1f\u8d23**\u5343\u4e07\u7ea7\u7269\u8054\u7f51\u8bbe\u5907\u7814\u53d1**\u7684\u7ecf\u9a8c\uff0c\u4ee5\u53ca\u6211\u8fd1\u671f\u5bf9**\u5927\u6a21\u578b\uff08LLM\uff09\u548cAgent\u6280\u672f**\u7684\u6df1\u5165\u7814\u7a76\uff0c\u6211\u8ba4\u4e3aAI\u5bf9\u6c7d\u8f66\u884c\u4e1a\u7684\u5f71\u54cd\u5c06\u662f\u98a0\u8986\u6027\u7684\uff0c\u5b83\u6b63\u5728\u5c06\u6c7d\u8f66\u4ece\u5355\u7eaf\u7684\u201c\u4ea4\u901a\u5de5\u5177\u201d\u91cd\u5851\u4e3a\u201c\u667a\u80fd\u79fb\u52a8\u7ec8\u7aef\u201d\u3002\n\n\u6211\u8ba4\u4e3a\u8fd9\u79cd\u5f71\u54cd\u4e3b\u8981\u4f53\u73b0\u5728**\u7814\u53d1\u5236\u9020\u3001\u9a7e\u9a76\u4f53\u9a8c\u3001\u540e\u5e02\u573a\u670d\u52a1**\u4ee5\u53ca**\u8f66\u8def\u534f\u540c**\u56db\u4e2a\u6838\u5fc3\u7ef4\u5ea6\uff1a\n\n### \u4e00\u3001 \u7814\u53d1\u5236\u9020\u73af\u8282\uff1a\u4ece\u201c\u6d41\u6c34\u7ebf\u201d\u5230\u201c\u667a\u80fd\u5de5\u5382\u201d\n\nAI\u6b63\u5728\u6781\u5927\u5730\u7f29\u77ed\u6c7d\u8f66\u7684\u7814\u53d1\u5468\u671f\u5e76\u63d0\u5347\u5236\u9020\u8d28\u91cf\u3002\n\n1.  **\u751f\u6210\u5f0f\u8bbe\u8ba1**\uff1a\n    *   \u5229\u7528AI\u7b97\u6cd5\uff0c\u6839\u636e\u5de5\u7a0b\u5e08\u8f93\u5165\u7684\u53c2\u6570\uff08\u5982\u91cd\u91cf\u3001\u5f3a\u5ea6\u3001\u6750\u6599\u9650\u5236\uff09\uff0c\u81ea\u52a8\u751f\u6210\u6210\u767e\u4e0a\u5343\u79cd\u96f6\u90e8\u4ef6\u8bbe\u8ba1\u65b9\u6848\u3002\u8fd9\u6bd4\u6211\u8fc7\u53bb\u505a\u8f6f\u4ef6\u67b6\u6784\u8bbe\u8ba1\u7684\u201c\u8bbe\u8ba1\u6a21\u5f0f\u201d\u66f4\u52a0\u6fc0\u8fdb\uff0c\u80fd\u6781\u5927\u4f18\u5316\u8f66\u8eab\u7ed3\u6784\uff0c\u5b9e\u73b0\u8f7b\u91cf\u5316\u3002\n2.  **\u9884\u6d4b\u6027\u7ef4\u62a4\u4e0e\u8d28\u91cf\u63a7\u5236**\uff1a\n    *   \u8fd9\u4e0e\u6211\u5728\u7269\u8054\u7f51\u9886\u57df\u7684\u7ecf\u9a8c\u9ad8\u5ea6\u5951\u5408\u3002\u6211\u4eec\u5728\u5c0f\u7535\u901a\u8fc7\u8bbe\u5907\u6570\u636e\u9884\u6d4b\u5145\u7535\u5b9d\u6545\u969c\uff0c\u540c\u6837\uff0cAI\u53ef\u4ee5\u5206\u6790\u751f\u4ea7\u7ebf\u4e0a\u7684\u4f20\u611f\u5668\u6570\u636e\uff0c\u63d0\u524d\u9884\u6d4b\u8bbe\u5907\u6545\u969c\uff0c\u9632\u6b62\u505c\u5de5\u3002\n    *   \u5728\u8d28\u68c0\u73af\u8282\uff0c\u5229\u7528\u8ba1\u7b97\u673a\u89c6\u89c9\uff08CV\uff09\u6280\u672f\uff0cAI\u80fd\u6bd4\u4eba\u773c\u66f4\u7cbe\u51c6\u5730\u8bc6\u522b\u5fae\u5c0f\u7455\u75b5\uff0c\u964d\u4f4e\u4e0d\u826f\u7387\u3002\n\n### \u4e8c\u3001 \u9a7e\u9a76\u4f53\u9a8c\u73af\u8282\uff1a\u4ece\u201c\u9a7e\u9a76\u5de5\u5177\u201d\u5230\u201c\u7b2c\u4e09\u751f\u6d3b\u7a7a\u95f4\u201d\n\n\u8fd9\u662f\u7528\u6237\u611f\u77e5\u6700\u5f3a\u3001\u4e5f\u662f\u5927\u6a21\u578b\u6280\u672f\u843d\u5730\u6700\u6fc0\u8fdb\u7684\u9886\u57df\u3002\n\n1.  **\u81ea\u52a8\u9a7e\u9a76\u7684\u8de8\u8d8a\u5f0f\u53d1\u5c55**\uff1a\n    *   **\u7aef\u5230\u7aef\u5927\u6a21\u578b**\uff1a\u4f20\u7edf\u7684\u81ea\u52a8\u9a7e\u9a76\u4f9d\u8d56\u4eba\u5de5\u7f16\u5199\u89c4\u5219\uff0c\u96be\u4ee5\u8986\u76d6\u6240\u6709\u957f\u5c3e\u573a\u666f\u3002\u73b0\u5728\u7684\u8d8b\u52bf\u662f\u5229\u7528\u5927\u6a21\u578b\uff08\u5982Tesla FSD v12\uff09\uff0c\u76f4\u63a5\u8f93\u5165\u89c6\u9891\u6570\u636e\uff0c\u8f93\u51fa\u63a7\u5236\u6307\u4ee4\u3002\u8fd9\u79cd\u6570\u636e\u9a71\u52a8\u7684\u6a21\u5f0f\uff0c\u8ba9\u81ea\u52a8\u9a7e\u9a76\u66f4\u50cf\u201c\u4eba\u7c7b\u76f4\u89c9\u201d\uff0c\u6cdb\u5316\u80fd\u529b\u6781\u5f3a\u3002\n    *   **\u5f71\u5b50\u6a21\u5f0f**\uff1a\u5229\u7528\u8f66\u961f\u56de\u4f20\u7684\u6d77\u91cf\u6570\u636e\u4e0d\u65ad\u8bad\u7ec3\u6a21\u578b\u3002\u8fd9\u9700\u8981\u5f3a\u5927\u7684\u6570\u636e\u95ed\u73af\u67b6\u6784\uff0c\u7c7b\u4f3c\u4e8e\u6211\u6784\u5efa\u7684\u8bbe\u5907\u5168\u94fe\u8def\u6570\u636e\u7cfb\u7edf\uff0c\u4f46\u6570\u636e\u91cf\u7ea7\u548c\u7b97\u6cd5\u590d\u6742\u5ea6\u66f4\u9ad8\u3002\n\n2.  **\u667a\u80fd\u5ea7\u8231\u7684\u4ea4\u4e92\u9769\u547d**\uff1a\n    *   **LLM\u91cd\u5851\u8bed\u97f3\u4ea4\u4e92**\uff1a\u73b0\u6709\u7684\u8f66\u673a\u8bed\u97f3\u52a9\u624b\u5927\u591a\u6bd4\u8f83\u201c\u7b28\u201d\uff0c\u53ea\u80fd\u542c\u61c2\u56fa\u5b9a\u6307\u4ee4\u3002\u5f15\u5165GPT\u7c7b\u5927\u6a21\u578b\u540e\uff0c\u5ea7\u8231\u5c06\u5177\u5907**\u81ea\u7136\u8bed\u8a00\u7406\u89e3**\u548c**\u903b\u8f91\u63a8\u7406**\u80fd\u529b\u3002\n    *   **\u573a\u666f\u4e3e\u4f8b**\uff1a\u7528\u6237\u65e0\u9700\u8bf4\u201c\u6253\u5f00\u7a7a\u8c03\u3001\u6253\u5f00\u5ea7\u6905\u52a0\u70ed\u3001\u64ad\u653e\u7235\u58eb\u4e50\u201d\uff0c\u53ea\u9700\u8bf4\u201c\u6211\u6709\u70b9\u51b7\uff0c\u60f3\u653e\u677e\u4e00\u4e0b\u201d\uff0cAI\u5c31\u80fd\u7406\u89e3\u610f\u56fe\u5e76\u81ea\u52a8\u6267\u884c\u590d\u6742\u64cd\u4f5c\u3002\n    *   **Agent\uff08\u667a\u80fd\u4f53\uff09\u670d\u52a1**\uff1a\u5ea7\u8231\u5c06\u6210\u4e3a\u4e00\u4e2a\u8d85\u7ea7Agent\u3002\u5b83\u80fd\u4e3b\u52a8\u6839\u636e\u8def\u51b5\u3001\u65e5\u7a0b\u3001\u7528\u6237\u4e60\u60ef\u63d0\u4f9b\u5efa\u8bae\u3002\u6bd4\u5982\u68c0\u6d4b\u5230\u6cb9\u91cf/\u7535\u91cf\u4e0d\u8db3\u4e14\u524d\u65b9\u62e5\u5835\uff0c\u4e3b\u52a8\u8be2\u95ee\u662f\u5426\u7ed5\u8def\u53bb\u6700\u8fd1\u7684\u52a0\u6cb9\u7ad9/\u5145\u7535\u7ad9\u3002\n\n### \u4e09\u3001 \u540e\u5e02\u573a\u4e0e\u670d\u52a1\u73af\u8282\uff1a\u4ece\u201c\u88ab\u52a8\u7ef4\u4fee\u201d\u5230\u201c\u4e3b\u52a8\u670d\u52a1\u201d\n\nAI\u8ba9\u6c7d\u8f66\u670d\u52a1\u53d8\u5f97\u66f4\u52a0\u7cbe\u51c6\u548c\u9ad8\u6548\u3002\n\n1.  **\u9884\u6d4b\u6027\u7ef4\u62a4**\uff1a\n    *   \u8fd9\u662fIoT\u6280\u672f\u5728\u6c7d\u8f66\u9886\u57df\u7684\u5178\u578b\u5e94\u7528\u3002\u901a\u8fc7\u5206\u6790\u8f66\u8f86\u5b9e\u65f6\u4e0a\u4f20\u7684\u7535\u6c60\u7535\u538b\u3001\u53d1\u52a8\u673a\u9707\u52a8\u3001\u8f6e\u80ce\u538b\u529b\u7b49\u6570\u636e\uff0cAI\u6a21\u578b\u53ef\u4ee5\u63d0\u524d\u9884\u6d4b\u7535\u6c60\u8870\u51cf\u6216\u96f6\u90e8\u4ef6\u6545\u969c\u3002\n    *   **\u4ef7\u503c**\uff1a\u5c06\u201c\u8f66\u574f\u4e86\u518d\u4fee\u201d\u8f6c\u53d8\u4e3a\u201c\u672a\u574f\u5148\u4fee\u201d\uff0c\u907f\u514d\u7528\u6237\u5728\u9ad8\u901f\u4e0a\u629b\u951a\uff0c\u63d0\u5347\u5b89\u5168\u548c\u4f53\u9a8c\u3002\n\n2.  **\u4e2a\u6027\u5316\u5b9a\u5236\u4e0eOTA**\uff1a\n    *   AI\u4f1a\u5b66\u4e60\u8f66\u4e3b\u7684\u9a7e\u9a76\u4e60\u60ef\uff08\u5982\u5239\u8f66\u7075\u654f\u5ea6\u3001\u8f6c\u5411\u624b\u611f\uff09\u3002\u901a\u8fc7OTA\uff08\u7a7a\u4e2d\u4e0b\u8f7d\u6280\u672f\uff09\uff0c\u8f66\u8f86\u53ef\u4ee5\u4e0d\u65ad\u8fdb\u5316\uff0c\u8d8a\u7528\u8d8a\u61c2\u8f66\u4e3b\uff0c\u771f\u6b63\u5b9e\u73b0\u201c\u5343\u4eba\u5343\u9762\u201d\u7684\u9a7e\u9a76\u4f53\u9a8c\u3002\n\n### \u56db\u3001 \u8f66\u8def\u534f\u540c\uff08V2X\uff09\uff1a\u4ece\u201c\u5355\u8f66\u667a\u80fd\u201d\u5230\u201c\u7fa4\u4f53\u667a\u6167\u201d\n\n\u6211\u5728\u5c0f\u7535\u5904\u7406\u8fc7\u5927\u89c4\u6a21\u8bbe\u5907\u7684\u5e76\u53d1\u8c03\u5ea6\uff0c\u8f66\u8054\u7f51\u7684\u6311\u6218\u66f4\u5927\uff0c\u9700\u8981AI\u534f\u8c03\u201c\u8f66\u3001\u8def\u3001\u4e91\u201d\u4e09\u7aef\u3002\n\n1.  **\u667a\u6167\u4ea4\u901a\u5927\u8111**\uff1a\n    *   AI\u4e0d\u4ec5\u63a7\u5236\u5355\u8f66\uff0c\u8fd8\u63a7\u5236\u7ea2\u7eff\u706f\u548c\u8def\u4fa7\u611f\u77e5\u8bbe\u5907\u3002\u901a\u8fc7\u5206\u6790\u5168\u57ce\u8f66\u6d41\uff0cAI\u53ef\u4ee5\u52a8\u6001\u8c03\u6574\u7ea2\u7eff\u706f\u65f6\u957f\uff0c\u5b9e\u73b0\u7eff\u6ce2\u5e26\u901a\u884c\uff0c\u6781\u5927\u7f13\u89e3\u62e5\u5835\u3002\n2.  **\u7fa4\u4f53\u667a\u80fd**\uff1a\n    *   \u4e00\u8f86\u8f66\u9047\u5230\u7684\u5751\u6d3c\u6216\u4e8b\u6545\uff0c\u53ef\u4ee5\u901a\u8fc7V2X\u77ac\u95f4\u5171\u4eab\u7ed9\u540e\u65b9\u6240\u6709\u8f66\u8f86\uff0cAI\u534f\u540c\u8f66\u961f\u81ea\u52a8\u907f\u8ba9\u3002\u8fd9\u9700\u8981\u6781\u9ad8\u7684\u901a\u4fe1\u53ef\u9760\u6027\u548c\u4f4e\u5ef6\u8fdf\u5904\u7406\u80fd\u529b\uff0c\u4e5f\u662f\u8fb9\u7f18\u8ba1\u7b97\u5728\u8f66\u8054\u7f51\u7684\u6838\u5fc3\u5e94\u7528\u573a\u666f\u3002\n\n### \u603b\u7ed3\u4e0e\u6211\u7684\u601d\u8003\n\n\u7efc\u4e0a\u6240\u8ff0\uff0cAI\u6b63\u5728\u8ba9\u6c7d\u8f66\u884c\u4e1a\u7ecf\u5386\u4e00\u573a\u4ece\u201c\u786c\u4ef6\u5b9a\u4e49\u201d\u5230\u201c\u8f6f\u4ef6\u5b9a\u4e49\u201d\u518d\u5230\u201c\u6570\u636e\u4e0eAI\u5b9a\u4e49\u201d\u7684\u53d8\u9769\u3002\n\n\u5bf9\u4e8e\u6211\u8fd9\u6837\u7684\u7814\u53d1\u4eba\u5458\u6765\u8bf4\uff0c\u8fd9\u610f\u5473\u7740\uff1a\n1.  **\u6280\u672f\u6808\u7684\u878d\u5408**\uff1a\u4f20\u7edf\u7684\u5d4c\u5165\u5f0f\u5f00\u53d1\u5fc5\u987b\u4e0e\u5927\u6570\u636e\u3001\u4e91\u8ba1\u7b97\u3001\u6df1\u5ea6\u5b66\u4e60\u6280\u672f\u6df1\u5ea6\u878d\u5408\u3002\n2.  **\u6570\u636e\u4ef7\u503c\u7684\u6316\u6398**\uff1a\u6c7d\u8f66\u5c06\u6210\u4e3a\u6570\u636e\u7684\u751f\u4ea7\u8005\u548c\u6d88\u8d39\u8005\uff0c\u5982\u4f55\u6784\u5efa\u9ad8\u5e76\u53d1\u3001\u9ad8\u53ef\u7528\u7684\u6570\u636e\u94fe\u8def\uff08\u5982\u6211\u64c5\u957f\u7684Flink\u5b9e\u65f6\u8ba1\u7b97\uff09\uff0c\u5c06\u662f\u6838\u5fc3\u7ade\u4e89\u529b\u3002\n3.  **\u5b89\u5168\u6311\u6218**\uff1a\u968f\u7740AI\u63a5\u7ba1\u8f66\u8f86\u63a7\u5236\u6743\uff0c\u7cfb\u7edf\u7684\u7a33\u5b9a\u6027\u3001\u7b97\u6cd5\u7684\u53ef\u89e3\u91ca\u6027\u4ee5\u53ca\u7f51\u7edc\u5b89\u5168\u5c06\u6210\u4e3a\u751f\u547d\u7ebf\u3002\n\n\u6211\u5bf9\u8fd9\u4e00\u8d8b\u52bf\u975e\u5e38\u770b\u597d\uff0c\u4e5f\u6b63\u81f4\u529b\u4e8e\u5c06\u6211\u5728\u5927\u89c4\u6a21\u7269\u8054\u7f51\u67b6\u6784\u4e0a\u7684\u79ef\u7d2f\u4e0e\u5927\u6a21\u578b\u6280\u672f\u7ed3\u5408\uff0c\u63a2\u7d22AI\u5728\u667a\u80fd\u8bbe\u5907\u548c\u8f66\u8054\u7f51\u573a\u666f\u4e2d\u7684\u66f4\u591a\u843d\u5730\u53ef\u80fd\u3002",

// 全局变量，存储 DATA_MAP 和 DISPLAY_MAP
const dataMap = DATA_MAP;
const displayMap = DISPLAY_MAP;

// 渲染某个 Tab 的表格
function renderTab(tabType) {
    const tableContainer = document.getElementById("table-container");
    tableContainer.innerHTML = '';  // 清空之前的内容

    // 获取当前 tab 的布局数据
    const rows = displayMap[tabType] || [];
    const table = document.createElement("table");

    // 为表格添加标题行
    const headerRow = document.createElement("tr");
    // 不要表头
    // for (let i = 1; i <= 6; i++) {
    //   const th = document.createElement("th");
    //   th.innerText = `Column ${i}`;
    //   headerRow.appendChild(th);
    // }
    table.appendChild(headerRow);

    // 渲染每一行
    rows.forEach(row => {
        const tr = document.createElement("tr");

        row.forEach(cellId => {
            const td = document.createElement("td");
            if (cellId && dataMap[cellId]) {
                const data = dataMap[cellId];
                td.innerText = data.title;
                td.style.cssText = data.style || '';

                // 给单元格添加点击事件
                td.onclick = () => copyContent(data);
                // 给单元格添加双击事件
                td.ondblclick = () => showModal(data);

                // 添加单元格到行
                tr.appendChild(td);
            } else {
                const td = document.createElement("td");
                tr.appendChild(td);  // 空单元格
            }
        });

        // 添加行到表格
        table.appendChild(tr);
    });

    // 将表格插入到页面
    tableContainer.appendChild(table);
}

let clickTimer = null;
const CLICK_DELAY = 220; // 点击延迟时间

/* 复制单元格内容 */
function copyContent(data) {
    if (clickTimer) return; // 防止重复点击

    clickTimer = setTimeout(() => {
        // 单击：复制
        const text = data.title;
        navigator.clipboard.writeText(text)
            .then(() => showToast(text))
            .catch(err => console.error('复制失败:', err)); // 捕获复制失败的错误
        clickTimer = null;
    }, CLICK_DELAY);
}

/* 弹窗相关功能 */
function showModal(data) {
    // 双击：取消单击逻辑
    clearTimeout(clickTimer);
    clickTimer = null;

    const modal = document.getElementById('modal');
    const modalTitle = document.getElementById('modal-title');
    const modalDetails = document.getElementById('modal-details');
    const modalSubItems = document.getElementById('modal-sub-items');

    // 弹窗标题
    modalTitle.onclick = () => {
        // 点击复制到剪贴板
        navigator.clipboard.writeText(data.title);
        showToast(data.title);
    };

    // 设置弹窗内容
    modalTitle.innerText = data.title;
    if (!data || !data.details) {
        modalDetails.innerHTML = marked.parse(''); // 使用 marked.js 将 Markdown 转换为 HTML

    } else {
        modalDetails.innerHTML = marked.parse(data.details); // 使用 marked.js 将 Markdown 转换为 HTML

    }

    // 如果有子项，渲染子项列表
    modalSubItems.innerHTML = '';
    if (data.subItems && data.subItems.length > 0) {
        data.subItems.forEach(item => {
            const li = document.createElement('li');
            li.innerText = item;
            li.onclick = () => {
                // 点击复制到剪贴板
                navigator.clipboard.writeText(item);
                showToast(`${item}`);
            };
            modalSubItems.appendChild(li);
        });
    }

    // 显示弹窗
    modal.style.display = 'block';
}

// 关闭弹窗功能
function closeModal(event) {
    // 如果点击的是背景，关闭弹窗
    if (event && (event.target.id === 'modal' || event.target.className === 'close')) {
        const modal = document.getElementById('modal');
        modal.style.display = 'none';
    }
}

/* 显示 Toast 提示 */
function showToast(text) {
    const toast = document.getElementById('toast');
    toast.innerText = '已复制: ' + text;
    toast.classList.add('show');
    setTimeout(() => toast.classList.remove('show'), 1200);
}


// Tab 切换
function showTab(tabType) {
    renderTab(tabType);
}

// 默认加载第一个 Tab
showTab(1);


// 字体大小控制
const FONT_MIN = 12;
const FONT_MAX = 20;
const FONT_STEP = 1;
const FONT_DEFAULT = 14;

function getFontSize() {
  return parseInt(
    getComputedStyle(document.documentElement)
      .getPropertyValue('--base-font-size')
  );
}

function setFontSize(size) {
  document.documentElement.style.setProperty(
    '--base-font-size',
    size + 'px'
  );
  localStorage.setItem('baseFontSize', size);
}

/* 初始化字体大小（刷新不丢失） */
(function initFontSize() {
  const saved = localStorage.getItem('baseFontSize');
  setFontSize(saved ? Number(saved) : FONT_DEFAULT);
})();

/* 事件绑定 */
document.getElementById('font-increase').onclick = () => {
  const size = Math.min(getFontSize() + FONT_STEP, FONT_MAX);
  setFontSize(size);
};

document.getElementById('font-decrease').onclick = () => {
  const size = Math.max(getFontSize() - FONT_STEP, FONT_MIN);
  setFontSize(size);
};

document.getElementById('font-reset').onclick = () => {
  setFontSize(FONT_DEFAULT);
};
