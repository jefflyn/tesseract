  "37": {
    "title": "Spring\u4e8b\u52a1\u7ba1\u7406",
    "style": "background-color: yellow;",
    "details": "\u9762\u8bd5\u5b98\u60a8\u597d\uff0c**Spring \u4e8b\u52a1\u7ba1\u7406** \u662f\u540e\u7aef\u5f00\u53d1\u4e2d\u6700\u57fa\u7840\u4e5f\u6700\u91cd\u8981\u7684\u6838\u5fc3\u6280\u80fd\u3002\u5728\u6211\u7684\u67b6\u6784\u4e0e\u7814\u53d1\u7ecf\u5386\u4e2d\uff0c\u4e8b\u52a1\u4e0d\u4ec5\u662f\u4fdd\u8bc1\u6570\u636e\u4e00\u81f4\u6027\u7684\u624b\u6bb5\uff0c\u66f4\u662f\u9ad8\u5e76\u53d1\u573a\u666f\u4e0b\u5bb9\u6613\u5f15\u53d1\u6027\u80fd\u74f6\u9888\u548c\u7ebf\u4e0a\u4e8b\u6545\u7684\u5173\u952e\u70b9\u3002\n\n\u6211\u5c06\u4ece**\u6838\u5fc3\u62bd\u8c61**\u3001**\u5b9e\u73b0\u539f\u7406**\u3001**\u4f20\u64ad\u673a\u5236**\u3001**\u5931\u6548\u573a\u666f**\u4ee5\u53ca**\u6700\u4f73\u5b9e\u8df5**\u4e94\u4e2a\u7ef4\u5ea6\u6765\u8fdb\u884c\u6df1\u5ea6\u89e3\u6790\u3002\n\n---\n\n### \u4e00\u3001 \u6838\u5fc3\u62bd\u8c61\uff1aPlatformTransactionManager\n\nSpring \u5e76\u4e0d\u76f4\u63a5\u7ba1\u7406\u4e8b\u52a1\uff0c\u800c\u662f\u63d0\u4f9b\u4e86\u7edf\u4e00\u7684\u62bd\u8c61\u5c42\uff0c\u5c06\u4e8b\u52a1\u7ba1\u7406\u59d4\u6258\u7ed9\u5177\u4f53\u7684\u6301\u4e45\u5c42\u6846\u67b6\uff08\u5982 JDBC, Hibernate, MyBatis\uff09\u3002\n\n\u5176\u6838\u5fc3\u63a5\u53e3\u662f `PlatformTransactionManager`\uff0c\u5b83\u5b9a\u4e49\u4e86\u4e8b\u52a1\u7ba1\u7406\u7684\u4e09\u4e2a\u6838\u5fc3\u64cd\u4f5c\uff1a\n1.  `getTransaction(TransactionDefinition definition)`\uff1a\u83b7\u53d6\u4e8b\u52a1\u3002\n2.  `commit(TransactionStatus status)`\uff1a\u63d0\u4ea4\u4e8b\u52a1\u3002\n3.  `rollback(TransactionStatus status)`\uff1a\u56de\u6eda\u4e8b\u52a1\u3002\n\n**\u7f16\u7a0b\u5f0f vs \u58f0\u660e\u5f0f**\uff1a\n*   **\u7f16\u7a0b\u5f0f\u4e8b\u52a1**\uff1a\u5728\u4ee3\u7801\u4e2d\u624b\u52a8\u8c03\u7528 `commit` \u548c `rollback`\u3002\u867d\u7136\u7075\u6d3b\uff0c\u4f46\u4ee3\u7801\u4fb5\u5165\u6027\u5f3a\uff0c\u96be\u4ee5\u7ef4\u62a4\u3002\u6211\u5728\u65e9\u671f\u7684\u6838\u5fc3\u8d44\u91d1\u4ea4\u6613\u6a21\u5757\u4e2d\u5076\u5c14\u4f1a\u4f7f\u7528\uff0c\u4ee5\u4fbf\u7cbe\u786e\u63a7\u5236\u4e8b\u52a1\u8fb9\u754c\u3002\n*   **\u58f0\u660e\u5f0f\u4e8b\u52a1**\uff1a\u57fa\u4e8e **Spring AOP** \u5b9e\u73b0\uff0c\u901a\u8fc7 `@Transactional` \u6ce8\u89e3\u5c06\u4e8b\u52a1\u7ba1\u7406\u4ece\u4e1a\u52a1\u4ee3\u7801\u4e2d\u89e3\u8026\u51fa\u6765\u3002\u8fd9\u662f\u76ee\u524d\u6700\u4e3b\u6d41\u7684\u65b9\u5f0f\u3002\n\n---\n\n### \u4e8c\u3001 \u5b9e\u73b0\u539f\u7406\uff1aAOP \u4e0e TransactionInterceptor\n\n\u58f0\u660e\u5f0f\u4e8b\u52a1\u7684\u5e95\u5c42\u5b9e\u73b0\u5b8c\u5168\u4f9d\u8d56\u4e8e **Spring AOP**\u3002\n\n1.  **\u4ee3\u7406\u5bf9\u8c61\u7684\u521b\u5efa**\uff1aSpring \u5bb9\u5668\u542f\u52a8\u65f6\uff0c\u4f1a\u68c0\u6d4b\u6240\u6709\u5e26\u6709 `@Transactional` \u6ce8\u89e3\u7684 Bean\uff0c\u5e76\u4e3a\u5b83\u4eec\u521b\u5efa\u4ee3\u7406\u5bf9\u8c61\uff08JDK \u52a8\u6001\u4ee3\u7406\u6216 CGLIB\uff09\u3002\n2.  **\u65b9\u6cd5\u62e6\u622a**\uff1a\u5f53\u5916\u90e8\u8c03\u7528\u4e8b\u52a1\u65b9\u6cd5\u65f6\uff0c\u5b9e\u9645\u4e0a\u8c03\u7528\u7684\u662f\u4ee3\u7406\u5bf9\u8c61\u7684\u65b9\u6cd5\u3002\u4ee3\u7406\u5bf9\u8c61\u4f1a\u8c03\u7528 `TransactionInterceptor`\uff08\u4e8b\u52a1\u62e6\u622a\u5668\uff09\u3002\n3.  **\u4e8b\u52a1\u589e\u5f3a\u903b\u8f91**\uff1a\n    *   **\u524d\u7f6e\u901a\u77e5**\uff1a\u62e6\u622a\u5668\u6839\u636e\u4e8b\u52a1\u914d\u7f6e\uff08\u4f20\u64ad\u884c\u4e3a\u3001\u9694\u79bb\u7ea7\u522b\uff09\uff0c\u8c03\u7528 `PlatformTransactionManager.getTransaction()` \u5f00\u542f\u4e8b\u52a1\u3002\n    *   **\u6267\u884c\u76ee\u6807\u65b9\u6cd5**\uff1a\u8c03\u7528\u539f\u59cb\u4e1a\u52a1\u5bf9\u8c61\u7684\u65b9\u6cd5\u6267\u884c SQL\u3002\n    *   **\u540e\u7f6e\u901a\u77e5**\uff1a\n        *   \u5982\u679c\u65b9\u6cd5\u6267\u884c\u6210\u529f\uff0c\u8c03\u7528 `commit` \u63d0\u4ea4\u4e8b\u52a1\u3002\n        *   \u5982\u679c\u65b9\u6cd5\u629b\u51fa\u5f02\u5e38\uff0c\u5224\u65ad\u5f02\u5e38\u7c7b\u578b\uff08\u9ed8\u8ba4\u53ea\u5bf9 `RuntimeException` \u548c `Error` \u56de\u6eda\uff09\uff0c\u51b3\u5b9a\u662f `commit` \u8fd8\u662f `rollback`\u3002\n\n---\n\n### \u4e09\u3001 \u4e8b\u52a1\u4f20\u64ad\u673a\u5236\n\n\u8fd9\u662f Spring \u4e8b\u52a1\u6700\u5f3a\u5927\u7684\u529f\u80fd\uff0c\u5b9a\u4e49\u4e86\u4e8b\u52a1\u65b9\u6cd5\u4e4b\u95f4\u5982\u4f55\u76f8\u4e92\u5f71\u54cd\u3002\u6211\u5728\u67b6\u6784\u8bbe\u8ba1\u4e2d\uff0c\u7ecf\u5e38\u9700\u8981\u6839\u636e\u4e1a\u52a1\u573a\u666f\u9009\u62e9\u5408\u9002\u7684\u4f20\u64ad\u884c\u4e3a\u3002\n\n**\u5e38\u7528\u7684 7 \u79cd\u4f20\u64ad\u884c\u4e3a**\uff1a\n\n1.  **`REQUIRED`\uff08\u9ed8\u8ba4\uff09**\uff1a\n    *   \u5982\u679c\u5f53\u524d\u5b58\u5728\u4e8b\u52a1\uff0c\u5219\u52a0\u5165\u8be5\u4e8b\u52a1\uff1b\u5982\u679c\u4e0d\u5b58\u5728\uff0c\u5219\u65b0\u5efa\u4e00\u4e2a\u4e8b\u52a1\u3002\n    *   **\u573a\u666f**\uff1a\u7edd\u5927\u591a\u6570\u4e1a\u52a1\u573a\u666f\uff0c\u5982\u7528\u6237\u6ce8\u518c\u3001\u8ba2\u5355\u521b\u5efa\u3002\n2.  **`REQUIRES_NEW`**\uff1a\n    *   \u65e0\u8bba\u662f\u5426\u5b58\u5728\u4e8b\u52a1\uff0c\u90fd\u65b0\u5efa\u4e00\u4e2a\u4e8b\u52a1\u3002\u5982\u679c\u5f53\u524d\u5b58\u5728\u4e8b\u52a1\uff0c\u5219\u5c06\u5f53\u524d\u4e8b\u52a1\u6302\u8d77\u3002\n    *   **\u573a\u666f**\uff1a**\u65e5\u5fd7\u8bb0\u5f55\u3001\u5ba1\u8ba1\u529f\u80fd**\u3002\u5373\u4f7f\u4e3b\u4e1a\u52a1\u56de\u6eda\u4e86\uff0c\u65e5\u5fd7\u4e5f\u4e0d\u80fd\u4e22\u5931\u3002\u6216\u8005**\u72ec\u7acb\u6263\u6b3e**\uff0c\u65e0\u8bba\u5916\u90e8\u6d41\u7a0b\u6210\u529f\u4e0e\u5426\uff0c\u6263\u6b3e\u5fc5\u987b\u72ec\u7acb\u63d0\u4ea4\u3002\n    *   *\u6ce8\u610f*\uff1a\u6302\u8d77\u4e8b\u52a1\u610f\u5473\u7740\u9700\u8981\u989d\u5916\u7684\u8d44\u6e90\u5f00\u9500\uff0c\u9ad8\u5e76\u53d1\u4e0b\u9700\u614e\u7528\u3002\n3.  **`NESTED`**\uff1a\n    *   \u5982\u679c\u5f53\u524d\u5b58\u5728\u4e8b\u52a1\uff0c\u5219\u521b\u5efa\u4e00\u4e2a\u5d4c\u5957\u4e8b\u52a1\uff08Savepoint\uff09\uff1b\u5982\u679c\u4e0d\u5b58\u5728\uff0c\u5219\u65b0\u5efa\u4e8b\u52a1\u3002\n    *   **\u573a\u666f**\uff1a**\u6279\u91cf\u5904\u7406\u4e1a\u52a1**\u3002\u4f8b\u5982\u6279\u91cf\u5bfc\u5165\u7528\u6237\uff0c\u5982\u679c\u7b2c 10 \u4e2a\u7528\u6237\u5931\u8d25\uff0c\u53ea\u56de\u6eda\u7b2c 10 \u4e2a\u7528\u6237\u7684\u64cd\u4f5c\uff08\u56de\u5230 Savepoint\uff09\uff0c\u4e3b\u4e8b\u52a1\u53ef\u4ee5\u7ee7\u7eed\u6267\u884c\u6216\u6355\u83b7\u5f02\u5e38\u540e\u7ee7\u7eed\u5904\u7406\u4e0b\u4e00\u4e2a\u3002\n    *   *\u533a\u522b*\uff1a`NESTED` \u662f\u4e3b\u4e8b\u52a1\u7684\u4e00\u90e8\u5206\uff0c\u5982\u679c\u4e3b\u4e8b\u52a1\u56de\u6eda\uff0c\u5d4c\u5957\u4e8b\u52a1\u4e5f\u4f1a\u56de\u6eda\uff1b\u800c `REQUIRES_NEW` \u662f\u72ec\u7acb\u63d0\u4ea4\u7684\u3002\n4.  **`SUPPORTS`**\u3001`NOT_SUPPORTED`\u3001`MANDATORY`\u3001`NEVER`\uff1a\n    *   \u8fd9\u51e0\u79cd\u5728\u4e1a\u52a1\u5f00\u53d1\u4e2d\u8f83\u5c11\u4f7f\u7528\uff0c\u4e3b\u8981\u7528\u4e8e\u7279\u5b9a\u7684\u6280\u672f\u7ea6\u675f\u573a\u666f\u3002\n\n---\n\n### \u56db\u3001 \u4e8b\u52a1\u5931\u6548\u7684 7 \u5927\u7ecf\u5178\u573a\u666f\n\n\u8fd9\u662f\u9762\u8bd5\u548c\u5b9e\u6218\u4e2d\u7684\u9ad8\u9891\u8003\u70b9\uff0c\u4e5f\u662f\u6211\u5728 Code Review \u4e2d\u91cd\u70b9\u68c0\u67e5\u7684\u5185\u5bb9\uff1a\n\n1.  **\u65b9\u6cd5\u8bbf\u95ee\u6743\u9650\u95ee\u9898**\uff1a\n    *   `@Transactional` \u6ce8\u89e3\u7684\u65b9\u6cd5\u5fc5\u987b\u662f `public`\u3002Spring AOP \u9ed8\u8ba4\u53ea\u62e6\u622a public \u65b9\u6cd5\uff0c\u5426\u5219\u4e8b\u52a1\u5931\u6548\u3002\n2.  **\u65b9\u6cd5\u5185\u90e8\u8c03\u7528\uff08\u540c\u7c7b\u81ea\u8c03\u7528\uff09**\uff1a\n    *   \u5728\u540c\u4e00\u4e2a\u7c7b\u4e2d\uff0c\u4e00\u4e2a\u975e\u4e8b\u52a1\u65b9\u6cd5 A \u8c03\u7528\u4e8b\u52a1\u65b9\u6cd5 B\uff0c\u4e8b\u52a1\u5931\u6548\u3002\n    *   **\u539f\u56e0**\uff1a`this.methodB()` \u76f4\u63a5\u8c03\u7528\u76ee\u6807\u5bf9\u8c61\uff0c\u7ed5\u8fc7\u4e86\u4ee3\u7406\u5bf9\u8c61\u3002\n    *   **\u89e3\u51b3**\uff1a\u6ce8\u5165\u81ea\u8eab `selfService.methodB()` \u6216\u4f7f\u7528 `AopContext.currentProxy()`\u3002\n3.  **\u5f02\u5e38\u5904\u7406\u4e0d\u5f53**\uff1a\n    *   **\u9ed8\u8ba4\u673a\u5236**\uff1aSpring \u9ed8\u8ba4\u53ea\u5bf9 `RuntimeException` \u548c `Error` \u56de\u6eda\u3002\n    *   **\u5931\u6548\u573a\u666f**\uff1a\u5982\u679c\u65b9\u6cd5\u5185\u90e8 `try-catch` \u6355\u83b7\u4e86\u5f02\u5e38\u4e14\u6ca1\u6709\u629b\u51fa\uff0c\u6216\u8005\u629b\u51fa\u4e86 `checked exception`\uff08\u5982 `Exception`\uff09\uff0c\u4e8b\u52a1\u4e0d\u4f1a\u56de\u6eda\u3002\n    *   **\u89e3\u51b3**\uff1a\u914d\u7f6e `@Transactional(rollbackFor = Exception.class)`\u3002\n4.  **\u6570\u636e\u5e93\u5f15\u64ce\u4e0d\u652f\u6301\u4e8b\u52a1**\uff1a\n    *   \u4f8b\u5982 MySQL \u7684 `MyISAM` \u5f15\u64ce\u4e0d\u652f\u6301\u4e8b\u52a1\uff0c\u5fc5\u987b\u4f7f\u7528 `InnoDB`\u3002\n5.  **Bean \u672a\u88ab Spring \u7ba1\u7406**\uff1a\n    *   \u5982\u679c\u4e8b\u52a1\u7c7b\u6ca1\u6709\u901a\u8fc7 `@Service` \u7b49\u6ce8\u89e3\u6ce8\u518c\u4e3a Spring Bean\uff0cAOP \u65e0\u6cd5\u5207\u5165\u3002\n6.  **\u591a\u7ebf\u7a0b\u8c03\u7528**\uff1a\n    *   Spring \u4e8b\u52a1\u662f\u57fa\u4e8e\u7ebf\u7a0b\u672c\u5730\u53d8\u91cf\u5b58\u50a8\u6570\u636e\u5e93\u8fde\u63a5\u7684\u3002\u5982\u679c\u4e8b\u52a1\u65b9\u6cd5\u5185\u90e8\u5f00\u542f\u4e86\u65b0\u7ebf\u7a0b\u6267\u884c SQL\uff0c\u65b0\u7ebf\u7a0b\u62e5\u6709\u72ec\u7acb\u7684 Connection\uff0c\u4e0d\u53d7\u4e3b\u7ebf\u7a0b\u4e8b\u52a1\u63a7\u5236\u3002\n7.  **\u9519\u8bef\u7684\u4f20\u64ad\u884c\u4e3a**\uff1a\n    *   \u914d\u7f6e\u4e86 `PROPAGATION_NEVER` \u6216 `PROPAGATION_NOT_SUPPORTED`\uff0c\u4e8b\u52a1\u81ea\u7136\u5931\u6548\u3002\n\n---\n\n### \u4e94\u3001 \u67b6\u6784\u5e08\u89c6\u89d2\u7684\u6700\u4f73\u5b9e\u8df5\n\n\u5728\u8bbe\u8ba1\u548c\u4f18\u5316\u7cfb\u7edf\u65f6\uff0c\u6211\u5bf9\u4e8b\u52a1\u6709\u4ee5\u4e0b\u8981\u6c42\uff1a\n\n1.  **\u4e8b\u52a1\u8d8a\u5c0f\u8d8a\u597d**\uff1a\n    *   **\u539f\u5219**\uff1a\u4e8b\u52a1\u4e2d\u4e0d\u8981\u5305\u542b RPC \u8c03\u7528\uff08\u5982 Feign \u63a5\u53e3\uff09\u3001HTTP \u8bf7\u6c42\u3001\u8017\u65f6\u7684\u590d\u6742\u8ba1\u7b97\u3002\n    *   **\u98ce\u9669**\uff1a\u4e8b\u52a1\u65f6\u95f4\u8fc7\u957f\u4f1a\u5bfc\u81f4\u6570\u636e\u5e93\u8fde\u63a5\u6c60\u8017\u5c3d\uff0c\u5f15\u53d1\u7cfb\u7edf\u96ea\u5d29\u3002\n    *   **\u5b9e\u8df5**\uff1a\u5c06\u975e DB \u64cd\u4f5c\u79fb\u5230\u4e8b\u52a1\u5916\u90e8\uff0c\u6216\u8005\u4f7f\u7528\u7f16\u7a0b\u5f0f\u4e8b\u52a1\u7cbe\u786e\u63a7\u5236\u8fb9\u754c\u3002\n\n2.  **\u8bfb\u5199\u5206\u79bb\u4e0e\u4e8b\u52a1**\uff1a\n    *   \u5728\u914d\u7f6e\u4e86\u8bfb\u5199\u5206\u79bb\u7684\u67b6\u6784\u4e2d\uff0c`@Transactional` \u9ed8\u8ba4\u4f1a\u8def\u7531\u5230\u4e3b\u5e93\u3002\u5982\u679c\u53ea\u662f\u7b80\u5355\u7684\u67e5\u8be2\uff0c\u5efa\u8bae\u4e0d\u52a0\u4e8b\u52a1\u6216\u4f7f\u7528 `@Transactional(readOnly = true)`\uff0c\u4ee5\u4fbf\u8def\u7531\u5230\u4ece\u5e93\uff0c\u51cf\u8f7b\u4e3b\u5e93\u538b\u529b\u3002\n\n3.  **\u907f\u514d\u5927\u4e8b\u52a1**\uff1a\n    *   \u6211\u66fe\u9047\u5230\u8fc7\u56e0\u4e3a\u4e00\u4e2a\u957f\u4e8b\u52a1\u5bfc\u81f4\u6b7b\u9501\u7684\u95ee\u9898\u3002\u89e3\u51b3\u65b9\u6cd5\u662f\u62c6\u5206\u4e1a\u52a1\uff0c\u5c06\u975e\u6838\u5fc3\u64cd\u4f5c\uff08\u5982\u53d1 MQ \u6d88\u606f\u3001\u66f4\u65b0\u7f13\u5b58\uff09\u79fb\u51fa\u4e8b\u52a1\uff0c\u901a\u8fc7\u76d1\u542c\u5668\u6a21\u5f0f\u5728\u4e8b\u52a1\u63d0\u4ea4\u540e\u6267\u884c\u3002\n\n4.  **\u9694\u79bb\u7ea7\u522b\u8bbe\u7f6e**\uff1a\n    *   MySQL \u9ed8\u8ba4\u662f `REPEATABLE_READ`\uff08\u53ef\u91cd\u590d\u8bfb\uff09\u3002\n    *   \u5728\u67d0\u4e9b\u9ad8\u5e76\u53d1\u6263\u51cf\u5e93\u5b58\u573a\u666f\uff0c\u4e3a\u4e86\u9632\u6b62\u5e7b\u8bfb\uff0c\u6211\u4f1a\u8003\u8651\u663e\u5f0f\u8bbe\u7f6e\u9694\u79bb\u7ea7\u522b\uff0c\u6216\u8005\u4f9d\u8d56\u5206\u5e03\u5f0f\u9501 + \u6570\u636e\u5e93\u4e50\u89c2\u9501\uff0c\u800c\u4e0d\u662f\u76f2\u76ee\u4f9d\u8d56\u6570\u636e\u5e93\u4e8b\u52a1\u3002\n\n---\n\n### \u603b\u7ed3\n\nSpring \u4e8b\u52a1\u7ba1\u7406\u901a\u8fc7 **AOP** \u5b9e\u73b0\u4e86\u58f0\u660e\u5f0f\u63a7\u5236\uff0c\u6781\u5927\u7b80\u5316\u4e86\u5f00\u53d1\u3002\u4f46\u4f5c\u4e3a\u67b6\u6784\u5e08\uff0c\u5fc5\u987b\u6df1\u5165\u7406\u89e3\u5176**\u4f20\u64ad\u673a\u5236**\u548c**\u5931\u6548\u573a\u666f**\uff0c\u624d\u80fd\u5728\u590d\u6742\u7684\u4e1a\u52a1\u573a\u666f\u4e2d\u4fdd\u8bc1\u6570\u636e\u7684\u4e00\u81f4\u6027\u548c\u7cfb\u7edf\u7684\u9ad8\u6027\u80fd\u3002\n\n\u4ee5\u4e0a\u662f\u6211\u5bf9 Spring \u4e8b\u52a1\u7ba1\u7406\u7684\u7406\u89e3\u3002\u8bf7\u95ee\u60a8\u60f3\u6df1\u5165\u4e86\u89e3 **Spring \u4e8b\u52a1\u7684\u9694\u79bb\u7ea7\u522b\u89e3\u51b3\u5e76\u53d1\u95ee\u9898\u7684\u539f\u7406** \u6216\u8005 **\u5206\u5e03\u5f0f\u4e8b\u52a1 Seata \u7684\u5b9e\u73b0\u7ec6\u8282** \u5417\uff1f",

  "40": {
    "title": "\u6ce8\u89e3\u5931\u6548\u539f\u7406\u4ee5\u53ca\u89e3\u51b3",
    "style": "background-color: yellow;",
    "details": "\u9762\u8bd5\u5b98\u60a8\u597d\uff0c**\u6ce8\u89e3\u5931\u6548** \u662f Spring \u5f00\u53d1\u4e2d\u975e\u5e38\u5e38\u89c1\u4e14\u9690\u853d\u7684\u201c\u5751\u201d\u3002\u5728\u6211\u7684\u67b6\u6784\u548c\u5f00\u53d1\u7ecf\u9a8c\u4e2d\uff0c\u8fd9\u7c7b\u95ee\u9898\u901a\u5e38\u4e0d\u662f\u8bed\u6cd5\u9519\u8bef\uff0c\u800c\u662f\u5bf9 **Spring \u5bb9\u5668\u7ba1\u7406\u673a\u5236** \u548c **AOP \u52a8\u6001\u4ee3\u7406\u539f\u7406** \u7406\u89e3\u4e0d\u591f\u6df1\u5165\u5bfc\u81f4\u7684\u3002\n\n\u6211\u5c06\u4ece**\u6838\u5fc3\u539f\u7406**\u3001**\u5e38\u89c1\u5931\u6548\u573a\u666f** \u4ee5\u53ca**\u89e3\u51b3\u65b9\u6848** \u4e09\u4e2a\u7ef4\u5ea6\u6765\u7cfb\u7edf\u56de\u7b54\u8fd9\u4e2a\u95ee\u9898\u3002\n\n---\n\n### \u4e00\u3001 \u6838\u5fc3\u539f\u7406\uff1a\u4e3a\u4ec0\u4e48\u6ce8\u89e3\u4f1a\u5931\u6548\uff1f\n\n\u8981\u7406\u89e3\u6ce8\u89e3\u5931\u6548\uff0c\u5fc5\u987b\u5148\u660e\u786e\u4e24\u4e2a\u524d\u63d0\uff1a\n\n1.  **Spring \u7684\u63a7\u5236\u53cd\u8f6c**\uff1aSpring \u901a\u8fc7\u5bb9\u5668\u7ba1\u7406 Bean \u7684\u751f\u547d\u5468\u671f\u3002\u6ce8\u89e3\uff08\u5982 `@Transactional`, `@Async`, `@Cacheable`\uff09\u7684\u529f\u80fd\uff0c\u5927\u591a\u662f\u7531 **BeanPostProcessor\uff08\u540e\u7f6e\u5904\u7406\u5668\uff09** \u5728 Bean \u521d\u59cb\u5316\u9636\u6bb5\u901a\u8fc7\u751f\u6210 **\u52a8\u6001\u4ee3\u7406\u5bf9\u8c61** \u6765\u5b9e\u73b0\u7684\u3002\n2.  **\u4ee3\u7406\u673a\u5236**\uff1a\u5f53\u6211\u4eec\u8c03\u7528\u4e00\u4e2a\u5e26\u6709\u7279\u6b8a\u6ce8\u89e3\u7684\u65b9\u6cd5\u65f6\uff0c\u672c\u8d28\u4e0a\u662f\u8c03\u7528\u4ee3\u7406\u5bf9\u8c61\u7684\u65b9\u6cd5\uff0c\u4ee3\u7406\u5bf9\u8c61\u8d1f\u8d23\u5904\u7406\u903b\u8f91\uff08\u5982\u5f00\u542f\u4e8b\u52a1\u3001\u7f13\u5b58\u67e5\u8be2\uff09\uff0c\u7136\u540e\u518d\u8c03\u7528\u76ee\u6807\u5bf9\u8c61\u7684\u65b9\u6cd5\u3002\n\n**\u5931\u6548\u7684\u672c\u8d28**\uff1a**\u4ee3\u7801\u6267\u884c\u65f6\u7ed5\u8fc7\u4e86\u4ee3\u7406\u5bf9\u8c61\uff0c\u76f4\u63a5\u8c03\u7528\u4e86\u76ee\u6807\u5bf9\u8c61\u7684\u65b9\u6cd5\u3002**\n\n---\n\n### \u4e8c\u3001 \u5e38\u89c1\u5931\u6548\u573a\u666f\u4e0e\u539f\u7406\u89e3\u6790\n\n#### 1. \u7c7b\u5185\u90e8\u8c03\u7528\u2014\u2014 \u6700\u5e38\u89c1\u7684\u201c\u5751\u201d\n\n*   **\u573a\u666f**\uff1a\n    ```java\n    @Service\n    public class OrderService {\n        public void createOrder() {\n            // ... \u4e1a\u52a1\u903b\u8f91 ...\n            this.saveOrder(); // \u7c7b\u5185\u90e8\u8c03\u7528\n        }\n\n        @Transactional\n        public void saveOrder() {\n            // ... \u6570\u636e\u5e93\u64cd\u4f5c ...\n        }\n    }\n    ```\n*   **\u539f\u7406\u5206\u6790**\uff1a\n    *   `createOrder()` \u65b9\u6cd5\u8c03\u7528 `this.saveOrder()`\u3002\n    *   \u8fd9\u91cc\u7684 `this` \u6307\u7684\u662f **\u76ee\u6807\u5bf9\u8c61\u672c\u8eab**\uff0c\u800c\u4e0d\u662f **\u4ee3\u7406\u5bf9\u8c61**\u3002\n    *   Spring \u7684\u4e8b\u52a1\u5207\u9762\u903b\u8f91\u662f\u7ec7\u5165\u5728\u4ee3\u7406\u5bf9\u8c61\u4e2d\u7684\u3002\u76f4\u63a5\u8c03\u7528 `this` \u65b9\u6cd5\uff0c\u7ed5\u8fc7\u4e86\u4ee3\u7406\uff0c`@Transactional` \u6ce8\u89e3\u81ea\u7136\u5931\u6548\u3002\n*   **\u89e3\u51b3\u65b9\u6848**\uff1a\n    *   **\u65b9\u6848 A\uff08\u63a8\u8350\uff09\uff1a\u62c6\u5206\u4ee3\u7801**\u3002\u5c06 `saveOrder` \u62bd\u79bb\u5230\u53e6\u4e00\u4e2a Service \u4e2d\u6ce8\u5165\u8c03\u7528\uff0c\u7b26\u5408\u5355\u4e00\u804c\u8d23\u539f\u5219\u3002\n    *   **\u65b9\u6848 B\uff1a\u81ea\u6ce8\u5165**\u3002\n        ```java\n        @Service\n        public class OrderService {\n            @Autowired\n            private OrderService self; // \u6ce8\u5165\u81ea\u5df1\uff08\u4ee3\u7406\u5bf9\u8c61\uff09\n\n            public void createOrder() {\n                self.saveOrder(); // \u901a\u8fc7\u4ee3\u7406\u8c03\u7528\n            }\n        }\n        ```\n    *   **\u65b9\u6848 C\uff1aAopContext**\u3002\n        ```java\n        ((OrderService) AopContext.currentProxy()).saveOrder();\n        ```\n        *\u6ce8\u610f\uff1a\u9700\u8981\u5728\u914d\u7f6e\u7c7b\u5f00\u542f `@EnableAspectJAutoProxy(exposeProxy = true)`\u3002*\n\n#### 2. \u65b9\u6cd5\u8bbf\u95ee\u6743\u9650\u95ee\u9898\n\n*   **\u573a\u666f**\uff1a\u5c06 `@Transactional` \u6216 `@Async` \u6ce8\u89e3\u6807\u6ce8\u5728 `private` \u6216 `protected` \u65b9\u6cd5\u4e0a\u3002\n    ```java\n    @Transactional\n    private void process() { ... }\n    ```\n*   **\u539f\u7406\u5206\u6790**\uff1a\n    *   Spring \u7684 AOP \u9ed8\u8ba4\u4f7f\u7528 CGLIB \u4ee3\u7406\uff08JDK \u52a8\u6001\u4ee3\u7406\u8981\u6c42\u5b9e\u73b0\u63a5\u53e3\uff09\u3002\n    *   CGLIB \u901a\u8fc7\u751f\u6210\u5b50\u7c7b\u6765\u4ee3\u7406\u3002\u5b50\u7c7b\u65e0\u6cd5\u91cd\u5199\u7236\u7c7b\u7684 `private` \u65b9\u6cd5\u3002\n    *   \u56e0\u6b64\uff0cSpring \u65e0\u6cd5\u62e6\u622a `private` \u65b9\u6cd5\uff0c\u5bfc\u81f4\u6ce8\u89e3\u5931\u6548\u3002\n*   **\u89e3\u51b3\u65b9\u6848**\uff1a\u5fc5\u987b\u5c06\u65b9\u6cd5\u4fee\u9970\u7b26\u6539\u4e3a `public`\u3002\n\n#### 3. \u65b9\u6cd5\u662f final \u6216 static\n\n*   **\u573a\u666f**\uff1a\n    ```java\n    @Transactional\n    public final void process() { ... }\n    ```\n*   **\u539f\u7406\u5206\u6790**\uff1a\n    *   **final**\uff1aCGLIB \u65e0\u6cd5\u91cd\u5199 final \u65b9\u6cd5\uff0c\u65e0\u6cd5\u751f\u6210\u4ee3\u7406\u5b50\u7c7b\uff0c\u4ee3\u7406\u5931\u6548\u3002\n    *   **static**\uff1a\u9759\u6001\u65b9\u6cd5\u5c5e\u4e8e\u7c7b\uff0c\u4e0d\u5c5e\u4e8e\u5bf9\u8c61\u5b9e\u4f8b\uff0cAOP \u4ee3\u7406\u7684\u662f\u5b9e\u4f8b\uff0c\u65e0\u6cd5\u62e6\u622a\u9759\u6001\u65b9\u6cd5\u3002\n*   **\u89e3\u51b3\u65b9\u6848**\uff1a\u79fb\u9664 `final` \u6216 `static` \u4fee\u9970\u7b26\u3002\n\n#### 4. Bean \u672a\u88ab Spring \u7ba1\u7406\n\n*   **\u573a\u666f**\uff1a\u624b\u52a8 `new` \u51fa\u6765\u7684\u5bf9\u8c61\uff0c\u6216\u8005\u5728\u4e0d\u88ab Spring \u626b\u63cf\u7684\u5305\u8def\u5f84\u4e0b\u3002\n    ```java\n    public class UserService {\n        @Autowired\n        private UserMapper userMapper;\n    }\n\n    // \u5728 Controller \u4e2d\n    UserService userService = new UserService(); // \u624b\u52a8 new\n    ```\n*   **\u539f\u7406\u5206\u6790**\uff1a\n    *   \u53ea\u6709\u88ab Spring \u5bb9\u5668\u7ba1\u7406\u7684 Bean\uff0cSpring \u624d\u80fd\u6267\u884c\u4f9d\u8d56\u6ce8\u5165\u548c AOP \u4ee3\u7406\u3002\n    *   \u624b\u52a8 `new` \u51fa\u6765\u7684\u5bf9\u8c61\u662f JVM \u539f\u751f\u5bf9\u8c61\uff0c\u4e0e Spring \u5bb9\u5668\u65e0\u5173\uff0c`@Autowired` \u548c\u5176\u4ed6\u6ce8\u89e3\u5747\u5931\u6548\u3002\n*   **\u89e3\u51b3\u65b9\u6848**\uff1a\u786e\u4fdd\u7c7b\u4e0a\u6709 `@Service`, `@Component` \u7b49\u6ce8\u89e3\uff0c\u4e14\u5728\u626b\u63cf\u8def\u5f84\u5185\uff1b\u7981\u6b62\u624b\u52a8 new Bean\u3002\n\n#### 5. \u5f02\u5e38\u5904\u7406\u4e0d\u5f53\uff08\u9488\u5bf9 `@Transactional`\uff09\n\n*   **\u573a\u666f**\uff1a\n    ```java\n    @Transactional\n    public void process() {\n        try {\n            // ... \u6570\u636e\u5e93\u64cd\u4f5c ...\n            int i = 1 / 0; // \u629b\u51fa\u5f02\u5e38\n        } catch (Exception e) {\n            e.printStackTrace();\n            // \u624b\u52a8\u6355\u83b7\u4e86\u5f02\u5e38\uff0c\u672a\u91cd\u65b0\u629b\u51fa\n        }\n    }\n    ```\n*   **\u539f\u7406\u5206\u6790**\uff1a\n    *   Spring \u4e8b\u52a1\u9ed8\u8ba4\u53ea\u5728\u6355\u83b7\u5230 `RuntimeException` \u548c `Error` \u65f6\u56de\u6eda\u3002\n    *   \u5982\u679c\u4ee3\u7801\u4e2d\u624b\u52a8 `catch` \u4e86\u5f02\u5e38\u4e14\u6ca1\u6709\u518d\u6b21\u629b\u51fa\uff0c\u4e8b\u52a1\u7ba1\u7406\u5668\u8ba4\u4e3a\u65b9\u6cd5\u6267\u884c\u6210\u529f\uff0c\u56e0\u6b64\u4e0d\u4f1a\u56de\u6eda\u3002\n*   **\u89e3\u51b3\u65b9\u6848**\uff1a\n    *   \u4e0d\u6355\u83b7\u5f02\u5e38\uff0c\u8ba9\u5176\u81ea\u7136\u629b\u51fa\u3002\n    *   \u6216\u8005\u6355\u83b7\u540e\u624b\u52a8\u8c03\u7528 `TransactionAspectSupport.currentTransactionStatus().setRollbackOnly()`\u3002\n\n---\n\n### \u4e09\u3001 \u603b\u7ed3\u4e0e\u5b9e\u6218\u5efa\u8bae\n\n\u5728\u6211\u7684\u9879\u76ee\u4e2d\uff0c\u4e3a\u4e86\u907f\u514d\u6ce8\u89e3\u5931\u6548\uff0c\u6211\u901a\u5e38\u4f1a\u5236\u5b9a\u4ee5\u4e0b\u5f00\u53d1\u89c4\u8303\uff1a\n\n1.  **\u4ee3\u7801\u7ed3\u6784\u89c4\u8303**\uff1a\u907f\u514d\u5728\u540c\u4e00\u4e2a\u7c7b\u4e2d\u901a\u8fc7 `this` \u8c03\u7528\u5e26\u6709\u589e\u5f3a\u6ce8\u89e3\u7684\u65b9\u6cd5\u3002\u5982\u679c\u903b\u8f91\u590d\u6742\uff0c\u4f18\u5148\u8003\u8651\u62c6\u5206 Service\u3002\n2.  **\u65b9\u6cd5\u7b7e\u540d\u89c4\u8303**\uff1a\u9700\u8981\u4ee3\u7406\u589e\u5f3a\u7684\u65b9\u6cd5\uff0c\u5fc5\u987b\u4e25\u683c\u5b9a\u4e49\u4e3a `public`\uff0c\u4e14\u975e `static`\u3001\u975e `final`\u3002\n3.  **\u5f02\u5e38\u5904\u7406\u89c4\u8303**\uff1a\u4f7f\u7528 `@Transactional` \u65f6\uff0c\u660e\u786e\u6307\u5b9a\u56de\u6eda\u5f02\u5e38\u7c7b\u578b `rollbackFor = Exception.class`\uff0c\u4e14\u5728\u4e1a\u52a1\u5c42\u5c3d\u91cf\u5c11\u7528 `try-catch` \u541e\u6ca1\u5f02\u5e38\u3002\n4.  **\u67b6\u6784\u5c42\u9762**\uff1a\u5bf9\u4e8e\u6838\u5fc3\u4e1a\u52a1\u903b\u8f91\uff0c\u5229\u7528 `BeanPostProcessor` \u6216\u81ea\u5b9a\u4e49\u6ce8\u89e3 + AOP \u8fdb\u884c\u7edf\u4e00\u5904\u7406\u65f6\uff0c\u5fc5\u987b\u7f16\u5199\u5355\u5143\u6d4b\u8bd5\u9a8c\u8bc1\u5207\u9762\u662f\u5426\u751f\u6548\uff0c\u9632\u6b62\u56e0\u914d\u7f6e\u9519\u8bef\u5bfc\u81f4\u6ce8\u89e3\u5931\u6548\u3002\n\n\u4ee5\u4e0a\u662f\u6211\u5bf9 Spring \u6ce8\u89e3\u5931\u6548\u539f\u7406\u7684\u5206\u6790\u53ca\u89e3\u51b3\u65b9\u6848\uff0c\u8bf7\u95ee\u60a8\u5bf9 AOP \u7684\u5177\u4f53\u5b9e\u73b0\u65b9\u5f0f\uff08JDK vs CGLIB\uff09\u611f\u5174\u8da3\u5417\uff1f",
    "subItems": []

  "52": {
    "title": "\u6570\u636e\u5e93\u4e8b\u52a1\u4ecb\u7ecd",
    "style": "background-color: yellow;",
    "details": "\u9762\u8bd5\u5b98\u60a8\u597d\uff0c**\u6570\u636e\u5e93\u4e8b\u52a1** \u662f\u540e\u7aef\u5f00\u53d1\u4fdd\u8bc1\u6570\u636e\u4e00\u81f4\u6027\u7684\u57fa\u77f3\u3002\u5728\u91d1\u878d\u652f\u4ed8\u3001\u7535\u5546\u4ea4\u6613\u7b49\u6838\u5fc3\u7cfb\u7edf\u4e2d\uff0c\u5bf9\u4e8b\u52a1\u7684\u6b63\u786e\u4f7f\u7528\u76f4\u63a5\u51b3\u5b9a\u4e86\u4e1a\u52a1\u7684\u51c6\u786e\u6027\u3002\n\n\u6211\u5c06\u4ece**\u6838\u5fc3\u7279\u6027\u9762\u8bd5\u5b98\u60a8\u597d\uff0c**\u6570\u636e\u5e93\u4e8b\u52a1** \u662f\u540e\u7aef\u5f00\u53d1\u4e2d\u6700\u57fa\u7840\u4e5f\u662f\u6700\u91cd\u8981\u7684\u4fdd\u969c\u6570\u636e\u4e00\u81f4\u6027\u7684\u673a\u5236\u3002\u5728\u6211\u7684\u67b6\u6784\u8bbe\u8ba1\u548c\u5f00\u53d1\u7ecf\u9a8c\u4e2d\uff0c\u6df1\u5165\u7406\u89e3\u4e8b\u52a1\u4e0d\u4ec5\u662f\u5199\u597d CRUD \u7684\u57fa\u7840\uff0c\u66f4\u662f\u89e3\u51b3\u9ad8\u5e76\u53d1\u573a\u666f\u4e0b\u6570\u636e\u4e00\u81f4\u6027\u95ee\u9898\u7684\u5173\u952e\u3002\n\n\u6211\u5c06\u4ece**ACID \u7279\u6027**\u3001**\u4e8b\u52a1\u9694\u79bb\u7ea7\u522b**\u3001**\u4f20\u64ad\u673a\u5236**\uff08Spring \u73af\u5883\uff09\u4ee5\u53ca**\u5b9e\u6218\u4e2d\u7684\u5e38\u89c1\u95ee\u9898**\u56db\u4e2a\u7ef4\u5ea6\u6765\u7cfb\u7edf\u4ecb\u7ecd\u3002\n\n---\n\n### \u4e00\u3001 \u4e8b\u52a1\u7684 ACID \u7279\u6027\n\n\u8fd9\u662f\u4e8b\u52a1\u7684\u5b9a\u4e49\uff0c\u4e5f\u662f\u6211\u4eec\u4f7f\u7528\u4e8b\u52a1\u7684\u76ee\u6807\uff1a\n\n1.  **\u539f\u5b50\u6027**\uff1a\n    *   **\u6838\u5fc3**\uff1a\u4e8b\u52a1\u5185\u7684\u64cd\u4f5c\u8981\u4e48\u5168\u90e8\u6210\u529f\uff0c\u8981\u4e48\u5168\u90e8\u5931\u8d25\u56de\u6eda\u3002\n    *   **\u5b9e\u73b0\u539f\u7406**\uff1a\u4e3b\u8981\u4f9d\u8d56 **Undo Log\uff08\u56de\u6eda\u65e5\u5fd7\uff09**\u3002\u5f53\u4e8b\u52a1\u6267\u884c\u5931\u8d25\u6216\u8c03\u7528 rollback \u65f6\uff0c\u6570\u636e\u5e93\u6839\u636e Undo Log \u9006\u5411\u6267\u884c SQL\uff0c\u5c06\u6570\u636e\u6062\u590d\u5230\u4fee\u6539\u524d\u7684\u72b6\u6001\u3002\n2.  **\u4e00\u81f4\u6027**\uff1a\n    *   **\u6838\u5fc3**\uff1a\u4e8b\u52a1\u6267\u884c\u524d\u540e\uff0c\u6570\u636e\u5e93\u7684\u5b8c\u6574\u6027\u7ea6\u675f\u6ca1\u6709\u88ab\u7834\u574f\u3002\n    *   **\u7406\u89e3**\uff1a\u8fd9\u662f\u4e8b\u52a1\u7684\u6700\u7ec8\u76ee\u6807\uff0c\u539f\u5b50\u6027\u3001\u9694\u79bb\u6027\u3001\u6301\u4e45\u6027\u90fd\u662f\u4e3a\u4e86\u4fdd\u969c\u4e00\u81f4\u6027\u3002\n3.  **\u9694\u79bb\u6027**\uff1a\n    *   **\u6838\u5fc3**\uff1a\u5e76\u53d1\u6267\u884c\u7684\u4e8b\u52a1\u4e4b\u95f4\u4e92\u4e0d\u5e72\u6270\u3002\n    *   **\u5b9e\u73b0\u539f\u7406**\uff1a\u4e3b\u8981\u4f9d\u8d56 **\u9501\u673a\u5236** \u548c **MVCC\uff08\u591a\u7248\u672c\u5e76\u53d1\u63a7\u5236\uff09**\u3002\n4.  **\u6301\u4e45\u6027**\uff1a\n    *   **\u6838\u5fc3**\uff1a\u4e8b\u52a1\u4e00\u65e6\u63d0\u4ea4\uff0c\u5bf9\u6570\u636e\u7684\u4fee\u6539\u662f\u6c38\u4e45\u6027\u7684\uff0c\u5373\u4f7f\u6570\u636e\u5e93\u5d29\u6e83\u4e5f\u4e0d\u4f1a\u4e22\u5931\u3002\n    *   **\u5b9e\u73b0\u539f\u7406**\uff1a\u4e3b\u8981\u4f9d\u8d56 **Redo Log\uff08\u91cd\u505a\u65e5\u5fd7\uff09**\u3002\u5b83\u662f WAL\uff08Write-Ahead Logging\uff09\u673a\u5236\u7684\u4f53\u73b0\uff0c\u4e8b\u52a1\u63d0\u4ea4\u65f6\u5148\u5199\u65e5\u5fd7\u518d\u5f02\u6b65\u5237\u76d8\u6570\u636e\u9875\uff0c\u4fdd\u8bc1\u5d29\u6e83\u6062\u590d\u80fd\u529b\u3002\n\n---\n\n### \u4e8c\u3001 \u4e8b\u52a1\u9694\u79bb\u7ea7\u522b\u4e0e\u5e76\u53d1\u95ee\u9898\n\n\u5f53\u591a\u4e2a\u4e8b\u52a1\u5e76\u53d1\u6267\u884c\u65f6\uff0c\u5982\u679c\u4e0d\u52a0\u63a7\u5236\uff0c\u4f1a\u51fa\u73b0\u810f\u8bfb\u3001\u4e0d\u53ef\u91cd\u590d\u8bfb\u3001\u5e7b\u8bfb\u95ee\u9898\u3002SQL \u6807\u51c6\u5b9a\u4e49\u4e86\u56db\u4e2a\u9694\u79bb\u7ea7\u522b\uff1a\n\n| \u9694\u79bb\u7ea7\u522b | \u810f\u8bfb | \u4e0d\u53ef\u91cd\u590d\u8bfb | \u5e7b\u8bfb | \u5b9e\u73b0\u673a\u5236 |\n| :--- | :--- | :--- | :--- | :--- |\n| **\u8bfb\u672a\u63d0\u4ea4 (RU)** | \u53ef\u80fd | \u53ef\u80fd | \u53ef\u80fd | \u65e0 |\n| **\u8bfb\u5df2\u63d0\u4ea4 (RC)** | \u4e0d\u53ef\u80fd | \u53ef\u80fd | \u53ef\u80fd | MVCC (\u6bcf\u6b21 Select \u751f\u6210\u5feb\u7167) |\n| **\u53ef\u91cd\u590d\u8bfb (RR)** | \u4e0d\u53ef\u80fd | \u4e0d\u53ef\u80fd | \u53ef\u80fd | MVCC (\u4e8b\u52a1\u542f\u52a8\u751f\u6210\u5feb\u7167) + Next-Key Lock |\n| **\u4e32\u884c\u5316** | \u4e0d\u53ef\u80fd | \u4e0d\u53ef\u80fd | \u4e0d\u53ef\u80fd | \u5168\u8868\u9501 |\n\n*   **MySQL InnoDB \u9ed8\u8ba4\u7ea7\u522b\uff1aRR (\u53ef\u91cd\u590d\u8bfb)**\u3002\n*   **\u5b9e\u6218\u7ecf\u9a8c**\uff1a\n    *   **RC vs RR**\uff1a\u5728\u4e92\u8054\u7f51\u9ad8\u5e76\u53d1\u9879\u76ee\u4e2d\uff0c\u5f88\u591a\u56e2\u961f\u4f1a\u5c06\u9694\u79bb\u7ea7\u522b\u8c03\u6574\u4e3a **RC (\u8bfb\u5df2\u63d0\u4ea4)**\u3002\u56e0\u4e3a RR \u7ea7\u522b\u867d\u7136\u89e3\u51b3\u4e86\u5e7b\u8bfb\uff0c\u4f46\u5728\u590d\u6742\u7684\u4e3b\u4ece\u590d\u5236\u67b6\u6784\u4e0b\uff0c\u5927\u4e8b\u52a1\u53ef\u80fd\u5bfc\u81f4\u4e3b\u4ece\u5ef6\u8fdf\u66f4\u660e\u663e\uff0c\u4e14 RR \u7684\u95f4\u9699\u9501\u5728\u9ad8\u5e76\u53d1\u4e0b\u5bb9\u6613\u5f15\u53d1\u6b7b\u9501\u3002RC \u914d\u5408\u4e1a\u52a1\u5c42\u7684\u9501\uff08\u5982\u5206\u5e03\u5f0f\u9501\uff09\u5f80\u5f80\u66f4\u7075\u6d3b\u3002\n\n---\n\n### \u4e09\u3001 Spring \u4e8b\u52a1\u4f20\u64ad\u673a\u5236\n\n\u5728 Java \u5f00\u53d1\u4e2d\uff0c\u6211\u4eec\u5e38\u7528 `@Transactional` \u6ce8\u89e3\u3002\u9664\u4e86\u9694\u79bb\u7ea7\u522b\uff0c**\u4f20\u64ad\u673a\u5236** \u662f\u53e6\u4e00\u4e2a\u6838\u5fc3\u8003\u70b9\uff0c\u5b83\u5b9a\u4e49\u4e86\u4e8b\u52a1\u65b9\u6cd5\u88ab\u53e6\u4e00\u4e2a\u4e8b\u52a1\u65b9\u6cd5\u8c03\u7528\u65f6\uff0c\u5982\u4f55\u8868\u73b0\u3002\n\n\u6700\u5e38\u7528\u7684\u4e09\u79cd\uff1a\n\n1.  **REQUIRED (\u9ed8\u8ba4)**\uff1a\n    *   \u5982\u679c\u5f53\u524d\u5b58\u5728\u4e8b\u52a1\uff0c\u5219\u52a0\u5165\u8be5\u4e8b\u52a1\uff1b\u5982\u679c\u6ca1\u6709\uff0c\u5219\u65b0\u5efa\u4e00\u4e2a\u3002\n    *   *\u573a\u666f*\uff1a90% \u7684\u4e1a\u52a1\u573a\u666f\u3002\n2.  **REQUIRES_NEW**\uff1a\n    *   \u65e0\u8bba\u5f53\u524d\u662f\u5426\u5b58\u5728\u4e8b\u52a1\uff0c\u90fd\u521b\u5efa\u4e00\u4e2a\u65b0\u4e8b\u52a1\uff0c\u539f\u4e8b\u52a1\u6302\u8d77\u3002\n    *   *\u573a\u666f*\uff1a**\u65e5\u5fd7\u8bb0\u5f55\u3001\u5ba1\u8ba1**\u3002\u5373\u4f7f\u4e3b\u4e1a\u52a1\u56de\u6eda\u4e86\uff0c\u65e5\u5fd7\u4f9d\u7136\u8981\u4fdd\u5b58\uff0c\u4e0d\u53d7\u4e3b\u4e8b\u52a1\u5f71\u54cd\u3002\n3.  **NESTED**\uff1a\n    *   \u5982\u679c\u5f53\u524d\u5b58\u5728\u4e8b\u52a1\uff0c\u5219\u5728\u5d4c\u5957\u4e8b\u52a1\u4e2d\u6267\u884c\u3002\n    *   *\u533a\u522b*\uff1a\u5b83\u652f\u6301\u90e8\u5206\u56de\u6eda\uff08Savepoint\uff09\u3002\u5982\u679c\u5185\u90e8\u4e8b\u52a1\u5931\u8d25\uff0c\u53ea\u56de\u6eda\u5185\u90e8\u64cd\u4f5c\uff0c\u4e0d\u5f71\u54cd\u5916\u90e8\u4e8b\u52a1\uff1b\u800c REQUIRES_NEW \u662f\u4e24\u4e2a\u72ec\u7acb\u4e8b\u52a1\uff0c\u5916\u90e8\u5931\u8d25\u4e0d\u5f71\u54cd\u5185\u90e8\u3002\n    *   *\u573a\u666f*\uff1a\u6279\u91cf\u5904\u7406\u4efb\u52a1\uff0c\u5176\u4e2d\u67d0\u6761\u8bb0\u5f55\u5931\u8d25\u4e0d\u5f71\u54cd\u6574\u6279\uff0c\u4f46\u9700\u8981\u8bb0\u5f55\u5931\u8d25\u539f\u56e0\u3002\n\n---\n\n### \u56db\u3001 \u5b9e\u6218\u4e2d\u7684\u201c\u5751\u201d\u4e0e\u89e3\u51b3\u65b9\u6848\n\n\u5728\u201c\u5c0f\u7535\u201d\u7684\u9ad8\u5e76\u53d1\u4e1a\u52a1\u4e2d\uff0c\u6211\u5904\u7406\u8fc7\u5927\u91cf\u7684\u4e8b\u52a1\u76f8\u5173\u95ee\u9898\uff0c\u4ee5\u4e0b\u662f\u4e09\u4e2a\u7ecf\u5178\u573a\u666f\uff1a\n\n#### 1. \u5927\u4e8b\u52a1\u4e0e\u6027\u80fd\u74f6\u9888\n*   **\u95ee\u9898**\uff1a\u4e8b\u52a1\u8303\u56f4\u8fc7\u5927\uff0c\u5305\u542b\u4e86 RPC \u8c03\u7528\u3001HTTP \u8bf7\u6c42\u6216\u590d\u6742\u8ba1\u7b97\uff0c\u5bfc\u81f4\u6570\u636e\u5e93\u8fde\u63a5\u6c60\u88ab\u957f\u65f6\u95f4\u5360\u7528\uff0c\u541e\u5410\u91cf\u4e0b\u964d\u3002\n*   **\u89e3\u51b3\u65b9\u6848**\uff1a\n    *   **\u7f16\u7a0b\u5f0f\u4e8b\u52a1**\uff1a\u4f7f\u7528 `TransactionTemplate` \u7cbe\u786e\u63a7\u5236\u4e8b\u52a1\u8fb9\u754c\uff0c\u53ea\u5728\u6570\u636e\u5e93\u64cd\u4f5c\u5904\u5f00\u542f\u4e8b\u52a1\u3002\n    *   **\u62c6\u5206**\uff1a\u5c06\u975e\u6838\u5fc3\u903b\u8f91\uff08\u5982\u53d1\u6d88\u606f\u3001\u66f4\u65b0\u7f13\u5b58\uff09\u79fb\u51fa\u4e8b\u52a1\uff0c\u901a\u8fc7\u76d1\u542c\u4e8b\u4ef6\uff08Spring Event\uff09\u5728\u4e8b\u52a1\u63d0\u4ea4\u540e\u6267\u884c\u3002\n\n#### 2. \u6b7b\u9501\u68c0\u6d4b\u4e0e\u4f18\u5316\n*   **\u573a\u666f**\uff1a\u5728\u9ad8\u5e76\u53d1\u6263\u8d39\u573a\u666f\uff0c\u4e24\u4e2a\u4e8b\u52a1\u4ee5\u4e0d\u540c\u987a\u5e8f\u9501\u884c\uff0c\u5bfc\u81f4\u6b7b\u9501\u3002\n*   **\u89e3\u51b3**\uff1a\n    *   \u7edf\u4e00\u52a0\u9501\u987a\u5e8f\uff08\u5982\u6309 ID \u5347\u5e8f\uff09\u3002\n    *   \u964d\u4f4e\u9694\u79bb\u7ea7\u522b\uff08\u5982\u5728\u975e\u6838\u5fc3\u573a\u666f\u4f7f\u7528 RC\uff0c\u51cf\u5c11\u95f4\u9699\u9501\uff09\u3002\n    *   \u8bbe\u7f6e\u5408\u7406\u7684 `innodb_lock_wait_timeout`\u3002\n\n#### 3. \u5206\u5e03\u5f0f\u4e8b\u52a1\n*   \u5f53\u4e1a\u52a1\u6d89\u53ca\u591a\u4e2a\u5fae\u670d\u52a1\uff08\u5982\u8ba2\u5355\u670d\u52a1 + \u5e93\u5b58\u670d\u52a1 + \u652f\u4ed8\u670d\u52a1\uff09\uff0c\u672c\u5730\u4e8b\u52a1\u65e0\u6cd5\u4fdd\u8bc1\u5168\u5c40\u4e00\u81f4\u6027\u3002\n*   **\u89e3\u51b3\u65b9\u6848**\uff1a\n    *   **Seata**\uff1a\u57fa\u4e8e AT \u6a21\u5f0f\u6216 TCC \u6a21\u5f0f\uff0c\u6211\u4eec\u66fe\u5f15\u5165 Seata \u89e3\u51b3\u6838\u5fc3\u94fe\u8def\u7684\u4e00\u81f4\u6027\u95ee\u9898\u3002\n    *   **\u6700\u7ec8\u4e00\u81f4\u6027**\uff1a\u7ed3\u5408 RocketMQ \u7684\u4e8b\u52a1\u6d88\u606f\uff0c\u5b9e\u73b0\u201c\u672c\u5730\u6d88\u606f\u8868\u201d\u65b9\u6848\uff0c\u4fdd\u8bc1\u6d88\u606f\u53d1\u9001\u4e0e\u672c\u5730\u4e8b\u52a1\u7684\u539f\u5b50\u6027\uff0c\u4e0b\u6e38\u6d88\u8d39\u8005\u901a\u8fc7\u5e42\u7b49\u6027\u4fdd\u8bc1\u6570\u636e\u4e00\u81f4\u3002\n\n### \u603b\u7ed3\n\n\u6570\u636e\u5e93\u4e8b\u52a1\u662f\u6570\u636e\u4e00\u81f4\u6027\u7684\u57fa\u77f3\u3002\u4f5c\u4e3a\u67b6\u6784\u5e08\uff0c\u6211\u5173\u6ce8\u7684\u4e0d\u4ec5\u4ec5\u662f CRUD\uff0c\u66f4\u662f\u5982\u4f55\u6839\u636e\u4e1a\u52a1\u573a\u666f\u9009\u62e9\u5408\u9002\u7684**\u9694\u79bb\u7ea7\u522b**\u3001\u8bbe\u8ba1\u5408\u7406\u7684**\u4e8b\u52a1\u8fb9\u754c**\uff0c\u4ee5\u53ca\u5728\u5206\u5e03\u5f0f\u67b6\u6784\u4e0b\u901a\u8fc7**Seata \u6216\u6d88\u606f\u961f\u5217**\u4fdd\u8bc1\u6700\u7ec8\u4e00\u81f4\u6027\u3002\n\n\u4ee5\u4e0a\u662f\u6211\u5bf9\u6570\u636e\u5e93\u4e8b\u52a1\u7684\u7406\u89e3\uff0c\u8bf7\u95ee\u60a8\u60f3\u6df1\u5165\u4e86\u89e3 **MVCC \u7684\u5b9e\u73b0\u539f\u7406**\uff0c\u6216\u8005 **\u5206\u5e03\u5f0f\u4e8b\u52a1\u7684\u5177\u4f53\u843d\u5730\u65b9\u6848** \u5417\uff1f",

    "title": "MySQL\u7d22\u5f15\u539f\u7406",
    "style": "background-color: yellow;",
    "details": "\u9762\u8bd5\u5b98\u60a8\u597d\uff0c**MySQL \u7d22\u5f15\u539f\u7406** \u662f\u540e\u7aef\u7814\u53d1\u5fc5\u987b\u638c\u63e1\u7684\u6838\u5fc3\u77e5\u8bc6\uff0c\u5b83\u76f4\u63a5\u51b3\u5b9a\u4e86\u7cfb\u7edf\u7684\u67e5\u8be2\u6027\u80fd\u548c\u5e76\u53d1\u80fd\u529b\u3002\u5728\u6211\u7684\u67b6\u6784\u5b9e\u8df5\u4e2d\uff0c\u7d22\u5f15\u4f18\u5316\u5f80\u5f80\u662f\u7cfb\u7edf\u6027\u80fd\u4f18\u5316\u7684\u201c\u7b2c\u4e00\u5200\u201d\u3002\n\n\u6211\u5c06\u4ece**\u6570\u636e\u7ed3\u6784\u5e95\u5c42\u539f\u7406**\u3001**B+\u6811\u4f18\u52bf**\u3001**\u7d22\u5f15\u5206\u7c7b\u4e0e\u673a\u5236**\u4ee5\u53ca**\u5b9e\u6218\u4f18\u5316\u51c6\u5219**\u56db\u4e2a\u7ef4\u5ea6\u6765\u7cfb\u7edf\u9610\u8ff0\u3002\n\n---\n\n### \u4e00\u3001 \u4e3a\u4ec0\u4e48\u9009\u62e9 B+ \u6811\uff1f\uff08\u6838\u5fc3\u539f\u7406\uff09\n\nMySQL \u7684 InnoDB \u5f15\u64ce\u4f7f\u7528 **B+ \u6811** \u4f5c\u4e3a\u7d22\u5f15\u7684\u5e95\u5c42\u5b9e\u73b0\u3002\u8981\u7406\u89e3\u5b83\uff0c\u6211\u4eec\u9700\u8981\u5bf9\u6bd4\u5176\u4ed6\u6570\u636e\u7ed3\u6784\uff1a\n\n1.  **\u4e8c\u53c9\u6811 / \u7ea2\u9ed1\u6811**\uff1a\n    *   **\u7f3a\u70b9**\uff1a\u6811\u7684\u9ad8\u5ea6\u8fc7\u9ad8\u3002\u5bf9\u4e8e\u5343\u4e07\u7ea7\u6570\u636e\uff0c\u6811\u7684\u9ad8\u5ea6\u53ef\u80fd\u8fbe\u5230 20+ \u5c42\uff0c\u610f\u5473\u7740\u9700\u8981 20 \u6b21\u78c1\u76d8 I/O\uff0c\u6027\u80fd\u6781\u5dee\u3002\n2.  **Hash \u7d22\u5f15**\uff1a\n    *   **\u7f3a\u70b9**\uff1a\u4ec5\u652f\u6301\u7b49\u503c\u67e5\u8be2\uff08`=`, `IN`\uff09\uff0c\u4e0d\u652f\u6301\u8303\u56f4\u67e5\u8be2\uff08`>`, `<`, `BETWEEN`\uff09\uff0c\u65e0\u6cd5\u6392\u5e8f\u3002\n3.  **B \u6811**\uff1a\n    *   **\u7f3a\u70b9**\uff1a\u6240\u6709\u8282\u70b9\u90fd\u5b58\u50a8\u6570\u636e\u3002\u8fd9\u610f\u5473\u7740\u975e\u53f6\u5b50\u8282\u70b9\u4e5f\u8981\u5b58\u5e9e\u5927\u7684\u884c\u6570\u636e\uff0c\u5bfc\u81f4\u4e00\u9875\u80fd\u5b58\u7684\u952e\u503c\u53d8\u5c11\uff0c\u6811\u53d8\u9ad8\uff0c\u78c1\u76d8 I/O \u6b21\u6570\u589e\u52a0\u3002\n4.  **B+ \u6811\uff08InnoDB \u6700\u7ec8\u9009\u62e9\uff09**\uff1a\n    *   **\u975e\u53f6\u5b50\u8282\u70b9\u53ea\u5b58\u7d22\u5f15\u952e\u503c**\uff1a\u4e00\u9875\uff08\u9ed8\u8ba4 16KB\uff09\u80fd\u5b58\u66f4\u591a\u7d22\u5f15\u952e\uff0c\u6811\u66f4\u77ee\u80d6\uff08\u901a\u5e38 3-4 \u5c42\u5373\u53ef\u5b58\u5343\u4e07\u7ea7\u6570\u636e\uff09\uff0c**I/O \u6b21\u6570\u6781\u5c11**\u3002\n    *   **\u53f6\u5b50\u8282\u70b9\u5b58\u50a8\u6240\u6709\u6570\u636e**\uff1a\u5e76\u4f7f\u7528**\u53cc\u5411\u94fe\u8868**\u8fde\u63a5\u3002\u8fd9\u4f7f\u5f97**\u8303\u56f4\u67e5\u8be2**\u548c**\u6392\u5e8f**\u6781\u5176\u9ad8\u6548\uff08\u53ea\u9700\u904d\u5386\u94fe\u8868\uff09\u3002\n\n---\n\n### \u4e8c\u3001 InnoDB \u7684\u7d22\u5f15\u6a21\u578b\uff08\u805a\u7c07 vs \u975e\u805a\u7c07\uff09\n\nInnoDB \u7684\u7d22\u5f15\u5206\u4e3a\u4e24\u5927\u7c7b\uff0c\u8fd9\u662f\u7406\u89e3\u201c\u56de\u8868\u201d\u64cd\u4f5c\u7684\u5173\u952e\uff1a\n\n#### 1. \u805a\u7c07\u7d22\u5f15\n*   **\u7ed3\u6784**\uff1a\u53f6\u5b50\u8282\u70b9\u5b58\u50a8\u7684\u662f**\u5b8c\u6574\u7684\u884c\u6570\u636e**\u3002\n*   **\u5f62\u6210\u89c4\u5219**\uff1a\n    *   \u5982\u679c\u6709\u4e3b\u952e\uff0c\u4e3b\u952e\u5c31\u662f\u805a\u7c07\u7d22\u5f15\u3002\n    *   \u5982\u679c\u6ca1\u6709\u4e3b\u952e\uff0c\u9009\u7b2c\u4e00\u4e2a\u975e\u7a7a\u552f\u4e00\u5217\u3002\n    *   \u90fd\u6ca1\u6709\uff0c\u751f\u6210\u9690\u85cf\u7684 ROWID\u3002\n*   **\u7279\u70b9**\uff1a\u6570\u636e\u6587\u4ef6\u672c\u8eab\u5c31\u662f\u7d22\u5f15\u6587\u4ef6\u3002\u901a\u8fc7\u4e3b\u952e\u67e5\u627e\u6781\u5feb\uff0c\u76f4\u63a5\u62ff\u5230\u6570\u636e\u3002\n\n#### 2. \u8f85\u52a9\u7d22\u5f15\n*   **\u7ed3\u6784**\uff1a\u53f6\u5b50\u8282\u70b9\u5b58\u50a8\u7684\u662f**\u7d22\u5f15\u5217\u7684\u503c + \u4e3b\u952e\u503c**\u3002\n*   **\u67e5\u8be2\u8fc7\u7a0b**\uff1a\n    *   \u5982\u679c\u901a\u8fc7\u8f85\u52a9\u7d22\u5f15\u67e5\u8be2 `SELECT * FROM user WHERE name = 'Jeff'`\uff1a\n    1.  \u5148\u5728\u8f85\u52a9\u7d22\u5f15\u6811\uff08name \u5217\uff09\u627e\u5230 'Jeff'\uff0c\u62ff\u5230\u4e3b\u952e ID\u3002\n    2.  \u518d\u56de\u9053\u805a\u7c07\u7d22\u5f15\u6811\uff08ID \u5217\uff09\uff0c\u901a\u8fc7 ID \u67e5\u627e\u5b8c\u6574\u6570\u636e\u3002\n    *   **\u8fd9\u4e00\u8fc7\u7a0b\u79f0\u4e3a\u201c\u56de\u8868\u201d**\u3002\n\n---\n\n### \u4e09\u3001 \u6838\u5fc3\u4f18\u5316\u673a\u5236\n\n#### 1. \u8986\u76d6\u7d22\u5f15\n*   **\u539f\u7406**\uff1a\u5982\u679c\u67e5\u8be2\u7684\u5217\u6b63\u597d\u5305\u542b\u5728\u7d22\u5f15\u4e2d\uff0c\u4f8b\u5982 `SELECT id FROM user WHERE name = 'Jeff'`\uff0c\u6570\u636e\u5e93\u76f4\u63a5\u4ece\u8f85\u52a9\u7d22\u5f15\u6811\u62ff\u5230 ID \u8fd4\u56de\uff0c**\u65e0\u9700\u56de\u8868**\u3002\n*   **\u5b9e\u6218\u4ef7\u503c**\uff1a\u8fd9\u662f\u6027\u80fd\u4f18\u5316\u7684\u6740\u624b\u950f\u3002\u5728\u201c\u5c0f\u7535\u201d\u7684\u8bbe\u5907\u67e5\u8be2\u63a5\u53e3\u4e2d\uff0c\u6211\u901a\u8fc7\u5efa\u7acb\u8054\u5408\u7d22\u5f15\uff0c\u5b9e\u73b0\u4e86\u5927\u91cf\u9ad8\u9891\u67e5\u8be2\u7684\u8986\u76d6\u7d22\u5f15\uff0c\u5c06 QPS \u63d0\u5347\u4e86 30%\u3002\n\n#### 2. \u6700\u5de6\u524d\u7f00\u539f\u5219\n*   **\u539f\u7406**\uff1a\u8054\u5408\u7d22\u5f15 `(a, b, c)` \u5c31\u50cf\u5efa\u7acb\u4e86 `(a)`, `(a, b)`, `(a, b, c)` \u4e09\u4e2a\u7d22\u5f15\u3002\n*   **\u89c4\u5219**\uff1a\u67e5\u8be2\u5fc5\u987b\u4ece\u7d22\u5f15\u7684\u6700\u5de6\u5217\u5f00\u59cb\uff0c\u4e14\u4e0d\u80fd\u8df3\u8fc7\u4e2d\u95f4\u7684\u5217\u3002\n    *   `WHERE a=1 AND b=2` \u2014\u2014 \u8d70\u7d22\u5f15\u3002\n    *   `WHERE b=2` \u2014\u2014 **\u4e0d\u8d70\u7d22\u5f15**\uff08\u5c11\u4e86 a\uff09\u3002\n    *   `WHERE a=1 ORDER BY c` \u2014\u2014 \u7d22\u5f15\u53ea\u7528\u5230 a\uff0c\u6392\u5e8f\u9700\u8981 filesort\uff08\u56e0\u4e3a\u8df3\u8fc7\u4e86 b\uff09\u3002\n\n#### 3. \u7d22\u5f15\u4e0b\u63a8\n*   **\u573a\u666f**\uff1a`SELECT * FROM user WHERE name LIKE '\u5f20%' AND age = 10`\u3002\u7d22\u5f15\u4e3a `(name, age)`\u3002\n*   **\u65e0 ICP**\uff1aMySQL 5.6 \u4e4b\u524d\uff0c\u5b58\u50a8\u5f15\u64ce\u53ea\u6839\u636e `name` \u627e\u5230\u6240\u6709\u201c\u5f20\u201d\u5f00\u5934\u7684\u8bb0\u5f55\uff0c\u56de\u8868\u62ff\u5230\u5b8c\u6574\u6570\u636e\uff0c\u518d\u7531 Server \u5c42\u8fc7\u6ee4 `age`\u3002\n*   **\u6709 ICP**\uff1aMySQL 5.6 \u4e4b\u540e\uff0c\u5b58\u50a8\u5f15\u64ce\u5728\u7d22\u5f15\u904d\u5386\u65f6\uff0c\u76f4\u63a5\u5224\u65ad `age` \u662f\u5426\u4e3a 10\uff0c\u4e0d\u6ee1\u8db3\u7684\u4e0d\u56de\u8868\u3002\n*   **\u4ef7\u503c**\uff1a\u5927\u5e45\u51cf\u5c11\u56de\u8868\u6b21\u6570\u3002\n\n---\n\n### \u56db\u3001 \u5b9e\u6218\u7ecf\u9a8c\u4e0e\u201c\u5751\u201d\n\n\u5728\u9879\u76ee\u4e2d\uff0c\u6211\u603b\u7ed3\u4e86\u51e0\u6761\u5fc5\u987b\u9075\u5b88\u7684\u7d22\u5f15\u89c4\u8303\uff1a\n\n1.  **\u907f\u514d\u7d22\u5f15\u5931\u6548**\uff1a\n    *   **\u4e0d\u5728\u7d22\u5f15\u5217\u4e0a\u505a\u8ba1\u7b97/\u51fd\u6570**\uff1a`WHERE YEAR(create_time) = 2023` \u4f1a\u5bfc\u81f4\u7d22\u5f15\u5931\u6548\uff0c\u5e94\u6539\u4e3a\u8303\u56f4\u67e5\u8be2\u3002\n    *   **\u907f\u514d\u9690\u5f0f\u8f6c\u6362**\uff1a\u5b57\u6bb5\u662f `varchar`\uff0c\u67e5\u8be2\u7528 `WHERE phone = 13800000000`\uff08\u6570\u5b57\uff09\uff0c\u7d22\u5f15\u5931\u6548\u3002\n    *   **Like \u67e5\u8be2**\uff1a`LIKE '%abc'` \u7d22\u5f15\u5931\u6548\uff08\u524d\u7f00\u6a21\u7cca\uff09\uff0c`LIKE 'abc%'` \u8d70\u7d22\u5f15\u3002\n\n2.  **\u7d22\u5f15\u7ef4\u62a4\u6210\u672c**\uff1a\n    *   \u7d22\u5f15\u4e0d\u662f\u8d8a\u591a\u8d8a\u597d\u3002\u6bcf\u6b21\u589e\u5220\u6539\u90fd\u9700\u8981\u7ef4\u62a4\u7d22\u5f15\u6811\uff0c\u4e14\u5360\u7528\u78c1\u76d8\u7a7a\u95f4\u3002\n    *   \u5728\u9ad8\u9891\u5199\u5165\uff08\u5982\u65e5\u5fd7\u8868\uff09\u573a\u666f\uff0c\u6211\u4f1a\u63a7\u5236\u7d22\u5f15\u6570\u91cf\uff0c\u4f18\u5148\u4fdd\u8bc1\u5199\u5165\u6027\u80fd\u3002\n\n3.  **Count \u4f18\u5316**\uff1a\n    *   `COUNT(*)` \u548c `COUNT(1)` \u5728 InnoDB \u4e2d\u6ca1\u6709\u533a\u522b\uff0c\u90fd\u662f\u626b\u63cf\u805a\u7c07\u7d22\u5f15\u6216\u6700\u5c0f\u7684\u8f85\u52a9\u7d22\u5f15\u6765\u8ba1\u6570\u3002\n    *   `COUNT(\u5b57\u6bb5)` \u9700\u8981\u5224\u65ad\u5b57\u6bb5\u975e NULL\uff0c\u6027\u80fd\u7a0d\u5dee\u3002\n\n### \u603b\u7ed3\n\nMySQL \u7d22\u5f15\u4f18\u5316\u7684\u672c\u8d28\uff0c\u5c31\u662f**\u5229\u7528 B+ \u6811\u7684\u7ed3\u6784\u7279\u6027\uff0c\u51cf\u5c11\u78c1\u76d8 I/O\uff0c\u5229\u7528\u8986\u76d6\u7d22\u5f15\u51cf\u5c11\u56de\u8868\uff0c\u5229\u7528\u6700\u5de6\u524d\u7f00\u5339\u914d\u8054\u5408\u7d22\u5f15**\u3002\n\n\u4ee5\u4e0a\u662f\u6211\u5bf9 MySQL \u7d22\u5f15\u539f\u7406\u7684\u7406\u89e3\u3002\u8bf7\u95ee\u60a8\u60f3\u6df1\u5165\u4e86\u89e3 **Explain \u6267\u884c\u8ba1\u5212\u7684\u5206\u6790\u65b9\u6cd5**\uff0c\u6216\u8005 **MVCC \u5728\u9694\u79bb\u7ea7\u522b\u4e2d\u7684\u5177\u4f53\u5b9e\u73b0** \u5417\uff1f",

      "\u7d22\u5f15\u7ed3\u6784\u662fB\u6811\u8fd8\u662fB+\u6811\uff1f",

    "title": "\u5199\u591a\u8bfb\u5c11\u65b9\u6848",
    "style": "",
    "details": "\u9762\u8bd5\u5b98\u60a8\u597d\uff0c**\u201c\u5199\u591a\u8bfb\u5c11\u201d** \u662f\u4e00\u7c7b\u975e\u5e38\u5178\u578b\u4e14\u5177\u6709\u6311\u6218\u6027\u7684\u4e1a\u52a1\u573a\u666f\uff0c\u6bd4\u5982\u91d1\u878d\u4ea4\u6613\u6d41\u6c34\u3001\u65e5\u5fd7\u5b58\u50a8\u3001\u7269\u8054\u7f51\u8bbe\u5907\u6570\u636e\u4e0a\u62a5\uff08\u5982\u5c0f\u7535\u7684\u8bbe\u5907\u5fc3\u8df3\uff09\u7b49\u3002\n\n\u8fd9\u7c7b\u573a\u666f\u7684\u6838\u5fc3\u75db\u70b9\u5728\u4e8e\uff1a**\u6570\u636e\u5e93\u5199\u5165\u538b\u529b\u5927\uff0c\u5bb9\u6613\u6210\u4e3a\u6027\u80fd\u74f6\u9888\uff0c\u5bfc\u81f4\u8fde\u63a5\u6c60\u6253\u6ee1\u3001\u4e3b\u4ece\u5ef6\u8fdf\u4e25\u91cd\uff0c\u751a\u81f3\u5b95\u673a\u3002**\n\n\u9488\u5bf9\u201c\u5199\u591a\u8bfb\u5c11\u201d\u7684\u573a\u666f\uff0c\u6211\u901a\u5e38\u4f1a\u4ece**\u67b6\u6784\u5c42\u9762**\u3001**\u6570\u636e\u5e93\u5c42\u9762**\u548c**\u4e1a\u52a1\u5c42\u9762**\u4e09\u4e2a\u7ef4\u5ea6\u6765\u8bbe\u8ba1\u9ad8\u53ef\u7528\u65b9\u6848\u3002\n\n---\n\n### \u4e00\u3001 \u67b6\u6784\u5c42\u9762\uff1a\u5f02\u6b65\u524a\u5cf0\u4e0e\u8bfb\u5199\u5206\u79bb\n\n\u8fd9\u662f\u89e3\u51b3\u9ad8\u5e76\u53d1\u5199\u5165\u6700\u6838\u5fc3\u7684\u624b\u6bb5\uff0c\u6838\u5fc3\u601d\u60f3\u662f**\u201c\u7528\u7a7a\u95f4\u6362\u65f6\u95f4\uff0c\u7528\u5f02\u6b65\u6362\u541e\u5410\u201d**\u3002\n\n#### 1. \u6d88\u606f\u961f\u5217\u524a\u5cf0\u586b\u8c37\n*   **\u65b9\u6848**\uff1a\u4e0d\u76f4\u63a5\u7531\u4e1a\u52a1\u7ebf\u7a0b\u5199\u6570\u636e\u5e93\uff0c\u800c\u662f\u5c06\u5199\u5165\u8bf7\u6c42\u5148\u53d1\u9001\u5230\u6d88\u606f\u961f\u5217\u4e2d\uff0c\u7136\u540e\u7531\u540e\u7aef\u7684\u6d88\u8d39\u8005\u670d\u52a1\u5f02\u6b65\u3001\u6279\u91cf\u5730\u5199\u5165\u6570\u636e\u5e93\u3002\n*   **\u4ef7\u503c**\uff1a\n    *   **\u524a\u5cf0**\uff1a\u65e0\u8bba\u524d\u7aef\u5e76\u53d1\u591a\u9ad8\uff0cMQ \u90fd\u80fd\u6297\u4f4f\uff0c\u540e\u7aef\u6570\u636e\u5e93\u53ef\u4ee5\u6309\u7167\u81ea\u5df1\u7684\u8282\u594f\uff08\u6700\u5927\u5904\u7406\u80fd\u529b\uff09\u53bb\u6d88\u8d39\uff0c\u4fdd\u62a4\u6570\u636e\u5e93\u4e0d\u88ab\u7a81\u53d1\u6d41\u91cf\u51fb\u57ae\u3002\n    *   **\u89e3\u8026**\uff1a\u751f\u4ea7\u8005\u4e0d\u9700\u8981\u7b49\u5f85\u6570\u636e\u5e93\u8fd4\u56de\uff0c\u63a5\u53e3\u54cd\u5e94\u901f\u5ea6\u6781\u5feb\u3002\n*   **\u5b9e\u6218\u7ecf\u9a8c**\uff1a\u5728\u5c0f\u7535\u7684\u8bbe\u5907\u5fc3\u8df3\u4e0a\u62a5\u573a\u666f\u4e2d\uff0c\u6211\u4eec\u4f7f\u7528 RocketMQ \u627f\u63a5\u4e86\u6bcf\u79d2\u6570\u4e07\u6b21\u7684\u8bbe\u5907\u72b6\u6001\u4e0a\u62a5\uff0c\u540e\u7aef\u6d88\u8d39\u8005\u901a\u8fc7\u6279\u91cf\u805a\u5408\u5199\u5165\uff0c\u5927\u5e45\u964d\u4f4e\u4e86\u6570\u636e\u5e93 TPS\u3002\n\n#### 2. \u8bfb\u5199\u5206\u79bb\n*   **\u65b9\u6848**\uff1a\u867d\u7136\u201c\u8bfb\u5c11\u201d\uff0c\u4f46\u4e3b\u5e93\u538b\u529b\u4f9d\u7136\u5927\u3002\u901a\u8fc7\u4e3b\u4ece\u590d\u5236\uff0c\u5c06\u5199\u64cd\u4f5c\u8def\u7531\u5230\u4e3b\u5e93\uff0c\u8bfb\u64cd\u4f5c\u8def\u7531\u5230\u4ece\u5e93\u3002\n*   **\u6ce8\u610f\u70b9**\uff1a\u5bf9\u4e8e\u201c\u5199\u591a\u8bfb\u5c11\u201d\u573a\u666f\uff0c\u4e3b\u4ece\u5ef6\u8fdf\u662f\u4e00\u4e2a\u98ce\u9669\u70b9\u3002\u5982\u679c\u4e1a\u52a1\u8981\u6c42\u201c\u5199\u540e\u8bfb\u201d\u7684\u5f3a\u4e00\u81f4\u6027\uff0c\u53ef\u80fd\u9700\u8981\u5f3a\u5236\u8d70\u4e3b\u5e93\uff0c\u8fd9\u4f1a\u589e\u52a0\u4e3b\u5e93\u538b\u529b\uff0c\u9700\u6743\u8861\u3002\n\n---\n\n### \u4e8c\u3001 \u6570\u636e\u5e93\u5c42\u9762\uff1a\u5206\u5e93\u5206\u8868\u4e0e\u5b58\u50a8\u4f18\u5316\n\n\u5f53\u5355\u5e93\u5355\u8868\u7684\u6570\u636e\u91cf\u548c\u5199\u5165\u91cf\u8fbe\u5230\u74f6\u9888\u65f6\uff0c\u5fc5\u987b\u8fdb\u884c\u6c34\u5e73\u6269\u5c55\u3002\n\n#### 1. \u5206\u5e93\u5206\u8868\n*   **\u5206\u5e93**\uff1a\u5c06\u6570\u636e\u5206\u6563\u5230\u4e0d\u540c\u7684\u6570\u636e\u5e93\u5b9e\u4f8b\uff0c\u5229\u7528\u591a\u53f0\u670d\u52a1\u5668\u7684 CPU\u3001\u5185\u5b58\u548c\u78c1\u76d8 IO \u8d44\u6e90\uff0c\u6781\u5927\u63d0\u5347\u5199\u5165\u5e76\u53d1\u80fd\u529b\u3002\n*   **\u5206\u8868**\uff1a\u89e3\u51b3\u5355\u8868\u6570\u636e\u91cf\u8fc7\u5927\u5bfc\u81f4\u7684 B+ \u6811\u5c42\u7ea7\u52a0\u6df1\u3001\u7d22\u5f15\u7ef4\u62a4\u6210\u672c\u9ad8\u7684\u95ee\u9898\u3002\n*   **\u8def\u7531\u7b56\u7565**\uff1a\n    *   **Hash \u8def\u7531**\uff1a\u9002\u5408\u5199\u5165\u5747\u5300\u5206\u5e03\u7684\u573a\u666f\uff08\u5982\u6309\u7528\u6237 ID \u53d6\u6a21\uff09\uff0c\u80fd\u6700\u5927\u5316\u5229\u7528\u6240\u6709\u8282\u70b9\u7684\u5199\u5165\u80fd\u529b\u3002\n    *   **\u8303\u56f4\u8def\u7531**\uff1a\u9002\u5408\u65e5\u5fd7\u3001\u6d41\u6c34\u7c7b\u6570\u636e\uff08\u5982\u6309\u65f6\u95f4\u5206\u8868\uff09\uff0c\u65b9\u4fbf\u6e05\u7406\u5386\u53f2\u6570\u636e\uff0c\u4f46\u53ef\u80fd\u5bfc\u81f4\u6700\u65b0\u7684\u8868\u5199\u5165\u70ed\u70b9\u3002\n\n#### 2. \u5b58\u50a8\u4ecb\u8d28\u4f18\u5316\n*   **SSD \u786c\u76d8**\uff1a\u5199\u5165\u6027\u80fd\u5bf9\u78c1\u76d8 IO \u654f\u611f\uff0c\u52a1\u5fc5\u4f7f\u7528 SSD\u3002\n*   **\u8c03\u6574 MySQL \u53c2\u6570**\uff1a\n    *   `innodb_flush_log_at_trx_commit`\uff1a\u5982\u679c\u4e1a\u52a1\u5141\u8bb8\u6781\u7aef\u60c5\u51b5\u4e0b\u7684\u5c11\u91cf\u6570\u636e\u4e22\u5931\uff08\u5982\u65e5\u5fd7\u573a\u666f\uff09\uff0c\u53ef\u8bbe\u7f6e\u4e3a 2\uff08\u6bcf\u79d2\u5237\u76d8\uff09\uff0c\u6027\u80fd\u63d0\u5347\u660e\u663e\u3002\n    *   `sync_binlog`\uff1a\u540c\u7406\uff0c\u975e\u6838\u5fc3\u4ea4\u6613\u573a\u666f\u53ef\u9002\u5f53\u8c03\u5927\u3002\n\n#### 3. \u9009\u62e9\u5408\u9002\u7684\u5b58\u50a8\u5f15\u64ce\n*   \u5982\u679c\u662f\u7eaf\u7cb9\u7684\u65e5\u5fd7\u3001\u6d41\u6c34\u6570\u636e\uff0c\u5199\u5165\u91cf\u6781\u5927\u4e14\u67e5\u8be2\u6a21\u5f0f\u7b80\u5355\uff0c\u53ef\u4ee5\u8003\u8651 **ClickHouse** \u6216 **HBase** \u7b49\u5217\u5f0f\u5b58\u50a8\u6570\u636e\u5e93\uff0c\u5b83\u4eec\u7684\u5199\u5165\u6027\u80fd\u8fdc\u8d85 MySQL\uff08ClickHouse \u5199\u5165\u901f\u5ea6\u53ef\u8fbe 50MB/s+\uff09\u3002\n\n---\n\n### \u4e09\u3001 \u4e1a\u52a1\u4e0e\u4ee3\u7801\u5c42\u9762\uff1a\u5408\u5e76\u4e0e\u7f13\u51b2\n\n\u8fd9\u662f\u6210\u672c\u6700\u4f4e\u3001\u89c1\u6548\u6700\u5feb\u7684\u4f18\u5316\u624b\u6bb5\u3002\n\n#### 1. \u6279\u91cf\u63d2\u5165\n*   **\u539f\u7406**\uff1a\u5c06\u591a\u6b21 SQL \u5408\u5e76\u4e3a\u4e00\u6b21\u6267\u884c\u3002\n*   **\u5bf9\u6bd4**\uff1a\n    *   \u5355\u6761\u63d2\u5165\uff1a`INSERT INTO t VALUES (1);` ... `INSERT INTO t VALUES (1000);` \u2014\u2014 \u9700\u8981 1000 \u6b21\u7f51\u7edc\u4ea4\u4e92\u548c 1000 \u6b21\u4e8b\u52a1\u63d0\u4ea4\u3002\n    *   \u6279\u91cf\u63d2\u5165\uff1a`INSERT INTO t VALUES (1), (2), ... (1000);` \u2014\u2014 \u53ea\u9700 1 \u6b21\u4ea4\u4e92\uff0c\u4e8b\u52a1\u5f00\u9500\u6781\u5c0f\u3002\n*   **\u5b9e\u6218**\uff1a\u6211\u5728\u67b6\u6784\u4e2d\u7ecf\u5e38\u4f7f\u7528 MyBatis \u7684 `foreach` \u6216\u8005\u8005\u5728 Service \u5c42\u901a\u8fc7\u5b9a\u65f6\u4efb\u52a1\uff08\u5982\u6bcf\u79d2\u6216\u6bcf 100 \u6761\uff09\u805a\u5408\u6570\u636e\u6279\u91cf\u5199\u5165\u3002\n\n#### 2. \u5185\u5b58\u7f13\u51b2\n*   **\u65b9\u6848**\uff1a\u5229\u7528 Redis \u6216\u672c\u5730\u7f13\u5b58\u6682\u5b58\u5199\u5165\u8bf7\u6c42\u3002\n*   **\u6848\u4f8b**\uff1a\u8ba1\u6570\u5668\u573a\u666f\uff08\u5982\u70b9\u8d5e\u6570\uff09\u3002\u5148\u5728 Redis \u4e2d `INCR`\uff0c\u7136\u540e\u901a\u8fc7\u5b9a\u65f6\u4efb\u52a1\uff08\u5982\u6bcf 5 \u5206\u949f\uff09\u5c06 Redis \u4e2d\u7684\u6570\u636e\u6301\u4e45\u5316\u5230\u6570\u636e\u5e93\u3002\n*   **\u98ce\u9669**\uff1a\u5982\u679c Redis \u5b95\u673a\uff0c\u5185\u5b58\u4e2d\u672a\u843d\u5e93\u7684\u6570\u636e\u4f1a\u4e22\u5931\u3002\u9700\u6839\u636e\u4e1a\u52a1\u5bf9\u6570\u636e\u4e00\u81f4\u6027\u7684\u8981\u6c42\u6765\u51b3\u5b9a\u662f\u5426\u4f7f\u7528\u3002\n\n#### 3. \u51b7\u70ed\u6570\u636e\u5206\u79bb\n*   **\u65b9\u6848**\uff1a\u5c06\u5386\u53f2\u6570\u636e\uff08\u51b7\u6570\u636e\uff09\u5f52\u6863\u5230\u5386\u53f2\u5e93\u6216\u5927\u6570\u636e\u5e73\u53f0\uff0c\u4e3b\u5e93\u53ea\u4fdd\u7559\u8fd1\u671f\u6d3b\u8dc3\u6570\u636e\uff08\u70ed\u6570\u636e\uff09\u3002\n*   **\u4ef7\u503c**\uff1a\u51cf\u5c0f\u4e3b\u5e93\u6570\u636e\u91cf\uff0c\u7d22\u5f15\u66f4\u5c0f\u3001\u7f13\u5b58\u547d\u4e2d\u7387\u66f4\u9ad8\uff0c\u5199\u5165\u548c\u7ef4\u62a4\u6548\u7387\u81ea\u7136\u63d0\u5347\u3002\n\n---\n\n### \u603b\u7ed3\n\n\u9488\u5bf9\u201c\u5199\u591a\u8bfb\u5c11\u201d\u7684\u573a\u666f\uff0c\u6211\u7684\u4f18\u5316\u8def\u5f84\u901a\u5e38\u662f\uff1a\n\n1.  **\u5148\u770b\u80fd\u4e0d\u80fd\u5408\u5e76**\uff1a\u4ee3\u7801\u5c42\u9762\u4f18\u5148\u4f7f\u7528**\u6279\u91cf\u63d2\u5165**\u3002\n2.  **\u518d\u770b\u80fd\u4e0d\u80fd\u7f13\u51b2**\uff1a\u5f15\u5165 **MQ \u8fdb\u884c\u5f02\u6b65\u524a\u5cf0**\uff0c\u8fd9\u662f\u9ad8\u5e76\u53d1\u67b6\u6784\u7684\u6807\u914d\u3002\n3.  **\u6700\u540e\u770b\u80fd\u4e0d\u80fd\u62c6\u5206**\uff1a\u5f53\u5355\u673a\u8fbe\u5230\u7269\u7406\u6781\u9650\uff0c\u8fdb\u884c**\u5206\u5e93\u5206\u8868**\u6216\u8fc1\u79fb\u5230 **ClickHouse** \u7b49\u4e13\u7528\u5b58\u50a8\u3002\n\n\u4ee5\u4e0a\u662f\u6211\u5728\u201c\u5199\u591a\u8bfb\u5c11\u201d\u573a\u666f\u4e0b\u7684\u67b6\u6784\u8bbe\u8ba1\u601d\u8def\u3002\u8bf7\u95ee\u60a8\u60f3\u6df1\u5165\u4e86\u89e3 **\u5206\u5e93\u5206\u8868\u7684\u5177\u4f53\u8def\u7531\u7b97\u6cd5\u8bbe\u8ba1** \u6216\u8005 **MQ \u6d88\u8d39\u7aef\u7684\u5e42\u7b49\u6027\u5904\u7406** \u5417\uff1f",
    "subItems": []

  "58": {
    "title": "\u60b2\u89c2\u9501\u548c\u4e50\u89c2\u9501",
    "style": "",
    "details": "\u9762\u8bd5\u5b98\u60a8\u597d\uff0c**\u60b2\u89c2\u9501\u4e0e\u4e50\u89c2\u9501** \u662f\u5e76\u53d1\u63a7\u5236\u4e2d\u4e24\u79cd\u6700\u6838\u5fc3\u7684\u601d\u60f3\u3002\u5728\u6211\u7684\u67b6\u6784\u7ecf\u9a8c\u4e2d\uff0c\u5e76\u6ca1\u6709\u7edd\u5bf9\u7684\u201c\u8c01\u4f18\u8c01\u52a3\u201d\uff0c\u5173\u952e\u5728\u4e8e\u6839\u636e**\u4e1a\u52a1\u51b2\u7a81\u6982\u7387**\u548c**\u54cd\u5e94\u901f\u5ea6\u8981\u6c42**\u505a\u51fa\u5408\u9002\u7684\u9009\u62e9\u3002\n\n\u6211\u5c06\u4ece**\u6838\u5fc3\u601d\u60f3**\u3001**\u5b9e\u73b0\u65b9\u5f0f**\u3001**\u9002\u7528\u573a\u666f**\u4ee5\u53ca**\u5b9e\u6218\u6848\u4f8b**\u56db\u4e2a\u7ef4\u5ea6\u6765\u8fdb\u884c\u5bf9\u6bd4\u9610\u8ff0\u3002\n\n---\n\n### \u4e00\u3001 \u6838\u5fc3\u601d\u60f3\u5bf9\u6bd4\n\n#### 1. \u60b2\u89c2\u9501\n*   **\u7406\u5ff5**\uff1a**\u201c\u5148\u53d6\u9501\uff0c\u518d\u8bbf\u95ee\u201d**\u3002\u5b83\u5047\u8bbe\u5e76\u53d1\u51b2\u7a81\u6982\u7387\u5f88\u9ad8\uff0c\u56e0\u6b64\u5728\u64cd\u4f5c\u6570\u636e\u524d\uff0c\u5148\u62ff\u5230\u9501\uff0c\u628a\u8d44\u6e90\u5360\u4e3a\u5df1\u6709\u3002\n*   **\u5f62\u8c61\u6bd4\u55bb**\uff1a\u5c31\u50cf\u94f6\u884c\u67dc\u53f0\u529e\u4e1a\u52a1\uff0c\u4e00\u4e2a\u4eba\u5728\u529e\uff0c\u5176\u4ed6\u4eba\u5fc5\u987b\u6392\u961f\u7b49\u5f85\uff08\u963b\u585e\uff09\u3002\n*   **\u7279\u70b9**\uff1a**\u5f3a\u4e00\u81f4\u6027**\uff0c\u4f46\u5e76\u53d1\u6027\u80fd\u8f83\u4f4e\uff0c\u56e0\u4e3a\u5176\u4ed6\u7ebf\u7a0b\u4f1a\u88ab\u6302\u8d77\u6216\u963b\u585e\u3002\n\n#### 2. \u4e50\u89c2\u9501\n*   **\u7406\u5ff5**\uff1a**\u201c\u5148\u8bbf\u95ee\uff0c\u63d0\u4ea4\u65f6\u68c0\u67e5\u201d**\u3002\u5b83\u5047\u8bbe\u5e76\u53d1\u51b2\u7a81\u6982\u7387\u5f88\u4f4e\uff0c\u64cd\u4f5c\u65f6\u4e0d\u4e0a\u9501\uff0c\u800c\u662f\u5728\u63d0\u4ea4\u66f4\u65b0\u65f6\u68c0\u67e5\u6570\u636e\u662f\u5426\u88ab\u4fee\u6539\u8fc7\u3002\n*   **\u5f62\u8c61\u6bd4\u55bb**\uff1a\u5c31\u50cf\u62a2\u7968\u8f6f\u4ef6\uff0c\u5927\u5bb6\u90fd\u80fd\u770b\u5230\u7968\uff0c\u4e0b\u5355\u65f6\u7cfb\u7edf\u624d\u544a\u8bc9\u4f60\u201c\u7968\u5df2\u88ab\u62a2\u8d70\uff0c\u8bf7\u91cd\u8bd5\u201d\u3002\n*   **\u7279\u70b9**\uff1a**\u4e0d\u963b\u585e**\uff0c\u541e\u5410\u91cf\u9ad8\uff0c\u4f46\u5982\u679c\u51b2\u7a81\u9891\u7e41\uff0c\u4f1a\u5bfc\u81f4\u5927\u91cf\u91cd\u8bd5\uff08\u5931\u8d25\u7387\u4e0a\u5347\uff09\u3002\n\n---\n\n### \u4e8c\u3001 \u5b9e\u73b0\u65b9\u5f0f\u4e0e\u539f\u7406\n\n#### 1. \u60b2\u89c2\u9501\u7684\u5b9e\u73b0\n*   **\u6570\u636e\u5e93\u5c42\u9762**\uff1a\n    *   MySQL\uff1a\u4f7f\u7528 `SELECT ... FOR UPDATE`\u3002InnoDB \u5f15\u64ce\u4f1a\u5bf9\u67e5\u8be2\u5230\u7684\u884c\u8bb0\u5f55\u52a0**\u6392\u4ed6\u9501\uff08X\u9501\uff09**\uff0c\u5176\u4ed6\u4e8b\u52a1\u65e0\u6cd5\u4fee\u6539\u4e5f\u65e0\u6cd5\u5bf9\u8be5\u884c\u52a0\u9501\u3002\n    *   \u6ce8\u610f\uff1a\u5fc5\u987b\u5728\u4e8b\u52a1\uff08`BEGIN` ... `COMMIT`\uff09\u4e2d\u624d\u751f\u6548\u3002\n*   **\u7f16\u7a0b\u8bed\u8a00\u5c42\u9762**\uff1a\n    *   Java \u4e2d\u7684 `synchronized` \u5173\u952e\u5b57\u3001`ReentrantLock` \u7c7b\u3002\n\n#### 2. \u4e50\u89c2\u9501\u7684\u5b9e\u73b0\n*   **CAS (Compare And Swap)**\uff1a\n    *   \u8fd9\u662f Java `Atomic` \u539f\u5b50\u7c7b\uff08\u5982 `AtomicInteger`\uff09\u7684\u5e95\u5c42\u5b9e\u73b0\u3002\u5b83\u5229\u7528 CPU \u6307\u4ee4\uff0c\u5728\u66f4\u65b0\u65f6\u5224\u65ad\u5185\u5b58\u503c\u4e0e\u9884\u671f\u503c\u662f\u5426\u4e00\u81f4\u3002\n    *   **ABA \u95ee\u9898**\uff1a\u5982\u679c\u503c\u4ece A \u53d8 B \u53c8\u53d8\u56de A\uff0cCAS \u65e0\u6cd5\u611f\u77e5\u3002\u89e3\u51b3\u65b9\u6848\u662f\u52a0\u7248\u672c\u53f7\uff08`AtomicStampedReference`\uff09\u3002\n*   **\u7248\u672c\u53f7\u673a\u5236\uff08\u6570\u636e\u5e93\u5e38\u7528\uff09**\uff1a\n    *   \u7ed9\u8868\u589e\u52a0\u4e00\u4e2a `version` \u5b57\u6bb5\u3002\n    *   \u8bfb\u53d6\u6570\u636e\u65f6\uff0c\u5c06 `version` \u4e00\u5e76\u8bfb\u51fa\uff08\u4f8b\u5982 `v=1`\uff09\u3002\n    *   \u66f4\u65b0\u65f6\uff0c\u68c0\u67e5 `version` \u662f\u5426\u672a\u53d8\uff1a\n        ```sql\n        UPDATE table SET name='new', version=version+1 \n        WHERE id=1 AND version=1;\n        ```\n    *   \u5982\u679c\u8fd4\u56de `affected_rows > 0`\uff0c\u5219\u6210\u529f\uff1b\u5426\u5219\u8bf4\u660e\u6570\u636e\u5df2\u88ab\u4ed6\u4eba\u4fee\u6539\uff0c\u9700\u8981\u91cd\u8bd5\u6216\u62a5\u9519\u3002\n\n---\n\n### \u4e09\u3001 \u9002\u7528\u573a\u666f\u5206\u6790\n\n| \u7ef4\u5ea6 | \u60b2\u89c2\u9501 | \u4e50\u89c2\u9501 |\n| :--- | :--- | :--- |\n| **\u51b2\u7a81\u6982\u7387** | **\u9ad8**\uff08\u591a\u5199\u5c11\u8bfb\uff0c\u8d44\u6e90\u7ade\u4e89\u6fc0\u70c8\uff09 | **\u4f4e**\uff08\u591a\u8bfb\u5c11\u5199\uff0c\u5076\u53d1\u51b2\u7a81\uff09 |\n| **\u54cd\u5e94\u901f\u5ea6** | \u6162\uff08\u6d89\u53ca\u7ebf\u7a0b\u963b\u585e\u3001\u4e0a\u4e0b\u6587\u5207\u6362\uff09 | \u5feb\uff08\u65e0\u963b\u585e\uff0c\u76f4\u63a5\u64cd\u4f5c\uff09 |\n| **\u91cd\u8bd5\u6210\u672c** | \u65e0\u9700\u91cd\u8bd5\uff08\u6392\u961f\u7b49\u5f85\uff09 | \u9700\u8981\u91cd\u8bd5\uff08\u51b2\u7a81\u540e\u9700\u91cd\u65b0\u83b7\u53d6\u6570\u636e\u8ba1\u7b97\uff09 |\n| **\u5178\u578b\u573a\u666f** | \u91d1\u878d\u8d26\u6237\u6263\u6b3e\u3001\u79d2\u6740\u62a2\u8d2d\uff08\u5e93\u5b58\u6263\u51cf\uff09 | \u535a\u5ba2\u6587\u7ae0\u7f16\u8f91\u3001\u5546\u54c1\u8be6\u60c5\u9875\u8bfb\u53d6 |\n\n---\n\n### \u56db\u3001 \u5b9e\u6218\u6848\u4f8b\uff1a\u5e93\u5b58\u6263\u51cf\u65b9\u6848\u6f14\u8fdb\n\n\u5728\u201c\u5c0f\u7535\u201d\u7684\u5171\u4eab\u5145\u7535\u5b9d\u79df\u501f\u4e1a\u52a1\u4e2d\uff0c**\u5e93\u5b58\u6263\u51cf**\uff08\u8bbe\u5907\u53ef\u79df\u501f\u6570\u91cf\uff09\u662f\u5178\u578b\u7684\u9ad8\u5e76\u53d1\u573a\u666f\u3002\u6211\u4eec\u7ecf\u5386\u4e86\u4ee5\u4e0b\u6f14\u8fdb\uff1a\n\n#### \u9636\u6bb5\u4e00\uff1a\u7eaf\u6570\u636e\u5e93\u60b2\u89c2\u9501\n*   **\u65b9\u6848**\uff1a`SELECT quantity FROM device WHERE id=1 FOR UPDATE; UPDATE device SET quantity = quantity - 1 ...;`\n*   **\u95ee\u9898**\uff1a\u5728\u9ad8\u5cf0\u671f\uff0c\u5927\u91cf\u8bf7\u6c42\u963b\u585e\u5728\u6570\u636e\u5e93\u9501\u4e0a\uff0c\u6570\u636e\u5e93\u8fde\u63a5\u6c60\u88ab\u6253\u6ee1\uff0c\u7cfb\u7edf\u541e\u5410\u91cf\u6781\u4f4e\u3002\n*   **\u7ed3\u8bba**\uff1a\u6570\u636e\u5e93\u5c42\u9762\u7684\u60b2\u89c2\u9501\u6297\u4e0d\u4f4f\u9ad8\u5e76\u53d1\u6d41\u91cf\u3002\n\n#### \u9636\u6bb5\u4e8c\uff1a\u6570\u636e\u5e93\u4e50\u89c2\u9501\n*   **\u65b9\u6848**\uff1a\u5e26\u7248\u672c\u53f7\u66f4\u65b0 `UPDATE device SET quantity=quantity-1, ver=ver+1 WHERE id=1 AND ver=old_ver AND quantity>0;`\n*   **\u95ee\u9898**\uff1a\u867d\u7136\u89e3\u51b3\u4e86\u963b\u585e\uff0c\u4f46\u7531\u4e8e\u5e76\u53d1\u6781\u9ad8\uff0c\u51b2\u7a81\u7387\u5f88\u9ad8\uff0c\u5bfc\u81f4\u5927\u91cf\u8bf7\u6c42\u5931\u8d25\u9700\u8981\u91cd\u8bd5\uff0c\u7528\u6237\u4f53\u9a8c\u5dee\uff0cCPU \u6d88\u8017\u5728\u91cd\u8bd5\u903b\u8f91\u4e0a\u3002\n\n#### \u9636\u6bb5\u4e09\uff1aRedis \u5206\u5e03\u5f0f\u9501 + \u5f02\u6b65\u843d\u5e93\uff08\u6700\u7ec8\u65b9\u6848\uff09\n*   **\u65b9\u6848**\uff1a\n    1.  **Redis \u6263\u51cf**\uff1a\u5c06\u70ed\u70b9\u5e93\u5b58\u9884\u70ed\u5230 Redis\uff0c\u5229\u7528 Redis \u7684\u539f\u5b50\u6027\uff08`DECR` \u547d\u4ee4\uff09\u8fdb\u884c\u6263\u51cf\u3002\u8fd9\u672c\u8d28\u662f**\u5185\u5b58\u7ea7\u522b\u7684\u4e50\u89c2\u9501/CAS**\uff0c\u6027\u80fd\u6781\u9ad8\u3002\n    2.  **\u5206\u5e03\u5f0f\u9501**\uff1a\u4e3a\u4e86\u9632\u6b62\u8d85\u5356\uff0c\u4f7f\u7528 Redis Lua \u811a\u672c\u4fdd\u8bc1\u201c\u67e5\u8be2+\u6263\u51cf\u201d\u539f\u5b50\u6027\uff0c\u76f8\u5f53\u4e8e\u4e00\u79cd**\u5e26\u8d85\u65f6\u673a\u5236\u7684\u60b2\u89c2\u9501**\u3002\n    3.  **\u5f02\u6b65\u540c\u6b65**\uff1a\u901a\u8fc7 MQ \u5f02\u6b65\u5c06\u6263\u51cf\u8bb0\u5f55\u540c\u6b65\u56de\u6570\u636e\u5e93\uff0c\u4fdd\u8bc1\u6570\u636e\u6700\u7ec8\u4e00\u81f4\u6027\u3002\n*   **\u7ed3\u679c**\uff1a\u7cfb\u7edf TPS \u63d0\u5347\u4e86 10 \u500d\u4ee5\u4e0a\uff0c\u4e14\u4fdd\u8bc1\u4e86\u6570\u636e\u7684\u51c6\u786e\u6027\u3002\n\n---\n\n### \u4e94\u3001 \u603b\u7ed3\n\n1.  **\u60b2\u89c2\u9501**\u9002\u5408**\u5199\u591a\u8bfb\u5c11**\u3001\u51b2\u7a81\u4e25\u91cd\u7684\u573a\u666f\uff0c\u4fdd\u7a33\u5b9a\uff0c\u727a\u7272\u6027\u80fd\u3002\n2.  **\u4e50\u89c2\u9501**\u9002\u5408**\u8bfb\u591a\u5199\u5c11**\u3001\u51b2\u7a81\u8f83\u5c11\u7684\u573a\u666f\uff0c\u4fdd\u6027\u80fd\uff0c\u727a\u7272\u4e00\u90e8\u5206\u6210\u529f\u7387\u3002\n3.  **\u67b6\u6784\u5e08\u89c6\u89d2**\uff1a\u5728\u771f\u6b63\u7684\u9ad8\u5e76\u53d1\u4e92\u8054\u7f51\u67b6\u6784\u4e2d\uff0c\u6211\u4eec\u901a\u5e38\u4e0d\u4f1a\u76f4\u63a5\u4f9d\u8d56\u6570\u636e\u5e93\u5c42\u9762\u7684\u9501\uff08\u65e0\u8bba\u662f\u60b2\u89c2\u8fd8\u662f\u4e50\u89c2\uff09\uff0c\u800c\u662f\u4f7f\u7528 **Redis \u5206\u5e03\u5f0f\u9501** \u6216 **\u539f\u5b50\u8ba1\u6570\u5668** \u6765\u5728\u7f13\u5b58\u5c42\u62e6\u622a\u6d41\u91cf\uff0c\u4fdd\u62a4\u540e\u7aef\u6570\u636e\u5e93\u3002\n\n\u4ee5\u4e0a\u662f\u6211\u5bf9\u60b2\u89c2\u9501\u548c\u4e50\u89c2\u9501\u7684\u7406\u89e3\u3002\u8bf7\u95ee\u60a8\u60f3\u6df1\u5165\u4e86\u89e3 **Redis \u5206\u5e03\u5f0f\u9501\u7684\u5b9e\u73b0\u7ec6\u8282\uff08\u5982 Redisson \u770b\u95e8\u72d7\u673a\u5236\uff09** \u5417\uff1f",

    "details": "\u9762\u8bd5\u5b98\u60a8\u597d\uff0c**\u5206\u5e03\u5f0f\u4e8b\u52a1** \u662f\u5fae\u670d\u52a1\u67b6\u6784\u4e2d\u6700\u6838\u5fc3\u7684\u6280\u672f\u6311\u6218\u4e4b\u4e00\u3002\u5728\u6211\u7684\u67b6\u6784\u5b9e\u8df5\u4e2d\uff0c\u89e3\u51b3\u5206\u5e03\u5f0f\u4e8b\u52a1\u7684\u6838\u5fc3\u601d\u8def\u5e76\u975e\u8ffd\u6c42\u201c\u5b8c\u7f8e\u7684\u5f3a\u4e00\u81f4\u6027\u201d\uff0c\u800c\u662f\u6839\u636e**\u4e1a\u52a1\u573a\u666f\u5bf9\u4e00\u81f4\u6027\u3001\u53ef\u7528\u6027\u3001\u6027\u80fd\u7684\u8981\u6c42**\uff0c\u5728 CAP \u7406\u8bba\u548c BASE \u7406\u8bba\u7684\u6307\u5bfc\u4e0b\uff0c\u9009\u62e9\u6700\u5408\u9002\u7684\u59a5\u534f\u65b9\u6848\u3002\n\n\u6211\u5c06\u5206\u5e03\u5f0f\u4e8b\u52a1\u7684\u89e3\u51b3\u65b9\u6848\u5206\u4e3a\u56db\u5927\u7c7b\uff0c\u5206\u522b\u5bf9\u5e94\u4e0d\u540c\u7684\u4e1a\u52a1\u573a\u666f\uff1a\n\n---\n\n### \u4e00\u3001 2PC / XA\uff08\u4e24\u9636\u6bb5\u63d0\u4ea4\uff09\u2014\u2014 \u5f3a\u4e00\u81f4\u6027\u65b9\u6848\n\n\u8fd9\u662f\u6700\u4f20\u7edf\u7684\u89e3\u51b3\u65b9\u6848\uff0c\u57fa\u4e8e\u6570\u636e\u5e93\u5c42\u9762\u7684 XA \u534f\u8bae\u3002\n\n*   **\u539f\u7406**\uff1a\n    1.  **\u51c6\u5907\u9636\u6bb5**\uff1a\u534f\u8c03\u8005\u8be2\u95ee\u6240\u6709\u53c2\u4e0e\u8005\u662f\u5426\u53ef\u4ee5\u63d0\u4ea4\u3002\u53c2\u4e0e\u8005\u6267\u884c SQL\uff0c\u5199 Undo/Redo Log\uff0c\u4f46\u4e0d\u63d0\u4ea4\uff0c\u6301\u6709\u9501\u3002\n    2.  **\u63d0\u4ea4\u9636\u6bb5**\uff1a\u5982\u679c\u6240\u6709\u53c2\u4e0e\u8005\u90fd\u8fd4\u56de\u201c\u662f\u201d\uff0c\u534f\u8c03\u8005\u53d1\u9001\u63d0\u4ea4\u547d\u4ee4\uff1b\u5426\u5219\u53d1\u9001\u56de\u6eda\u547d\u4ee4\u3002\n*   **\u4f18\u70b9**\uff1a\u5f3a\u4e00\u81f4\u6027\uff0c\u4e0d\u4ec5\u662f\u6700\u7ec8\u4e00\u81f4\uff0c\u8fc7\u7a0b\u4e2d\u6570\u636e\u4e5f\u662f\u9501\u5b9a\u7684\u3002\n*   **\u7f3a\u70b9**\uff1a\n    *   **\u6027\u80fd\u5dee**\uff1a\u5728\u51c6\u5907\u9636\u6bb5\u5230\u63d0\u4ea4\u9636\u6bb5\u671f\u95f4\uff0c\u53c2\u4e0e\u8005\u4e00\u76f4\u6301\u6709\u6570\u636e\u5e93\u9501\uff0c\u5e76\u53d1\u6781\u4f4e\u3002\n    *   **\u5355\u70b9\u6545\u969c**\uff1a\u534f\u8c03\u8005\u6302\u4e86\uff0c\u53c2\u4e0e\u8005\u4e00\u76f4\u963b\u585e\u3002\n    *   **\u6570\u636e\u4e0d\u4e00\u81f4**\uff1a\u63d0\u4ea4\u9636\u6bb5\u82e5\u90e8\u5206\u53c2\u4e0e\u8005\u6536\u4e0d\u5230\u547d\u4ee4\uff0c\u4f1a\u5bfc\u81f4\u90e8\u5206\u63d0\u4ea4\u90e8\u5206\u56de\u6eda\u3002\n*   **\u9002\u7528\u573a\u666f**\uff1a\n    *   \u4f20\u7edf\u5355\u4f53\u5e94\u7528\u8de8\u5e93\u4e8b\u52a1\uff08\u5982\u5355\u4f53\u67b6\u6784\u4e0b\u7684\u8d22\u52a1\u7cfb\u7edf\uff09\u3002\n    *   \u5e76\u53d1\u91cf\u4e0d\u5927\u3001\u5bf9\u4e00\u81f4\u6027\u8981\u6c42\u6781\u9ad8\u7684\u540e\u53f0\u7ba1\u7406\u7cfb\u7edf\u3002\n*   **\u5b9e\u6218\u6001\u5ea6**\uff1a\u5728\u4e92\u8054\u7f51\u9ad8\u5e76\u53d1\u4e1a\u52a1\u4e2d\uff08\u5982\u5c0f\u7535\u7684\u79df\u501f\u4e1a\u52a1\uff09\uff0c**\u6211\u57fa\u672c\u4e0d\u4f7f\u7528 XA \u65b9\u6848**\uff0c\u56e0\u4e3a\u5176\u6027\u80fd\u65e0\u6cd5\u6ee1\u8db3\u9ad8\u5e76\u53d1\u8981\u6c42\u3002\n\n---\n\n### \u4e8c\u3001 TCC (Try-Confirm-Cancel) \u2014\u2014 \u9ad8\u6027\u80fd\u5b9e\u65f6\u4e00\u81f4\u6027\u65b9\u6848\n\n\u8fd9\u662f\u4e92\u8054\u7f51\u4e1a\u52a1\u4e2d\u6700\u4e3b\u6d41\u7684\u67d4\u6027\u4e8b\u52a1\u65b9\u6848\uff0c\u5c06\u4e1a\u52a1\u903b\u8f91\u62c6\u5206\u4e3a\u4e09\u4e2a\u9636\u6bb5\u3002\n\n*   **\u539f\u7406**\uff1a\n    1.  **Try \u9636\u6bb5**\uff1a\u8d44\u6e90\u9884\u7559\uff08\u51bb\u7ed3\uff09\u3002\u4f8b\u5982\uff1a\u6263\u6b3e\u65f6\uff0c\u5148\u68c0\u67e5\u4f59\u989d\uff0c\u51bb\u7ed3 100 \u5143\uff08\u53ef\u7528\u4f59\u989d\u51cf\u5c11\uff09\uff0c\u4f46\u672a\u771f\u6b63\u6263\u8d70\u3002\n    2.  **Confirm \u9636\u6bb5**\uff1a\u786e\u8ba4\u63d0\u4ea4\u3002\u4f8b\u5982\uff1a\u5c06\u51bb\u7ed3\u7684 100 \u5143\u771f\u6b63\u6263\u9664\uff0c\u72b6\u6001\u53d8\u4e3a\u5df2\u6263\u6b3e\u3002\n    3.  **Cancel \u9636\u6bb5**\uff1a\u53d6\u6d88\u9884\u7559\u3002\u4f8b\u5982\uff1a\u91ca\u653e\u51bb\u7ed3\u7684 100 \u5143\uff0c\u4f59\u989d\u6062\u590d\u3002\n*   **\u4f18\u70b9**\uff1a\n    *   \u6027\u80fd\u9ad8\uff1a\u9501\u7684\u7c92\u5ea6\u5728\u4e1a\u52a1\u5c42\uff0c\u4e0d\u4f9d\u8d56\u6570\u636e\u5e93\u5168\u7a0b\u9501\u3002\n    *   \u4e00\u81f4\u6027\u597d\uff1a\u53ea\u8981\u4ee3\u7801\u903b\u8f91\u6b63\u786e\uff0c\u6570\u636e\u5b9e\u65f6\u4e00\u81f4\u3002\n*   **\u7f3a\u70b9**\uff1a\n    *   **\u4fb5\u5165\u6027\u5f3a**\uff1a\u9700\u8981\u4e1a\u52a1\u4ee3\u7801\u7f16\u5199\u4e09\u4e2a\u63a5\u53e3\uff0c\u5f00\u53d1\u6210\u672c\u9ad8\u3002\n    *   **\u5f00\u53d1\u96be\u5ea6\u5927**\uff1a\u9700\u8981\u5904\u7406**\u7a7a\u56de\u6eda**\uff08Try \u672a\u6267\u884c\uff0cCancel \u5374\u8c03\u7528\u4e86\uff09\u3001**\u60ac\u6302**\uff08Cancel \u5148\u4e8e Try \u6267\u884c\uff09\u3001**\u5e42\u7b49**\u7b49\u8fb9\u7f18\u60c5\u51b5\u3002\n*   **\u9002\u7528\u573a\u666f**\uff1a\n    *   \u6838\u5fc3\u4ea4\u6613\u94fe\u8def\uff1a\u5982**\u652f\u4ed8\u6263\u6b3e\u3001\u8d26\u6237\u8f6c\u8d26\u3001\u5e93\u5b58\u6263\u51cf**\u3002\n*   **\u5b9e\u6218\u7ecf\u9a8c**\uff1a\n    *   \u5728\u5c0f\u7535\u7684**\u62bc\u91d1\u9000\u8fd8**\u573a\u666f\u4e2d\uff0c\u6211\u91c7\u7528\u4e86 TCC \u6a21\u5f0f\u3002Try \u9636\u6bb5\u51bb\u7ed3\u7528\u6237\u7684\u4fe1\u7528\u989d\u5ea6\uff0cConfirm \u9636\u6bb5\u6263\u51cf\u989d\u5ea6\u5e76\u751f\u6210\u9000\u6b3e\u5355\u3002\u4e3a\u4e86\u4fdd\u8bc1\u53ef\u9760\u6027\uff0c\u6211\u4eec\u5f15\u5165\u4e86**\u5e42\u7b49\u8bb0\u5f55\u8868**\u548c**\u5b9a\u65f6\u4efb\u52a1\u8865\u507f\u673a\u5236**\u3002\n\n---\n\n### \u4e09\u3001 \u53ef\u9760\u6d88\u606f\u6700\u7ec8\u4e00\u81f4\u6027 \u2014\u2014 \u9ad8\u541e\u5410\u5f02\u6b65\u65b9\u6848\n\n\u8fd9\u662f**\u6700\u5e38\u7528**\u7684\u65b9\u6848\uff0c\u5229\u7528\u6d88\u606f\u961f\u5217\u5b9e\u73b0\u8de8\u670d\u52a1\u4e8b\u52a1\uff0c\u6838\u5fc3\u662f**\u201c\u672c\u5730\u6d88\u606f\u8868\u201d**\u6216**\u4e8b\u52a1\u6d88\u606f**\u3002\n\n*   **\u65b9\u6848 A\uff1a\u672c\u5730\u6d88\u606f\u8868**\n    *   **\u539f\u7406**\uff1a\n        1.  \u5728\u540c\u4e00\u4e2a\u672c\u5730\u4e8b\u52a1\u4e2d\uff0c\u5199\u5165\u4e1a\u52a1\u6570\u636e\u548c\u6d88\u606f\u8bb0\u5f55\uff08\u72b6\u6001\u4e3a\u201c\u5f85\u53d1\u9001\u201d\uff09\u3002\n        2.  \u5b9a\u65f6\u4efb\u52a1\u626b\u63cf\u6d88\u606f\u8868\uff0c\u53d1\u9001 MQ\uff0c\u53d1\u9001\u6210\u529f\u540e\u66f4\u65b0\u72b6\u6001\u4e3a\u201c\u5df2\u53d1\u9001\u201d\u3002\n        3.  \u6d88\u8d39\u8005\u6d88\u8d39\u6d88\u606f\uff0c\u5904\u7406\u4e1a\u52a1\uff0c\u6210\u529f\u540e\u56de\u8c03\u786e\u8ba4\u3002\n    *   **\u6838\u5fc3**\uff1a**\u201c\u4e1a\u52a1\u64cd\u4f5c\u201d\u548c\u201c\u6d88\u606f\u53d1\u9001\u201d\u5728\u540c\u4e00\u4e2a\u6570\u636e\u5e93\u4e8b\u52a1\u4e2d**\uff0c\u4fdd\u8bc1\u4e86\u201c\u4e1a\u52a1\u6210\u529f\uff0c\u6d88\u606f\u4e00\u5b9a\u53d1\u51fa\u53bb\u201d\u3002\n\n*   **\u65b9\u6848 B\uff1aRocketMQ \u4e8b\u52a1\u6d88\u606f**\n    *   **\u539f\u7406**\uff1a\n        1.  \u53d1\u9001\u201c\u534a\u6d88\u606f\u201d\u5230 MQ\uff0c\u6b64\u65f6\u6d88\u606f\u5bf9\u6d88\u8d39\u8005\u4e0d\u53ef\u89c1\u3002\n        2.  \u6267\u884c\u672c\u5730\u4e8b\u52a1\u3002\n        3.  \u6839\u636e\u672c\u5730\u4e8b\u52a1\u7ed3\u679c\uff0c\u5411 MQ \u53d1\u9001 Commit\uff08\u6d88\u606f\u53ef\u89c1\uff09\u6216 Rollback\uff08\u6d88\u606f\u4e22\u5f03\uff09\u3002\n        4.  **\u53cd\u67e5\u673a\u5236**\uff1a\u5982\u679c MQ \u6536\u4e0d\u5230 Commit/Rollback\uff0c\u4f1a\u56de\u8c03\u751f\u4ea7\u8005\u67e5\u8be2\u672c\u5730\u4e8b\u52a1\u72b6\u6001\u3002\n*   **\u4f18\u70b9**\uff1a\n    *   \u541e\u5410\u91cf\u6781\u9ad8\uff0c\u5b9e\u73b0\u4e86\u5e94\u7528\u89e3\u8026\u3002\n    *   \u4e0d\u963b\u585e\u4e3b\u4e1a\u52a1\u6d41\u7a0b\u3002\n*   **\u7f3a\u70b9**\uff1a\n    *   \u662f**\u6700\u7ec8\u4e00\u81f4\u6027**\uff0c\u4e2d\u95f4\u6709\u5ef6\u8fdf\uff0c\u4e0d\u9002\u5408\u5b9e\u65f6\u6027\u8981\u6c42\u6781\u9ad8\u7684\u573a\u666f\u3002\n*   **\u9002\u7528\u573a\u666f**\uff1a\n    *   **\u975e\u6838\u5fc3\u94fe\u8def\u3001\u9ad8\u5e76\u53d1\u573a\u666f**\uff1a\u5982**\u79ef\u5206\u53d1\u653e\u3001\u4f18\u60e0\u5238\u53d1\u653e\u3001\u8ba2\u5355\u72b6\u6001\u6d41\u8f6c\u901a\u77e5**\u3002\n*   **\u5b9e\u6218\u7ecf\u9a8c**\uff1a\n    *   \u5728\u5c0f\u7535\u7684**\u79df\u501f\u7ed3\u675f\u540e\u53d1\u9001\u4f18\u60e0\u5238/\u79ef\u5206**\u573a\u666f\uff0c\u6211\u4f7f\u7528\u4e86 RocketMQ \u4e8b\u52a1\u6d88\u606f\u3002\u5373\u4f7f\u4e0b\u6e38\u79ef\u5206\u7cfb\u7edf\u6302\u4e86\uff0c\u6d88\u606f\u8fd8\u5728 MQ \u91cc\uff0c\u7b49\u79ef\u5206\u7cfb\u7edf\u6062\u590d\u540e\u7ee7\u7eed\u6d88\u8d39\uff0c\u4fdd\u8bc1\u4e86\u6570\u636e\u6700\u7ec8\u4e00\u81f4\u3002\n\n---\n\n### \u56db\u3001 Seata AT \u6a21\u5f0f \u2014\u2014 \u65e0\u4fb5\u5165\u81ea\u52a8\u5316\u65b9\u6848\n\nSeata \u662f\u76ee\u524d\u6700\u6d41\u884c\u7684\u5206\u5e03\u5f0f\u4e8b\u52a1\u6846\u67b6\uff0c\u5176 AT \u6a21\u5f0f\u5bf9\u4e1a\u52a1\u4ee3\u7801**\u96f6\u4fb5\u5165**\u3002\n\n*   **\u539f\u7406**\uff1a\n    *   \u6838\u5fc3\u5728\u4e8e**\u81ea\u52a8\u89e3\u6790 SQL**\uff0c\u751f\u6210\u524d\u955c\u50cf\u548c\u540e\u955c\u50cf\uff0c\u8bb0\u5f55\u5728 `undo_log` \u8868\u4e2d\u3002\n    *   \u4e00\u9636\u6bb5\uff1a\u76f4\u63a5\u63d0\u4ea4\u672c\u5730\u4e8b\u52a1\uff08\u4e0d\u963b\u585e\uff09\uff0c\u91ca\u653e\u9501\u3002\n    *   \u4e8c\u9636\u6bb5\uff1a\u5168\u5c40\u63d0\u4ea4\u5f02\u6b65\u6267\u884c\uff1b\u5168\u5c40\u56de\u6eda\u5219\u6839\u636e `undo_log` \u53cd\u5411\u751f\u6210 SQL \u8fd8\u539f\u6570\u636e\u3002\n*   **\u4f18\u70b9**\uff1a\n    *   \u65e0\u9700\u7f16\u5199 TCC \u7684\u4e09\u4e2a\u63a5\u53e3\uff0c\u5f00\u53d1\u7b80\u5355\uff0c\u50cf\u5199\u672c\u5730\u4e8b\u52a1\u4e00\u6837\u5199\u5206\u5e03\u5f0f\u4e8b\u52a1\u3002\n*   **\u7f3a\u70b9**\uff1a\n    *   \u5b58\u5728**\u810f\u5199**\u98ce\u9669\uff08\u9700\u8981\u5168\u5c40\u9501\u63a7\u5236\uff09\u3002\n    *   \u6027\u80fd\u4e0d\u5982 TCC\uff08\u56e0\u4e3a\u6709\u5168\u5c40\u9501\u7ade\u
