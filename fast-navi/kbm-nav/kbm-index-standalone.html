        /* 表格 */

            height: 100%;

const DATA_MAP = {
  "1": {
    "title": "JVM\u8fd0\u884c\u65f6\u5185\u5b58\u7ed3\u6784",
    "style": "background-color: yellow;",
    "details": "\u9762\u8bd5\u5b98\u60a8\u597d\uff0c**JVM \u8fd0\u884c\u65f6\u5185\u5b58\u7ed3\u6784**\uff08Runtime Data Area\uff09\u662f Java \u865a\u62df\u673a\u89c4\u8303\u4e2d\u5b9a\u4e49\u7684\u6838\u5fc3\u6982\u5ff5\uff0c\u4e5f\u662f\u7406\u89e3 JVM \u5185\u5b58\u6a21\u578b\uff08JMM\uff09\u548c\u6027\u80fd\u8c03\u4f18\u7684\u57fa\u7840\u3002\n\n\u5728\u6211\u7684\u7406\u89e3\u4e2d\uff0cJVM \u5728\u8fd0\u884c Java \u7a0b\u5e8f\u65f6\uff0c\u4f1a\u5c06\u7ba1\u7406\u7684\u5185\u5b58\u5212\u5206\u4e3a\u51e0\u4e2a\u4e0d\u540c\u7684\u533a\u57df\uff0c\u6bcf\u4e2a\u533a\u57df\u90fd\u6709\u7279\u5b9a\u7684\u7528\u9014\u3001\u521b\u5efa\u548c\u9500\u6bc1\u65f6\u95f4\u3002\u6839\u636e\u300aJava \u865a\u62df\u673a\u89c4\u8303\u300b\uff0c\u8fd9\u4e94\u4e2a\u90e8\u5206\u53ef\u4ee5\u5206\u4e3a\u4e24\u5927\u7c7b\uff1a**\u7ebf\u7a0b\u79c1\u6709\u533a\u57df**\u548c**\u7ebf\u7a0b\u5171\u4eab\u533a\u57df**\u3002\n\n\u4ee5\u4e0b\u662f\u8be6\u7ec6\u7684\u67b6\u6784\u89e3\u6790\uff1a\n\n---\n\n### \u4e00\u3001 \u7ebf\u7a0b\u79c1\u6709\u533a\u57df\n\n\u8fd9\u90e8\u5206\u533a\u57df\u7684\u751f\u547d\u5468\u671f\u4e0e\u7ebf\u7a0b\u76f8\u540c\uff0c\u968f\u7ebf\u7a0b\u542f\u52a8\u800c\u521b\u5efa\uff0c\u968f\u7ebf\u7a0b\u7ed3\u675f\u800c\u9500\u6bc1\u3002\u56e0\u6b64\uff0c\u8fd9\u90e8\u5206**\u4e0d\u9700\u8981\u8fdb\u884c\u5783\u573e\u56de\u6536**\u3002\n\n#### 1. \u7a0b\u5e8f\u8ba1\u6570\u5668\n*   **\u4f5c\u7528**\uff1a\u5b83\u53ef\u4ee5\u770b\u4f5c\u662f\u5f53\u524d\u7ebf\u7a0b\u6240\u6267\u884c\u7684\u5b57\u8282\u7801\u7684**\u884c\u53f7\u6307\u793a\u5668**\u3002\n*   **\u6838\u5fc3\u903b\u8f91**\uff1a\u5b57\u8282\u7801\u89e3\u91ca\u5668\u5de5\u4f5c\u65f6\uff0c\u5c31\u662f\u901a\u8fc7\u6539\u53d8\u8ba1\u6570\u5668\u7684\u503c\u6765\u9009\u53d6\u4e0b\u4e00\u6761\u9700\u8981\u6267\u884c\u7684\u5b57\u8282\u7801\u6307\u4ee4\u3002\n*   **\u7279\u70b9**\uff1a\n    *   \u662f JVM \u4e2d\u552f\u4e00\u6ca1\u6709\u89c4\u5b9a `OutOfMemoryError` \u7684\u533a\u57df\u3002\n    *   \u5982\u679c\u7ebf\u7a0b\u6267\u884c\u7684\u662f Java \u65b9\u6cd5\uff0c\u8ba1\u6570\u5668\u8bb0\u5f55\u7684\u662f\u865a\u62df\u673a\u5b57\u8282\u7801\u6307\u4ee4\u5730\u5740\uff1b\u5982\u679c\u662f Native \u65b9\u6cd5\uff0c\u5219\u8ba1\u6570\u5668\u503c\u4e3a\u7a7a\u3002\n\n#### 2. Java \u865a\u62df\u673a\u6808\n*   **\u4f5c\u7528**\uff1a\u63cf\u8ff0 Java \u65b9\u6cd5\u6267\u884c\u7684\u5185\u5b58\u6a21\u578b\u3002\n*   **\u6838\u5fc3\u6a21\u578b**\uff1a\u6bcf\u4e2a\u65b9\u6cd5\u6267\u884c\u65f6\uff0cJVM \u90fd\u4f1a\u521b\u5efa\u4e00\u4e2a**\u6808\u5e27** \u7528\u4e8e\u5b58\u50a8\u5c40\u90e8\u53d8\u91cf\u8868\u3001\u64cd\u4f5c\u6570\u6808\u3001\u52a8\u6001\u94fe\u63a5\u548c\u65b9\u6cd5\u51fa\u53e3\u7b49\u4fe1\u606f\u3002\u65b9\u6cd5\u7684\u8c03\u7528\u5c31\u662f\u6808\u5e27\u7684\u5165\u6808\u548c\u51fa\u6808\u8fc7\u7a0b\u3002\n*   **\u91cd\u70b9\uff1a\u5c40\u90e8\u53d8\u91cf\u8868**\uff1a\n    *   \u5b58\u653e\u7f16\u8bd1\u671f\u53ef\u77e5\u7684\u5404\u79cd\u57fa\u672c\u6570\u636e\u7c7b\u578b\u548c\u5bf9\u8c61\u5f15\u7528\u3002\n    *   **\u7ebf\u7a0b\u5b89\u5168**\uff1a\u56e0\u4e3a\u5b83\u662f\u7ebf\u7a0b\u79c1\u6709\u7684\uff0c\u6240\u4ee5\u5c40\u90e8\u53d8\u91cf\u662f\u7edd\u5bf9\u7ebf\u7a0b\u5b89\u5168\u7684\u3002\n*   **\u5f02\u5e38**\uff1a\n    *   `StackOverflowError`\uff1a\u7ebf\u7a0b\u8bf7\u6c42\u7684\u6808\u6df1\u5ea6\u5927\u4e8e JVM \u6240\u5141\u8bb8\u7684\u6df1\u5ea6\uff08\u5e38\u89c1\u4e8e\u9012\u5f52\u8c03\u7528\u65e0\u7ec8\u6b62\u6761\u4ef6\uff09\u3002\n    *   `OutOfMemoryError`\uff1a\u5982\u679c\u6808\u5141\u8bb8\u52a8\u6001\u6269\u5c55\uff0c\u4f46\u65e0\u6cd5\u7533\u8bf7\u5230\u8db3\u591f\u5185\u5b58\u3002\n\n#### 3. \u672c\u5730\u65b9\u6cd5\u6808\n*   **\u4f5c\u7528**\uff1a\u4e0e\u865a\u62df\u673a\u6808\u7c7b\u4f3c\uff0c\u533a\u522b\u5728\u4e8e\u865a\u62df\u673a\u6808\u4e3a Java \u65b9\u6cd5\u670d\u52a1\uff0c\u800c\u672c\u5730\u65b9\u6cd5\u6808\u4e3a Native \u65b9\u6cd5\uff08\u5982 C/C++ \u7f16\u5199\u7684\u4ee3\u7801\uff09\u670d\u52a1\u3002\n*   **\u6ce8\u610f**\uff1a\u5728 HotSpot \u865a\u62df\u673a\u4e2d\uff0c\u672c\u5730\u65b9\u6cd5\u6808\u4e0e\u865a\u62df\u673a\u6808\u5408\u4e8c\u4e3a\u4e00\u3002\n\n---\n\n### \u4e8c\u3001 \u7ebf\u7a0b\u5171\u4eab\u533a\u57df\n\n\u8fd9\u90e8\u5206\u533a\u57df\u968f JVM \u542f\u52a8\u800c\u521b\u5efa\uff0c\u6240\u6709\u7ebf\u7a0b\u5171\u4eab\uff0c**\u662f\u5783\u573e\u56de\u6536\u7684\u91cd\u70b9\u533a\u57df**\u3002\n\n#### 1. \u5806 \u2014\u2014 GC \u7684\u4e3b\u6218\u573a\n*   **\u4f5c\u7528**\uff1a\u5b58\u653e**\u5bf9\u8c61\u5b9e\u4f8b**\u3002\u51e0\u4e4e\u6240\u6709\u7684\u5bf9\u8c61\u5b9e\u4f8b\u548c\u6570\u7ec4\u90fd\u5728\u8fd9\u91cc\u5206\u914d\u5185\u5b58\u3002\n*   **\u7279\u70b9**\uff1a\n    *   \u662f JVM \u7ba1\u7406\u5185\u5b58\u4e2d\u6700\u5927\u7684\u4e00\u5757\u3002\n    *   **\u7ebf\u7a0b\u5171\u4eab**\uff0c\u9700\u8981\u8003\u8651\u7ebf\u7a0b\u5b89\u5168\u95ee\u9898\u3002\n    *   **\u5783\u573e\u6536\u96c6\u5668\u7ba1\u7406\u7684\u4e3b\u8981\u533a\u57df**\uff0c\u56e0\u6b64\u4e5f\u88ab\u79f0\u4e3a\u201cGC \u5806\u201d\u3002\n*   **\u5185\u5b58\u5212\u5206\uff08\u73b0\u4ee3 JVM \u67b6\u6784\uff09**\uff1a\n    \u4e3a\u4e86\u4f18\u5316 GC \u6548\u7387\uff0c\u5806\u901a\u5e38\u88ab\u5212\u5206\u4e3a\uff1a\n    *   **\u65b0\u751f\u4ee3**\uff1a\u5b58\u653e\u751f\u547d\u5468\u671f\u8f83\u77ed\u7684\u5bf9\u8c61\uff08\u5982\u5c40\u90e8\u53d8\u91cf\u5f15\u7528\u7684\u5bf9\u8c61\uff09\u3002\u5360\u5806\u7a7a\u95f4\u7684 1/3\u3002\n        *   Eden \u533a\n        *   Survivor \u533a (S0, S1)\n    *   **\u8001\u5e74\u4ee3**\uff1a\u5b58\u653e\u751f\u547d\u5468\u671f\u957f\u7684\u5bf9\u8c61\uff08\u5982\u7f13\u5b58\u3001\u5355\u4f8b\u5bf9\u8c61\uff09\u3002\u5360\u5806\u7a7a\u95f4\u7684 2/3\u3002\n*   **\u5f02\u5e38**\uff1a`OutOfMemoryError: Java heap space`\u3002\n\n#### 2. \u65b9\u6cd5\u533a \u2014\u2014 \u201c\u6c38\u4e45\u4ee3\u201d or \u201c\u5143\u7a7a\u95f4\u201d\n*   **\u4f5c\u7528**\uff1a\u5b58\u50a8\u5df2\u88ab\u865a\u62df\u673a\u52a0\u8f7d\u7684**\u7c7b\u4fe1\u606f\u3001\u5e38\u91cf\u3001\u9759\u6001\u53d8\u91cf\u3001\u5373\u65f6\u7f16\u8bd1\u5668\u751f\u6210\u7684\u4ee3\u7801**\u7b49\u6570\u636e\u3002\n*   **\u5386\u53f2\u6f14\u8fdb\uff08\u9762\u8bd5\u91cd\u70b9\uff09**\uff1a\n    *   **JDK 1.7 \u53ca\u4e4b\u524d**\uff1a\u65b9\u6cd5\u533a\u7684\u5b9e\u73b0\u53eb**\u6c38\u4e45\u4ee3**\uff0c\u4f4d\u4e8e JVM \u5806\u5185\u5b58\u4e2d\u3002\n        *   *\u7f3a\u70b9*\uff1a\u5927\u5c0f\u53d7 JVM \u53c2\u6570 `-XX:MaxPermSize` \u9650\u5236\uff0c\u5bb9\u6613 OOM\uff0c\u4e14 Full GC \u6548\u7387\u4f4e\u3002\n    *   **JDK 1.8 \u53ca\u4e4b\u540e**\uff1a\u65b9\u6cd5\u533a\u7684\u5b9e\u73b0\u6539\u4e3a**\u5143\u7a7a\u95f4**\uff0c\u4f4d\u4e8e**\u672c\u5730\u5185\u5b58** \u4e2d\u3002\n        *   *\u4f18\u70b9*\uff1a\u4e0d\u518d\u53d7 JVM \u5806\u5927\u5c0f\u9650\u5236\uff0c\u53ea\u53d7\u7269\u7406\u5185\u5b58\u9650\u5236\uff0c\u5927\u5927\u964d\u4f4e\u4e86 OOM \u98ce\u9669\u3002\n        *   *\u6ce8\u610f*\uff1a**\u5b57\u7b26\u4e32\u5e38\u91cf\u6c60** \u5728 JDK 1.7 \u65f6\u5c31\u5df2\u7ecf\u4ece\u65b9\u6cd5\u533a\u79fb\u5230\u4e86\u5806\u4e2d\u3002\n\n#### 3. \u8fd0\u884c\u65f6\u5e38\u91cf\u6c60\n*   **\u4f4d\u7f6e**\uff1a\u65b9\u6cd5\u533a\u7684\u4e00\u90e8\u5206\u3002\n*   **\u4f5c\u7528**\uff1a\u5b58\u653e\u7f16\u8bd1\u671f\u751f\u6210\u7684\u5404\u79cd**\u5b57\u9762\u91cf**\uff08\u5982 \"hello\"\uff09\u548c**\u7b26\u53f7\u5f15\u7528**\u3002\n*   **\u7279\u70b9**\uff1a\u5177\u5907\u52a8\u6001\u6027\u3002Java \u4e0d\u8981\u6c42\u5e38\u91cf\u4e00\u5b9a\u53ea\u6709\u7f16\u8bd1\u671f\u624d\u80fd\u4ea7\u751f\uff0c\u8fd0\u884c\u671f\u95f4\u4e5f\u53ef\u4ee5\u5c06\u65b0\u7684\u5e38\u91cf\u653e\u5165\u6c60\u4e2d\uff08\u5982 `String.intern()` \u65b9\u6cd5\uff09\u3002\n\n---\n\n### \u4e09\u3001 \u76f4\u63a5\u5185\u5b58\n\n\u867d\u7136\u8fd9\u90e8\u5206\u4e0d\u5c5e\u4e8e JVM \u89c4\u8303\u5b9a\u4e49\u7684\u8fd0\u884c\u65f6\u6570\u636e\u533a\uff0c\u4f46\u5728\u5b9e\u9645\u5f00\u53d1\u4e2d\u975e\u5e38\u91cd\u8981\u3002\n\n*   **\u4f5c\u7528**\uff1aNIO\uff08New Input/Output\uff09\u5f15\u5165\u4e86\u57fa\u4e8e\u901a\u9053\u548c\u7f13\u51b2\u533a\u7684 IO \u65b9\u5f0f\uff0c\u53ef\u4ee5\u4f7f\u7528 Native \u51fd\u6570\u5e93\u76f4\u63a5\u5206\u914d\u5806\u5916\u5185\u5b58\u3002\n*   **\u4f18\u52bf**\uff1a\u907f\u514d\u4e86\u5728 Java \u5806\u548c Native \u5806\u4e4b\u95f4\u590d\u5236\u6570\u636e\uff0c\u63d0\u9ad8\u4e86 IO \u6027\u80fd\uff08\u96f6\u62f7\u8d1d\u6280\u672f\uff09\u3002\n*   **\u98ce\u9669**\uff1a\u4e0d\u4f1a\u53d7\u5230 Java \u5806\u5927\u5c0f\u7684\u9650\u5236\uff0c\u4f46\u5982\u679c\u7269\u7406\u5185\u5b58\u4e0d\u8db3\uff0c\u4e5f\u4f1a\u629b\u51fa `OutOfMemoryError`\u3002\n\n---\n\n### \u56db\u3001 \u603b\u7ed3\u4e0e\u5b9e\u6218\u7ecf\u9a8c\n\n\u5728\u5b9e\u9645\u7684\u9879\u76ee\u8fd0\u7ef4\u548c\u8c03\u4f18\u4e2d\uff0c\u6211\u5bf9 JVM \u5185\u5b58\u7ed3\u6784\u7684\u7406\u89e3\u603b\u7ed3\u5982\u4e0b\uff1a\n\n1.  **\u6808\u7ba1\u8fd0\u884c\uff0c\u5806\u7ba1\u5b58\u50a8**\uff1a\u865a\u62df\u673a\u6808\u51b3\u5b9a\u4e86\u65b9\u6cd5\u5982\u4f55\u6267\u884c\uff0c\u5806\u51b3\u5b9a\u4e86\u6570\u636e\u5982\u4f55\u5b58\u50a8\u3002\n2.  **OOM \u6392\u67e5\u5b9a\u4f4d**\uff1a\n    *   \u5982\u679c\u662f `StackOverflowError`\uff0c\u68c0\u67e5\u4ee3\u7801\u662f\u5426\u6709\u6b7b\u9012\u5f52\u3002\n    *   \u5982\u679c\u662f `Java heap space`\uff0c\u901a\u5e38\u662f\u5bf9\u8c61\u592a\u591a\u4e14\u65e0\u6cd5\u56de\u6536\uff0c\u9700\u8981\u6392\u67e5\u662f\u5426\u6709\u5185\u5b58\u6cc4\u6f0f\uff0c\u6216\u8005\u8c03\u5927 `-Xmx`\u3002\n    *   \u5982\u679c\u662f `Metaspace OOM`\uff0c\u901a\u5e38\u662f\u52a0\u8f7d\u7684\u7c7b\u592a\u591a\uff08\u5982\u4f7f\u7528\u8fc7\u591a\u7684\u52a8\u6001\u4ee3\u7406\u3001JSP \u7b49\uff09\uff0c\u9700\u8981\u8c03\u6574 `-XX:MaxMetaspaceSize`\u3002\n3.  **\u7ebf\u7a0b\u5b89\u5168\u8bbe\u8ba1**\uff1a\n    *   \u5c40\u90e8\u53d8\u91cf\uff08\u5728\u6808\u4e2d\uff09\u662f\u7ebf\u7a0b\u5b89\u5168\u7684\u3002\n    *   \u6210\u5458\u53d8\u91cf\uff08\u5728\u5806\u4e2d\uff09\u662f\u7ebf\u7a0b\u4e0d\u5b89\u5168\u7684\uff0c\u9700\u8981\u52a0\u9501\u6216\u4f7f\u7528 `ThreadLocal`\u3002\n\n\u8fd9\u5c31\u662f\u6211\u5bf9 JVM \u8fd0\u884c\u65f6\u5185\u5b58\u7ed3\u6784\u7684\u7406\u89e3\uff0c\u8bf7\u95ee\u60a8\u60f3\u6df1\u5165\u4e86\u89e3\u54ea\u4e00\u90e8\u5206\u7684\u7ec6\u8282\uff1f\u6bd4\u5982 GC \u673a\u5236\u6216\u8005\u5185\u5b58\u6ea2\u51fa\u7684\u5177\u4f53\u6392\u67e5\u6848\u4f8b\uff1f",

    "title": "\u5783\u573e\u56de\u6536\u7b97\u6cd5\u4ecb\u7ecd",
    "style": "background-color: yellow;",
    "details": "\u6309\u201c\u603b\u7ed3 \u2192 \u6982\u5ff5\u539f\u7406 \u2192 \u4f18\u7f3a\u70b9/\u573a\u666f \u2192 \u5e38\u89c1\u5751&\u89e3\u6cd5\u201d\u8bb2 JVM \u5783\u573e\u56de\u6536\u7b97\u6cd5\u3002\n\n## 1\uff09\u603b\u7ed3\nGC\u7b97\u6cd5\u6838\u5fc3\u5c31\u4e24\u7c7b\u601d\u8def\uff1a  \n- **\u6807\u8bb0\u7c7b**\uff1a\u5148\u627e\u201c\u6d3b\u7684\u201d\uff0c\u5176\u4f59\u56de\u6536\uff08\u6807\u8bb0-\u6e05\u9664 / \u6807\u8bb0-\u6574\u7406 / \u6807\u8bb0-\u590d\u5236\uff09  \n- **\u5f15\u7528\u8ba1\u6570\u7c7b**\uff1a\u9760\u8ba1\u6570\u589e\u51cf\u5224\u65ad\uff08Java\u4e3b\u6d41\u4e0d\u7528\u505a\u4e3b\u7b97\u6cd5\uff09  \n\u518d\u7ed3\u5408**\u5206\u4ee3\u5047\u8bbe**\uff1a\u65b0\u751f\u4ee3\u201c\u671d\u751f\u5915\u6b7b\u201d\u7528\u590d\u5236\u66f4\u5212\u7b97\uff0c\u8001\u5e74\u4ee3\u201c\u5b58\u6d3b\u7387\u9ad8\u201d\u7528\u6807\u8bb0\u6574\u7406/\u6e05\u9664\u66f4\u5408\u9002\u3002\n\n---\n\n## 2\uff09\u6982\u5ff5\u539f\u7406\uff08\u7b97\u6cd5\u600e\u4e48\u505a\uff09\n### 2.1 \u53ef\u8fbe\u6027\u5206\u6790\uff08GC Roots\uff09\nJava\u5224\u65ad\u5bf9\u8c61\u662f\u5426\u201c\u5783\u573e\u201d\uff0c\u4e3b\u6d41\u7528**\u53ef\u8fbe\u6027\u5206\u6790**\uff1a\u4ece GC Roots \u51fa\u53d1\u80fd\u8d70\u5230\u7684\u5bf9\u8c61\u90fd\u7b97\u6d3b\u3002  \n\u5e38\u89c1 Roots\uff1a\u7ebf\u7a0b\u6808\u5f15\u7528\u3001\u9759\u6001\u53d8\u91cf\u5f15\u7528\u3001JNI\u5f15\u7528\u3001\u8fd0\u884c\u4e2d\u9501\u6301\u6709\u5bf9\u8c61\u7b49\u3002\n\n### 2.2 \u6807\u8bb0-\u6e05\u9664\uff08Mark-Sweep\uff09\n- **\u6b65\u9aa4**\uff1a\u6807\u8bb0\u5b58\u6d3b\u5bf9\u8c61 \u2192 \u6e05\u9664\u672a\u6807\u8bb0\u5bf9\u8c61\n- **\u7279\u70b9**\uff1a\u5b9e\u73b0\u7b80\u5355\uff1b\u4f46\u4f1a\u4ea7\u751f**\u5185\u5b58\u788e\u7247**\uff0c\u5206\u914d\u5927\u5bf9\u8c61\u53ef\u80fd\u5931\u8d25\u3002\n\n### 2.3 \u6807\u8bb0-\u6574\u7406\uff08Mark-Compact\uff09\n- **\u6b65\u9aa4**\uff1a\u6807\u8bb0\u5b58\u6d3b\u5bf9\u8c61 \u2192 \u628a\u5b58\u6d3b\u5bf9\u8c61\u5411\u4e00\u7aef\u201c\u6324\u538b\u201d \u2192 \u6e05\u7406\u8fb9\u754c\u5916\u5185\u5b58\n- **\u7279\u70b9**\uff1a\u89e3\u51b3\u788e\u7247\uff1b\u4ee3\u4ef7\u662f**\u6574\u7406\u79fb\u52a8\u5bf9\u8c61\u6210\u672c\u9ad8**\u3001\u505c\u987f\u53ef\u80fd\u66f4\u957f\u3002\u5e38\u7528\u4e8e\u8001\u5e74\u4ee3\u3002\n\n### 2.4 \u590d\u5236\u7b97\u6cd5\uff08Copying / Semi-space\uff09\n- **\u6b65\u9aa4**\uff1a\u628a\u5b58\u6d3b\u5bf9\u8c61\u4ece From \u590d\u5236\u5230 To \u2192 \u76f4\u63a5\u6e05\u7a7a From\n- **\u7279\u70b9**\uff1a\u5206\u914d\u5feb\u3001\u65e0\u788e\u7247\uff1b\u7f3a\u70b9\u662f\u9700\u8981**\u989d\u5916\u4e00\u5757\u540c\u7b49\u7a7a\u95f4**\u3002\u65b0\u751f\u4ee3\u5e38\u7528\uff08Eden + Survivor\uff09\u3002\n\n### 2.5 \u5206\u4ee3\u6536\u96c6\uff08Generational\uff09\n- \u65b0\u751f\u4ee3\uff1a\u590d\u5236 + \u5feb\u901f\u56de\u6536\uff08Minor GC / Young GC\uff09\n- \u8001\u5e74\u4ee3\uff1a\u6807\u8bb0-\u6e05\u9664/\u6574\u7406\uff08Major/Old GC\uff09\n- \u8de8\u4ee3\u5f15\u7528\u7528 **\u8bb0\u5fc6\u96c6/\u5361\u8868** \u964d\u4f4e\u626b\u63cf\u6210\u672c\uff08\u907f\u514d\u6bcf\u6b21\u90fd\u626b\u6574\u4e2a\u8001\u5e74\u4ee3\uff09\u3002\n\n### 2.6 \u5f15\u7528\u8ba1\u6570\uff08Reference Counting\uff0c\u4e3a\u4f55Java\u4e0d\u4e3b\u7528\uff09\n- **\u4f18\u70b9**\uff1a\u56de\u6536\u53ca\u65f6\u3001\u5b9e\u73b0\u76f4\u89c2\n- **\u81f4\u547d\u95ee\u9898**\uff1a\u65e0\u6cd5\u89e3\u51b3**\u5faa\u73af\u5f15\u7528**\uff08A\u5f15\u7528B\uff0cB\u5f15\u7528A\uff0c\u8ba1\u6570\u90fd\u4e0d\u4e3a0\uff09\u3002\n\n---\n\n## 3\uff09\u4f18\u7f3a\u70b9 & \u9002\u7528\u573a\u666f\uff08\u600e\u4e48\u9009\uff09\n- **\u590d\u5236**\uff1a\u9002\u5408\u5b58\u6d3b\u7387\u4f4e\u3001\u5bf9\u8c61\u5c0f\u4e14\u591a\u7684\u533a\u57df\uff08\u65b0\u751f\u4ee3\uff09\u3002\n- **\u6807\u8bb0-\u6574\u7406**\uff1a\u9002\u5408\u5b58\u6d3b\u7387\u9ad8\u3001\u5e0c\u671b\u65e0\u788e\u7247\u7684\u533a\u57df\uff08\u8001\u5e74\u4ee3\u3001\u9700\u8981\u8fde\u7eed\u7a7a\u95f4\u65f6\uff09\u3002\n- **\u6807\u8bb0-\u6e05\u9664**\uff1a\u9002\u5408\u5bf9\u505c\u987f\u66f4\u654f\u611f\u3001\u80fd\u5bb9\u5fcd\u788e\u7247\u6216\u6709\u914d\u5957\uff08\u5982\u7a7a\u95f2\u5217\u8868\uff09\u7684\u573a\u666f\uff08\u90e8\u5206\u8001\u5e74\u4ee3\u5b9e\u73b0\u4f1a\u7528\uff09\u3002\n\n> \u5b9e\u9645\u4e0a\u4f60\u7528 G1/ZGC \u8fd9\u7c7b\u6536\u96c6\u5668\u65f6\uff0c\u5e95\u5c42\u4ecd\u662f\u8fd9\u4e9b\u7b97\u6cd5\u7684\u7ec4\u5408\u4e0e\u5de5\u7a0b\u5316\u5b9e\u73b0\uff08\u5e76\u53d1\u6807\u8bb0\u3001\u5206\u533a\u3001\u8f6c\u79fb\u7b49\uff09\u3002\n\n---\n\n## 4\uff09\u5e38\u89c1\u5751 & \u89e3\u51b3\u65b9\u6848\n1) **\u8001\u5e74\u4ee3\u788e\u7247\u5bfc\u81f4 Full GC \u9891\u7e41/\u5206\u914d\u5931\u8d25**  \n- \u73b0\u8c61\uff1a\u8001\u5e74\u4ee3\u660e\u660e\u8fd8\u6709\u7a7a\u95f4\u4f46\u5206\u914d\u5927\u5bf9\u8c61\u5931\u8d25\u89e6\u53d1 Full GC  \n- \u89e3\u6cd5\uff1a\u503e\u5411\u4f7f\u7528\u5e26\u6574\u7406/\u538b\u7f29\u80fd\u529b\u7684\u7b56\u7565\uff08\u5982G1\u7684\u8f6c\u79fb/\u538b\u7f29\u7279\u6027\uff09\uff1b\u51cf\u5c11\u5927\u5bf9\u8c61\u76f4\u63a5\u8fdb\u8001\u5e74\u4ee3\uff1b\u5408\u7406\u8bbe\u7f6e\u5806\u4e0e\u664b\u5347\u9608\u503c\n\n2) **\u664b\u5347\u5931\u8d25\uff08promotion failed\uff09**\uff08\u65b0\u751f\u4ee3\u590d\u5236\u5230\u8001\u5e74\u4ee3\u653e\u4e0d\u4e0b\uff09  \n- \u89e3\u6cd5\uff1a\u589e\u5927\u8001\u5e74\u4ee3/\u5806\uff1b\u964d\u4f4e\u5bf9\u8c61\u5b58\u6d3b\u7387\uff08\u51cf\u5c11\u957f\u751f\u547d\u5468\u671f\u7f13\u5b58\uff09\uff1b\u8c03\u6574 Survivor \u6bd4\u4f8b\u4e0e\u664b\u5347\u7b56\u7565\n\n3) **Minor GC\u5f88\u9891\u7e41**\uff08\u5206\u914d\u8fc7\u5feb\u3001Eden\u592a\u5c0f\uff09  \n- \u89e3\u6cd5\uff1a\u589e\u5927\u65b0\u751f\u4ee3\u6216\u4f18\u5316\u5bf9\u8c61\u521b\u5efa\uff08\u590d\u7528\u3001\u6c60\u5316\u8981\u8c28\u614e\uff09\uff1b\u6392\u67e5\u77ed\u751f\u547d\u5468\u671f\u5927\u5bf9\u8c61\n\n4) **\u628a\u201c\u5f15\u7528\u7c7b\u578b\u201d\u5f53\u7b97\u6cd5**  \n- \u5f3a/\u8f6f/\u5f31/\u865a\u5f15\u7528\u662f\u201c\u5bf9\u8c61\u53ef\u8fbe\u6027\u5f3a\u5f31\u201d\uff0c\u4e0d\u662fGC\u7b97\u6cd5\uff1b\u5e38\u7528\u4e8e\u7f13\u5b58\uff08Soft\uff09\u3001\u89c4\u8303\u5316\u6620\u5c04/\u5f31\u952e\uff08Weak\uff09\u7b49\u3002\n\n\u5982\u679c\u4f60\u9762\u8bd5\u9700\u8981\u518d\u5f80\u4e0b\u63a5\uff0c\u6211\u53ef\u4ee5\u628a\u8fd9\u4e9b\u7b97\u6cd5\u600e\u4e48\u5bf9\u5e94\u5230 **Serial/Parallel/CMS/G1/ZGC** \u4ee5\u53ca\u5404\u81ea\u89e6\u53d1\u6761\u4ef6\u3001\u505c\u987f\u7279\u5f81\uff0c\u4e32\u6210\u4e00\u5957\u8bdd\u672f\u3002",
    "subItems": []

  "5": {
    "title": "Java\u5783\u573e\u56de\u6536\u673a\u5236",
    "style": "background-color: yellow;",
    "details": "\u9762\u8bd5\u5b98\u60a8\u597d\uff0c**Java \u5783\u573e\u56de\u6536\uff08GC\uff09\u673a\u5236** \u662f Java \u8bed\u8a00\u81ea\u52a8\u5185\u5b58\u7ba1\u7406\u7684\u6838\u5fc3\uff0c\u5b83\u89e3\u51b3\u4e86 C/C++ \u4e2d\u624b\u52a8\u91ca\u653e\u5185\u5b58\u5bb9\u6613\u51fa\u9519\u7684\u95ee\u9898\uff0c\u8ba9\u5f00\u53d1\u8005\u80fd\u66f4\u4e13\u6ce8\u4e8e\u4e1a\u52a1\u903b\u8f91\u3002\n\n\u5728\u6211\u7684\u7406\u89e3\u4e2d\uff0cGC \u4e3b\u8981\u89e3\u51b3\u4e09\u4e2a\u6838\u5fc3\u95ee\u9898\uff1a**\u54ea\u4e9b\u5185\u5b58\u9700\u8981\u56de\u6536\uff1f\u4ec0\u4e48\u65f6\u5019\u56de\u6536\uff1f\u600e\u4e48\u56de\u6536\uff1f**\n\n\u6211\u5c06\u4ece\u8fd9\u56db\u4e2a\u7ef4\u5ea6\u6765\u5c55\u5f00\u6211\u7684\u7406\u89e3\uff1a\n\n### \u4e00\u3001 \u600e\u6837\u5224\u65ad\u5bf9\u8c61\u662f\u5783\u573e\uff1f\n\n\u8fd9\u662f\u56de\u6536\u7684\u7b2c\u4e00\u6b65\uff0c\u4e3b\u8981\u6709\u4e24\u79cd\u7b97\u6cd5\uff1a\n\n#### 1. \u5f15\u7528\u8ba1\u6570\u6cd5\n*   **\u539f\u7406**\uff1a\u5bf9\u8c61\u88ab\u5f15\u7528\u4e00\u6b21\u5c31 +1\uff0c\u5f15\u7528\u5931\u6548\u5c31 -1\uff0c\u8ba1\u6570\u4e3a 0 \u5c31\u662f\u5783\u573e\u3002\n*   **\u7f3a\u70b9**\uff1a\u65e0\u6cd5\u89e3\u51b3**\u5faa\u73af\u5f15\u7528**\u95ee\u9898\uff08A \u5f15\u7528 B\uff0cB \u5f15\u7528 A\uff0c\u90fd\u65e0\u6cd5\u56de\u6536\uff09\u3002\n*   **\u73b0\u72b6**\uff1a\u4e3b\u6d41 JVM **\u4e0d\u91c7\u7528**\u3002\n\n#### 2. \u53ef\u8fbe\u6027\u5206\u6790\u7b97\u6cd5\u2014\u2014 **JVM \u7684\u9009\u62e9**\n*   **\u539f\u7406**\uff1a\u4ece\u4e00\u7cfb\u5217\u88ab\u79f0\u4e3a **\"GC Roots\"** \u7684\u5bf9\u8c61\u51fa\u53d1\uff0c\u5411\u4e0b\u641c\u7d22\u3002\u5982\u679c\u4e00\u4e2a\u5bf9\u8c61\u5230 GC Roots \u6ca1\u6709\u4efb\u4f55\u5f15\u7528\u94fe\u76f8\u8fde\uff0c\u5219\u8bc1\u660e\u8be5\u5bf9\u8c61\u662f\u4e0d\u53ef\u7528\u7684\u3002\n*   **GC Roots \u5305\u62ec\u54ea\u4e9b**\uff1a\n    1.  \u865a\u62df\u673a\u6808\uff08\u6808\u5e27\u4e2d\u7684\u672c\u5730\u53d8\u91cf\u8868\uff09\u4e2d\u5f15\u7528\u7684\u5bf9\u8c61\u3002\n    2.  \u65b9\u6cd5\u533a\u4e2d\u7c7b\u9759\u6001\u5c5e\u6027\u5f15\u7528\u7684\u5bf9\u8c61\u3002\n    3.  \u65b9\u6cd5\u533a\u4e2d\u5e38\u91cf\u5f15\u7528\u7684\u5bf9\u8c61\u3002\n    4.  \u672c\u5730\u65b9\u6cd5\u6808\u4e2d JNI\uff08Native \u65b9\u6cd5\uff09\u5f15\u7528\u7684\u5bf9\u8c61\u3002\n\n### \u4e8c\u3001 \u5783\u573e\u56de\u6536\u7b97\u6cd5\n\n\u627e\u5230\u4e86\u5783\u573e\uff0c\u600e\u4e48\u6e05\u7406\uff1f\u4e3b\u8981\u6709\u4e09\u79cd\u7ecf\u5178\u7b97\u6cd5\uff1a\n\n#### 1. \u6807\u8bb0-\u6e05\u9664\u7b97\u6cd5\n*   **\u5206\u4e3a\u4e24\u6b65**\uff1a\u5148\u6807\u8bb0\u51fa\u6240\u6709\u9700\u8981\u56de\u6536\u7684\u5bf9\u8c61\uff0c\u7136\u540e\u7edf\u4e00\u56de\u6536\u3002\n*   **\u7f3a\u70b9**\uff1a\n    *   **\u6548\u7387\u4f4e**\uff1a\u6807\u8bb0\u548c\u6e05\u9664\u6548\u7387\u90fd\u4e0d\u9ad8\u3002\n    *   **\u7a7a\u95f4\u788e\u7247**\uff1a\u4f1a\u4ea7\u751f\u5927\u91cf\u4e0d\u8fde\u7eed\u7684\u5185\u5b58\u788e\u7247\uff0c\u5bfc\u81f4\u65e0\u6cd5\u5206\u914d\u5927\u5bf9\u8c61\u3002\n\n#### 2. \u590d\u5236\u7b97\u6cd5\u2014\u2014 \u65b0\u751f\u4ee3\u7684\u5b9e\u73b0\n*   **\u539f\u7406**\uff1a\u5c06\u5185\u5b58\u6309 1:1 \u5206\u6210\u4e24\u5757\u3002\u6bcf\u6b21\u53ea\u7528\u4e00\u5757\uff0c\u7528\u5b8c\u4e86\u5c06\u5b58\u6d3b\u5bf9\u8c61\u590d\u5236\u5230\u53e6\u4e00\u5757\uff0c\u6e05\u7a7a\u5f53\u524d\u5757\u3002\n*   **\u4f18\u5316\uff08Appel \u5f0f\u56de\u6536\uff09**\uff1aIBM \u7814\u7a76\u8868\u660e\uff0c\u65b0\u751f\u4ee3 98% \u7684\u5bf9\u8c61\u90fd\u662f\u201c\u671d\u751f\u5915\u6b7b\u201d\u3002\u6240\u4ee5\u4e0d\u9700\u8981 1:1 \u5206\u914d\u3002\n*   **HotSpot \u5b9e\u73b0**\uff1a\u5c06\u65b0\u751f\u4ee3\u5206\u4e3a **Eden : Survivor : Survivor = 8 : 1 : 1**\u3002\u6bcf\u6b21\u4f7f\u7528 Eden \u548c\u4e00\u5757 Survivor\u3002\u56de\u6536\u65f6\u5c06\u5b58\u6d3b\u5bf9\u8c61\u590d\u5236\u5230\u53e6\u4e00\u5757 Survivor\u3002\u5982\u679c Survivor \u7a7a\u95f4\u4e0d\u591f\uff0c\u4f9d\u8d56**\u8001\u5e74\u4ee3**\u8fdb\u884c\u201c\u5206\u914d\u62c5\u4fdd\u201d\u3002\n*   **\u4f18\u70b9**\uff1a\u6ca1\u6709\u788e\u7247\uff0c\u6548\u7387\u9ad8\u3002\n*   **\u7f3a\u70b9**\uff1a\u5185\u5b58\u5229\u7528\u7387\u4f4e\uff08\u6709\u4e00\u5757\u59cb\u7ec8\u7a7a\u95f2\uff09\u3002\n\n#### 3. \u6807\u8bb0-\u6574\u7406\u7b97\u6cd5\u2014\u2014 \u8001\u5e74\u4ee3\u7684\u5b9e\u73b0\n*   **\u539f\u7406**\uff1a\u6807\u8bb0\u8fc7\u7a0b\u4e0e\u201c\u6807\u8bb0-\u6e05\u9664\u201d\u4e00\u6837\uff0c\u4f46\u540e\u7eed\u4e0d\u662f\u76f4\u63a5\u6e05\u7406\uff0c\u800c\u662f\u8ba9\u5b58\u6d3b\u5bf9\u8c61\u5411\u4e00\u7aef\u79fb\u52a8\uff0c\u7136\u540e\u6e05\u7406\u6389\u7aef\u8fb9\u754c\u4ee5\u5916\u7684\u5185\u5b58\u3002\n*   **\u4f18\u70b9**\uff1a\u89e3\u51b3\u4e86\u788e\u7247\u95ee\u9898\uff0c\u9002\u5408\u8001\u5e74\u4ee3\u8fd9\u79cd\u5b58\u6d3b\u7387\u9ad8\u3001\u6ca1\u6709\u989d\u5916\u7a7a\u95f4\u62c5\u4fdd\u7684\u533a\u57df\u3002\n\n### \u4e09\u3001 \u5783\u573e\u6536\u96c6\u5668\uff08JVM \u5b9e\u6218\u91cd\u70b9\uff09\n\n\u7b97\u6cd5\u662f\u65b9\u6cd5\u8bba\uff0c\u6536\u96c6\u5668\u662f\u5177\u4f53\u5b9e\u73b0\u3002\u5728 Server \u6a21\u5f0f\u4e0b\uff0c\u6211\u4e3b\u8981\u5173\u6ce8\u4ee5\u4e0b\u51e0\u4e2a\u4e3b\u6d41\u6536\u96c6\u5668\uff1a\n\n#### 1. Serial \u6536\u96c6\u5668\n*   **\u7279\u70b9**\uff1a\u5355\u7ebf\u7a0b\uff0c\u8fdb\u884c GC \u65f6\u5fc5\u987b\u6682\u505c\u6240\u6709\u5de5\u4f5c\u7ebf\u7a0b\u3002\n*   **\u573a\u666f**\uff1a\u5ba2\u6237\u7aef\u6a21\u5f0f\uff0c\u6216\u8005\u51e0\u767e MB \u7684\u5c0f\u5e94\u7528\u3002\n\n#### 2. Parallel Scavenge / Parallel Old\n*   **\u7279\u70b9**\uff1a\u591a\u7ebf\u7a0b\u5e76\u884c\u56de\u6536\uff0c\u5173\u6ce8\u70b9\u662f**\u541e\u5410\u91cf**\uff08CPU \u7528\u4e8e\u8fd0\u884c\u7528\u6237\u4ee3\u7801\u7684\u65f6\u95f4\u5360\u6bd4\uff09\u3002\n*   **\u573a\u666f**\uff1a**JDK 8 \u9ed8\u8ba4**\u3002\u9002\u5408\u540e\u53f0\u8fd0\u7b97\u800c\u4e0d\u9700\u8981\u592a\u591a\u4ea4\u4e92\u7684\u4efb\u52a1\uff0c\u5982\u6279\u5904\u7406\u3001\u8ba2\u5355\u5904\u7406\u3002\n\n#### 3. CMS (Concurrent Mark Sweep)\n*   **\u7279\u70b9**\uff1a\u4ee5**\u83b7\u53d6\u6700\u77ed\u56de\u6536\u505c\u987f\u65f6\u95f4**\u4e3a\u76ee\u6807\u3002\u57fa\u4e8e\u201c\u6807\u8bb0-\u6e05\u9664\u201d\u7b97\u6cd5\u3002\n*   **\u8fc7\u7a0b**\uff1a\u521d\u59cb\u6807\u8bb0(STW) -> \u5e76\u53d1\u6807\u8bb0 -> \u91cd\u65b0\u6807\u8bb0(STW) -> \u5e76\u53d1\u6e05\u9664\u3002\n*   **\u7f3a\u70b9**\uff1a\n    *   \u5bf9 CPU \u8d44\u6e90\u654f\u611f\u3002\n    *   \u65e0\u6cd5\u5904\u7406\u6d6e\u52a8\u5783\u573e\u3002\n    *   **\u5185\u5b58\u788e\u7247**\u95ee\u9898\uff08\u8fd9\u662f\u6700\u5927\u7684\u75db\u70b9\uff09\u3002\n*   **\u73b0\u72b6**\uff1aJDK 9 \u6807\u8bb0\u5e9f\u5f03\uff0cJDK 14 \u79fb\u9664\u3002\n\n#### 4. G1 (Garbage-First) \u2014\u2014 **\u5f53\u524d\u6700\u4e3b\u6d41**\n*   **\u7279\u70b9**\uff1a**\u9762\u5411\u670d\u52a1\u7aef**\u7684\u6536\u96c6\u5668\uff0c\u5b83\u5c06\u628a Heap \u5206\u5272\u6210\u591a\u4e2a\u5927\u5c0f\u76f8\u7b49\u7684 Region\uff08Region \u53ef\u4ee5\u662f Eden\u3001Survivor\u3001Old\uff09\u3002\n*   **\u6838\u5fc3\u4f18\u52bf**\uff1a\n    *   **\u53ef\u9884\u6d4b\u505c\u987f**\uff1a\u7528\u6237\u53ef\u4ee5\u8bbe\u7f6e\u4e00\u4e2a\u505c\u987f\u65f6\u95f4\uff08\u5982 200ms\uff09\uff0cG1 \u4f1a\u5c1d\u8bd5\u5728\u8fd9\u4e2a\u65f6\u95f4\u5185\u5b8c\u6210\u56de\u6536\u3002\n    *   **\u65e0\u788e\u7247**\uff1a\u6574\u4f53\u770b\u662f\u201c\u6807\u8bb0-\u6574\u7406\u201d\uff0c\u5c40\u90e8\uff08Region \u4e4b\u95f4\uff09\u770b\u662f\u201c\u590d\u5236\u201d\u7b97\u6cd5\u3002\n*   **\u573a\u666f**\uff1a**JDK 9+ \u9ed8\u8ba4**\u3002\u9002\u5408\u5927\u5185\u5b58\uff08\u901a\u5e38 > 4GB - 6GB\uff09\u3001\u591a\u6838 CPU \u7684\u673a\u5668\u3002\n\n### \u56db\u3001 \u5b9e\u6218\u7ecf\u9a8c\u4e0e\u8c03\u4f18\u7b56\u7565\n\n\u5728\u201c\u5c0f\u7535\u201d\u7684\u8ba2\u5355\u7cfb\u7edf\u4e2d\uff0c\u6211\u5904\u7406\u8fc7\u591a\u6b21 GC \u8c03\u4f18\u95ee\u9898\uff0c\u4ee5\u4e0b\u662f\u6211\u7684\u5b9e\u6218\u603b\u7ed3\uff1a\n\n#### 1. \u5e38\u89c1\u7684 GC \u95ee\u9898\n*   **Full GC \u9891\u7e41**\uff1a\u7cfb\u7edf\u5361\u987f\uff0cCPU \u98d9\u5347\u3002\n    *   **\u539f\u56e0\u6392\u67e5**\uff1a\n        *   \u662f\u5426\u6709**\u5185\u5b58\u6cc4\u6f0f**\uff1f\uff08\u5bf9\u8c61\u65e0\u6cd5\u56de\u6536\uff0c\u5982\u9759\u6001\u96c6\u5408\u7c7b\u65e0\u9650\u589e\u957f\uff09\u3002\n        *   \u8001\u5e74\u4ee3\u7a7a\u95f4\u4e0d\u8db3\uff1f\uff08\u5927\u5bf9\u8c61\u76f4\u63a5\u8fdb\u5165\u8001\u5e74\u4ee3\uff0c\u6216\u65b0\u751f\u4ee3\u5bf9\u8c61\u5e74\u9f84\u592a\u5927\uff09\u3002\n        *   \u65b9\u6cd5\u533a/\u5143\u7a7a\u95f4\u6ee1\u4e86\uff1f\uff08\u52a0\u8f7d\u7c7b\u592a\u591a\uff09\u3002\n\n#### 2. \u8c03\u4f18\u6848\u4f8b\uff1a\u4ece Parallel \u5207\u6362\u5230 G1\n*   **\u80cc\u666f**\uff1a\u65e9\u671f\u8ba2\u5355\u670d\u52a1\u4f7f\u7528 Parallel GC\uff0c\u968f\u7740\u4e1a\u52a1\u91cf\u589e\u957f\uff0c\u6bcf\u665a\u51cc\u6668\u4f4e\u5cf0\u671f\u4f1a\u6709\u4e00\u6b21\u957f\u8fbe 3-5 \u79d2\u7684 Full GC\uff0c\u5f71\u54cd\u591c\u95f4\u5bf9\u8d26\u4efb\u52a1\u3002\n*   **\u5206\u6790**\uff1aParallel GC \u541e\u5410\u91cf\u9ad8\uff0c\u4f46\u4e00\u65e6\u89e6\u53d1 Full GC\uff0c\u4f1a Stop-The-World (STW) \u5f88\u4e45\u3002\n*   **\u65b9\u6848**\uff1a\u5347\u7ea7 JDK \u7248\u672c\u5e76\u5207\u6362\u5230 **G1 \u6536\u96c6\u5668**\u3002\n    *   \u8bbe\u7f6e `-XX:MaxGCPauseMillis=200`\uff08\u76ee\u6807\u505c\u987f\u65f6\u95f4\uff09\u3002\n    *   G1 \u4f1a\u907f\u514d\u5168\u5806\u626b\u63cf\uff0c\u53ea\u56de\u6536\u4ef7\u503c\u6700\u5927\u7684 Region\u3002\n*   **\u7ed3\u679c**\uff1aFull GC \u6d88\u5931\uff0c\u53d6\u800c\u4ee3\u4e4b\u7684\u662f\u591a\u6b21\u6781\u77ed\u7684 Young GC\uff0c\u7cfb\u7edf\u5e73\u6ed1\u5ea6\u5927\u5e45\u63d0\u5347\u3002\n\n#### 3. \u5185\u5b58\u5206\u914d\u7b56\u7565\n*   **\u5927\u5bf9\u8c61\u76f4\u63a5\u8fdb\u8001\u5e74\u4ee3**\uff1a\u901a\u8fc7 `-XX:PretenureSizeThreshold` \u8bbe\u7f6e\uff0c\u907f\u514d\u5927\u5bf9\u8c61\u5728 Survivor \u533a\u6765\u56de\u590d\u5236\u3002\n*   **\u957f\u671f\u5b58\u6d3b\u5bf9\u8c61\u8fdb\u8001\u5e74\u4ee3**\uff1a\u5bf9\u8c61\u5e74\u9f84\u8ba1\u6570\u5668\uff0c\u9ed8\u8ba4 15 \u5c81\uff08`-XX:MaxTenuringThreshold`\uff09\u3002\n\n### \u4e94\u3001 \u603b\u7ed3\n\n\u5bf9\u4e8e GC \u673a\u5236\uff0c\u6211\u7684\u6838\u5fc3\u539f\u5219\u662f\uff1a**\u201c\u8c03\u4f18\u662f\u4e3a\u4e86\u89e3\u51b3\u7531\u4e8e GC \u5bfc\u81f4\u7684\u6027\u80fd\u74f6\u9888\uff0c\u800c\u4e0d\u662f\u4e3a\u4e86\u8c03\u4f18\u800c\u8c03\u4f18\u201d**\u3002\n\n1.  \u5982\u679c\u662f\u5c0f\u5e94\u7528\uff0c\u9ed8\u8ba4\u7684 Parallel \u6216 G1 \u8db3\u591f\u3002\n2.  \u5982\u679c\u662f\u5927\u5185\u5b58\u3001\u4f4e\u5ef6\u8fdf\u670d\u52a1\uff0c\u9996\u9009 **G1**\u3002\n3.  \u9047\u5230 GC \u95ee\u9898\uff0c\u5148\u770b GC \u65e5\u5fd7\uff08`-Xlog:gc*`\uff09\uff0c\u5206\u6790\u662f\u5185\u5b58\u6cc4\u6f0f\u8fd8\u662f\u5185\u5b58\u4e0d\u8db3\uff0c\u518d\u9488\u5bf9\u6027\u8c03\u6574\u53c2\u6570\u3002\n\n\u4ee5\u4e0a\u662f\u6211\u5bf9 Java \u5783\u573e\u56de\u6536\u673a\u5236\u7684\u7406\u89e3\uff0c\u8bf7\u95ee\u60a8\u60f3\u6df1\u5165\u4e86\u89e3 GC \u65e5\u5fd7\u5206\u6790\uff0c\u6216\u8005\u5177\u4f53\u7684 JVM \u53c2\u6570\u914d\u7f6e\u5417\uff1f",

  "18": {
    "title": "HashMap\u4ecb\u7ecd",
    "style": "background-color: yellow;",
    "details": "\u9762\u8bd5\u5b98\u60a8\u597d\uff0c**HashMap** \u662f Java \u96c6\u5408\u6846\u67b6\u4e2d\u6700\u6838\u5fc3\u3001\u4e5f\u662f\u6700\u5e38\u7528\u7684\u6570\u636e\u7ed3\u6784\u4e4b\u4e00\u3002\u5728\u591a\u5e74\u7684\u5f00\u53d1\u5b9e\u8df5\u4e2d\uff0c\u6211\u6df1\u523b\u7406\u89e3\u5b83\u4e0d\u4ec5\u4ec5\u662f\u5b58\u50a8\u952e\u503c\u5bf9\u90a3\u4e48\u7b80\u5355\uff0c\u5176\u5e95\u5c42\u7684**\u6570\u7ec4 + \u94fe\u8868 + \u7ea2\u9ed1\u6811**\u7ed3\u6784\u8bbe\u8ba1\uff0c\u4ee5\u53ca**\u6269\u5bb9\u673a\u5236**\uff0c\u90fd\u662f\u5e94\u5bf9\u9ad8\u5e76\u53d1\u573a\u666f\u548c\u6027\u80fd\u4f18\u5316\u7684\u57fa\u7840\u77e5\u8bc6\u3002\n\n\u6211\u5c06\u4ece**\u5e95\u5c42\u6570\u636e\u7ed3\u6784**\u3001**\u6838\u5fc3\u5de5\u4f5c\u539f\u7406**\u3001**\u6269\u5bb9\u673a\u5236**\u4ee5\u53ca**\u7ebf\u7a0b\u5b89\u5168\u95ee\u9898**\u56db\u4e2a\u7ef4\u5ea6\u6765\u4ecb\u7ecd\u3002\n\n### \u4e00\u3001 \u5e95\u5c42\u6570\u636e\u7ed3\u6784\u7684\u6f14\u8fdb\n\nHashMap \u7684\u5e95\u5c42\u6570\u636e\u7ed3\u6784\u5728 JDK 1.8 \u4e2d\u53d1\u751f\u4e86\u91cd\u5927\u53d8\u5316\uff1a\n\n1.  **JDK 1.7 \u53ca\u4e4b\u524d**\uff1a**\u6570\u7ec4 + \u94fe\u8868**\u3002\n    *   \u5373\u4f7f\u54c8\u5e0c\u51fd\u6570\u518d\u4f18\u79c0\uff0c\u4e5f\u96be\u514d\u51fa\u73b0\u54c8\u5e0c\u51b2\u7a81\u3002\u6240\u6709\u54c8\u5e0c\u503c\u76f8\u540c\u7684\u5143\u7d20\u4f1a\u88ab\u653e\u5165\u540c\u4e00\u4e2a\u6570\u7ec4\u4e0b\u6807\uff0c\u5f62\u6210\u4e00\u4e2a\u94fe\u8868\u3002\n    *   *\u7f3a\u70b9*\uff1a\u5f53\u94fe\u8868\u8fc7\u957f\u65f6\uff0c\u67e5\u8be2\u6548\u7387\u4f1a\u9000\u5316\u5230 O(n)\u3002\n\n2.  **JDK 1.8 \u53ca\u4e4b\u540e**\uff1a**\u6570\u7ec4 + \u94fe\u8868 + \u7ea2\u9ed1\u6811**\u3002\n    *   *\u4f18\u5316\u70b9*\uff1a\u5f53\u94fe\u8868\u957f\u5ea6\u8d85\u8fc7 **8** \u4e14\u6570\u7ec4\u957f\u5ea6\u5927\u4e8e\u7b49\u4e8e **64** \u65f6\uff0c\u94fe\u8868\u4f1a\u8f6c\u5316\u4e3a\u7ea2\u9ed1\u6811\u3002\n    *   *\u4ef7\u503c*\uff1a\u5c06\u67e5\u8be2\u65f6\u95f4\u590d\u6742\u5ea6\u4ece O(n) \u964d\u4f4e\u5230 O(logn)\uff0c\u5927\u5927\u63d0\u5347\u4e86\u6781\u7aef\u54c8\u5e0c\u51b2\u7a81\u573a\u666f\u4e0b\u7684\u67e5\u627e\u6027\u80fd\u3002\n\n### \u4e8c\u3001 \u6838\u5fc3\u5de5\u4f5c\u539f\u7406\n\n#### 1. \u786e\u5b9a\u6570\u7ec4\u4e0b\u6807\uff08\u5bfb\u5740\u7b97\u6cd5\uff09\n\u8fd9\u662f HashMap \u6700\u6838\u5fc3\u7684\u903b\u8f91\uff1a\u5982\u4f55\u628a Key \u7684 Hash \u503c\u6620\u5c04\u5230\u6570\u7ec4\u4e0b\u6807\u3002\n\n*   **\u7b2c\u4e00\u6b65\uff1a\u8ba1\u7b97 Hash \u503c**\u3002\n    *   \u4e0d\u662f\u76f4\u63a5\u7528 `key.hashCode()`\uff0c\u800c\u662f\u8fdb\u884c\u4e86**\u9ad8\u4f4d\u8fd0\u7b97**\uff08Heterogeneous Hashing\uff09\uff1a`(h = key.hashCode()) ^ (h >>> 16)`\u3002\n    *   *\u539f\u56e0*\uff1a\u6570\u7ec4\u957f\u5ea6\u901a\u5e38\u5f88\u5c0f\uff08\u5982 16\uff09\uff0c\u5982\u679c\u53ea\u7528\u4f4e\u4f4d\u505a\u7d22\u5f15\uff0c\u9ad8\u4f4d\u7684\u53d8\u5316\u65e0\u6cd5\u53c2\u4e0e\u8fd0\u7b97\uff0c\u5bb9\u6613\u5bfc\u81f4\u51b2\u7a81\u3002\u9ad8\u4f4d\u8fd0\u7b97\u6df7\u5408\u4e86\u9ad8\u4f4e\u4f4d\u7279\u5f81\uff0c\u964d\u4f4e\u4e86\u51b2\u7a81\u6982\u7387\u3002\n\n*   **\u7b2c\u4e8c\u6b65\uff1a\u5b9a\u4f4d\u7d22\u5f15**\u3002\n    *   \u516c\u5f0f\uff1a`i = (n - 1) & hash`\uff08n \u662f\u6570\u7ec4\u957f\u5ea6\uff09\u3002\n    *   *\u539f\u7406*\uff1a\u8fd9\u91cc\u5229\u7528\u4e86\u4f4d\u8fd0\u7b97\u4ee3\u66ff\u53d6\u6a21\uff08`%`\uff09\uff0c\u6548\u7387\u6781\u9ad8\u3002\u4f46\u8fd9\u8981\u6c42\u6570\u7ec4\u957f\u5ea6 **n \u5fc5\u987b\u662f 2 \u7684\u5e42\u6b21\u65b9**\uff0c\u8fd9\u6837 `n-1` \u7684\u4e8c\u8fdb\u5236\u4f4e\u4f4d\u5168\u662f 1\uff0c\u4e0e\u8fd0\u7b97\u7ed3\u679c\u624d\u5747\u5300\u3002\n\n#### 2. Put \u64cd\u4f5c\u6d41\u7a0b\n\u5f53\u6211\u8c03\u7528 `put(key, value)` \u65f6\uff0c\u5e95\u5c42\u903b\u8f91\u5982\u4e0b\uff1a\n\n1.  **\u8ba1\u7b97\u7d22\u5f15**\uff1a\u6839\u636e Key \u8ba1\u7b97 Hash \u503c\uff0c\u5f97\u5230\u6570\u7ec4\u4e0b\u6807\u3002\n2.  **\u5224\u65ad\u662f\u5426\u51b2\u7a81**\uff1a\n    *   \u5982\u679c\u8be5\u4f4d\u7f6e\u4e3a\u7a7a\uff0c\u76f4\u63a5\u63d2\u5165\u65b0\u8282\u70b9\u3002\n    *   \u5982\u679c\u8be5\u4f4d\u7f6e\u6709\u503c\uff0c\u8bf4\u660e\u53d1\u751f Hash \u51b2\u7a81\u3002\n3.  **\u5904\u7406\u51b2\u7a81**\uff1a\n    *   **Key \u76f8\u540c**\uff1a\u5982\u679c Hash \u548c Key \u90fd\u76f8\u7b49\uff0c\u76f4\u63a5\u8986\u76d6 Value\u3002\n    *   **\u7ea2\u9ed1\u6811\u8282\u70b9**\uff1a\u5982\u679c\u662f\u6811\u8282\u70b9\uff0c\u6267\u884c\u7ea2\u9ed1\u6811\u63d2\u5165\u3002\n    *   **\u94fe\u8868\u8282\u70b9**\uff1a\u904d\u5386\u94fe\u8868\u3002\u5982\u679c\u627e\u5230\u76f8\u540c Key \u5219\u8986\u76d6\uff1b\u5982\u679c\u904d\u5386\u5230\u672b\u5c3e\u90fd\u6ca1\u627e\u5230\uff0c\u5219**\u5c3e\u63d2\u6cd5**\u63d2\u5165\u65b0\u8282\u70b9\uff08JDK 1.7 \u662f\u5934\u63d2\u6cd5\uff09\uff0c\u5e76\u5224\u65ad\u662f\u5426\u9700\u8981\u6811\u5316\u3002\n\n### \u4e09\u3001 \u6269\u5bb9\u673a\u5236\n\nHashMap \u662f\u52a8\u6001\u6269\u5bb9\u7684\uff0c\u8fd9\u662f\u6027\u80fd\u5f71\u54cd\u6700\u5927\u7684\u73af\u8282\u3002\n\n*   **\u89e6\u53d1\u6761\u4ef6**\uff1a\u5143\u7d20\u4e2a\u6570 > **\u5bb9\u91cf \\* \u8d1f\u8f7d\u56e0\u5b50**\uff08\u9ed8\u8ba4 `16 * 0.75 = 12`\uff09\u3002\n*   **\u6269\u5bb9\u8fc7\u7a0b**\uff1a\n    1.  \u521b\u5efa\u4e00\u4e2a**\u539f\u6765 2 \u500d\u5927\u5c0f**\u7684\u65b0\u6570\u7ec4\u3002\n    2.  **\u6570\u636e\u8fc1\u79fb**\uff1a\u5c06\u65e7\u6570\u7ec4\u5143\u7d20\u91cd\u65b0\u8ba1\u7b97\u4f4d\u7f6e\uff0c\u79fb\u5230\u65b0\u6570\u7ec4\u3002\n*   **JDK 1.8 \u7684\u4f18\u5316\uff081.7 \u7684\u6b7b\u5faa\u73af\u95ee\u9898\uff09**\uff1a\n    *   **JDK 1.7**\uff1a\u91c7\u7528**\u5934\u63d2\u6cd5**\u8fc1\u79fb\u94fe\u8868\u3002\u5728\u591a\u7ebf\u7a0b\u73af\u5883\u4e0b\uff0c\u6269\u5bb9\u53ef\u80fd\u5bfc\u81f4\u94fe\u8868\u5f62\u6210\u6b7b\u5faa\u73af\uff0c\u5bfc\u81f4 CPU \u98d9\u5347 100%\u3002\n    *   **JDK 1.8**\uff1a\u91c7\u7528**\u5c3e\u63d2\u6cd5**\uff0c\u4fdd\u6301\u4e86\u94fe\u8868\u5143\u7d20\u7684\u539f\u59cb\u987a\u5e8f\uff0c\u89e3\u51b3\u4e86\u6b7b\u5faa\u73af\u95ee\u9898\u3002\u540c\u65f6\uff0c\u5229\u7528 `hash & oldCap` \u5224\u65ad\u5143\u7d20\u4f4d\u7f6e\u662f\u5728\u539f\u7d22\u5f15\uff0c\u8fd8\u662f\u5728\u201c\u539f\u7d22\u5f15 + \u539f\u5bb9\u91cf\u201d\u4f4d\u7f6e\uff0c\u907f\u514d\u4e86\u91cd\u65b0\u8ba1\u7b97 Hash\uff0c\u63d0\u5347\u4e86\u6548\u7387\u3002\n\n### \u56db\u3001 \u7ebf\u7a0b\u5b89\u5168\u95ee\u9898\n\n\u8fd9\u662f\u9762\u8bd5\u548c\u5b9e\u6218\u4e2d\u5fc5\u987b\u6ce8\u610f\u7684\u201c\u5751\u201d\u3002\n\n*   **\u7ed3\u8bba**\uff1a**HashMap \u662f\u7ebf\u7a0b\u4e0d\u5b89\u5168\u7684**\u3002\n*   **\u8868\u73b0**\uff1a\n    *   \u5728 JDK 1.7 \u4e2d\uff0c\u5e76\u53d1\u6269\u5bb9\u4f1a\u5bfc\u81f4\u94fe\u8868\u6b7b\u5faa\u73af\uff08CPU 100%\uff09\u3002\n    *   \u5728 JDK 1.8 \u4e2d\uff0c\u867d\u7136\u89e3\u51b3\u4e86\u6b7b\u5faa\u73af\uff0c\u4f46\u4ecd\u5b58\u5728**\u6570\u636e\u8986\u76d6**\u95ee\u9898\uff08\u4e24\u4e2a\u7ebf\u7a0b\u540c\u65f6 Put\uff0c\u540e\u4e00\u4e2a\u7ebf\u7a0b\u8986\u76d6\u524d\u4e00\u4e2a\u7ebf\u7a0b\u7684\u6570\u636e\uff09\u3002\n*   **\u89e3\u51b3\u65b9\u6848**\uff1a\n    *   **\u4e0d\u63a8\u8350**\uff1a`Hashtable`\uff08\u5168\u8868\u9501\uff0c\u6027\u80fd\u6781\u5dee\uff09\u3002\n    *   **\u63a8\u8350**\uff1a**`ConcurrentHashMap`**\u3002\n        *   JDK 1.7 \u91c7\u7528 **Segment \u5206\u6bb5\u9501**\u3002\n        *   JDK 1.8 \u91c7\u7528 **CAS + synchronized** \u9501\u6570\u7ec4\u8282\u70b9\uff0c\u5e76\u53d1\u6027\u80fd\u6781\u9ad8\u3002\n\n### \u4e94\u3001 \u5b9e\u6218\u7ecf\u9a8c\u603b\u7ed3\n\n\u5728\u6211\u7684\u9879\u76ee\u5b9e\u8df5\u4e2d\uff0c\u5bf9\u4e8e HashMap \u7684\u4f7f\u7528\u6709\u4ee5\u4e0b\u51e0\u70b9\u539f\u5219\uff1a\n\n1.  **\u8bbe\u7f6e\u521d\u59cb\u5bb9\u91cf**\uff1a\u5982\u679c\u5df2\u77e5\u6570\u636e\u91cf\uff08\u5982\u9700\u8981\u5b58 1000 \u4e2a\u5143\u7d20\uff09\uff0c\u6211\u4f1a\u5728\u521b\u5efa\u65f6\u6307\u5b9a\u5bb9\u91cf `new HashMap<>(2048)`\uff08\u8003\u8651\u8d1f\u8f7d\u56e0\u5b50\uff0c\u9700\u5927\u4e8e 1000/0.75\uff09\uff0c\u907f\u514d\u9891\u7e41\u6269\u5bb9\u5e26\u6765\u7684\u6027\u80fd\u635f\u8017\u548c CPU \u6296\u52a8\u3002\n2.  **Key \u7684\u8bbe\u8ba1**\uff1a\u7528\u4f5c Key \u7684\u5bf9\u8c61\u5fc5\u987b**\u4e0d\u53ef\u53d8**\uff0c\u4e14\u6b63\u786e\u91cd\u5199 `hashCode()` \u548c `equals()` \u65b9\u6cd5\u3002\u5982\u679c Key \u5728 Put \u540e\u88ab\u4fee\u6539\u4e86 Hash \u503c\uff0c\u4f1a\u5bfc\u81f4 Get \u65f6\u627e\u4e0d\u5230\u6570\u636e\uff0c\u9020\u6210\u5185\u5b58\u6cc4\u6f0f\u3002\n3.  **\u591a\u7ebf\u7a0b\u573a\u666f**\uff1a\u5728\u79d2\u6740\u3001\u8ba1\u6570\u5668\u7b49\u5e76\u53d1\u573a\u666f\u4e0b\uff0c\u4e25\u7981\u4f7f\u7528 HashMap\uff0c\u5fc5\u987b\u4f7f\u7528 `ConcurrentHashMap`\u3002\n\n\u8fd9\u5c31\u662f\u6211\u5bf9 HashMap \u7684\u7406\u89e3\uff0c\u8bf7\u95ee\u60a8\u60f3\u6df1\u5165\u4e86\u89e3 ConcurrentHashMap \u7684\u5b9e\u73b0\u539f\u7406\uff0c\u6216\u8005\u7ea2\u9ed1\u6811\u7684\u63d2\u5165\u5e73\u8861\u8fc7\u7a0b\u5417\uff1f",

  "28": {
    "title": "volatile\u7684\u4f5c\u7528",
    "style": "",
    "details": "\u9762\u8bd5\u5b98\u60a8\u597d\uff0c`volatile` \u662f Java \u5e76\u53d1\u7f16\u7a0b\u4e2d\u975e\u5e38\u5173\u952e\u7684\u4e00\u4e2a\u5173\u952e\u5b57\uff0c\u5b83\u662f Java \u63d0\u4f9b\u7684\u4e00\u79cd**\u8f7b\u91cf\u7ea7\u540c\u6b65\u673a\u5236**\u3002\u5728\u591a\u7ebf\u7a0b\u9ad8\u5e76\u53d1\u573a\u666f\u4e0b\uff0c\u7406\u89e3 `volatile` \u5bf9\u4e8e\u4fdd\u8bc1\u7ebf\u7a0b\u5b89\u5168\u548c\u6027\u80fd\u4f18\u5316\u81f3\u5173\u91cd\u8981\u3002\n\n\u6211\u5c06\u4ece**\u4e09\u5927\u6838\u5fc3\u7279\u6027**\u3001**\u5b9e\u73b0\u539f\u7406**\u4ee5\u53ca**\u7ecf\u5178\u5e94\u7528\u573a\u666f**\u4e09\u4e2a\u7ef4\u5ea6\u6765\u8fdb\u884c\u6df1\u5ea6\u89e3\u6790\u3002\n\n---\n\n### \u4e00\u3001 volatile \u7684\u4e09\u5927\u6838\u5fc3\u7279\u6027\n\n`volatile` \u5173\u952e\u5b57\u4e3b\u8981\u5177\u5907\u4e24\u4e2a\u6838\u5fc3\u4f5c\u7528\uff1a\n\n#### 1. \u4fdd\u8bc1\u53ef\u89c1\u6027\n\u8fd9\u662f `volatile` \u6700\u91cd\u8981\u7684\u4f5c\u7528\u3002\n*   **\u95ee\u9898\u80cc\u666f**\uff1a\u5728 Java \u5185\u5b58\u6a21\u578b\uff08JMM\uff09\u4e2d\uff0c\u6bcf\u4e2a\u7ebf\u7a0b\u90fd\u6709\u81ea\u5df1\u7684**\u5de5\u4f5c\u5185\u5b58**\uff08\u7f13\u5b58\uff09\uff0c\u5176\u4e2d\u4fdd\u5b58\u4e86\u4e3b\u5185\u5b58\u4e2d\u53d8\u91cf\u7684\u526f\u672c\u3002\u7ebf\u7a0b\u5bf9\u53d8\u91cf\u7684\u6240\u6709\u64cd\u4f5c\u90fd\u5728\u5de5\u4f5c\u5185\u5b58\u4e2d\u8fdb\u884c\uff0c\u6267\u884c\u5b8c\u6210\u540e\u518d\u5199\u5165\u4e3b\u5185\u5b58\u3002\u8fd9\u53ef\u80fd\u5bfc\u81f4\u4e00\u4e2a\u7ebf\u7a0b\u4fee\u6539\u4e86\u5171\u4eab\u53d8\u91cf\u7684\u503c\uff0c\u4f46\u5176\u4ed6\u7ebf\u7a0b\u65e0\u6cd5\u7acb\u5373\u770b\u5230\u6700\u65b0\u503c\u3002\n*   **volatile \u89e3\u51b3\u65b9\u6848**\uff1a\u5f53\u4e00\u4e2a\u53d8\u91cf\u88ab\u58f0\u660e\u4e3a `volatile`\uff0cJMM \u4f1a\u786e\u4fdd\u6240\u6709\u7ebf\u7a0b\u770b\u5230\u8fd9\u4e2a\u53d8\u91cf\u7684\u503c\u662f\u4e00\u81f4\u7684\u3002\u4e00\u65e6\u67d0\u4e2a\u7ebf\u7a0b\u4fee\u6539\u4e86\u8be5\u53d8\u91cf\uff0c\u4f1a**\u5f3a\u5236\u5c06\u6539\u53d8\u540e\u7684\u503c\u5237\u65b0\u56de\u4e3b\u5185\u5b58**\uff0c\u5e76**\u4f7f\u5176\u4ed6\u7ebf\u7a0b\u5de5\u4f5c\u5185\u5b58\u4e2d\u7684\u7f13\u5b58\u5931\u6548**\uff0c\u8feb\u4f7f\u5176\u4ed6\u7ebf\u7a0b\u91cd\u65b0\u4ece\u4e3b\u5185\u5b58\u8bfb\u53d6\u6700\u65b0\u503c\u3002\n\n#### 2. \u7981\u6b62\u6307\u4ee4\u91cd\u6392\u5e8f\n*   **\u95ee\u9898\u80cc\u666f**\uff1a\u4e3a\u4e86\u63d0\u9ad8\u6027\u80fd\uff0c\u7f16\u8bd1\u5668\u548c\u5904\u7406\u5668\u5728\u4e0d\u6539\u53d8\u5355\u7ebf\u7a0b\u6267\u884c\u7ed3\u679c\u7684\u524d\u63d0\u4e0b\uff0c\u4f1a\u5bf9\u6307\u4ee4\u7684\u6267\u884c\u987a\u5e8f\u8fdb\u884c\u4f18\u5316\u8c03\u6574\u3002\u4f46\u5728\u591a\u7ebf\u7a0b\u73af\u5883\u4e0b\uff0c\u6307\u4ee4\u91cd\u6392\u5e8f\u53ef\u80fd\u4f1a\u5bfc\u81f4\u4e25\u91cd\u7684\u903b\u8f91\u9519\u8bef\u3002\n*   **volatile \u89e3\u51b3\u65b9\u6848**\uff1a`volatile` \u901a\u8fc7\u63d2\u5165**\u5185\u5b58\u5c4f\u969c**\uff0c\u7981\u6b62\u7279\u5b9a\u7c7b\u578b\u7684\u7f16\u8bd1\u5668\u91cd\u6392\u5e8f\u548c\u5904\u7406\u5668\u91cd\u6392\u5e8f\uff0c\u4fdd\u8bc1\u4e86\u4ee3\u7801\u6267\u884c\u7684\u6709\u5e8f\u6027\u3002\n    *   *\u7ecf\u5178\u6848\u4f8b*\uff1a**\u53cc\u91cd\u68c0\u67e5\u9501\u5b9a\u5b9e\u73b0\u7684\u5355\u4f8b\u6a21\u5f0f**\u3002\u5982\u679c\u4e0d\u4f7f\u7528 `volatile`\uff0c\u7531\u4e8e\u6307\u4ee4\u91cd\u6392\u5e8f\uff0c\u53ef\u80fd\u4f1a\u5bfc\u81f4\u5176\u4ed6\u7ebf\u7a0b\u83b7\u53d6\u5230\u672a\u521d\u59cb\u5316\u5b8c\u5168\u7684\u5bf9\u8c61\u3002\n\n#### 3. \u4e0d\u4fdd\u8bc1\u539f\u5b50\u6027\n\u8fd9\u662f `volatile` \u4e0e `synchronized` \u6216 `Lock` \u6700\u5927\u7684\u533a\u522b\uff0c\u4e5f\u662f\u9762\u8bd5\u4e2d\u6781\u6613\u6df7\u6dc6\u7684\u70b9\u3002\n*   **\u89e3\u91ca**\uff1a\u539f\u5b50\u6027\u662f\u6307\u4e00\u4e2a\u64cd\u4f5c\u662f\u4e0d\u53ef\u4e2d\u65ad\u7684\uff0c\u8981\u4e48\u5168\u90e8\u6267\u884c\u6210\u529f\uff0c\u8981\u4e48\u5168\u90e8\u4e0d\u6267\u884c\u3002\n*   **\u98ce\u9669**\uff1a\u4f8b\u5982 `i++` \u64cd\u4f5c\uff0c\u5b83\u5b9e\u9645\u4e0a\u5305\u542b\u4e09\u6b65\uff1a\u8bfb\u53d6 i -> i \u52a0 1 -> \u5199\u56de i\u3002\u5982\u679c\u4e24\u4e2a\u7ebf\u7a0b\u540c\u65f6\u5bf9 `volatile int i` \u8fdb\u884c `i++`\uff0c\u5b83\u4eec\u53ef\u80fd\u540c\u65f6\u8bfb\u53d6\u5230\u76f8\u540c\u7684\u521d\u59cb\u503c\uff0c\u5206\u522b\u52a0 1 \u540e\u5199\u56de\uff0c\u6700\u7ec8\u7ed3\u679c\u5c11\u4e86\u4e00\u6b21\u8ba1\u6570\u3002\n*   **\u7ed3\u8bba**\uff1a`volatile` \u4e0d\u80fd\u66ff\u4ee3 `synchronized`\uff0c\u5b83\u4ec5\u9002\u7528\u4e8e**\u4e00\u5199\u591a\u8bfb**\u7684\u573a\u666f\u3002\n\n---\n\n### \u4e8c\u3001 \u5e95\u5c42\u5b9e\u73b0\u539f\u7406\uff1a\u5185\u5b58\u5c4f\u969c\n\n`volatile` \u4e4b\u6240\u4ee5\u80fd\u4fdd\u8bc1\u53ef\u89c1\u6027\u548c\u7981\u6b62\u91cd\u6392\u5e8f\uff0c\u5e95\u5c42\u662f\u901a\u8fc7**\u5185\u5b58\u5c4f\u969c**\u5b9e\u73b0\u7684\u3002\n\nJMM \u89c4\u5b9a\u4e86 4 \u79cd\u5185\u5b58\u5c4f\u969c\uff1a\n1.  **LoadLoad**\uff1a\u7981\u6b62\u524d\u9762\u7684 Load \u4e0e\u540e\u9762\u7684 Load \u91cd\u6392\u5e8f\u3002\n2.  **StoreStore**\uff1a\u7981\u6b62\u524d\u9762\u7684 Store \u4e0e\u540e\u9762\u7684 Store \u91cd\u6392\u5e8f\u3002\n3.  **LoadStore**\uff1a\u7981\u6b62\u524d\u9762\u7684 Load \u4e0e\u540e\u9762\u7684 Store \u91cd\u6392\u5e8f\u3002\n4.  **StoreLoad**\uff1a\u7981\u6b62\u524d\u9762\u7684 Store \u4e0e\u540e\u9762\u7684 Load \u91cd\u6392\u5e8f\u3002\n\n**JMM \u5bf9 volatile \u7684\u5c4f\u969c\u63d2\u5165\u7b56\u7565**\uff1a\n*   \u5728\u6bcf\u4e2a **volatile \u5199\u64cd\u4f5c** \u524d\u63d2\u5165\u4e00\u4e2a StoreStore \u5c4f\u969c\uff08\u4fdd\u8bc1\u4e0a\u9762\u7684\u666e\u901a\u5199\u64cd\u4f5c\u5148\u5b8c\u6210\uff09\u3002\n*   \u5728\u6bcf\u4e2a **volatile \u5199\u64cd\u4f5c** \u540e\u63d2\u5165\u4e00\u4e2a StoreLoad \u5c4f\u969c\uff08\u9632\u6b62\u4e0e\u540e\u9762\u7684\u8bfb\u5199\u4e71\u5e8f\uff09\u3002\n*   \u5728\u6bcf\u4e2a **volatile \u8bfb\u64cd\u4f5c** \u540e\u63d2\u5165\u4e00\u4e2a LoadLoad \u5c4f\u969c\uff08\u9632\u6b62\u4e0e\u540e\u9762\u7684\u8bfb\u4e71\u5e8f\uff09\u3002\n*   \u5728\u6bcf\u4e2a **volatile \u8bfb\u64cd\u4f5c** \u540e\u63d2\u5165\u4e00\u4e2a LoadStore \u5c4f\u969c\uff08\u9632\u6b62\u4e0e\u540e\u9762\u7684\u5199\u4e71\u5e8f\uff09\u3002\n\n---\n\n### \u4e09\u3001 \u7ecf\u5178\u5e94\u7528\u573a\u666f\n\n\u5728\u6211\u7684\u67b6\u6784\u5b9e\u6218\u4e2d\uff0c`volatile` \u4e3b\u8981\u7528\u4e8e\u4ee5\u4e0b\u573a\u666f\uff1a\n\n#### 1. \u72b6\u6001\u6807\u5fd7\u4f4d\n\u8fd9\u662f\u6700\u7ecf\u5178\u7684\u573a\u666f\uff0c\u5229\u7528\u5176\u53ef\u89c1\u6027\uff0c\u5b9e\u73b0\u7ebf\u7a0b\u95f4\u7684\u901a\u4fe1\u3002\n```java\n// \u5b9a\u4e49\u4e00\u4e2a volatile \u6807\u5fd7\u4f4d\nprivate volatile boolean shutdownRequested;\n\n// \u7ebf\u7a0b A\uff1a\u5de5\u4f5c\u7ebf\u7a0b\npublic void doWork() {\n    while (!shutdownRequested) {\n        // \u6267\u884c\u4e1a\u52a1\u903b\u8f91\n    }\n}\n\n// \u7ebf\u7a0b B\uff1a\u5173\u95ed\u7ebf\u7a0b\npublic void shutdown() {\n    shutdownRequested = true;\n}\n```\n\u5982\u679c\u4e0d\u52a0 `volatile`\uff0c\u7ebf\u7a0b B \u4fee\u6539\u4e86\u6807\u5fd7\u4f4d\uff0c\u7ebf\u7a0b A \u53ef\u80fd\u56e0\u4e3a\u7f13\u5b58\u95ee\u9898\u65e0\u6cd5\u53ca\u65f6\u611f\u77e5\uff0c\u5bfc\u81f4\u65e0\u6cd5\u505c\u6b62\u3002\n\n#### 2. \u53cc\u91cd\u68c0\u67e5\u9501\u5b9a\u5355\u4f8b\u6a21\u5f0f\n\u5229\u7528\u5176\u7981\u6b62\u6307\u4ee4\u91cd\u6392\u5e8f\u7684\u7279\u6027\uff0c\u4fdd\u8bc1\u5355\u4f8b\u5bf9\u8c61\u7684\u6b63\u786e\u521d\u59cb\u5316\u3002\n\n```java\npublic class Singleton {\n    // \u5fc5\u987b\u52a0 volatile\uff0c\u9632\u6b62\u6307\u4ee4\u91cd\u6392\u5e8f\n    private static volatile Singleton instance;\n\n    private Singleton() {}\n\n    public static Singleton getInstance() {\n        if (instance == null) { // \u7b2c\u4e00\u6b21\u68c0\u67e5\n            synchronized (Singleton.class) {\n                if (instance == null) { // \u7b2c\u4e8c\u6b21\u68c0\u67e5\n                    // \u521b\u5efa\u5bf9\u8c61\uff1a1.\u5206\u914d\u5185\u5b58 -> 2.\u521d\u59cb\u5316\u5bf9\u8c61 -> 3.\u5f15\u7528\u6307\u5411\u5185\u5b58\n                    // \u5982\u679c\u4e0d\u52a0 volatile\uff0c\u6b65\u9aa4 2 \u548c 3 \u53ef\u80fd\u91cd\u6392\u5e8f\uff08\u53d8\u6210 1->3->2\uff09\n                    // \u5bfc\u81f4\u5176\u4ed6\u7ebf\u7a0b\u83b7\u53d6\u5230\u672a\u521d\u59cb\u5316\u5b8c\u6210\u7684\u5bf9\u8c61\n                    instance = new Singleton();\n                }\n            }\n        }\n        return instance;\n    }\n}\n```\n\n#### 3. \u4e00\u6b21\u6027\u5b89\u5168\u53d1\u5e03\n\u5728\u201c\u4e00\u5199\u591a\u8bfb\u201d\u7684\u573a\u666f\u4e2d\uff0c`volatile` \u53ef\u4ee5\u66ff\u4ee3\u9501\uff0c\u63d0\u4f9b\u6781\u9ad8\u7684\u6027\u80fd\u3002\n\u4f8b\u5982\uff1a\u7cfb\u7edf\u542f\u52a8\u65f6\u52a0\u8f7d\u914d\u7f6e\u4fe1\u606f\u5230\u5185\u5b58\uff0c\u4e4b\u540e\u6240\u6709\u7ebf\u7a0b\u53ea\u8bfb\u53d6\u8be5\u914d\u7f6e\u3002\u6b64\u65f6\u4f7f\u7528 `volatile` \u4fee\u9970\u914d\u7f6e\u5bf9\u8c61\uff0c\u65e2\u4fdd\u8bc1\u4e86\u53ef\u89c1\u6027\uff0c\u53c8\u907f\u514d\u4e86\u9501\u7684\u5f00\u9500\u3002\n\n---\n\n### \u56db\u3001 \u603b\u7ed3\u4e0e\u5bf9\u6bd4\n\n| \u7279\u6027 | volatile | synchronized / Lock |\n| :--- | :--- | :--- |\n| **\u53ef\u89c1\u6027** | \u4fdd\u8bc1 | \u4fdd\u8bc1 |\n| **\u6709\u5e8f\u6027** | \u4fdd\u8bc1\uff08\u7981\u6b62\u91cd\u6392\u5e8f\uff09 | \u4fdd\u8bc1\uff08\u4e32\u884c\u6267\u884c\uff09 |\n| **\u539f\u5b50\u6027** | **\u4e0d\u4fdd\u8bc1** | \u4fdd\u8bc1 |\n| **\u5f00\u9500** | \u4f4e\uff08\u65e0\u4e0a\u4e0b\u6587\u5207\u6362\uff09 | \u8f83\u9ad8\uff08\u6d89\u53ca\u7ebf\u7a0b\u963b\u585e\u5524\u9192\uff09 |\n| **\u9002\u7528\u573a\u666f** | \u7b80\u5355\u7684\u72b6\u6001\u6807\u5fd7\u3001\u4e00\u5199\u591a\u8bfb | \u590d\u6742\u7684\u4e34\u754c\u533a\u64cd\u4f5c\u3001\u9700\u8981\u539f\u5b50\u6027 |\n\n**\u4e00\u53e5\u8bdd\u603b\u7ed3**\uff1a\n`volatile` \u662f Java \u63d0\u4f9b\u7684\u8f7b\u91cf\u7ea7\u540c\u6b65\u673a\u5236\uff0c\u5b83**\u4fdd\u8bc1\u53ef\u89c1\u6027\u3001\u7981\u6b62\u6307\u4ee4\u91cd\u6392\u5e8f\uff0c\u4f46\u4e0d\u4fdd\u8bc1\u539f\u5b50\u6027**\u3002\u5728\u9002\u5408\u7684\u573a\u666f\u4e0b\uff08\u5982\u4e00\u5199\u591a\u8bfb\uff09\uff0c\u5b83\u662f\u6bd4\u9501\u66f4\u9ad8\u6548\u7684\u9009\u62e9\u3002\n\n\u4ee5\u4e0a\u662f\u6211\u5bf9 `volatile` \u7684\u7406\u89e3\u3002\u8bf7\u95ee\u60a8\u60f3\u6df1\u5165\u4e86\u89e3 **JMM \u5185\u5b58\u6a21\u578b\u7684\u7ec6\u8282** \u6216\u8005 **Java \u9501\u673a\u5236\u7684\u5bf9\u6bd4** \u5417\uff1f",

  "32": {
    "title": "Spring AOP",
    "style": "background-color: yellow;",
    "details": "\u9762\u8bd5\u5b98\u60a8\u597d\uff0c**Spring AOP\uff08\u9762\u5411\u5207\u9762\u7f16\u7a0b\uff09** \u662f Spring \u6846\u67b6\u6700\u6838\u5fc3\u7684\u529f\u80fd\u4e4b\u4e00\uff0c\u5b83\u901a\u8fc7**\u9884\u7f16\u8bd1\u65b9\u5f0f**\u6216**\u8fd0\u884c\u671f\u52a8\u6001\u4ee3\u7406**\u5b9e\u73b0\u5728\u4e0d\u4fee\u6539\u6e90\u4ee3\u7801\u7684\u60c5\u51b5\u4e0b\u7ed9\u7a0b\u5e8f\u52a8\u6001\u7edf\u4e00\u6dfb\u52a0\u529f\u80fd\u3002\n\n\u6211\u5c06\u4ece**\u6838\u5fc3\u6982\u5ff5**\u3001**\u5b9e\u73b0\u539f\u7406**\u3001**\u5e94\u7528\u573a\u666f**\u4ee5\u53ca**\u5b9e\u6218\u907f\u5751**\u56db\u4e2a\u7ef4\u5ea6\u6765\u8fdb\u884c\u9610\u8ff0\u3002\n\n---\n\n### \u4e00\u3001 \u6838\u5fc3\u6982\u5ff5\uff1a\u89e3\u51b3\u4ec0\u4e48\u95ee\u9898\uff1f\n\nAOP \u7684\u8bde\u751f\u662f\u4e3a\u4e86\u89e3\u51b3**OOP\uff08\u9762\u5411\u5bf9\u8c61\u7f16\u7a0b\uff09** \u5728\u5904\u7406**\u6a2a\u5207\u5173\u6ce8\u70b9**\u65f6\u7684\u4e0d\u8db3\u3002\n\n*   **\u6a2a\u5207\u5173\u6ce8\u70b9**\uff1a\u90a3\u4e9b\u6563\u5e03\u5728\u5e94\u7528\u5404\u5904\u7684\u3001\u4e0e\u6838\u5fc3\u4e1a\u52a1\u903b\u8f91\u65e0\u5173\u7684\u4ee3\u7801\uff0c\u6bd4\u5982\u65e5\u5fd7\u8bb0\u5f55\u3001\u6743\u9650\u6821\u9a8c\u3001\u4e8b\u52a1\u7ba1\u7406\u3001\u6027\u80fd\u76d1\u63a7\u7b49\u3002\n*   **\u75db\u70b9**\uff1a\u5982\u679c\u4e0d\u4f7f\u7528 AOP\uff0c\u8fd9\u4e9b\u4ee3\u7801\u4f1a\u91cd\u590d\u51fa\u73b0\u5728\u6bcf\u4e00\u4e2a\u4e1a\u52a1\u65b9\u6cd5\u4e2d\uff0c\u5bfc\u81f4\u4ee3\u7801\u5197\u4f59\u3001\u7ef4\u62a4\u56f0\u96be\u3002\n*   **\u6838\u5fc3\u672f\u8bed**\uff1a\n    *   **\u5207\u9762**\uff1a\u6a2a\u5207\u5173\u6ce8\u70b9\u7684\u6a21\u5757\u5316\u5c01\u88c5\uff08\u5982 `@Aspect` \u6ce8\u89e3\u7684\u7c7b\uff09\u3002\n    *   **\u8fde\u63a5\u70b9**\uff1a\u7a0b\u5e8f\u6267\u884c\u7684\u67d0\u4e2a\u7279\u5b9a\u4f4d\u7f6e\uff08\u901a\u5e38\u6307\u65b9\u6cd5\u6267\u884c\u65f6\uff09\u3002\n    *   **\u5207\u70b9**\uff1a\u5b9a\u4e49\u5728\u54ea\u4e9b\u8fde\u63a5\u70b9\u4e0a\u6267\u884c\u901a\u77e5\uff08\u5982 `@Pointcut(\"execution(* com.example.service.*.*(..))\")`\uff09\u3002\n    *   **\u901a\u77e5**\uff1a\u5728\u5207\u70b9\u4e0a\u6267\u884c\u7684\u52a8\u4f5c\uff08\u5982 `@Before`\u3001`@AfterReturning`\u3001`@Around`\uff09\u3002\n\n---\n\n### \u4e8c\u3001 \u5b9e\u73b0\u539f\u7406\uff1aJDK \u52a8\u6001\u4ee3\u7406 vs CGLIB\n\n\u8fd9\u662f Spring AOP \u9762\u8bd5\u5fc5\u95ee\u7684\u5e95\u5c42\u539f\u7406\u3002Spring AOP \u7684\u672c\u8d28\u662f**\u4ee3\u7406\u6a21\u5f0f**\u3002\n\nSpring \u4f1a\u6839\u636e\u76ee\u6807\u7c7b\u662f\u5426\u5b9e\u73b0\u63a5\u53e3\uff0c\u81ea\u52a8\u9009\u62e9\u4ee3\u7406\u7b56\u7565\uff1a\n\n#### 1. JDK \u52a8\u6001\u4ee3\u7406\n*   **\u6761\u4ef6**\uff1a\u76ee\u6807\u7c7b\u5b9e\u73b0\u4e86**\u4e00\u4e2a\u6216\u591a\u4e2a\u63a5\u53e3**\u3002\n*   **\u539f\u7406**\uff1a\u5229\u7528\u53cd\u5c04\u673a\u5236\u751f\u6210\u4e00\u4e2a\u5b9e\u73b0\u4ee3\u7406\u63a5\u53e3\u7684\u533f\u540d\u7c7b\uff0c\u8c03\u7528 `InvokeHandler` \u5904\u7406\u903b\u8f91\u3002\n*   **\u7279\u70b9**\uff1a**\u57fa\u4e8e\u63a5\u53e3**\uff0c\u751f\u6210\u4ee3\u7406\u5bf9\u8c61\u7684\u901f\u5ea6\u5feb\uff0c\u4f46\u6267\u884c\u6548\u7387\u76f8\u5bf9\u7a0d\u4f4e\uff08JDK8 \u4ee5\u540e\u4f18\u5316\u5f88\u597d\uff09\u3002\n\n#### 2. CGLIB \u52a8\u6001\u4ee3\u7406\n*   **\u6761\u4ef6**\uff1a\u76ee\u6807\u7c7b**\u6ca1\u6709\u5b9e\u73b0\u4efb\u4f55\u63a5\u53e3**\u3002\n*   **\u539f\u7406**\uff1a\u57fa\u4e8e\u5b57\u8282\u7801\u64cd\u4f5c\uff0c\u901a\u8fc7\u7ee7\u627f\u76ee\u6807\u7c7b\uff0c\u91cd\u5199\u65b9\u6cd5\u6765\u5b9e\u73b0\u4ee3\u7406\uff08\u5e95\u5c42\u4f7f\u7528 ASM \u5b57\u8282\u7801\u751f\u6210\u5e93\uff09\u3002\n*   **\u7279\u70b9**\uff1a**\u57fa\u4e8e\u7ee7\u627f**\uff0c\u751f\u6210\u4ee3\u7406\u5bf9\u8c61\u6162\uff08\u9700\u8981\u751f\u6210\u5b57\u8282\u7801\uff09\uff0c\u4f46\u6267\u884c\u6548\u7387\u9ad8\u3002\n*   **\u6ce8\u610f**\uff1a\u56e0\u4e3a\u662f\u7ee7\u627f\uff0c\u6240\u4ee5**\u65e0\u6cd5\u4ee3\u7406 final \u4fee\u9970\u7684\u7c7b\u6216\u65b9\u6cd5**\u3002\n\n> **Spring Boot 2.x \u7684\u53d8\u5316**\uff1a\n> \u5728 Spring Boot 2.0 \u4ee5\u540e\uff0c\u9ed8\u8ba4\u7b56\u7565\u4ece JDK \u52a8\u6001\u4ee3\u7406\u6539\u4e3a\u4e86 **CGLIB**\uff08`spring.aop.proxy-target-class=true`\uff09\u3002\u8fd9\u662f\u4e3a\u4e86\u89e3\u51b3\u8bb8\u591a\u5f00\u53d1\u8005\u53ea\u5199\u4e86\u7c7b\u6ca1\u5199\u63a5\u53e3\u5bfc\u81f4\u6ce8\u5165\u5931\u8d25\u7684\u95ee\u9898\uff0c\u63d0\u4f9b\u66f4\u4e00\u81f4\u7684\u884c\u4e3a\u3002\n\n---\n\n### \u4e09\u3001 \u4e94\u79cd\u901a\u77e5\u7c7b\u578b\u4e0e\u6267\u884c\u987a\u5e8f\n\n\u6211\u5728\u5f00\u53d1\u4e2d\u5e38\u7528\u4ee5\u4e0b 5 \u79cd\u901a\u77e5\uff1a\n\n1.  **`@Before`**\uff1a\u65b9\u6cd5\u6267\u884c\u524d\u3002\n2.  **`@AfterReturning`**\uff1a\u65b9\u6cd5\u6210\u529f\u8fd4\u56de\u540e\u3002\n3.  **`@AfterThrowing`**\uff1a\u65b9\u6cd5\u629b\u51fa\u5f02\u5e38\u540e\u3002\n4.  **`@After`**\uff1a\u65b9\u6cd5\u7ed3\u675f\u540e\uff08\u65e0\u8bba\u6210\u529f\u8fd8\u662f\u5931\u8d25\uff0c\u7c7b\u4f3c `finally`\uff09\u3002\n5.  **`@Around`**\uff1a\u73af\u7ed5\u901a\u77e5\uff08\u6700\u5f3a\u5927\uff0c\u53ef\u4ee5\u63a7\u5236\u65b9\u6cd5\u662f\u5426\u6267\u884c\u3001\u4fee\u6539\u53c2\u6570\u3001\u4fee\u6539\u8fd4\u56de\u503c\uff09\u3002\n\n**\u6267\u884c\u987a\u5e8f\uff08\u6b63\u5e38\u60c5\u51b5\uff09**\uff1a\n`@Around(\u524d)` -> `@Before` -> **\u76ee\u6807\u65b9\u6cd5\u6267\u884c** -> `@AfterReturning` -> `@After` -> `@Around(\u540e)`\n\n**\u5b9e\u6218\u5efa\u8bae**\uff1a\u5c3d\u91cf\u4f7f\u7528 `@Around`\uff0c\u56e0\u4e3a\u5b83\u80fd\u6db5\u76d6\u6240\u6709\u573a\u666f\uff0c\u4e14\u80fd\u901a\u8fc7 `ProceedingJoinPoint` \u7075\u6d3b\u63a7\u5236\u6267\u884c\u903b\u8f91\u3002\n\n---\n\n### \u56db\u3001 \u7ecf\u5178\u5e94\u7528\u573a\u666f\n\n\u5728\u6211\u7684\u67b6\u6784\u7ecf\u9a8c\u4e2d\uff0cAOP \u4e3b\u8981\u7528\u4e8e\u4ee5\u4e0b\u573a\u666f\uff1a\n\n1.  **\u7edf\u4e00\u65e5\u5fd7\u7ba1\u7406**\uff1a\n    *   \u901a\u8fc7\u81ea\u5b9a\u4e49 `@Log` \u6ce8\u89e3\uff0c\u5728\u5207\u9762\u4e2d\u81ea\u52a8\u8bb0\u5f55\u64cd\u4f5c\u4eba\u3001\u64cd\u4f5c\u65f6\u95f4\u3001IP\u3001\u6267\u884c\u65b9\u6cd5\u3001\u53c2\u6570\u7b49\uff0c\u65e0\u9700\u5728\u4e1a\u52a1\u4ee3\u7801\u4e2d\u624b\u52a8\u6253\u5370\u65e5\u5fd7\u3002\n2.  **\u58f0\u660e\u5f0f\u4e8b\u52a1\u7ba1\u7406**\uff1a\n    *   `@Transactional` \u6ce8\u89e3\u7684\u80cc\u540e\u5c31\u662f AOP\u3002Spring \u5f00\u542f\u4e8b\u52a1\uff0c\u6267\u884c\u4e1a\u52a1\uff0c\u6210\u529f\u63d0\u4ea4\uff0c\u5f02\u5e38\u56de\u6eda\u3002\n3.  **\u6743\u9650\u63a7\u5236**\uff1a\n    *   \u81ea\u5b9a\u4e49 `@RequiresPermissions` \u6ce8\u89e3\uff0c\u5728\u5207\u9762\u4e2d\u6821\u9a8c\u7528\u6237\u6743\u9650\uff0c\u4e0d\u901a\u8fc7\u5219\u629b\u51fa\u5f02\u5e38\u3002\n4.  **\u63a5\u53e3\u5e42\u7b49\u6027\u6821\u9a8c**\uff1a\n    *   \u81ea\u5b9a\u4e49 `@Idempotent` \u6ce8\u89e3\uff0c\u901a\u8fc7 AOP + Redis \u5b9e\u73b0\u63a5\u53e3\u9632\u91cd\u590d\u63d0\u4ea4\u3002\n5.  **\u6027\u80fd\u76d1\u63a7**\uff1a\n    *   \u5728 `@Around` \u4e2d\u8bb0\u5f55\u65b9\u6cd5\u5f00\u59cb\u548c\u7ed3\u675f\u65f6\u95f4\uff0c\u7edf\u8ba1\u6162\u63a5\u53e3\u5e76\u62a5\u8b66\u3002\n\n---\n\n### \u4e94\u3001 \u5b9e\u6218\u907f\u5751\u6307\u5357\n\n\u5728\u4f7f\u7528 Spring AOP \u65f6\uff0c\u6211\u66fe\u9047\u5230\u8fc7\u51e0\u4e2a\u7ecf\u5178\u7684\u201c\u5751\u201d\uff0c\u8fd9\u4e5f\u662f\u533a\u5206\u521d\u7ea7\u548c\u9ad8\u7ea7\u5f00\u53d1\u8005\u7684\u5173\u952e\uff1a\n\n#### 1. \u540c\u7c7b\u8c03\u7528\u5931\u6548\u95ee\u9898\n*   **\u73b0\u8c61**\uff1a\u5728 Service \u5185\u90e8\uff0c\u4e00\u4e2a\u65b9\u6cd5 A \u8c03\u7528\u540c\u4e00\u4e2a\u7c7b\u7684\u53e6\u4e00\u4e2a\u65b9\u6cd5 B\uff0c\u5982\u679c\u65b9\u6cd5 B \u4e0a\u6709 AOP \u6ce8\u89e3\uff08\u5982 `@Async` \u6216 `@Transactional`\uff09\uff0cAOP \u4f1a\u5931\u6548\u3002\n*   **\u539f\u56e0**\uff1aSpring AOP \u662f\u57fa\u4e8e\u4ee3\u7406\u7684\u3002\u5916\u90e8\u8c03\u7528\u662f\u901a\u8fc7\u4ee3\u7406\u5bf9\u8c61\u8c03\u7528\u7684\uff0c\u800c\u5185\u90e8\u7684 `this.methodB()` \u662f\u76f4\u63a5\u8c03\u7528\u76ee\u6807\u5bf9\u8c61\u672c\u8eab\uff0c\u7ed5\u8fc7\u4e86\u4ee3\u7406\u5bf9\u8c61\u3002\n*   **\u89e3\u51b3\u65b9\u6848**\uff1a\n    *   \u6ce8\u5165\u81ea\u8eab\uff1a`@Autowired private SelfService self;`\uff0c\u7136\u540e\u8c03\u7528 `self.methodB()`\u3002\n    *   \u4f7f\u7528 `AopContext.currentProxy()` \u83b7\u53d6\u5f53\u524d\u4ee3\u7406\u5bf9\u8c61\u3002\n\n#### 2. private \u65b9\u6cd5\u5931\u6548\n*   **\u539f\u56e0**\uff1aCGLIB \u662f\u901a\u8fc7\u7ee7\u627f\u91cd\u5199\u65b9\u6cd5\u5b9e\u73b0\u7684\uff0cprivate \u65b9\u6cd5\u65e0\u6cd5\u88ab\u5b50\u7c7b\u91cd\u5199\uff1bJDK \u52a8\u6001\u4ee3\u7406\u57fa\u4e8e\u63a5\u53e3\uff0c\u63a5\u53e3\u6ca1\u6709 private \u65b9\u6cd5\u3002Spring AOP \u9ed8\u8ba4\u4e0d\u62e6\u622a private/protected \u65b9\u6cd5\u3002\n*   **\u89e3\u51b3**\uff1a\u5c06\u65b9\u6cd5\u6539\u4e3a public\uff0c\u6216\u8005\u4f7f\u7528 AspectJ\uff08\u7f16\u8bd1\u671f\u7ec7\u5165\uff0c\u529f\u80fd\u66f4\u5f3a\u4f46\u66f4\u590d\u6742\uff09\u3002\n\n#### 3. \u5faa\u73af\u4f9d\u8d56\u4e0e\u4ee3\u7406\u5bf9\u8c61\n*   Spring \u5229\u7528\u4e09\u7ea7\u7f13\u5b58\u89e3\u51b3\u4e86\u5927\u90e8\u5206\u5faa\u73af\u4f9d\u8d56\uff0c\u4f46\u5982\u679c\u662f\u5bf9\u4ee3\u7406\u5bf9\u8c61\u6709\u4f9d\u8d56\uff0c\u53ef\u80fd\u9700\u8981\u901a\u8fc7 `@Lazy` \u6ce8\u89e3\u5ef6\u8fdf\u52a0\u8f7d\u3002\n\n---\n\n### \u516d\u3001 \u603b\u7ed3\n\nSpring AOP \u662f Spring \u751f\u6001\u7684\u57fa\u77f3\u3002\u7406\u89e3\u5b83\uff0c\u4e0d\u4ec5\u662f\u638c\u63e1 `@Aspect` \u7684\u7528\u6cd5\uff0c\u66f4\u91cd\u8981\u7684\u662f\u7406\u89e3**\u52a8\u6001\u4ee3\u7406\u7684\u8bbe\u8ba1\u6a21\u5f0f**\u4ee5\u53ca**\u5982\u4f55\u89e3\u8026\u4e1a\u52a1\u903b\u8f91\u4e0e\u6280\u672f\u5b9e\u73b0**\u3002\n\n\u4ee5\u4e0a\u662f\u6211\u5bf9 Spring AOP \u7684\u7406\u89e3\u3002\u8bf7\u95ee\u60a8\u60f3\u6df1\u5165\u4e86\u89e3 **AOP \u5728\u4e8b\u52a1\u7ba1\u7406\u4e2d\u7684\u5177\u4f53\u6e90\u7801\u5b9e\u73b0** \u6216\u8005 **AspectJ \u4e0e Spring AOP \u7684\u533a\u522b** \u5417\uff1f",

    "title": "Spring\u751f\u547d\u5468\u671f\u7ba1\u7406",
    "style": "background-color: yellow;",
    "details": "\u9762\u8bd5\u5b98\u60a8\u597d\uff0c**Spring Bean \u7684\u751f\u547d\u5468\u671f** \u662f Spring \u6846\u67b6\u6700\u6838\u5fc3\u7684\u77e5\u8bc6\u70b9\u4e4b\u4e00\u3002\u7406\u89e3\u5b83\u4e0d\u4ec5\u6709\u52a9\u4e8e\u6211\u4eec\u89e3\u51b3\u7531\u4e8e Bean \u521d\u59cb\u5316\u987a\u5e8f\u5f15\u53d1\u7684 Bug\uff08\u5982\u5faa\u73af\u4f9d\u8d56\u3001\u5c5e\u6027\u672a\u6ce8\u5165\uff09\uff0c\u66f4\u662f\u6211\u4eec\u8fdb\u884c Spring \u6269\u5c55\u5f00\u53d1\uff08\u5982\u81ea\u5b9a\u4e49\u6ce8\u89e3\u3001AOP\uff09\u7684\u57fa\u7840\u3002\n\n\u5728\u6211\u7684\u7406\u89e3\u4e2d\uff0cSpring Bean \u7684\u751f\u547d\u5468\u671f\u53ef\u4ee5\u62bd\u8c61\u4e3a\u56db\u5927\u9636\u6bb5\uff1a**\u5b9e\u4f8b\u5316** -> **\u5c5e\u6027\u8d4b\u503c** -> **\u521d\u59cb\u5316** -> **\u9500\u6bc1**\u3002\n\n\u4f46\u5982\u679c\u6df1\u5165\u5230\u6e90\u7801\u7ea7\u522b\uff0c\u7279\u522b\u662f\u8003\u8651\u5230 BeanPostProcessor \u7684\u4ecb\u5165\uff0c\u6574\u4e2a\u8fc7\u7a0b\u4f1a\u7ec6\u5206\u4e3a\u4ee5\u4e0b\u6838\u5fc3\u6b65\u9aa4\uff1a\n\n---\n\n### \u4e00\u3001 \u8be6\u7ec6\u751f\u547d\u5468\u671f\u6d41\u7a0b\uff08\u6838\u5fc3\u6e90\u7801\u903b\u8f91\uff09\n\n\u6211\u5c06\u7ed3\u5408 `AbstractApplicationContext.refresh()` \u548c `AbstractAutowireCapableBeanFactory.doCreateBean()` \u7684\u6838\u5fc3\u903b\u8f91\u6765\u62c6\u89e3\uff1a\n\n#### \u7b2c\u4e00\u9636\u6bb5\uff1a\u5b9e\u4f8b\u5316\n1.  **\u521b\u5efa Bean \u5b9e\u4f8b**\uff1a\n    *   Spring \u901a\u8fc7\u6784\u9020\u5668\u53cd\u5c04\u6216\u5de5\u5382\u65b9\u6cd5\u521b\u5efa Bean \u7684\u5b9e\u4f8b\u5bf9\u8c61\u3002\n    *   \u6b64\u65f6\u5bf9\u8c61\u53ea\u662f\u4e00\u4e2a\u201c\u7a7a\u58f3\u201d\uff0c\u5c5e\u6027\u90fd\u8fd8\u662f null\u3002\n    *   *\u5173\u952e\u70b9*\uff1a\u5982\u679c\u68c0\u6d4b\u5230\u5faa\u73af\u4f9d\u8d56\uff0cSpring \u4f1a\u5728\u6b64\u9636\u6bb5\u63d0\u524d\u66b4\u9732\u5bf9\u8c61\u5f15\u7528\uff08\u4e09\u7ea7\u7f13\u5b58\u673a\u5236\uff09\u3002\n\n#### \u7b2c\u4e8c\u9636\u6bb5\uff1a\u5c5e\u6027\u8d4b\u503c\n2.  **\u4f9d\u8d56\u6ce8\u5165**\uff1a\n    *   Spring \u6839\u636e\u914d\u7f6e\uff08XML \u6216\u6ce8\u89e3\uff09\u5bf9 Bean \u7684\u5c5e\u6027\u8fdb\u884c\u8d4b\u503c\uff08`@Autowired`, `@Value` \u7b49\uff09\u3002\n    *   \u6b64\u65f6\uff0cBean \u5185\u90e8\u7684\u4f9d\u8d56\u5bf9\u8c61\u88ab\u6ce8\u5165\u8fdb\u6765\u3002\n\n#### \u7b2c\u4e09\u9636\u6bb5\uff1a\u521d\u59cb\u5316\u2014\u2014 \u6700\u590d\u6742\u7684\u9636\u6bb5\n\u8fd9\u662f\u6269\u5c55\u6027\u6700\u5f3a\u7684\u9636\u6bb5\uff0cSpring \u5728\u8fd9\u91cc\u9884\u7559\u4e86\u5927\u91cf\u7684\u6269\u5c55\u70b9\uff1a\n\n3.  **\u5904\u7406 Aware \u63a5\u53e3**\uff1a\n    *   \u5982\u679c Bean \u5b9e\u73b0\u4e86 `BeanNameAware`\u3001`BeanFactoryAware` \u6216 `ApplicationContextAware`\uff0cSpring \u4f1a\u5c06\u76f8\u5e94\u7684\u8d44\u6e90\u6ce8\u5165\u7ed9 Bean\uff08\u8ba9 Bean \u80fd\u83b7\u53d6\u5230\u5bb9\u5668\u4e0a\u4e0b\u6587\uff09\u3002\n\n4.  **\u6267\u884c BeanPostProcessor \u7684\u524d\u7f6e\u65b9\u6cd5**\uff1a\n    *   \u6267\u884c\u6240\u6709\u6ce8\u518c\u7684 `BeanPostProcessor` \u7684 `postProcessBeforeInitialization` \u65b9\u6cd5\u3002\n    *   *\u7ecf\u5178\u5e94\u7528*\uff1a\u8fd9\u662f Spring \u5f88\u591a\u5185\u7f6e\u529f\u80fd\u7684\u94a9\u5b50\uff0c\u6bd4\u5982 `ApplicationContextAwareProcessor` \u5c31\u662f\u5728\u8fd9\u4e00\u6b65\u6ce8\u5165 ApplicationContext \u7684\u3002\n\n5.  **\u6267\u884c\u521d\u59cb\u5316\u65b9\u6cd5**\uff1a\n    *   **\u987a\u5e8f**\uff1a\n        1.  \u5982\u679c\u6807\u6ce8\u4e86 `@PostConstruct` \u6ce8\u89e3\u7684\u65b9\u6cd5\u3002\n        2.  \u5982\u679c\u5b9e\u73b0\u4e86 `InitializingBean` \u63a5\u53e3\u7684 `afterPropertiesSet()` \u65b9\u6cd5\u3002\n        3.  \u5982\u679c\u5728 XML \u6216 `@Bean` \u4e2d\u5b9a\u4e49\u4e86 `init-method` \u6307\u5b9a\u7684\u65b9\u6cd5\u3002\n    *   *\u4e1a\u52a1\u573a\u666f*\uff1a\u901a\u5e38\u5728\u8fd9\u91cc\u6267\u884c\u4e00\u4e9b\u8d44\u6e90\u52a0\u8f7d\u3001\u6570\u636e\u9884\u70ed\u6216\u8fde\u63a5\u6c60\u521d\u59cb\u5316\u7684\u5de5\u4f5c\u3002\n\n6.  **\u6267\u884c BeanPostProcessor \u7684\u540e\u7f6e\u65b9\u6cd5**\uff1a\n    *   \u6267\u884c\u6240\u6709\u6ce8\u518c\u7684 `BeanPostProcessor` \u7684 `postProcessAfterInitialization` \u65b9\u6cd5\u3002\n    *   *\u6838\u5fc3\u5e94\u7528*\uff1a**AOP \u4ee3\u7406\u5c31\u662f\u5728\u8fd9\u91cc\u53d1\u751f\u7684**\u3002\u5982\u679c\u8be5 Bean \u9700\u8981\u88ab\u4ee3\u7406\uff08\u5982\u4f7f\u7528\u4e86 `@Transactional` \u6216\u81ea\u5b9a\u4e49\u5207\u9762\uff09\uff0cSpring \u4f1a\u5728\u8fd9\u91cc\u5c06\u539f\u59cb Bean \u66ff\u6362\u4e3a\u4ee3\u7406\u5bf9\u8c61\u3002\n\n#### \u7b2c\u56db\u9636\u6bb5\uff1a\u9500\u6bc1\n7.  **\u9500\u6bc1\u56de\u8c03**\uff1a\n    *   \u5f53\u5bb9\u5668\u5173\u95ed\u65f6\uff0c\u6267\u884c\u9500\u6bc1\u903b\u8f91\u3002\n    *   **\u987a\u5e8f**\uff1a\n        1.  `@PreDestroy` \u6ce8\u89e3\u65b9\u6cd5\u3002\n        2.  `DisposableBean` \u63a5\u53e3\u7684 `destroy()` \u65b9\u6cd5\u3002\n        3.  `destroy-method` \u6307\u5b9a\u7684\u65b9\u6cd5\u3002\n    *   *\u4e1a\u52a1\u573a\u666f*\uff1a\u91ca\u653e\u8d44\u6e90\u3001\u5173\u95ed\u8fde\u63a5\u6d41\u3002\n\n---\n\n### \u4e8c\u3001 \u6838\u5fc3\u6269\u5c55\u70b9\u603b\u7ed3\n\n\u5728\u67b6\u6784\u8bbe\u8ba1\u548c\u6846\u67b6\u5c01\u88c5\u4e2d\uff0c\u6211\u4eec\u6700\u5e38\u7528\u5230\u7684\u6269\u5c55\u70b9\u4e3b\u8981\u6709\u4ee5\u4e0b\u4e09\u4e2a\uff1a\n\n1.  **`BeanPostProcessor`**\uff1a\n    *   \u8fd9\u662f Spring \u5bf9\u5916\u63d0\u4f9b\u7684\u6700\u5f3a\u5927\u7684\u6269\u5c55\u63a5\u53e3\u3002\n    *   \u5b83\u53ef\u4ee5\u5bf9\u6240\u6709 Bean \u8fdb\u884c\u7edf\u4e00\u5904\u7406\u3002\n    *   *\u6211\u7684\u5b9e\u8df5*\uff1a\u66fe\u5229\u7528\u5b83\u5b9e\u73b0\u8fc7\u81ea\u5b9a\u4e49\u7684\u654f\u611f\u5b57\u6bb5\u52a0\u89e3\u5bc6\u5207\u9762\uff0c\u5728 Bean \u521d\u59cb\u5316\u540e\uff0c\u81ea\u52a8\u5bf9\u5e26\u6709\u7279\u5b9a\u6ce8\u89e3\u7684\u5b57\u6bb5\u8fdb\u884c\u89e3\u5bc6\u5904\u7406\u3002\n\n2.  **`InitializingBean` / `@PostConstruct`**\uff1a\n    *   \u7528\u4e8e Bean \u81ea\u8eab\u7684\u521d\u59cb\u5316\u903b\u8f91\u3002\n    *   *\u6211\u7684\u5b9e\u8df5*\uff1a\u5728\u201c\u5c0f\u7535\u201d\u7684\u8bbe\u5907\u72b6\u6001\u670d\u52a1\u4e2d\uff0c\u6211\u5e38\u7528 `@PostConstruct` \u4ece\u6570\u636e\u5e93\u52a0\u8f7d\u914d\u7f6e\u5230\u672c\u5730\u7f13\u5b58\uff0c\u907f\u514d\u6bcf\u6b21\u8bf7\u6c42\u90fd\u67e5\u5e93\u3002\n\n3.  **`Aware` \u63a5\u53e3**\uff1a\n    *   \u7528\u4e8e\u6253\u7834 Bean \u4e0e\u5bb9\u5668\u7684\u9694\u79bb\uff0c\u8ba9 Bean \u80fd\u611f\u77e5\u5230\u5bb9\u5668\u7684\u5b58\u5728\u3002\n    *   *\u6ce8\u610f*\uff1a\u8fc7\u591a\u4f7f\u7528 Aware \u63a5\u53e3\u4f1a\u8ba9\u4e1a\u52a1\u4ee3\u7801\u4e0e Spring \u6846\u67b6\u8026\u5408\uff0c\u5efa\u8bae\u8c28\u614e\u4f7f\u7528\u3002\n\n---\n\n### \u4e09\u3001 \u5e38\u89c1\u9762\u8bd5\u9898\u5b9e\u6218\n\n**Q1\uff1aBean \u7684\u521d\u59cb\u5316\u987a\u5e8f\u662f\u600e\u6837\u7684\uff1f**\n**A**\uff1a\u6784\u9020\u5668 -> \u4f9d\u8d56\u6ce8\u5165 -> @PostConstruct -> InitializingBean -> AOP \u4ee3\u7406\u3002\n\n**Q2\uff1a\u4e3a\u4ec0\u4e48 AOP \u4e0d\u80fd\u5904\u7406\u6784\u9020\u5668\u4e2d\u7684\u65b9\u6cd5\uff1f**\n**A**\uff1a\u56e0\u4e3a AOP \u4ee3\u7406\u662f\u5728\u521d\u59cb\u5316\u9636\u6bb5\u7684\u6700\u540e\uff08`postProcessAfterInitialization`\uff09\u751f\u6210\u7684\u3002\u5728\u6784\u9020\u5668\u6267\u884c\u65f6\uff0cBean \u8fd8\u662f\u4e00\u4e2a\u539f\u59cb\u5bf9\u8c61\uff0c\u4ee3\u7406\u5bf9\u8c61\u5c1a\u672a\u8bde\u751f\uff0c\u81ea\u7136\u65e0\u6cd5\u62e6\u622a\u6784\u9020\u5668\u4e2d\u7684\u65b9\u6cd5\u3002\n\n**Q3\uff1a\u4f60\u5728\u9879\u76ee\u4e2d\u5982\u4f55\u5229\u7528\u751f\u547d\u5468\u671f\u89e3\u51b3\u5b9e\u9645\u95ee\u9898\uff1f**\n**A**\uff1a\n*   **\u573a\u666f**\uff1a\u5728\u4e00\u4e2a\u590d\u6742\u7684\u4f9b\u5e94\u94fe\u7cfb\u7edf\u4e2d\uff0c\u67d0\u4e9b Service \u4f9d\u8d56\u4e86\u57fa\u7840\u6570\u636e\u7ec4\u4ef6\uff0c\u800c\u57fa\u7840\u6570\u636e\u7ec4\u4ef6\u542f\u52a8\u65f6\u9700\u8981\u4ece\u8fdc\u7a0b\u52a0\u8f7d\u914d\u7f6e\u3002\n*   **\u89e3\u51b3**\uff1a\u5229\u7528 `@DependsOn` \u6216\u5b9e\u73b0 `SmartLifecycle` \u63a5\u53e3\u63a7\u5236 Bean \u7684\u542f\u52a8\u987a\u5e8f\uff0c\u786e\u4fdd\u57fa\u7840\u7ec4\u4ef6\u4f18\u5148\u521d\u59cb\u5316\uff0c\u907f\u514d\u5176\u4ed6 Bean \u5728\u6ce8\u5165\u65f6\u56e0\u914d\u7f6e\u672a\u52a0\u8f7d\u800c\u62a5\u9519\u3002\n\n\u8fd9\u5c31\u662f\u6211\u5bf9 Spring Bean \u751f\u547d\u5468\u671f\u7684\u7406\u89e3\uff0c\u4ece\u5b9e\u4f8b\u5316\u5230\u9500\u6bc1\uff0c\u4ee5\u53ca\u5173\u952e\u7684\u6269\u5c55\u70b9\u5e94\u7528\u3002\u8bf7\u95ee\u60a8\u60f3\u6df1\u5165\u4e86\u89e3\u5faa\u73af\u4f9d\u8d56\u7684\u89e3\u51b3\u673a\u5236\uff0c\u6216\u8005 AOP \u7684\u5177\u4f53\u4ee3\u7406\u6d41\u7a0b\u5417\uff1f",
    "subItems": []

  "34": {
    "title": "Spring\u600e\u4e48\u89e3\u51b3\u5faa\u73af\u4f9d\u8d56",
    "style": "background-color: yellow;",
    "details": "\u8fd9\u53ef\u662f Java \u9762\u8bd5\u91cc\u7684\u201c\u7ec8\u6781\u6b7b\u9898\u201d\u4e4b\u4e00\u4e86\uff01\u65e2\u7136\u54b1\u4eec\u524d\u9762\u804a\u4e86\u90a3\u4e48\u591a\u67b6\u6784\u548c\u534f\u8bae\uff0c\u90a3\u4eca\u5929\u5c31\u7528\u6700\u63a5\u5730\u6c14\u7684\u5927\u767d\u8bdd\uff0c\u628a Spring \u89e3\u51b3\u5faa\u73af\u4f9d\u8d56\u7684\u5e95\u5c42\u903b\u8f91\u7ed9\u4f60\u6252\u5f97\u660e\u660e\u767d\u767d\u3002\n\u7b80\u5355\u8bf4\uff0c\u5faa\u73af\u4f9d\u8d56\u5c31\u662f\uff1a**Bean A \u91cc\u9762\u6ce8\u5165\u4e86 Bean B\uff0c\u800c Bean B \u91cc\u9762\u53c8\u6ce8\u5165\u4e86 Bean A**\u3002\u521d\u59cb\u5316 A \u7684\u65f6\u5019\u9700\u8981 B\uff0c\u521d\u59cb\u5316 B \u7684\u65f6\u5019\u53c8\u9700\u8981 A\uff0c\u7ed3\u679c\u4e24\u8fb9\u5927\u773c\u77aa\u5c0f\u773c\uff0c\u5361\u6b7b\u5728\u90a3\u513f\u4e86\u3002\nSpring \u89e3\u51b3\u8fd9\u4e2a\u95ee\u9898\u7684\u6838\u5fc3\u5927\u62db\u53eb\u505a\uff1a**\u4e09\u7ea7\u7f13\u5b58\uff08Three-Level Cache\uff09**\u3002\u5b83\u7684\u6838\u5fc3\u601d\u60f3\u5c31\u662f\uff1a**\u5148\u4e0a\u8f66\uff0c\u540e\u8865\u7968**\u3002\n### 1. \u7ec8\u6781\u5927\u62db\uff1a\u4e09\u7ea7\u7f13\u5b58\u662f\u5565\uff1f\nSpring \u5728 DefaultSingletonBeanRegistry \u7c7b\u91cc\u5b9a\u4e49\u4e86\u4e09\u4e2a Map\uff0c\u5b83\u4eec\u5206\u5de5\u660e\u786e\uff1a\n * **\u4e00\u7ea7\u7f13\u5b58 (singletonObjects) \u2014\u2014 \u201c\u6210\u54c1\u623f\u201d\uff1a** \u91cc\u9762\u653e\u7684\u662f**\u5b8c\u5168\u521d\u59cb\u5316\u597d**\u7684 Bean\u3002\u5e73\u5e38\u6211\u4eec\u76f4\u63a5\u62ff\u6765\u7528\u7684\u5c31\u662f\u8fd9\u4e00\u7ea7\u3002\n * **\u4e8c\u7ea7\u7f13\u5b58 (earlySingletonObjects) \u2014\u2014 \u201c\u6bdb\u576f\u623f\u201d\uff1a** \u653e\u7684\u662f**\u521a\u5b9e\u4f8b\u5316\uff08\u521a new \u51fa\u6765\uff09\uff0c\u4f46\u8fd8\u6ca1\u6ce8\u5165\u5c5e\u6027**\u7684\u534a\u6210\u54c1 Bean\u3002\n * **\u4e09\u7ea7\u7f13\u5b58 (singletonFactories) \u2014\u2014 \u201c\u5efa\u623f\u56fe\u7eb8\uff08\u5de5\u5382\u5bf9\u8c61\uff09\u201d\uff1a** \u91cc\u9762\u653e\u7684\u662f\u4e00\u4e2a Lambda \u8868\u8fbe\u5f0f\uff08ObjectFactory\uff09\u3002\u5b83\u662f\u7528\u6765\u5e94\u5bf9 **AOP\uff08\u52a8\u6001\u4ee3\u7406\uff09** \u7684\u3002\u5982\u679c\u9700\u8981\uff0c\u5b83\u53ef\u4ee5\u7528\u6765\u751f\u6210\u4ee3\u7406\u5bf9\u8c61\u3002\n### 2. \u7834\u5c40\u5168\u8fc7\u7a0b\uff08\u5927\u767d\u8bdd\u6f14\u4e49\uff09\n\u54b1\u4eec\u5047\u8bbe A \u548c B \u4e92\u76f8\u4f9d\u8d56\uff0c\u770b\u770b Spring \u662f\u600e\u4e48\u73a9\u8f6c\u8fd9\u4e09\u7ea7\u7f13\u5b58\u7684\uff1a\n 1. **A \u5f00\u59cb\u521b\u5efa\uff1a** Spring \u51c6\u5907\u521b\u5efa A\u3002\u5148\u53bb\u4e00\u7ea7\u3001\u4e8c\u7ea7\u3001\u4e09\u7ea7\u7f13\u5b58\u91cc\u67e5\uff0c\u53d1\u73b0\u90fd\u6ca1\u6709\u3002\n 2. **A \u641e\u4e2a\u534a\u6210\u54c1\uff1a** Spring \u5148\u628a A \u7ed9 new \u51fa\u6765\uff08\u5b9e\u4f8b\u5316\uff09\u3002\u8fd9\u65f6\u5019 A \u8fd8\u662f\u4e2a\u201c\u6bdb\u576f\u623f\u201d\uff0c\u5c5e\u6027\u90fd\u662f\u7a7a\u3002Spring \u628a A \u7684\u201c\u5efa\u623f\u56fe\u7eb8\u201d\uff08Factory\uff09\u585e\u8fdb**\u4e09\u7ea7\u7f13\u5b58**\u91cc\u3002\n 3. **A \u53d1\u73b0\u7f3a B\uff1a** A \u5f00\u59cb\u641e\u5c5e\u6027\u6ce8\u5165\uff0c\u53d1\u73b0\u81ea\u5df1\u9700\u8981 B\u3002\u4e8e\u662f Spring \u8f6c\u5934\u53bb\u521b\u5efa B\u3002\n 4. **B \u5f00\u59cb\u521b\u5efa\uff1a** \u540c\u6837\u6d41\u7a0b\uff0cB \u4e5f\u6ca1\u521b\u5efa\u8fc7\u3002Spring \u628a B \u5148 new \u51fa\u6765\uff0c\u4e5f\u628a B \u7684\u201c\u5efa\u623f\u56fe\u7eb8\u201d\u585e\u8fdb**\u4e09\u7ea7\u7f13\u5b58**\u3002\n 5. **B \u53d1\u73b0\u7f3a A\uff08\u9ad8\u6f6e\u6765\u4e86\uff09\uff1a** B \u641e\u5c5e\u6027\u6ce8\u5165\u65f6\uff0c\u53d1\u73b0\u9700\u8981 A\u3002\u91cd\u70b9\u6765\u4e86\uff1a\n   * B \u53bb\u4e00\u7ea7\u7f13\u5b58\u627e A\uff0c\u6ca1\u6709\u3002\n   * B \u53bb\u4e8c\u7ea7\u7f13\u5b58\u627e A\uff0c\u6ca1\u6709\u3002\n   * B \u53bb**\u4e09\u7ea7\u7f13\u5b58**\u627e\uff0c**\u627e\u5230\u4e86 A \u7684\u201c\u5efa\u623f\u56fe\u7eb8\u201d\uff01**\n 6. **B \u6210\u529f\u201c\u5077\u6e21\u201d A\uff1a** B \u6267\u884c\u4e86 A \u7684\u56fe\u7eb8\uff0c\u62ff\u5230\u4e86 A \u7684\u4e00\u4e2a\u65e9\u671f\u5f15\u7528\uff08\u5982\u679c\u662f AOP \u5c31\u4f1a\u62ff\u5230\u4ee3\u7406\u5bf9\u8c61\uff09\u3002B \u628a A \u632a\u5230**\u4e8c\u7ea7\u7f13\u5b58**\u91cc\uff0c\u7136\u540e\u987a\u5229\u628a\u81ea\u5df1\u4f53\u5185\u7684 A \u6ce8\u5165\u8fdb\u53bb\u4e86\u3002\n 7. **B \u53d8\u6210\u6210\u54c1\uff1a** B \u6ee1\u8f7d\u800c\u5f52\uff0c\u5b8c\u6210\u4e86\u521d\u59cb\u5316\uff0c\u6210\u529f\u5165\u4f4f**\u4e00\u7ea7\u7f13\u5b58**\u3002\n 8. **A \u987a\u5229\u89e3\u5957\uff1a** B \u597d\u4e86\u4e4b\u540e\uff0c\u8f6c\u8fc7\u5934\u6765\uff0cA \u4e5f\u80fd\u987a\u5229\u62ff\u5230 B \u4e86\u3002A \u6ce8\u5165 B \u6210\u529f\uff0c\u5b8c\u6210\u521d\u59cb\u5316\uff0cA \u4e5f\u5165\u4f4f**\u4e00\u7ea7\u7f13\u5b58**\u3002\n\u5927\u529f\u544a\u6210\uff01\u4e24\u8fb9\u90fd\u6d3b\u8fc7\u6765\u4e86\u3002\n### 3. \u7075\u9b42\u62f7\u95ee\uff1a\u4e3a\u4ec0\u4e48\u975e\u8981\u201c\u4e09\u7ea7\u201d\uff1f\u4e8c\u7ea7\u7f13\u5b58\u4e0d\u884c\u5417\uff1f\n\u8fd9\u662f\u9762\u8bd5\u5b98\u6700\u559c\u6b22\u8ffd\u95ee\u7684\u5730\u65b9\u3002\n**\u7b54\u6848\u662f\uff1a\u5982\u679c\u6ca1\u6709 AOP\uff0c\u4e8c\u7ea7\u7f13\u5b58\u5b8c\u5168\u8db3\u591f\uff01\u4e4b\u6240\u4ee5\u8981\u7b2c\u4e09\u7ea7\uff0c\u5c31\u662f\u4e3a\u4e86\u7167\u987e AOP\uff08\u52a8\u6001\u4ee3\u7406\uff09\u3002**\nSpring \u7684\u6b63\u5e38\u751f\u547d\u5468\u671f\u662f\uff1a\u5148 new \u5bf9\u8c61 -> \u6ce8\u5165\u5c5e\u6027 -> \u6700\u540e\u4e00\u6b65\u624d\u505a AOP \u4ee3\u7406\u3002\n\u4f46\u662f\uff0c\u5982\u679c\u53d1\u751f\u4e86\u5faa\u73af\u4f9d\u8d56\uff0cB \u63d0\u524d\u9700\u8981\u7684\u5fc5\u987b\u662f A \u7684**\u4ee3\u7406\u5bf9\u8c61**\uff0c\u800c\u4e0d\u662f\u539f\u59cb\u5bf9\u8c61\uff01\n * **\u5982\u679c\u53ea\u6709\u4e8c\u7ea7\u7f13\u5b58\uff1a** Spring \u5c31\u5fc5\u987b\u5728 new \u51fa A \u7684\u65f6\u5019\uff0c\u4e0d\u7ba1\u4e09\u4e03\u4e8c\u5341\u4e00\uff0c\u7acb\u523b\u7ed9\u5b83\u505a AOP \u4ee3\u7406\u3002\u8fd9\u5c31\u7834\u574f\u4e86 Spring \u7684\u58f0\u660e\u5468\u671f\u8bbe\u8ba1\u539f\u5219\u3002\n * **\u6709\u4e86\u4e09\u7ea7\u7f13\u5b58\uff1a** \u91cc\u9762\u5b58\u7684\u662f\u4e2a\u56fe\u7eb8\uff08\u5de5\u5382\uff09\u3002\u53ea\u6709\u5f53\u771f\u7684\u53d1\u751f\u5faa\u73af\u4f9d\u8d56\u3001B \u6765\u627e A \u7684\u65f6\u5019\uff0c\u56fe\u7eb8\u624d\u4f1a\u89e6\u53d1\uff0c\u63d0\u524d\u751f\u6210 A \u7684\u4ee3\u7406\u5bf9\u8c61\u3002\u5982\u679c\u6ca1\u6709\u5faa\u73af\u4f9d\u8d56\uff0cA \u4f9d\u7136\u53ef\u4ee5\u6309\u7167\u6807\u51c6\u6d41\u7a0b\uff0c\u5728\u6700\u540e\u4e00\u6b65\u624d\u505a AOP\u3002\n### 4. \u54ea\u4e9b\u60c5\u51b5 Spring \u4e5f\u6551\u4e0d\u4e86\uff1f\nSpring \u7684\u4e09\u7ea7\u7f13\u5b58\u4e0d\u662f\u4e07\u80fd\u7684\uff0c\u6709\u4e24\u79cd\u60c5\u51b5\u5b83\u4f1a\u76f4\u63a5\u6482\u6311\u5b50\u62a5\u9519\uff08BeanCurrentlyInCreationException\uff09\uff1a\n#### A. \u6784\u9020\u5668\u6ce8\u5165\u5f15\u8d77\u7684\u5faa\u73af\u4f9d\u8d56\n```java\n// \u8fd9\u79cd\u60c5\u51b5 Spring \u76f4\u63a5\u5d29\u6e83\npublic A(B b) { this.b = b; }\npublic B(A a) { this.a = a; }\n\n```\n * **\u539f\u56e0\uff1a** \u4e09\u7ea7\u7f13\u5b58\u80fd\u751f\u6548\uff0c\u524d\u63d0\u662f\u5f97\u5148\u6267\u884c\u5b8c new \u64cd\u4f5c\uff0c\u628a\u56fe\u7eb8\u4e22\u8fdb\u4e09\u7ea7\u7f13\u5b58\u3002\u4f46\u6784\u9020\u5668\u4f9d\u8d56\u5bfc\u81f4\u8fde new A() \u7684\u65f6\u5019\u90fd\u9700\u8981 B\uff0c\u8fde\u534a\u6210\u54c1\u90fd\u505a\u4e0d\u51fa\u6765\uff0c\u56fe\u7eb8\u8fd8\u6ca1\u8bde\u751f\u5c31\u5361\u6b7b\u4e86\u3002\n * **\u7834\u89e3\u6cd5\uff1a** \u5728\u6784\u9020\u5668\u53c2\u6570\u4e0a\u52a0\u4e2a @Lazy \u6ce8\u89e3\uff0c\u8ba9\u5b83\u5148\u751f\u6210\u4e2a\u4ee3\u7406\u5bf9\u8c61\u57ab\u80cc\u3002\n#### B. Prototype\uff08\u591a\u4f8b\uff09\u4f5c\u7528\u57df\u4e0b\u7684\u5faa\u73af\u4f9d\u8d56\n * **\u539f\u56e0\uff1a** \u4e09\u7ea7\u7f13\u5b58\u53ea\u5bf9 Singleton\uff08\u5355\u4f8b\uff09\u6709\u6548\u3002\u5982\u679c\u662f Prototype\uff0c\u6bcf\u6b21\u8981\u90fd\u521b\u5efa\u4e00\u4e2a\u65b0\u7684\uff0cSpring \u6839\u672c\u4e0d\u4f1a\u53bb\u7f13\u5b58\u91cc\u67e5\uff0c\u6bcf\u6b21\u90fd\u751f\u4e00\u5806\u65b0\u7684 Bean \u4e92\u76f8\u6b7b\u7f20\u70c2\u6253\uff0c\u76f4\u5230\u5185\u5b58\u6ea2\u51fa\u3002\n",
