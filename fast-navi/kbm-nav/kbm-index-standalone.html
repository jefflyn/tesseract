    "title": "kafka\u548crocketmq\u7684\u6d88\u8d39\u6a21\u578b",
    "style": "",
    "details": "\u9762\u8bd5\u5b98\u60a8\u597d\uff0c\u8fd9\u662f\u4e00\u4e2a\u975e\u5e38\u6838\u5fc3\u7684\u6d88\u606f\u4e2d\u95f4\u4ef6\u9009\u578b\u95ee\u9898\u3002Kafka \u548c RocketMQ \u867d\u7136\u90fd\u662f\u6d88\u606f\u961f\u5217\uff0c\u4f46\u5b83\u4eec\u5728\u5e95\u5c42\u6d88\u8d39\u6a21\u578b\u7684\u8bbe\u8ba1\u7406\u5ff5\u4e0a\u6709\u663e\u8457\u5dee\u5f02\uff0c\u8fd9\u4e5f\u51b3\u5b9a\u4e86\u5b83\u4eec\u9002\u7528\u7684\u4e0d\u540c\u573a\u666f\u3002\n\n\u6211\u5c06\u4ece**\u6a21\u578b\u67b6\u6784**\u3001**\u6d88\u8d39\u673a\u5236**\u548c**\u9002\u7528\u573a\u666f**\u4e09\u4e2a\u7ef4\u5ea6\u8fdb\u884c\u5bf9\u6bd4\u5206\u6790\uff1a\n\n### \u4e00\u3001 Kafka\uff1a\u57fa\u4e8e\u201c\u5206\u533a\u201d\u7684\u6d88\u8d39\u6a21\u578b\n\nKafka \u7684\u6d88\u8d39\u6a21\u578b\u6838\u5fc3\u5728\u4e8e **Topic\uff08\u4e3b\u9898\uff09** \u548c **Partition\uff08\u5206\u533a\uff09** \u7684\u6982\u5ff5\u3002\n\n**1. \u67b6\u6784\u6a21\u578b**\n*   **Partition \u662f\u5e76\u884c\u5355\u5143**\uff1aKafka \u5c06 Topic \u62c6\u5206\u4e3a\u591a\u4e2a Partition\uff0c\u5206\u5e03\u5f0f\u5b58\u50a8\u5728\u4e0d\u540c Broker \u4e0a\u3002\n*   **Consumer Group\uff08\u6d88\u8d39\u7ec4\uff09**\uff1a\u6d88\u8d39\u8005\u4ee5\u7ec4\u4e3a\u5355\u4f4d\u8ba2\u9605 Topic\u3002\u7ec4\u5185\u6d88\u8d39\u8005\u5171\u540c\u5206\u62c5\u6d88\u8d39\u4efb\u52a1\u3002\n\n**2. \u6d88\u8d39\u673a\u5236\uff08\u6838\u5fc3\u89c4\u5219\uff09**\n*   **\u7ec4\u5185\u6d88\u8d39\u8005\u4e0e Partition \u7684\u5173\u7cfb**\uff1a\n    *   \u4e00\u4e2a Partition \u53ea\u80fd\u88ab**\u540c\u4e00\u4e2a\u6d88\u8d39\u7ec4\u5185**\u7684**\u4e00\u4e2a\u6d88\u8d39\u8005**\u6d88\u8d39\uff08\u786e\u4fdd\u6d88\u606f\u4e0d\u88ab\u91cd\u590d\u5904\u7406\uff09\u3002\n    *   \u4e00\u4e2a\u6d88\u8d39\u8005\u53ef\u4ee5\u6d88\u8d39\u591a\u4e2a Partition\u3002\n*   **\u8d1f\u8f7d\u5747\u8861**\uff1a\n    *   \u5982\u679c\u6d88\u8d39\u8005\u6570\u91cf < Partition \u6570\u91cf\uff1a\u4e00\u4e2a\u6d88\u8d39\u8005\u4f1a\u6d88\u8d39\u591a\u4e2a Partition\u3002\n    *   \u5982\u679c\u6d88\u8d39\u8005\u6570\u91cf = Partition \u6570\u91cf\uff1a\u4e00\u4e2a\u6d88\u8d39\u8005\u5bf9\u5e94\u4e00\u4e2a Partition\uff0c\u8fbe\u5230\u7406\u60f3\u5e76\u884c\u5ea6\u3002\n    *   \u5982\u679c\u6d88\u8d39\u8005\u6570\u91cf > Partition \u6570\u91cf\uff1a**\u591a\u4f59\u7684\u6d88\u8d39\u8005\u4f1a\u7a7a\u95f2**\uff0c\u9020\u6210\u8d44\u6e90\u6d6a\u8d39\u3002\n\n**3. Rebalance\uff08\u91cd\u5e73\u8861\uff09\u673a\u5236**\n*   \u5f53\u6d88\u8d39\u7ec4\u5185\u6d88\u8d39\u8005\u53d1\u751f\u589e\u51cf\uff08\u5982\u5b95\u673a\u3001\u6269\u5bb9\uff09\u65f6\uff0cKafka \u4f1a\u89e6\u53d1 Rebalance\uff0c\u91cd\u65b0\u5206\u914d Partition \u548c Consumer \u7684\u5bf9\u5e94\u5173\u7cfb\u3002\n*   **\u75db\u70b9**\uff1a\u5728 Rebalance \u671f\u95f4\uff0c\u6d88\u8d39\u7ec4\u4f1a\u6682\u505c\u670d\u52a1\uff08Stop the World\uff09\uff0c\u4e14\u53ef\u80fd\u5f15\u53d1\u201c\u6d88\u606f\u91cd\u590d\u6d88\u8d39\u201d\u95ee\u9898\uff08\u56e0\u4e3a Offset \u63d0\u4ea4\u65f6\u673a\u95ee\u9898\uff09\u3002\n\n**4. \u603b\u7ed3**\n*   Kafka \u7684\u6a21\u578b\u662f **\u201c\u5206\u533a\u7ea7\u72ec\u5360\u201d**\u3002\n*   \u4f18\u52bf\u5728\u4e8e**\u9ad8\u541e\u5410**\uff0c\u901a\u8fc7\u589e\u52a0 Partition \u6570\u91cf\u7ebf\u6027\u63d0\u5347\u6027\u80fd\u3002\n\n---\n\n### \u4e8c\u3001 RocketMQ\uff1a\u57fa\u4e8e\u201cMessageQueue\u201d\u7684\u6d88\u8d39\u6a21\u578b\n\nRocketMQ \u7684\u6a21\u578b\u8bbe\u8ba1\u66f4\u8d34\u8fd1\u4f20\u7edf\u4e1a\u52a1\u903b\u8f91\uff0c\u5b83\u5728 Kafka \u7684\u57fa\u7840\u4e0a\u505a\u4e86\u5f88\u591a\u4f18\u5316\uff0c\u7279\u522b\u662f\u9488\u5bf9**\u4e1a\u52a1\u987a\u5e8f\u6027**\u548c**\u8fc7\u6ee4**\u573a\u666f\u3002\n\n**1. \u67b6\u6784\u6a21\u578b**\n*   **Broker \u4e0e Queue**\uff1aRocketMQ \u4e5f\u6709 Topic\uff0c\u5e95\u5c42\u7269\u7406\u4e0a\u5212\u5206\u4e3a\u591a\u4e2a **MessageQueue**\uff08\u7c7b\u4f3c Kafka \u7684 Partition\uff09\u3002\n*   **NameServer**\uff1a\u7c7b\u4f3c\u4e8e Kafka \u7684 Zookeeper\uff08\u6216 KRaft\uff09\uff0c\u8d1f\u8d23\u8def\u7531\u6ce8\u518c\u3002\n\n**2. \u6d88\u8d39\u673a\u5236\uff08\u6838\u5fc3\u5dee\u5f02\uff09**\nRocketMQ \u63d0\u4f9b\u4e86\u4e24\u79cd\u6d88\u8d39\u6a21\u5f0f\uff1a\n\n*   **\u6a21\u5f0f\u4e00\uff1a\u96c6\u7fa4\u6a21\u5f0f** \u2014\u2014 \u7c7b\u4f3c Kafka\n    *   MessageQueue \u53ea\u80fd\u88ab\u540c\u4e00\u4e2a\u6d88\u8d39\u7ec4\u5185\u7684\u4e00\u4e2a\u6d88\u8d39\u8005\u6d88\u8d39\u3002\n    *   **\u7279\u70b9**\uff1a\u6bcf\u6761\u6d88\u606f\u53ea\u4f1a\u88ab\u5904\u7406\u4e00\u6b21\uff0c\u9002\u5408\u5206\u5e03\u5f0f\u5904\u7406\u3002\n    *   **\u75db\u70b9\u4f18\u5316**\uff1aRocketMQ \u89e3\u51b3\u4e86 Kafka \u201c\u6d88\u8d39\u8005\u6570\u4e0d\u80fd\u8d85\u8fc7\u961f\u5217\u6570\u201d\u7684\u9650\u5236\u3002\u5982\u679c\u6d88\u8d39\u8005\u591a\u4e8e Queue \u6570\u91cf\uff0cRocketMQ \u652f\u6301**\u52a8\u6001\u6269\u5bb9 Queue**\uff08\u6216\u8005\u901a\u8fc7\u66f4\u7075\u6d3b\u7684\u8d1f\u8f7d\u7b56\u7565\uff09\uff0c\u867d\u7136\u9ed8\u8ba4\u60c5\u51b5\u4e0b\u4f9d\u7136\u53d7\u9650\u4e8e Queue \u6570\u91cf\uff0c\u4f46\u5176\u8bbe\u8ba1\u66f4\u503e\u5411\u4e8e\u4e1a\u52a1\u7075\u6d3b\u6027\u3002\n\n*   **\u6a21\u5f0f\u4e8c\uff1a\u5e7f\u64ad\u6a21\u5f0f** \u2014\u2014 RocketMQ \u7684\u7279\u8272\n    *   Topic \u4e2d\u7684\u6bcf\u4e00\u6761\u6d88\u606f\uff0c\u90fd\u4f1a\u88ab**\u6d88\u8d39\u7ec4\u5185\u7684\u6240\u6709\u6d88\u8d39\u8005**\u6d88\u8d39\u3002\n    *   **\u573a\u666f**\uff1a\u975e\u5e38\u9002\u5408**\u7cfb\u7edf\u7f13\u5b58\u5237\u65b0**\u3001**\u914d\u7f6e\u66f4\u65b0**\u3002\u4f8b\u5982\uff0c\u4fee\u6539\u4e86\u7cfb\u7edf\u914d\u7f6e\uff0c\u53d1\u9001\u4e00\u6761\u6d88\u606f\uff0c\u6240\u6709\u5e94\u7528\u670d\u52a1\u5668\u8282\u70b9\u90fd\u80fd\u6536\u5230\u5e76\u5237\u65b0\u672c\u5730\u5185\u5b58\u7f13\u5b58\u3002\n\n**3. \u987a\u5e8f\u6d88\u606f**\n*   RocketMQ \u5728\u987a\u5e8f\u6d88\u606f\u5904\u7406\u4e0a\u6bd4 Kafka \u66f4\u5b8c\u5584\u3002\u5b83\u901a\u8fc7\u5c06\u6d88\u606f Hash \u5230\u7279\u5b9a\u7684 MessageQueue\uff0c\u5e76\u7531\u7279\u5b9a\u7684\u6d88\u8d39\u8005\u9501\u5b9a\u8be5 Queue\uff0c\u4e25\u683c\u4fdd\u8bc1 FIFO\u3002\n\n**4. \u603b\u7ed3**\n*   RocketMQ \u7684\u6a21\u578b\u662f **\u201c\u961f\u5217\u7ea7\u72ec\u5360 + \u5e7f\u64ad\u80fd\u529b\u201d**\u3002\n*   \u4f18\u52bf\u5728\u4e8e**\u4e1a\u52a1\u529f\u80fd\u4e30\u5bcc**\uff08\u987a\u5e8f\u6d88\u606f\u3001\u4e8b\u52a1\u6d88\u606f\u3001\u5ef6\u65f6\u6d88\u606f\u3001\u5e7f\u64ad\u6d88\u606f\uff09\u3002\n\n---\n\n### \u4e09\u3001 \u6838\u5fc3\u5bf9\u6bd4\u603b\u7ed3\u8868\n\n| \u7ef4\u5ea6 | Kafka | RocketMQ |\n| :--- | :--- | :--- |\n| **\u6d88\u8d39\u5355\u5143** | Partition\uff08\u5206\u533a\uff09 | MessageQueue\uff08\u961f\u5217\uff09 |\n| **\u5e76\u884c\u5ea6\u9650\u5236** | \u6d88\u8d39\u8005\u6570\u4e0d\u80fd\u8d85\u8fc7 Partition \u6570\uff08\u5426\u5219\u7a7a\u95f2\uff09 | \u9ed8\u8ba4\u7c7b\u4f3c\uff0c\u4f46\u652f\u6301\u52a8\u6001\u8c03\u6574\uff0c\u4e14\u5e7f\u64ad\u6a21\u5f0f\u65e0\u6b64\u9650\u5236 |\n| **\u6a21\u5f0f\u652f\u6301** | \u4ec5\u96c6\u7fa4\u6a21\u5f0f\uff08\u7ec4\u5185\u5206\u62c5\uff09 | **\u96c6\u7fa4\u6a21\u5f0f** + **\u5e7f\u64ad\u6a21\u5f0f** |\n| **\u6d88\u606f\u8fc7\u6ee4** | \u8f83\u5f31\uff08\u4e3b\u8981\u9760 Topic \u5206\u533a\uff09 | **\u5f3a\u5927**\uff08\u652f\u6301 Tag \u6807\u7b7e\u8fc7\u6ee4\u3001SQL \u5c5e\u6027\u8fc7\u6ee4\uff09 |\n| **\u987a\u5e8f\u6d88\u606f** | \u5206\u533a\u5185\u6709\u5e8f\uff0c\u4f46 Rebalance \u53ef\u80fd\u5bfc\u81f4\u4e71\u5e8f | \u4e25\u683c\u6709\u5e8f\uff0c\u652f\u6301\u5168\u5c40/\u5206\u533a\u6709\u5e8f\uff0c\u4e14\u4f18\u5316\u4e86\u5f02\u5e38\u6062\u590d\u673a\u5236 |\n| **\u9002\u7528\u573a\u666f** | **\u5927\u6570\u636e\u65e5\u5fd7\u91c7\u96c6**\u3001\u6d41\u8ba1\u7b97\u3001\u9ad8\u541e\u5410\u57cb\u70b9 | **\u7535\u5546\u4e1a\u52a1**\u3001\u4ea4\u6613\u8ba2\u5355\u3001\u652f\u4ed8\u6d41\u6c34\u3001\u5f3a\u4e1a\u52a1\u903b\u8f91 |\n\n### \u56db\u3001 \u5b9e\u6218\u9009\u578b\u5efa\u8bae\n\n\u5728\u6211\u8fc7\u5f80\u7684\u9879\u76ee\u7ecf\u9a8c\u4e2d\uff1a\n\n1.  **\u9009\u62e9 Kafka**\uff1a\n    *   \u5728\u5c0f\u7535\u79d1\u6280\u7684\u8bbe\u5907\u65e5\u5fd7\u91c7\u96c6\u3001\u7528\u6237\u884c\u4e3a\u57cb\u70b9\u7cfb\u7edf\u4e2d\uff0c\u6211\u4eec\u9009\u62e9\u4e86 Kafka\u3002\u56e0\u4e3a\u6570\u636e\u91cf\u6781\u5927\uff08\u65e5 TB \u7ea7\uff09\uff0c\u6211\u4eec\u9700\u8981\u7684\u662f\u6781\u81f4\u7684\u541e\u5410\u91cf\uff0c\u4e14\u5bf9\u5c11\u91cf\u6d88\u606f\u4e22\u5931\u6216\u91cd\u590d\u4e0d\u654f\u611f\uff0cKafka \u7684 Partition \u6a21\u578b\u80fd\u5b8c\u7f8e\u914d\u5408 Flink/Spark \u8fdb\u884c\u6d41\u5f0f\u8ba1\u7b97\u3002\n\n2.  **\u9009\u62e9 RocketMQ**\uff1a\n    *   \u5728\u8ba2\u5355\u4ea4\u6613\u3001\u652f\u4ed8\u56de\u8c03\u3001\u8bbe\u5907\u6307\u4ee4\u4e0b\u53d1\u7b49**\u6838\u5fc3\u4e1a\u52a1\u94fe\u8def**\uff0c\u6211\u4eec\u4f1a\u9009\u62e9 RocketMQ\u3002\n    *   **\u7406\u7531**\uff1a\n        *   \u9700\u8981\u4f7f\u7528**\u4e8b\u52a1\u6d88\u606f**\u4fdd\u8bc1\u672c\u5730\u4e8b\u52a1\u4e0e\u6d88\u606f\u53d1\u9001\u7684\u4e00\u81f4\u6027\u3002\n        *   \u9700\u8981\u4f7f\u7528**\u5ef6\u65f6\u6d88\u606f**\u5904\u7406\u8ba2\u5355\u8d85\u65f6\u53d6\u6d88\uff08\u5982 15 \u5206\u949f\u672a\u652f\u4ed8\u81ea\u52a8\u53d6\u6d88\uff09\u3002\n        *   \u9700\u8981\u4f7f\u7528**\u5e7f\u64ad\u6d88\u606f**\u5237\u65b0\u6240\u6709\u8282\u70b9\u7684\u672c\u5730\u7f13\u5b58\u3002\n\n\u4ee5\u4e0a\u5c31\u662f\u6211\u5bf9\u4e24\u8005\u6d88\u8d39\u6a21\u578b\u7684\u7406\u89e3\u548c\u5b9e\u6218\u5bf9\u6bd4\u3002",

    "title": "Kafka \u6d88\u8d39\u5ef6\u8fdf\u8d8a\u6765\u8d8a\u9ad8\uff0c\u600e\u4e48\u5904\u7406\uff1f",
    "style": "",
    "details": "\u9762\u8bd5\u5b98\u60a8\u597d\uff0cKafka \u6d88\u8d39\u5ef6\u8fdf\u8d8a\u6765\u8d8a\u4e25\u91cd\uff0c\u672c\u8d28\u4e0a\u662f**\u201c\u751f\u4ea7\u901f\u5ea6 > \u6d88\u8d39\u901f\u5ea6\u201d**\uff0c\u4e14\u5dee\u8ddd\u5728\u4e0d\u65ad\u62c9\u5927\u3002\u8fd9\u901a\u5e38\u610f\u5473\u7740\u7cfb\u7edf\u51fa\u73b0\u4e86\u6027\u80fd\u74f6\u9888\u6216\u914d\u7f6e\u4e0d\u5f53\u3002\n\n\u9488\u5bf9\u8fd9\u4e2a\u95ee\u9898\uff0c\u6211\u6709\u4e00\u5957\u6210\u719f\u7684\u6392\u67e5\u4e0e\u4f18\u5316\u8def\u5f84\uff0c\u5206\u4e3a**\u201c\u8bca\u65ad\u5b9a\u4f4d\u201d**\u3001**\u201c\u5feb\u901f\u6b62\u635f\u201d**\u548c**\u201c\u957f\u6548\u4f18\u5316\u201d**\u4e09\u4e2a\u9636\u6bb5\u3002\n\n### \u4e00\u3001 \u8bca\u65ad\u5b9a\u4f4d\uff1a\u74f6\u9888\u5728\u54ea\u91cc\uff1f\n\n\u5728\u52a8\u624b\u6539\u4ee3\u7801\u4e4b\u524d\uff0c\u5148\u901a\u8fc7\u76d1\u63a7\u6307\u6807\uff08\u5982 Kafka Manager\u3001Prometheus + Grafana\uff09\u786e\u5b9a\u74f6\u9888\u7684\u5177\u4f53\u4f4d\u7f6e\uff1a\n\n1.  **\u770b Consumer Group Lag**\uff1a\u786e\u8ba4\u79ef\u538b\u662f\u5728\u6301\u7eed\u589e\u52a0\uff0c\u8fd8\u662f\u5076\u5c14\u6ce2\u52a8\u3002\n2.  **\u770b Consumer CPU/\u5185\u5b58**\uff1a\u5982\u679c Consumer \u673a\u5668 CPU \u6ee1\u8f7d\uff0c\u8bf4\u660e\u662f\u6d88\u8d39\u903b\u8f91\u8ba1\u7b97\u8fc7\u91cd\uff1b\u5982\u679c CPU \u5f88\u95f2\u4f46\u79ef\u538b\u4e25\u91cd\uff0c\u8bf4\u660e\u662f\u5728\u7b49\u5f85\u5916\u90e8\u8d44\u6e90\uff08\u5982 DB\u3001RPC\uff09\u3002\n3.  **\u770b GC \u65e5\u5fd7**\uff1a\u5982\u679c\u9891\u7e41 Full GC\uff0c\u4f1a\u5bfc\u81f4 Stop The World (STW)\uff0c\u6d88\u8d39\u8005\u5b9e\u9645\u4e0a\u5728\u201c\u6682\u505c\u201d\uff0c\u65e0\u6cd5\u62c9\u53d6\u6d88\u606f\u3002\n\n---\n\n### \u4e8c\u3001 \u5feb\u901f\u6b62\u635f\uff1a\u5e94\u6025\u65b9\u6848\n\n\u5982\u679c\u5ef6\u8fdf\u6b63\u5728\u6307\u6570\u7ea7\u4e0a\u5347\uff0c\u5fc5\u987b\u5148\u6b62\u635f\uff0c\u9632\u6b62\u7cfb\u7edf\u5d29\u6e83\u3002\n\n**1. \u4e34\u65f6\u6269\u5bb9\uff08\u6c34\u5e73\u6269\u5c55\uff09**\n\u8fd9\u662f\u6700\u5feb\u7684\u65b9\u6cd5\uff0c\u4f46\u5fc5\u987b\u9075\u5faa\u4e00\u4e2a\u516c\u5f0f\uff1a**`Consumer \u5b9e\u4f8b\u6570 <= Partition \u6570\u91cf`**\u3002\n*   **\u60c5\u51b5 A**\uff1a\u5f53\u524d Consumer \u6570 < Partition \u6570\u3002\u76f4\u63a5\u4e0a\u7ebf\u65b0\u7684 Consumer \u5b9e\u4f8b\uff0cKafka \u4f1a\u81ea\u52a8 Rebalance\uff0c\u5206\u62c5\u538b\u529b\u3002\n*   **\u60c5\u51b5 B**\uff1a\u5f53\u524d Consumer \u6570 = Partition \u6570\u3002\u6b64\u65f6\u52a0\u673a\u5668\u6ca1\u7528\uff0c\u591a\u51fa\u7684\u5b9e\u4f8b\u4f1a\u7a7a\u95f2\u3002\n    *   **\u89e3\u6cd5**\uff1a\u7d27\u6025\u6269\u5bb9 Topic \u7684 Partition \u6570\u91cf\uff08Kafka \u652f\u6301\u52a8\u6001\u589e\u52a0 Partition\uff09\uff0c\u7136\u540e\u91cd\u542f Consumer Group \u6216\u589e\u52a0\u5b9e\u4f8b\u3002\n\n**2. \u964d\u7ea7\u6d88\u8d39\uff08\u4e22\u5f03\u975e\u6838\u5fc3\u6570\u636e\uff09**\n*   \u5982\u679c\u662f\u65e5\u5fd7\u7c7b\u975e\u6838\u5fc3\u4e1a\u52a1\uff0c\u53ef\u4ee5\u4e34\u65f6\u4fee\u6539 Consumer \u903b\u8f91\uff0c\u6bd4\u5982\u6bcf 10 \u6761\u6d88\u8d39 1 \u6761\uff08\u91c7\u6837\uff09\uff0c\u6216\u8005\u76f4\u63a5\u8df3\u8fc7\u79ef\u538b\u7684\u5386\u53f2\u6570\u636e\uff0c\u5f3a\u5236\u8bbe\u7f6e Offset \u4e3a\u6700\u65b0\uff0c\u5148\u4fdd\u8bc1\u5b9e\u65f6\u6570\u636e\u80fd\u5904\u7406\uff08\u9700\u4e1a\u52a1\u65b9\u540c\u610f\uff09\u3002\n\n---\n\n### \u4e09\u3001 \u957f\u6548\u4f18\u5316\uff1a\u6839\u6cbb\u6027\u80fd\u74f6\u9888\n\n\u5e94\u6025\u4e4b\u540e\uff0c\u9700\u8981\u6df1\u5165\u4ee3\u7801\u548c\u67b6\u6784\u8fdb\u884c\u4f18\u5316\uff0c\u8fd9\u4e5f\u662f\u6211\u5728\u9879\u76ee\u4e2d\u505a\u5f97\u6700\u591a\u7684\u5de5\u4f5c\u3002\n\n#### 1. \u4f18\u5316\u6d88\u8d39\u8005\u6027\u80fd\uff08\u63d0\u5347\u5355\u673a\u541e\u5410\uff09\n\n**A. \u6279\u91cf\u6d88\u8d39**\n*   **\u75db\u70b9**\uff1a\u9ed8\u8ba4\u60c5\u51b5\u4e0b\uff0cConsumer \u53ef\u80fd\u6bcf\u6b21\u53ea\u62c9\u53d6\u51e0\u6761\u6d88\u606f\u5c31\u63d0\u4ea4\u5904\u7406\uff0c\u7f51\u7edc\u5f00\u9500\u5927\u3002\n*   **\u4f18\u5316**\uff1a\u8c03\u6574 `max.poll.records` \u53c2\u6570\uff08\u5982\u8bbe\u7f6e\u4e3a 500 \u6216 1000\uff09\uff0c\u4e00\u6b21\u62c9\u53d6\u5927\u91cf\u6d88\u606f\u3002\u5728\u4ee3\u7801\u903b\u8f91\u4e2d\uff0c\u4e0d\u8981\u9010\u6761\u5904\u7406\uff0c\u800c\u662f**\u6279\u91cf\u63d2\u5165\u6570\u636e\u5e93**\u6216**\u6279\u91cf\u8c03\u7528 RPC \u63a5\u53e3**\u3002\n*   **\u6548\u679c**\uff1a\u8fd9\u901a\u5e38\u662f\u63d0\u5347\u541e\u5410\u91cf\u6700\u7acb\u7aff\u89c1\u5f71\u7684\u624b\u6bb5\uff0c\u80fd\u51cf\u5c11 90% \u7684\u7f51\u7edc\u548c DB \u8fde\u63a5\u5f00\u9500\u3002\n\n**B. \u591a\u7ebf\u7a0b\u5e76\u53d1\u6d88\u8d39**\n*   **\u75db\u70b9**\uff1aKafka Consumer \u662f\u5355\u7ebf\u7a0b\u7684\uff08\u62c9\u53d6\u6d88\u606f\u7ebf\u7a0b\uff09\uff0c\u5982\u679c\u4e1a\u52a1\u5904\u7406\u6162\uff0c\u4f1a\u963b\u585e\u62c9\u53d6\u3002\n*   **\u4f18\u5316**\uff1a\n    *   **\u6a21\u578b**\uff1aConsumer \u7ebf\u7a0b\u53ea\u8d1f\u8d23\u62c9\u53d6\u6d88\u606f\uff0c\u5c06\u6d88\u606f\u653e\u5165**\u5185\u5b58\u961f\u5217**\uff08\u5982 BlockingQueue\uff09\u3002\n    *   **\u5904\u7406**\uff1a\u542f\u52a8\u4e00\u4e2a**\u7ebf\u7a0b\u6c60**\uff0c\u4ece\u5185\u5b58\u961f\u5217\u4e2d\u53d6\u6d88\u606f\u5e76\u53d1\u53d1\u5904\u7406\u3002\n    *   **\u6ce8\u610f**\uff1a\u5fc5\u987b\u5904\u7406\u597d Offset \u63d0\u4ea4\u7684\u903b\u8f91\uff0c\u907f\u514d\u6d88\u606f\u4e22\u5931\u6216\u91cd\u590d\u6d88\u8d39\uff08\u901a\u5e38\u91c7\u7528\u201c\u5904\u7406\u5b8c\u4e00\u6761\u63d0\u4ea4\u4e00\u6761\u201d\u6216\u201c\u6279\u91cf\u5904\u7406\u5b8c\u6279\u91cf\u63d0\u4ea4\u201d\u7684\u673a\u5236\uff09\u3002\n\n#### 2. \u4f18\u5316\u5916\u90e8\u4f9d\u8d56\uff08\u51cf\u5c11 IO \u8017\u65f6\uff09\n\n\u5f88\u591a\u65f6\u5019\u6d88\u8d39\u6162\uff0c\u4e0d\u662f Kafka \u6162\uff0c\u800c\u662f\u4e0b\u6e38\u6162\u3002\n\n*   **\u6570\u636e\u5e93\u74f6\u9888**\uff1a\n    *   \u68c0\u67e5\u662f\u5426\u6709\u6162 SQL\u3002\n    *   \u5c06\u201c\u5355\u6761 Insert\u201d\u6539\u4e3a\u201cBatch Insert\u201d\u3002\n    *   \u5f15\u5165**\u591a\u7ea7\u7f13\u5b58**\uff08\u5982 Redis\uff09\uff0c\u51cf\u5c11 DB \u547d\u4e2d\u7387\u3002\n*   **\u7b2c\u4e09\u65b9\u63a5\u53e3\u8d85\u65f6**\uff1a\n    *   \u8bbe\u7f6e\u5408\u7406\u7684\u8d85\u65f6\u65f6\u95f4\uff0c\u4e0d\u8981\u65e0\u9650\u7b49\u5f85\u3002\n    *   \u5bf9\u4e8e\u975e\u6838\u5fc3\u4f9d\u8d56\uff0c\u91c7\u7528**\u5f02\u6b65\u8c03\u7528**\u6216**\u7194\u65ad\u673a\u5236**\uff08\u5982 Sentinel/Hystrix\uff09\uff0c\u907f\u514d\u88ab\u4e0b\u6e38\u62d6\u6b7b\u3002\n\n#### 3. \u53c2\u6570\u8c03\u4f18\n\n\u6839\u636e\u4e1a\u52a1\u573a\u666f\u8c03\u6574 Kafka \u53c2\u6570\uff1a\n*   `fetch.min.bytes` / `fetch.max.wait.ms`\uff1a\u63a7\u5236\u62c9\u53d6\u7684\u9891\u7387\u548c\u5927\u5c0f\u3002\u9002\u5f53\u8c03\u5927\u53ef\u4ee5\u51cf\u5c11\u7f51\u7edc\u8bf7\u6c42\u6b21\u6570\uff0c\u4f46\u4f1a\u589e\u52a0\u5ef6\u8fdf\uff0c\u9700\u6743\u8861\u3002\n*   `max.poll.interval.ms`\uff1a\u5982\u679c\u4e1a\u52a1\u5904\u7406\u65f6\u95f4\u8f83\u957f\uff0c\u9700\u8981\u8c03\u5927\u6b64\u53c2\u6570\uff0c\u9632\u6b62 Consumer \u88ab Broker \u8e22\u51fa Group \u5bfc\u81f4 Rebalance\u3002\n\n---\n\n### \u56db\u3001 \u67b6\u6784\u5c42\u9762\u91cd\u6784\n\n\u5982\u679c\u4e0a\u8ff0\u4f18\u5316\u90fd\u505a\u4e86\uff0c\u8fd8\u662f\u6709\u79ef\u538b\uff0c\u90a3\u53ef\u80fd\u9700\u8981\u6539\u67b6\u6784\u3002\n\n**1. \u201c\u8f6c\u53d1\u201d\u67b6\u6784\uff08\u524a\u5cf0\u586b\u8c37\uff09**\n*   \u5982\u679c\u4e0b\u6e38\uff08\u5982 MySQL\uff09\u5199\u5165\u80fd\u529b\u786e\u5b9e\u6709\u9650\uff0c\u65e0\u6cd5\u901a\u8fc7\u591a\u7ebf\u7a0b\u89e3\u51b3\u3002\n*   **\u65b9\u6848**\uff1aKafka Consumer \u5feb\u901f\u6d88\u8d39\uff0c\u4e0d\u505a\u590d\u6742\u903b\u8f91\uff0c\u76f4\u63a5\u5199\u5165\u53e6\u4e00\u4e2a\u7f13\u51b2\u533a\uff08\u5982 **Redis List** \u6216\u53e6\u4e00\u4e2a **Kafka Topic**\uff09\u3002\n*   **\u5904\u7406**\uff1a\u90e8\u7f72\u4e13\u95e8\u7684 Worker \u670d\u52a1\uff0c\u4ee5\u6570\u636e\u5e93\u80fd\u627f\u53d7\u7684\u901f\u5ea6\u6162\u6162\u5904\u7406\u7f13\u51b2\u533a\u7684\u6570\u636e\u3002\n\n**2. \u5ba2\u6237\u7aef\u9650\u6d41**\n*   \u5982\u679c\u662f\u751f\u4ea7\u8005\u751f\u4ea7\u8fc7\u5feb\uff08\u5982\u722c\u866b\u6293\u53d6\u6570\u636e\uff09\uff0c\u53ef\u4ee5\u5728\u751f\u4ea7\u7aef\u8fdb\u884c\u9650\u6d41\uff0c\u6216\u8005\u6839\u636e\u4e1a\u52a1\u91cd\u8981\u6027\u964d\u4f4e\u751f\u4ea7\u9891\u7387\u3002\n\n### \u603b\u7ed3\n\n\u5904\u7406 Kafka \u6d88\u8d39\u5ef6\u8fdf\uff0c\u6211\u7684\u601d\u8def\u662f\uff1a\n1.  **\u5148\u770b\u76d1\u63a7**\uff0c\u533a\u5206\u662f\u8ba1\u7b97\u74f6\u9888\u8fd8\u662f IO \u74f6\u9888\u3002\n2.  **\u5e94\u6025\u6269\u5bb9**\uff0c\u5229\u7528 Partition \u548c Consumer \u7684\u5bf9\u5e94\u5173\u7cfb\u5feb\u901f\u63d0\u5347\u5e76\u884c\u5ea6\u3002\n3.  **\u4ee3\u7801\u4f18\u5316**\uff0c\u91cd\u70b9\u4f7f\u7528**\u6279\u91cf\u5904\u7406**\u548c**\u591a\u7ebf\u7a0b\u6d88\u8d39**\u3002\n4.  **\u67b6\u6784\u89e3\u8026**\uff0c\u5bf9\u4e8e\u65e0\u6cd5\u63d0\u901f\u7684\u4e0b\u6e38\uff0c\u91c7\u7528\u4e2d\u95f4\u7f13\u51b2\u5c42\u3002\n\n\u5728\u5c0f\u7535\u79d1\u6280\u7684\u9879\u76ee\u4e2d\uff0c\u6211\u66fe\u901a\u8fc7\u5c06\u201c\u9010\u6761\u66f4\u65b0\u6570\u636e\u5e93\u201d\u4f18\u5316\u4e3a\u201cRedis \u7f13\u51b2 + \u6279\u91cf\u5f02\u6b65\u843d\u5e93\u201d\uff0c\u6210\u529f\u5c06\u6d88\u606f\u6d88\u8d39 TPS \u63d0\u5347\u4e86 5 \u500d\uff0c\u5f7b\u5e95\u89e3\u51b3\u4e86\u9ad8\u5cf0\u671f\u7684\u79ef\u538b\u95ee\u9898\u3002",

    "title": "\u5982\u4f55\u8bbe\u8ba1\u5343\u4e07\u7ea7\u8bbe\u5907\u8868\uff1f",
    "style": "background-color: yellow;",
    "details": "\u9762\u8bd5\u5b98\u60a8\u597d\uff0c\u8bbe\u8ba1\u652f\u6491\u5343\u4e07\u7ea7\u8bbe\u5907\u91cf\u7684\u6570\u636e\u8868\uff0c\u6838\u5fc3\u6311\u6218\u4e0d\u5728\u4e8e\u201c\u5b58\u8fdb\u53bb\u201d\uff0c\u800c\u5728\u4e8e**\u9ad8\u5e76\u53d1\u4e0b\u7684\u8bfb\u5199\u6027\u80fd**\u3001**\u6570\u636e\u4e00\u81f4\u6027**\u4ee5\u53ca**\u540e\u7eed\u7684\u8fd0\u7ef4\u6269\u5c55\u6027**\u3002\u5982\u679c\u8bbe\u8ba1\u4e0d\u5f53\uff0c\u968f\u7740\u6570\u636e\u91cf\u589e\u957f\uff0c\u5355\u8868\u67e5\u8be2\u6027\u80fd\u4f1a\u5448\u6307\u6570\u7ea7\u4e0b\u964d\uff0c\u751a\u81f3\u5bfc\u81f4\u6570\u636e\u5e93\u5b95\u673a\u3002\n\n\u5728\u5c0f\u7535\u79d1\u6280\u4e3b\u5bfc\u8bbe\u5907\u57df\u67b6\u6784\u8bbe\u8ba1\u65f6\uff0c\u6211\u9488\u5bf9\u5343\u4e07\u7ea7\u8bbe\u5907\u8868\u91c7\u7528\u4e86**\u201c\u5782\u76f4\u62c6\u5206 + \u6c34\u5e73\u5206\u7247 + \u8bfb\u5199\u5206\u79bb + \u7f13\u5b58\u52a0\u901f\u201d**\u7684\u7ec4\u5408\u7b56\u7565\u3002\u4ee5\u4e0b\u662f\u6211\u7684\u8be6\u7ec6\u8bbe\u8ba1\u65b9\u6848\uff1a\n\n### \u4e00\u3001 \u67b6\u6784\u5c42\u9762\uff1a\u5206\u800c\u6cbb\u4e4b\n\n\u9762\u5bf9\u5343\u4e07\u7ea7\u6570\u636e\uff0c\u5355\u5e93\u5355\u8868\u662f\u7edd\u5bf9\u625b\u4e0d\u4f4f\u7684\uff0c\u5fc5\u987b\u8fdb\u884c\u62c6\u5206\u3002\n\n**1. \u5782\u76f4\u62c6\u5206\uff08\u6309\u4e1a\u52a1\u57df\u62c6\u5e93\uff09**\n\u9996\u5148\uff0c\u6211\u5c06\u201c\u8bbe\u5907\u8868\u201d\u4ece\u5e9e\u5927\u7684\u4e1a\u52a1\u5355\u4f53\u5e93\u4e2d\u5265\u79bb\u51fa\u6765\uff0c\u5efa\u7acb\u72ec\u7acb\u7684**\u8bbe\u5907\u4e2d\u5fc3\u6570\u636e\u5e93**\u3002\n*   **\u539f\u5219**\uff1a\u8bbe\u5907\u57fa\u7840\u4fe1\u606f\uff08SN\u3001\u578b\u53f7\u3001\u51fa\u5382\u65e5\u671f\uff09\u4e0e\u8bbe\u5907\u8fd0\u884c\u72b6\u6001\uff08\u5f53\u524d\u7535\u91cf\u3001\u662f\u5426\u5728\u7ebf\u3001\u6240\u5728\u95e8\u5e97\uff09\u5206\u79bb\u3002\n*   **\u7406\u7531**\uff1a\u57fa\u7840\u4fe1\u606f\u53d8\u66f4\u9891\u7387\u6781\u4f4e\uff08\u5199\u5165\u5c11\uff09\uff0c\u800c\u8fd0\u884c\u72b6\u6001\u53d8\u66f4\u9891\u7387\u6781\u9ad8\uff08\u5199\u5165\u591a\uff09\u3002\u6df7\u5728\u4e00\u8d77\u4f1a\u5bfc\u81f4\u7531\u4e8e\u72b6\u6001\u66f4\u65b0\u9891\u7e41\u800c\u9501\u8868\uff0c\u5f71\u54cd\u57fa\u7840\u4fe1\u606f\u7684\u8bfb\u53d6\u3002\n\n**2. \u6c34\u5e73\u62c6\u5206\uff08\u5206\u5e93\u5206\u8868\uff09**\n\u8fd9\u662f\u5904\u7406\u5343\u4e07\u7ea7\u6570\u636e\u7684\u786c\u6838\u624b\u6bb5\u3002\u6211\u4f7f\u7528 ShardingSphere \u4e2d\u95f4\u4ef6\u5b9e\u73b0\u4e86\u5206\u5e93\u5206\u8868\u3002\n\n*   **\u5206\u7247\u952e\u7684\u9009\u62e9**\uff1a\n    *   \u6211\u4eec\u9762\u4e34\u4e24\u79cd\u67e5\u8be2\u573a\u666f\uff1a\n        1.  \u901a\u8fc7\u8bbe\u5907ID\uff08SN\uff09\u67e5\u8be2\u8be6\u60c5\u3002\n        2.  \u901a\u8fc7\u95e8\u5e97ID\u67e5\u8be2\u8be5\u95e8\u5e97\u4e0b\u7684\u6240\u6709\u8bbe\u5907\u3002\n    *   **\u65b9\u6848**\uff1a\u6211\u9009\u62e9\u4e86**\u8bbe\u5907ID\uff08SN\uff09**\u4f5c\u4e3a\u4e3b\u5206\u7247\u952e\u3002\n        *   **\u7406\u7531**\uff1a\u8bbe\u5907ID\u662f\u5168\u5c40\u552f\u4e00\u7684\uff0c\u4e14\u5927\u90e8\u5206\u6838\u5fc3\u4ea4\u6613\uff08\u79df\u501f\u3001\u5f52\u8fd8\uff09\u90fd\u662f\u57fa\u4e8e\u8bbe\u5907ID\u53d1\u8d77\u7684\uff0c\u53ef\u4ee5\u4fdd\u8bc1\u5355\u8bf7\u6c42\u843d\u5728\u5355\u4e00\u5206\u7247\u4e0a\uff0c\u907f\u514d\u8de8\u5e93\u67e5\u8be2\uff0c\u6027\u80fd\u6700\u9ad8\u3002\n\n*   **\u5206\u7247\u7b56\u7565**\uff1a\n    *   \u91c7\u7528 `Hash` \u53d6\u6a21\u7b97\u6cd5\uff1a`Table_Index = Hash(SN) % 32`\u3002\n    *   **\u89c4\u5212**\uff1a\u5c06\u6570\u636e\u5206\u6563\u5230 4 \u4e2a\u5e93\uff0c\u6bcf\u4e2a\u5e93 8 \u5f20\u8868\uff0c\u5171 32 \u5f20\u7269\u7406\u8868\u3002\n    *   **\u5bb9\u91cf\u9884\u4f30**\uff1a\u5047\u8bbe\u672a\u6765\u8bbe\u5907\u91cf\u8fbe\u5230 5000 \u4e07\uff0c\u5355\u8868\u6570\u636e\u91cf\u7ea6\u4e3a 156 \u4e07\uff0c\u8fd9\u662f\u4e00\u4e2a\u5bf9\u4e8e MySQL B+ \u6811\u7d22\u5f15\u6765\u8bf4\u975e\u5e38\u5065\u5eb7\u7684\u8303\u56f4\uff0c\u67e5\u8be2\u6027\u80fd\u4f9d\u7136\u80fd\u4fdd\u6301\u5728\u6beb\u79d2\u7ea7\u3002\n\n### \u4e8c\u3001 \u8868\u7ed3\u6784\u8bbe\u8ba1\uff1a\u7cbe\u7b80\u4e0e\u6269\u5c55\n\n**1. \u5b57\u6bb5\u4f18\u5316**\n*   **\u62d2\u7edd\u5927\u5b57\u6bb5**\uff1a\u8bbe\u5907\u8868\u4e2d\u7edd\u4e0d\u5b58\u50a8\u5927\u6587\u672c\uff08\u5982\u7ef4\u4fee\u65e5\u5fd7\u8bb0\u5f55\uff09\u6216\u4e8c\u8fdb\u5236\u56fe\u7247\u3002\u8fd9\u4e9b\u6570\u636e\u5b58\u50a8\u5728 MongoDB \u6216 OSS \u4e2d\uff0c\u8868\u4e2d\u53ea\u4fdd\u7559 ID \u6216 URL\u3002\n*   **\u51b7\u70ed\u5206\u79bb**\uff1a\n    *   **\u8bbe\u5907\u57fa\u7840\u8868**\uff1a\u5b58\u50a8 SN\u3001\u578b\u53f7\u3001\u51fa\u5382\u65e5\u671f\u3001\u4fdd\u4fee\u671f\u3002\u6570\u636e\u91cf\u76f8\u5bf9\u9759\u6b62\u3002\n    *   **\u8bbe\u5907\u72b6\u6001\u8868**\uff1a\u5b58\u50a8\u5f53\u524d\u7535\u91cf\u3001\u5728\u7ebf\u72b6\u6001\u3001\u5fc3\u8df3\u65f6\u95f4\u3002\u8fd9\u5f20\u8868\u66f4\u65b0\u6781\u5176\u9891\u7e41\uff0c\u8bbe\u8ba1\u5f97\u975e\u5e38\u7cbe\u7b80\uff0c\u4ec5\u4fdd\u7559\u6838\u5fc3\u5b57\u6bb5\u3002\n\n**2. \u7d22\u5f15\u8bbe\u8ba1**\n\u5728\u5206\u5e93\u5206\u8868\u73af\u5883\u4e0b\uff0c\u7d22\u5f15\u8bbe\u8ba1\u5fc5\u987b\u6781\u5176\u514b\u5236\uff0c\u56e0\u4e3a\u7ef4\u62a4\u7d22\u5f15\u7684\u6210\u672c\u5f88\u9ad8\u3002\n*   **\u4e3b\u952e**\uff1a\u91c7\u7528\u96ea\u82b1\u7b97\u6cd5\u751f\u6210\u7684\u5206\u5e03\u5f0f ID\uff0c\u907f\u514d ID \u51b2\u7a81\uff0c\u540c\u65f6\u4fdd\u8bc1\u8d8b\u52bf\u9012\u589e\uff0c\u5229\u4e8e B+ \u6811\u5199\u5165\u6027\u80fd\u3002\n*   **\u552f\u4e00\u7d22\u5f15**\uff1a\u8bbe\u5907 SN \u5fc5\u987b\u5efa\u552f\u4e00\u7d22\u5f15\uff0c\u9632\u6b62\u810f\u6570\u636e\u3002\n*   **\u666e\u901a\u7d22\u5f15**\uff1a\u5bf9\u4e8e\u201c\u95e8\u5e97ID\u201d\u8fd9\u79cd\u975e\u5206\u7247\u952e\u67e5\u8be2\uff0c\u6211\u5efa\u7acb\u4e86\u666e\u901a\u7d22\u5f15\u3002\u867d\u7136\u4f1a\u5bfc\u81f4\u5168\u5206\u7247\u626b\u63cf\uff0c\u4f46\u901a\u8fc7\u4e1a\u52a1\u9650\u5236\uff08\u5982\u9650\u5236\u67e5\u8be2\u8303\u56f4\uff09\u6765\u89c4\u907f\u3002\n\n### \u4e09\u3001 \u6027\u80fd\u4f18\u5316\uff1a\u591a\u7ea7\u7f13\u5b58\u4e0e\u5f02\u6b65\n\n\u5355\u7eaf\u4f9d\u8d56\u6570\u636e\u5e93\u65e0\u6cd5\u652f\u6491\u9ad8\u5e76\u53d1\uff0c\u6211\u5f15\u5165\u4e86\u591a\u7ea7\u7f13\u5b58\u7b56\u7565\u3002\n\n**1. \u672c\u5730\u7f13\u5b58 + Redis \u4e8c\u7ea7\u7f13\u5b58**\n*   **\u573a\u666f**\uff1a\u8bbe\u5907\u57fa\u7840\u4fe1\u606f\uff08\u578b\u53f7\u3001\u8d39\u7387\u89c4\u5219\uff09\u8bfb\u53d6\u9891\u7387\u6781\u9ad8\uff0c\u4f46\u53d8\u66f4\u6781\u5c11\u3002\n*   **\u65b9\u6848**\uff1a\n    *   **L1 \u672c\u5730\u7f13\u5b58**\uff1a\u4f7f\u7528 Guava Cache\uff0c\u5b58\u50a8\u6781\u70ed\u70b9\u6570\u636e\uff0c\u5fae\u79d2\u7ea7\u54cd\u5e94\uff0c\u65e0\u7f51\u7edc\u5f00\u9500\u3002\n    *   **L2 \u5206\u5e03\u5f0f\u7f13\u5b58**\uff1a\u4f7f\u7528 Redis Cluster\uff0c\u5b58\u50a8\u5168\u91cf\u8bbe\u5907\u57fa\u7840\u4fe1\u606f\u3002\n*   **\u4e00\u81f4\u6027\u4fdd\u969c**\uff1a\u5f53\u540e\u53f0\u4fee\u6539\u8bbe\u5907\u4fe1\u606f\u65f6\uff0c\u901a\u8fc7\u53d1\u5e03 Binlog \u6d88\u606f\u6216\u4e1a\u52a1\u6d88\u606f\uff0c\u4e3b\u52a8\u5931\u6548 L1 \u7f13\u5b58\u5e76\u66f4\u65b0 L2 \u7f13\u5b58\u3002\n\n**2. \u72b6\u6001\u6570\u636e\u7684\u5f02\u6b65\u5904\u7406**\n*   **\u573a\u666f**\uff1a\u8bbe\u5907\u6bcf 30 \u79d2\u4e0a\u62a5\u4e00\u6b21\u5fc3\u8df3\u548c\u7535\u91cf\u3002\n*   **\u6311\u6218**\uff1a\u5982\u679c\u6bcf\u6b21\u5fc3\u8df3\u90fd\u76f4\u63a5 Update \u6570\u636e\u5e93\uff0c\u5343\u4e07\u7ea7\u8bbe\u5907\u6bcf\u79d2\u4f1a\u6709\u51e0\u4e07\u6b21 Update\uff0c\u6570\u636e\u5e93\u5fc5\u6302\u3002\n*   **\u65b9\u6848**\uff1a\n    *   \u8bbe\u5907\u4e0a\u62a5\u72b6\u6001\u5148\u5199\u5165 **RocketMQ**\u3002\n    *   \u6d88\u8d39\u8005\u670d\u52a1\u6279\u91cf\u6d88\u8d39\u6d88\u606f\uff0c\u5148\u66f4\u65b0 Redis \u4e2d\u7684\u201c\u8bbe\u5907\u5b9e\u65f6\u72b6\u6001\u8868\u201d\uff0c\u7136\u540e\u5b9a\u65f6\u6279\u91cf Merge \u66f4\u65b0\u6570\u636e\u5e93\uff08\u4f8b\u5982\u6bcf 5 \u5206\u949f\u6216\u79ef\u6512 1000 \u6761\u66f4\u65b0\u4e00\u6b21\uff09\u3002\n    *   \u8fd9\u6837\u5c06\u6570\u636e\u5e93\u7684\u5199\u5165\u538b\u529b\u964d\u4f4e\u4e86 90% \u4ee5\u4e0a\u3002\n\n### \u56db\u3001 \u590d\u6742\u67e5\u8be2\u89e3\u51b3\u65b9\u6848\uff1a\u5bbd\u8868\u4e0e\u641c\u7d22\u5f15\u64ce\n\n\u5206\u5e93\u5206\u8868\u540e\uff0c\u6700\u5927\u7684\u75db\u70b9\u662f\u590d\u6742\u7684\u6761\u4ef6\u67e5\u8be2\uff08\u5982\uff1a\u201c\u67e5\u8be2\u676d\u5dde\u5e02\u6240\u6709\u6545\u969c\u8bbe\u5907\u201d\uff09\u3002\n\n**\u89e3\u51b3\u65b9\u6848\uff1a\u6784\u5efa ES \u5bbd\u8868**\n*   \u5229\u7528 **Canal** \u76d1\u542c\u8bbe\u5907\u8868\u7684 Binlog \u53d8\u66f4\uff0c\u5b9e\u65f6\u5c06\u6570\u636e\u540c\u6b65\u5230 **Elasticsearch**\u3002\n*   \u5728 ES \u4e2d\u6784\u5efa\u5bbd\u8868\uff0c\u5197\u4f59\u95e8\u5e97\u540d\u79f0\u3001\u57ce\u5e02\u3001\u533a\u57df\u7b49\u4fe1\u606f\u3002\n*   \u6240\u6709\u590d\u6742\u7684\u68c0\u7d22\u3001\u7b5b\u9009\u3001\u62a5\u8868\u7edf\u8ba1\u9700\u6c42\uff0c\u5168\u90e8\u8def\u7531\u5230 ES \u6267\u884c\u3002ES \u7684\u5012\u6392\u7d22\u5f15\u5929\u751f\u9002\u5408\u5343\u4e07\u7ea7\u6570\u636e\u7684\u68c0\u7d22\uff0c\u54cd\u5e94\u65f6\u95f4\u53ef\u63a7\u5236\u5728\u767e\u6beb\u79d2\u5185\u3002\n*   **\u539f\u5219**\uff1a\u6570\u636e\u5e93\u8d1f\u8d23\u201c\u5199\u201d\u548c\u201c\u5355ID\u67e5\u8be2\u201d\uff0cES \u8d1f\u8d23\u201c\u590d\u6742\u641c\u7d22\u201d\u3002\n\n### \u4e94\u3001 \u5386\u53f2\u6570\u636e\u5904\u7406\uff1a\u51b7\u70ed\u5206\u79bb\n\n\u968f\u7740\u4e1a\u52a1\u53d1\u5c55\uff0c\u8bbe\u5907\u7ef4\u4fee\u8bb0\u5f55\u3001\u5386\u53f2\u8f68\u8ff9\u6570\u636e\u91cf\u4f1a\u8fdc\u8d85\u57fa\u7840\u4fe1\u606f\u3002\n\n*   **\u65b9\u6848**\uff1a\u5efa\u7acb\u5386\u53f2\u5f52\u6863\u5e93\u3002\n*   \u901a\u8fc7\u5b9a\u65f6\u4efb\u52a1\uff0c\u5c06\u8d85\u8fc7\u4e00\u5b9a\u65f6\u95f4\uff08\u5982 1 \u5e74\uff09\u4e14\u72b6\u6001\u4e3a\u201c\u5df2\u62a5\u5e9f\u201d\u7684\u8bbe\u5907\u6570\u636e\u8fc1\u79fb\u5230\u5f52\u6863\u5e93\u6216\u5927\u6570\u636e\u5e73\u53f0\u3002\n*   \u4e1a\u52a1\u7cfb\u7edf\u4ec5\u4fdd\u7559\u201c\u6d3b\u8dc3\u8bbe\u5907\u201d\u6570\u636e\uff0c\u786e\u4fdd\u6838\u5fc3\u5e93\u7684\u6570\u636e\u91cf\u59cb\u7ec8\u7ef4\u6301\u5728\u5343\u4e07\u7ea7\u800c\u975e\u4ebf\u7ea7\uff0c\u4fdd\u8bc1\u7cfb\u7edf\u957f\u671f\u7684\u7a33\u5b9a\u6027\u3002\n\n### \u603b\u7ed3\n\n\u9488\u5bf9\u5343\u4e07\u7ea7\u8bbe\u5907\u8868\u7684\u8bbe\u8ba1\uff0c\u6211\u7684\u6838\u5fc3\u601d\u8def\u662f\uff1a\n1.  **\u5206\u5e93\u5206\u8868**\u662f\u57fa\u77f3\uff0c\u89e3\u51b3\u7269\u7406\u5b58\u50a8\u74f6\u9888\u3002\n2.  **\u51b7\u70ed\u5206\u79bb**\u4e0e**\u8bfb\u5199\u5206\u79bb**\u662f\u624b\u6bb5\uff0c\u89e3\u51b3\u6027\u80fd\u74f6\u9888\u3002\n3.  **ES \u68c0\u7d22**\u662f\u8865\u5145\uff0c\u89e3\u51b3\u590d\u6742\u67e5\u8be2\u74f6\u9888\u3002\n4.  **\u5f02\u6b65\u524a\u5cf0**\u662f\u4fdd\u969c\uff0c\u89e3\u51b3\u9ad8\u5e76\u53d1\u5199\u5165\u74f6\u9888\u3002\n\n\u8fd9\u5957\u65b9\u6848\u5728\u6211\u8d1f\u8d23\u7684\u9879\u76ee\u4e2d\u6210\u529f\u843d\u5730\uff0c\u652f\u6491\u4e86\u8bbe\u5907\u89c4\u6a21\u4ece\u51e0\u5341\u4e07\u5230\u5343\u4e07\u7ea7\u7684\u5e73\u6ed1\u6269\u5c55\uff0c\u7cfb\u7edf\u53ef\u7528\u6027\u4fdd\u6301\u5728 99.9% \u4ee5\u4e0a\u3002",

  "299": {
    "title": "* \u5206\u5e93\u5206\u8868",
    "style": "",
    "details": "\u9762\u8bd5\u5b98\u60a8\u597d\uff0c**\u5206\u5e93\u5206\u8868** \u662f\u5e94\u5bf9\u6d77\u91cf\u6570\u636e\u548c\u9ad8\u5e76\u53d1\u573a\u666f\u7684\u7ec8\u6781\u624b\u6bb5\uff0c\u4e5f\u662f\u4ece\u201c\u4e2d\u5c0f\u578b\u7cfb\u7edf\u201d\u8fc8\u5411\u201c\u5927\u578b\u5206\u5e03\u5f0f\u7cfb\u7edf\u201d\u7684\u5173\u952e\u4e00\u6b65\u3002\n\n\u5728\u6211\u7684\u67b6\u6784\u5b9e\u8df5\u4e2d\uff0c\u5206\u5e93\u5206\u8868\u5e76\u975e\u7b2c\u4e00\u6b65\uff0c\u800c\u662f\u5f53\u5355\u673a\u4f18\u5316\uff08\u7d22\u5f15\u3001\u7f13\u5b58\u3001\u8bfb\u5199\u5206\u79bb\uff09\u8fbe\u5230\u74f6\u9888\u540e\u7684\u5fc5\u7136\u9009\u62e9\u3002\u6211\u901a\u5e38\u4f1a\u4ece**\u5782\u76f4\u62c6\u5206**\u3001**\u6c34\u5e73\u62c6\u5206**\u3001**\u6838\u5fc3\u96be\u70b9\uff08\u4e3b\u952e\u4e0e\u8def\u7531\uff09**\u4ee5\u53ca**\u843d\u5730\u6539\u9020**\u56db\u4e2a\u7ef4\u5ea6\u6765\u8fdb\u884c\u8bbe\u8ba1\u4e0e\u843d\u5730\u3002\n\n### \u4e00\u3001 \u4e3a\u4ec0\u4e48\u8981\u5206\u5e93\u5206\u8868\uff1f\n\n\u9996\u5148\u6211\u4f1a\u8bc4\u4f30\u7cfb\u7edf\u662f\u5426\u771f\u7684\u5230\u4e86\u8fd9\u4e00\u6b65\u3002\u901a\u5e38\u9047\u5230\u4ee5\u4e0b\u4e24\u7c7b\u74f6\u9888\u65f6\uff0c\u624d\u4f1a\u8003\u8651\uff1a\n\n1.  **\u5355\u673a\u5b58\u50a8\u74f6\u9888**\uff1a\u5355\u8868\u6570\u636e\u91cf\u8d85\u8fc7 2000 \u4e07\u884c\u6216\u5355\u5e93\u8d85\u8fc7 2TB\uff0cB+ \u6811\u5c42\u7ea7\u53d8\u6df1\uff0cIO \u6027\u80fd\u6025\u5267\u4e0b\u964d\uff0c\u5373\u4fbf\u52a0\u4e86\u7d22\u5f15\u4e5f\u5f88\u6162\u3002\n2.  **\u5355\u673a\u5e76\u53d1\u74f6\u9888**\uff1a\u867d\u7136\u6570\u636e\u91cf\u4e0d\u5927\uff0c\u4f46 QPS \u6781\u9ad8\uff08\u5982\u79d2\u6740\uff09\uff0c\u5355\u673a\u6570\u636e\u5e93 CPU \u98d9\u5347\u5230 100%\uff0c\u8fde\u63a5\u6c60\u88ab\u6253\u6ee1\u3002\n\n### \u4e8c\u3001 \u62c6\u5206\u7b56\u7565\uff1a\u5782\u76f4 vs \u6c34\u5e73\n\n\u8fd9\u662f\u67b6\u6784\u8bbe\u8ba1\u7684\u7b2c\u4e00\u6b65\uff0c\u6211\u4f1a\u6839\u636e\u4e1a\u52a1\u5f62\u6001\u9009\u62e9\u4e0d\u540c\u7684\u62c6\u5206\u65b9\u5f0f\u3002\n\n#### 1. \u5782\u76f4\u62c6\u5206\n\n*   **\u5782\u76f4\u5206\u5e93**\uff1a**\u6309\u4e1a\u52a1\u62c6\u5206**\u3002\n    *   **\u505a\u6cd5**\uff1a\u5c06\u8ba2\u5355\u5e93\u3001\u7528\u6237\u5e93\u3001\u5546\u54c1\u5e93\u7269\u7406\u5206\u79bb\u3002\n    *   **\u4ef7\u503c**\uff1a\u4e13\u5e93\u4e13\u7528\uff0c\u89e3\u51b3\u4e1a\u52a1\u8026\u5408\u95ee\u9898\uff0c\u4e0d\u540c\u4e1a\u52a1\u5206\u644a\u538b\u529b\u3002\u8fd9\u662f\u6211\u505a\u5fae\u670d\u52a1\u5316\u65f6\u7684\u6807\u51c6\u52a8\u4f5c\u3002\n*   **\u5782\u76f4\u5206\u8868**\uff1a**\u6309\u5b57\u6bb5\u62c6\u5206**\uff08\u5bbd\u8868\u62c6\u7a84\u8868\uff09\u3002\n    *   **\u505a\u6cd5**\uff1a\u5c06\u4e0d\u5e38\u7528\u6216\u5927\u5b57\u6bb5\uff08\u5982\u5546\u54c1\u8be6\u60c5 Blob\uff09\u62c6\u5230\u6269\u5c55\u8868\u3002\n    *   **\u4ef7\u503c**\uff1a\u51cf\u5c11\u5355\u884c\u5927\u5c0f\uff0c\u589e\u52a0\u6570\u636e\u9875\u884c\u6570\uff0c\u63d0\u5347\u626b\u63cf\u6548\u7387\u3002\n\n#### 2. \u6c34\u5e73\u62c6\u5206\u2014\u2014 **\u771f\u6b63\u7684\u96be\u70b9**\n\n*   **\u6c34\u5e73\u5206\u5e93**\uff1a\u5c06\u540c\u4e00\u4e2a\u5e93\u7684\u6570\u636e\u5206\u6563\u5230\u591a\u53f0\u673a\u5668\u4e0a\u3002\n*   **\u6c34\u5e73\u5206\u8868**\uff1a\u5c06\u540c\u4e00\u4e2a\u8868\u7684\u6570\u636e\u5206\u6563\u5230\u591a\u4e2a\u8868\u4e2d\uff08\u5982 `order_0` \u5230 `order_99`\uff09\u3002\n*   **\u6838\u5fc3\u4ef7\u503c**\uff1a\u89e3\u51b3\u4e86\u5355\u673a\u5b58\u50a8\u548c\u5e76\u53d1\u7684\u7269\u7406\u74f6\u9888\uff0c\u662f\u65e0\u9650\u6269\u5c55\u7684\u7406\u8bba\u57fa\u7840\u3002\n\n### \u4e09\u3001 \u6838\u5fc3\u96be\u70b9\uff1a\u8def\u7531\u7b56\u7565\u4e0e\u4e3b\u952e\u8bbe\u8ba1\n\n\u8fd9\u662f\u5206\u5e93\u5206\u8868\u6700\u8003\u9a8c\u6280\u672f\u6df1\u5ea6\u7684\u73af\u8282\uff0c\u9009\u9519\u4e86\u540e\u671f\u8fc1\u79fb\u6210\u672c\u6781\u9ad8\u3002\n\n#### 1. \u8def\u7531\u7b56\u7565\n\n\u6570\u636e\u62c6\u5206\u540e\uff0c\u6570\u636e\u5728\u54ea\uff1f\u600e\u4e48\u627e\uff1f\u6211\u4e3b\u8981\u7528\u8fc7\u4e09\u79cd\u8def\u7531\u65b9\u6848\uff1a\n\n*   **Hash \u8def\u7531\uff08\u6700\u5e38\u7528\uff09**\uff1a\n    *   **\u7b97\u6cd5**\uff1a`Hash(user_id) % \u5e93\u6570\u91cf/\u8868\u6570\u91cf`\u3002\n    *   **\u573a\u666f**\uff1a\u7528\u6237\u8ba2\u5355\u8868\u3001\u7528\u6237\u8d44\u6599\u8868\u3002\n    *   **\u4f18\u70b9**\uff1a\u6570\u636e\u6563\u5217\u5747\u5300\uff0c\u5e76\u53d1\u538b\u529b\u5206\u6563\u6700\u597d\u3002\n    *   **\u7f3a\u70b9**\uff1a**\u6269\u5bb9\u6781\u5176\u56f0\u96be**\u3002\u5982\u679c\u4ece 2 \u4e2a\u5e93\u6269\u5bb9\u5230 4 \u4e2a\u5e93\uff0c\u5927\u90e8\u5206\u6570\u636e\u9700\u8981\u8fc1\u79fb\u3002\n    *   **\u6211\u7684\u4f18\u5316**\uff1a\u91c7\u7528**\u4e00\u81f4\u6027 Hash \u7b97\u6cd5**\u6216**\u7ffb\u500d\u6269\u5bb9\u6cd5**\uff082 \u6269 4\uff0c\u53ea\u9700\u8fc1\u79fb\u4e00\u534a\u6570\u636e\uff09\uff0c\u51cf\u5c11\u8fc1\u79fb\u91cf\u3002\n\n*   **Range\uff08\u8303\u56f4\uff09\u8def\u7531**\uff1a\n    *   **\u7b97\u6cd5**\uff1a\u6309\u65f6\u95f4\uff08\u6708/\u5e74\uff09\u6216 ID \u8303\u56f4\u3002\n    *   **\u573a\u666f**\uff1a\u65e5\u5fd7\u8868\u3001\u6d41\u6c34\u8868\u3001\u5f52\u6863\u6570\u636e\u3002\n    *   **\u4f18\u70b9**\uff1a\u6269\u5bb9\u7b80\u5355\uff0c\u65b0\u6708\u4efd\u76f4\u63a5\u5efa\u65b0\u8868\u3002\n    *   **\u7f3a\u70b9**\uff1a**\u70ed\u70b9\u95ee\u9898**\u3002\u5927\u5bb6\u90fd\u67e5\u6700\u65b0\u6570\u636e\uff0c\u538b\u529b\u5168\u5728\u6700\u65b0\u7684\u5e93/\u8868\u4e0a\u3002\n\n*   **\u5730\u7406\u4f4d\u7f6e\u8def\u7531**\uff1a\n    *   **\u573a\u666f**\uff1a\u57fa\u4e8e\u57ce\u5e02\u6216\u533a\u57df\u5206\u5e93\uff08\u5982\u534e\u5317\u5e93\u3001\u534e\u5357\u5e93\uff09\u3002\n    *   **\u4f18\u70b9**\uff1a\u7b26\u5408\u4e1a\u52a1\u7269\u7406\u9694\u79bb\u9700\u6c42\u3002\n\n#### 2. \u5206\u5e03\u5f0f\u4e3b\u952e ID\uff08ID \u751f\u6210\u5668\uff09\n\n\u5206\u5e93\u540e\uff0c\u6570\u636e\u5e93\u81ea\u589e ID \u5931\u6548\uff08\u4f1a\u51b2\u7a81\uff09\u3002\u5fc5\u987b\u8bbe\u8ba1\u5168\u5c40\u552f\u4e00 ID\u3002\n\n*   **UUID**\uff1a\u592a\u957f\u3001\u65e0\u5e8f\uff0c\u4f1a\u5bfc\u81f4 B+ \u6811\u9891\u7e41\u5206\u88c2\uff0c\u7d22\u5f15\u6027\u80fd\u5dee\u3002**\u575a\u51b3\u4e0d\u7528**\u3002\n*   **Snowflake\uff08\u96ea\u82b1\u7b97\u6cd5\uff09**\u2014\u2014 **\u6211\u7684\u9996\u9009**\u3002\n    *   **\u539f\u7406**\uff1a64 \u4f4d Long \u578b\uff081 \u4f4d\u7b26\u53f7 + 41 \u4f4d\u65f6\u95f4\u6233 + 10 \u4f4d\u673a\u5668 ID + 12 \u4f4d\u5e8f\u5217\u53f7\uff09\u3002\n    *   **\u4f18\u70b9**\uff1a\u6709\u5e8f\uff08\u8d8b\u52bf\u9012\u589e\uff09\u3001\u9ad8\u6027\u80fd\u3001\u4e0d\u4f9d\u8d56\u6570\u636e\u5e93\u3002\n    *   **\u96be\u70b9**\uff1a\u65f6\u949f\u56de\u62e8\u95ee\u9898\u3002\n    *   **\u6211\u7684\u5b9e\u8df5**\uff1a\u5728 Snowflake \u57fa\u7840\u4e0a\u5c01\u88c5\u4e86\u4e00\u5c42 ID \u751f\u6210\u670d\u52a1\uff0c\u901a\u8fc7 Zookeeper \u7ba1\u7406\u673a\u5668 ID\uff0c\u5e76\u5904\u7406\u65f6\u949f\u56de\u62e8\u7684\u81ea\u6108\u903b\u8f91\u3002\n\n### \u56db\u3001 \u5b9e\u6218\u4e2d\u7684\u75db\u70b9\u4e0e\u89e3\u51b3\u65b9\u6848\n\n\u5206\u5e93\u5206\u8868\u4e0d\u4ec5\u4ec5\u662f\u62c6\u5206\uff0c\u66f4\u96be\u7684\u662f\u89e3\u51b3\u62c6\u5206\u540e\u5e26\u6765\u7684\u4e1a\u52a1\u9650\u5236\u3002\n\n#### 1. \u975e Sharding Key \u7684\u67e5\u8be2\u95ee\u9898\n**\u75db\u70b9**\uff1a\u8ba2\u5355\u8868\u6309 `user_id` \u5206\u5e93\uff0c\u4f46\u8fd0\u8425\u540e\u53f0\u8981\u6309 `merchant_id`\uff08\u5546\u5bb6\uff09\u67e5\u8be2\u8ba2\u5355\uff0c\u600e\u4e48\u529e\uff1f\n\n**\u6211\u7684\u89e3\u51b3\u65b9\u6848**\uff1a\n*   **\u65b9\u6848\u4e00\uff1a\u57fa\u56e0\u6cd5**\u3002\n    *   \u5c06 `user_id` \u7684\u57fa\u56e0\uff08\u5982\u540e 4 \u4f4d\uff09\u5d4c\u5165\u5230 `order_id` \u4e2d\u3002\n    *   \u751f\u6210\u8ba2\u5355 ID \u65f6\uff1a`order_id = Snowflake | (user_id % 16)`\u3002\n    *   \u8fd9\u6837\u901a\u8fc7 `order_id` \u4e5f\u80fd\u76f4\u63a5\u8def\u7531\u56de\u539f\u5e93\u3002\n*   **\u65b9\u6848\u4e8c\uff1a\u5f02\u6784\u7d22\u5f15\u8868\uff08ES/MQ\uff09**\u3002\n    *   \u8fd9\u662f\u5904\u7406\u590d\u6742\u67e5\u8be2\u7684\u7ec8\u6781\u65b9\u6848\u3002\n    *   \u6570\u636e\u5199\u5165 DB \u540e\uff0c\u53d1 MQ \u6d88\u606f\uff0c\u540c\u6b65\u5199\u5165 Elasticsearch\u3002\n    *   \u540e\u53f0\u67e5\u8be2\u8d70 ES\uff0c\u62ff\u5230 `order_id` \u540e\u518d\u53bb DB \u53d6\u8be6\u60c5\u3002\n*   **\u65b9\u6848\u4e09\uff1a\u5e7f\u64ad\u8868/\u5168\u91cf\u626b\u63cf**\u3002\n    *   \u5982\u679c\u6570\u636e\u91cf\u4e0d\u5927\uff0c\u67e5\u8be2\u6761\u4ef6\u4e0d\u5e26 Key\uff0c\u53ea\u80fd\u8def\u7531\u5230\u6240\u6709\u5e93\u8868\u805a\u5408\u7ed3\u679c\uff08\u6027\u80fd\u6781\u5dee\uff0c\u614e\u7528\uff09\u3002\n\n#### 2. \u8de8\u5e93\u5173\u8054\u67e5\u8be2\n**\u75db\u70b9**\uff1a\u5206\u5e93\u540e\u65e0\u6cd5 `JOIN`\u3002\n\n**\u89e3\u51b3\u65b9\u6848**\uff1a\n*   **\u5168\u5c40\u8868\uff08\u5b57\u5178\u8868\uff09**\uff1a\u5982\u914d\u7f6e\u8868\u3001\u5730\u533a\u8868\uff0c\u5728\u6bcf\u4e2a\u5e93\u90fd\u5197\u4f59\u4e00\u4efd\uff0c\u901a\u8fc7 MQ \u540c\u6b65\u66f4\u65b0\u3002\n*   **\u5b57\u6bb5\u5197\u4f59**\uff1a\u8ba2\u5355\u8868\u4e2d\u5197\u4f59\u7528\u6237\u59d3\u540d\uff0c\u907f\u514d\u53cd\u67e5\u7528\u6237\u5e93\u3002\n*   **\u5e94\u7528\u5c42\u7ec4\u88c5**\uff1a\u5148\u67e5 A \u5e93\u62ff\u5230 ID \u5217\u8868\uff0c\u518d\u67e5 B \u5e93\uff0c\u6700\u540e\u5728\u5185\u5b58\u4e2d Map \u5339\u914d\u3002\n\n#### 3. \u5206\u5e03\u5f0f\u4e8b\u52a1\n**\u75db\u70b9**\uff1a\u6263\u51cf\u5e93\u5b58\uff08\u5e93\u5b58\u5e93\uff09\u548c\u751f\u6210\u8ba2\u5355\uff08\u8ba2\u5355\u5e93\uff09\u4e0d\u5728\u540c\u4e00\u4e2a\u6570\u636e\u5e93\uff0c\u65e0\u6cd5\u4f7f\u7528\u672c\u5730\u4e8b\u52a1\u3002\n\n**\u89e3\u51b3\u65b9\u6848**\uff1a\n*   \u6211\u901a\u5e38\u91c7\u7528 **\u6700\u7ec8\u4e00\u81f4\u6027** \u65b9\u6848\u3002\n*   \u4f7f\u7528 **Seata\uff08AT/TCC \u6a21\u5f0f\uff09** \u6216 **\u672c\u5730\u6d88\u606f\u8868 + MQ** \u5b9e\u73b0\u67d4\u6027\u4e8b\u52a1\u3002\n\n### \u4e94\u3001 \u6280\u672f\u9009\u578b\u4e0e\u5e73\u6ed1\u8fc1\u79fb\n\n#### 1. \u4e2d\u95f4\u4ef6\u9009\u578b\n*   **\u5ba2\u6237\u7aef\u5c42**\uff1aShardingSphere-JDBC\uff08 formerly Sharding-JDBC\uff09\u3002\u76ee\u524d\u6700\u4e3b\u6d41\uff0c\u4ee5 Jar \u5305\u5f62\u5f0f\u5d4c\u5165\u5e94\u7528\uff0c\u6027\u80fd\u6700\u9ad8\uff0c\u9002\u5408 Java \u6280\u672f\u6808\u3002\n*   **\u4ee3\u7406\u5c42**\uff1aShardingSphere-Proxy\u3001MyCat\u3002\u72ec\u7acb\u90e8\u7f72\u670d\u52a1\uff0c\u5e94\u7528\u65e0\u611f\u77e5\uff0c\u9002\u5408\u591a\u8bed\u8a00\u5f02\u6784\u7cfb\u7edf\uff0c\u4f46\u591a\u4e86\u4e00\u5c42\u7f51\u7edc\u5f00\u9500\u3002\n\n#### 2. \u53cc\u5199\u8fc1\u79fb\u65b9\u6848\uff08\u505c\u673a\u4e0d\u53ef\u63a5\u53d7\uff09\n\n\u5728\u8001\u7cfb\u7edf\u91cd\u6784\u65f6\uff0c\u5982\u4f55\u5e73\u6ed1\u5207\u6362\u662f\u6700\u5927\u7684\u6311\u6218\u3002\u6211\u5b9e\u65bd\u8fc7\u4e00\u5957**\u201c\u53cc\u5199\u65b9\u6848\u201d**\uff1a\n\n1.  **\u53cc\u5199\u9636\u6bb5**\uff1a\u6539\u9020\u5e94\u7528\u4ee3\u7801\uff0c\u8001\u5e93\u548c\u65b0\u5e93\u540c\u65f6\u5199\u5165\u3002\u6b64\u65f6\u4ee5\u8001\u5e93\u4e3a\u51c6\uff0c\u65b0\u5e93\u6570\u636e\u4ec5\u505a\u6821\u9a8c\u3002\n2.  **\u5386\u53f2\u6570\u636e\u8fc1\u79fb**\uff1a\u7f16\u5199\u811a\u672c\uff0c\u5c06\u8001\u5e93\u5386\u53f2\u6570\u636e\u5237\u5165\u65b0\u5e93\uff08\u6ce8\u610f\u8df3\u8fc7\u53cc\u5199\u671f\u95f4\u5df2\u5b58\u5728\u7684\u6570\u636e\uff09\u3002\n3.  **\u6570\u636e\u6821\u9a8c**\uff1a\u5bf9\u6bd4\u65b0\u8001\u5e93\u6570\u636e\u5dee\u5f02\uff0c\u4fee\u590d\u4e0d\u4e00\u81f4\u3002\n4.  **\u5207\u8bfb**\uff1a\u901a\u8fc7\u914d\u7f6e\u4e2d\u5fc3\u5f00\u5173\uff0c\u5c06\u8bfb\u6d41\u91cf\u9010\u6b65\u5207\u6362\u5230\u65b0\u5e93\uff08\u7070\u5ea6\u9a8c\u8bc1\uff09\u3002\n5.  **\u4e0b\u7ebf\u8001\u5e93**\uff1a\u786e\u8ba4\u7a33\u5b9a\u540e\uff0c\u505c\u6b62\u5bf9\u8001\u5e93\u7684\u5199\u5165\uff0c\u4e0b\u7ebf\u8001\u5e93\u3002\n\n### \u516d\u3001 \u603b\u7ed3\n\n\u5206\u5e93\u5206\u8868\u662f\u201c\u836f\u201d\uff0c\u662f\u836f\u4e09\u5206\u6bd2\u3002\u5b83\u5728\u89e3\u51b3\u6027\u80fd\u95ee\u9898\u7684\u540c\u65f6\uff0c\u5f15\u5165\u4e86\u590d\u6742\u5ea6\u3002\n\n\u6211\u7684\u539f\u5219\u662f\uff1a**\u80fd\u4e0d\u5206\u5c31\u4e0d\u5206\uff0c\u80fd\u5c11\u5206\u5c31\u5c11\u5206**\u3002\n1.  \u4f18\u5148\u505a**\u67b6\u6784\u4f18\u5316**\uff1a\u5f15\u5165\u7f13\u5b58\u3001\u5f02\u6b65\u89e3\u8026\u3002\n2.  \u4f18\u5148\u505a**\u7269\u7406\u4f18\u5316**\uff1a\u5347\u7ea7\u786c\u4ef6\uff08SSD\uff09\u3001\u8c03\u6574 MySQL \u53c2\u6570\u3002\n3.  \u6700\u540e\u624d\u505a**\u5206\u5e93\u5206\u8868**\uff1a\u5fc5\u987b\u63d0\u524d\u89c4\u5212\u597d\u8def\u7531 Key\u3001ID \u751f\u6210\u548c\u6269\u5bb9\u8def\u5f84\uff0c\u907f\u514d\u540e\u671f\u91cd\u6784\u3002",

  "303": {
    "title": "\u4e3a\u4ec0\u4e48\u4e0d\u7528 ES/InfluxDB\uff1f",
    "style": "background-color: yellow;",
    "details": "\u9762\u8bd5\u5b98\u60a8\u597d\uff0c\u8fd9\u662f\u4e00\u4e2a\u975e\u5e38\u7ecf\u5178\u4e14\u5173\u952e\u7684\u67b6\u6784\u9009\u578b\u95ee\u9898\u3002\u5728\u6211\u7684\u67b6\u6784\u8bbe\u8ba1\u7406\u5ff5\u4e2d\uff0c**\u201c\u6ca1\u6709\u6700\u597d\u7684\u6280\u672f\uff0c\u53ea\u6709\u6700\u5408\u9002\u7684\u573a\u666f\u201d**\u3002\n\n\u6211\u4eec\u5728\u6838\u5fc3\u8bbe\u5907\u7ba1\u7406\u4e2d\u575a\u6301\u4ee5 MySQL\uff08\u5206\u5e93\u5206\u8868\uff09\u4e3a\u4e3b\uff0c\u800c\u5c06 ES \u548c InfluxDB \u5b9a\u4f4d\u4e3a**\u8f85\u52a9\u89d2\u8272**\uff0c\u4e3b\u8981\u57fa\u4e8e\u4ee5\u4e0b\u56db\u4e2a\u7ef4\u5ea6\u7684\u8003\u91cf\uff1a\n\n### \u4e00\u3001 \u6570\u636e\u7279\u6027\u4e0e\u4e1a\u52a1\u6a21\u578b\uff08\u6838\u5fc3\u539f\u56e0\uff09\n\n**1. \u4e8b\u52a1\u4e00\u81f4\u6027\u8981\u6c42\uff08ACID\uff09**\n*   **\u4e1a\u52a1\u573a\u666f**\uff1a\u8bbe\u5907\u7684\u5165\u5e93\u3001\u8c03\u62e8\u3001\u79df\u501f\u3001\u5f52\u8fd8\u6d89\u53ca\u5230\u8d44\u4ea7\u72b6\u6001\u7684\u6240\u6709\u6743\u8f6c\u79fb\u3002\u4f8b\u5982\uff0c\u8bbe\u5907\u4ece\u201c\u4ed3\u5e93\u5e93\u5b58\u201d\u53d8\u4e3a\u201c\u95e8\u5e97\u5e93\u5b58\u201d\uff0c\u6216\u8005\u4ece\u201c\u7a7a\u95f2\u201d\u53d8\u4e3a\u201c\u79df\u501f\u4e2d\u201d\uff0c\u8fd9\u4e9b\u64cd\u4f5c\u5fc5\u987b\u4fdd\u8bc1**\u5f3a\u4e00\u81f4\u6027**\u3002\n*   **MySQL \u4f18\u52bf**\uff1aMySQL \u7684 InnoDB \u5f15\u64ce\u63d0\u4f9b\u4e86\u5b8c\u5584\u7684\u4e8b\u52a1\u652f\u6301\uff08ACID\uff09\uff0c\u80fd\u786e\u4fdd\u72b6\u6001\u6d41\u8f6c\u4e0d\u4f1a\u51fa\u73b0\u201c\u534a\u63d0\u4ea4\u201d\u6216\u6570\u636e\u4e0d\u4e00\u81f4\u7684\u60c5\u51b5\u3002\n*   **ES/InfluxDB \u52a3\u52bf**\uff1a\n    *   ES \u662f\u8fd1\u5b9e\u65f6\u7cfb\u7edf\uff0c\u6570\u636e\u5199\u5165\u5230\u53ef\u67e5\u8be2\u6709 1s \u5de6\u53f3\u7684\u5ef6\u8fdf\uff0c\u4e14\u4e0d\u5177\u5907\u5b8c\u5907\u7684\u4e8b\u52a1\u56de\u6eda\u80fd\u529b\u3002\u5982\u679c\u5728\u8bbe\u5907\u79df\u501f\u7684\u5173\u952e\u94fe\u8def\u4f7f\u7528 ES\uff0c\u4e00\u65e6\u51fa\u73b0\u5e76\u53d1\u51b2\u7a81\uff0c\u6781\u6613\u5bfc\u81f4\u8d44\u4ea7\u6570\u636e\u9519\u4e71\uff08\u5982\u4e00\u53f0\u8bbe\u5907\u88ab\u91cd\u590d\u79df\u501f\uff09\uff0c\u8fd9\u5728\u91d1\u878d\u7ea7\u6216\u8d44\u4ea7\u7ea7\u4e1a\u52a1\u4e2d\u662f\u81f4\u547d\u7684\u3002\n    *   InfluxDB \u4fa7\u91cd\u4e8e\u65f6\u5e8f\u6570\u636e\u7684\u8ffd\u52a0\u5199\u5165\uff0c\u4e0d\u64c5\u957f\u5904\u7406\u590d\u6742\u7684\u66f4\u65b0\u548c\u4e8b\u52a1\u903b\u8f91\u3002\n\n**2. \u4e3b\u952e\u7d22\u5f15\u4e0e\u5173\u8054\u67e5\u8be2**\n*   **\u4e1a\u52a1\u573a\u666f**\uff1a\u8bbe\u5907\u7ba1\u7406\u5b58\u5728\u5927\u91cf\u7684 `device_id`\uff08\u8bbe\u5907SN\uff09\u7cbe\u786e\u67e5\u8be2\uff0c\u4ee5\u53ca\u8bbe\u5907\u4e0e\u95e8\u5e97\u3001\u8bbe\u5907\u7684\u5173\u8054\u67e5\u8be2\u3002\n*   **MySQL \u4f18\u52bf**\uff1aB+ \u6811\u7d22\u5f15\u7ed3\u6784\u5728\u4e3b\u952e\u7cbe\u786e\u67e5\u8be2\u4e0a\u6548\u7387\u6781\u9ad8\uff0c\u4e14 MySQL \u6210\u719f\u7684\u4e8b\u52a1\u673a\u5236\u80fd\u5f88\u597d\u5730\u5904\u7406\u5e76\u53d1\u66f4\u65b0\u540c\u4e00\u8bbe\u5907\u8bb0\u5f55\u7684\u573a\u666f\u3002\n*   **ES \u52a3\u52bf**\uff1a\u867d\u7136 ES \u7684\u5012\u6392\u7d22\u5f15\u68c0\u7d22\u5f88\u5feb\uff0c\u4f46\u5728\u5904\u7406\u9ad8\u5e76\u53d1\u7684\u5e76\u53d1\u66f4\u65b0\u65f6\uff0c\u5176\u4e50\u89c2\u9501\u673a\u5236\u76f8\u6bd4 MySQL \u7684\u884c\u7ea7\u9501\u5728\u590d\u6742\u4e1a\u52a1\u903b\u8f91\u4e0b\u66f4\u96be\u63a7\u5236\uff0c\u4e14\u66f4\u65b0\u6027\u80fd\u8fdc\u4f4e\u4e8e MySQL\u3002\n\n### \u4e8c\u3001 \u6210\u672c\u4e0e\u8d44\u6e90\u8003\u91cf\n\n**1. \u5b58\u50a8\u6210\u672c**\n*   **MySQL**\uff1a\u5bf9\u4e8e\u7ed3\u6784\u5316\u6570\u636e\uff08\u8bbe\u5907ID\u3001\u578b\u53f7\u3001\u72b6\u6001\u7801\uff09\uff0cMySQL \u7684\u884c\u5b58\u50a8\u538b\u7f29\u7387\u8f83\u9ad8\uff0c\u5b58\u50a8\u6210\u672c\u76f8\u5bf9\u4f4e\u5ec9\u3002\n*   **ES**\uff1aES \u4e3a\u4e86\u5b9e\u73b0\u5012\u6392\u7d22\u5f15\u548c\u5feb\u901f\u68c0\u7d22\uff0c\u5176\u7d22\u5f15\u6587\u4ef6\u4f1a\u5360\u7528\u5927\u91cf\u78c1\u76d8\u7a7a\u95f4\uff0c\u540c\u7b49\u6570\u636e\u91cf\u4e0b\uff0cES \u7684\u5b58\u50a8\u6210\u672c\u901a\u5e38\u662f MySQL \u7684 3-5 \u500d\u3002\u5bf9\u4e8e\u5343\u4e07\u7ea7\u6838\u5fc3\u6570\u636e\uff0c\u8fd9\u662f\u4e00\u7b14\u4e0d\u5c0f\u7684\u5f00\u9500\u3002\n*   **InfluxDB**\uff1a\u867d\u7136 InfluxDB \u5bf9\u65f6\u5e8f\u6570\u636e\u6709\u6781\u9ad8\u7684\u538b\u7f29\u6bd4\uff0c\u4f46\u5b83\u4e0d\u9002\u5408\u5b58\u50a8\u8be6\u7ec6\u7684\u8bbe\u5907\u201c\u5c5e\u6027\u4fe1\u606f\u201d\uff08\u5982\u5f52\u5c5e\u4ee3\u7406\u5546\u3001\u7ef4\u4fee\u8bb0\u5f55\u6587\u672c\u7b49\uff09\uff0c\u5982\u679c\u5f3a\u884c\u5b58\u50a8\uff0c\u8d44\u6e90\u5229\u7528\u7387\u5e76\u4e0d\u9ad8\u3002\n\n**2. \u8fd0\u7ef4\u6210\u672c**\n*   MySQL \u662f\u6700\u6210\u719f\u3001\u6700\u901a\u7528\u7684\u6570\u636e\u5e93\uff0c\u56e2\u961f\u5bf9\u5176\u8fd0\u7ef4\u3001\u5907\u4efd\u3001\u6062\u590d\u3001\u9ad8\u53ef\u7528\u642d\u5efa\uff08\u5982 MHA\u3001Orchestrator\uff09\u90fd\u6709\u975e\u5e38\u6210\u719f\u7684\u7ecf\u9a8c\u548c\u5de5\u5177\u3002\n*   ES \u548c InfluxDB \u7684\u96c6\u7fa4\u7ef4\u62a4\u3001\u6570\u636e\u51b7\u70ed\u5206\u5c42\u7ba1\u7406\u76f8\u5bf9\u590d\u6742\uff0c\u5bf9\u8fd0\u7ef4\u56e2\u961f\u7684\u8981\u6c42\u66f4\u9ad8\u3002\n\n### \u4e09\u3001 \u660e\u786e\u7684\u5206\u5de5\u5b9a\u4f4d\uff1a\u5404\u53d6\u6240\u957f\n\n\u6211\u5e76\u6ca1\u6709\u5b8c\u5168\u62d2\u7edd ES \u548c InfluxDB\uff0c\u800c\u662f\u5c06\u5b83\u4eec\u653e\u5728\u4e86\u66f4\u5408\u9002\u7684\u4f4d\u7f6e\uff0c\u91c7\u7528\u4e86**\u201cMySQL \u4e3a\u4e3b\uff0cES/InfluxDB \u4e3a\u8f85\u201d**\u7684\u5f02\u6784\u6570\u636e\u67b6\u6784\uff1a\n\n**1. ES \u7528\u4e8e\u201c\u590d\u6742\u68c0\u7d22\u201d\u573a\u666f**\n*   **\u75db\u70b9**\uff1a\u5206\u5e93\u5206\u8868\u540e\uff0c\u8de8\u5e93\u67e5\u8be2\u548c\u590d\u6742\u6761\u4ef6\u7b5b\u9009\uff08\u5982\u201c\u67e5\u8be2\u676d\u5dde\u5e02\u897f\u6e56\u533a\u6240\u6709\u6545\u969c\u7387\u9ad8\u4e8e 10% \u7684\u95e8\u5e97\u8bbe\u5907\u201d\uff09\u65e0\u6cd5\u5728 MySQL \u4e2d\u9ad8\u6548\u5b8c\u6210\u3002\n*   **\u65b9\u6848**\uff1a\u6211\u901a\u8fc7 Canal \u76d1\u542c MySQL Binlog\uff0c\u5c06\u8bbe\u5907\u6570\u636e**\u5f02\u6b65\u540c\u6b65**\u5230 ES \u4e2d\u3002\n*   **\u5b9a\u4f4d**\uff1aES \u4f5c\u4e3a**\u53ea\u8bfb\u67e5\u8be2\u5e93**\u3002\u8fd0\u8425\u540e\u53f0\u7684\u590d\u6742\u62a5\u8868\u3001\u68c0\u7d22\u8bf7\u6c42\u8d70 ES\uff0c\u6838\u5fc3\u4ea4\u6613\u94fe\u8def\u7684\u7cbe\u786e\u8bfb\u5199\u8d70 MySQL\u3002\u8fd9\u6837\u65e2\u89e3\u51b3\u4e86\u67e5\u8be2\u96be\u9898\uff0c\u53c8\u89c4\u907f\u4e86 ES \u7684\u4e8b\u52a1\u7f3a\u9677\u3002\n\n**2. InfluxDB \u7528\u4e8e\u201c\u65f6\u5e8f\u76d1\u63a7\u201d\u573a\u666f**\n*   **\u75db\u70b9**\uff1a\u8bbe\u5907\u7684\u5fc3\u8df3\u6570\u636e\uff08\u6bcf 30 \u79d2\u4e0a\u62a5\u4e00\u6b21\u7535\u91cf\u3001\u4fe1\u53f7\u5f3a\u5ea6\u3001\u7ecf\u7eac\u5ea6\uff09\u5c5e\u4e8e\u5178\u578b\u7684\u9ad8\u9891\u5199\u5165\u3001\u65f6\u5e8f\u7279\u5f81\u660e\u663e\u7684\u6570\u636e\u3002\n*   **\u65b9\u6848**\uff1a\u8fd9\u90e8\u5206\u6570\u636e\u6211\u4eec**\u6ca1\u6709\u5b58\u5165 MySQL**\uff0c\u800c\u662f\u76f4\u63a5\u5199\u5165 InfluxDB\uff08\u6216 OpenTSDB\uff09\u3002\n*   **\u5b9a\u4f4d**\uff1aInfluxDB \u4f5c\u4e3a**\u76d1\u63a7\u6570\u636e\u4e2d\u5fc3**\u3002\u7528\u4e8e\u7ed8\u5236\u8bbe\u5907\u8fd0\u884c\u8f68\u8ff9\u3001\u5206\u6790\u4fe1\u53f7\u6ce2\u52a8\u8d8b\u52bf\u3001\u9884\u8b66\u7535\u6c60\u5065\u5eb7\u5ea6\u3002\u8fd9\u4e9b\u6570\u636e\u4e0d\u9700\u8981\u4e8b\u52a1\uff0c\u9700\u8981\u7684\u662f\u9ad8\u6548\u7684\u5199\u5165\u541e\u5410\u548c\u65f6\u5e8f\u805a\u5408\u67e5\u8be2\u80fd\u529b\u3002\n\n### \u56db\u3001 \u603b\u7ed3\n\n\u7efc\u4e0a\u6240\u8ff0\uff0c\u6211\u7684\u9009\u578b\u903b\u8f91\u662f\uff1a\n\n| \u6570\u636e\u5e93 | \u6838\u5fc3\u80fd\u529b | \u9002\u7528\u573a\u666f | \u5728\u8bbe\u5907\u57df\u4e2d\u7684\u89d2\u8272 |\n| :--- | :--- | :--- | :--- |\n| **MySQL** | **\u4e8b\u52a1\u3001\u5f3a\u4e00\u81f4\u6027\u3001\u4e3b\u952e\u67e5\u8be2** | \u6838\u5fc3\u4ea4\u6613\u3001\u8d44\u4ea7\u72b6\u6001\u7ba1\u7406 | **\u4e3b\u5b58\u50a8** |\n| **Elasticsearch** | **\u5012\u6392\u7d22\u5f15\u3001\u5168\u6587\u68c0\u7d22\u3001\u805a\u5408\u5206\u6790** | \u590d\u6742\u6761\u4ef6\u7b5b\u9009\u3001\u8fd0\u8425\u62a5\u8868 | **\u68c0\u7d22\u52a0\u901f** |\n| **InfluxDB** | **\u65f6\u5e8f\u5b58\u50a8\u3001\u9ad8\u5199\u5165\u541e\u5410\u3001\u65f6\u95f4\u805a\u5408** | \u76d1\u63a7\u6307\u6807\u3001\u8f68\u8ff9\u8ffd\u8e2a\u3001\u8d8b\u52bf\u5206\u6790 | **\u76d1\u63a7\u6570\u636e** |\n\n**\u7ed3\u8bba**\uff1a\u6838\u5fc3\u4e1a\u52a1\u8868\uff08\u8bbe\u5907\u57fa\u7840\u4fe1\u606f\u3001\u72b6\u6001\uff09\u5fc5\u987b\u57fa\u4e8e\u5173\u7cfb\u578b\u6570\u636e\u5e93\u4ee5\u4fdd\u8bc1\u8d44\u4ea7\u5b89\u5168\uff1bES \u548c InfluxDB \u5219\u4f5c\u4e3a\u7279\u5b9a\u573a\u666f\uff08\u641c\u7d22\u3001\u76d1\u63a7\uff09\u7684\u8865\u5145\uff0c\u5171\u540c\u6784\u5efa\u4e00\u4e2a\u9ad8\u6027\u4ef7\u6bd4\u3001\u9ad8\u53ef\u7528\u7684\u5b58\u50a8\u67b6\u6784\u3002",

  "304": {
    "title": "Flink\u7684\u5e94\u7528",
    "style": "",
    "details": "\u9762\u8bd5\u5b98\u60a8\u597d\uff0c\u5728\u5c0f\u7535\u79d1\u6280\u7684\u8bbe\u5907\u5168\u94fe\u8def\u7ba1\u7406\u7cfb\u7edf\u4e2d\uff0c\u6211\u4eec\u9762\u4e34\u7684\u4e00\u4e2a\u6838\u5fc3\u6311\u6218\u662f\uff1a**\u5982\u4f55\u5bf9\u6d77\u91cf\u8bbe\u5907\u4ea7\u751f\u7684\u5b9e\u65f6\u6570\u636e\u6d41\u8fdb\u884c\u5feb\u901f\u5904\u7406\u548c\u5206\u6790\uff0c\u4ee5\u5b9e\u73b0\u4e1a\u52a1\u7684\u201c\u5b9e\u65f6\u611f\u77e5\u201d\u548c\u201c\u5373\u65f6\u51b3\u7b56\u201d**\u3002\n\n\u4f20\u7edf\u7684\u79bb\u7ebf\u6279\u5904\u7406\uff08\u5982 T+1 \u7684 Hadoop/Spark \u4f5c\u4e1a\uff09\u65e0\u6cd5\u6ee1\u8db3\u4e1a\u52a1\u5bf9\u65f6\u6548\u6027\u7684\u8981\u6c42\u3002\u56e0\u6b64\uff0c\u6211\u4e3b\u5bfc\u5f15\u5165\u4e86 **Flink** \u4f5c\u4e3a\u5b9e\u65f6\u8ba1\u7b97\u5f15\u64ce\uff0c\u4e3b\u8981\u843d\u5730\u5728\u4ee5\u4e0b\u4e09\u4e2a\u6838\u5fc3\u573a\u666f\uff1a\n\n### \u4e00\u3001 \u6838\u5fc3\u5e94\u7528\u573a\u666f\n\n#### 1. \u8bbe\u5907\u72b6\u6001\u5b9e\u65f6\u76d1\u63a7\u4e0e\u5f02\u5e38\u9884\u8b66\uff08CEP \u590d\u6742\u4e8b\u4ef6\u5904\u7406\uff09\n*   **\u4e1a\u52a1\u75db\u70b9**\uff1a\u5343\u4e07\u7ea7\u8bbe\u5907\u904d\u5e03\u5168\u56fd\uff0c\u8bbe\u5907\u79bb\u7ebf\u3001\u6545\u969c\u3001\u88ab\u6076\u610f\u7834\u574f\u7b49\u60c5\u51b5\u9700\u8981\u79d2\u7ea7\u53d1\u73b0\u5e76\u901a\u77e5\u8fd0\u7ef4\u4eba\u5458\u3002\u4f20\u7edf\u7684\u5b9a\u65f6\u8f6e\u8be2\u6570\u636e\u5e93\u65b9\u6848\u5ef6\u8fdf\u9ad8\u3001\u5bf9\u6570\u636e\u5e93\u538b\u529b\u5927\u3002\n*   **Flink \u65b9\u6848**\uff1a\n    *   \u6211\u4eec\u5229\u7528 **Flink CEP\uff08\u590d\u6742\u4e8b\u4ef6\u5904\u7406\uff09** \u5e93\uff0c\u5b9a\u4e49\u4e86\u4e00\u5957\u8bbe\u5907\u5f02\u5e38\u7684\u6a21\u5f0f\u89c4\u5219\u3002\u4f8b\u5982\uff1a\u201c\u8bbe\u5907\u5728 5 \u5206\u949f\u5185\u8fde\u7eed\u4e0a\u62a5 3 \u6b21\u4f4e\u7535\u91cf\u62a5\u8b66\u4e14\u672a\u5f52\u8fd8\u201d\u6216\u201c\u8bbe\u5907\u5fc3\u8df3\u7a81\u7136\u4e2d\u65ad\u8d85\u8fc7 10 \u5206\u949f\u201d\u3002\n    *   Flink \u5b9e\u65f6\u6d88\u8d39 Kafka \u4e2d\u7684\u8bbe\u5907\u5fc3\u8df3 Topic\uff0c\u901a\u8fc7\u72b6\u6001\u673a\u8fdb\u884c\u6a21\u5f0f\u5339\u914d\u3002\u4e00\u65e6\u5339\u914d\u6210\u529f\uff0c\u7acb\u5373\u89e6\u53d1\u544a\u8b66\uff0c\u63a8\u9001\u5230\u8fd0\u7ef4\u4e2d\u53f0\u6216\u53d1\u9001\u77ed\u4fe1\u7ed9\u533a\u57df\u8d1f\u8d23\u4eba\u3002\n*   **\u6210\u679c**\uff1a\u8bbe\u5907\u6545\u969c\u53d1\u73b0\u65f6\u95f4\u4ece\u539f\u6765\u7684\u5c0f\u65f6\u7ea7\u7f29\u77ed\u81f3**\u5206\u949f\u7ea7**\uff0c\u6781\u5927\u5730\u63d0\u5347\u4e86\u8bbe\u5907\u5728\u7ebf\u7387\u548c\u8fd0\u7ef4\u54cd\u5e94\u901f\u5ea6\u3002\n\n#### 2. \u5b9e\u65f6\u5927\u5c4f\u4e0e\u4e1a\u52a1\u7ecf\u8425\u5206\u6790\uff08\u6d41\u5f0f ETL\uff09\n*   **\u4e1a\u52a1\u75db\u70b9**\uff1a\u8fd0\u8425\u548c\u9ad8\u5c42\u7ba1\u7406\u8005\u9700\u8981\u5b9e\u65f6\u638c\u63e1\u5f53\u524d\u7684\u79df\u501f\u8ba2\u5355\u91cf\u3001\u8425\u6536\u91d1\u989d\u3001\u8bbe\u5907\u5229\u7528\u7387\u7b49\u6838\u5fc3\u6307\u6807\uff0c\u4ee5\u4fbf\u5728\u5927\u578b\u6d3b\u52a8\uff08\u5982\u97f3\u4e50\u8282\u3001\u5c55\u4f1a\uff09\u671f\u95f4\u52a8\u6001\u8c03\u6574\u8fd0\u8425\u7b56\u7565\u3002\n*   **Flink \u65b9\u6848**\uff1a\n    *   \u6784\u5efa **Flink -> Kafka -> Redis/ClickHouse** \u7684\u5b9e\u65f6\u94fe\u8def\u3002\n    *   Flink \u6d88\u8d39\u4ea4\u6613\u8ba2\u5355\u6d41\uff0c\u8fdb\u884c\u591a\u7ef4\u5ea6\u7684\u5b9e\u65f6\u805a\u5408\u8ba1\u7b97\uff08\u5982\u6309\u57ce\u5e02\u3001\u6309\u95e8\u5e97\u3001\u6309\u8bbe\u5907\u7c7b\u578b\u7edf\u8ba1\u8ba2\u5355\u91cf\u548c\u8425\u6536\uff09\u3002\n    *   \u8ba1\u7b97\u7ed3\u679c\u5b9e\u65f6\u5199\u5165 Redis \u4f9b\u5927\u5c4f\u67e5\u8be2\uff0c\u6216\u5199\u5165 ClickHouse \u652f\u6301\u591a\u7ef4\u5ea6\u7684\u5373\u65f6 OLAP \u5206\u6790\u3002\n*   **\u6210\u679c**\uff1a\u5b9e\u73b0\u4e86**\u79d2\u7ea7**\u7684\u6570\u636e\u53ef\u89c6\u5316\uff0c\u652f\u6491\u4e86\u591a\u6b21\u5927\u4fc3\u6d3b\u52a8\u7684\u5b9e\u65f6\u76d1\u63a7\u4e0e\u51b3\u7b56\uff0c\u6570\u636e\u51c6\u786e\u7387\u8fbe\u5230 99.9%\u3002\n\n#### 3. \u95e8\u5e97\u5b9e\u65f6\u70ed\u5ea6\u5206\u6790\u4e0e\u667a\u80fd\u8c03\u5ea6\n*   **\u4e1a\u52a1\u75db\u70b9**\uff1a\u4e0d\u540c\u95e8\u5e97\u5728\u4e0d\u540c\u65f6\u6bb5\u7684\u8bbe\u5907\u9700\u6c42\u5dee\u5f02\u5de8\u5927\u3002\u6211\u4eec\u9700\u8981\u5b9e\u65f6\u8bc6\u522b\u201c\u70ed\u95e8\u95e8\u5e97\u201d\uff08\u501f\u7a7a\uff09\u548c\u201c\u51b7\u95e8\u95e8\u5e97\u201d\uff08\u5806\u79ef\uff09\uff0c\u6307\u5bfc\u8fd0\u7ef4\u4eba\u5458\u8fdb\u884c\u8bbe\u5907\u8c03\u62e8\u3002\n*   **Flink \u65b9\u6848**\uff1a\n    *   \u4f7f\u7528 Flink \u7684 **\u6ed1\u52a8\u7a97\u53e3**\uff0c\u4f8b\u5982\u6bcf 5 \u5206\u949f\u7edf\u8ba1\u4e00\u6b21\u8fc7\u53bb 1 \u5c0f\u65f6\u5185\u7684\u79df\u501f\u9891\u6b21\u548c\u5f52\u8fd8\u9891\u6b21\u3002\n    *   \u7ed3\u5408\u95e8\u5e97\u7684\u8bbe\u5907\u5e93\u5b58\u6570\u636e\uff0c\u5b9e\u65f6\u8ba1\u7b97\u201c\u4f9b\u9700\u6bd4\u201d\u6307\u6807\u3002\n    *   \u5f53\u67d0\u4e2a\u95e8\u5e97\u7684\u4f9b\u9700\u6bd4\u8d85\u8fc7\u9608\u503c\uff08\u5982\u5e93\u5b58\u544a\u6025\uff09\uff0cFlink \u5b9e\u65f6\u89e6\u53d1\u201c\u8c03\u62e8\u5efa\u8bae\u201d\u6d88\u606f\uff0c\u63a8\u9001\u5230\u8c03\u5ea6\u7cfb\u7edf\u3002\n*   **\u6210\u679c**\uff1a\u8bbe\u5907\u5468\u8f6c\u7387\u63d0\u5347\u4e86 **15%**\uff0c\u6709\u6548\u89e3\u51b3\u4e86\u201c\u6709\u501f\u65e0\u8fd8\u201d\u6216\u201c\u6709\u8fd8\u65e0\u501f\u201d\u7684\u4f9b\u9700\u4e0d\u5e73\u8861\u95ee\u9898\uff0c\u76f4\u63a5\u5e26\u6765\u4e86\u8425\u6536\u589e\u957f\u3002\n\n### \u4e8c\u3001 \u67b6\u6784\u8bbe\u8ba1\u4e0e\u6280\u672f\u4eae\u70b9\n\n\u5728 Flink \u7684\u843d\u5730\u8fc7\u7a0b\u4e2d\uff0c\u6211\u91cd\u70b9\u89e3\u51b3\u4e86\u4ee5\u4e0b\u6280\u672f\u96be\u9898\uff0c\u4fdd\u8bc1\u4e86\u7cfb\u7edf\u7684\u7a33\u5b9a\u6027\u548c\u51c6\u786e\u6027\uff1a\n\n**1. \u7aef\u5230\u7aef\u7684 Exactly-Once\uff08\u7cbe\u786e\u4e00\u6b21\uff09\u8bed\u4e49**\n*   **\u6311\u6218**\uff1a\u5728\u6d41\u8ba1\u7b97\u4e2d\uff0c\u7f51\u7edc\u6296\u52a8\u6216\u4efb\u52a1\u91cd\u542f\u53ef\u80fd\u5bfc\u81f4\u6570\u636e\u91cd\u590d\u6d88\u8d39\u6216\u4e22\u5931\uff0c\u8fd9\u5bf9\u4e8e\u6d89\u53ca\u91d1\u989d\u548c\u8ba2\u5355\u7edf\u8ba1\u7684\u4e1a\u52a1\u662f\u4e0d\u53ef\u63a5\u53d7\u7684\u3002\n*   **\u89e3\u51b3\u65b9\u6848**\uff1a\n    *   \u6211\u4eec\u914d\u7f6e\u4e86 **Kafka \u4f5c\u4e3a Source \u548c Sink**\u3002\n    *   \u5229\u7528 Flink \u7684 **Checkpoint \u673a\u5236**\uff0c\u5f00\u542f\u4e86\u7cbe\u786e\u4e00\u6b21\u7684\u68c0\u67e5\u70b9\u6a21\u5f0f\u3002\n    *   \u901a\u8fc7 **\u4e24\u9636\u6bb5\u63d0\u4ea4\uff082PC\uff09** \u673a\u5236\uff0c\u786e\u4fdd\u6570\u636e\u53ea\u5728 Checkpoint \u6210\u529f\u63d0\u4ea4\u65f6\u624d\u5199\u5165 Kafka/Redis\uff0c\u4fdd\u8bc1\u4e86\u6570\u636e\u4e0d\u4e22\u4e0d\u91cd\u3002\n\n**2. \u5927\u72b6\u6001\u7ba1\u7406\u4e0e\u80cc\u538b\u4f18\u5316**\n*   **\u6311\u6218**\uff1a\u5728\u8ba1\u7b97\u201c\u8bbe\u5907\u8fc7\u53bb 24 \u5c0f\u65f6\u7684\u884c\u4e3a\u8f68\u8ff9\u201d\u7b49\u957f\u7a97\u53e3\u805a\u5408\u65f6\uff0cFlink \u7684\u72b6\u6001\u4f1a\u53d8\u5f97\u975e\u5e38\u5927\uff0c\u5bfc\u81f4\u5185\u5b58\u6ea2\u51fa\u6216 GC \u9891\u7e41\uff0c\u8fdb\u800c\u4ea7\u751f\u4e25\u91cd\u7684\u80cc\u538b\u3002\n*   **\u89e3\u51b3\u65b9\u6848**\uff1a\n    *   \u6211\u5c06\u72b6\u6001\u540e\u7aef\u914d\u7f6e\u4e3a **RocksDBStateBackend**\uff0c\u5c06\u5927\u72b6\u6001\u5b58\u50a8\u5728\u672c\u5730\u78c1\u76d8\u800c\u975e\u5185\u5b58\u4e2d\uff0c\u7a81\u7834\u4e86\u5185\u5b58\u9650\u5236\u3002\n    *   \u5f00\u542f **\u589e\u91cf Checkpoint**\uff0c\u6bcf\u6b21\u53ea\u6301\u4e45\u5316\u53d8\u5316\u7684\u90e8\u5206\u6570\u636e\uff0c\u5927\u5e45\u7f29\u77ed\u4e86 Checkpoint \u7684\u8017\u65f6\uff0c\u51cf\u5c11\u4e86\u4efb\u52a1\u505c\u987f\u3002\n    *   \u9488\u5bf9\u80cc\u538b\u95ee\u9898\uff0c\u901a\u8fc7 Flink UI \u5b9a\u4f4d\u5230\u74f6\u9888\u7b97\u5b50\uff0c\u4f18\u5316\u4e86\u4ee3\u7801\u903b\u8f91\uff08\u5982\u51cf\u5c11\u4e0d\u5fc5\u8981\u7684\u5e8f\u5217\u5316\u64cd\u4f5c\uff09\uff0c\u4f7f\u5f97\u7cfb\u7edf\u541e\u5410\u91cf\u63d0\u5347\u4e86 30%\u3002\n\n**3. \u6570\u636e\u503e\u659c\u5904\u7406**\n*   **\u6311\u6218**\uff1a\u67d0\u4e9b\u70ed\u95e8\u95e8\u5e97\u6216\u7f51\u7ea2\u8bbe\u5907\u7684\u6d41\u91cf\u6781\u9ad8\uff0c\u5bfc\u81f4 Flink \u4efb\u52a1\u4e2d\u67d0\u4e9b SubTask \u5904\u7406\u901f\u5ea6\u8fdc\u6162\u4e8e\u5176\u4ed6\uff0c\u5f15\u53d1\u6570\u636e\u503e\u659c\u548c\u6574\u4f53\u5ef6\u8fdf\u3002\n*   **\u89e3\u51b3\u65b9\u6848**\uff1a\n    *   \u91c7\u7528\u4e86 **\u201c\u4e24\u9636\u6bb5\u805a\u5408\u201d** \u7b56\u7565\uff08\u7c7b\u4f3c MapReduce \u4e2d\u7684 Combiner\uff09\u3002\n    *   \u7b2c\u4e00\u9636\u6bb5\uff1a\u5728 KeyBy \u4e4b\u524d\u52a0\u4e00\u5c42\u968f\u673a\u524d\u7f00\u8fdb\u884c\u5c40\u90e8\u805a\u5408\uff0c\u5c06\u70ed\u70b9\u6570\u636e\u6253\u6563\u3002\n    *   \u7b2c\u4e8c\u9636\u6bb5\uff1a\u53bb\u6389\u524d\u7f00\u8fdb\u884c\u5168\u5c40\u805a\u5408\u3002\n    *   \u6709\u6548\u89e3\u51b3\u4e86\u70ed\u70b9 Key \u5bfc\u81f4\u7684\u4efb\u52a1\u5361\u987f\u95ee\u9898\u3002\n\n### \u4e09\u3001 \u603b\u7ed3\n\n\u5728\u6211\u7684\u9879\u76ee\u4e2d\uff0cFlink \u4e0d\u4ec5\u4ec5\u662f\u4e00\u4e2a\u8ba1\u7b97\u5f15\u64ce\uff0c\u66f4\u662f\u6574\u4e2a\u8bbe\u5907\u57df**\u201c\u5b9e\u65f6\u5316\u3001\u667a\u80fd\u5316\u201d**\u8f6c\u578b\u7684\u57fa\u77f3\u3002\n\n\u76f8\u6bd4\u4e8e Spark Streaming \u7684\u5fae\u6279\u5904\u7406\u6a21\u5f0f\uff0cFlink \u7684**\u539f\u751f\u6d41\u5904\u7406**\u7279\u6027\u5728\u5ef6\u8fdf\u548c\u541e\u5410\u91cf\u4e0a\u90fd\u66f4\u80dc\u4e00\u7b79\uff0c\u5b8c\u7f8e\u5951\u5408\u4e86\u6211\u4eec\u5bf9\u8bbe\u5907\u72b6\u6001\u79d2\u7ea7\u76d1\u63a7\u548c\u5b9e\u65f6\u51b3\u7b56\u7684\u4e1a\u52a1\u9700\u6c42\u3002\u901a\u8fc7\u8fd9\u5957\u67b6\u6784\uff0c\u6211\u4eec\u6210\u529f\u6784\u5efa\u4e86\u4e00\u4e2a\u9ad8\u53ef\u9760\u3001\u9ad8\u6027\u80fd\u7684\u5b9e\u65f6\u6570\u636e\u95ed\u73af\u3002",

    "title": "Redis\u7f13\u5b58\u96ea\u5d29\u600e\u4e48\u529e\uff1f",
    "style": "background-color: yellow;",
    "details": "\u9762\u8bd5\u5b98\u60a8\u597d\uff0c\u7f13\u5b58\u96ea\u5d29\u662f\u5206\u5e03\u5f0f\u7cfb\u7edf\u9ad8\u53ef\u7528\u8bbe\u8ba1\u4e2d\u5fc5\u987b\u91cd\u70b9\u9632\u8303\u7684\u6545\u969c\u573a\u666f\u3002\u5728\u6211\u7684\u67b6\u6784\u7ecf\u9a8c\u4e2d\uff0c\u89e3\u51b3\u7f13\u5b58\u96ea\u5d29\u9700\u8981\u4ece**\u4e8b\u524d\u9884\u9632\u3001\u4e8b\u4e2d\u7194\u65ad\u3001\u4e8b\u540e\u6062\u590d**\u4e09\u4e2a\u7ef4\u5ea6\u5efa\u7acb\u7acb\u4f53\u5316\u7684\u9632\u5fa1\u4f53\u7cfb\u3002\n\n### \u4e00\u3001 \u4ec0\u4e48\u662f\u7f13\u5b58\u96ea\u5d29\uff1f\n\n\u901a\u5e38\u6709\u4e24\u79cd\u60c5\u51b5\uff1a\n1.  **\u5927\u9762\u79ef\u8fc7\u671f**\uff1a\u5927\u91cf\u7f13\u5b58 key \u5728\u540c\u4e00\u65f6\u95f4\u96c6\u4e2d\u8fc7\u671f\uff08\u5931\u6548\uff09\uff0c\u5bfc\u81f4\u6d77\u91cf\u8bf7\u6c42\u76f4\u63a5\u7a7f\u900f\u5230\u6570\u636e\u5e93\u3002\n2.  **\u5b95\u673a\u5d29\u6e83**\uff1aRedis \u5b9e\u4f8b\u5b95\u673a\u6216\u7531\u4e8e\u7f51\u7edc\u539f\u56e0\u4e0d\u53ef\u7528\uff0c\u5bfc\u81f4\u6240\u6709\u8bf7\u6c42\u76f4\u63a5\u6253\u5230\u6570\u636e\u5e93\uff0c\u77ac\u95f4\u628a\u6570\u636e\u5e93\u6253\u6302\u3002\n\n### \u4e8c\u3001 \u89e3\u51b3\u65b9\u6848\n\n#### 1. \u4e8b\u524d\u9884\u9632\uff08\u6838\u5fc3\u7b56\u7565\uff09\n\n**A. \u8fc7\u671f\u65f6\u95f4\u52a0\u968f\u673a\u503c\uff08\u9488\u5bf9\u5927\u9762\u79ef\u8fc7\u671f\uff09**\n*   **\u573a\u666f**\uff1a\u5982\u679c\u4e1a\u52a1\u9884\u70ed\u65f6\uff0c\u5c06\u5343\u4e07\u7ea7\u8bbe\u5907\u6570\u636e\u540c\u65f6\u52a0\u8f7d\u8fdb\u7f13\u5b58\uff0c\u4e14\u8fc7\u671f\u65f6\u95f4\u8bbe\u7f6e\u4e00\u81f4\uff0c\u5c31\u4f1a\u5bfc\u81f4\u540c\u65f6\u5931\u6548\u3002\n*   **\u65b9\u6848**\uff1a\u5728\u8bbe\u7f6e\u8fc7\u671f\u65f6\u95f4\u65f6\uff0c\u589e\u52a0\u4e00\u4e2a\u968f\u673a\u503c\u3002\n    *   \u4f8b\u5982\uff1a\u57fa\u7840\u8fc7\u671f\u65f6\u95f4\u4e3a 1 \u5c0f\u65f6\uff0c\u52a0\u4e0a\u4e00\u4e2a 0-10 \u5206\u949f\u7684\u968f\u673a\u6570\u3002\u8fd9\u6837\u7f13\u5b58\u7684\u5931\u6548\u65f6\u95f4\u5c31\u4f1a\u5206\u6563\u5728 1 \u5c0f\u65f6\u5230 1 \u5c0f\u65f6 10 \u5206\u949f\u4e4b\u95f4\uff0c\u907f\u514d\u4e86\u540c\u4e00\u65f6\u523b\u7684\u5927\u9762\u79ef\u5931\u6548\u3002\n\n**B. \u9ad8\u53ef\u7528\u67b6\u6784\uff08\u9488\u5bf9\u5b95\u673a\u5d29\u6e83\uff09**\n*   **\u65b9\u6848**\uff1a\u642d\u5efa Redis \u9ad8\u53ef\u7528\u96c6\u7fa4\u3002\n    *   **\u4e3b\u4ece + \u54e8\u5175**\uff1a\u5b9e\u73b0\u6545\u969c\u81ea\u52a8\u8f6c\u79fb\uff0c\u4e3b\u8282\u70b9\u6302\u4e86\uff0c\u4ece\u8282\u70b9\u7acb\u9a6c\u9876\u4e0a\u3002\n    *   **Redis Cluster**\uff1a\u6570\u636e\u5206\u7247\u5b58\u50a8\uff0c\u5373\u4f7f\u90e8\u5206\u8282\u70b9\u6302\u4e86\uff0c\u5f71\u54cd\u4e5f\u53ea\u662f\u5c40\u90e8\u7684\uff0c\u914d\u5408\u526f\u672c\u673a\u5236\u4fdd\u969c\u6570\u636e\u5b89\u5168\u3002\n\n**C. \u70ed\u70b9\u6570\u636e\u201c\u6c38\u4e0d\u8fc7\u671f\u201d\u7b56\u7565**\n*   **\u65b9\u6848**\uff1a\u5bf9\u4e8e\u6781\u5ea6\u6838\u5fc3\u7684\u70ed\u70b9\u6570\u636e\uff08\u5982\u7cfb\u7edf\u914d\u7f6e\u3001\u70ed\u95e8\u95e8\u5e97\u4fe1\u606f\uff09\uff0c\u6211\u4eec\u53ef\u4ee5\u903b\u8f91\u4e0a\u8bbe\u7f6e\u4e3a\u201c\u6c38\u4e0d\u8fc7\u671f\u201d\u3002\n    *   \u7269\u7406\u4e0a\u867d\u7136\u6709\u8fc7\u671f\u65f6\u95f4\uff0c\u4f46\u5728\u903b\u8f91\u5c42\uff08\u4ee3\u7801\u4e2d\uff09\u7ef4\u62a4\u4e00\u4e2a\u5f02\u6b65\u5237\u65b0\u7ebf\u7a0b\u3002\u5f53\u68c0\u6d4b\u5230\u5feb\u8fc7\u671f\u6216\u66f4\u65b0\u65f6\uff0c\u5f02\u6b65\u53bb\u6570\u636e\u5e93\u52a0\u8f7d\u6570\u636e\u5e76\u66f4\u65b0\u7f13\u5b58\uff0c\u4fdd\u8bc1\u7528\u6237\u6c38\u8fdc\u80fd\u547d\u4e2d\u7f13\u5b58\u3002\n\n#### 2. \u4e8b\u4e2d\u515c\u5e95\uff08\u6d41\u91cf\u9632\u62a4\uff09\n\n**A. \u9650\u6d41\u4e0e\u964d\u7ea7**\n*   **\u573a\u666f**\uff1a\u5982\u679c\u7f13\u5b58\u771f\u7684\u5931\u6548\u4e86\uff0c\u6570\u636e\u5e93\u538b\u529b\u6fc0\u589e\u3002\n*   **\u65b9\u6848**\uff1a\n    *   \u4f7f\u7528 **Hystrix** \u6216 **Sentinel** \u8fdb\u884c\u9650\u6d41\u3002\u5f53\u6570\u636e\u5e93\u538b\u529b\u8fbe\u5230\u9608\u503c\u65f6\uff0c\u76f4\u63a5\u62d2\u7edd\u90e8\u5206\u8bf7\u6c42\uff0c\u4fdd\u62a4\u6570\u636e\u5e93\u4e0d\u88ab\u538b\u6b7b\u3002\n    *   \u5bf9\u4e8e\u975e\u6838\u5fc3\u4e1a\u52a1\uff0c\u53ef\u4ee5\u8d70\u964d\u7ea7\u903b\u8f91\uff08\u5982\u8fd4\u56de\u9ed8\u8ba4\u503c\u3001\u53cb\u597d\u7684\u9519\u8bef\u63d0\u793a\uff09\uff0c\u4fdd\u8bc1\u6838\u5fc3\u4e1a\u52a1\uff08\u5982\u79df\u501f\u4ea4\u6613\uff09\u7684\u53ef\u7528\u6027\u3002\n\n**B. \u4e92\u65a5\u9501**\n*   **\u573a\u666f**\uff1a\u7f13\u5b58\u5931\u6548\u77ac\u95f4\uff0c\u5927\u91cf\u5e76\u53d1\u8bf7\u6c42\u540c\u65f6\u67e5\u8be2\u6570\u636e\u5e93\u3002\n*   **\u65b9\u6848**\uff1a\u53ea\u8ba9\u4e00\u4e2a\u7ebf\u7a0b\u53bb\u67e5\u6570\u636e\u5e93\uff0c\u5176\u4ed6\u7ebf\u7a0b\u7b49\u5f85\u3002\n    *   \u4f7f\u7528 Redis \u7684 `SETNX`\uff08Set if Not Exists\uff09\u5b9e\u73b0\u5206\u5e03\u5f0f\u9501\u3002\n    *   \u5f53\u7f13\u5b58\u5931\u6548\u65f6\uff0c\u53ea\u6709\u62ff\u5230\u9501\u7684\u7ebf\u7a0b\u53bb\u67e5\u6570\u636e\u5e93\u5e76\u56de\u5199\u7f13\u5b58\uff0c\u5176\u4ed6\u7ebf\u7a0b\u81ea\u65cb\u91cd\u8bd5\u6216\u76f4\u63a5\u8fd4\u56de\u65e7\u6570\u636e\u3002\n\n#### 3. \u4e8b\u540e\u6062\u590d\n\n**A. \u591a\u7ea7\u7f13\u5b58\u67b6\u6784**\n*   **\u65b9\u6848**\uff1a\u6784\u5efa `Nginx \u672c\u5730\u7f13\u5b58 -> \u5e94\u7528\u5c42\u672c\u5730\u7f13\u5b58 -> \u5206\u5e03\u5f0f Redis \u7f13\u5b58 -> \u6570\u636e\u5e93` \u7684\u591a\u7ea7\u9632\u5fa1\u3002\n    *   \u5f53 Redis \u5f7b\u5e95\u6302\u4e86\uff0c\u5e94\u7528\u5c42\u8fd8\u53ef\u4ee5\u5c1d\u8bd5\u8bfb\u53d6\u672c\u5730\u7f13\u5b58\uff08\u5982 Guava Cache \u6216 Caffeine\uff09\uff0c\u867d\u7136\u6570\u636e\u53ef\u80fd\u4e0d\u662f\u6700\u65b0\u7684\uff0c\u4f46\u81f3\u5c11\u80fd\u6297\u4f4f\u90e8\u5206\u6d41\u91cf\uff0c\u907f\u514d\u7cfb\u7edf\u5f7b\u5e95\u5d29\u6e83\u3002\n\n**B. \u6301\u4e45\u5316\u4e0e\u5feb\u901f\u9884\u70ed**\n*   **\u65b9\u6848**\uff1a\n    *   \u5f00\u542f Redis AOF/RDB \u6301\u4e45\u5316\u3002Redis \u91cd\u542f\u540e\u80fd\u81ea\u52a8\u6062\u590d\u6570\u636e\u3002\n    *   \u51c6\u5907\u7f13\u5b58\u9884\u70ed\u811a\u672c\u3002\u5728\u7cfb\u7edf\u542f\u52a8\u6216\u7f13\u5b58\u5927\u89c4\u6a21\u5931\u6548\u65f6\uff0c\u901a\u8fc7\u540e\u53f0\u4efb\u52a1\u6279\u91cf\u5c06\u70ed\u70b9\u6570\u636e\u52a0\u8f7d\u5230\u7f13\u5b58\u4e2d\uff0c\u907f\u514d\u6d41\u91cf\u9ad8\u5cf0\u671f\u5b9e\u65f6\u7a7f\u900f\u3002\n\n### \u4e09\u3001 \u5b9e\u6218\u603b\u7ed3\n\n\u5728\u6211\u7684\u9879\u76ee\u4e2d\uff0c\u5bf9\u4e8e\u8bbe\u5907\u72b6\u6001\u8fd9\u79cd\u9ad8\u9891\u8bbf\u95ee\u6570\u636e\uff0c\u6211\u4e3b\u8981\u662f\u901a\u8fc7**\u201c\u8fc7\u671f\u65f6\u95f4\u968f\u673a\u5316\u201d**\u914d\u5408**\u201c\u5206\u5e03\u5f0f\u9501\u201d**\u6765\u89e3\u51b3\u96ea\u5d29\u95ee\u9898\u3002\u540c\u65f6\uff0c\u6211\u4eec\u5728\u67b6\u6784\u5c42\u9762\u5f15\u5165\u4e86 **Sentinel** \u8fdb\u884c\u63a5\u53e3\u9650\u6d41\uff0c\u786e\u4fdd\u5373\u4f7f\u7f13\u5b58\u6302\u4e86\uff0c\u6570\u636e\u5e93\u4e5f\u4e0d\u4f1a\u88ab\u77ac\u95f4\u7684\u6d41\u91cf\u6d2a\u5cf0\u51b2\u57ae\u3002\u8fd9\u4e0d\u4ec5\u4ec5\u662f\u6280\u672f\u95ee\u9898\uff0c\u66f4\u662f\u4e00\u79cd\u515c\u5e95\u601d\u7ef4\u7684\u4f53\u73b0\u3002",

  "311": {
    "title": "\u4f60\u505a\u8fc7\u54ea\u4e9b JVM \u8c03\u4f18\uff1f\u8bf7\u4e3e\u4e00\u4e2a\u771f\u5b9e\u6848\u4f8b\u3002",
    "style": "",
    "details": "\u9762\u8bd5\u5b98\u60a8\u597d\uff0cJVM \u8c03\u4f18\u662f\u6211\u5de5\u4f5c\u4e2d\u89e3\u51b3\u7cfb\u7edf\u6027\u80fd\u74f6\u9888\u7684\u91cd\u8981\u624b\u6bb5\u4e4b\u4e00\u3002\u6211\u8ba4\u4e3a JVA \u8c03\u4f18\u4e0d\u80fd\u76f2\u76ee\u8fdb\u884c\uff0c\u5fc5\u987b\u57fa\u4e8e**\u201c\u53d1\u73b0\u95ee\u9898 -> \u5b9a\u4f4d\u6839\u56e0 -> \u9a8c\u8bc1\u6548\u679c\u201d**\u7684\u95ed\u73af\u601d\u8def\u3002\n\n\u5728\u6211\u7684\u804c\u4e1a\u751f\u6daf\u4e2d\uff0c\u6211\u5904\u7406\u8fc7\u591a\u6b21 JVM \u76f8\u5173\u7684\u95ee\u9898\uff0c\u4e3b\u8981\u96c6\u4e2d\u5728**\u9891\u7e41 Full GC \u5bfc\u81f4\u670d\u52a1\u505c\u987f\uff08STW\uff09**\u548c**OOM\uff08\u5185\u5b58\u6ea2\u51fa\uff09**\u4e24\u7c7b\u3002\n\n\u4e0b\u9762\u6211\u5206\u4eab\u4e00\u4e2a\u5728\u5c0f\u7535\u79d1\u6280\u5904\u7406**\u201c\u670d\u52a1\u9891\u7e41 Full GC \u5bfc\u81f4\u54cd\u5e94\u8d85\u65f6\u201d**\u7684\u771f\u5b9e\u6848\u4f8b\u3002\n\n### \u4e00\u3001 \u95ee\u9898\u80cc\u666f\u4e0e\u73b0\u8c61\n\n**\u4e1a\u52a1\u573a\u666f**\uff1a\n\u6211\u4eec\u7684\u6838\u5fc3\u4ea4\u6613\u670d\u52a1\uff08\u8d1f\u8d23\u7528\u6237\u79df\u501f\u548c\u5f52\u8fd8\u5145\u7535\u5b9d\uff09\uff0c\u5728\u4e1a\u52a1\u9ad8\u5cf0\u671f\uff08\u5982\u665a\u4e0a 18:00-20:00\uff09\uff0c\u5076\u5c14\u4f1a\u51fa\u73b0\u63a5\u53e3\u54cd\u5e94\u7f13\u6162\uff0c\u751a\u81f3\u89e6\u53d1 Hystrix \u7194\u65ad\u7684\u60c5\u51b5\u3002\n\n**\u76d1\u63a7\u62a5\u8b66**\uff1a\n\u901a\u8fc7\u76d1\u63a7\u5e73\u53f0\uff08\u6211\u4eec\u4f7f\u7528\u7684\u662f Prometheus + Grafana\uff09\uff0c\u6211\u53d1\u73b0\u8be5\u670d\u52a1\u5728\u9ad8\u5cf0\u671f CPU \u4f7f\u7528\u7387\u4f1a\u77ac\u95f4\u98d9\u5347\u5230 90% \u4ee5\u4e0a\uff0c\u4e14\u5e76\u4e0d\u662f\u4e1a\u52a1\u7ebf\u7a0b\u7e41\u5fd9\u5bfc\u81f4\u7684\uff0c\u800c\u662f CPU \u5728\u6267\u884c\u5927\u91cf\u7684 GC \u64cd\u4f5c\u3002\u65e5\u5fd7\u4e2d\u9891\u7e41\u51fa\u73b0 `[Full GC (Allocation Failure)` \u7684\u8b66\u544a\uff0c\u5e73\u5747\u6bcf 2-3 \u5206\u949f\u5c31\u4f1a\u89e6\u53d1\u4e00\u6b21 Full GC\uff0c\u5355\u6b21\u8017\u65f6\u6709\u65f6\u8d85\u8fc7 500ms\uff0c\u8fd9\u76f4\u63a5\u5bfc\u81f4\u4e86\u7528\u6237\u79df\u501f\u8d85\u65f6\u3002\n\n### \u4e8c\u3001 \u6392\u67e5\u4e0e\u5206\u6790\u8fc7\u7a0b\n\n**1. \u73b0\u573a\u4fdd\u7559\u4e0e\u5de5\u5177\u4ecb\u5165**\n\u4e3a\u4e86\u5b9a\u4f4d\u95ee\u9898\uff0c\u6211\u5728\u95ee\u9898\u590d\u73b0\u65f6\uff0c\u5229\u7528 `jstat` \u547d\u4ee4\u67e5\u770b\u4e86 GC \u7edf\u8ba1\u4fe1\u606f\uff0c\u53d1\u73b0\u8001\u5e74\u4ee3\u5185\u5b58\u4f7f\u7528\u7387\u5728 GC \u540e\u4e0b\u964d\u4e0d\u660e\u663e\uff0c\u8bf4\u660e\u53ef\u80fd\u6709\u5927\u91cf\u5bf9\u8c61\u65e0\u6cd5\u56de\u6536\uff0c\u6216\u8005\u5bf9\u8c61\u76f4\u63a5\u8fdb\u5165\u4e86\u8001\u5e74\u4ee3\u3002\n\n\u6211\u8fdb\u4e00\u6b65\u4f7f\u7528 `jmap` \u5bfc\u51fa\u4e86\u5806\u5185\u5b58\u5feb\u7167\uff0c\u5229\u7528 **MAT (Memory Analyzer Tool)** \u8fdb\u884c\u5206\u6790\u3002\n\n**2. \u5185\u5b58\u6cc4\u6f0f vs \u5185\u5b58\u4e0d\u8db3**\n\u901a\u8fc7 MAT \u7684 Dominator Tree \u5206\u6790\uff0c\u6211\u6392\u9664\u4e86\u201c\u5185\u5b58\u6cc4\u6f0f\u201d\u7684\u53ef\u80fd\uff08\u5373\u5bf9\u8c61\u88ab\u9519\u8bef\u6301\u6709\u65e0\u6cd5\u56de\u6536\uff09\u3002\u6211\u53d1\u73b0\u5185\u5b58\u4e2d\u5b58\u6d3b\u7684\u6700\u5927\u5bf9\u8c61\u662f\u4e1a\u52a1\u7ebf\u7a0b\u6301\u6709\u7684 `OrderContext` \u5bf9\u8c61\uff0c\u8fd9\u662f\u6b63\u5e38\u7684\u4e1a\u52a1\u6570\u636e\u3002\n\n**3. \u5b9a\u4f4d\u6839\u56e0\uff1a\u8fc7\u65e9\u664b\u5347**\n\u8fdb\u4e00\u6b65\u5206\u6790 GC \u65e5\u5fd7\uff0c\u6211\u5173\u6ce8\u5230\u4e00\u4e2a\u5173\u952e\u6307\u6807\uff1a**\u6bcf\u6b21 Young GC \u540e\uff0c\u8001\u5e74\u4ee3\u7684\u4f7f\u7528\u91cf\u90fd\u5728\u7a33\u6b65\u589e\u957f**\u3002\n\u7ed3\u5408\u4ee3\u7801\u5206\u6790\uff0c\u6211\u53d1\u73b0\u5f53\u65f6\u7684 JVM \u914d\u7f6e\u5b58\u5728\u7f3a\u9677\uff1a\n*   **\u73b0\u72b6**\uff1a\u5e74\u8f7b\u4ee3\u8bbe\u7f6e\u8fc7\u5c0f\uff0c\u5bfc\u81f4 Young GC \u9891\u7e41\u89e6\u53d1\u3002\n*   **\u95ee\u9898**\uff1a\u7531\u4e8e\u5e74\u8f7b\u4ee3\u7a7a\u95f4\u4e0d\u8db3\uff0c\u5927\u91cf**\u77ed\u671f\u5b58\u6d3b**\u7684\u8ba2\u5355\u5bf9\u8c61\u5728 Young GC \u65f6\u65e0\u6cd5\u653e\u5165 Survivor \u533a\uff0c\u4ece\u800c\u89e6\u53d1\u201c\u52a8\u6001\u5e74\u9f84\u5224\u5b9a\u201d\u673a\u5236\uff0c\u76f4\u63a5**\u664b\u5347\u5230\u8001\u5e74\u4ee3**\u3002\n*   **\u540e\u679c**\uff1a\u8001\u5e74\u4ee3\u5f88\u5feb\u88ab\u586b\u6ee1\uff0c\u4ece\u800c\u89e6\u53d1\u9891\u7e41\u7684 Full GC\u3002\u8fd9\u5c31\u662f\u5178\u578b\u7684\u201c\u5bf9\u8c61\u8fc7\u65e9\u664b\u5347\u201d\u95ee\u9898\u3002\n\n### \u4e09\u3001 \u8c03\u4f18\u65b9\u6848\u4e0e\u5b9e\u65bd\n\n\u9488\u5bf9\u4e0a\u8ff0\u5206\u6790\uff0c\u6211\u5236\u5b9a\u4e86\u4ee5\u4e0b\u8c03\u4f18\u7b56\u7565\uff1a\n\n**1. \u8c03\u6574\u5806\u5185\u5b58\u6bd4\u4f8b\uff08\u6838\u5fc3\u63aa\u65bd\uff09**\n*   **\u539f\u914d\u7f6e**\uff1a`-Xms2g -Xmx2g -Xmn512m`\uff08\u5e74\u8f7b\u4ee3\u4ec5\u5360\u5806\u7684 1/4\uff09\u3002\n*   **\u8c03\u6574\u540e**\uff1a`-Xms4g -Xmx4g -Xmn2g`\u3002\n*   **\u7406\u7531**\uff1a\u6269\u5927\u5e74\u8f7b\u4ee3\u7a7a\u95f4\uff0c\u8ba9\u5bf9\u8c61\u5728\u5e74\u8f7b\u4ee3\u591a\u5f85\u4e00\u4f1a\u513f\u3002\u5927\u90e8\u5206\u8ba2\u5355\u5bf9\u8c61\u90fd\u662f\u201c\u671d\u751f\u5915\u706d\u201d\u7684\uff0c\u53ea\u8981\u5728 Young GC \u65f6\u6709\u8db3\u591f\u7a7a\u95f4\u5bb9\u7eb3\uff0c\u5b83\u4eec\u5c31\u4f1a\u5728\u5e74\u8f7b\u4ee3\u88ab\u56de\u6536\uff0c\u800c\u4e0d\u4f1a\u664b\u5347\u5230\u8001\u5e74\u4ee3\u3002\n\n**2. \u4f18\u5316\u5783\u573e\u56de\u6536\u5668**\n*   **\u539f\u914d\u7f6e**\uff1a\u4f7f\u7528\u9ed8\u8ba4\u7684 ParallelGC\uff08\u541e\u5410\u91cf\u4f18\u5148\u6536\u96c6\u5668\uff09\u3002\n*   **\u8c03\u6574\u540e**\uff1a\u5207\u6362\u4e3a **G1 \u6536\u96c6\u5668** (`-XX:+UseG1GC`)\u3002\n*   **\u7406\u7531**\uff1aG1 \u80fd\u591f\u66f4\u597d\u5730\u5904\u7406\u5927\u5806\uff084G\uff09\uff0c\u5e76\u4e14\u53ef\u4ee5\u8bbe\u7f6e\u76ee\u6807\u505c\u987f\u65f6\u95f4 (`-XX:MaxGCPauseMillis=200`)\uff0c\u907f\u514d\u957f\u65f6\u95f4\u7684 STW \u5f71\u54cd\u7528\u6237\u4f53\u9a8c\u3002G1 \u4f1a\u81ea\u52a8\u8c03\u6574\u5e74\u8f7b\u4ee3\u548c\u8001\u5e74\u4ee3\u7684\u6bd4\u4f8b\uff0c\u65e0\u9700\u624b\u52a8\u8bbe\u7f6e `-Xmn`\u3002\n\n**3. \u4ee3\u7801\u5c42\u9762\u4f18\u5316\uff08\u914d\u5408\u8c03\u6574\uff09**\n*   \u5728\u6392\u67e5\u4e2d\uff0c\u6211\u8fd8\u53d1\u73b0\u4e00\u5904\u4ee3\u7801\u903b\u8f91\uff1a\u5728\u5faa\u73af\u4e2d\u9891\u7e41\u521b\u5efa `SimpleDateFormat` \u5bf9\u8c61\u7528\u4e8e\u65e5\u671f\u683c\u5f0f\u5316\u3002\u867d\u7136\u4e0d\u662f\u672c\u6b21 Full GC \u7684\u4e3b\u56e0\uff0c\u4f46\u4f1a\u4ea7\u751f\u5927\u91cf\u4e34\u65f6\u5bf9\u8c61\u3002\u6211\u5c06\u5176\u4f18\u5316\u4e3a `ThreadLocal` \u7f13\u5b58\u6216\u4f7f\u7528 Joda-Time/Java 8 \u7684 `DateTimeFormatter`\uff0c\u51cf\u5c11\u4e86\u5e74\u8f7b\u4ee3\u5bf9\u8c61\u7684\u521b\u5efa\u901f\u7387\u3002\n\n### \u56db\u3001 \u8c03\u4f18\u7ed3\u679c\n\n\u8c03\u6574\u4e0a\u7ebf\u540e\uff0c\u901a\u8fc7\u4e00\u5468\u7684\u89c2\u5bdf\uff1a\n\n1.  **Full GC \u9891\u7387\u5927\u5e45\u4e0b\u964d**\uff1a\u4ece\u539f\u6765\u7684\u6bcf 2-3 \u5206\u949f\u4e00\u6b21\uff0c\u964d\u4f4e\u5230\u4e86\u6bcf\u5929 0-1 \u6b21\uff08\u4e3b\u8981\u5728\u51cc\u6668\u4e1a\u52a1\u4f4e\u5cf0\u671f\uff09\u3002\n2.  **Young GC \u6b21\u6570\u7565\u5fae\u589e\u52a0\uff0c\u4f46\u8017\u65f6\u6781\u77ed**\uff1a\u8fd9\u662f\u6b63\u5e38\u7684\uff0c\u56e0\u4e3a\u5e74\u8f7b\u4ee3\u53d8\u5927\u4e86\uff0c\u626b\u63cf\u65f6\u95f4\u7a0d\u5fae\u53d8\u957f\uff0c\u4f46\u907f\u514d\u4e86\u5bf9\u8c61\u664b\u5347\u3002\n3.  **\u7cfb\u7edf\u7a33\u5b9a\u6027\u63d0\u5347**\uff1a\u9ad8\u5cf0\u671f CPU \u4f7f\u7528\u7387\u5e73\u7a33\uff0c\u63a5\u53e3 P99 \u8017\u65f6\u4ece 500ms+ \u964d\u4f4e\u5230\u4e86 100ms \u4ee5\u5185\uff0c\u672a\u518d\u51fa\u73b0\u7194\u65ad\u73b0\u8c61\u3002\n\n### \u4e94\u3001 \u603b\u7ed3\u4e0e\u7ecf\u9a8c\n\n\u901a\u8fc7\u8fd9\u6b21\u8c03\u4f18\uff0c\u6211\u6df1\u523b\u4f53\u4f1a\u5230 JVM \u8c03\u4f18\u4e0d\u4ec5\u4ec5\u662f\u6539\u53c2\u6570\uff0c\u66f4\u662f\u5bf9**\u5bf9\u8c61\u751f\u547d\u5468\u671f**\u7684\u7406\u89e3\u3002\n\n\u6211\u7684\u6838\u5fc3\u7ecf\u9a8c\u603b\u7ed3\u4e3a\uff1a\n1.  **\u5148\u770b\u4ee3\u7801\uff0c\u518d\u770b JVM**\uff1a\u5927\u90e8\u5206\u6027\u80fd\u95ee\u9898\u6e90\u4e8e\u4ee3\u7801\u5199\u5f97\u4e0d\u5408\u7406\uff08\u5982\u6b7b\u5faa\u73af\u3001\u5927\u5bf9\u8c61\u3001\u8fde\u63a5\u672a\u5173\u95ed\uff09\uff0c\u53c2\u6570\u8c03\u4f18\u53ea\u662f\u6700\u540e\u4e00\u9053\u9632\u7ebf\u3002\n2.  **\u7406\u89e3\u4e1a\u52a1\u6a21\u578b**\uff1a\u6211\u4eec\u7684\u4ea4\u6613\u7cfb\u7edf\u662f\u201c\u9ad8\u5e76\u53d1\u3001\u77ed\u751f\u547d\u5468\u671f\u5bf9\u8c61\u201d\u6a21\u578b\uff0c\u6240\u4ee5**\u589e\u5927\u5e74\u8f7b\u4ee3**\u662f\u6838\u5fc3\u7b56\u7565\uff1b\u5982\u679c\u662f\u7f13\u5b58\u7c7b\u5e94\u7528\uff0c\u8001\u5e74\u4ee3\u53ef\u80fd\u9700\u8981\u66f4\u5927\u3002\n3.  **\u5584\u7528\u5de5\u5177**\uff1a`jstat`\u3001`jmap`\u3001`jstack` \u4ee5\u53ca GC \u65e5\u5fd7\u5206\u6790\u5de5\u5177\uff08\u5982 GCEasy.io\uff09\u662f\u5fc5\u5907\u6280\u80fd\u3002\n\n\u8fd9\u5c31\u662f\u6211\u5904\u7406 Full GC \u95ee\u9898\u7684\u4e00\u4e2a\u5178\u578b\u6848\u4f8b\u3002\u5982\u679c\u60a8\u611f\u5174\u8da3\uff0c\u6211\u4e5f\u53ef\u4ee5\u5206\u4eab\u5173\u4e8e OOM \u6392\u67e5\u6216\u7ebf\u7a0b\u6b7b\u9501\u6392\u67e5\u7684\u7ecf\u9a8c\u3002",
